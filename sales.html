<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JG Restoration — Sales Dashboard</title>
<link rel="icon" type="image/png" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>

:root{
  --navy:#0d2d5e;--orange:#e85d04;--gold:#f5a623;
  --bg:#f0ede8;--s1:#faf9f7;--s2:#f0ede8;--s3:#e8e4df;
  --brd:rgba(13,45,94,.12);--brdH:rgba(13,45,94,.3);
  --acc:#e85d04;--accD:rgba(232,93,4,.08);
  --txt:#0d1f3c;--dim:#6b7a96;--mut:#a0abbf;
  --red:#c02020;--redD:rgba(192,32,32,.08);
  --grn:#2e7d32;--grnD:rgba(46,125,50,.08);
  --wrn:#e65100;--wrnD:rgba(230,81,0,.08);
  --blu:#1565c0;--bluD:rgba(21,101,192,.08);
  --purp:#6a1b9a;--purpD:rgba(106,27,154,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;padding:16px 20px;}
.mono{font-family:'DM Mono',monospace}
.container{max-width:1020px;margin:0 auto;padding-left:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
input[type=text],input[type=password]{padding:10px 12px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:13px;font-family:'DM Mono',monospace;outline:none}
input:focus{border-color:var(--acc)!important;box-shadow:0 0 0 2px var(--accD)}
textarea{width:100%;min-height:60px;padding:10px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:12px;font-family:'DM Sans',sans-serif;resize:vertical;line-height:1.5;outline:none;box-sizing:border-box}
textarea:focus{border-color:var(--acc);box-shadow:0 0 0 2px var(--accD)}
input[type=file]{display:none}
.act-btn{border:1px solid var(--brd);background:transparent;color:var(--dim);padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;margin-right:8px}
.act-btn:hover{border-color:var(--brdH);color:var(--txt)}
.act-btn.sc{background:var(--grnD);border-color:var(--grn);color:var(--grn)}
.act-btn.sj{background:var(--wrnD);border-color:var(--wrn);color:var(--wrn)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:'DM Mono',monospace}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--mut);border-radius:3px}

#jg-login{position:fixed;inset:0;background:rgba(13,29,60,.96);align-items:center;justify-content:center;z-index:9999;display:none;}
#jg-login-box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4);}
#jg-login-err{font-size:12px;color:#c0392b;margin-top:12px;min-height:16px;}

/* ── COLLAPSIBLE SIDEBAR ── */
#jg-sidebar{
  position:fixed;left:0;top:0;bottom:0;
  width:48px; /* collapsed = icon only */
  background:#0d2d5e;
  display:flex;flex-direction:column;
  z-index:90;
  box-shadow:2px 0 12px rgba(0,0,0,.15);
  transition:width .22s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
  white-space:nowrap;
}
#jg-sidebar:hover,
#jg-sidebar.expanded{
  width:200px;
  z-index:200;
  box-shadow:4px 0 24px rgba(0,0,0,.3);
}
#jg-sidebar .sb-logo{
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;
  min-height:52px;flex-shrink:0;
}
#jg-sidebar .sb-logo img{
  height:28px;width:28px;
  object-fit:contain;flex-shrink:0;
  border-radius:4px;
}
#jg-sidebar .sb-sec{
  font-size:9px;font-weight:700;color:rgba(255,255,255,.3);
  text-transform:uppercase;letter-spacing:.1em;
  padding:12px 14px 4px;
  font-family:monospace;
  opacity:0;
  transition:opacity .15s .1s;
}
#jg-sidebar:hover .sb-sec,
#jg-sidebar.expanded .sb-sec{opacity:1;}
#jg-sidebar a.sb-lnk{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;
  font-size:12px;font-weight:500;
  color:rgba(255,255,255,.65);
  text-decoration:none;
  border-left:3px solid transparent;
  transition:all .15s;
  flex-shrink:0;
}
#jg-sidebar a.sb-lnk:hover{
  background:rgba(255,255,255,.08);color:#fff;
  border-left-color:rgba(255,255,255,.3);
}
#jg-sidebar a.sb-lnk.active{
  background:rgba(255,255,255,.12);color:#fff;
  border-left-color:#e85d04;font-weight:600;
}
#jg-sidebar .sb-icon{
  font-size:16px;width:20px;text-align:center;flex-shrink:0;
}
#jg-sidebar .sb-label{
  opacity:0;transition:opacity .15s .05s;
  overflow:hidden;
}
#jg-sidebar:hover .sb-label,
#jg-sidebar.expanded .sb-label{opacity:1;}
#jg-sidebar .sb-btm{
  margin-top:auto;padding:10px 14px;
  border-top:1px solid rgba(255,255,255,.1);
  flex-shrink:0;
}
#jg-sidebar .sb-user{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:rgba(255,255,255,.55);
  cursor:pointer;padding:4px 0;
}
#jg-sidebar .sb-user:hover{color:#fff;}
#jg-sidebar .sb-user-label{
  opacity:0;transition:opacity .15s .05s;overflow:hidden;
}
#jg-sidebar:hover .sb-user-label,
#jg-sidebar.expanded .sb-user-label{opacity:1;}
/* Body offset — collapsed width only */
body{padding-left:48px;box-sizing:border-box;}
* {box-sizing:border-box;}

/* ── QA DISPATCH STYLING ── */
.qa-hdr{background:var(--navy);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:95;}
.qa-hdr-l{display:flex;align-items:center;gap:10px;}
.qa-logo-mk{width:26px;height:26px;background:var(--orange);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.qa-hdr-title{font-size:13px;font-weight:600;color:#fff;letter-spacing:-.3px;}
.qa-hdr-title span{color:var(--gold);}
.qa-pill{font-size:10px;padding:2px 8px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);border-radius:20px;border:1px solid rgba(255,255,255,.18);}
.qa-hdr-r{display:flex;align-items:center;gap:6px;}
.qa-body{padding:14px 16px;max-width:920px;margin:0 auto;}
.qa-card{background:var(--s1);border:1px solid var(--brd);border-radius:10px;box-shadow:0 1px 3px rgba(13,45,94,.08),0 4px 16px rgba(13,45,94,.06);overflow:hidden;margin-bottom:14px;}
.qa-card-hd{background:var(--navy);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;}
.qa-card-hd-title{font-size:11px;font-weight:600;color:#fff;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
.qa-card-body{padding:16px;}
.qa-upload-zone{border:2px dashed var(--brd);border-radius:8px;padding:26px 16px;text-align:center;cursor:pointer;transition:all .15s;background:transparent;}
.qa-upload-zone:hover{border-color:var(--orange);background:rgba(232,93,4,.04);}
.qa-upload-zone.loaded{border-style:solid;border-color:var(--grn);background:rgba(46,125,50,.04);text-align:left;padding:12px 16px;}
.qa-btn{padding:8px 18px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.qa-btn-primary{background:var(--orange);color:#fff;}
.qa-btn-primary:hover{background:#c94a00;}
.qa-btn-primary:disabled{opacity:.45;cursor:default;}
.qa-btn-ghost{background:transparent;border:1px solid var(--brd);color:var(--dim);}
.qa-btn-ghost:hover{border-color:var(--navy);color:var(--navy);}
.qa-btn-green{background:var(--grn);color:#fff;}
.qa-btn-navy{background:var(--navy);color:#fff;}
.qa-step-bar{display:flex;gap:6px;margin-bottom:16px;}
.qa-step{flex:1;padding:8px 10px;border-radius:6px;border:1px solid var(--brd);text-align:center;background:var(--s2);}
.qa-step.active{background:var(--s1);border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.12);}
.qa-step.done{background:rgba(46,125,50,.06);border-color:var(--grn);}
.qa-step-lbl{font-size:11px;font-weight:600;color:var(--dim);font-family:'DM Mono',monospace;}
.qa-step.active .qa-step-lbl{color:var(--orange);}
.qa-step.done .qa-step-lbl{color:var(--grn);}
.qa-gap-row{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:14px;margin-bottom:8px;border-left:4px solid var(--brd);}
.qa-gap-row.HIGH{border-left-color:var(--red);}
.qa-gap-row.MEDIUM{border-left-color:var(--wrn);}
.qa-gap-row.LOW{border-left-color:var(--blu);}
.qa-gap-row.MANDATORY{border-left-color:var(--purp);}
.sev-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.04em;}
.sev-HIGH{background:var(--redD);color:var(--red);}
.sev-MEDIUM{background:var(--wrnD);color:var(--wrn);}
.sev-LOW{background:var(--bluD);color:var(--blu);}
.sev-MANDATORY{background:var(--purpD);color:var(--purp);}
.qa-filter-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.qa-filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--brd);background:var(--s1);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;color:var(--dim);transition:all .15s;}
.qa-filter-btn.on{background:var(--navy);border-color:var(--navy);color:#fff;}
.qa-stat-row{display:flex;gap:0;border:1px solid var(--brd);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.qa-stat-box{flex:1;padding:10px 14px;border-right:1px solid var(--brd);background:var(--s1);}
.qa-stat-box:last-child{border-right:none;}
.qa-stat-val{font-size:22px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;}
.qa-stat-val.red{color:var(--red);}
.qa-stat-val.grn{color:var(--grn);}
.qa-stat-lbl{font-size:9px;font-weight:500;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
.qa-progress-bar{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.qa-spin{width:16px;height:16px;border:2px solid var(--brd);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.qa-evidence-box{background:rgba(21,101,192,.04);border:1px solid rgba(21,101,192,.14);border-radius:6px;padding:9px 12px;margin-top:8px;}
.qa-defense-box{background:rgba(46,125,50,.04);border:1px solid rgba(46,125,50,.14);border-radius:6px;padding:9px 12px;margin-top:8px;}
.qa-dispute-box{background:rgba(176,106,0,.04);border:1px solid rgba(176,106,0,.14);border-radius:6px;padding:9px 12px;margin-top:8px;}
.qa-textarea{width:100%;padding:10px 12px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:12px;font-family:'DM Sans',sans-serif;resize:vertical;line-height:1.6;outline:none;box-sizing:border-box;}
.qa-textarea:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.1);}
.qa-input{width:100%;padding:9px 12px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box;}
.qa-input:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.1);}
.qa-label{display:block;font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;font-family:'DM Mono',monospace;}
.no-op-badge{font-size:9px;padding:2px 8px;background:rgba(106,27,154,.1);border:1px solid rgba(106,27,154,.25);color:var(--purp);border-radius:20px;font-weight:700;font-family:'DM Mono',monospace;}
.qa-defend-btn{padding:5px 12px;border-radius:5px;border:1px solid var(--grn);background:rgba(46,125,50,.06);color:var(--grn);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.qa-defend-btn.on{background:var(--grn);color:#fff;}
.qa-concede-btn{padding:5px 12px;border-radius:5px;border:1px solid var(--wrn);background:rgba(176,106,0,.06);color:var(--wrn);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.qa-concede-btn.on{background:var(--wrn);color:#fff;}
input[type=file]{display:none}



.sales-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:2px;}
.sales-tab{padding:9px 16px;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'DM Sans',sans-serif;}
.sales-tab.active{color:var(--navy);border-bottom-color:var(--orange);font-weight:600;}
.sales-hdr{background:var(--navy);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:95;}
.sales-body{padding:16px;max-width:1200px;margin:0 auto;}
.partner-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(13,45,94,.06);transition:all .15s;cursor:pointer;}
.partner-card:hover{border-color:var(--orange);box-shadow:0 2px 8px rgba(13,45,94,.1);}
.partner-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;color:#fff;}
.tier-A{background:#2e7d32;} .tier-B{background:#1565c0;} .tier-C{background:#6b7a96;}
.type-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;font-family:'DM Mono',monospace;}
.touch-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px;}
.touch-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.followup-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:6px;border-left:4px solid var(--border);display:flex;align-items:center;gap:12px;}
.followup-card.high{border-left-color:var(--danger);}
.followup-card.normal{border-left-color:var(--orange);}
.followup-card.low{border-left-color:var(--muted);}
.followup-card.overdue{background:var(--danger-bg);}
.route-stop{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.route-stop.done{opacity:.6;text-decoration:line-through;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;}
.modal-box{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:16px;font-family:'DM Mono',monospace;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;font-family:'DM Mono',monospace;}
.form-input{width:100%;padding:9px 12px;border-radius:6px;border:1.5px solid var(--border);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;box-sizing:border-box;}
.form-input:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.1);}
.form-select{width:100%;padding:9px 12px;border-radius:6px;border:1.5px solid var(--border);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;box-sizing:border-box;background:#fff;}
.market-toggle{display:flex;gap:6px;margin-bottom:16px;}
.mkt-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--muted);}
.mkt-btn.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.sales-stat-row{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;}
.sales-stat{flex:1;padding:12px 14px;border-right:1px solid var(--border);background:var(--surface);}
.sales-stat:last-child{border-right:none;}
.sales-stat-val{font-size:22px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;}
.sales-stat-lbl{font-size:9px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}

.btn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-gold{background:var(--gold);color:var(--navy);font-weight:600;}.btn-ghost{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);}
</style>
</head>

<script>
function mkMarketToggle() {
  var a = ST.market==="Appleton", s = ST.market==="Stevens Point";
  return "<div class=\"market-toggle\">"
    + "<button class=\"mkt-btn" + (a?" active":"") + "\" onclick=\"setMarket('Appleton')\">Appleton</button>"
    + "<button class=\"mkt-btn" + (s?" active":"") + "\" onclick=\"setMarket('Stevens Point')\">Stevens Point</button>"
    + "</div>";
}
function setMarket(m){ST.market=m;loadAll();}

function mkTypeFilters() {
  var types = ['All','Plumber','Realtor','Insurance Agent','Property Manager','GC','Other'];
  return types.map(function(t) {
    var active = ST.filterType===t;
    var bg = active ? 'var(--navy)' : 'var(--surface)';
    var col = active ? '#fff' : 'var(--muted)';
    return "<button style=\"padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;background:" + bg + ";color:" + col + "\" onclick=\"setTypeFilter('" + t + "')\">"+t+"</button>";
  }).join('');
}
function mkTierFilters() {
  var tiers = ['All','A','B','C'];
  return tiers.map(function(t) {
    var active = ST.filterTier===t;
    var tc = tierColor(t);
    var bg = active ? tc : 'var(--surface)';
    var col = active ? '#fff' : 'var(--muted)';
    var bc = active ? tc : 'var(--border)';
    var label = t==='All'?'All Tiers':'Tier '+t;
    return "<button style=\"padding:4px 12px;border-radius:20px;border:1.5px solid "+bc+";font-size:11px;font-weight:600;cursor:pointer;background:"+bg+";color:"+col+"\" onclick=\"setTierFilter('"+t+"')\">"+label+"</button>";
  }).join('');
}
function setTypeFilter(t){ST.filterType=t;render();}
function setTierFilter(t){ST.filterTier=t;render();}


function mkTab(t, label) {
  var cls = "sales-tab" + (ST.tab===t ? " active" : "");
  return "<button class=\"" + cls + "\" onclick=\"ST.tab='" + t + "';render()\">" + label + "</button>";
}


const _JG_KEY='jg_platform_user',_JG_EXP='jg_platform_exp';
function jgGoogleCb(r){try{const p=JSON.parse(atob(r.credential.split('.')[1]));if(!p.email.endsWith('@jg-restoration.com')){document.getElementById('jg-login-err').textContent='Access restricted to @jg-restoration.com accounts.';return;}const u={name:p.name||p.given_name,email:p.email,picture:p.picture||''};localStorage.setItem(_JG_KEY,JSON.stringify(u));localStorage.setItem(_JG_EXP,String(Date.now()+43200000));jgHideLogin();jgShowUser(u);}catch(e){document.getElementById('jg-login-err').textContent='Sign in failed.';}}
function jgCheckAuth(){const r=localStorage.getItem(_JG_KEY),e=localStorage.getItem(_JG_EXP);if(r&&e&&Date.now()<parseInt(e)){jgHideLogin();jgShowUser(JSON.parse(r));return true;}jgShowLogin();return false;}
function jgShowLogin(){const e=document.getElementById('jg-login');if(e)e.style.display='flex';}
function jgHideLogin(){const e=document.getElementById('jg-login');if(e)e.style.display='none';}
function jgShowUser(u){const n=document.getElementById('sb-nm'),a=document.getElementById('sb-av');if(n)n.textContent=u.name?u.name.split(' ')[0]:u.email.split('@')[0];if(a)a.innerHTML=u.picture?'<img src="'+u.picture+'" style="width:22px;height:22px;border-radius:50%;">':'👤';}
function jgSignOut(){if(confirm('Sign out?')){localStorage.removeItem(_JG_KEY);localStorage.removeItem(_JG_EXP);window.location.href='hub.html';}}
window.addEventListener('storage',e=>{if(e.key===_JG_KEY){if(e.newValue){jgHideLogin();jgShowUser(JSON.parse(e.newValue));}else jgShowLogin();}});
Object.defineProperty(window,'currentUser',{get:()=>{try{return JSON.parse(localStorage.getItem(_JG_KEY)||'null')?.name||null;}catch(e){return null;}},configurable:true});
function jgSignOut(){if(confirm('Sign out?')){localStorage.removeItem('jg_platform_user');localStorage.removeItem('jg_platform_exp');window.location.href='hub.html';}}
function jgShowUser(u){var n=document.getElementById('sb-nm'),a=document.getElementById('sb-av');if(n)n.textContent=u.name?u.name.split(' ')[0]:u.email.split('@')[0];if(a&&u.picture)a.innerHTML='<img src="'+u.picture+'" style="width:22px;height:22px;border-radius:50%;">';}

var ST = {
  tab: 'partners',
  market: 'Appleton',
  partners: [],
  touches: [],
  followups: [],
  routes: [],
  loading: false,
  modal: null,   // 'add-partner' | 'log-touch' | 'add-route' | 'add-followup' | 'partner-detail'
  selected: null,
  filterType: 'All',
  filterTier: 'All',
  searchQ: '',
  today: new Date().toISOString().split('T')[0],
  apiKey: localStorage.getItem('jg_key')||''
};

async function sb(path, opts) {
  var r = await fetch(SB_URL+path, Object.assign({headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}}, opts||{}));
  return r.ok ? r.json() : [];
}

async function loadAll() {
  ST.loading=true; render();
  var m = ST.market;
  var [partners, touches, followups, routes] = await Promise.all([
    sb('/rest/v1/sales_partners?market=eq.'+encodeURIComponent(m)+'&order=tier.asc,name.asc&limit=500'),
    sb('/rest/v1/sales_touches?market=eq.'+encodeURIComponent(m)+'&order=touch_date.desc&limit=200'),
    sb('/rest/v1/sales_followups?market=eq.'+encodeURIComponent(m)+'&completed=eq.false&order=due_date.asc&limit=200'),
    sb('/rest/v1/sales_routes?market=eq.'+encodeURIComponent(m)+'&order=route_date.desc&limit=30')
  ]);
  ST.partners=partners||[]; ST.touches=touches||[]; ST.followups=followups||[]; ST.routes=routes||[];
  ST.loading=false; render();
}

async function savePartner(data) {
  data.market = ST.market;
  data.updated_at = new Date().toISOString();
  if(data.id) {
    await sb('/rest/v1/sales_partners?id=eq.'+data.id, {method:'PATCH',body:JSON.stringify(data)});
  } else {
    await sb('/rest/v1/sales_partners', {method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(data)});
  }
  await loadAll();
}

async function logTouch(data) {
  data.market = ST.market;
  var user = JSON.parse(localStorage.getItem('jg_platform_user')||'null');
  data.logged_by = user&&user.name ? user.name.split(' ')[0] : '';
  await sb('/rest/v1/sales_touches', {method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(data)});
  // Update partner last_touch_date and touch_count
  if(data.partner_id) {
    await sb('/rest/v1/sales_partners?id=eq.'+data.partner_id, {
      method:'PATCH',
      body:JSON.stringify({last_touch_date:data.touch_date, touch_count:((ST.partners.find(function(p){return p.id===data.partner_id;})||{}).touch_count||0)+1, updated_at:new Date().toISOString()})
    });
  }
  // Auto-create follow-up if needed
  if(data.follow_up_needed && data.follow_up_date) {
    await sb('/rest/v1/sales_followups', {method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({
      partner_id:data.partner_id, partner_name:data.partner_name, partner_type:data.partner_type||'',
      due_date:data.follow_up_date, reason:'Follow up from '+data.touch_type+' on '+data.touch_date,
      notes:data.notes||'', market:ST.market, assigned_to:data.logged_by
    })});
  }
  await loadAll();
}

async function completeFollowup(id) {
  await sb('/rest/v1/sales_followups?id=eq.'+id, {method:'PATCH',body:JSON.stringify({completed:true,completed_at:new Date().toISOString()})});
  await loadAll();
}

async function saveRoute(data) {
  data.market = ST.market;
  data.total_stops = (data.stops||[]).length;
  await sb('/rest/v1/sales_routes', {method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(data)});
  await loadAll();
}

async function completeRouteStop(routeId, stopIdx) {
  var route = ST.routes.find(function(r){return r.id===routeId;});
  if(!route) return;
  var stops = JSON.parse(JSON.stringify(route.stops||[]));
  stops[stopIdx].completed = !stops[stopIdx].completed;
  var completed = stops.filter(function(s){return s.completed;}).length;
  await sb('/rest/v1/sales_routes?id=eq.'+routeId, {method:'PATCH',body:JSON.stringify({stops:stops,completed_stops:completed,status:completed===stops.length?'Completed':'In Progress'})});
  await loadAll();
}

function addPartner(){ST.modal="add-partner";ST.selected=null;render();}
function openModal(name){ST.modal=name;ST.selected=null;render();}
function importAlbi(){ST.modal=null;importFromAlbi();}
async function importFromAlbi() {
  try {
    var r = await fetch('https://jg-proxy-v2.vercel.app/api/albi', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'get_contacts',locationId:ST.market==='Appleton'?222:1477})
    });
    if(!r.ok) throw new Error('Albi fetch failed');
    var data = await r.json();
    var contacts = data.contacts||data.data||[];
    var imported = 0;
    for(var c of contacts.slice(0,50)) {
      var existing = ST.partners.find(function(p){return p.albi_contact_id===String(c.id);});
      if(!existing) {
        await sb('/rest/v1/sales_partners', {method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({
          name:(c.firstName||'')+' '+(c.lastName||''),
          company:c.companyName||'',
          phone:c.phoneNumber||c.phone||'',
          email:c.email||'',
          market:ST.market,
          albi_contact_id:String(c.id),
          status:'Prospect',
          type:'Other'
        })});
        imported++;
      }
    }
    alert('Imported '+imported+' new contacts from Albi');
    await loadAll();
  } catch(e) { alert('Albi import failed: '+e.message); }
}

function partnerInitials(name) {
  var parts=(name||'').split(' ');
  return ((parts[0]||'')[0]||'')+(parts.length>1?(parts[parts.length-1]||'')[0]||'':'');
}

function tierColor(tier) {
  return tier==='A'?'#2e7d32':tier==='B'?'#1565c0':'#6b7a96';
}

function typeColor(type) {
  var m={'Plumber':'#1565c0','Realtor':'#6a1b9a','Insurance Agent':'#c0392b','Property Manager':'#e65100','GC':'#4a148c','General Contractor':'#4a148c'};
  return m[type]||'#6b7a96';
}

function touchIcon(type) {
  var m={'Call':'📞','Visit':'🚗','Email':'📧','Text':'💬','Drop-in':'🚪','Event':'🎉'};
  return m[type]||'📋';
}

function outcomeColor(o) {
  return o==='Positive'?'var(--ok)':o==='Not Interested'?'var(--danger)':'var(--muted)';
}

function daysUntil(dateStr) {
  var d=new Date(dateStr+'T00:00:00'), t=new Date(); t.setHours(0,0,0,0);
  return Math.round((d-t)/(1000*60*60*24));
}

function fmtDate(d) {
  if(!d) return '';
  return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function filteredPartners() {
  return ST.partners.filter(function(p) {
    if(ST.filterType!=='All' && p.type!==ST.filterType) return false;
    if(ST.filterTier!=='All' && p.tier!==ST.filterTier) return false;
    if(ST.searchQ) {
      var q=ST.searchQ.toLowerCase();
      if(!(p.name||'').toLowerCase().includes(q) && !(p.company||'').toLowerCase().includes(q) && !(p.city||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function render() {
  var a=document.getElementById('app'); if(!a)return;
  var h='';

  // Header
  h+='<div class="sales-hdr">';
  h+='<div style="display:flex;align-items:center;gap:10px;">';
  h+='<div style="width:26px;height:26px;background:var(--orange);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">📈</div>';
  h+='<span style="font-size:13px;font-weight:600;color:#fff;letter-spacing:-.3px;">JG Restoration <span style="color:var(--gold);">Sales</span></span>';
  h+="<span style=\"font-size:10px;padding:2px 8px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);border-radius:20px;border:1px solid rgba(255,255,255,.18);\">'+ST.market+'</span>";
  h+='</div>';
  h+='<div style="display:flex;gap:6px;">';
  h+='<button class="btn btn-ghost" style="font-size:11px;" onclick="importAlbi()">↓ Import Albi</button>';
  h+='<button class="btn btn-gold" style="font-size:11px;" onclick="ST.selTab=ST.selTab;addPartner()">+ Partner</button>';
  h+='</div></div>';

  // Market toggle + tabs
  h+='<div style="background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px 0;display:flex;align-items:center;justify-content:space-between;">';
  h+=mkMarketToggle();
  h+='<div class="sales-tabs" style="border:none;padding:0;">';
  ['partners','touches','routes','followups','import'].forEach(function(t) {
    var labels={'partners':'👥 Partners','touches':'📋 Touches','routes':'🚗 Routes','followups':'🔔 Follow-ups','import':'📥 Import'};
    var cnt=''; 
    if(t==='followups') cnt=' <span style="background:var(--danger);color:#fff;font-size:9px;padding:1px 5px;border-radius:8px;margin-left:4px;">'+ST.followups.filter(function(f){return !f.completed&&daysUntil(f.due_date)<=0;}).length+'</span>';
    h+=mkTab(t, labels[t]+cnt);
  });
  h+='</div></div>';

  h+='<div class="sales-body">';

  if(ST.loading) {
    h+='<div style="text-align:center;padding:40px;color:var(--muted);">Loading...</div>';
    h+='</div>'; a.innerHTML=h; return;
  }

  // ── PARTNERS TAB ──────────────────────────────────────────────────────────
  if(ST.tab==='partners') {
    var fp=filteredPartners();
    
    // Stats
    var tierA=ST.partners.filter(function(p){return p.tier==='A';}).length;
    var tierB=ST.partners.filter(function(p){return p.tier==='B';}).length;
    var tierC=ST.partners.filter(function(p){return p.tier==='C';}).length;
    h+='<div class="sales-stat-row">';
    h+='<div class="sales-stat"><div class="sales-stat-val">'+ST.partners.length+'</div><div class="sales-stat-lbl">Total Partners</div></div>';
    h+='<div class="sales-stat"><div class="sales-stat-val" style="color:#2e7d32;">'+tierA+'</div><div class="sales-stat-lbl">A-Tier (Top)</div></div>';
    h+='<div class="sales-stat"><div class="sales-stat-val" style="color:#1565c0;">'+tierB+'</div><div class="sales-stat-lbl">B-Tier (Active)</div></div>';
    h+='<div class="sales-stat"><div class="sales-stat-val" style="color:var(--muted);">'+tierC+'</div><div class="sales-stat-lbl">C-Tier (Cold)</div></div>';
    h+='<div class="sales-stat"><div class="sales-stat-val" style="color:var(--orange);">'+ST.partners.reduce(function(s,p){return s+(p.referral_count||0);},0)+'</div><div class="sales-stat-lbl">Total Referrals</div></div>';
    h+='</div>';

    // Filters
    h+='<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">';
    h+="<input style=\"padding:7px 12px;border-radius:6px;border:1.5px solid var(--border);font-size:12px;font-family:DM Sans,sans-serif;outline:none;width:200px;\" placeholder=\"Search partners...\" value=\"'+ST.searchQ+'\" oninput=\"ST.searchQ=this.value;render()\">";
    h+=mkTypeFilters();
    h+=mkTierFilters();
    h+="<button class=\"btn btn-gold\" style=\"margin-left:auto;\" onclick=\"openModal(\'add-partner\')\">+ Add Partner</button>";
    h+='</div>';

    if(!fp.length) h+='<div style="text-align:center;padding:40px;color:var(--muted);">No partners found. Add your first partner or import from Albi.</div>';
    
    fp.forEach(function(p) {
      var lastTouch=p.last_touch_date?fmtDate(p.last_touch_date):'Never';
      var daysSince=p.last_touch_date?Math.round((new Date()-new Date(p.last_touch_date+'T00:00:00'))/(1000*60*60*24)):999;
      var stale=daysSince>30;
      h+="<div class=\"partner-card\" onclick=\"ST.selected=''+p.id+'';ST.modal='partner-detail';render()\">";
      h+="<div class=\"partner-avatar\" style=\"background:'+tierColor(p.tier||'C')+';\">'+partnerInitials(p.name)+'</div>";
      h+='<div style="flex:1;min-width:0;">';
      h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">';
      h+="<span style=\"font-size:13px;font-weight:700;color:var(--navy);\">'+p.name+'</span>";
      h+="<span class=\"type-badge\" style=\"background:'+typeColor(p.type)+';color:#fff;\">'+( p.type||'—')+'</span>";
      h+="<span style=\"font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:'+(p.tier==='A'?'rgba(46,125,50,.1)':p.tier==='B'?'rgba(21,101,192,.1)':'rgba(107,122,150,.1)')+';color:'+tierColor(p.tier||'C')+';\">'+( p.tier||'C')+'-Tier</span>";
      if(stale&&p.status==='Active') h+="<span style=\"font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:rgba(192,32,32,.1);color:var(--danger);\">⚠ Stale</span>";
      h+='</div>';
      h+="<div style=\"font-size:11px;color:var(--muted);\">'+(p.company||'')+( p.city?' · '+p.city:'')+'</div>";
      h+='</div>';
      h+='<div style="text-align:right;flex-shrink:0;">';
      h+="<div style=\"font-size:11px;font-weight:600;color:'+(stale?'var(--danger)':'var(--muted)')+';\">'+lastTouch+'</div>";
      h+="<div style=\"font-size:10px;color:var(--muted);\">'+(p.touch_count||0)+' touches · '+(p.referral_count||0)+' refs</div>";
      h+='</div>';
      h+="<button style=\"padding:5px 12px;border-radius:6px;border:none;background:var(--orange);color:#fff;font-size:11px;font-weight:600;cursor:pointer;\" onclick=\"event.stopPropagation();ST.modal='log-touch';ST.selected=''+p.id+'';render()\">Log Touch</button>";
      h+='</div>';
    });
  }

  // ── TOUCHES TAB ───────────────────────────────────────────────────────────
  if(ST.tab==='touches') {
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">';
    h+="<div style=\"font-size:13px;font-weight:700;color:var(--navy);\">'+ST.touches.length+' touches recorded</div>";
    h+="<button class=\"btn btn-gold\" onclick=\"ST.modal='log-touch';ST.selected=null;render()\">+ Log Touch</button>";
    h+='</div>';

    // Stats
    var todayTouches=ST.touches.filter(function(t){return t.touch_date===ST.today;}).length;
    var weekAgo=new Date(); weekAgo.setDate(weekAgo.getDate()-7);
    var weekTouches=ST.touches.filter(function(t){return new Date(t.touch_date)>=weekAgo;}).length;
    var positiveTouches=ST.touches.filter(function(t){return t.outcome==='Positive';}).length;
    h+='<div class="sales-stat-row" style="margin-bottom:16px;">';
    h+='<div class=\"sales-stat\"><div class=\"sales-stat-val\">'+todayTouches+'</div><div class=\"sales-stat-lbl\">Today</div></div>';
    h+='<div class=\"sales-stat\"><div class=\"sales-stat-val\">'+weekTouches+'</div><div class=\"sales-stat-lbl\">This Week</div></div>';
    h+='<div class=\"sales-stat\"><div class=\"sales-stat-val\" style=\"color:var(--ok);\">'+positiveTouches+'</div><div class=\"sales-stat-lbl\">Positive</div></div>';
    h+='<div class=\"sales-stat\"><div class=\"sales-stat-val\">'+ST.touches.length+'</div><div class=\"sales-stat-lbl\">Total Logged</div></div>';
    h+='</div>';

    ST.touches.slice(0,50).forEach(function(t) {
      h+='<div class="touch-row">';
      h+="<div class=\"touch-icon\" style=\"background:rgba(13,45,94,.08);\">'+touchIcon(t.touch_type)+'</div>";
      h+='<div style="flex:1;min-width:0;">';
      h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;">';
      h+="<span style=\"font-size:13px;font-weight:700;color:var(--navy);\">'+(t.partner_name||'Unknown')+'</span>";
      h+="<span style=\"font-size:10px;padding:1px 7px;border-radius:4px;background:rgba(13,45,94,.08);color:var(--navy);font-weight:600;\">'+(t.touch_type||'')+'</span>";
      h+="<span style=\"font-size:10px;font-weight:600;color:'+outcomeColor(t.outcome)+';\">'+(t.outcome||'')+'</span>";
      h+='</div>';
      h+="<div style=\"font-size:11px;color:var(--muted);\">'+(t.notes||'—')+'</div>";
      h+='</div>';
      h+='<div style="text-align:right;flex-shrink:0;">';
      h+="<div style=\"font-size:12px;font-weight:600;color:var(--navy);\">'+fmtDate(t.touch_date)+'</div>";
      h+="<div style=\"font-size:10px;color:var(--muted);\">'+(t.logged_by||'')+'</div>";
      h+='</div></div>';
    });
  }

  // ── ROUTES TAB ────────────────────────────────────────────────────────────
  if(ST.tab==='routes') {
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">';
    h+="<div style=\"font-size:13px;font-weight:700;color:var(--navy);\">Sales Routes — '+ST.market+'</div>";
    h+="<button class=\"btn btn-gold\" onclick=\"ST.modal='add-route';render()\">+ Plan Route</button>";

        ['A','B','C'].forEach(function(t){h+='<option '+(p.tier===t?'selected':'')+' value="'+t+'">'+t+'-Tier</option>';});
        h+='</select></div></div>';
        h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">';
        if(p.phone) h+="<a href=\"tel:'+p.phone+'\" style=\"padding:8px 12px;border-radius:6px;background:rgba(13,45,94,.06);font-size:12px;font-weight:600;color:var(--navy);text-decoration:none;\">📞 '+p.phone+'</a>";

        h+='</div>';
        h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">';

        h+="<div style=\"background:rgba(46,125,50,.06);border-radius:6px;padding:8px;text-align:center;\"><div style=\"font-size:16px;font-weight:700;color:var(--ok);\">$'+(p.referral_revenue?Math.round(p.referral_revenue).toLocaleString():0)+'</div><div style=\"font-size:9px;color:var(--muted);text-transform:uppercase;\">Rev Generated</div></div>";
        h+='</div>';
        if(p.notes) h+="<div style=\"background:rgba(245,166,35,.06);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:var(--text);\">'+p.notes+'</div>";
        h+='<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px;">Recent Touches</div>';
        if(!ptouches.length) h+='<div style="font-size:12px;color:var(--muted);margin-bottom:12px;">No touches logged yet.</div>';
        ptouches.slice(0,5).forEach(function(t){
          h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);">';
          h+="<span>'+touchIcon(t.touch_type)+'</span>";
          h+="<span style=\"font-size:12px;flex:1;\">'+(t.notes||t.touch_type||'')+'</span>";
          h+="<span style=\"font-size:10px;color:var(--muted);\">'+fmtDate(t.touch_date)+'</span>";
          h+='</div>';
        });
        h+='<div style="display:flex;gap:8px;margin-top:16px;">';
        h+="<button style=\"padding:8px 16px;border-radius:6px;border:none;background:var(--orange);color:#fff;font-size:12px;font-weight:600;cursor:pointer;flex:1;\" onclick=\"ST.modal='log-touch';render()\">📋 Log Touch</button>";
        h+='<button style="padding:8px 16px;border-radius:6px;border:1.5px solid var(--border);background:transparent;font-size:12px;cursor:pointer;" onclick="ST.modal=null;ST.selected=null;render()">Close</button>';
        h+='</div>';
      }
    }

    h+='</div></div>'; // end modal
  }

  a.innerHTML=h;
}


// ── SPREADSHEET IMPORT ────────────────────────────────────────────────────────
// Add to state
ST.importPreview = null;
ST.importResult = null;

async function handleImportFile(file) {
  if(!file) return;
  var status = document.getElementById('imp-status');
  if(status) status.innerHTML = '<div style="padding:10px;color:var(--muted);font-size:12px;">Reading file...</div>';

  try {
    var rows = [];
    if(file.name.endsWith('.csv')) {
      rows = await parseCSV(file);
    } else {
      rows = await parseXLSX(file);
    }

    // Build dedup keys from existing partners
    var existingKeys = new Set();
    ST.partners.forEach(function(p) {
      if(p.name) existingKeys.add((p.name||'').toLowerCase().trim());
      if(p.phone) existingKeys.add((p.phone||'').replace(/\D/g,''));
      if(p.email) existingKeys.add((p.email||'').toLowerCase().trim());
    });

    // Map rows to preview
    ST.importPreview = rows.filter(function(r){ return r.name && r.name.trim(); }).map(function(r) {
      var nameKey = (r.name||'').toLowerCase().trim();
      var phoneKey = (r.phone||'').replace(/\D/g,'');
      var emailKey = (r.email||'').toLowerCase().trim();
      var exists = existingKeys.has(nameKey) ||
                   (phoneKey.length > 6 && existingKeys.has(phoneKey)) ||
                   (emailKey && existingKeys.has(emailKey));
      return Object.assign({}, r, {exists: exists});
    });

    ST.importResult = null;
    render();
    if(status) status.innerHTML = '';
  } catch(e) {
    if(status) status.innerHTML = '<div style="padding:10px;color:var(--danger);font-size:12px;">Error reading file: ' + e.message + '</div>';
  }
}

async function parseCSV(file) {
  var text = await file.text();
  var lines = text.split('\n');
  var headers = lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'').toLowerCase();});
  var rows = [];
  for(var i=1;i<lines.length;i++) {
    if(!lines[i].trim()) continue;
    var cells = lines[i].split(',').map(function(c){return c.trim().replace(/^"|"$/g,'');});
    var obj = {};
    headers.forEach(function(h,j){obj[h]=cells[j]||'';});
    rows.push(mapRow(obj));
  }
  return rows;
}

async function parseXLSX(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = new Uint8Array(e.target.result);
        var wb = XLSX.read(data, {type:'array',cellDates:true});
        var ws = wb.Sheets[wb.SheetNames[0]];
        var json = XLSX.utils.sheet_to_json(ws, {raw:false});
        resolve(json.map(mapRow));
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function mapRow(obj) {
  // Map column names from Albi export format
  // Headers: Name, Type, Mobile Number, Email, Job Title, Address, Address 1, City, State, Zip Code, Organization, Status, Referral Source, Salesperson
  function g(keys) {
    for(var i=0;i<keys.length;i++) {
      var v = obj[keys[i]] || obj[keys[i].toLowerCase()] || obj[keys[i].toUpperCase()];
      if(v && String(v).trim()) return String(v).trim();
    }
    return '';
  }
  return {
    name:         g(['Name','name','Full Name','full name']),
    type:         g(['Type','type','Contact Type']),
    phone:        g(['Mobile Number','Phone','mobile number','phone','Mobile','Cell']),
    email:        g(['Email','email','Email Address']),
    job_title:    g(['Job Title','job title','Title']),
    address:      g(['Address 1','Address','address']),
    city:         g(['City','city']),
    state:        g(['State','state']),
    zip:          g(['Zip Code','zip code','Zip','zip']),
    organization: g(['Organization','organization','Company','company']),
    status:       g(['Status','status']),
    referral_src: g(['Referral Source','referral source']),
    salesperson:  g(['Salesperson','salesperson'])
  };
}

async function runImport() {
  var newContacts = (ST.importPreview||[]).filter(function(r){return !r.exists;});
  if(!newContacts.length) return;

  var impType = document.getElementById('imp-type');
  var impTier = document.getElementById('imp-tier');
  var defType = impType ? impType.value : 'Customer';
  var defTier = impTier ? impTier.value : 'C';

  var btn = document.querySelector('[onclick="runImport()"]');
  if(btn) btn.textContent = 'Importing...';

  var imported = 0;
  var skipped = (ST.importPreview||[]).filter(function(r){return r.exists;}).length;

  // Batch insert in groups of 20
  for(var i=0; i<newContacts.length; i+=20) {
    var batch = newContacts.slice(i, i+20).map(function(r) {
      return {
        name: r.name,
        company: r.organization || '',
        type: (r.type && r.type !== 'Customer') ? r.type : defType,
        phone: r.phone || '',
        email: r.email || '',
        address: r.address || '',
        city: r.city || '',
        market: ST.market,
        tier: defTier,
        status: 'Prospect',
        notes: r.referral_src ? 'Referral source: ' + r.referral_src : ''
      };
    });
    await sb('/rest/v1/sales_partners', {
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(batch)
    });
    imported += batch.length;
  }

  ST.importResult = {imported: imported, skipped: skipped};
  ST.importPreview = null;
  await loadAll();
}

  jgCheckAuth();
  var u=JSON.parse(localStorage.getItem('jg_platform_user')||'null');
  if(u) jgShowUser(u);
  loadAll();
});
