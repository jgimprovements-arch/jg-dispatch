<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JG Restoration — Sales Dashboard</title>
<link rel="icon" type="image/png" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="auth.js?v=20260419-1"></script>
<!-- Shared constants/permissions/market — keep ?v= in sync with sales-shared.js VERSION -->
<script src="sales-shared.js?v=2026-04-20-1"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>

:root{
  /* Brand tokens — synced with rebuild.html for cross-platform visual continuity.
     Matches dispatch / sales / hub / rebuild so JG products feel like one tool. */

  /* Brand colors (identical across platforms) */
  --navy:#0d2d5e;
  --navy-2:#1a3d72;
  --orange:#e85d04;
  --gold:#f5a623;

  /* Surface palette (rebuild values — cleaner, slightly cooler than old warm tones) */
  --bg:#f4f6fb;             /* page background */
  --card:#ffffff;            /* card / modal surface */
  --line:#e2e6ee;            /* dividers / borders */
  --text:#1c2333;            /* primary body text */
  --muted:#6b7385;           /* secondary text */
  --shadow: 0 1px 2px rgba(13,45,94,.06), 0 4px 14px rgba(13,45,94,.05);

  /* Status colors (rebuild values — slightly more saturated) */
  --green:#1f8b4c;
  --red:#c42b2b;
  --amber:#d18b1a;

  /* ── Legacy variable aliases — keep all existing CSS references working. ──
     The sales pages and shared modules use a mix of old names (--brd, --txt,
     --grn, --surface, --mut) and rebuild names. We point old names to new
     values so a visual restyle doesn't require a global find/replace. */
  --s1:var(--card);
  --s2:var(--bg);
  --s3:#edf0f7;
  --brd:var(--line);
  --brdH:rgba(13,45,94,.3);
  --acc:var(--orange);
  --accD:rgba(232,93,4,.08);
  --txt:var(--text);
  --dim:var(--muted);
  --mut:#a0abbf;
  --redD:rgba(196,43,43,.08);
  --danger:var(--red);
  --grn:var(--green);
  --grnD:rgba(31,139,76,.08);
  --wrn:#e65100;
  --wrnD:rgba(230,81,0,.08);
  --blu:#1565c0;
  --bluD:rgba(21,101,192,.08);
  --purp:#6a1b9a;
  --purpD:rgba(106,27,154,.08);
  --surface:var(--card);
  --border:var(--line);
  --ok:var(--green);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;padding:16px 20px;}
.mono{font-family:'DM Mono',monospace}
.container{max-width:1020px;margin:0 auto;padding-left:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
input[type=text],input[type=password]{padding:10px 12px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:13px;font-family:'DM Mono',monospace;outline:none}
input:focus{border-color:var(--acc)!important;box-shadow:0 0 0 2px var(--accD)}
textarea{width:100%;min-height:60px;padding:10px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:12px;font-family:'DM Sans',sans-serif;resize:vertical;line-height:1.5;outline:none;box-sizing:border-box}
textarea:focus{border-color:var(--acc);box-shadow:0 0 0 2px var(--accD)}
input[type=file]{display:none}
.act-btn{border:1px solid var(--brd);background:transparent;color:var(--dim);padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;margin-right:8px}
.act-btn:hover{border-color:var(--brdH);color:var(--txt)}
.act-btn.sc{background:var(--grnD);border-color:var(--grn);color:var(--grn)}
.act-btn.sj{background:var(--wrnD);border-color:var(--wrn);color:var(--wrn)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:'DM Mono',monospace}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--mut);border-radius:3px}

#jg-login{position:fixed;inset:0;background:rgba(13,29,60,.96);align-items:center;justify-content:center;z-index:9999;display:none;}
#jg-login-box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4);}
#jg-login-err{font-size:12px;color:#c0392b;margin-top:12px;min-height:16px;}

/* ── QA DISPATCH STYLING ── */
.qa-hdr{background:var(--navy);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:95;}
.qa-hdr-l{display:flex;align-items:center;gap:10px;}
.qa-logo-mk{width:26px;height:26px;background:var(--orange);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.qa-hdr-title{font-size:13px;font-weight:600;color:#fff;letter-spacing:-.3px;}
.qa-hdr-title span{color:var(--gold);}
.qa-pill{font-size:10px;padding:2px 8px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);border-radius:20px;border:1px solid rgba(255,255,255,.18);}
.qa-hdr-r{display:flex;align-items:center;gap:6px;}
.qa-body{padding:14px 16px;max-width:920px;margin:0 auto;}
.qa-card{background:var(--s1);border:1px solid var(--brd);border-radius:10px;box-shadow:0 1px 3px rgba(13,45,94,.08),0 4px 16px rgba(13,45,94,.06);overflow:hidden;margin-bottom:14px;}
.qa-card-hd{background:var(--navy);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;}
.qa-card-hd-title{font-size:11px;font-weight:600;color:#fff;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
.qa-card-body{padding:16px;}
.qa-upload-zone{border:2px dashed var(--brd);border-radius:8px;padding:26px 16px;text-align:center;cursor:pointer;transition:all .15s;background:transparent;}
.qa-upload-zone:hover{border-color:var(--orange);background:rgba(232,93,4,.04);}
.qa-upload-zone.loaded{border-style:solid;border-color:var(--grn);background:rgba(46,125,50,.04);text-align:left;padding:12px 16px;}
.qa-btn{padding:8px 18px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.qa-btn-primary{background:var(--orange);color:#fff;}
.qa-btn-primary:hover{background:#c94a00;}
.qa-btn-primary:disabled{opacity:.45;cursor:default;}
.qa-btn-ghost{background:transparent;border:1px solid var(--brd);color:var(--dim);}
.qa-btn-ghost:hover{border-color:var(--navy);color:var(--navy);}
.qa-btn-green{background:var(--grn);color:#fff;}
.qa-btn-navy{background:var(--navy);color:#fff;}
.qa-step-bar{display:flex;gap:6px;margin-bottom:16px;}
.qa-step{flex:1;padding:8px 10px;border-radius:6px;border:1px solid var(--brd);text-align:center;background:var(--s2);}
.qa-step.active{background:var(--s1);border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.12);}
.qa-step.done{background:rgba(46,125,50,.06);border-color:var(--grn);}
.qa-step-lbl{font-size:11px;font-weight:600;color:var(--dim);font-family:'DM Mono',monospace;}
.qa-step.active .qa-step-lbl{color:var(--orange);}
.qa-step.done .qa-step-lbl{color:var(--grn);}
.qa-gap-row{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:14px;margin-bottom:8px;border-left:4px solid var(--brd);}
.qa-gap-row.HIGH{border-left-color:var(--red);}
.qa-gap-row.MEDIUM{border-left-color:var(--wrn);}
.qa-gap-row.LOW{border-left-color:var(--blu);}
.qa-gap-row.MANDATORY{border-left-color:var(--purp);}
.sev-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.04em;}
.sev-HIGH{background:var(--redD);color:var(--red);}
.sev-MEDIUM{background:var(--wrnD);color:var(--wrn);}
.sev-LOW{background:var(--bluD);color:var(--blu);}
.sev-MANDATORY{background:var(--purpD);color:var(--purp);}
.qa-filter-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.qa-filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--brd);background:var(--s1);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;color:var(--dim);transition:all .15s;}
.qa-filter-btn.on{background:var(--navy);border-color:var(--navy);color:#fff;}
.qa-stat-row{display:flex;gap:0;border:1px solid var(--brd);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.qa-stat-box{flex:1;padding:10px 14px;border-right:1px solid var(--brd);background:var(--s1);}
.qa-stat-box:last-child{border-right:none;}
.qa-stat-val{font-size:22px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;}
.qa-stat-val.red{color:var(--red);}
.qa-stat-val.grn{color:var(--grn);}
.qa-stat-lbl{font-size:9px;font-weight:500;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
.qa-progress-bar{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.qa-spin{width:16px;height:16px;border:2px solid var(--brd);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.qa-evidence-box{background:rgba(21,101,192,.04);border:1px solid rgba(21,101,192,.14);border-radius:6px;padding:9px 12px;margin-top:8px;}
.qa-defense-box{background:rgba(46,125,50,.04);border:1px solid rgba(46,125,50,.14);border-radius:6px;padding:9px 12px;margin-top:8px;}
.qa-dispute-box{background:rgba(176,106,0,.04);border:1px solid rgba(176,106,0,.14);border-radius:6px;padding:9px 12px;margin-top:8px;}
.qa-textarea{width:100%;padding:10px 12px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:12px;font-family:'DM Sans',sans-serif;resize:vertical;line-height:1.6;outline:none;box-sizing:border-box;}
.qa-textarea:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.1);}
.qa-input{width:100%;padding:9px 12px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box;}
.qa-input:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.1);}
.qa-label{display:block;font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;font-family:'DM Mono',monospace;}
.no-op-badge{font-size:9px;padding:2px 8px;background:rgba(106,27,154,.1);border:1px solid rgba(106,27,154,.25);color:var(--purp);border-radius:20px;font-weight:700;font-family:'DM Mono',monospace;}
.qa-defend-btn{padding:5px 12px;border-radius:5px;border:1px solid var(--grn);background:rgba(46,125,50,.06);color:var(--grn);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.qa-defend-btn.on{background:var(--grn);color:#fff;}
.qa-concede-btn{padding:5px 12px;border-radius:5px;border:1px solid var(--wrn);background:rgba(176,106,0,.06);color:var(--wrn);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.qa-concede-btn.on{background:var(--wrn);color:#fff;}
input[type=file]{display:none}

.sales-tabs{background:linear-gradient(180deg, #fff 0%, #f8f9fc 100%);border-bottom:1px solid var(--line);padding:0 16px;display:flex;gap:2px;box-shadow:0 1px 2px rgba(13,45,94,.04);}
.sales-tab{padding:9px 16px;font-size:12px;font-weight:500;border:none;background:transparent;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:'DM Sans',sans-serif;}
.sales-tab.active{color:var(--navy);border-bottom-color:var(--orange);font-weight:600;}
.sales-hdr{background:linear-gradient(135deg, #0d2d5e 0%, #1a4080 50%, #0d2d5e 100%);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:95;box-shadow:0 6px 20px rgba(13,45,94,.18);}
.sales-body{padding:16px;max-width:1200px;margin:0 auto;}
.partner-card{
  background:linear-gradient(135deg, #ffffff 0%, #fafbfd 100%);
  border:1px solid var(--line);
  border-radius:10px;
  padding:14px 16px;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:0 1px 2px rgba(13,45,94,.06), 0 4px 14px rgba(13,45,94,.05);
  transition:all .15s;
  cursor:pointer;
}
.partner-card:hover{
  border-color:var(--orange);
  box-shadow:0 4px 14px rgba(232,93,4,.12);
  transform:translateY(-1px);
}
.partner-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;color:#fff;}
.tier-A{background:#2e7d32;} .tier-B{background:#1565c0;} .tier-C{background:#6b7a96;}
.type-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;font-family:'DM Mono',monospace;}
.touch-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:6px;display:flex;align-items:flex-start;gap:12px;}
.touch-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.followup-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:6px;border-left:4px solid var(--border);display:flex;align-items:center;gap:12px;}
.followup-card.high{border-left-color:var(--danger);}
.followup-card.normal{border-left-color:var(--orange);}
.followup-card.low{border-left-color:var(--muted);}
.followup-card.overdue{background:var(--danger-bg);}
.route-stop{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.route-stop.done{opacity:.6;text-decoration:line-through;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;}
.modal-box{
  background:#fff;
  border-radius:14px;
  padding:24px;
  width:100%;
  max-width:520px;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 12px 40px rgba(13,45,94,.3);
  position:relative;
}
.modal-box:before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg, var(--orange), var(--gold));
  border-radius:14px 14px 0 0;
}
.modal-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:16px;font-family:'DM Mono',monospace;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;font-family:'DM Mono',monospace;}
.form-input{width:100%;padding:9px 12px;border-radius:6px;border:1.5px solid var(--border);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;box-sizing:border-box;}
.form-input:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.1);}
.form-select{width:100%;padding:9px 12px;border-radius:6px;border:1.5px solid var(--border);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;box-sizing:border-box;background:#fff;}
.market-toggle{display:flex;gap:6px;margin-bottom:16px;}
.mkt-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--muted);}
.mkt-btn.active{background:var(--navy);border-color:var(--navy);color:#fff;}
.sales-stat-row{display:flex;gap:8px;margin-bottom:16px;}
.sales-stat{
  flex:1;
  padding:14px 16px 12px;
  background:linear-gradient(135deg, #fff8f0 0%, var(--card) 100%);
  border:1px solid var(--line);
  border-radius:10px;
  position:relative;
  overflow:hidden;
  box-shadow:0 1px 2px rgba(13,45,94,.06), 0 4px 14px rgba(13,45,94,.05);
  transition:transform .15s, box-shadow .15s;
}
.sales-stat:before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg, var(--orange), var(--gold));
}
.sales-stat:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(13,45,94,.1);}
.sales-stat-val{font-size:22px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;}
.sales-stat-lbl{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}

/* Buttons — synced with rebuild.html visual language.
   .btn          = neutral default (white, line border, dark text)
   .btn-primary  = navy filled (high-emphasis primary action)
   .btn-gold     = orange gradient pill (the rebuild .btn-cal-open style — main CTA)
   .btn-warn     = solid orange (warning/destructive primary)
   .btn-ghost    = semi-transparent (legacy, used in headers on dark backgrounds) */
.btn{
  padding:7px 14px;
  border-radius:6px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  border:1px solid var(--line);
  background:#fff;
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  transition:all .15s;
}
.btn:hover{background:var(--bg);}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn-primary:hover{background:var(--navy-2);}
.btn-gold{
  background:linear-gradient(135deg, var(--orange) 0%, #d05303 100%);
  color:#fff;
  border:0;
  padding:8px 18px;
  border-radius:18px;
  font-size:12px;
  font-weight:700;
  letter-spacing:.2px;
  box-shadow:0 2px 8px rgba(232,93,4,.25);
}
.btn-gold:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 14px rgba(232,93,4,.4);
  color:#fff;
}
.btn-warn{background:var(--orange);color:#fff;border-color:var(--orange);}
.btn-warn:hover{background:#c44e02;}
.btn-ghost{background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.2);}
.btn-ghost:hover{background:rgba(255,255,255,.18);}
</style>
</head>
<body>
<div id="jg-login" style="display:none;position:fixed;inset:0;background:rgba(13,29,60,.96);align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4);">
    <img src="https://jgimprovements-arch.github.io/jg-dispatch/logo.png" style="height:72px;width:auto;margin-bottom:14px;">
    <div style="font-size:19px;font-weight:700;color:#0d2d5e;margin-bottom:4px;">JG Restoration</div>
    <div style="font-size:13px;color:#6b82a0;margin-bottom:24px;">Sign in with your @jg-restoration.com account</div>
    <div id="g_id_onload" data-client_id="209231675110-6id8vr3ehcocg4df7tvpc89jsmrvhogk.apps.googleusercontent.com" data-ux_mode="popup" data-callback="jgGoogleCb" data-auto_prompt="false"></div>
    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left" data-width="288"></div>
    <div id="jg-login-err" style="font-size:12px;color:#c0392b;margin-top:12px;min-height:16px;"></div>
  </div>
</div>

<div id="app"><div style="padding:40px;text-align:center;color:#6b7a96;">Loading...</div></div>
<div id="modal-layer"></div>
<script>
function mkMarketToggle() {
  var a = ST.market==="Appleton", s = ST.market==="Stevens Point";
  return "<div class=\"market-toggle\">"
    + "<button class=\"mkt-btn" + (a?" active":"") + "\" onclick=\"setMarket('Appleton')\">Appleton</button>"
    + "<button class=\"mkt-btn" + (s?" active":"") + "\" onclick=\"setMarket('Stevens Point')\">Stevens Point</button>"
    + "</div>";
}
function setMarket(m){ST.market=m;loadAll();}

// ── PARTNER TYPES — single source of truth across all dropdowns/filters ──
// Alphabetical. Keep in sync with sales_app.html.
// Sourced from JG_SHARED so mobile and desktop stay in sync.
// Inline array kept as fallback in case sales-shared.js fails to load.

// HTML-attribute-safe escape. Used throughout rendering to prevent broken
// markup from special characters in partner names, notes, etc. Previously
// defined only inside the add-partner modal scope; hoisted here so every
// render function can use it.
// Returns today's date in the user's LOCAL timezone as YYYY-MM-DD.
// Critical: do NOT use new Date().toISOString().split('T')[0] for this —
// that returns UTC date, which is "tomorrow" by Wisconsin time after
// 7 PM CDT (6 PM CST). Resulted in touches logged late in the day not
// showing up under "Today" filters because the comparison was against
// the UTC date, not the local one.
function _localDateStr(d) {
  d = d || new Date();
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}

function _ve(v) {
  if (v == null) return '';
  return String(v)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Single source of truth for building the rep-assignment dropdown options.
// Used by add-followup, add-route, and log-touch modals. Pulls from
// JG_SHARED.REPS (canonical list) with a hard-coded fallback. Returns an
// HTML string of <option> tags with currentVal pre-selected.
function _repOptions(currentVal, placeholder) {
  var repsMap = (window.JG_SHARED && window.JG_SHARED.REPS) || REPS || {};
  var seen = {};
  var reps = [];
  Object.keys(repsMap).forEach(function(em){
    var n = repsMap[em];
    if (n && !seen[n]) { seen[n] = 1; reps.push(n); }
  });
  reps.sort();
  if (!reps.length) reps = ['Brent','David','Josh','Kristina','Rylan']; // last-resort fallback
  var html = '<option value=""' + (!currentVal ? ' selected' : '') + '>' + (placeholder || '— Select rep —') + '</option>';
  reps.forEach(function(r){
    html += '<option value="' + _ve(r) + '"' + (currentVal === r ? ' selected' : '') + '>' + _ve(r) + '</option>';
  });
  return html;
}

// Selection mode toggles checkboxes on partner rows. Small-team tool, no
// permission gating — anyone who can see the Partners tab can delete.
// Batched DELETE requests keep Supabase rate limits happy on bigger deletes.

function _selCount() {
  var n = 0;
  if (ST.selectedIds) for (var k in ST.selectedIds) if (ST.selectedIds[k]) n++;
  return n;
}

function enterSelectionMode() {
  ST.selectionMode = true;
  ST.selectedIds = {};
  ST._lastSelectIdx = -1;
  render();
}

function exitSelectionMode() {
  ST.selectionMode = false;
  ST.selectedIds = {};
  ST._lastSelectIdx = -1;
  render();
}

function clearSelection() {
  ST.selectedIds = {};
  ST._lastSelectIdx = -1;
  renderPartnerList();
  _updateBulkBar();
}

// Toggle a single row's selected state. Supports Shift+click to select
// a range from the last-interacted row to this one (Gmail-style).
function toggleRowSelection(pid, idx, evt) {
  if (!ST.selectionMode) return;
  var isShift = evt && (evt.shiftKey || evt.metaKey);
  if (isShift && ST._lastSelectIdx >= 0 && ST._lastSelectIdx !== idx) {
    // Range-select: everything between last and current, inclusive
    var fp = filteredPartners();
    var lo = Math.min(ST._lastSelectIdx, idx);
    var hi = Math.max(ST._lastSelectIdx, idx);
    var mark = !ST.selectedIds[pid];
    for (var i = lo; i <= hi; i++) {
      if (fp[i]) ST.selectedIds[fp[i].id] = mark;
      if (!mark) delete ST.selectedIds[fp[i].id];
    }
  } else {
    if (ST.selectedIds[pid]) delete ST.selectedIds[pid];
    else ST.selectedIds[pid] = true;
  }
  ST._lastSelectIdx = idx;
  renderPartnerList();
  _updateBulkBar();
}

function selectAllVisible() {
  var fp = filteredPartners();
  fp.forEach(function(p) { ST.selectedIds[p.id] = true; });
  renderPartnerList();
  _updateBulkBar();
}

// Update the bulk action bar count + delete button without a full re-render.
// Called from the selection helpers after each change.
function _updateBulkBar() {
  var n = _selCount();
  var cnt = document.getElementById('bulk-count');
  var btn = document.getElementById('bulk-delete-btn');
  if (cnt) cnt.textContent = n + ' selected';
  if (btn) {
    btn.textContent = '🗑 Delete ' + n;
    btn.style.background = n ? 'var(--red)' : 'rgba(192,32,32,.3)';
    btn.style.cursor = n ? 'pointer' : 'not-allowed';
  }
}

// Delete a single partner. Counts attached touches/follow-ups, surfaces
// them in the confirm dialog so the user knows what they're losing, then
// deletes attachments before deleting the partner itself (matches the
// merge function's pattern — Supabase foreign keys aren't CASCADE so the
// attachments must be removed first or the DELETE will fail).
async function deletePartner(partnerId) {
  if (!partnerId) return;
  var p = ST.partners.find(function(x){ return x.id === partnerId; });
  if (!p) { alert('Partner not found.'); return; }

  // Count what's attached so the warning can be specific.
  var touchCount = ST.touches.filter(function(t){ return t.partner_id === partnerId; }).length;
  var fuCount    = ST.followups.filter(function(f){ return f.partner_id === partnerId; }).length;

  // Build the confirm message. Empty partner = soft warning. Partner with
  // history = much louder warning + suggest merge as the alternative.
  var msg;
  if (touchCount === 0 && fuCount === 0) {
    msg = 'Delete ' + p.name + '?\n\nThis partner has no touches or follow-ups attached.\n\nThis cannot be undone.';
  } else {
    var bits = [];
    if (touchCount) bits.push(touchCount + ' touch' + (touchCount===1?'':'es'));
    if (fuCount)    bits.push(fuCount + ' follow-up' + (fuCount===1?'':'s'));
    msg = '⚠ Delete ' + p.name + '?\n\n' +
          'This will also DELETE the partner\'s ' + bits.join(' and ') + '.\n\n' +
          'If you are trying to clean up duplicates, use Merge instead — that preserves the touches and re-points them to the surviving partner.\n\n' +
          'This cannot be undone. Continue?';
  }
  if (!confirm(msg)) return;

  try {
    // 1. Delete attached touches (must happen before partner DELETE due to FK)
    if (touchCount > 0) {
      await sb('/rest/v1/sales_touches?partner_id=eq.' + partnerId, { method:'DELETE' });
    }
    // 2. Delete attached follow-ups
    if (fuCount > 0) {
      await sb('/rest/v1/sales_followups?partner_id=eq.' + partnerId, { method:'DELETE' });
    }
    // 3. Delete the partner record itself
    var resp = await fetch(SB_URL + '/rest/v1/sales_partners?id=eq.' + partnerId, {
      method: 'DELETE',
      headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY}
    });
    if (!resp.ok) {
      var errTxt = await resp.text();
      alert('Delete failed: ' + errTxt.slice(0, 200) + '\n\nThe partner\'s touches/follow-ups may have been removed but the partner itself was not. Refresh and check.');
      return;
    }

    // Local state cleanup so the UI updates immediately without a full reload.
    ST.partners  = ST.partners.filter(function(x){ return x.id !== partnerId; });
    ST.touches   = ST.touches.filter(function(t){ return t.partner_id !== partnerId; });
    ST.followups = ST.followups.filter(function(f){ return f.partner_id !== partnerId; });

    // Close the modal and re-render
    ST.modal = null;
    ST.selected = null;
    render();
    if (typeof showOk === 'function') showOk('✓ Deleted ' + p.name);
    else console.log('Deleted ' + p.name);
  } catch(e) {
    alert('Delete failed: ' + (e.message||e) + '\n\nThe partner may be in a partial state. Refresh and check.');
    console.error('deletePartner error:', e);
  }
}

async function bulkDeleteSelected() {
  var ids = [];
  for (var k in ST.selectedIds) if (ST.selectedIds[k]) ids.push(k);
  if (!ids.length) return;
  var names = ids.slice(0,5).map(function(id){
    var p = ST.partners.find(function(x){ return x.id === id; });
    return p ? p.name : id;
  });
  var preview = names.join('\n  • ');
  if (ids.length > 5) preview += '\n  • ...and ' + (ids.length - 5) + ' more';
  if (!confirm('Delete ' + ids.length + ' partner' + (ids.length===1?'':'s') + '?\n\n  • ' + preview + '\n\nThis cannot be undone.')) return;

  // Batch deletes 50 at a time. Supabase's PostgREST accepts in.(uuid1,uuid2,...)
  // for batch deletes which is much faster than N individual DELETE requests.
  var BATCH = 50;
  var deleted = 0;
  var failed = 0;
  for (var i = 0; i < ids.length; i += BATCH) {
    var batch = ids.slice(i, i + BATCH);
    var inList = batch.map(function(id){ return '"' + id + '"'; }).join(',');
    try {
      var r = await fetch(SB_URL + '/rest/v1/sales_partners?id=in.(' + inList + ')', {
        method: 'DELETE',
        headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY}
      });
      if (r.ok) deleted += batch.length;
      else failed += batch.length;
    } catch(e) {
      failed += batch.length;
    }
  }

  // Update local state — remove deleted records from the client cache so the
  // UI updates immediately without a full reload.
  if (deleted > 0) {
    var toDelete = {};
    ids.forEach(function(id){ toDelete[id] = true; });
    ST.partners = ST.partners.filter(function(p){ return !toDelete[p.id]; });
  }

  ST.selectionMode = false;
  ST.selectedIds = {};
  ST._lastSelectIdx = -1;

  if (failed > 0) {
    alert('Deleted ' + deleted + ' of ' + ids.length + ' partners. ' + failed + ' failed — check console for details.');
  } else {
    // Use the existing toast mechanism if available, else a subtle alert-free status update
    var msg = deleted + ' partner' + (deleted===1?'':'s') + ' deleted';
    if (typeof showErr === 'function' && typeof showOk === 'function') showOk(msg);
    else console.log(msg);
  }
  render();
}

async function sb(path, opts) {
  try {
    var r = await fetch(SB_URL+path, Object.assign({headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}}, opts||{}));
    if (!r.ok) {
      var errBody = await r.text();
      console.error('Supabase error', r.status, path, errBody);
      showErr('DB error ' + r.status + ': ' + errBody.slice(0,120));
      return [];
    }
    var ct = r.headers.get('content-type')||'';
    return ct.includes('json') ? r.json() : [];
  } catch(e) {
    console.error('Supabase fetch failed:', e);
    showErr('Network error: ' + e.message);
    return [];
  }
}

function showErr(msg) {
  var el = document.getElementById('sb-err');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sb-err';
    // Persistent until clicked so the user can actually read the Supabase
    // error text. Max-width relaxed so full 400-response bodies (column
    // names, constraint violations, etc.) fit on screen.
    el.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#c0392b;color:#fff;padding:12px 22px;border-radius:8px;font-size:12px;font-weight:600;z-index:9999;max-width:900px;text-align:left;box-shadow:0 4px 20px rgba(0,0,0,.3);cursor:pointer;word-break:break-word;line-height:1.4;';
    el.title = 'Click to dismiss';
    el.onclick = function(){ el.style.display = 'none'; };
    document.body.appendChild(el);
  }
  el.textContent = '✕  ' + msg;
  el.style.display = 'block';
  // No auto-dismiss — user clicks to close. Previously 6s auto-hide hid
  // error text before it could be read.
}

async function loadAll() {
  ST.loading = true;
  render();
  var m = ST.market;
  var mq = encodeURIComponent(m);

  // Narrow SELECT for partners only — large table (6,000+ rows), payload matters.
  // Three smaller tables (touches, followups, routes) now fetch all columns.
  // Reason: desktop had explicit column lists that drifted from the Supabase
  // schema (follow_up_needed, priority, etc. were requested but don't exist),
  // causing 400 Bad Request. Mobile has always fetched without select= and
  // never hit this problem. Small tables = small payload = not worth the risk
  // of future drift. Partners stays narrowed because that payload does matter.
  var partnerCols = 'id,name,company,type,phone,email,city,tier,notes,touch_count,referral_count,referral_revenue,last_touch_date,assigned_to,status,market,albi_contact_id,updated_at';

  // Paginated partners fetch — deliberately NOT filtered by market. Both
  // Appleton and Stevens Point reps now see the full partner book. The
  // market toggle at the top still scopes touches/followups/routes (which
  // are genuinely per-market), but partner records are a shared reference
  // book — insurance adjusters, regional GCs, and many Fire Depts work
  // across both markets. Individual partners still carry their `market`
  // column in the data; it just isn't used to narrow the list anymore.
  // Use the Type, Rep, and City/search filters to narrow if needed.
  async function fetchAllPartners(){
    var all = [];
    for (var pg = 0; pg < 10; pg++) {
      var chunk = await sbSafe('/rest/v1/sales_partners?select='+partnerCols+'&order=tier.asc,name.asc&limit=1000&offset='+(pg*1000));
      if (!chunk || !chunk.length) break;
      all = all.concat(chunk);
      if (chunk.length < 1000) break;
    }
    return all;
  }

  // Fire all four in parallel — big perceived speedup since they no longer block each other
  var results = await Promise.allSettled([
    fetchAllPartners(),
    sbSafe('/rest/v1/sales_touches?order=touch_date.desc&limit=400'),
    sbSafe('/rest/v1/sales_followups?market=eq.'+mq+'&completed=eq.false&order=due_date.asc&limit=500'),
    sbSafe('/rest/v1/sales_routes?market=eq.'+mq+'&order=route_date.desc&limit=30'),
    // Pull all albi_referrals — used by the new Referrals tab and the
    // partner detail referral history. Cap at 5000 because we want the
    // FULL referral history for proper revenue totals (filtering by
    // market here would miss cross-market referrals where Bob in Appleton
    // referred a Stevens Point job).
    sbSafe('/rest/v1/albi_referrals?order=project_created_date.desc&limit=5000'),
    // Latest sync log entry for the "last synced X minutes ago" status display
    sbSafe('/rest/v1/albi_referral_sync_log?order=started_at.desc&limit=1'),
    // Referral payouts (money JG paid to partners for their referrals)
    sbSafe('/rest/v1/referral_payouts?order=paid_date.desc&limit=5000'),
    // Sales chases — competitive loss-event tracking. Different from touches
    // (relationship maintenance with partners) — chases are JG showing up at
    // a fire/water/vehicle-impact scene to win the work directly.
    sbSafe('/rest/v1/sales_chases?market=eq.'+mq+'&order=event_date.desc&limit=2000'),
    // Route templates — drive recurring route prediction on the calendar.
    // Mobile manages these via Plan Route → Make Recurring; desktop is
    // read-only on templates today (calendar shows them; doesn't edit them).
    sbSafe('/rest/v1/sales_route_templates?active=eq.true&order=name.asc&limit=100')
  ]);

  ST.partners       = results[0].status === 'fulfilled' ? (results[0].value || []) : [];
  ST.touches        = results[1].status === 'fulfilled' ? (results[1].value || []) : [];
  ST.followups      = results[2].status === 'fulfilled' ? (results[2].value || []) : [];
  ST.routes         = results[3].status === 'fulfilled' ? (results[3].value || []) : [];
  ST.albiReferrals  = results[4].status === 'fulfilled' ? (results[4].value || []) : [];
  ST.lastSyncLog    = (results[5].status === 'fulfilled' && results[5].value && results[5].value.length) ? results[5].value[0] : null;
  ST.referralPayouts = results[6].status === 'fulfilled' ? (results[6].value || []) : [];
  ST.chases         = results[7].status === 'fulfilled' ? (results[7].value || []) : [];
  ST.routeTemplates = results[8].status === 'fulfilled' ? (results[8].value || []) : [];

  // Log any partial failures rather than swallowing them
  results.forEach(function(r, i){
    if (r.status === 'rejected') console.error('loadAll fetch #'+i+' failed:', r.reason);
  });

  ST.loading = false;
  render();
}

async function sbSafe(path) {
  try {
    var r = await fetch(SB_URL + path, {
      headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Prefer': 'count=none'}
    });
    if (!r.ok) { console.error('sbSafe error:', r.status, path); return []; }
    return await r.json();
  } catch(e) {
    console.error('sbSafe:', e.message, path);
    return [];
  }
}

async function logTouch(data) {
  var rep = currentRepName();

  // Build POST body explicitly from a known-good column list. Previously the
  // code was passing the entire `data` object which contained fields that
  // don't exist in the real sales_touches schema (partner_type, follow_up_needed,
  // follow_up_date), causing PGRST204 / 400 Bad Request and silent-failing
  // every touch save. Allowlist > denylist — future drift won't break us.
  var touchBody = {
    partner_id:   data.partner_id,
    partner_name: data.partner_name,
    touch_type:   data.touch_type,
    touch_date:   data.touch_date,
    outcome:      data.outcome,
    notes:        data.notes || '',
    logged_by:    rep,
    market:       ST.market
  };

  // Auto-assign partner if unclaimed (first touch claims it)
  if (data.partner_id) {
    var partner = ST.partners.find(function(p){ return p.id === data.partner_id; });
    if (partner && !partner.assigned_to) {
      await sb('/rest/v1/sales_partners?id=eq.'+data.partner_id, {
        method:'PATCH', body:JSON.stringify({assigned_to: rep, updated_at: new Date().toISOString()})
      });
    }
  }
  await sb('/rest/v1/sales_touches', {method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(touchBody)});
  // Update partner last_touch_date and touch_count
  if(data.partner_id) {
    await sb('/rest/v1/sales_partners?id=eq.'+data.partner_id, {
      method:'PATCH',
      body:JSON.stringify({last_touch_date:data.touch_date, touch_count:((ST.partners.find(function(p){return p.id===data.partner_id;})||{}).touch_count||0)+1, updated_at:new Date().toISOString()})
    });
  }
  // Auto-create follow-up if needed — writes to sales_followups, NOT sales_touches.
  // Same allowlist approach as the touch body. If this POST 400s, the user sees
  // the error but the touch has already been saved, so no data is lost.
  // priority + assigned_to honor the form selections (added 2026-04-22).
  if(data.follow_up_needed && data.follow_up_date) {
    var followupBody = {
      partner_id:   data.partner_id,
      partner_name: data.partner_name,
      partner_type: data.partner_type || '',
      due_date:     data.follow_up_date,
      priority:     data.follow_up_priority || 'Normal',
      reason:       'Follow up from ' + data.touch_type + ' on ' + data.touch_date,
      notes:        data.notes || '',
      market:       ST.market,
      assigned_to:  data.follow_up_assigned || rep
    };
    await sb('/rest/v1/sales_followups', {method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(followupBody)});
  }
  await loadAll();
}

// from either partner. Touches/followups get re-pointed to the keeper,

// Build the candidate list HTML for the merge picker. When the user has not
// typed anything yet, we proactively rank candidates by similarity to the
// keeper — same-phone matches first, then partners whose name shares tokens
// with the keeper's name. When the user IS typing, we just match against
// their query using the same token-based search the rest of the app uses.
function _renderMergeCandidates(keeper, query) {
  var q = (query||'').toLowerCase().trim();
  var keeperName = (keeper.name||'').toLowerCase();
  var keeperCompany = (keeper.company||'').toLowerCase();
  var keeperPhoneDigits = (keeper.phone||'').replace(/\D/g,'');

  // Tokens from the keeper's name+company — used to rank similarity when no
  // search query is active. Filter out very short tokens (1-2 chars) which
  // would create too many false matches (e.g. "of" in "Hall of Famers").
  var keeperTokens = (keeperName + ' ' + keeperCompany).split(/\s+/)
    .filter(function(t){ return t.length >= 3; });

  var candidates = [];

  if (q) {
    // User is searching — token-based filter, no ranking beyond the order
    // they already exist in ST.partners.
    var qTokens = q.split(/\s+/).filter(function(t){ return t.length > 0; });
    var qDigits = q.replace(/\D/g,'');
    ST.partners.forEach(function(p){
      if (p.id === keeper.id) return;
      var hay = ((p.name||'') + ' ' + (p.company||'') + ' ' + (p.city||'')).toLowerCase();
      var phoneHit = qDigits && (p.phone||'').replace(/\D/g,'').indexOf(qDigits) !== -1;
      var textHit = qTokens.every(function(t){ return hay.indexOf(t) !== -1; });
      if (phoneHit || textHit) candidates.push({p: p, score: 0});
    });
  } else {
    // No search query — rank by similarity to the keeper. Score:
    //  +100 same phone (digits only) — strong dupe signal
    //  +20  per matching token between keeper name+company and candidate name+company
    //  +5   matching first letter of name (weakest signal, just to surface alphabet neighbors)
    ST.partners.forEach(function(p){
      if (p.id === keeper.id) return;
      var score = 0;
      var pHay = ((p.name||'') + ' ' + (p.company||'')).toLowerCase();
      var pPhoneDigits = (p.phone||'').replace(/\D/g,'');

      if (keeperPhoneDigits && pPhoneDigits && keeperPhoneDigits === pPhoneDigits) {
        score += 100;
      }
      keeperTokens.forEach(function(t){
        if (pHay.indexOf(t) !== -1) score += 20;
      });
      if (keeperName && (p.name||'').toLowerCase().charAt(0) === keeperName.charAt(0)) {
        score += 5;
      }
      // Only include partners with at least SOME similarity signal. Avoids
      // dumping the entire 6,422-row partner list into the merge dialog.
      if (score >= 20) candidates.push({p: p, score: score});
    });
    // Sort highest-score first
    candidates.sort(function(a,b){ return b.score - a.score; });
  }

  candidates = candidates.slice(0, 50);

  if (!candidates.length) {
    if (q) {
      return '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px;">No partners match.</div>';
    }
    return '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px;line-height:1.6;">No similar partners found automatically.<br><span style="font-size:11px;">Type above to search the full partner list.</span></div>';
  }

  var html = '';
  candidates.forEach(function(c){
    var p = c.p;
    var simBadge = '';
    if (!q && c.score >= 100) {
      simBadge = '<span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:rgba(192,32,32,.1);color:var(--danger);margin-left:6px;">SAME PHONE</span>';
    } else if (!q && c.score >= 40) {
      simBadge = '<span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:rgba(232,93,4,.1);color:var(--orange);margin-left:6px;">SIMILAR NAME</span>';
    }
    html += '<div style="padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;" onclick="selectMergeLoser(\'' + p.id + '\')">';
    html += '<div class="partner-avatar" style="background:' + tierColor(p.tier||'C') + ';width:32px;height:32px;font-size:12px;">' + partnerInitials(p.name) + '</div>';
    html += '<div style="flex:1;min-width:0;">';
    html += '<div style="font-size:13px;font-weight:600;color:var(--navy);">' + (p.name||'') + simBadge + '</div>';
    html += '<div style="font-size:11px;color:var(--muted);">' + (p.company||'—') + ' · ' + (p.phone||'no phone') + '</div>';
    html += '</div>';
    html += '<div style="font-size:11px;color:var(--muted);">' + (p.touch_count||0) + ' touches</div>';
    html += '</div>';
  });
  return html;
}

// Typing handler for the merge-picker search input. Critically, this does
// NOT call render() — that would tear down the input and lose focus,
// meaning the user could only type one letter at a time before having
// to click back into the field. Instead, we just rebuild the candidate
// list and inject it into the existing wrapper div.
function _mergePickerType(value) {
  ST.mergeSearch = value;
  var keeper = ST.partners.find(function(x){ return x.id === ST.mergeKeeper; });
  if (!keeper) return;
  var wrap = document.getElementById('merge-results-wrap');
  if (wrap) wrap.innerHTML = _renderMergeCandidates(keeper, value);
}

// Auto-pick non-empty: if keeper has value, use it; otherwise take loser's.
// This way we never blow away existing data — we only fill in blanks.
function _mergeFields(keeper, loser) {
  var out = {};
  var fields = ['company','type','phone','email','city','notes','tier','albi_contact_id','assigned_to','status'];
  fields.forEach(function(f){
    var kv = keeper[f];
    var lv = loser[f];
    // Use keeper's value if non-empty; else loser's value if non-empty; else leave undefined (won't PATCH)
    if (kv !== null && kv !== undefined && String(kv).trim() !== '') {
      out[f] = kv;
    } else if (lv !== null && lv !== undefined && String(lv).trim() !== '') {
      out[f] = lv;
    }
  });
  // Counts and revenue: always sum
  out.touch_count      = (parseInt(keeper.touch_count||0,10)) + (parseInt(loser.touch_count||0,10));
  out.referral_count   = (parseInt(keeper.referral_count||0,10)) + (parseInt(loser.referral_count||0,10));
  out.referral_revenue = (parseFloat(keeper.referral_revenue||0)) + (parseFloat(loser.referral_revenue||0));
  // last_touch_date: use the more recent one
  var kd = keeper.last_touch_date ? new Date(keeper.last_touch_date).getTime() : 0;
  var ld = loser.last_touch_date  ? new Date(loser.last_touch_date).getTime()  : 0;
  if (ld > kd) out.last_touch_date = loser.last_touch_date;
  return out;
}

// Execute the merge: re-point dependent rows, update keeper, delete loser
async function confirmMerge() {
  var keeper = ST.partners.find(function(p){ return p.id === ST.mergeKeeper; });
  var loser  = ST.partners.find(function(p){ return p.id === ST.mergeLoser;  });
  if (!keeper || !loser) { alert('One of the partners is missing. Reload and try again.'); return; }
  if (!confirm('MERGE ' + loser.name + ' INTO ' + keeper.name + '?\n\n' +
               '• Touches, follow-ups, and revenue will be combined onto ' + keeper.name + '\n' +
               '• ' + loser.name + ' will be permanently deleted\n' +
               '• This cannot be undone.\n\nContinue?')) return;

  var patch = _mergeFields(keeper, loser);
  patch.updated_at = new Date().toISOString();

  try {
    // 1. Re-point sales_touches (they reference partner_id AND store denormalized partner_name/partner_type — keep those as-is for historical accuracy)
    await sb('/rest/v1/sales_touches?partner_id=eq.'+loser.id, {
      method:'PATCH', body: JSON.stringify({ partner_id: keeper.id })
    });

    // 2. Re-point sales_followups
    await sb('/rest/v1/sales_followups?partner_id=eq.'+loser.id, {
      method:'PATCH', body: JSON.stringify({ partner_id: keeper.id })
    });

    // 3. Update keeper with merged data
    await sb('/rest/v1/sales_partners?id=eq.'+keeper.id, {
      method:'PATCH', body: JSON.stringify(patch)
    });

    // 4. Delete loser
    await sb('/rest/v1/sales_partners?id=eq.'+loser.id, { method:'DELETE' });

    ST.modal = null;
    ST.mergeKeeper = null;
    ST.mergeLoser = null;
    ST.selected = keeper.id;
    await loadAll();
    alert('✓ Merged. ' + keeper.name + ' now has ' + (patch.touch_count||0) + ' touches and ' + (patch.referral_count||0) + ' referrals.');
  } catch(e) {
    alert('Merge failed: ' + (e.message||e) + '\n\nData may be in a partial state. Refresh and check the partners.');
    console.error('merge error:', e);
  }
}

// ── FIND DUPLICATES ──────────────────────────────────────────────────────
// Groups partners by likely duplicate keys: normalized name, shared phone,
// shared email. A partner can appear in multiple groups (e.g. name match AND
// phone match). Shows groups of 2+ partners as merge candidates.
function openFindDuplicates() {
  ST.modal = 'find-dupes';
  render();

function _normalizePhone(s) {
  return (s||'').replace(/\D/g,'').replace(/^1/,'').slice(-10);
}
function _normalizeName(s) {
  return (s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
}
function _normalizeEmail(s) {
  return (s||'').toLowerCase().trim();
}

function findDuplicateGroups() {
  var groups = [];
  var byPhone = {}, byEmail = {}, byName = {};
  ST.partners.forEach(function(p){
    var ph = _normalizePhone(p.phone);
    var em = _normalizeEmail(p.email);
    var nm = _normalizeName(p.name);
    if (ph && ph.length >= 10) (byPhone[ph] = byPhone[ph] || []).push(p);
    if (em) (byEmail[em] = byEmail[em] || []).push(p);
    if (nm && nm.length >= 3) (byName[nm] = byName[nm] || []).push(p);
  });
  // Collect groups of 2+
  var seen = new Set();
  function addGroup(list, reason) {
    if (list.length < 2) return;
    var key = list.map(function(p){return p.id;}).sort().join('|') + '::' + reason;
    if (seen.has(key)) return;
    seen.add(key);
    groups.push({ reason: reason, partners: list });
  }
  Object.values(byPhone).forEach(function(l){ addGroup(l, 'same phone'); });
  Object.values(byEmail).forEach(function(l){ addGroup(l, 'same email'); });
  Object.values(byName).forEach(function(l){ addGroup(l, 'same name'); });
  return groups;
}

  var loggedByName  = (typeof currentRepName === 'function' ? currentRepName() : null) || loggedByEmail;

  // Build the body. Empty strings get nulled so the DB stays clean.
  var nullIfEmpty = function(s) { return s && s.trim() ? s.trim() : null; };

    event_date:        dateEl.value,
    event_time:        timeEl && timeEl.value ? timeEl.value : null,

    state:             stateEl ? nullIfEmpty(stateEl.value) : null,
    zip:               zipEl ? nullIfEmpty(zipEl.value) : null,
    loss_type:         lossTypeEl.value,
    loss_type_other:   lossOtherEl ? nullIfEmpty(lossOtherEl.value) : null,
    contact_name:      contactEl ? nullIfEmpty(contactEl.value) : null,
    contact_phone:     contactPhEl ? nullIfEmpty(contactPhEl.value) : null,
    contact_role:      contactRoleEl ? nullIfEmpty(contactRoleEl.value) : null,
    contact_notes:     contactNotesEl ? nullIfEmpty(contactNotesEl.value) : null,

    outcome_notes:     outcomeNotesEl ? nullIfEmpty(outcomeNotesEl.value) : null,
    competitor_name:   competitorEl ? nullIfEmpty(competitorEl.value) : null,
    albi_project_code: albiCodeEl ? nullIfEmpty(albiCodeEl.value) : null,
    logged_by:         loggedByEmail,
    logged_by_name:    loggedByName,
    updated_at:        new Date().toISOString()
  };

  var editingId = ST._chaseEditingId;

    if (editingId) {
      url = SB_URL + '/rest/v1/sales_chases?id=eq.' + editingId;
      method = 'PATCH';
    } else {
      url = SB_URL + '/rest/v1/sales_chases';
      method = 'POST';
    }
    var resp = await fetch(url, {
      method: method,
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error('Save failed: ' + (await resp.text()));

    if (typeof showOk === 'function') showOk(editingId ? '✓ Chase updated' : '✓ Chase logged');
    ST.modal = null;
    ST._chaseEditingId = null;

async function savePayout(albiReferralId) {
  if (ST._payoutSheetSaving) return;

  // Read form fields
  var amtEl    = document.getElementById('po-amount');
  var dateEl   = document.getElementById('po-date');
  var methodEl = document.getElementById('po-method');
  var notesEl  = document.getElementById('po-notes');
  if (!amtEl || !dateEl) return;

  var amount = parseFloat(amtEl.value);
  if (!amount || amount <= 0 || isNaN(amount)) {
    alert('Enter a valid payout amount.');
    return;
  }
  if (!dateEl.value) {
    alert('Pick a paid-on date.');
    return;
  }

  ST._payoutSheetSaving = true;
  render();

  // Look up referral so we can denormalize partner_id
  var ref = (ST.albiReferrals || []).find(function(r){ return r.id === albiReferralId; });
  if (!ref) {
    alert('Referral not found — try refreshing the page.');
    ST._payoutSheetSaving = false;
    render();
    return;
  }

  var auth = (window.JG_SHARED && window.JG_SHARED.auth) || {};
  var paidByEmail = (auth.currentEmail && auth.currentEmail()) || 'unknown';
  var paidByName  = (typeof currentRepName === 'function' ? currentRepName() : null) || paidByEmail;

  var body = {
    albi_referral_id: albiReferralId,
    partner_id:       ref.referrer_partner_id || null,
    amount:           amount,
    paid_date:        dateEl.value,
    payment_method:   methodEl ? methodEl.value : null,
    notes:            notesEl ? notesEl.value : null,
    paid_by:          paidByEmail,
    paid_by_name:     paidByName
  };

  var editingId = ST._payoutSheetEditingId;
  try {
    var url, method;
    if (editingId) {
      url = SB_URL + '/rest/v1/referral_payouts?id=eq.' + editingId;
      method = 'PATCH';
    } else {
      url = SB_URL + '/rest/v1/referral_payouts';
      method = 'POST';
    }
    var resp = await fetch(url, {
      method: method,
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error('Save failed: ' + (await resp.text()));

    // Fire the Albi-note webhook ONLY on new payouts (not edits). Edits
    // are typically corrections — adding "updated to $75" notes in Albi
    // creates clutter. Initial payment is the meaningful event for PMs.
    if (!editingId) {
      var paidDateFmt = new Date(dateEl.value + 'T00:00:00').toLocaleDateString('en-US');
      var partnerObj = ST.partners.find(function(x){ return x.id === ref.referrer_partner_id; });
      var partnerLabel = partnerObj ? partnerObj.name : (ref.albi_referrer_name || 'Unknown referrer');
      var methodSuffix = body.payment_method ? ' (' + body.payment_method + ')' : '';
      var noteText = 'Referral payout: $' + amount.toFixed(2) +
                     ' to ' + partnerLabel +
                     ' on ' + paidDateFmt +
                     methodSuffix +
                     ' — logged by ' + paidByName;

      var webhookPayload = {
        albi_project_id:   ref.albi_project_id,
        albi_project_code: ref.albi_project_code,
        partner_name:      partnerLabel,
        amount:            amount,
        paid_date:         dateEl.value,
        payment_method:    body.payment_method || '',
        notes:             body.notes || '',
        logged_by:         paidByName,
        note_text:         noteText
      };

      // Fire and forget — don't block the UI on Zapier latency. If the
      // webhook fails we log it but the payout itself was already saved
      // to Supabase. User can always re-trigger via a sync if needed.
      // Form-encoded body (not JSON) — Zapier's Catch Hook parses this
      // reliably; JSON bodies sometimes arrive as empty 'querystring' field.
      var formBody = Object.keys(webhookPayload)
        .map(function(k){ return encodeURIComponent(k) + '=' + encodeURIComponent(webhookPayload[k] == null ? '' : webhookPayload[k]); })
        .join('&');
      fetch('https://hooks.zapier.com/hooks/catch/12653197/uvlvwzy/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formBody
      }).catch(function(err) {
        console.error('Albi note webhook failed:', err);
      });
    }

    if (typeof showOk === 'function') showOk(editingId ? '✓ Payout updated' : '✓ Payout logged · Albi note queued');
    ST._payoutSheetEditingId = null;
    ST._payoutSheetSaving = false;
    await loadAll();
    // Stay on the payout sheet so the user sees the new row appear
    ST.modal = 'referral-payouts';
    render();
  } catch(err) {
    console.error('savePayout error', err);
    alert('Save failed: ' + (err.message || err));
    ST._payoutSheetSaving = false;
    render();
  }
}
