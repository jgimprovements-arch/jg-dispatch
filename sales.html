            mh += '<div style="width:22px;height:22px;border-radius:50%;background:' + (s.completed?'var(--ok)':'var(--border)') + ';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:' + (s.completed?'#fff':'var(--muted)') + ';flex-shrink:0;">' + (s.completed?'✓':(idx+1)) + '</div>';
            mh += '<div style="flex:1;"><div style="font-size:12px;font-weight:600;color:var(--navy);">' + _ve(s.partner_name||'Stop '+(idx+1)) + '</div>';
            if (s.address) mh += '<div style="font-size:10px;color:var(--muted);">' + _ve(s.address) + '</div>';
            mh += '</div></div>';
          });
        }
        mh += '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">';
        mh += '<button onclick="ST.modal=null;ST._calPopupRouteId=null;render()" style="padding:8px 16px;border-radius:6px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:12px;">Close</button>';
        mh += '<button onclick="ST._calPopupRouteId=null;editRoute(\'' + popRoute.id + '\')" style="padding:8px 18px;border-radius:6px;border:none;background:var(--orange);color:#fff;font-size:12px;font-weight:700;cursor:pointer;">✏️ Edit Route</button>';
        mh += '</div>';
      }
    }

    // ── CALENDAR TEMPLATE PREVIEW POPUP ──
    if (ST.modal === 'cal-template-popup') {
      var popTpl = ST._calPopupTemplateId
        ? (ST.routeTemplates||[]).find(function(t){ return t.id === ST._calPopupTemplateId; })
        : null;
      if (!popTpl) {
        mh += '<div class="modal-title">Template not found</div>';
        mh += '<div style="display:flex;justify-content:flex-end;margin-top:14px;"><button onclick="ST.modal=null;ST._calPopupTemplateId=null;render()" style="padding:8px 16px;border-radius:6px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:12px;">Close</button></div>';
      } else {
        var dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        var weekLabels = {1:'1st',2:'2nd',3:'3rd',4:'4th',5:'5th','-1':'Last'};
        mh += '<div class="modal-title">⟳ Recurring Route Preview</div>';
        mh += '<div style="background:rgba(232,93,4,.06);border:1px dashed rgba(232,93,4,.4);border-radius:8px;padding:12px 14px;margin-bottom:14px;">';
        mh += '<div style="font-size:14px;font-weight:700;color:var(--navy);margin-bottom:4px;">' + _ve(popTpl.name||'Recurring Route') + '</div>';
        mh += '<div style="font-size:11px;color:var(--muted);">Will generate on <strong>' + fmtDate(ST._calPopupDate) + '</strong></div>';
        mh += '</div>';
        // Recurrence summary
        mh += '<div style="font-size:12px;margin-bottom:10px;color:var(--text);"><strong>Recurrence:</strong> ';
        if (popTpl.recurrence === 'weekly') {
          mh += 'Every ' + (dayNames[popTpl.recurrence_day] || 'week');
        } else if (popTpl.recurrence === 'biweekly') {
          mh += 'Every other ' + (dayNames[popTpl.recurrence_day] || 'week');
        } else if (popTpl.recurrence === 'monthly') {
          var pat = popTpl.recurrence_pattern || 'day-of-month';
          if (pat === 'nth-weekday') {
            mh += (weekLabels[popTpl.recurrence_week_of_month] || '') + ' ' + (dayNames[popTpl.recurrence_day] || '') + ' of each month';
          } else {
            mh += 'Day ' + popTpl.recurrence_day + ' of each month';
          }
        }
        mh += '</div>';
        if (popTpl.rep_name) mh += '<div style="font-size:12px;margin-bottom:10px;"><strong>Rep:</strong> ' + _ve(popTpl.rep_name) + '</div>';
        // Stops preview
        var tplStops = popTpl.stops || [];
        if (tplStops.length > 0) {
          mh += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:6px;">Stops (' + tplStops.length + ')</div>';
          tplStops.forEach(function(s, idx){
            mh += '<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--border);">';
            mh += '<div style="width:18px;height:18px;border-radius:50%;background:rgba(232,93,4,.15);color:var(--orange);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;">' + (idx+1) + '</div>';
            mh += '<div style="flex:1;"><div style="font-size:11px;font-weight:600;color:var(--navy);">' + _ve(s.partner_name||'Stop '+(idx+1)) + '</div>';
            if (s.address) mh += '<div style="font-size:10px;color:var(--muted);">' + _ve(s.address) + '</div>';
            mh += '</div></div>';
          });
        }
        mh += '<div style="font-size:10px;color:var(--muted);margin-top:14px;font-style:italic;">This is a preview — the route will be auto-generated on the date above.</div>';
        mh += '<div style="display:flex;justify-content:flex-end;margin-top:14px;"><button onclick="ST.modal=null;ST._calPopupTemplateId=null;ST._calPopupDate=null;render()" style="padding:8px 18px;border-radius:6px;border:none;background:var(--orange);color:#fff;font-size:12px;font-weight:700;cursor:pointer;">Close</button></div>';
      }
    }

    if (ST.modal === 'add-route') {
      // Editing mode is signaled by ST.editingRouteId. When set, prefill all
      // fields from the existing route record. Single modal handles both
      // create and edit to avoid duplicating the stop-picker UI.
      var editingRoute = ST.editingRouteId
        ? ST.routes.find(function(r){ return r.id === ST.editingRouteId; })
        : null;
      var existingStopIds = {};
      if (editingRoute && editingRoute.stops) {
        editingRoute.stops.forEach(function(s){
          if (s.partner_id) existingStopIds[s.partner_id] = true;
        });
      }
      var rNameVal = editingRoute && editingRoute.name ? editingRoute.name : '';
      var rDateVal = editingRoute && editingRoute.route_date ? editingRoute.route_date : ST.today;
      var rRepVal  = editingRoute && editingRoute.rep_name ? editingRoute.rep_name : currentRepName();
      var rNotesVal= editingRoute && editingRoute.notes ? editingRoute.notes : '';

      mh += '<div class="modal-title">' + (editingRoute ? '✏️ Edit Route' : '🚗 Plan Route') + '</div>';
      mh += '<div class="form-group"><label class="form-label">Route Name (optional)</label>';
      mh += '<input class="form-input" id="rName" placeholder="e.g. Tuesday Plumber Loop" value="' + rNameVal.replace(/"/g,'&quot;') + '"></div>';
      mh += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">';
      mh += '<div class="form-group"><label class="form-label">Date</label><input class="form-input" type="date" id="rDate" value="' + rDateVal + '"></div>';
      mh += '<div class="form-group"><label class="form-label">Rep Name</label><select class="form-select" id="rRep">' + _repOptions(rRepVal, '— Select rep —') + '</select></div>';
      mh += '</div>';
      mh += '<div class="form-group"><label class="form-label">Select Stops (click to toggle)</label>';
      mh += '<div style="max-height:240px;overflow-y:auto;border:1.5px solid var(--border);border-radius:6px;">';
      ST.partners.forEach(function(p,i) {
        var preselected = existingStopIds[p.id];
        var rowBg = preselected ? 'rgba(232,93,4,.08)' : (i%2===0?'var(--surface)':'#fff');
        var rowClass = preselected ? 'selected' : '';
        mh += '<div class="' + rowClass + '" style="padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;background:' + rowBg + '" onclick="this.classList.toggle(\'selected\');this.style.background=this.classList.contains(\'selected\')?\'rgba(232,93,4,.08)\':null;">';
        mh += '<span>🚗</span>';
        mh += '<span style="font-size:12px;font-weight:600;" data-pid="' + p.id + '" data-pname="' + (p.name||'').replace(/"/g,'&quot;') + '" data-paddr="' + ((p.address||p.city||'')+'').replace(/"/g,'&quot;') + '">' + p.name + '</span>';
        mh += '<span style="font-size:10px;color:var(--muted);">' + (p.company||'') + (p.city?' · '+p.city:'') + '</span>';
        mh += '</div>';
      });
      mh += '</div></div>';
      mh += '<div class="form-group"><label class="form-label">Notes</label><input class="form-input" id="rNotes" placeholder="e.g. Focus on south Appleton today" value="' + rNotesVal.replace(/"/g,'&quot;') + '"></div>';
      mh += '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">';
      if (editingRoute) {
        mh += '<button style="padding:8px 14px;border-radius:6px;border:1.5px solid var(--danger);background:transparent;color:var(--danger);cursor:pointer;font-size:12px;font-weight:600;margin-right:auto;" onclick="deleteRoute(\'' + editingRoute.id + '\')">🗑 Delete</button>';
      }
      mh += '<button style="padding:8px 16px;border-radius:6px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:12px;" onclick="ST.modal=null;ST.editingRouteId=null;render()">Cancel</button>';
      mh += '<button style="padding:8px 20px;border-radius:6px;border:none;background:var(--orange);color:#fff;font-size:12px;font-weight:600;cursor:pointer;" onclick="submitRoute()">' + (editingRoute ? 'Save Changes' : 'Save Route') + '</button>';
      mh += '</div>';
    }

    if (ST.modal === 'add-followup') {
      mh += '<div class="modal-title">🔔 Add Follow-up</div>';
      mh += '<div class="form-group"><label class="form-label">Partner</label>' + _partnerCombobox('fuPartner') + '</div>';
      mh += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">';
      mh += '<div class="form-group"><label class="form-label">Due Date</label><input class="form-input" type="date" id="fuDate" value="' + _localDateStr(new Date(Date.now()+3*86400000)) + '"></div>';
      mh += '<div class="form-group"><label class="form-label">Priority</label><select class="form-select" id="fuPriority"><option>Normal</option><option>High</option><option>Low</option></select></div>';
      mh += '</div>';
      mh += '<div class="form-group"><label class="form-label">Reason / Notes</label><input class="form-input" id="fuReason" placeholder="e.g. Check in on referral"></div>';
      // Assigned To is now a dropdown sourced from the canonical rep list.
      // Pre-selects the current rep as the sensible default — they can change
      // it to hand the follow-up to someone else before saving.
      mh += '<div class="form-group"><label class="form-label">Assigned To</label><select class="form-select" id="fuAssigned">' + _repOptions(currentRepName(), '— Select rep —') + '</select></div>';
      mh += '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">';
      mh += '<button style="padding:8px 16px;border-radius:6px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:12px;" onclick="ST.modal=null;render()">Cancel</button>';
      mh += '<button style="padding:8px 20px;border-radius:6px;border:none;background:var(--orange);color:#fff;font-size:12px;font-weight:600;cursor:pointer;" onclick="submitFollowup()">Save</button>';
      mh += '</div>';
    }

    if (ST.modal === 'partner-detail') {
      var p = ST.partners.find(function(x){ return x.id === ST.selected; });
      if (p) {
        var ptouches = ST.touches.filter(function(t){ return t.partner_id === p.id; });
        // Pull this partner's referrals from the albi_referrals table — the
        // source of truth synced from Albi. Replaces the older manual
        // referral_count/referral_revenue columns which never got
        // populated automatically.
        var prefs = (ST.albiReferrals || []).filter(function(r){ return r.referrer_partner_id === p.id; });
        var prefCount    = prefs.length;
        var prefRevenue  = prefs.reduce(function(s,r){ return s + (parseFloat(r.project_value||0)||0); }, 0);
        var prefPaid     = prefs.reduce(function(s,r){ return s + (parseFloat(r.project_paid ||0)||0); }, 0);
        mh += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">';
        mh += '<div class="partner-avatar" style="background:' + tierColor(p.tier||'C') + ';width:52px;height:52px;font-size:20px;">' + partnerInitials(p.name) + '</div>';
        mh += '<div><div style="font-size:18px;font-weight:700;color:var(--navy);">' + p.name + '</div>';
        mh += '<div style="font-size:12px;color:var(--muted);">' + (p.company||'') + '</div></div>';
        mh += '<div style="margin-left:auto;"><select class="form-select" style="width:120px;font-size:11px;" onchange="savePartner({id:\'' + p.id + '\',tier:this.value})">';
        ['A','B','C'].forEach(function(t){ mh += '<option '+(p.tier===t?'selected':'')+' value="'+t+'">'+t+'-Tier</option>'; });
        mh += '</select></div></div>';
        mh += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">';
        if (p.phone) mh += '<a href="tel:' + p.phone + '" style="padding:8px 12px;border-radius:6px;background:rgba(13,45,94,.06);font-size:12px;font-weight:600;color:var(--navy);text-decoration:none;">📞 ' + p.phone + '</a>';
        if (p.email) mh += '<a href="mailto:' + p.email + '" style="padding:8px 12px;border-radius:6px;background:rgba(13,45,94,.06);font-size:12px;font-weight:600;color:var(--navy);text-decoration:none;">📧 ' + p.email + '</a>';
        mh += '</div>';
        mh += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">';
        mh += '<div style="background:rgba(13,45,94,.06);border-radius:6px;padding:8px;text-align:center;"><div style="font-size:20px;font-weight:700;color:var(--navy);">' + (p.touch_count||0) + '</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;">Touches</div></div>';
        mh += '<div style="background:rgba(232,93,4,.06);border-radius:6px;padding:8px;text-align:center;"><div style="font-size:20px;font-weight:700;color:var(--orange);">' + prefCount + '</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;">Referrals</div></div>';
        mh += '<div style="background:rgba(46,125,50,.06);border-radius:6px;padding:8px;text-align:center;"><div style="font-size:16px;font-weight:700;color:var(--ok);">$' + Math.round(prefRevenue).toLocaleString() + '</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;">Rev</div></div>';
        mh += '</div>';
        if (p.notes) mh += '<div style="background:rgba(245,166,35,.06);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;">' + p.notes + '</div>';
        // Touch history — 5-row preview by default with a Show all toggle.
        // Each row is two-line (icon+type+date on top, notes underneath) so
        // notes don't get truncated. Click count link to expand/collapse.
        var totalTouchCount = ptouches.length;
        var showAllTouches = ST.touchHistoryExpanded;
        var visibleTouches = showAllTouches ? ptouches : ptouches.slice(0, 5);

        mh += '<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;">';
        mh += '<span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;">Touch History (' + totalTouchCount + ')</span>';
        if (totalTouchCount > 5) {
          var toggleLabel = showAllTouches ? 'Show recent only' : 'Show all ' + totalTouchCount;
          mh += '<button onclick="ST.touchHistoryExpanded=' + (!showAllTouches) + ';render()" style="font-size:11px;color:var(--orange);background:transparent;border:none;cursor:pointer;font-weight:700;padding:0;font-family:DM Sans,sans-serif;">' + toggleLabel + ' →</button>';
        }
        mh += '</div>';

        if (!visibleTouches.length) {
          mh += '<div style="font-size:12px;color:var(--muted);margin-bottom:12px;">No touches logged yet.</div>';
        } else {
          // Wrap in a scroll container if the user expanded the list — keeps
          // long histories from blowing out the modal height.
          var scrollStyle = showAllTouches && totalTouchCount > 8
            ? 'max-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:0 10px;margin-bottom:8px;'
            : 'margin-bottom:8px;';
          mh += '<div style="' + scrollStyle + '">';
          visibleTouches.forEach(function(t){
            mh += '<div style="padding:8px 0;border-bottom:1px solid var(--border);">';
            mh += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">';
            mh += '<span>' + touchIcon(t.touch_type) + '</span>';
            mh += '<span style="font-size:11px;font-weight:700;padding:1px 7px;border-radius:4px;background:rgba(13,45,94,.08);color:var(--navy);">' + _ve(t.touch_type||'—') + '</span>';
            if (t.outcome) mh += '<span style="font-size:11px;color:' + outcomeColor(t.outcome) + ';font-weight:600;">' + _ve(t.outcome) + '</span>';
            mh += '<span style="font-size:10px;color:var(--muted);margin-left:auto;">' + fmtDate(t.touch_date) + (t.logged_by ? ' · ' + _ve(t.logged_by) : '') + '</span>';
            mh += '</div>';
            if (t.notes) {
              mh += '<div style="font-size:12px;color:var(--txt);margin-top:4px;margin-left:24px;line-height:1.45;">' + _ve(t.notes) + '</div>';
            }
            mh += '</div>';
          });
          mh += '</div>';
        }

        // Referred Jobs — list of actual projects this partner referred to
        // JG. Sourced from albi_referrals (Albi sync). Sorted newest first.
        // Same Show all pattern as touch history.
        if (prefCount > 0) {
          var prefsSorted = prefs.slice().sort(function(a,b){
            return (b.project_created_date||'').localeCompare(a.project_created_date||'');
          });
          var showAllRefs = ST.refHistoryExpanded;
          var visibleRefs = showAllRefs ? prefsSorted : prefsSorted.slice(0, 5);

          mh += '<div style="display:flex;align-items:baseline;justify-content:space-between;margin:14px 0 8px;">';
          mh += '<span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;">⭐ Referred Jobs (' + prefCount + ' · $' + Math.round(prefRevenue).toLocaleString() + ' invoiced)</span>';
          if (prefCount > 5) {
            var refToggleLabel = showAllRefs ? 'Show recent only' : 'Show all ' + prefCount;
            mh += '<button onclick="ST.refHistoryExpanded=' + (!showAllRefs) + ';render()" style="font-size:11px;color:var(--orange);background:transparent;border:none;cursor:pointer;font-weight:700;padding:0;font-family:DM Sans,sans-serif;">' + refToggleLabel + ' →</button>';
          }
          mh += '</div>';

          var refScrollStyle = showAllRefs && prefCount > 8
            ? 'max-height:260px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:0 10px;'
            : '';
          mh += '<div style="' + refScrollStyle + '">';
          visibleRefs.forEach(function(r){
            var pv  = parseFloat(r.project_value||0)||0;
            var pp  = parseFloat(r.project_paid ||0)||0;
            // Sum payouts already logged for this referral
            var rowPayouts = (ST.referralPayouts||[]).filter(function(po){ return po.albi_referral_id === r.id; });
            var paidOutTotal = rowPayouts.reduce(function(s,po){ return s + (parseFloat(po.amount||0)||0); }, 0);
            mh += '<div onclick="openReferralPayouts(\'' + r.id + '\')" style="padding:8px 10px;margin:0 -10px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:4px;" onmouseover="this.style.background=\'rgba(232,93,4,.04)\'" onmouseout="this.style.background=\'transparent\'">';
            mh += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">';
            mh += '<span style="font-size:11px;font-weight:700;padding:1px 7px;border-radius:4px;background:rgba(13,45,94,.08);color:var(--navy);">' + _ve(r.albi_project_code||r.albi_project_id||'—') + '</span>';
            if (r.referral_source) mh += '<span style="font-size:10px;color:var(--muted);font-weight:600;">' + _ve(r.referral_source) + '</span>';
            if (r.project_status)  mh += '<span style="font-size:10px;color:var(--muted);">· ' + _ve(r.project_status) + '</span>';
            mh += '<span style="font-size:10px;color:var(--muted);margin-left:auto;">' + (r.project_created_date ? fmtDate(r.project_created_date) : '—') + '</span>';
            mh += '</div>';
            mh += '<div style="display:flex;gap:14px;margin-top:3px;font-size:11px;align-items:center;">';
            mh += '<span style="color:var(--ok);font-weight:700;">$' + Math.round(pv).toLocaleString() + ' invoiced</span>';
            mh += '<span style="color:var(--muted);">$' + Math.round(pp).toLocaleString() + ' paid</span>';
            // Payout badge — only shows when something has been paid out
            if (paidOutTotal > 0) {
              mh += '<span style="background:rgba(232,93,4,.1);color:var(--orange);font-weight:700;padding:2px 8px;border-radius:4px;">💰 $' + Math.round(paidOutTotal).toLocaleString() + ' paid out</span>';
            } else {
              mh += '<span style="color:var(--muted);font-size:10px;font-style:italic;">click to log payout</span>';
            }
            mh += '</div>';
            mh += '</div>';
          });
          mh += '</div>';
        }

        // Footer buttons — primary action full-width, secondary actions
        // in a single 4-column row below. Single row (vs 2x2 grid) saves
        // ~36px vertical space, keeping all buttons visible without scroll
        // even with the new Referred Jobs section adding to modal height.
        mh += '<div style="margin-top:14px;">';
        mh += '<button style="width:100%;padding:10px;border-radius:8px;border:none;background:var(--orange);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:DM Sans,sans-serif;" onclick="ST.modal=\'log-touch\';render()">📋 Log Touch</button>';
        mh += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-top:6px;">';
        mh += '<button style="padding:8px 4px;border-radius:6px;border:1.5px solid var(--navy);background:transparent;color:var(--navy);font-size:11px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif;" onclick="editPartner(\'' + p.id + '\')">✏️ Edit</button>';
        mh += '<button style="padding:8px 4px;border-radius:6px;border:1.5px solid var(--danger);background:transparent;color:var(--danger);font-size:11px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif;" onclick="openMergePicker(\'' + p.id + '\')">⇄ Merge</button>';
        // Delete — solid red, distinct from outlined Merge. Merge preserves
        // data (touches re-pointed), Delete throws data away.
        mh += '<button style="padding:8px 4px;border-radius:6px;border:none;background:var(--danger);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif;" onclick="deletePartner(\'' + p.id + '\')">🗑 Delete</button>';
        mh += '<button style="padding:8px 4px;border-radius:6px;border:1.5px solid var(--border);background:transparent;font-size:11px;cursor:pointer;font-family:DM Sans,sans-serif;" onclick="ST.modal=null;ST.selected=null;ST.touchHistoryExpanded=false;ST.refHistoryExpanded=false;render()">Close</button>';
        mh += '</div>';
        mh += '</div>';
      }
    }

    // ── MERGE PICKER ────────────────────────────────────────────────────────
    if (ST.modal === 'merge-picker') {

function submitTouch() {

    pid = selP.id; pname = selP.name; ptype = selP.type||'';

    pid = sel[0]; pname = sel[1]||''; ptype = sel[2]||'';
  }
  // Optional follow-up fields — only present in the DOM if the user ticked
  // "Schedule follow-up" (checkbox). Read with null-safe defaults so the
  // call still works if the elements are missing for any reason.
  var fuPri = document.getElementById('tFollowupPriority');
  var fuAss = document.getElementById('tFollowupAssigned');
  logTouch({
    partner_id: pid, partner_name: pname, partner_type: ptype,

// Edit an existing touch. Only the four permitted fields (type, date,
// outcome, notes) are sent in the PATCH — allowlist pattern matching
// logTouch. Partner, logged_by, and market are untouched.
async function submitEditTouch() {
  var tid = ST.selected;
  if (!tid) { ST.modal=null; render(); return; }
  var existing = ST.touches.find(function(x){ return x.id === tid; });
  if (!existing) { ST.modal=null; ST.selected=null; render(); return; }

  // Server-side guard (the button is already hidden for unauthorized users,
  // but we check again here in case someone calls submitEditTouch from console).
  if (!isAdmin() && existing.logged_by !== currentRepName()) {
    showErr('You can only edit touches you logged yourself.');
    return;
  }

  var patchBody = {
    touch_type: document.getElementById('etType').value,
    touch_date: document.getElementById('etDate').value,
    outcome:    document.getElementById('etOutcome').value,
    notes:      document.getElementById('etNotes').value || ''
  };

  var resp = await sb('/rest/v1/sales_touches?id=eq.' + tid, {
    method: 'PATCH',
    headers: {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body: JSON.stringify(patchBody)
  });
  // sb() returns [] on error and shows the red banner; bail if that happened.
  // (sb() returns a Promise-wrapped value; on PATCH with Prefer:return=minimal
  //  the success case resolves to [] too, so we can't distinguish success/fail
  //  by the return value alone. Rely on the banner for error signalling.)

  // Optimistic local update so the UI reflects changes immediately without
  // waiting on loadAll. If the PATCH actually failed, loadAll will overwrite
  // this with the real server state.
  Object.assign(existing, patchBody);
  ST.modal = null;
  ST.selected = null;
  render();
  // Refresh from server to pick up the real state + any triggers that ran.
  await loadAll();
}

async function submitRoute() {
  // Gather selected stops from the picker. When editing, preserve each
  // stop's completion state by matching against the existing route's stops
  // — otherwise an edit would silently un-complete partially-done routes.
  var existingByPid = {};
  if (ST.editingRouteId) {
    var existing = ST.routes.find(function(r){ return r.id === ST.editingRouteId; });
    if (existing && existing.stops) {
      existing.stops.forEach(function(s){
        if (s.partner_id) existingByPid[s.partner_id] = s;
      });
    }
  }

  var stops = [];
  document.querySelectorAll('.modal-box .selected [data-pid]').forEach(function(el,i) {
    var prior = existingByPid[el.dataset.pid];
    stops.push({
      partner_id:    el.dataset.pid,
      partner_name:  el.dataset.pname,
      address:       el.dataset.paddr,
      order:         i,
      completed:     prior ? !!prior.completed : false,
      // Preserve any other fields the prior stop had (notes, completed_at, etc.)
      completed_at:  prior ? prior.completed_at : null,
      notes:         prior ? prior.notes : null
    });
  });

  var body = {
    route_date: document.getElementById('rDate').value,
    rep_name:   document.getElementById('rRep').value,
    name:       document.getElementById('rName').value || null,
    stops:      stops,
    notes:      document.getElementById('rNotes').value,
    total_stops: stops.length,
    completed_stops: stops.filter(function(s){ return s.completed; }).length,
    market:     ST.market
  };

  if (ST.editingRouteId) {
    // PATCH existing route
    var routeId = ST.editingRouteId;
    body.status = body.completed_stops === stops.length && stops.length > 0
      ? 'Completed'
      : (body.completed_stops > 0 ? 'In Progress' : 'Planned');
    body.updated_at = new Date().toISOString();
    try {
      var resp = await fetch(SB_URL + '/rest/v1/sales_routes?id=eq.' + routeId, {
        method: 'PATCH',
        headers: {
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(body)
      });
      if (!resp.ok) throw new Error(await resp.text());
    } catch(err) {
      console.error('Edit route failed:', err);
      alert('Save failed: ' + err.message);
      return;
    }
  } else {
    // POST new route
    body.status = 'Planned';
    await saveRoute(body);
  }

  ST.modal = null;
  ST.editingRouteId = null;
  await loadAll();
}

// Navigate the calendar by ±N months. Adjusts ST.calMonth (YYYY-MM string).
function changeCalMonth(delta) {
  var ym = (ST.calMonth || '').split('-');
  var y = parseInt(ym[0], 10);
  var m = parseInt(ym[1], 10) - 1; // 0-indexed
  if (isNaN(y) || isNaN(m)) {
    var n = new Date();
    y = n.getFullYear(); m = n.getMonth();
  }
  m += delta;
  while (m < 0) { m += 12; y -= 1; }
  while (m > 11) { m -= 12; y += 1; }
  ST.calMonth = y + '-' + String(m+1).padStart(2,'0');
  render();
}

function mapRow(obj) {
  // Map column names from Albi export format
  // Headers: Name, Type, Mobile Number, Email, Job Title, Address, Address 1, City, State, Zip Code, Organization, Status, Referral Source, Salesperson
  function g(keys) {
    for(var i=0;i<keys.length;i++) {
      var v = obj[keys[i]] || obj[keys[i].toLowerCase()] || obj[keys[i].toUpperCase()];
      if(v && String(v).trim()) return String(v).trim();
    }
    return '';
  }
  return {
    name:         g(['Name','name','Full Name','full name']),
    type:         g(['Type','type','Contact Type']),
    phone:        g(['Mobile Number','Phone','mobile number','phone','Mobile','Cell']),
    email:        g(['Email','email','Email Address']),
    job_title:    g(['Job Title','job title','Title']),
    address:      g(['Address 1','Address','address']),
    city:         g(['City','city']),
    state:        g(['State','state']),
    zip:          g(['Zip Code','zip code','Zip','zip']),
    organization: g(['Organization','organization','Company','company']),
    status:       g(['Status','status']),
    referral_src: g(['Referral Source','referral source']),
    salesperson:  g(['Salesperson','salesperson'])
  };
}

async function handleImportFile(file) {
  if (!file) return;
  var status = document.getElementById('imp-status');
  if (status) status.innerHTML = '<div style="padding:10px;color:var(--muted);font-size:12px;">⏳ Reading file...</div>';
  try {
    var rows = file.name.toLowerCase().endsWith('.csv') ? await parseCSV(file) : await parseXLSX(file);
    // Build dedup keys from existing partners
    var existingKeys = new Set();
    ST.partners.forEach(function(p) {
      if (p.name)  existingKeys.add((p.name||'').toLowerCase().trim());
      if (p.phone) existingKeys.add((p.phone||'').replace(/[^0-9]/g,''));
      if (p.email) existingKeys.add((p.email||'').toLowerCase().trim());
    });
    ST.importPreview = rows.filter(function(r){ return r.name && r.name.trim(); }).map(function(r) {
      var nameKey  = (r.name||'').toLowerCase().trim();
      var phoneKey = (r.phone||'').replace(/[^0-9]/g,'');
      var emailKey = (r.email||'').toLowerCase().trim();
      var exists   = existingKeys.has(nameKey)
                  || (phoneKey.length > 6 && existingKeys.has(phoneKey))
                  || (emailKey.length > 3 && existingKeys.has(emailKey));
      return Object.assign({}, r, {exists: exists});
    });
    ST.importResult = null;
    render();
    if (status) status.innerHTML = '';
  } catch(e) {
    if (status) status.innerHTML = '<div style="padding:10px;color:var(--danger);font-size:12px;">Error reading file: ' + e.message + '</div>';
  }
}

async function parseCSV(file) {
  var text = await file.text();
  var lines = text.split('\n');
  var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/^"|"$/g,'').toLowerCase(); });
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var cells = lines[i].split(',').map(function(c){ return c.trim().replace(/^"|"$/g,''); });
    var obj = {};
    headers.forEach(function(h,j){ obj[h] = cells[j]||''; });
    rows.push(mapRow(obj));
  }
  return rows;
}

async function parseXLSX(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = new Uint8Array(e.target.result);
        var wb = XLSX.read(data, {type:'array', cellDates:true});
        var ws = wb.Sheets[wb.SheetNames[0]];
        var json = XLSX.utils.sheet_to_json(ws, {raw:false});
        resolve(json.map(mapRow));
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function detectPartnerType(title, org) {
  var t = ((title||'') + ' ' + (org||'')).toLowerCase();
  if (/plumb/.test(t))                                   return 'Plumber';
  if (/realtor|real estate|realty|remax|keller|coldwell|century 21|exit realty|shorewest/.test(t)) return 'Realtor';
  if (/insurance|adjuster|agent|allstate|state farm|american family|travelers|nationwide|erie|liberty mutual|farmers/.test(t)) return 'Insurance Agent';
  if (/property manager|property mgmt|prop mgmt|property management|hoa|association manager/.test(t)) return 'Property Manager';
  if (/general contractor|\bgc\b|builder|construction|remodel|restoration(?! tech)|renovate/.test(t)) return 'GC';
  return 'Other';
}

function mapRow(obj) {
  function g(keys) {
    for (var i = 0; i < keys.length; i++) {
      var v = obj[keys[i]] || obj[keys[i].toLowerCase()] || obj[keys[i].toUpperCase()];
      if (v && String(v).trim()) return String(v).trim();
    }
    return '';
  }
  var title = g(['Job Title','job title','Title','title']);
  var org   = g(['Organization','organization','Company','company']);
  return {
    name:         g(['Name','name','Full Name']),
    type:         detectPartnerType(title, org),
    phone:        g(['Mobile Number','Phone','mobile number','phone','Mobile','Cell']),
    email:        g(['Email','email','Email Address']),
    address:      g(['Address 1','Address','address']),
    city:         g(['City','city']),
    state:        g(['State','state']),
    zip:          g(['Zip Code','zip code','Zip','zip']),
    organization: org,
    status:       g(['Status','status']),
    referral_src: g(['Referral Source','referral source']),
    job_title:    title
  };
}

async function runImport() {
  var newContacts = (ST.importPreview||[]).filter(function(r){ return !r.exists; });
  if (!newContacts.length) return;
  var impType = document.getElementById('imp-type');
  var impTier = document.getElementById('imp-tier');
  var defType = impType ? impType.value : 'Customer';
  var defTier = impTier ? impTier.value : 'C';
  var btn = document.querySelector('[onclick="runImport()"]');
  if (btn) { btn.textContent = 'Importing...'; btn.disabled = true; }
  var imported = 0;
  var skipped  = (ST.importPreview||[]).filter(function(r){ return r.exists; }).length;
  // Batch insert 20 at a time
  for (var i = 0; i < newContacts.length; i += 20) {
    var batch = newContacts.slice(i, i+20).map(function(r) {
      return {
        name:    r.name,
        company: r.organization||'',
        type:    (r.type && r.type !== 'Customer' && r.type !== 'Other') ? r.type : defType,
        phone:   r.phone||'',
        email:   r.email||'',
        address: r.address||'',
        city:    r.city||'',
        market:  ST.market,
        tier:    defTier,
        status:  'Prospect',
        notes:   r.referral_src ? 'Referral source: ' + r.referral_src : ''
      };
    });
    try {
      var resp = await fetch(SB_URL + '/rest/v1/sales_partners', {
        method: 'POST',
        headers: {
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(batch)
      });
      if (!resp.ok) {
        var errText = await resp.text();
        console.error('Insert failed:', resp.status, errText);
        showErr('Import error ' + resp.status + ': ' + errText.slice(0,150));
        break;
      }
      imported += batch.length;
      if (btn) btn.textContent = 'Importing... ' + imported + '/' + newContacts.length;
    } catch(e) {
      showErr('Insert failed: ' + e.message);
      break;
    }
  }
  ST.importResult = {imported: imported, skipped: skipped};
  ST.importPreview = null;
  await loadAll();
}

// ── ROLES & PERMISSIONS ───────────────────────────────────────────────────────
// ADMINS and REPS now sourced from JG_SHARED so mobile/desktop stay in sync.
// Inline values kept as fallback if sales-shared.js fails to load.
var ADMINS = (window.JG_SHARED && window.JG_SHARED.ADMINS) || ['josh@jg-restoration.com','josh.greil@jg-restoration.com'];
var REPS = (window.JG_SHARED && window.JG_SHARED.REPS) || {
  'kristina@jg-restoration.com': 'Kristina',
  'rylan@jg-restoration.com':    'Rylan',
  'rylan.reoh@jg-restoration.com': 'Rylan',
  'david@jg-restoration.com':    'David',
  'brent@jg-restoration.com':    'Brent',
  'josh@jg-restoration.com':     'Josh',
  'josh.greil@jg-restoration.com': 'Josh'
};

// currentUser / isAdmin / currentRepName / canEdit / canDelete are kept as
// local function names (every call site in this file uses them) but delegate
// to JG_SHARED.auth when available. Local bodies preserved as fallback.
function currentUser() {
  try { return JSON.parse(localStorage.getItem('jg_platform_user')||'null'); } catch(e) { return null; }
}
function isAdmin() {
  if (window.JG_SHARED && window.JG_SHARED.auth) return window.JG_SHARED.auth.isAdmin();
  var u = currentUser();
  return u && ADMINS.includes(u.email.toLowerCase());
}
function currentRepName() {
  if (window.JG_SHARED && window.JG_SHARED.auth) return window.JG_SHARED.auth.currentRepName();
  var u = currentUser();
  if (!u) return '';
  return REPS[u.email.toLowerCase()] || u.name || u.email.split('@')[0];
}
function canEdit(partner) {
  if (window.JG_SHARED && window.JG_SHARED.auth) return window.JG_SHARED.auth.canEdit(partner);
  if (isAdmin()) return true;
  var rep = currentRepName();
  return partner && (partner.assigned_to === rep || !partner.assigned_to);
}
function canDelete() {
  if (window.JG_SHARED && window.JG_SHARED.auth) return window.JG_SHARED.auth.canDelete();
  return isAdmin();
}
function canImport() { return isAdmin(); }
function canChangeTier(partner) {
  // Kept local — JG_SHARED doesn't expose this one. Same rule as canEdit
  // but excludes the "unassigned = any rep" case: only admin or owner can
  // change tier.
  if (isAdmin()) return true;
  var rep = currentRepName();
  return partner && partner.assigned_to === rep;
}

function assignPartner(id, rep) { savePartner({id:id, assigned_to:rep}); ST.tab="admin"; }
async function bulkAssign(rep) {
  if (!isAdmin()) return;
  if (!confirm('Assign all ' + ST.partners.filter(function(p){return !p.assigned_to;}).length + ' unassigned partners to ' + rep + '?')) return;
  var unassigned = ST.partners.filter(function(p){ return !p.assigned_to; });
  for (var i = 0; i < unassigned.length; i += 50) {
    var batch = unassigned.slice(i, i+50);
    for (var j = 0; j < batch.length; j++) {
      await sb('/rest/v1/sales_partners?id=eq.'+batch[j].id, {
        method:'PATCH', body:JSON.stringify({assigned_to: rep, updated_at: new Date().toISOString()})
      });
    }
  }
  await loadAll();
}

document.addEventListener('DOMContentLoaded',function(){
  const ret=new URLSearchParams(window.location.search).get('return');
  const u=JSON.parse(localStorage.getItem('jg_platform_user')||'null');
  const exp=localStorage.getItem('jg_platform_exp');
  if(ret&&ret.includes('jgimprovements-arch.github.io')&&u&&exp&&Date.now()<parseInt(exp)){window.location.replace(ret);return;}
  jgCheckAuth();
  if(u) jgShowUser(u);

  // Initialize JG_SHARED.market — populates the rep→market lookup table from
  // employees so repMatchesMarket() can correctly scope reps to their home
  // market in the Touches tab. Without this, the helper fail-opens and shows
  // SP reps on the Appleton tab and vice versa. Best-effort: if init fails,
  // we still continue with loadAll, just without the per-market filter.
  function _sbFetchRaw(path, opts) {
    return fetch(SB_URL + path, Object.assign({
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' }
    }, opts || {}));
  }
  if (window.JG_SHARED && window.JG_SHARED.market && typeof window.JG_SHARED.market.init === 'function') {
    window.JG_SHARED.market.init(_sbFetchRaw)
      .then(function(){ render(); })  // re-render once map is populated
      .catch(function(){ /* best-effort */ });
  }

  loadAll();
});
