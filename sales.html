async function inspectProject() {
  var inp = document.getElementById('inspectInput');
  var q = inp ? inp.value.trim() : '';
  if (!q) return;
  ST._inspectQuery = q;
  ST._inspectResult = '<div style="color:var(--muted);">⏳ Searching...</div>';
  render();

  try {
    // We have to scan pages — the proxy doesn't let us query by ID directly.
    // Look through up to 30 pages for a project where id, identifier, or
    // name matches the query.
    var found = null;
    var qLower = q.toLowerCase();
    for (var page = 1; page <= 30 && !found; page++) {
      var url = 'https://jg-proxy-v2.vercel.app/api/albi?location=' +
                encodeURIComponent(ST.market) + '&pageSize=100&page=' + page;
      var r = await fetch(url);
      if (!r.ok) throw new Error('Proxy returned ' + r.status);
      var data = await r.json();
      var projects = data.Items || data.items || data.projects || data.data || (Array.isArray(data) ? data : []);
      if (!projects.length) break;
      for (var i = 0; i < projects.length; i++) {
        var p = projects[i];
        if (String(p.id) === q ||
            String(p.identifier || '').toLowerCase() === qLower ||
            String(p.name || '').toLowerCase().indexOf(qLower) !== -1) {
          found = p;
          break;
        }
      }
      if (projects.length < 100) break;
    }

    if (!found) {
      ST._inspectResult = '<div style="color:var(--danger);">No project found matching "' + _ve(q) + '" in ' + ST.market + '. Try the other market or check the code.</div>';
      render();
      return;
    }

    // Render ALL fields, but highlight numeric/revenue-looking ones at the top.
    var revenueKeys = [];
    var otherKeys = [];
    Object.keys(found).forEach(function(k){
      var v = found[k];
      // Numeric or revenue-named keys at the top
      if (typeof v === 'number' ||
          /revenue|amount|total|cost|expense|profit|margin|paid|billed|cogs|tax|deductible|gross/i.test(k)) {
        revenueKeys.push(k);
      } else {
        otherKeys.push(k);
      }
    });

    var html = '<div style="background:rgba(46,125,50,.06);border:1px solid rgba(46,125,50,.3);padding:8px 12px;border-radius:6px;margin-bottom:10px;font-size:11px;color:var(--ok);">';
    html += '✓ Found project <strong>' + _ve(found.identifier || found.id) + '</strong> — ' + _ve(found.name || '(unnamed)') + '</div>';

    html += '<div style="font-size:11px;font-weight:700;color:var(--navy);margin:8px 0 6px;text-transform:uppercase;">💰 Revenue / financial fields:</div>';
    html += '<div style="background:#0d2d5e;color:#9fcfff;padding:10px 14px;border-radius:6px;font-family:monospace;font-size:11px;line-height:1.6;max-height:280px;overflow-y:auto;">';
    revenueKeys.sort().forEach(function(k){
      var v = found[k];
      var disp = (v === null || v === undefined) ? 'null' : (typeof v === 'number' ? '$' + v.toLocaleString() : JSON.stringify(v));
      html += '<div><span style="color:#ffb84d;">' + _ve(k) + '</span> = ' + _ve(disp) + '</div>';
    });
    html += '</div>';

    html += '<div style="font-size:10px;color:var(--muted);margin-top:8px;line-height:1.5;">After you see this, tell me which field name represents the truly-billed amount. I\'ll update the sync to use that field.</div>';

    // Hide the long list of other fields behind a toggle so the panel doesn't
    // overwhelm the page. Most diagnoses won't need them.
    if (otherKeys.length) {
      html += '<details style="margin-top:8px;"><summary style="cursor:pointer;font-size:11px;color:var(--muted);">+ Show other ' + otherKeys.length + ' fields</summary>';
      html += '<div style="background:#0d2d5e;color:#9fcfff;padding:10px 14px;border-radius:6px;font-family:monospace;font-size:11px;line-height:1.6;max-height:280px;overflow-y:auto;margin-top:6px;">';
      otherKeys.sort().forEach(function(k){
        var v = found[k];
        var disp = (v === null || v === undefined) ? 'null' :
                   (typeof v === 'object' ? JSON.stringify(v) :
                    typeof v === 'string' && v.length > 100 ? v.slice(0, 100) + '…' :
                    JSON.stringify(v));
        html += '<div><span style="color:#9fcfff;">' + _ve(k) + '</span> = ' + _ve(disp) + '</div>';
      });
      html += '</div></details>';
    }

    ST._inspectResult = html;
    render();
  } catch(err) {
    ST._inspectResult = '<div style="color:var(--danger);">Error: ' + _ve(err.message || err) + '</div>';
    render();
  }
}

// ─────────────────────────────────────────────────────────────────────────
// REFERRAL SYNC FROM ALBI
// ─────────────────────────────────────────────────────────────────────────
// Pulls projects from Albi via the existing /api/albi proxy. Runs from the
// browser — no Vercel function needed.
//
// Field structure discovered via audit: Albi exposes referrer info as FLAT
// fields on each project (not a relationships array). Two parallel sets:
//   - referrerName / referrerPhoneNumber / referrerEmail            (individual)
//   - referrerOrganizationName / referrerOrganizationPhoneNumber...  (company)
// Plus a `referralSource` lookup like "Realtor", "Plumber" — categorical.
//
// There's no referrerContactId field in the list response, so we match by
// phone (deterministic) first, then by name token search (fuzzy fallback).
// match_method column tracks how each row was linked, useful for QA.
//
// Idempotent — UNIQUE(albi_project_id, albi_referrer_contact_id) on the
// table means re-running merges via upsert.
// ─────────────────────────────────────────────────────────────────────────

async function syncReferralsFromAlbi(quickMode) {
  if (ST._referralSyncing) return;
  ST._referralSyncing = true;
  // Quick mode: only scan projects from the last 30 days. Used for fast
  // spot-checks during the day when full sync (~3000 projects) would be
  // overkill. Full sync remains the authoritative refresh — quick mode
  // never deletes anything, just upserts recent rows.
  var quickCutoff = quickMode ? new Date(Date.now() - 30 * 86400000) : null;
  var modeLabel   = quickMode ? '⚡ Quick (30d)' : '🔄 Full sync';
  ST._referralSyncProgress = '⏳ Starting ' + modeLabel + '...';
  render();

  var startedAt = new Date();
  var t0 = Date.now();

  // 1. Open sync log row up front
  var logId = null;
  try {
    var logResp = await fetch(SB_URL + '/rest/v1/albi_referral_sync_log', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify({
        started_at:    startedAt.toISOString(),
        trigger:       quickMode ? 'manual-quick' : 'manual-full',
        triggered_by:  (window.JG_SHARED && window.JG_SHARED.auth && window.JG_SHARED.auth.currentEmail()) || 'unknown',
        market:        'Both',
        status:        'running'
      })
    });
    if (logResp.ok) {
      var logData = await logResp.json();
      logId = logData[0] ? logData[0].id : null;
    }
  } catch(e) { console.error('sync log open failed', e); }

  // 2. Build TWO partner indexes for hybrid matching:
  //    - byPhone: digits-only phone → partner (deterministic match)
  //    - byNameTokens: list of {tokens, partner} for fuzzy name matching
  var byPhone = {};
  var byNameTokens = [];
  ST.partners.forEach(function(p){
    if (p.phone) {
      var digits = String(p.phone).replace(/\D/g, '');
      if (digits.length >= 7) byPhone[digits] = p;
    }
    // Build token sets from name AND company for matching against either
    // referrerName or referrerOrganizationName
    var names = [];
    if (p.name)    names.push(p.name);
    if (p.company) names.push(p.company);
    names.forEach(function(n){
      var toks = String(n).toLowerCase().split(/[\s\-_,&\.]+/).filter(function(t){ return t.length >= 3; });
      if (toks.length) byNameTokens.push({ tokens: toks, partner: p });
    });
  });

  // Phone normalize helper
  function normPhone(s) {
    if (!s) return '';
    var d = String(s).replace(/\D/g, '');
    return d.length >= 7 ? d : '';
  }

  // Token match helper. Returns the best partner match or null. Best = the
  // one whose tokens have highest overlap with the query tokens AND share
  // the strongest distinctive token (the longest one).
  function matchByName(refName) {
    if (!refName) return null;
    var qToks = String(refName).toLowerCase().split(/[\s\-_,&\.]+/).filter(function(t){ return t.length >= 3; });
    if (!qToks.length) return null;

    var bestPartner = null;
    var bestScore   = 0;

    byNameTokens.forEach(function(entry){
      // Score: number of shared tokens, weighted by length (longer = more distinctive)
      var score = 0;
      entry.tokens.forEach(function(t){
        if (qToks.indexOf(t) !== -1) score += t.length;
      });
      // Require at least 2 shared tokens OR one ≥6-char token to count as a match.
      // Otherwise "Bob's Plumbing" matches "Bob Smith" on just "bob".
      var sharedCount = entry.tokens.filter(function(t){ return qToks.indexOf(t) !== -1; }).length;
      var hasLongShared = entry.tokens.some(function(t){ return qToks.indexOf(t) !== -1 && t.length >= 6; });
      if (score > bestScore && (sharedCount >= 2 || hasLongShared)) {
        bestScore = score;
        bestPartner = entry.partner;
      }
    });

    return bestPartner;
  }

  var projectsScanned       = 0;
  var projectsWithRef       = 0;
  var referralsInserted     = 0;
  var referralsUpdated      = 0;
  var matchedByPhone        = 0;
  var matchedByName         = 0;
  var referralsUnmatched    = 0;
  var skippedNoSalesPerson  = 0;
  var skippedInternalSource = 0;
  var errorMessage          = null;

  try {
    // 3. Paginate through Albi projects via existing GET proxy
    var page     = 1;
    var pageSize = 100;
    var maxPages = 30;
    var done     = false;

    while (!done && page <= maxPages) {
      ST._referralSyncProgress = '⏳ ' + modeLabel + ' · page ' + page + '... ' +
        projectsScanned + ' scanned, ' + projectsWithRef + ' had referrers, ' +
        (referralsInserted + referralsUpdated) + ' referrals saved';
      render();

      // No location parameter — Albi ignores it (returns all projects regardless).
      // We filter client-side using each project's own location field.
      var url = 'https://jg-proxy-v2.vercel.app/api/albi?pageSize=' + pageSize + '&page=' + page;
      var r = await fetch(url);
      if (!r.ok) throw new Error('Albi proxy returned ' + r.status + ' on page ' + page);
      var data = await r.json();
      var projects = data.Items || data.items || data.projects || data.data || (Array.isArray(data) ? data : []);

      if (!projects.length) { done = true; break; }

      // Quick mode early-termination check. Albi sorts newest first, so if
      // the first project on this page is already older than our cutoff,
      // we know every project from here on is older too — stop paginating.
      if (quickCutoff && projects.length > 0) {
        var firstProjDate = projects[0].createdAt ? new Date(projects[0].createdAt) : null;
        if (firstProjDate && !isNaN(firstProjDate.getTime()) && firstProjDate < quickCutoff) {
          done = true; break;
        }
      }

      // Process EVERY project regardless of which tab the user clicked
      // Sync from. Each project's `location` field tells us which market
      // it belongs to — we tag rows accordingly. Net effect: one Sync
      // populates both Appleton and Stevens Point at once. Saves the user
      // from having to switch tabs and click Sync twice.
      projectsScanned += projects.length;

      // 4. Process each project — extract flat referrer fields
      for (var i = 0; i < projects.length; i++) {
        var proj = projects[i];
        // Quick mode: skip individual projects older than cutoff. They might
        // appear in a later page even if this page mostly has recent ones,
        // so we still check per-project.
        if (quickCutoff) {
          var pd = proj.createdAt ? new Date(proj.createdAt) : null;
          if (pd && !isNaN(pd.getTime()) && pd < quickCutoff) continue;
        }
        var projectId   = String(proj.id || proj.Id || '');
        // The human-readable project code (e.g. "Gray-2943-WTR") lives in
        // the `name` field on Albi projects. `identifier` is sometimes the
        // numeric ID, which is unreadable on the dashboard. Try name first.
        var projectCode = proj.name || proj.identifier || null;
        if (!projectId) continue;

        // Revenue: per Josh — "total invoiced" maps to actualRevenue.
        // Also capture paidAmount for the collected-vs-invoiced story.
        var actualRev   = parseFloat(proj.actualRevenue || proj.estimatedRevenue || 0) || 0;
        var paidAmt     = parseFloat(proj.paidAmount || 0) || 0;
        var projStatus  = proj.status || null;
        var lossType    = proj.projectType || proj.propertyType || null;
        var refSource   = proj.referralSource || null;  // "Realtor", "Plumber", etc.
        var salesPersonName = (proj.salesPerson || '').trim();
        var createdDate = formatAlbiDate(proj.createdAt || proj.statusDate);
        var closedDate  = formatAlbiDate(proj.closed);

        // Filter 1: skip projects with no salesPerson assigned. These
        // are typically auto-imported records or unworked leads; they
        // shouldn't count as referral-driven business.
        if (!salesPersonName) { skippedNoSalesPerson++; continue; }

        // Filter 2: skip internal source categories that aren't real
        // partner referrals. "Program Work" is JG's internal marketing,
        // not an external relationship. Add other internal categories
        // here as we identify them.
        var INTERNAL_SOURCES = ['program work'];
        if (refSource && INTERNAL_SOURCES.indexOf(refSource.toLowerCase()) !== -1) {
          skippedInternalSource++;
          continue;
        }

        // Two possible referrer "shapes" on the project: an individual
        // referrer OR an organization referrer. They can both be set, in
        // which case we treat them as two distinct rows so each gets
        // attributed independently.
        var referrers = [];

        // Individual referrer
        var indName  = (proj.referrerName || proj.referrerContactName || '').trim();
        var indPhone = (proj.referrerPhoneNumber || proj.referrerContactPhoneNumber || '').trim();
        if (indName || indPhone) {
          referrers.push({
            kind:  'individual',
            name:  indName || null,
            phone: indPhone || null,
            // Synthetic "contact ID" — since Albi doesn't expose one in the
            // list response, build a stable key from the name+phone so the
            // UNIQUE constraint can dedupe rows across sync runs. Format:
            // "name:NormalizedName|phone:Digits" gives consistent identity.
            syntheticId: 'ind:' + (indName||'').toLowerCase().replace(/\s+/g,'_') +
                         (indPhone ? '|p:' + normPhone(indPhone) : '')
          });
        }

        // Organization referrer
        var orgName  = (proj.referrerOrganizationName || '').trim();
        var orgPhone = (proj.referrerOrganizationPhoneNumber || '').trim();
        if (orgName || orgPhone) {
          referrers.push({
            kind:  'organization',
            name:  orgName || null,
            phone: orgPhone || null,
            syntheticId: 'org:' + (orgName||'').toLowerCase().replace(/\s+/g,'_') +
                         (orgPhone ? '|p:' + normPhone(orgPhone) : '')
          });
        }

        if (!referrers.length) continue;
        projectsWithRef++;

        // 5. Match each referrer using the hybrid strategy.
        // Dedupe within the project: if both individual and organization
        // referrer fields point to the same partner record, count it once.
        // Prevents the double-counting we saw with single-rep partners
        // whose name appears as both Individual and Organization in Albi.
        var projectMatchedIds = {};
        var projectUnmatchedKeys = {};

        for (var j = 0; j < referrers.length; j++) {
          var ref = referrers[j];

          var matchedPartner = null;
          var matchMethod    = 'unmatched';

          // Phase 1: phone match (deterministic)
          if (ref.phone) {
            var refDigits = normPhone(ref.phone);
            if (refDigits && byPhone[refDigits]) {
              matchedPartner = byPhone[refDigits];
              matchMethod    = 'phone';
            }
          }

          // Phase 2: name token match (fuzzy fallback)
          if (!matchedPartner && ref.name) {
            matchedPartner = matchByName(ref.name);
            if (matchedPartner) {
              matchMethod = 'name';
            }
          }

          // Dedupe check — if matched, see if we've already inserted this
          // partner for this project. If unmatched, dedupe by syntheticId.
          if (matchedPartner) {
            if (projectMatchedIds[matchedPartner.id]) continue;
            projectMatchedIds[matchedPartner.id] = true;
          } else {
            if (projectUnmatchedKeys[ref.syntheticId]) continue;
            projectUnmatchedKeys[ref.syntheticId] = true;
          }

          // Counter increments AFTER dedupe so they reflect actual writes
          if (matchMethod === 'phone')      matchedByPhone++;
          else if (matchMethod === 'name')  matchedByName++;
          if (!matchedPartner)              referralsUnmatched++;

          var partnerId = matchedPartner ? matchedPartner.id : null;

          // 6. Upsert
          try {
            var upsertResp = await fetch(SB_URL + '/rest/v1/albi_referrals?on_conflict=albi_project_id,albi_referrer_contact_id', {
              method: 'POST',
              headers: {
                'apikey': SB_KEY,
                'Authorization': 'Bearer ' + SB_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'resolution=merge-duplicates,return=representation'
              },
              body: JSON.stringify({
                albi_project_id:           projectId,
                albi_project_code:         projectCode,
                albi_referrer_contact_id:  ref.syntheticId,
                albi_referrer_name:        ref.name,
                albi_referrer_phone:       ref.phone,
                referrer_partner_id:       partnerId,
                project_value:             actualRev,
                project_paid:              paidAmt,
                project_status:            projStatus,
                project_loss_type:         lossType,
                referral_source:           refSource,
                match_method:              matchMethod,
                sales_person:              salesPersonName,
                // Use the project's actual location field, NOT ST.market.
                // Each project knows its own market; ST.market was just the
                // tab the user happened to be on when they clicked Sync.
                market:                    proj.location || ST.market,
                project_created_date:      createdDate,
                project_closed_date:       closedDate,
                last_synced_at:            new Date().toISOString(),
                updated_at:                new Date().toISOString()
              })
            });
            if (upsertResp.ok) {
              var ud = await upsertResp.json().catch(function(){ return []; });
              if (Array.isArray(ud) && ud[0]) {
                var c = new Date(ud[0].created_at).getTime();
                var u = new Date(ud[0].updated_at).getTime();
                if (Math.abs(u - c) < 5000) referralsInserted++;
                else referralsUpdated++;
              } else referralsUpdated++;
            } else {
              console.error('Upsert failed:', await upsertResp.text());
            }
          } catch(upErr) {
            console.error('Upsert error project ' + projectId, upErr);
          }
        }
      }

      if (projects.length < pageSize) done = true;
      page++;
    }

    // 7. Close the sync log
    if (logId) {
      await fetch(SB_URL + '/rest/v1/albi_referral_sync_log?id=eq.' + logId, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          finished_at:           new Date().toISOString(),
          projects_scanned:      projectsScanned,
          referrals_inserted:    referralsInserted,
          referrals_updated:     referralsUpdated,
          referrals_unmatched:   referralsUnmatched,
          status:                'success',
          duration_ms:           Date.now() - t0
        })
      }).catch(function(e){ console.error('sync log close failed', e); });
    }

    ST._referralSyncProgress = '✓ ' + modeLabel + ' complete · ' + projectsScanned + ' projects scanned · ' +
      'skipped: ' + skippedNoSalesPerson + ' no-rep, ' + skippedInternalSource + ' internal · ' +
      projectsWithRef + ' kept · ' +
      referralsInserted + ' new + ' + referralsUpdated + ' updated · ' +
      'matched: ' + matchedByPhone + ' by phone, ' + matchedByName + ' by name · ' +
      referralsUnmatched + ' unmatched';

    if (typeof showOk === 'function') showOk('✓ Referral sync complete');

  } catch(err) {
    errorMessage = err && err.message ? err.message : String(err);
    console.error('Referral sync failed:', err);
    if (logId) {
      await fetch(SB_URL + '/rest/v1/albi_referral_sync_log?id=eq.' + logId, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          finished_at:    new Date().toISOString(),
          status:         'error',
          error_message:  errorMessage,
          projects_scanned:    projectsScanned,
          referrals_inserted:  referralsInserted,
          referrals_updated:   referralsUpdated,
          referrals_unmatched: referralsUnmatched,
          duration_ms:    Date.now() - t0
        })
      }).catch(function(e){ console.error('sync log error close failed', e); });
    }
    if (typeof showErr === 'function') showErr('Sync failed: ' + errorMessage);
    ST._referralSyncProgress = '✗ Sync failed: ' + errorMessage;
  }

  ST._referralSyncing = false;
  await loadAll();
  render();
}

// Tolerant date formatter — Albi sometimes returns ISO, sometimes "MM/DD/YYYY".
function formatAlbiDate(d) {
  if (!d) return null;
  try {
    var dt = new Date(d);
    if (isNaN(dt.getTime())) return null;
    return dt.toISOString().slice(0, 10);
  } catch(e) { return null; }
}

async function importFromAlbi() {
  try {
    var r = await fetch('https://jg-proxy-v2.vercel.app/api/albi', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'get_contacts',locationId:ST.market==='Appleton'?222:1477})
    });
    if(!r.ok) throw new Error('Albi fetch failed');
    var data = await r.json();
    var contacts = data.contacts||data.data||[];
    var imported = 0;
    for(var c of contacts.slice(0,50)) {
      var existing = ST.partners.find(function(p){return p.albi_contact_id===String(c.id);});
      if(!existing) {
        await sb('/rest/v1/sales_partners', {method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({
          name:(c.firstName||'')+' '+(c.lastName||''),
          company:c.companyName||'',
          phone:c.phoneNumber||c.phone||'',
          email:c.email||'',
          market:ST.market,
          albi_contact_id:String(c.id),
          status:'Prospect',
          type:'Other'
        })});
        imported++;
      }
    }
    alert('Imported '+imported+' new contacts from Albi');
    await loadAll();
  } catch(e) { alert('Albi import failed: '+e.message); }
}

function filteredPartners() {
  // Resolve "Mine" once per render rather than per-partner
  var myName = currentRepName();
  var q = ST.searchQ ? ST.searchQ.toLowerCase().trim() : '';
  return ST.partners.filter(function(p) {
    // Type filter. 'Referral' = virtual filter that hides Customer records
    // unless the user is actively searching (searches surface customers too).
    // 'All' = include everything. Specific type = exact match.
    if (ST.filterType === 'Referral') {
      // Hide customers UNLESS there's an active search query (so insurance calls,
      // lookups by name/phone, etc., can still find customer records).
      if (p.type === 'Customer' && !q) return false;
    } else if (ST.filterType !== 'All' && p.type !== ST.filterType) {
      return false;
    }
    if(ST.filterTier!=='All' && p.tier!==ST.filterTier) return false;
    // Rep filter: 'All' = no filter, 'Mine' = my partners, 'Unassigned' = no rep,
    // anything else = exact match on assigned_to. Admin-only control but the
    // filter logic is universal — reps hit the 'Mine' path via the toggle pill.
    if (ST.filterRep && ST.filterRep !== 'All') {
      if (ST.filterRep === 'Mine') {
        if (p.assigned_to !== myName) return false;
      } else if (ST.filterRep === 'Unassigned') {
        if (p.assigned_to) return false;
      } else {
        if (p.assigned_to !== ST.filterRep) return false;
      }
    }
    if(q) {
      // Phone match — strip non-digits on both sides and substring-compare.
      // Lets "920555" match "(920) 555-1234" etc.
      var phoneMatch = false;
      if (p.phone) {
        var digits = String(p.phone).replace(/\D/g,'');
        var qDigits = q.replace(/\D/g,'');
        if (qDigits && digits.indexOf(qDigits) !== -1) phoneMatch = true;
      }
      if (!phoneMatch) {
        // Token-based text match. Split the query on whitespace; every token
        // must appear somewhere in the combined searchable fields. This makes
        // "sure dry" match both "Sure Dry" AND "Sure-Dry Basement Systems"
        // (the punctuation between tokens doesn't matter — only that all
        // tokens appear in the haystack). Previously we did a single
        // .includes(q) which required the exact phrase including spacing,
        // so hyphenated/punctuated company names silently failed to match.
        var haystack = ((p.name||'') + ' ' + (p.company||'') + ' ' + (p.city||'')).toLowerCase();
        var tokens = q.split(/\s+/).filter(function(t){ return t.length > 0; });
        var allMatch = tokens.every(function(t){ return haystack.indexOf(t) !== -1; });
        if (!allMatch) return false;
      }
    }
    return true;
  });
}

function renderPartnerList() {
  // Re-render only the partner cards without losing input focus
  var listEl = document.getElementById('partner-list');
  if (!listEl) { render(); return; }
  var fp = filteredPartners();

  // Build referral count lookup from albi_referrals (source of truth).
  // Same pattern as the partners-tab render — kept local here so this
  // partial render path stays consistent without a global state coupling.
  var _refsByPartner = {};
  (ST.albiReferrals || []).forEach(function(r){
    if (!r.referrer_partner_id) return;
    if (!_refsByPartner[r.referrer_partner_id]) _refsByPartner[r.referrer_partner_id] = 0;
    _refsByPartner[r.referrer_partner_id]++;
  });

  // Update the hint line above the list. Kept in sync with the logic in
  // render() so typing into search doesn't make the hint disappear.
  var hintEl = document.getElementById('partner-hint');
  if (hintEl) {
    var hintHtml = '';
    if (ST.filterType === 'Referral') {
      if (ST.searchQ && ST.searchQ.trim()) {
        var custMatches = fp.filter(function(p){ return p.type === 'Customer'; }).length;
        if (custMatches > 0) {
          hintHtml = 'Search surfaced ' + custMatches + ' customer record' + (custMatches===1?'':'s') + ' matching "' + ST.searchQ + '".';
        }
      } else {
        var hiddenCust = ST.partners.filter(function(p){ return p.type === 'Customer'; }).length;
        if (hiddenCust > 0) {
          hintHtml = 'Hiding ' + hiddenCust.toLocaleString() + ' customer record' + (hiddenCust===1?'':'s') + '. Search or change type filter to see them.';
        }
      }
    }
    hintEl.innerHTML = hintHtml;
    hintEl.style.display = hintHtml ? 'block' : 'none';
  }

  var h = '';
  if (!fp.length) {
    h = '<div style="text-align:center;padding:40px;color:var(--muted);">No partners found.</div>';
  }
  // Pagination: only render the first N partner cards. Without this, ~6000
  // partner cards block the main thread for several seconds on first paint.
  // Search-as-you-type works against the FULL fp array (filteredPartners()
  // already returns everything matching the filters), only the rendering
  // is capped.
  var totalMatching = fp.length;
  var pageSize = ST.partnerPageSize || 200;
  var fpVisible = fp.slice(0, pageSize);
  fpVisible.forEach(function(p, idx) {
    var lastTouch = p.last_touch_date ? fmtDate(p.last_touch_date) : 'Never';
    var daysSince = p.last_touch_date ? Math.round((new Date() - new Date(p.last_touch_date+'T00:00:00'))/(1000*60*60*24)) : 999;
    var stale = daysSince > 30;
    var pid = p.id;
    var isChecked = ST.selectedIds && ST.selectedIds[pid];
    // Row click behavior depends on mode: normal = open detail, selection = toggle checkbox
    var rowClick = ST.selectionMode
      ? 'toggleRowSelection(\'' + pid + '\',' + idx + ',event)'
      : 'ST.selected=\'' + pid + '\';ST.modal=\'partner-detail\';render()';
    var rowBg = isChecked ? 'background:rgba(232,93,4,.06);border-color:rgba(232,93,4,.3);' : '';
    h += '<div class="partner-card" style="' + rowBg + '" onclick="' + rowClick + '">';
    if (ST.selectionMode) {
      h += '<input type="checkbox" ' + (isChecked?'checked':'') + ' onclick="event.stopPropagation();toggleRowSelection(\'' + pid + '\',' + idx + ',event)" style="width:18px;height:18px;accent-color:var(--orange);cursor:pointer;flex-shrink:0;">';
    }
    h += '<div class="partner-avatar" style="background:'+tierColor(p.tier||'C')+';">'+partnerInitials(p.name)+'</div>';
    h += '<div style="flex:1;min-width:0;">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">';
    h += '<span style="font-size:13px;font-weight:700;color:var(--navy);">'+p.name+'</span>';
    h += '<span class="type-badge" style="background:'+typeColor(p.type)+';color:#fff;">'+(p.type||'—')+'</span>';
    h += '<span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:rgba(13,45,94,.08);color:'+tierColor(p.tier||'C')+';">'+(p.tier||'C')+'-Tier</span>';
    if (stale && p.status === 'Active') h += '<span style="font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;background:rgba(192,32,32,.1);color:var(--danger);">⚠ Stale</span>';
    h += '</div>';
    // Subline: company · city · market — but dedupe if city and market are
    // the same string ("Appleton · Appleton" looked broken).
    var locParts = [];
    if (p.city) locParts.push(p.city);
    if (p.market && p.market !== p.city) locParts.push(p.market);
    var locStr = locParts.join(' · ');
    h += '<div style="font-size:11px;color:var(--muted);">'+(p.company||'')+(locStr?' · '+locStr:'')+'</div>';
    // Assigned-to badge: ALWAYS show. "Unassigned" in muted gray when no rep
    // is set so reps can see at a glance what needs claiming. Previously
    // only rendered when assigned_to was truthy, making unassigned partners
    // visually identical to claimed ones.
    var assignBg = p.assigned_to ? 'rgba(13,45,94,.08)' : 'rgba(192,32,32,.08)';
    var assignCol = p.assigned_to ? 'var(--navy)' : 'var(--danger)';
    var assignTxt = p.assigned_to ? '👤 '+_ve(p.assigned_to) : '👤 Unassigned';
    h += '<span style="font-size:9px;padding:1px 7px;border-radius:4px;background:'+assignBg+';color:'+assignCol+';font-weight:600;display:inline-block;margin-top:3px;">'+assignTxt+'</span>';
    h += '</div>';
    h += '<div style="text-align:right;flex-shrink:0;">';
    h += '<div style="font-size:11px;font-weight:600;color:'+(stale?'var(--danger)':'var(--muted)')+';">'+lastTouch+'</div>';
    h += '<div style="font-size:10px;color:var(--muted);">'+(p.touch_count||0)+' touches · '+(_refsByPartner[pid]||0)+' refs</div>';
    h += '</div>';
    if (!ST.selectionMode) {
      h += '<button style="padding:5px 12px;border-radius:6px;border:none;background:var(--orange);color:#fff;font-size:11px;font-weight:600;cursor:pointer;" onclick="event.stopPropagation();ST.modal=\'log-touch\';ST.selected=\''+pid+'\';render()">Log Touch</button>';
    }
    h += '</div>';
  });
  // "Load more" footer — only when there are matching partners we haven't
  // rendered yet. Increments the page size by 200 each click. Acceptable
  // tradeoff: power user wanting to see the whole list clicks 30 times
  // and gets a 5-second freeze; everyone else sees a fast page.
  if (totalMatching > fpVisible.length) {
    var remaining = totalMatching - fpVisible.length;
    h += '<div style="text-align:center;padding:14px;">';
    h += '<button onclick="ST.partnerPageSize=(ST.partnerPageSize||200)+200;renderPartnerList();" style="padding:8px 18px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--navy);font-size:12px;font-weight:700;cursor:pointer;font-family:DM Sans,sans-serif;">Load 200 more · ' + remaining.toLocaleString() + ' left</button>';
    if (remaining <= 1000) {
      h += '<button onclick="ST.partnerPageSize=999999;renderPartnerList();" style="margin-left:8px;padding:8px 18px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif;">Show all</button>';
    }
    h += '<div style="font-size:10px;color:var(--muted);margin-top:6px;">Tip: use search to find specific partners faster.</div>';
    h += '</div>';
  }
  listEl.innerHTML = h;
}

// Debounced render — consecutive calls within 16ms collapse to a single paint.
// This is a cheap win because the codebase has 26+ render() calls, many of which
// fire in sequence (e.g. modal close → state change → render → render again).
var _renderPending = null;
// Track last-rendered background signature so we can skip rebuilding the 1000+
// partner cards when only the modal opened/closed.
var _lastBgSig = null;
function render() {
  if (_renderPending) return;
  _renderPending = requestAnimationFrame(function(){
    _renderPending = null;
    try { _renderNow(); } catch(e){ console.error('render error:', e); }
  });
}

// Signature of all state that affects the background (non-modal) view.
// If this matches the last one, the background HTML would be identical — skip it.
function _bgSignature() {
  // Count selected ids cheaply — keys length is fine, we don't need the values
  var selCount = 0;
  if (ST.selectedIds) for (var k in ST.selectedIds) if (ST.selectedIds[k]) selCount++;
  return [
    ST.tab, ST.market, ST.filterType, ST.filterTier, ST.filterRep, ST.searchQ,
    ST.touchFilterRep, ST.touchFilterType, ST.touchFilterOutcome, ST.touchFilterRange, ST.touchSearchQ, ST.touchGroupBy,
    ST.partners.length, ST.touches.length, ST.followups.length, ST.routes.length,
    ST.loading ? 1 : 0,
    ST.selected || '',
    // Selection-mode state — without these, toggling Select / Cancel doesn't
    // re-render because the cached signature doesn't notice the change.
    ST.selectionMode ? 1 : 0,
    selCount,
    // Pagination — Load More clicks need to repaint the partner list.
    ST.partnerPageSize || 200,
    // Touch history toggle on partner detail
    ST.touchHistoryExpanded ? 1 : 0,
    ST.refHistoryExpanded ? 1 : 0,
    // Payout sheet state
    ST._payoutSheetReferralId || '',
    ST._payoutSheetEditingId || '',
    ST._payoutSheetSaving ? 1 : 0,
    (ST.referralPayouts || []).length,
    // Referral sync state — drives the spinner / progress UI
    ST._referralSyncing ? 1 : 0,
    ST._referralSyncProgress || '',
    // Inspector panel toggle
    ST._showInspector ? 1 : 0,
    ST._inspectResult || '',
    ST.referralYear || 'all',
    ST.referralRep || 'all',
    // Chases sub-tab state
    ST.touchSubTab || 'touches',
    ST.chaseYear || 'all',
    ST.chaseOutcome || 'all',
    ST._chaseEditingId || '',
    ST._chaseSaving ? 1 : 0,
    (ST.chases || []).length,
    // Route edit state
    ST.editingRouteId || '',
    // Calendar state
    ST.routesView || 'list',
    ST.calMonth || '',
    ST._calPopupRouteId || '',
    ST._calPopupTemplateId || '',
    ST._calPopupDate || '',
    (ST.routeTemplates || []).length
  ].join('|');
}

function _renderNow() {
  var a = document.getElementById('app');
  if (!a) return;

  // Refresh ST.today on every render. ST is initialized once at module load,
  // so if a tab is left open across midnight, ST.today goes stale and the
  // "Today" filter on the Touches tab silently shows zero results. Cheap
  // recompute, so just do it every render to make sure date math always
  // reflects the user's actual current local date.
  ST.today = _localDateStr();

  // Short-circuit: if only the modal state changed, skip the expensive
  // 1000-card background rebuild and only repaint the modal layer.
  var sig = _bgSignature();
  if (sig === _lastBgSig && a.innerHTML && a.innerHTML.indexOf('Loading...') === -1) {
    // Build modal HTML directly without the full render
    var mh = _buildModalHtml();
    var modalLayer = document.getElementById('modal-layer');
    if (modalLayer) modalLayer.innerHTML = mh;
    return;
  }
  _lastBgSig = sig;

  var h = '';

  // HEADER
  h += '<div class="sales-hdr">';
  h += '<div style="display:flex;align-items:center;gap:10px;">';
  h += '<div style="width:26px;height:26px;background:var(--orange);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;">📈</div>';
  h += '<span style="font-size:13px;font-weight:600;color:#fff;letter-spacing:-.3px;">JG Restoration <span style="color:var(--gold);">Sales</span></span>';
