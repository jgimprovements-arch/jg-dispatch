<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JG Restoration — Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0d2d5e;--orange:#e85d04;--gold:#f5a623;--bg:#f0ede8;--s1:#faf9f7;--s2:#f0ede8;--s3:#e8e4df;--brd:rgba(13,45,94,.12);--brdH:rgba(13,45,94,.3);--txt:#0d1f3c;--dim:#6b7a96;--mut:#a0abbf;--red:#c02020;--green:#2e7d32;--blue:#1565c0;--purp:#6a1b9a;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;padding:16px 20px;}
.mono{font-family:'DM Mono',monospace}
#jg-login{position:fixed;inset:0;background:rgba(13,29,60,.96);align-items:center;justify-content:center;z-index:9999;display:none;}
#jg-login-box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4);}
#jg-login-err{font-size:12px;color:#c0392b;margin-top:12px;min-height:16px;}
.hub-wrap{max-width:1100px;margin:0 auto;}
.hub-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding:16px 20px;background:var(--navy);border-radius:12px;color:#fff;}
.hub-header-left{display:flex;align-items:center;gap:14px;}
.hub-header img{height:36px;width:36px;border-radius:6px;}
.hub-title{font-size:18px;font-weight:700;letter-spacing:-.3px;}
.hub-title span{color:var(--gold);}
.hub-greeting{font-size:13px;color:rgba(255,255,255,.65);margin-top:2px;}
.hub-header-right{text-align:right;}
.hub-date{font-size:12px;color:rgba(255,255,255,.5);font-family:'DM Mono',monospace;}
.hub-time{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--gold);}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.kpi{background:var(--s1);border:1px solid var(--brd);border-radius:10px;padding:16px;position:relative;overflow:hidden;}
.kpi-label{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;margin-bottom:6px;}
.kpi-value{font-size:28px;font-weight:700;font-family:'DM Mono',monospace;color:var(--navy);line-height:1.1;}
.kpi-sub{font-size:11px;color:var(--dim);margin-top:4px;}
.kpi-accent{position:absolute;top:0;left:0;width:100%;height:3px;}
.kpi .live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.panel{background:var(--s1);border:1px solid var(--brd);border-radius:10px;overflow:hidden;}
.panel-hd{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd);}
.panel-title{font-size:12px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;}
.panel-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;font-family:'DM Mono',monospace;}
.panel-body{padding:14px 16px;min-height:120px;}
.panel-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(13,45,94,.06);}
.panel-row:last-child{border-bottom:none;}
.panel-empty{text-align:center;padding:30px 16px;color:var(--mut);font-size:13px;}
.emp-row{display:flex;align-items:center;gap:10px;}
.emp-avatar{width:30px;height:30px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0;}
.emp-name{font-size:13px;font-weight:600;}
.emp-role{font-size:10px;color:var(--dim);}
.emp-status{font-size:11px;font-family:'DM Mono',monospace;font-weight:600;}
.emp-status.clocked-in{color:var(--green);}
.emp-status.off{color:var(--mut);}
.alert-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(13,45,94,.06);}
.alert-row:last-child{border-bottom:none;}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.alert-text{font-size:12px;color:var(--txt);line-height:1.5;}
.alert-urgent{background:rgba(192,32,32,.06);border-radius:6px;padding:4px 8px;margin:-4px -8px;}
.quick-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.quick-link{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:14px;text-decoration:none;color:var(--txt);transition:all .15s;text-align:center;}
.quick-link:hover{border-color:var(--orange);transform:translateY(-1px);box-shadow:0 4px 12px rgba(13,45,94,.1);}
.quick-link .ql-icon{font-size:22px;margin-bottom:6px;}
.quick-link .ql-label{font-size:12px;font-weight:600;}
.quick-link .ql-sub{font-size:10px;color:var(--dim);margin-top:2px;}
.feed{background:var(--s1);border:1px solid var(--brd);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.feed-hd{padding:12px 16px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;}
.feed-title{font-size:12px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;}
.feed-body{padding:8px 16px;max-height:260px;overflow-y:auto;}
.feed-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(13,45,94,.04);font-size:12px;color:var(--dim);}
.feed-item:last-child{border-bottom:none;}
.feed-dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.feed-dot.qa{background:var(--orange);}
.feed-dot.dispatch{background:var(--blue);}
.feed-dot.sales{background:var(--green);}
.feed-dot.rebuttal{background:var(--red);}
.feed-time{font-size:10px;color:var(--mut);font-family:'DM Mono',monospace;margin-left:auto;flex-shrink:0;white-space:nowrap;}
.onboard-wrap{max-width:500px;margin:40px auto;background:var(--s1);border:1px solid var(--brd);border-radius:14px;padding:32px;text-align:center;}
.onboard-wrap h2{font-size:18px;color:var(--navy);margin-bottom:8px;}
.onboard-wrap p{font-size:13px;color:var(--dim);margin-bottom:20px;line-height:1.5;}
.onboard-wrap input,.onboard-wrap select{width:100%;padding:10px 12px;border-radius:6px;border:1.5px solid var(--brd);font-size:13px;margin-bottom:10px;font-family:'DM Sans',sans-serif;outline:none;}
.onboard-wrap input:focus,.onboard-wrap select:focus{border-color:var(--orange);}
.onboard-wrap button{background:var(--orange);color:#fff;border:none;padding:12px 28px;border-radius:6px;font-weight:700;cursor:pointer;font-size:14px;margin-top:8px;}
.cele-overlay{position:fixed;inset:0;background:rgba(13,29,60,.85);z-index:10000;display:flex;align-items:center;justify-content:center;}
.cele-card{background:#fff;border-radius:20px;padding:40px 48px;text-align:center;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.3);animation:celebIn .5s ease-out;}
@keyframes celebIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.cele-emoji{font-size:64px;margin-bottom:16px;}
.cele-title{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:8px;}
.cele-sub{font-size:14px;color:var(--dim);line-height:1.5;margin-bottom:20px;}
.cele-btn{background:var(--orange);color:#fff;border:none;padding:10px 28px;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr);}.panels{grid-template-columns:1fr;}.quick-row{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.kpi-value{font-size:22px;}.hub-header{flex-direction:column;gap:8px;text-align:center;}.hub-header-right{text-align:center;}}
</style>

<script>
const SB_URL='https://nuykvchgecpiuikoerze.supabase.co',SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const ADMIN_EMAILS=['josh@jg-restoration.com','jgimprovements@gmail.com'];
const ROLE_ACCESS={'Admin':['dispatch','rebuild','timeclock_admin','time_reports','sales','sales_admin','qa','adjuster','recon','intelligence','timeclock'],'Office':['rebuild','timeclock_admin','time_reports','sales','qa','adjuster','recon','intelligence','timeclock'],'Project Manager':['dispatch','rebuild','timeclock_admin','time_reports','timeclock'],'Technician':['timeclock'],'Sales':['sales','timeclock']};
const APP_LINKS={dispatch:{label:'Dispatch',icon:'📋',url:'index.html',desc:'Job board'},rebuild:{label:'Rebuild',icon:'🔨',url:'rebuild.html',desc:'Reconstruction scheduler'},timeclock_admin:{label:'Time Admin',icon:'⏱',url:'timeclock_admin.html',desc:'Payroll & PTO'},time_reports:{label:'Time Reports',icon:'📊',url:'time_reports.html',desc:'Hours by job'},sales:{label:'Sales',icon:'📈',url:'sales.html',desc:'CRM & routes'},qa:{label:'QA Review',icon:'🔍',url:'qa.html',desc:'Estimate audit'},adjuster:{label:'Rebuttal',icon:'⚖️',url:'adjuster.html',desc:'Adjuster disputes'},recon:{label:'Recon',icon:'🏗️',url:'recon.html',desc:'Rebuild scope'},intelligence:{label:'Intel',icon:'🧠',url:'intelligence.html',desc:'Adjuster data'},timeclock:{label:'Clock In',icon:'⏰',url:'timeclock.html',desc:'Time clock'},sales_admin:{label:'Admin',icon:'🛡',url:'admin.html',desc:'Access control'}};
const hdr={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
let _emp=null,_data={clockedIn:[],employees:[],alerts:[],feed:[],kpis:{reviews:0,missed:'$0',caught:'$0',defended:'$0',grade:'—',pushes:0,clockedCount:0,activeJobs:0}};

async function sb(path){try{const r=await fetch(SB_URL+path,{headers:hdr});if(!r.ok)return[];return await r.json()}catch(e){return[]}}
function timeAgo(d){const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function fmtTime(d){return new Date(d).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})}
function initials(n){return(n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function fmtMoney(n){return'$'+Math.round(n).toLocaleString()}

async function loadDashboard(){
  const today=new Date().toISOString().split('T')[0],monthStart=new Date(new Date().getFullYear(),new Date().getMonth(),1).toISOString(),weekAgo=new Date(Date.now()-7*86400000).toISOString();
  // Activity feed pulls from dispatch_assignments_history_v2 (audit log of all dispatcher actions).
  // Active jobs/unassigned counts come from dispatch_assignments_v2 + dispatch_unassigned_v2.
  const[employees,clockedIn,reviews,dispatchHistory,rebuttals,recentTouches,activeAssignments,unassignedJobs]=await Promise.all([
    sb('/rest/v1/employees?active=eq.true&select=id,name,role,market'),
    sb('/rest/v1/time_entries?clock_out=is.null&clock_in=gte.'+today+'T00:00:00&select=*'),
    sb('/rest/v1/qa_reviews?reviewed_at=gte.'+monthStart+'&select=grade,missed_revenue,job_name,reviewed_at'),
    sb('/rest/v1/dispatch_assignments_history_v2?changed_at=gte.'+monthStart+'&action=eq.INSERT&order=changed_at.desc&limit=20&select=actor,new_data,changed_at'),
    sb('/rest/v1/adjuster_rebuttals?created_at=gte.'+monthStart+'&select=total_disputed,items_defended,items_conceded,adjuster_name,created_at'),
    sb('/rest/v1/sales_touches?touched_at=gte.'+weekAgo+'&order=touched_at.desc&limit=10&select=partner_name,rep_name,touched_at'),
    sb('/rest/v1/dispatch_assignments_v2?or=(scheduled_date.is.null,scheduled_date.eq.'+today+')&select=id,job_id,tech_id'),
    sb('/rest/v1/dispatch_unassigned_v2?select=job_id,market')
  ]);
  _data.employees=employees;_data.clockedIn=clockedIn;
  const clockedIds=new Set(clockedIn.map(e=>e.employee_id));
  _data.kpis.clockedCount=clockedIn.length;
  _data.kpis.activeJobs=(activeAssignments||[]).length;
  _data.kpis.reviews=reviews.length;
  const totMissed=reviews.reduce((s,r)=>s+(r.missed_revenue||0),0);
  _data.kpis.missed=fmtMoney(totMissed);_data.kpis.caught=fmtMoney(totMissed);
  const gm={A:4,B:3,C:2,D:1,F:0},gr={4:'A',3:'B',2:'C',1:'D',0:'F'};
  const gs=reviews.filter(r=>r.grade&&gm[r.grade]!==undefined);
  if(gs.length){_data.kpis.grade=gr[Math.round(gs.reduce((s,r)=>s+gm[r.grade],0)/gs.length)]||'—';}
  const totDef=rebuttals.reduce((s,r)=>{const v=parseFloat((r.total_disputed||'$0').replace(/[$,]/g,''))||0;return s+(r.items_conceded===0?v:v*(r.items_defended||0)/Math.max((r.items_defended||0)+(r.items_conceded||0),1));},0);
  _data.kpis.defended=fmtMoney(totDef);
  _data.kpis.pushes=(dispatchHistory||[]).length;
  _data.alerts=[];
  const hour=new Date().getHours();
  if(hour>=8&&hour<16){employees.filter(e=>['Office','Project Manager','Admin'].includes(e.role)&&!clockedIds.has(e.id)).forEach(e=>{_data.alerts.push({icon:'⏰',text:'<strong>'+e.name.split(' ')[0]+'</strong> not clocked in',urgent:hour>=9})});}
  // Unassigned jobs alert — pulled from dispatch_unassigned_v2
  (unassignedJobs||[]).slice(0,5).forEach(j=>{_data.alerts.push({icon:'📋',text:'<strong>'+j.job_id+'</strong> unassigned ('+(j.market==='stevens_point'?'Stevens Point':'Appleton')+')',urgent:true});});
  _data.feed=[];
  reviews.slice(0,5).forEach(r=>_data.feed.push({type:'qa',text:r.job_name+' — Grade '+(r.grade||'?')+', '+fmtMoney(r.missed_revenue||0)+' missed',time:r.reviewed_at}));
  // Dispatch activity from v2 history (INSERT events = new assignments)
  (dispatchHistory||[]).slice(0,5).forEach(h=>{
    const nd=h.new_data||{};
    const actor=h.actor?h.actor.split(' ')[0]:'Dispatcher';
    _data.feed.push({type:'dispatch',text:actor+' assigned '+(nd.job_id||'job'),time:h.changed_at});
  });
  recentTouches.slice(0,5).forEach(t=>_data.feed.push({type:'sales',text:(t.rep_name?t.rep_name.split(' ')[0]:'Rep')+' touched '+t.partner_name,time:t.touched_at}));
  rebuttals.slice(0,3).forEach(r=>_data.feed.push({type:'rebuttal',text:'Rebuttal — '+(r.adjuster_name||'adjuster')+' '+fmtMoney(parseFloat((r.total_disputed||'0').replace(/[$,]/g,''))||0),time:r.created_at}));
  _data.feed.sort((a,b)=>new Date(b.time)-new Date(a.time));
  renderDashboard();
}

function renderDashboard(){
  const root=document.getElementById('hub-root'),user=JSON.parse(localStorage.getItem('jg_platform_user')||'{}');
  const firstName=(user.name||'').split(' ')[0]||'Team',now=new Date();
  const greeting=now.getHours()<12?'Good morning':'Good afternoon';
  const k=_data.kpis;let h='';
  h+=`<div class="hub-header"><div class="hub-header-left"><img src="https://jgimprovements-arch.github.io/jg-dispatch/logo.png" alt="JG"><div><div class="hub-title">JG <span>Command Center</span></div><div class="hub-greeting">${greeting}, ${firstName}</div></div></div><div class="hub-header-right"><div class="hub-date">${now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div><div class="hub-time" id="hub-clock">${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true})}</div></div></div>`;
  h+=`<div class="kpi-row"><div class="kpi"><div class="kpi-accent" style="background:var(--green)"></div><div class="kpi-label"><span class="live-dot"></span>On the Clock</div><div class="kpi-value">${k.clockedCount}</div><div class="kpi-sub">${_data.employees.length} total employees</div></div><div class="kpi"><div class="kpi-accent" style="background:var(--orange)"></div><div class="kpi-label">Active Jobs</div><div class="kpi-value">${k.activeJobs}</div><div class="kpi-sub">${k.pushes} dispatched this month</div></div><div class="kpi"><div class="kpi-accent" style="background:var(--blue)"></div><div class="kpi-label">AI $ Recovered</div><div class="kpi-value" style="color:var(--green)">${k.caught}</div><div class="kpi-sub">${k.reviews} QA reviews • Avg ${k.grade}</div></div><div class="kpi"><div class="kpi-accent" style="background:var(--red)"></div><div class="kpi-label">$ Defended</div><div class="kpi-value" style="color:var(--blue)">${k.defended}</div><div class="kpi-sub">Adjuster rebuttals this month</div></div></div>`;
  h+=`<div class="panels">`;
  // Employees
  h+=`<div class="panel"><div class="panel-hd"><span class="panel-title">Employees</span><span class="panel-badge" style="background:rgba(46,125,50,.1);color:var(--green)">${k.clockedCount} active</span></div><div class="panel-body">`;
  if(!_data.employees.length){h+=`<div class="panel-empty">No employee data</div>`}else{
    const cIds=new Set(_data.clockedIn.map(e=>e.employee_id));
    [..._data.employees].sort((a,b)=>(cIds.has(a.id)?0:1)-(cIds.has(b.id)?0:1)||(a.name||'').localeCompare(b.name||'')).forEach(emp=>{
      const isIn=cIds.has(emp.id),entry=isIn?_data.clockedIn.find(e=>e.employee_id===emp.id):null;
      const jobNote=entry&&entry.job_name?' • '+entry.job_name:'';
      h+=`<div class="panel-row"><div class="emp-row"><div class="emp-avatar" style="background:${isIn?'var(--green)':'var(--mut)'}">${initials(emp.name)}</div><div><div class="emp-name">${emp.name||'Unknown'}</div><div class="emp-role">${emp.role||'—'}${emp.market?' • '+emp.market:''}</div></div></div><div class="emp-status ${isIn?'clocked-in':'off'}">${isIn?'In '+fmtTime(entry.clock_in)+jobNote:'Off'}</div></div>`;
    });
  }
  h+=`</div></div>`;
  // Alerts
  h+=`<div class="panel"><div class="panel-hd"><span class="panel-title">Alerts</span>${_data.alerts.length?'<span class="panel-badge" style="background:rgba(192,32,32,.1);color:var(--red)">'+_data.alerts.length+'</span>':'<span class="panel-badge" style="background:rgba(46,125,50,.1);color:var(--green)">All clear</span>'}</div><div class="panel-body">`;
  if(!_data.alerts.length){h+=`<div class="panel-empty" style="color:var(--green)">✓ No alerts</div>`}else{_data.alerts.forEach(a=>{h+=`<div class="alert-row${a.urgent?' alert-urgent':''}"><span class="alert-icon">${a.icon}</span><span class="alert-text">${a.text}</span></div>`})}
  h+=`</div></div></div>`;
  // Quick links
  const role=(_emp&&_emp.role)||'Admin',allowed=Object.keys(APP_LINKS).filter(k=>(ROLE_ACCESS[role]||[]).includes(k));
  h+=`<div class="quick-row">`;allowed.forEach(key=>{const a=APP_LINKS[key];h+=`<a href="${a.url}" class="quick-link"><div class="ql-icon">${a.icon}</div><div class="ql-label">${a.label}</div><div class="ql-sub">${a.desc}</div></a>`});h+=`</div>`;
  // Feed
  h+=`<div class="feed"><div class="feed-hd"><span class="feed-title">Recent Activity</span><span style="font-size:11px;color:var(--dim)">This month</span></div><div class="feed-body">`;
  if(!_data.feed.length){h+=`<div class="panel-empty">No recent activity</div>`}else{_data.feed.slice(0,12).forEach(f=>{h+=`<div class="feed-item"><span class="feed-dot ${f.type}"></span><span>${f.text}</span><span class="feed-time">${timeAgo(f.time)}</span></div>`})}
  h+=`</div></div>`;
  root.innerHTML=h;
  setInterval(()=>{const el=document.getElementById('hub-clock');if(el)el.textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true})},1000);
}

// ══ AUTH ══
const _JG_KEY='jg_platform_user',_JG_EXP='jg_platform_exp';
function jgGoogleCb(r){try{const p=JSON.parse(atob(r.credential.split('.')[1]));if(!p.email.endsWith('@jg-restoration.com')){document.getElementById('jg-login-err').innerHTML='This page requires a <strong>@jg-restoration.com</strong> email.<br><span style="font-size:11px;color:#6b82a0;">Technicians: use the <a href="timeclock.html" style="color:#e85d04;font-weight:700;text-decoration:underline;">Time Clock PWA</a> instead.</span>';return;}const u={name:p.name||p.given_name,email:p.email,picture:p.picture||''};localStorage.setItem(_JG_KEY,JSON.stringify(u));localStorage.setItem(_JG_EXP,String(Date.now()+43200000));jgHideLogin();initHub(u);}catch(e){document.getElementById('jg-login-err').textContent='Sign in failed.';}}
function jgCheckAuth(){const r=localStorage.getItem(_JG_KEY),e=localStorage.getItem(_JG_EXP);if(r&&e&&Date.now()<parseInt(e)){jgHideLogin();initHub(JSON.parse(r));return true;}jgShowLogin();return false;}
function jgShowLogin(){const e=document.getElementById('jg-login');if(e)e.style.display='flex';}
function jgHideLogin(){const e=document.getElementById('jg-login');if(e)e.style.display='none';}
function jgSignOut(){if(confirm('Sign out?')){localStorage.removeItem(_JG_KEY);localStorage.removeItem(_JG_EXP);window.location.href='hub.html';}}
window.addEventListener('storage',e=>{if(e.key===_JG_KEY){if(e.newValue){jgHideLogin();initHub(JSON.parse(e.newValue));}else jgShowLogin();}});
Object.defineProperty(window,'currentUser',{get:()=>{try{return JSON.parse(localStorage.getItem(_JG_KEY)||'null')?.name||null;}catch(e){return null;}},configurable:true});

async function loadEmployeeProfile(email){try{const r=await fetch(SB_URL+'/rest/v1/employees?email=eq.'+encodeURIComponent(email.toLowerCase())+'&select=*&limit=1',{headers:hdr});const rows=await r.json();return rows&&rows.length?rows[0]:null;}catch(e){return null;}}

async function initHub(u){
  jgHideLogin();document.getElementById('hub-root').style.display='block';
  if(ADMIN_EMAILS.includes(u.email.toLowerCase())){
    _emp={name:u.name,email:u.email,role:'Admin',active:true};
    const s=JSON.parse(localStorage.getItem('jg_platform_user')||'{}');s.role='Admin';localStorage.setItem('jg_platform_user',JSON.stringify(s));
    loadDashboard();setInterval(loadDashboard,60000);
    loadEmployeeProfile(u.email).then(emp=>{setTimeout(()=>{checkBirthday(emp||_emp);checkWorkAnniversary(emp||_emp);},2500);});
    return;
  }
  const emp=await loadEmployeeProfile(u.email);
  if(!emp){showOnboarding(u);return;}
  if(emp.active===false&&emp.pending_approval){showPendingScreen(emp);return;}
  if(emp.active===false){showAccessDenied(emp);return;}
  _emp=emp;const s=JSON.parse(localStorage.getItem('jg_platform_user')||'{}');s.role=emp.role;s.market=emp.market;localStorage.setItem('jg_platform_user',JSON.stringify(s));
  loadDashboard();setInterval(loadDashboard,60000);setTimeout(()=>{checkBirthday(emp);checkWorkAnniversary(emp);},2500);
}

function showOnboarding(u){const root=document.getElementById('hub-root');root.innerHTML=`<div class="onboard-wrap"><div style="font-size:48px;margin-bottom:12px">👋</div><h2>Welcome to JG Restoration</h2><p>We don't have you in the system yet. Fill out the info below and your manager will approve your access.</p><input type="text" id="ob-name" placeholder="Full name" value="${u.name||''}"><input type="text" id="ob-phone" placeholder="Phone number"><select id="ob-role"><option value="">Select your role...</option><option>Technician</option><option>Project Manager</option><option>Office</option><option>Sales</option><option>Estimator</option></select><select id="ob-market"><option value="">Select your market...</option><option>Appleton</option><option>Stevens Point</option></select><button onclick="submitOnboarding('${u.email}')">Submit for Approval</button><div id="ob-err" style="font-size:12px;color:var(--red);margin-top:10px;min-height:16px;"></div></div>`;}

async function submitOnboarding(email){const name=document.getElementById('ob-name').value.trim(),phone=document.getElementById('ob-phone').value.trim(),role=document.getElementById('ob-role').value,market=document.getElementById('ob-market').value;if(!name||!role||!market){document.getElementById('ob-err').textContent='All fields required.';return;}try{await fetch(SB_URL+'/rest/v1/employees',{method:'POST',headers:{...hdr,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify({name,email:email.toLowerCase(),phone,role,market,active:false,pending_approval:true,created_at:new Date().toISOString()})});showPendingScreen({name});}catch(e){document.getElementById('ob-err').textContent='Failed. Try again.';}}

function showPendingScreen(emp){document.getElementById('hub-root').innerHTML=`<div class="onboard-wrap"><div style="font-size:48px;margin-bottom:12px">⏳</div><h2>Pending Approval</h2><p>Thanks, ${(emp.name||'').split(' ')[0]}! Your account is awaiting manager approval.</p><p style="font-size:12px;color:var(--mut);">Contact the office at <strong>(920) 428-4200</strong> if you need immediate access.</p></div>`;}

function showAccessDenied(){document.getElementById('hub-root').innerHTML=`<div class="onboard-wrap"><div style="font-size:48px;margin-bottom:12px">🚫</div><h2>Access Disabled</h2><p>Your account has been deactivated. Contact the office at <strong>(920) 428-4200</strong>.</p><button onclick="jgSignOut()" style="background:var(--dim)">Sign Out</button></div>`;}

function checkBirthday(emp){if(!emp||!emp.birthday)return;const t=new Date(),b=new Date(emp.birthday+'T12:00:00');if(b.getMonth()===t.getMonth()&&b.getDate()===t.getDate()){const key='jg_bday_'+t.getFullYear()+'_'+emp.email;if(localStorage.getItem(key))return;localStorage.setItem(key,'shown');const el=document.createElement('div');el.className='cele-overlay';el.innerHTML=`<div class="cele-card"><div class="cele-emoji">🎂</div><div class="cele-title">Happy Birthday, ${(emp.name||'').split(' ')[0]}!</div><div class="cele-sub">The whole JG Restoration team wishes you an amazing day!</div><button class="cele-btn" onclick="this.closest('.cele-overlay').remove()">Thanks!</button></div>`;document.body.appendChild(el);}}

function checkWorkAnniversary(emp){if(!emp||!emp.start_date)return;const t=new Date(),s=new Date(emp.start_date+'T12:00:00');if(s.getMonth()===t.getMonth()&&s.getDate()===t.getDate()&&s.getFullYear()<t.getFullYear()){const y=t.getFullYear()-s.getFullYear(),key='jg_anniv_'+t.getFullYear()+'_'+emp.email;if(localStorage.getItem(key))return;localStorage.setItem(key,'shown');const el=document.createElement('div');el.className='cele-overlay';el.innerHTML=`<div class="cele-card"><div class="cele-emoji">🎉</div><div class="cele-title">${y} Year${y>1?'s':''} at JG!</div><div class="cele-sub">Congratulations, ${(emp.name||'').split(' ')[0]}! We appreciate you!</div><button class="cele-btn" onclick="this.closest('.cele-overlay').remove()">Thanks!</button></div>`;document.body.appendChild(el);}}

document.addEventListener('DOMContentLoaded',()=>{jgCheckAuth();});
</script>
