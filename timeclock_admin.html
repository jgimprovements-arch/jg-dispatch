  body += '<div style="background:#f8f9fc;border-radius:8px;padding:10px;"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;">'+thisYear+' Total</div><div style="font-size:20px;font-weight:700;color:var(--navy);">'+ytdAbsences.length+'</div></div>';
  var sickColor = sickCount >= sickLimit ? '#c62828' : sickCount >= sickLimit-1 ? '#e65100' : 'var(--navy)';
  body += '<div style="background:#f8f9fc;border-radius:8px;padding:10px;"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;">Sick YTD</div><div style="font-size:20px;font-weight:700;color:'+sickColor+';">'+sickCount+'<span style="font-size:11px;color:var(--muted);">/'+sickLimit+'</span></div></div>';
  var ptoColor = ptoAvail <= 8 ? '#c62828' : ptoAvail <= 24 ? '#e65100' : '#2e7d32';
  body += '<div style="background:#f8f9fc;border-radius:8px;padding:10px;"><div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;">PTO Left</div><div style="font-size:20px;font-weight:700;color:'+ptoColor+';">'+ptoAvail.toFixed(1)+'h</div></div>';
  body += '</div>';

  // Warning if over sick limit
  if (sickCount >= sickLimit) {
    body += '<div style="background:rgba(198,40,40,.06);border:1px solid rgba(198,40,40,.4);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:#c62828;"><strong>⚠ Exceeded sick day limit</strong> — '+sickCount+' sick days taken vs policy limit of '+sickLimit+'. Consider discussion or policy review.</div>';
  }

  // Breakdown by reason (YTD)
  if (sortedReasons.length) {
    body += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">'+thisYear+' Breakdown by Reason</div>';
    body += '<div style="background:#f8f9fc;border-radius:8px;padding:10px;margin-bottom:14px;">';
    sortedReasons.forEach(function(r) {
      var pct = Math.round(r[1] / ytdAbsences.length * 100);
      var isPaidPto = DEFAULT_PAID_PTO_REASONS.indexOf(r[0]) !== -1;
      var isPaidReg = PAID_REGULAR_REASONS.indexOf(r[0]) !== -1;
      var isUnpaid = DEFAULT_UNPAID_REASONS.indexOf(r[0]) !== -1 || DEFAULT_UNPAID_WITH_OPTION.indexOf(r[0]) !== -1;
      var typeBadge = (isPaidPto || isPaidReg) ? '<span style="font-size:9px;padding:2px 6px;background:rgba(46,125,50,.12);color:#2e7d32;border-radius:3px;margin-left:6px;font-weight:700;">PAID</span>'
        : isUnpaid ? '<span style="font-size:9px;padding:2px 6px;background:rgba(198,40,40,.12);color:#c62828;border-radius:3px;margin-left:6px;font-weight:700;">UNPAID DEFAULT</span>'
        : '';
      body += '<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:12px;">';
      body += '<div>'+r[0]+typeBadge+'</div>';
      body += '<div><strong>'+r[1]+'</strong> <span style="color:var(--muted);font-size:10px;">('+pct+'%)</span></div>';
      body += '</div>';
    });
    body += '</div>';
  }

  // Full absence list (reverse chronological)
  body += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">All Absences ('+empAbsences.length+')</div>';

  if (!empAbsences.length) {
    body += '<div style="background:#f8f9fc;border-radius:8px;padding:20px;text-align:center;color:var(--muted);font-size:12px;">No absences on record.</div>';
  } else {
    body += '<div style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;">';
    body += '<table style="width:100%;border-collapse:collapse;font-size:11px;">';
    body += '<thead style="background:rgba(13,45,94,.04);position:sticky;top:0;"><tr>';
    body += '<th style="padding:8px;text-align:left;">Date</th>';
    body += '<th style="padding:8px;text-align:left;">Reason</th>';
    body += '<th style="padding:8px;text-align:right;">Hrs</th>';
    body += '<th style="padding:8px;text-align:center;">Paid?</th>';
    body += '<th style="padding:8px;text-align:left;">Notes</th>';
    body += '<th style="padding:8px;"></th>';
    body += '</tr></thead><tbody>';
    empAbsences.sort(function(a,b){ return b.date.localeCompare(a.date); }).forEach(function(a) {
      var d = new Date(a.date + 'T12:00:00');
      var dateStr = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
      var hrs = parseFloat(a.hours) || ABSENCE_FULL_DAY;
      var c = classifyAbsence(a, emp);
      var paidBadge = c.category === 'pto_paid' ? '<span style="font-size:9px;padding:1px 5px;background:rgba(46,125,50,.15);color:#2e7d32;border-radius:3px;margin-left:4px;font-weight:700;">PTO</span>'
        : c.category === 'regular_paid' ? '<span style="font-size:9px;padding:1px 5px;background:rgba(13,45,94,.15);color:var(--navy);border-radius:3px;margin-left:4px;font-weight:700;">PAID</span>'
        : '<span style="font-size:9px;padding:1px 5px;background:rgba(198,40,40,.12);color:#c62828;border-radius:3px;margin-left:4px;font-weight:700;">UNPAID</span>';

      // Paid toggle — only shown for reasons where it makes sense to override
      var paidCell = '<span style="color:var(--muted);font-size:10px;">N/A</span>';
      if (c.category !== 'regular_paid') {  // Training/Shop are always paid, no toggle needed
        var isCurrentlyPaid = (c.category === 'pto_paid');
        var emoji = isCurrentlyPaid ? '✅' : '❌';
        var label = isCurrentlyPaid ? 'Paid' : 'Unpaid';
        var color = isCurrentlyPaid ? '#2e7d32' : '#c62828';
        var nextState = isCurrentlyPaid ? 'false' : 'true';
        paidCell = '<button onclick="toggleAbsencePaid(\''+a.id+'\','+nextState+',\''+empName.replace(/\'/g,"\\'")+'\')" style="padding:2px 8px;border:1px solid '+color+';background:transparent;color:'+color+';border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;" title="Click to toggle">'+emoji+' '+label+'</button>';
      }

      body += '<tr style="border-top:1px solid var(--border);">';
      body += '<td style="padding:6px 8px;white-space:nowrap;">'+dateStr+'</td>';
      body += '<td style="padding:6px 8px;">'+(a.reason||'-')+paidBadge+'</td>';
      body += '<td style="padding:6px 8px;text-align:right;font-weight:700;">'+hrs.toFixed(0)+'h</td>';
      body += '<td style="padding:6px 8px;text-align:center;">'+paidCell+'</td>';
      body += '<td style="padding:6px 8px;color:var(--muted);font-size:10px;">'+(a.notes||'')+'</td>';
      body += '<td style="padding:6px 8px;text-align:right;"><button class="btn btn-sm" onclick="removeAbsenceFromHistory(\''+a.id+'\',\''+empName.replace(/\'/g,"\\'")+'\')" title="Remove this absence" style="font-size:10px;padding:2px 6px;">✕</button></td>';
      body += '</tr>';
    });
    body += '</tbody></table></div>';
  }

  // Footer actions
  body += '<div style="margin-top:12px;display:flex;gap:8px;">';
  body += '<button class="btn btn-primary" onclick="openAbsenceModal(\''+empName.replace(/\'/g,"\\'")+'\')" style="background:var(--orange);border-color:var(--orange);">+ Log Absence</button>';
  body += '</div>';

  showModal('📅 Absence History — '+empName, body, null);
}

// Toggle an absence between paid (PTO-deducted) and unpaid
async function toggleAbsencePaid(absenceId, newPaidState, empName) {
  if (!isAdmin()) { toast('Admin access required'); return; }
  var absence = (ST.absences || []).find(function(a){ return a.id === absenceId; });
  if (!absence) return;
  var emp = ST.employees.find(function(e){ return e.name === absence.employee_name; });
  if (!emp) return;

  // Compute current classification BEFORE the flip (to know if PTO was already deducted)
  var oldClass = classifyAbsence(absence, emp);
  var wasPaidFromPto = (oldClass.category === 'pto_paid');

  // Save the flag to Supabase
  var r = await fetch(SB_URL + '/rest/v1/absence_records?id=eq.' + absenceId, {
    method: 'PATCH',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ paid: newPaidState })
  });
  if (!r.ok) { toast('Update failed'); return; }

  absence.paid = newPaidState;

  // Adjust PTO balance based on state change
  var avail = parseFloat(emp.pto_hours_available || 0);
  var used = parseFloat(emp.pto_hours_used || 0);
  var hrs = parseFloat(absence.hours) || ABSENCE_FULL_DAY;

  if (newPaidState && !wasPaidFromPto) {
    // FLIPPED TO PAID — deduct PTO if balance allows, and only if reason is PTO-eligible
    if (isReasonEligibleForPtoPayment(absence.reason)) {
      var deduct = Math.min(hrs, avail);
      if (deduct > 0) {
        avail = Math.max(0, avail - deduct);
        used = used + deduct;
        await fetch(SB_URL + '/rest/v1/employees?id=eq.' + emp.id, {
          method: 'PATCH',
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ pto_hours_available: avail, pto_hours_used: used })
        });
        emp.pto_hours_available = avail;
        emp.pto_hours_used = used;
        toast('✓ Marked paid • '+deduct.toFixed(0)+'hr deducted from PTO ('+avail.toFixed(1)+'hr left)');
      } else {
        toast('⚠ Marked paid, but no PTO balance to deduct — will pay as regular hours');
      }
    } else {
      toast('✓ Marked paid — will pay as regular hours');
    }
  } else if (!newPaidState && wasPaidFromPto) {
    // FLIPPED TO UNPAID — refund PTO
    avail = avail + oldClass.paidHours;
    used = Math.max(0, used - oldClass.paidHours);
    await fetch(SB_URL + '/rest/v1/employees?id=eq.' + emp.id, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ pto_hours_available: avail, pto_hours_used: used })
    });
    emp.pto_hours_available = avail;
    emp.pto_hours_used = used;
    toast('✓ Marked unpaid • '+oldClass.paidHours.toFixed(0)+'hr returned to PTO');
  } else {
    toast('✓ Updated');
  }

  logActivity('Absence Paid Toggled', empName + ' — ' + absence.date + ' ' + absence.reason + ' → ' + (newPaidState?'PAID':'UNPAID'), 'time_clock', empName);
  await loadAll();
  openEmployeeAbsences(empName);  // re-open with fresh data
}

async function removeAbsenceFromHistory(absenceId, empName) {
  if (!confirm('Remove this absence? If it was PTO-paid, the balance will be restored.')) return;
  var absence = (ST.absences || []).find(function(a){ return a.id === absenceId; });
  if (!absence) return;

  await fetch(SB_URL + '/rest/v1/absence_records?id=eq.' + absenceId, {
    method: 'DELETE',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });

  // If this was a PTO-paid absence (default or via override), refund the balance
  var emp = ST.employees.find(function(e){ return e.name === absence.employee_name; });
  if (emp && isReasonEligibleForPtoPayment(absence.reason)) {
    var c = classifyAbsence(absence, emp);
    if (c.category === 'pto_paid' && c.paidHours > 0) {
      var newAvail = parseFloat(emp.pto_hours_available || 0) + c.paidHours;
      var newUsed = Math.max(0, parseFloat(emp.pto_hours_used || 0) - c.paidHours);
      await fetch(SB_URL + '/rest/v1/employees?id=eq.' + emp.id, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ pto_hours_available: newAvail, pto_hours_used: newUsed })
      });
      toast('✓ Absence removed • '+c.paidHours+'hr returned to PTO balance');
    } else {
      toast('✓ Absence removed');
    }
  } else {
    toast('✓ Absence removed');
  }

  logActivity('Absence Removed', empName + ' — ' + absence.date + ' ' + absence.reason, 'time_clock', empName);
  closeModal();
  await loadAll();
  openEmployeeAbsences(empName);  // re-open with fresh data
}

function _exportEmployeeAbsences(empName) {
  var empAbsences = (ST.absences || []).filter(function(a){ return a.employee_name === empName; });
  if (!empAbsences.length) { toast('No absences to export'); return; }
  var emp = ST.employees.find(function(e){ return e.name === empName; });
  var rows = [['Date','Day','Reason','Hours','Category','Notes','Logged By']];
  empAbsences.sort(function(a,b){ return b.date.localeCompare(a.date); }).forEach(function(a) {
    var d = new Date(a.date + 'T12:00:00');
    var c = classifyAbsence(a, emp);
    rows.push([
      a.date,
      d.toLocaleDateString('en-US',{weekday:'long'}),
      a.reason || '',
      (parseFloat(a.hours) || ABSENCE_FULL_DAY).toFixed(1),
      c.category,
      a.notes || '',
      a.logged_by || ''
    ]);
  });
  var csv = rows.map(function(r){
    return r.map(function(c){ var s=String(c==null?'':c).split('"').join('""'); return '"'+s+'"'; }).join(',');
  }).join('\n');
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = empName.replace(/[^a-z0-9]+/gi, '_') + '_absences_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('✓ Export downloaded');
}

// ── ABSENCE CLASSIFICATION ────────────────────────────────────────────────
// Defaults:
//   PTO, Personal Day, Bereavement, Jury Duty  → paid from PTO balance
//   Sick                                        → UNPAID by default (override with paid=true on record)
//   Training, Shop Time                         → paid as regular hours
//   No Call No Show, Injured, Missed On-Call    → unpaid
// Any record can have `paid: true/false` to override the default. `paid: null` uses default.
var ABSENCE_FULL_DAY = 8;
var DEFAULT_PAID_PTO_REASONS = ['PTO', 'Personal Day', 'Bereavement', 'Jury Duty'];
var DEFAULT_UNPAID_WITH_OPTION = ['Sick'];  // Unpaid by default but can be overridden
var PAID_REGULAR_REASONS = ['Training', 'Shop Time'];
var DEFAULT_UNPAID_REASONS = ['No Call No Show', 'Injured', 'Missed On-Call'];

function isReasonEligibleForPtoPayment(reason) {
  return DEFAULT_PAID_PTO_REASONS.indexOf(reason) !== -1
      || DEFAULT_UNPAID_WITH_OPTION.indexOf(reason) !== -1;
}

function classifyAbsence(absence, emp) {
  var reason = (absence.reason || '').trim();
  var hrs = absence.hours != null ? parseFloat(absence.hours) : ABSENCE_FULL_DAY;

  // Training / Shop Time — always paid as regular hours
  if (PAID_REGULAR_REASONS.indexOf(reason) !== -1) {
    return { paidHours: hrs, earningsCode: 'REG', category: 'regular_paid' };
  }

  // Determine whether this absence is paid — explicit override wins over default
  var explicitPaid = absence.paid;  // null/undefined = use default, true/false = override
  var shouldBePaid;
  if (explicitPaid === true) {
    shouldBePaid = true;
  } else if (explicitPaid === false) {
    shouldBePaid = false;
  } else {
    // Use default rules
    shouldBePaid = DEFAULT_PAID_PTO_REASONS.indexOf(reason) !== -1;
  }

  // If it's supposed to be paid AND employee has PTO balance, pay it
  if (shouldBePaid && isReasonEligibleForPtoPayment(reason)) {
    var ptoAvail = emp ? parseFloat(emp.pto_hours_available || 0) : 0;
    if (ptoAvail > 0) {
      var used = Math.min(hrs, ptoAvail);
      var code = reason === 'Sick' ? 'SIC' : (reason === 'PTO' ? 'VAC' : 'PTO');
      return { paidHours: used, earningsCode: code, category: 'pto_paid' };
    }
    // No PTO balance → forced unpaid (even if flagged paid, can't draw from empty balance)
    return { paidHours: 0, earningsCode: null, category: 'unpaid_tracked', forcedUnpaid: true };
  }

  // Explicitly paid but not a PTO-eligible reason (e.g., paying a No Call No Show as goodwill)
  // — pay as regular hours without touching PTO balance
  if (shouldBePaid) {
    return { paidHours: hrs, earningsCode: 'REG', category: 'regular_paid' };
  }

  // Unpaid / tracked only
  return { paidHours: 0, earningsCode: null, category: 'unpaid_tracked' };
}

// Sum absence hours for an employee in a pay period, returning breakdown
function getAbsenceHoursForPeriod(empName, periodStart, periodEnd) {
  var emp = ST.employees.find(function(e){ return e.name === empName; });
  var pStart = new Date(periodStart); pStart.setHours(0,0,0,0);
  var pEnd = new Date(periodEnd); pEnd.setHours(23,59,59,999);
  var breakdown = { ptoPaidHours: 0, regularPaidHours: 0, unpaidDays: 0, records: [] };

  (ST.absences || []).forEach(function(a) {
    if (a.employee_name !== empName) return;
    var d = new Date(a.date + 'T00:00:00');
    if (d < pStart || d > pEnd) return;
    var c = classifyAbsence(a, emp);
    if (c.category === 'pto_paid') breakdown.ptoPaidHours += c.paidHours;
    else if (c.category === 'regular_paid') breakdown.regularPaidHours += c.paidHours;
    else breakdown.unpaidDays += 1;
    breakdown.records.push({ absence: a, classification: c });
  });

  return breakdown;
}

// ── APPROVAL FUNCTIONS ───────────────────────────────────────────────────
function getApprovalKey(periodLabel, empName) {
  return periodLabel + '|' + empName;
}

function getApprovalStatus(periodLabel, empName) {
  var rec = ST.approvals[getApprovalKey(periodLabel, empName)];
  return rec ? rec.status : 'pending';
}

function getApprovedBy() {
  try {
    var u = JSON.parse(localStorage.getItem('jg_platform_user') || '{}');
    return u.name || u.email || 'Admin';
  } catch (e) { return 'Admin'; }
}

async function approveTimecard(periodLabel, empName) {
  if (!isAdmin()) { toast('Admin access required'); return; }
  var key = getApprovalKey(periodLabel, empName);
  var existing = ST.approvals[key];
  var nowIso = new Date().toISOString();
  var approver = getApprovedBy();

  var payload = {
    period_label: periodLabel,
    employee_name: empName,
    status: 'approved',
    approved_by: approver,
    approved_at: nowIso
  };

  if (existing && existing.id) {
    // Update existing record
    var r = await sb('/rest/v1/timecard_approvals?id=eq.' + existing.id, {
      method: 'PATCH',
      headers: { 'Prefer': 'return=representation' },
      body: JSON.stringify(payload)
    });
    if (r && r[0]) ST.approvals[key] = r[0];
  } else {
    // Insert new record
    var r2 = await sb('/rest/v1/timecard_approvals', {
      method: 'POST',
      headers: { 'Prefer': 'return=representation' },
      body: JSON.stringify(payload)
    });
    if (r2 && r2[0]) ST.approvals[key] = r2[0];
  }

  toast('✓ Timecard approved for ' + empName);
  logActivity('Timecard Approved', empName + ' — ' + periodLabel + ' (approved by ' + approver + ')', 'time_clock', empName);

  // Auto-verify any unverified entries in this period — admin approval is a stronger signal than tech self-verify
  try {
    var periods = getPayPeriods(ST.payPeriod.type, ST.payPeriod.start, 80);
    var period = periods.find(function(p){ return p.label === periodLabel; });
    if (period) {
      var perStart = period.start.toISOString();
      var perEnd = new Date(period.end); perEnd.setHours(23,59,59,999);
      var toVerify = ST.entries.filter(function(e) {
        return e.employee_name === empName
          && e.clock_out
          && !e.self_verified
          && new Date(e.clock_in) >= period.start
          && new Date(e.clock_in) <= perEnd;
      });
      for (var i = 0; i < toVerify.length; i++) {
        var entry = toVerify[i];
        await fetch(SB_URL + '/rest/v1/time_entries?id=eq.' + entry.id, {
          method: 'PATCH',
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ self_verified: true, self_verified_at: nowIso })
        });
        entry.self_verified = true;
        entry.self_verified_at = nowIso;
      }
    }
  } catch(err) { console.warn('Auto-verify failed:', err.message); }

  // Generate PDF download + snapshot to archive
  try {
    await generateAndArchiveTimecard(empName, periodLabel, approver, nowIso);
  } catch(err) { console.warn('PDF/archive failed:', err.message); }

  render();
}

async function approveAllTimecards(periodLabel, empNames) {
  if (!isAdmin()) { toast('Admin access required'); return; }
  if (!empNames || !empNames.length) return;
  if (!confirm('Approve ALL ' + empNames.length + ' timecards for ' + periodLabel + '? This locks entries from further edits.')) return;

  toast('Approving ' + empNames.length + ' timecards...');
  for (var i = 0; i < empNames.length; i++) {
    var nm = empNames[i];
    if (getApprovalStatus(periodLabel, nm) !== 'approved') {
      await approveTimecard(periodLabel, nm);
    }
  }
  toast('✓ All timecards approved & locked');
}

async function unlockTimecard(periodLabel, empName) {
  if (!isAdmin()) { toast('Admin access required'); return; }
  if (!confirm('Unlock ' + empName + "'s timecard for " + periodLabel + '? This reopens entries for edit.')) return;
  var key = getApprovalKey(periodLabel, empName);
  var existing = ST.approvals[key];
  if (!existing || !existing.id) { toast('No approval record found'); return; }

  var r = await sb('/rest/v1/timecard_approvals?id=eq.' + existing.id, {
    method: 'DELETE'
  });
  delete ST.approvals[key];
  toast('🔓 Timecard unlocked for ' + empName);
  logActivity('Timecard Unlocked', empName + ' — ' + periodLabel + ' (unlocked by ' + getApprovedBy() + ')', 'time_clock', empName);
  render();
}

// Admin manual verify/unverify — used for legacy entries or cleanup
async function toggleVerified(entryId, newState) {
  if (!isAdmin()) { toast('Admin access required'); return; }
  var entry = ST.entries.find(function(x){ return x.id === entryId; });
  if (!entry) return;
  var nowIso = new Date().toISOString();
  var body = { self_verified: !!newState };
  if (newState) body.self_verified_at = nowIso;
  else body.self_verified_at = null;

  var r = await fetch(SB_URL + '/rest/v1/time_entries?id=eq.' + entryId, {
    method: 'PATCH',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (r.ok) {
    entry.self_verified = !!newState;
    entry.self_verified_at = newState ? nowIso : null;
    toast(newState ? '✓ Marked verified' : 'Verification removed');
    logActivity(newState ? 'Entry Verified (admin)' : 'Entry Unverified (admin)', entry.employee_name + ' — ' + new Date(entry.clock_in).toLocaleString(), 'time_clock', entry.employee_name);
    render();
  } else {
    toast('Update failed');
  }
}

function exportPayrollReport(periodLabel, byEmp, curPer) {
  if (!byEmp || !Object.keys(byEmp).length) { toast('No data to export'); return; }

  // ─── Paychex Flex Import Format ───
  // Columns: Employee ID, Worked Date, Earnings Code, Hours, Department
  var paychexRows = [];
  paychexRows.push(['Employee ID', 'Worked Date', 'Earnings Code', 'Hours', 'Department']);

  var missingIds = [];
  var notApproved = [];

  Object.entries(byEmp).forEach(function(kv) {
    var nm = kv[0], d = kv[1];
    var emp = ST.employees.find(function(e){ return e.name === nm; });
    var paychexId = emp && emp.paychex_id ? emp.paychex_id : '';
    var dept = emp && emp.market ? emp.market : '';

    if (!paychexId) missingIds.push(nm);
    if (getApprovalStatus(periodLabel, nm) !== 'approved') notApproved.push(nm);

    // Paychex wants daily hours per employee, split reg/OT at 40/week
    // Group entries by week, then apply OT at the week level but distribute back to days
    var dailyMap = {};  // date → total minutes
    d.entries.forEach(function(e) {
      var eb = ST.breaks.filter(function(b){ return b.entry_id === e.id; });
      var mins = billableMins(e, eb);
      var day = e.clock_in.split('T')[0];
      dailyMap[day] = (dailyMap[day] || 0) + mins;
    });

    // Week-level OT calculation: for each week, total > 40hrs = OT
    var weekBuckets = {};
    Object.keys(dailyMap).sort().forEach(function(day) {
      var wk = _getWeekKey(day);
      if (!weekBuckets[wk]) weekBuckets[wk] = [];
      weekBuckets[wk].push({ day: day, mins: dailyMap[day] });
    });

    Object.values(weekBuckets).forEach(function(days) {
      var runningTotal = 0;
      days.forEach(function(dayObj) {
        var dayMins = dayObj.mins;
        var weekSoFar = runningTotal;
        var weekAfter = runningTotal + dayMins;
        var regMins, otMins;

        if (weekAfter <= 2400) {
          // Entire day is regular
          regMins = dayMins; otMins = 0;
        } else if (weekSoFar >= 2400) {
          // Entire day is OT
          regMins = 0; otMins = dayMins;
        } else {
          // Split day
          regMins = 2400 - weekSoFar;
          otMins = dayMins - regMins;
        }

        if (regMins > 0) {
          paychexRows.push([paychexId, dayObj.day, 'REG', (regMins/60).toFixed(2), dept]);
        }
        if (otMins > 0) {
          paychexRows.push([paychexId, dayObj.day, 'OVT', (otMins/60).toFixed(2), dept]);
        }
        runningTotal = weekAfter;
      });
    });

    // Emit absence rows for this employee in this period
    try {
      var periodsForAbs = getPayPeriods(ST.payPeriod.type, ST.payPeriod.start, 80);
      var periodMatch = periodsForAbs.find(function(p){ return p.label === periodLabel; });
      if (periodMatch) {
        var emp = ST.employees.find(function(x){ return x.name === nm; });
        (ST.absences || []).forEach(function(a) {
          if (a.employee_name !== nm) return;
          var ad = new Date(a.date + 'T00:00:00');
          if (ad < periodMatch.start || ad > periodMatch.end) return;
          var c = classifyAbsence(a, emp);
          if (c.paidHours > 0 && c.earningsCode) {
            paychexRows.push([paychexId, a.date, c.earningsCode, c.paidHours.toFixed(2), dept]);
          }
        });
      }
    } catch(err) { console.warn('Absence export failed:', err.message); }

    // Emit APPROVED (not yet paid) commissions/bonuses/referrals/spiffs earned this period
    // Paychex earnings codes: COM=Commission, BON=Bonus (used for bonus/referral/spiff)
    try {
      var periodsForComm = getPayPeriods(ST.payPeriod.type, ST.payPeriod.start, 80);
      var commPeriod = periodsForComm.find(function(p){ return p.label === periodLabel; });
      if (commPeriod) {
        var periodCommissions = (ST.commissions || []).filter(function(c) {
          if (c.employee_name !== nm) return false;
          if (c.status !== 'approved') return false;  // only approved-but-unpaid
          var d = new Date(c.earned_date + 'T00:00:00');
          return d >= commPeriod.start && d <= commPeriod.end;
        });
        periodCommissions.forEach(function(c) {
          var earningsCode = c.type === 'commission' ? 'COM' : 'BON';
          // For commissions/bonuses, Paychex wants dollar amount in "hours" column typically handled as flat dollar
          // Format: [paychexId, date, code, amount-as-dollars, dept]
          paychexRows.push([paychexId, c.earned_date, earningsCode, parseFloat(c.amount||0).toFixed(2), dept]);
        });
      }
    } catch(err) { console.warn('Commission export failed:', err.message); }
  });

  // ─── Summary report (human-readable, audit trail) ───
  var summaryRows = [];
  summaryRows.push(['JG Restoration — Payroll Summary']);
  summaryRows.push(['Pay Period', periodLabel]);
  summaryRows.push(['Generated', new Date().toLocaleString()]);
  summaryRows.push(['Generated By', getApprovedBy()]);
  summaryRows.push([]);
  summaryRows.push(['Employee', 'Paychex ID', 'Pay Type', 'Rate', 'Reg Hrs', 'OT Hrs', 'Total Hrs', 'Reg Pay', 'OT Pay', 'Gross', 'Status', 'Approved By', 'Approved At']);

  var grandTotal = 0, grandReg = 0, grandOT = 0, grandGross = 0;

  Object.entries(byEmp).forEach(function(kv) {
    var nm = kv[0], d = kv[1];
    var emp = ST.employees.find(function(e){ return e.name === nm; });
    var rate = emp ? parseFloat(emp.hourly_rate || 0) : 0;
    var payType = emp ? (emp.pay_type || 'hourly') : 'hourly';
    var paychexId = emp && emp.paychex_id ? emp.paychex_id : '(missing)';
    var ot = _calcOT(d.entries);
    var regHrs = ot.regMins / 60;
    var otHrs = ot.otMins / 60;
    var totalHrs = regHrs + otHrs;
    var regPay = 0, otPay = 0, gross = 0;

    if (payType === 'salary' && emp && emp.annual_salary) {
      var pp = parseFloat(emp.annual_salary) / (ST.payPeriod.type === 'weekly' ? 52 : ST.payPeriod.type === 'biweekly' ? 26 : 24);
      var pd = ST.payPeriod.type === 'weekly' ? 5 : 10;
      var wd = new Set(d.entries.map(function(e){ return e.clock_in.split('T')[0]; })).size;
      var md = Math.max(0, pd - wd);
      gross = pp - md * (pp / pd);
      regPay = gross;
      rate = emp.annual_salary + '/yr';
    } else if (rate) {
      regPay = rate * regHrs;
      otPay = rate * 1.5 * otHrs;
      gross = regPay + otPay;
    }

    grandReg += regHrs; grandOT += otHrs; grandTotal += totalHrs; grandGross += gross;

    var approval = ST.approvals[getApprovalKey(periodLabel, nm)] || {};
    var status = approval.status || 'pending';

    summaryRows.push([
      nm, paychexId, payType,
      (typeof rate === 'number' ? '$' + rate.toFixed(2) + '/hr' : rate),
      regHrs.toFixed(2), otHrs.toFixed(2), totalHrs.toFixed(2),
      '$' + regPay.toFixed(2), '$' + otPay.toFixed(2), '$' + gross.toFixed(2),
      status, approval.approved_by || '',
      approval.approved_at ? new Date(approval.approved_at).toLocaleString() : ''
    ]);
  });

  summaryRows.push([]);
  summaryRows.push(['TOTALS', '', '', '', grandReg.toFixed(2), grandOT.toFixed(2), grandTotal.toFixed(2), '', '', '$' + grandGross.toFixed(2)]);

  // ─── Pre-flight warnings ───
  var warnings = [];
  if (missingIds.length) warnings.push('⚠ Missing Paychex ID: ' + missingIds.join(', '));
  if (notApproved.length) warnings.push('⚠ Not approved yet: ' + notApproved.join(', '));

  if (warnings.length) {
    if (!confirm(warnings.join('\n\n') + '\n\nExport anyway? (Missing IDs will produce blank rows in Paychex)')) return;
  }

  // ─── Download both files ───
  var toCsv = function(rows) {
    return rows.map(function(r){
      return r.map(function(c){ var s = String(c == null ? '' : c).split('"').join('""'); return '"' + s + '"'; }).join(',');
    }).join('\n');
  };
  var download = function(csv, filename) {
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  };

  var safeName = periodLabel.replace(/[^a-z0-9]+/gi, '_');
  download(toCsv(paychexRows), 'paychex_import_' + safeName + '.csv');
  setTimeout(function() { download(toCsv(summaryRows), 'payroll_summary_' + safeName + '.csv'); }, 300);

  // Auto-mark approved commissions from this period as paid (they're now in the CSV)
  try {
    var pPeriods = getPayPeriods(ST.payPeriod.type, ST.payPeriod.start, 80);
    var pMatch = pPeriods.find(function(p){ return p.label === periodLabel; });
    if (pMatch) {
      var toMarkPaid = (ST.commissions || []).filter(function(c) {
        if (c.status !== 'approved') return false;
        var d = new Date(c.earned_date + 'T00:00:00');
        return d >= pMatch.start && d <= pMatch.end;
      });
      if (toMarkPaid.length) {
        toMarkPaid.forEach(function(c) {
          fetch(SB_URL + '/rest/v1/commissions?id=eq.' + c.id, {
            method: 'PATCH',
            headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'paid', paid_in_period: periodLabel })
          });
          c.status = 'paid';
          c.paid_in_period = periodLabel;
        });
        logActivity('Commissions Auto-Paid', toMarkPaid.length + ' entries marked paid via Paychex export — ' + periodLabel, 'commissions', null);
      }
    }
  } catch(err) { console.warn('Commission auto-mark-paid failed:', err.message); }

  logActivity('Payroll Export', periodLabel + ' — ' + Object.keys(byEmp).length + ' employees, $' + grandGross.toFixed(2) + ' gross' + (missingIds.length?' ('+missingIds.length+' missing IDs)':''), 'time_clock', null);
  toast('✓ Paychex import + summary downloaded');
}

function renderTimesheets() {
  var fmt = function(iso){ if(!iso)return ''; var d=new Date(iso),h=d.getHours()%12||12,m=d.getMinutes(),ap=d.getHours()>=12?'PM':'AM'; return h+':'+(m<10?'0':'')+m+' '+ap; };
  var fmtDur = function(mins){ if(!mins&&mins!==0)return '-'; return Math.floor(mins/60)+'h '+(mins%60)+'m'; };
  var durMins = function(e){ var out=e.clock_out?new Date(e.clock_out):new Date(); return Math.floor((out-new Date(e.clock_in))/60000); };

  var periods = getPayPeriods(ST.payPeriod.type, ST.payPeriod.start, 40);
  var selPeriod = ST.selPeriod || (periods[0] ? periods[0].label : null);

  var h = '';

  // Pay period settings card
  h += '<div class="card" style="margin-bottom:16px;">';
  h += '<div class="card-hdr" style="cursor:pointer;" onclick="var b=document.getElementById(\'pp-settings\');b.style.display=b.style.display===\'none\'?\'block\':\'none\'">';
  h += '<div class="card-title">Pay Period Settings</div><div style="font-size:11px;color:var(--muted);">Click to configure</div>';
  h += '</div>';
  h += '<div id="pp-settings" style="display:none;padding:14px;border-top:1px solid var(--border);">';
  h += '<div class="form-row">';
  h += '<div><label class="form-label">Period Type</label><select class="form-select" id="pp-type" onchange="ST.payPeriod.type=this.value;localStorage.setItem(\'jg_pay_period\',JSON.stringify(ST.payPeriod));savePayPeriodConfig();renderTimesheets();">';
  ['weekly','biweekly','semimonthly'].forEach(function(t){ h += '<option value="'+t+'"'+(ST.payPeriod.type===t?' selected':'')+'>'+({weekly:'Weekly',biweekly:'Bi-Weekly',semimonthly:'Semi-Monthly'}[t])+'</option>'; });
  h += '</select></div>';
  h += '<div><label class="form-label">First Period Start Date</label><input type="date" class="form-input" id="pp-start" value="'+ST.payPeriod.start+'" onchange="ST.payPeriod.start=this.value;localStorage.setItem(\'jg_pay_period\',JSON.stringify(ST.payPeriod));savePayPeriodConfig();renderTimesheets();"></div>';
  h += '</div>';
  h += '<div style="font-size:11px;color:var(--muted);margin-top:8px;">7:30 AM rule: Clock-ins before 7:30am are adjusted to 7:30am for billable hours unless admin approves early start.</div>';
  h += '</div></div>';

  // Period + employee filters
  h += '<div class="filter-bar">';
  h += '<select onchange="ST.selPeriod=this.value;ST.filterEmp=\'All\';renderTimesheets();" style="min-width:220px;">';
  h += '<option value="">-- Select Pay Period --</option>';
  periods.forEach(function(p){ h += '<option value="'+p.label+'"'+(p.label===selPeriod?' selected':'')+'>'+p.label+'</option>'; });
  h += '</select>';
  h += '<select onchange="ST.filterEmp=this.value;renderTimesheets();" style="min-width:160px;">';
  h += '<option value="All">All Employees</option>';
  var empNames = [...new Set(ST.entries.map(function(e){return e.employee_name;}))].sort();
  empNames.forEach(function(n){ h += '<option value="'+n+'"'+(ST.filterEmp===n?' selected':'')+'>'+n+'</option>'; });
  h += '</select>';
  h += '</div>';

  // Placeholder for Pay Period Summary — gets injected near the top after it's computed below
  h += '__PAY_PERIOD_SUMMARY_PLACEHOLDER__';

  // Placeholder for Approval Progress Banner — moved up so progress is visible without scrolling
  h += '__APPROVAL_BANNER_PLACEHOLDER__';

  var curPer = periods.find(function(p){ return p.label === selPeriod; });
  var filtered = ST.entries.filter(function(e){
    if (!curPer) return false;
    var d = new Date(e.clock_in); d.setHours(0,0,0,0);
    return d >= curPer.start && d <= curPer.end;
  }).filter(function(e){ return ST.filterEmp === 'All' || e.employee_name === ST.filterEmp; });

  // Group by employee
  var byEmp = {};
  filtered.forEach(function(e){
    if (!byEmp[e.employee_name]) byEmp[e.employee_name] = { entries: [], totalBillable: 0, totalActual: 0, earlyFlags: 0 };
    var breaks = ST.breaks.filter(function(b){ return b.entry_id === e.id; });
    byEmp[e.employee_name].entries.push(e);
    byEmp[e.employee_name].totalBillable += billableMins(e, breaks);
    byEmp[e.employee_name].totalActual += e.duration_minutes || durMins(e);
    if (isEarlyClockIn(e.clock_in) && !e.approved_early) byEmp[e.employee_name].earlyFlags++;
  });

  // Bug fix 2026-04-27: Salaried employees with zero clock-ins still need a
  // timecard for the period (their salary is the basis). Same for anyone with
  // commissions earned this period. Add them to byEmp with empty entries.
  if (curPer) {
    var perEndIncl = new Date(curPer.end); perEndIncl.setHours(23,59,59,999);
    (ST.employees || []).forEach(function(emp){
      if (!emp || emp.active === false) return;
      if (ST.filterEmp !== 'All' && emp.name !== ST.filterEmp) return;
      var isSalary = parseFloat(emp.annual_salary || 0) > 0;
      var hasComms = (ST.commissions || []).some(function(c){
        if (c.employee_name !== emp.name) return false;
        var dc = new Date((c.earned_date||'') + 'T00:00:00');
        return dc >= curPer.start && dc <= perEndIncl;
      });
      if ((isSalary || hasComms) && !byEmp[emp.name]) {
        byEmp[emp.name] = { entries: [], totalBillable: 0, totalActual: 0, earlyFlags: 0 };
      }
    });
  }

  if (!curPer) {
    h += '<div class="card"><div class="empty" style="padding:24px;">Select a pay period above</div></div>';
  } else if (!Object.keys(byEmp).length) {
    h += '<div class="card"><div class="empty" style="padding:24px;">No entries for this pay period</div></div>';
  } else {
    // Populate callback index for approval buttons
    _tcEmpKeys = Object.keys(byEmp).map(function(nm){ return [selPeriod, nm]; });

    // OT helpers
    function getWeekKey(iso) {
      var d = new Date(iso); var day = d.getDay();
      var diff = d.getDate() - day + (day === 0 ? -6 : 1);
      var mon = new Date(d); mon.setDate(diff); mon.setHours(0,0,0,0);
      return mon.toISOString().split('T')[0];
    }
    function calcOT(entries) {
      var weeks = {};
      entries.forEach(function(e){ var wk=getWeekKey(e.clock_in); if(!weeks[wk])weeks[wk]=[]; weeks[wk].push(e); });
      var regMins=0, otMins=0;
      Object.values(weeks).forEach(function(wkE){
        var wkMins=0;
        wkE.forEach(function(e){ var eb=ST.breaks.filter(function(b){return b.entry_id===e.id;}); wkMins+=billableMins(e,eb); });
        if(wkMins>2400){regMins+=2400;otMins+=(wkMins-2400);}else{regMins+=wkMins;}
      });
      return {regMins:regMins,otMins:otMins};
    }
    function fmtHM(mins){ var h2=Math.floor(mins/60),m2=Math.round(mins%60); return h2+'h '+(m2<10?'0':'')+m2+'m'; }

    // Split into pending vs approved
    var pendingEmps = {}, approvedEmps = {};
    Object.entries(byEmp).forEach(function(kv) {
      if (getApprovalStatus(selPeriod, kv[0]) === 'approved') approvedEmps[kv[0]] = kv[1];
      else pendingEmps[kv[0]] = kv[1];
    });

    // Precompute commissions-by-employee BEFORE rendering cards (cards reference it)
    // Fixes ordering bug where the summary block below would be the first
    // to populate this variable, but the card loop already needed it.
    var periodCommissionsByEmp = {};
    Object.keys(byEmp).forEach(function(nmPre) {
      var empCommsPre = (ST.commissions || []).filter(function(c) {
        if (c.employee_name !== nmPre) return false;
        if (c.status === 'paid') return false;
        var dc = new Date((c.earned_date||'') + 'T00:00:00');
        return dc >= curPer.start && dc <= curPer.end;
      });
      var totalPre = empCommsPre.reduce(function(s,c){return s+parseFloat(c.amount||0);},0);
      if (totalPre > 0) {
        periodCommissionsByEmp[nmPre] = { total: totalPre, items: empCommsPre };
      }
    });

    // Employee summary cards (PENDING ONLY — approved collapsed to separate section below)
    var pendingKeys = Object.keys(pendingEmps);
    if (pendingKeys.length) {
      h += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">⏳ Pending Review ('+pendingKeys.length+')</div>';
      h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:16px;">';
      Object.entries(pendingEmps).forEach(function(kv){
      var nm=kv[0], d=kv[1];
      var emp=ST.employees.find(function(e){return e.name===nm;});
      var isSalary = emp && emp.pay_type==='salary';
      var rate=emp?parseFloat(emp.hourly_rate||0):0;
      var ot=calcOT(d.entries);
      var regPay=0, otPay=0, totalPay=0;
      if(isSalary&&emp.annual_salary){
        var annSal=parseFloat(emp.annual_salary);
        var perPeriodDays=ST.payPeriod.type==='weekly'?5:10;
        var periodPay=annSal/(ST.payPeriod.type==='weekly'?52:ST.payPeriod.type==='biweekly'?26:24);
        var workedDays=new Set(d.entries.map(function(e){return e.clock_in.split('T')[0];})).size;
        var missedDays=Math.max(0,perPeriodDays-workedDays);
        regPay=periodPay-missedDays*(periodPay/perPeriodDays); totalPay=regPay;
      } else {
        regPay=rate*(ot.regMins/60); otPay=rate*1.5*(ot.otMins/60); totalPay=regPay+otPay;
      }

      // PTO / absence hours breakdown for this employee in this period
      var absBrk = getAbsenceHoursForPeriod(nm, curPer.start, curPer.end);
      var ptoPayForCard = 0, trainingPayForCard = 0;
      if (!isSalary && rate) {
        ptoPayForCard = rate * absBrk.ptoPaidHours;
        trainingPayForCard = rate * absBrk.regularPaidHours;
        totalPay += ptoPayForCard + trainingPayForCard;
      }

      // Card is clickable — opens full timecard modal for this employee
      var safeNm = nm.replace(/'/g, "\\'");
      h += '<div class="card timecard-clickable" style="padding:16px;margin:0;cursor:pointer;transition:box-shadow .15s;" onclick="openTimecardDetail(\''+safeNm+'\')" onmouseover="this.style.boxShadow=\'0 4px 12px rgba(13,45,94,.12)\'" onmouseout="this.style.boxShadow=\'\'">';
      h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><div style="font-size:13px;font-weight:700;color:var(--navy);">'+nm+'</div><span style="font-size:10px;color:var(--muted);">📋 Click to open</span></div>';
      h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;">';
      h += '<div style="background:rgba(13,45,94,.04);border-radius:8px;padding:8px;text-align:center;"><div style="font-size:16px;font-weight:700;color:var(--navy);">'+fmtHM(ot.regMins)+'</div><div style="font-size:10px;color:var(--muted);font-weight:600;">REG HRS</div></div>';
      h += '<div style="background:'+(ot.otMins>0?'rgba(198,40,40,.06)':'rgba(13,45,94,.04)')+'";border-radius:8px;padding:8px;text-align:center;"><div style="font-size:16px;font-weight:700;color:'+(ot.otMins>0?'#c62828':'var(--muted)')+';">'+fmtHM(ot.otMins)+'</div><div style="font-size:10px;color:var(--muted);font-weight:600;">OT HRS</div></div>';
      h += '</div>';

      // PTO / training / unpaid breakdown row — only show if any absences in period
      if (absBrk.ptoPaidHours > 0 || absBrk.regularPaidHours > 0 || absBrk.unpaidDays > 0) {
        h += '<div style="background:rgba(46,125,50,.04);border:1px solid rgba(46,125,50,.2);border-radius:8px;padding:8px;margin-bottom:10px;font-size:11px;">';
        if (absBrk.ptoPaidHours > 0) {
          h += '<div style="display:flex;justify-content:space-between;"><span style="color:#2e7d32;">🏖 PTO / Sick paid</span><strong>'+absBrk.ptoPaidHours.toFixed(1)+'h</strong></div>';
        }
        if (absBrk.regularPaidHours > 0) {
          h += '<div style="display:flex;justify-content:space-between;"><span style="color:var(--navy);">📚 Training / Shop</span><strong>'+absBrk.regularPaidHours.toFixed(1)+'h</strong></div>';
        }
        if (absBrk.unpaidDays > 0) {
          h += '<div style="display:flex;justify-content:space-between;"><span style="color:#c62828;">⚠ Unpaid days</span><strong>'+absBrk.unpaidDays+'</strong></div>';
        }
        h += '</div>';
      }
      if(isSalary&&emp.annual_salary){
        var pp3=parseFloat(emp.annual_salary)/(ST.payPeriod.type==='weekly'?52:ST.payPeriod.type==='biweekly'?26:24);
        var wd3=new Set(d.entries.map(function(e){return e.clock_in.split('T')[0];})).size;
        var pd3=ST.payPeriod.type==='weekly'?5:10;
        var md3=Math.max(0,pd3-wd3);

    if (pendingFiltered.length) {
      h += '<div class="card"><div class="card-hdr"><div class="card-title">Time Entries — '+selPeriod+' <span style="font-size:11px;font-weight:400;color:var(--muted);">(approved entries hidden above)</span></div></div>';

      pendingFiltered.sort(function(a,b){return new Date(a.clock_in)-new Date(b.clock_in);});
      pendingFiltered.forEach(function(e){
      var breaks=ST.breaks.filter(function(b){return b.entry_id===e.id;});
      var actual=e.duration_minutes||durMins(e);
      var bill=billableMins(e,breaks);

      var early=isEarlyClockIn(e.clock_in);
      var active=!e.clock_out;
      // Missed clock-out: active entry over 12 hours old
      var missedCO = active && ((Date.now() - new Date(e.clock_in).getTime()) > 12*60*60*1000);
      var flagCell='';
      if(missedCO) {
        flagCell='<span style="color:#c62828;font-size:11px;font-weight:700;">&#9888; Missed clock-out<br><button class="btn btn-sm" onclick="editEntry(\''+e.id+'\')">Fix</button> <button class="btn btn-sm" onclick="notifyMissedCO(\''+e.id+'\')" style="background:#6a1b9a;color:#fff;border-color:#6a1b9a;">🔔 Notify</button></span>';
      }
      else if(early&&!e.approved_early) flagCell='<span style="color:#c62828;font-size:11px;font-weight:700;">Early<br><button class="btn btn-sm" onclick="approveEarly(\''+e.id+'\')">Approve</button></span>';
      else if(early&&e.approved_early) flagCell='<span style="color:#2e7d32;font-size:11px;">Early OK</span>';
      // Verified indicator — admin can manually toggle for cleanup of legacy data
      var verifiedCell;
      if (e.self_verified) {
        verifiedCell = '<span title="Verified — click to unverify" style="color:#2e7d32;font-size:16px;font-weight:700;cursor:pointer;" onclick="toggleVerified(\''+e.id+'\',false)">&#10003;</span>';
      } else if (active) {
        verifiedCell = '<span style="color:var(--muted);font-size:11px;">—</span>';
      } else {
        verifiedCell = isAdmin()
          ? '<button title="Mark as verified" onclick="toggleVerified(\''+e.id+'\',true)" style="padding:2px 8px;border:1px solid #c62828;background:transparent;color:#c62828;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;">unverified</button>'
          : '<span title="Not self-verified" style="color:#c62828;font-size:11px;">unverified</span>';
      }
      var rowBg = missedCO ? 'background:rgba(198,40,40,.08);' : (early&&!e.approved_early?'background:rgba(198,40,40,.04);':'');
      h += '<tr style="'+rowBg+'">';
      h += '<td><strong>'+e.employee_name+'</strong></td>';
      h += '<td>'+fmtD(new Date(e.clock_in))+'</td>';
      h += '<td class="mono"'+(early&&!e.approved_early?' style="color:#c62828;font-weight:700;"':'')+'>'+fmt(e.clock_in)+'</td>';
      h += '<td class="mono">'+(active?(missedCO?'<span class="badge" style="background:#c62828;color:#fff;">MISSED</span>':'<span class="badge badge-green">Active</span>'):fmt(e.clock_out))+'</td>';
      h += '<td>'+fmtDur(actual)+'</td>';
      h += '<td><strong>'+fmtDur(bill)+'</strong></td>';
      h += '<td>'+(bkMins?fmtDur(bkMins):'-')+'</td>';
      h += '<td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+(e.job_name||'-')+'</td>';
      h += '<td style="text-align:center;">'+verifiedCell+'</td>';
      h += '<td>'+flagCell+'</td>';
      var tcApproved = getApprovalStatus(selPeriod, e.employee_name) === 'approved';
      if (tcApproved) {
        h += '<td><span style="font-size:10px;color:var(--muted);">🔒 Locked</span></td>';
      } else {
        h += '<td>'+(isAdmin()?'<button class="btn btn-sm" onclick="editEntry(\''+e.id+'\')">Edit</button> <button class="btn btn-sm" onclick="openBreakEditor(\''+e.id+'\')" style="background:#6a1b9a;color:#fff;border-color:#6a1b9a;" title="Edit breaks">☕</button>':'<button class="btn btn-sm" onclick="viewEntry(\''+e.id+'\')">View</button>')+'</td>';
      }
      h += '</tr>';
    });
      h += '</tbody></table></div>';
    } // end if pendingFiltered.length

    // Absence records — hide absences for employees whose timecards are already approved
    // (those absences are now included in the approved timecard archive)
    var periodAbsences=ST.absences.filter(function(a){
      if(!curPer)return false;
      var d3=new Date(a.date+'T00:00:00'); d3.setHours(0,0,0,0);
      return d3>=curPer.start&&d3<=curPer.end;
    }).filter(function(a){return ST.filterEmp==='All'||a.employee_name===ST.filterEmp;})
      .filter(function(a){ return getApprovalStatus(selPeriod, a.employee_name) !== 'approved'; });
    if(periodAbsences.length){
      h += '<div class="card" style="margin-top:12px;"><div class="card-hdr"><div class="card-title">Absences / Out of Office <span style="font-size:11px;font-weight:400;color:var(--muted);">(approved employees\' absences shown in archive above)</span></div></div>';
      h += '<table class="tc-table"><thead><tr><th>Employee</th><th>Date</th><th>Reason</th><th>Market</th><th>Notes</th><th></th></tr></thead><tbody>';
      periodAbsences.forEach(function(a){
        var badge=({'Sick':'badge-red','PTO':'badge-green','No Call No Show':'badge-red','Personal Day':'badge-warn','Injured':'badge-red','Training':'badge-green','Shop Time':'badge-warn','Jury Duty':'badge-gray','Bereavement':'badge-gray'}[a.reason])||'badge-gray';
        h += '<tr><td><strong>'+a.employee_name+'</strong></td><td>'+fmtD(new Date(a.date+'T00:00:00'))+'</td>';
        h += '<td><span class="badge '+badge+'">'+a.reason+'</span></td>';
        h += '<td>'+(a.market||'-')+'</td><td style="font-size:11px;color:var(--muted);">'+(a.notes||'')+'</td>';
        h += '<td><button class="btn btn-sm btn-danger" onclick="deleteAbsence(\''+a.id+'\')">Remove</button></td></tr>';
      });
      h += '</tbody></table></div>';
    }
    h += '</div>';
  }

  // (Swap requests moved to dedicated 🔄 Swaps tab)

  // Correction requests
  var corrList = (ST.corrections||[]).filter(function(c){
    return ST.filterEmp === 'All' || c.employee_name === ST.filterEmp;
  });
  if (corrList.length) {
    h += '<div class="card" id="corrections-card" style="margin-top:16px;"><div class="card-hdr" style="display:flex;align-items:center;justify-content:space-between;">';
    h += '<div class="card-title">✏️ Correction Requests</div></div>';
    h += '<table class="tc-table"><thead><tr><th>Employee</th><th>Date</th><th>Type</th><th>Note</th><th>Status</th><th></th></tr></thead><tbody>';
    corrList.forEach(function(c){
      var entry = ST.entries.find(function(e){ return e.id === c.entry_id; });
      var dateStr = entry ? fmtD(new Date(entry.clock_in)) : '-';
      var typeLabel = {wrong_time:'Wrong Time',missed_punch:'Missed Punch',wrong_job:'Wrong Job',break:'Break Issue',other:'Other'}[c.correction_type]||c.correction_type;
      var statusBadge = c.status==='pending' ? '<span class="badge badge-warn">Pending</span>' : c.status==='approved' ? '<span class="badge badge-green">Approved</span>' : '<span class="badge badge-gray">Dismissed</span>';
      h += '<tr>';
      h += '<td><strong>'+c.employee_name+'</strong></td>';
      h += '<td>'+dateStr+'</td>';
      h += '<td>'+typeLabel+'</td>';
      h += '<td style="font-size:11px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+c.notes+'</td>';
      h += '<td>'+statusBadge+'</td>';
      h += '<td style="display:flex;gap:4px;">';
      if (c.status==='pending' && isAdmin()) {
        h += '<button class="btn btn-sm" style="background:#2e7d32;color:#fff;border-color:#2e7d32;" onclick="resolveCorrection(\''+c.id+'\',\'approved\',\''+c.entry_id+'\')">✓ Approve</button>';
        h += '<button class="btn btn-sm btn-danger" onclick="resolveCorrection(\''+c.id+'\',\'dismissed\',null)">✕</button>';
      }
      h += '</td></tr>';
    });
    h += '</tbody></table></div>';
  }

  // Safety: if the summary wasn't computed (e.g., no entries in period), strip the placeholder
  h = h.replace('__PAY_PERIOD_SUMMARY_PLACEHOLDER__', '');

  document.getElementById('tc-body').innerHTML = h;
}

// ═════════════════════════════════════════════════════════════════════
// ON-CALL SWAP MODULE — Phase 2 rebuild
// Replaces the old stub resolveSwap() with a full admin surface:
// - renderSwaps: dedicated tab with Pending / Approved / Denied / Dismissed filters
// - _swapApprove: updates status, writes reviewed_by, MUTATES oncall_schedule,
//                 checks OT risk, inserts notifications
// - _swapDeny: captures denial reason, notifies requester
// - _swapDismiss: soft archive without action
// ═════════════════════════════════════════════════════════════════════

var _swapFilter = { status: 'pending' };

function renderSwaps() {
  if (!canApproveSwap()) { document.getElementById('tc-body').innerHTML = '<div class="card"><div class="empty" style="padding:24px;">Admin, Office, or PM access required.</div></div>'; return; }

  var list = ST.swapRequests || [];
  var pending = list.filter(function(s){ return s.status === 'pending'; });
  var approved = list.filter(function(s){ return s.status === 'approved'; });
  var denied = list.filter(function(s){ return s.status === 'denied'; });
  var dismissed = list.filter(function(s){ return s.status === 'dismissed'; });

  var h = '';
  h += '<div class="card" style="margin-bottom:16px;">';
  h += '<div class="card-hdr" style="display:flex;align-items:center;justify-content:space-between;">';
  h += '<div class="card-title">🔄 On-Call Swap Requests</div>';
  h += '<button class="btn btn-sm" onclick="loadAll()">↻ Refresh</button>';
  h += '</div>';

  // Filter pills
  var stages = [
    { key: 'pending',   label: '⏳ Pending',   n: pending.length,   color: '#e65100' },
    { key: 'approved',  label: '✓ Approved',  n: approved.length,  color: '#2e7d32' },
    { key: 'denied',    label: '✗ Denied',    n: denied.length,    color: '#c62828' },
    { key: 'dismissed', label: '⊗ Dismissed', n: dismissed.length, color: '#6b82a0' },
    { key: 'all',       label: 'All',          n: list.length,      color: 'var(--navy)' }
  ];
  h += '<div style="padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;">';
  stages.forEach(function(s){
    var isActive = _swapFilter.status === s.key;
    h += '<button onclick="_swapFilter.status=\'' + s.key + '\';renderSwaps();" style="padding:8px 14px;border-radius:8px;border:1.5px solid ' + (isActive ? s.color : 'var(--border)') + ';background:' + (isActive ? 'rgba(0,0,0,.04)' : 'var(--surface)') + ';color:' + (isActive ? s.color : 'var(--muted)') + ';font-size:12px;font-weight:' + (isActive ? '700' : '500') + ';cursor:pointer;font-family:DM Sans,sans-serif;">';
    h += s.label + ' <span style="opacity:.7;">(' + s.n + ')</span>';
    h += '</button>';
  });
  h += '</div>';
  h += '</div>';

  // Request cards
  var filtered = _swapFilter.status === 'all' ? list : list.filter(function(s){ return s.status === _swapFilter.status; });

  if (!filtered.length) {
    h += '<div class="card"><div class="empty" style="padding:40px;text-align:center;color:var(--muted);">No ' + _swapFilter.status + ' swap requests.</div></div>';
  } else {
    filtered.forEach(function(s){
      h += _buildSwapCard(s);
    });
  }

  document.getElementById('tc-body').innerHTML = h;
}

function _buildSwapCard(s) {
  var statusColor = { pending:'#e65100', approved:'#2e7d32', denied:'#c62828', dismissed:'#6b82a0' }[s.status] || 'var(--muted)';
  var statusBg = { pending:'rgba(230,81,0,.04)', approved:'rgba(46,125,50,.04)', denied:'rgba(198,40,40,.04)', dismissed:'rgba(107,130,160,.04)' }[s.status] || '#fff';
  var statusIcon = { pending:'⏳', approved:'✓', denied:'✗', dismissed:'⊗' }[s.status] || '';

  // Determine swap type (trade vs takeover)
  var isTrade = s.their_date && s.their_date !== s.my_date;
  var swapType = isTrade ? 'Trade' : 'Takeover';

  // Schedule mismatch check (soft validation)
  var scheduleMismatch = _swapScheduleMismatch(s);

  // OT risk check for pending requests
  var otRisk = null;
  if (s.status === 'pending') otRisk = _swapOTRisk(s);

  var fmtSD = function(iso) {
    if (!iso) return '—';
    var d = new Date(iso.indexOf('T') === -1 ? iso+'T12:00:00' : iso);
    return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  };
  // Compact format for range display (no weekday — keeps range strings readable)
  var fmtSDshort = function(iso) {
    if (!iso) return '—';
    var d = new Date(iso.indexOf('T') === -1 ? iso+'T12:00:00' : iso);
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  };

  // Range detection
  var myIsRange = s.my_end_date && s.my_end_date !== s.my_date;
  var myRangeLabel = myIsRange ? (fmtSDshort(s.my_date) + ' → ' + fmtSDshort(s.my_end_date)) : fmtSD(s.my_date);
  var theirIsRange = s.their_end_date && s.their_end_date !== s.their_date;
  var theirRangeLabel = s.their_date ? (theirIsRange ? (fmtSDshort(s.their_date) + ' → ' + fmtSDshort(s.their_end_date)) : fmtSD(s.their_date)) : '';

  // Day count labels for ranges
  var daysBetween = function(startIso, endIso) {
    if (!startIso || !endIso) return 1;
    var s1 = new Date(startIso + 'T12:00:00');
    var s2 = new Date(endIso + 'T12:00:00');
    return Math.round((s2 - s1) / 86400000) + 1;
  };
  var myDayCount = myIsRange ? daysBetween(s.my_date, s.my_end_date) : 1;
  var theirDayCount = theirIsRange ? daysBetween(s.their_date, s.their_end_date) : (s.their_date ? 1 : 0);

  var h = '';
  h += '<div class="card" style="margin-bottom:12px;background:' + statusBg + ';border-left:3px solid ' + statusColor + ';">';
  h += '<div style="padding:14px 18px;">';

  // Header row — requester, market, status
  h += '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px;">';
  h += '<div>';
  h += '<div style="font-size:15px;font-weight:700;color:var(--navy);">' + s.requester_name + '</div>';
  h += '<div style="font-size:11px;color:var(--muted);">' + (s.requester_email || '—') + ' · ' + (s.market || '—') + ' · Submitted ' + fmtSD(s.created_at) + '</div>';
  h += '</div>';
  h += '<span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;background:' + statusColor + ';color:#fff;text-transform:uppercase;letter-spacing:.04em;">' + statusIcon + ' ' + s.status + '</span>';
  h += '</div>';

  // Swap shape — visual diagram
  h += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:10px;">';
  h += '<div style="flex:1;min-width:180px;">';
  h += '<div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;">Requester gives up' + (myDayCount > 1 ? ' · ' + myDayCount + ' days' : '') + '</div>';
  h += '<div style="font-size:13px;font-weight:600;color:var(--navy);">' + myRangeLabel + '</div>';
  h += '<div style="font-size:11px;color:var(--muted);">' + s.my_role + '</div>';
  h += '</div>';
  h += '<div style="font-size:18px;color:var(--orange);">' + (isTrade ? '⇄' : '→') + '</div>';
  h += '<div style="flex:1;min-width:180px;">';
  h += '<div style="font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;">Covered by ' + s.trade_with + (isTrade ? ' (trading)' : ' (takeover)') + (theirDayCount > 1 ? ' · ' + theirDayCount + ' days' : '') + '</div>';
  if (isTrade) {
    h += '<div style="font-size:13px;font-weight:600;color:var(--navy);">' + theirRangeLabel + '</div>';
    h += '<div style="font-size:11px;color:var(--muted);">' + s.my_role + ' (swap)</div>';
  } else {
    h += '<div style="font-size:13px;font-weight:600;color:var(--navy);">Same date' + (myDayCount > 1 ? ' range' : '') + '</div>';
    h += '<div style="font-size:11px;color:var(--muted);">Nothing given back</div>';
  }
  h += '</div>';
  h += '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:' + (isTrade ? 'rgba(21,101,192,.1)' : 'rgba(106,27,154,.1)') + ';color:' + (isTrade ? '#1565c0' : '#6a1b9a') + ';">' + swapType + '</span>';
  h += '</div>';

  // Reason
  if (s.reason) {
    h += '<div style="padding:8px 12px;background:#fff;border:1px solid var(--border);border-radius:6px;margin-bottom:10px;font-size:12px;color:var(--navy);line-height:1.5;">';
    h += '<span style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;">Reason:</span> ' + s.reason;
    h += '</div>';
  }

  // Flags — schedule mismatch, OT risk
  var flags = [];
  if (scheduleMismatch) flags.push({ color:'#c62828', bg:'rgba(198,40,40,.08)', icon:'⚠', text:scheduleMismatch });
  if (otRisk) flags.push({ color:'#e65100', bg:'rgba(230,81,0,.08)', icon:'⚠', text:otRisk });

  if (flags.length) {
    h += '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;">';
    flags.forEach(function(f){
      h += '<div style="padding:6px 10px;background:' + f.bg + ';border-left:2px solid ' + f.color + ';border-radius:4px;font-size:11px;color:' + f.color + ';font-weight:600;">' + f.icon + ' ' + f.text + '</div>';
    });
    h += '</div>';
  }

  // Review info for resolved requests
  if (s.status !== 'pending' && s.reviewed_by) {
    var verb = { approved: 'Approved', denied: 'Denied', dismissed: 'Dismissed' }[s.status] || 'Reviewed';
    h += '<div style="font-size:11px;color:var(--muted);margin-bottom:10px;">' + verb + ' by <strong>' + s.reviewed_by + '</strong>' + (s.reviewed_at ? ' on ' + fmtSD(s.reviewed_at) : '') + '</div>';
  }

  // Action buttons (only for pending)
  if (s.status === 'pending') {
    h += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
    h += '<button onclick="_swapApprove(\'' + s.id + '\')" style="padding:8px 16px;background:#2e7d32;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">✓ Approve</button>';
    h += '<button onclick="_swapDeny(\'' + s.id + '\')" style="padding:8px 16px;background:#c62828;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">✗ Deny</button>';
    h += '<button onclick="_swapDismiss(\'' + s.id + '\')" style="padding:8px 16px;background:var(--surface);color:var(--muted);border:1.5px solid var(--border);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">Dismiss</button>';
    h += '</div>';
  }

  h += '</div></div>';
  return h;
}

// Check whether the requester is actually on the schedule for the date+role
// Returns null if no mismatch, or a message string if there is one.
function _swapScheduleMismatch(s) {
  if (!s || !s.my_date) return null;
  var sched = ST.oncallSchedule || {};
  var period = s.my_date.substring(0,7); // YYYY-MM
  var locKey = (s.market || '').toLowerCase().replace(/\s+/g,'-');
  var key = period + '|' + locKey + '|' + s.my_role + '|' + s.my_date;
  var scheduled = sched[key];
  if (!scheduled) {
    return 'Schedule mismatch: no one assigned to ' + s.my_role + ' on ' + s.my_date;
  }
  if (scheduled !== s.requester_name) {
    return 'Schedule mismatch: ' + scheduled + ' is assigned, not ' + s.requester_name;
  }
  return null;
}

// Estimate if approving this swap would push the covering person into OT
// for the week(s) containing the shift(s). Uses time_entries data.
// For multi-day swaps: checks every week touched by the range.
// Returns null if no risk, or a message string.
function _swapOTRisk(s) {
  if (!s || !s.my_date || !s.trade_with) return null;
  try {
    var OT_PER_SHIFT_HOURS = 8; // conservative estimate added to covering person's week

    // Build list of all dates being covered
    var dates = [];
    var cur = new Date(s.my_date + 'T12:00:00');
    var endIso = s.my_end_date || s.my_date;
    var stop = new Date(endIso + 'T12:00:00');
    while (cur <= stop) {
      dates.push(new Date(cur));
      cur.setDate(cur.getDate() + 1);
    }

    // Group dates by Mon-Sun week
    var weeks = {};
    dates.forEach(function(d) {
      var dow = d.getDay();
      var mondayOffset = dow === 0 ? -6 : 1 - dow;
      var mon = new Date(d); mon.setDate(d.getDate() + mondayOffset); mon.setHours(0,0,0,0);
      var weekKey = mon.toISOString().split('T')[0];
      if (!weeks[weekKey]) {
        weeks[weekKey] = { start: mon, shiftCount: 0 };
      }
      weeks[weekKey].shiftCount++;
    });

    // For each week, sum trade_with's existing hours + projected shift hours
    var worstRisk = null;
    Object.keys(weeks).forEach(function(weekKey) {
      var w = weeks[weekKey];
      var wEnd = new Date(w.start); wEnd.setDate(w.start.getDate() + 7);
      var totalMins = 0;
      (ST.entries || []).forEach(function(e){
        if (e.employee_name !== s.trade_with) return;
        if (!e.clock_in) return;
        var ed = new Date(e.clock_in);
        if (ed < w.start || ed >= wEnd) return;
        var emBreaks = (ST.breaks || []).filter(function(b){ return b.entry_id === e.id; });
        if (typeof billableMins === 'function') {
          totalMins += billableMins(e, emBreaks);
        } else {
          totalMins += (e.duration_minutes || 0);
        }
      });
      var projected = (totalMins / 60) + (w.shiftCount * OT_PER_SHIFT_HOURS);
      if (projected > 40) {
        var weekLabel = w.start.toLocaleDateString('en-US',{month:'short',day:'numeric'});
        var msg = 'OT risk: ' + s.trade_with + ' already has ' + (totalMins / 60).toFixed(1) + 'h the week of ' + weekLabel + '; this swap would push them to ~' + projected.toFixed(1) + 'h.';
        if (!worstRisk || projected > worstRisk.projected) {
          worstRisk = { projected: projected, msg: msg };
        }
      }
    });
    return worstRisk ? worstRisk.msg : null;
  } catch(e) {}
  return null;
}

// Approve a swap — updates status, mutates oncall_schedule, notifies
async function _swapApprove(swapId) {
  var s = (ST.swapRequests || []).find(function(x){ return x.id === swapId; });
  if (!s) { toast('Swap not found'); return; }

  // OT warning gate
  var otRisk = _swapOTRisk(s);
  if (otRisk) {
    if (!confirm(otRisk + '\n\nApprove anyway?')) return;
  }

  try {
    // 1. Update the swap request row
    var nowIso = new Date().toISOString();
    var approver = (typeof getApprovedBy === 'function') ? getApprovedBy() : 'Admin';
    var patchR = await fetch(SB_URL + '/rest/v1/oncall_swap_requests?id=eq.' + swapId, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'approved', reviewed_by: approver, reviewed_at: nowIso })
    });
    if (!patchR.ok) throw new Error('Could not update swap status');

    // 2. Mutate oncall_schedule JSONB — replace requester with trade_with for
    //    every date in my_date..my_end_date (inclusive). If it's a trade, also
    //    replace trade_with with requester for every date in their_date..their_end_date.
    //    Matches the dispatch writer's key format: 'YYYY-MM|loc|role|YYYY-MM-DD'
    var sched = Object.assign({}, ST.oncallSchedule || {});
    // NOTE: dispatch uses 'appleton' or 'stevens' (not 'stevens-point' — confirmed in index.html)
    var locKey = (s.market || '').toLowerCase().includes('point') ? 'stevens' : 'appleton';

    // Helper: enumerate dates from startIso to endIso inclusive
    function _datesInRange(startIso, endIso) {
      var out = [];
      if (!startIso) return out;
      var end = endIso || startIso;
      var cur = new Date(startIso + 'T12:00:00');
      var stop = new Date(end + 'T12:00:00');
      while (cur <= stop) {
        out.push(cur.toISOString().split('T')[0]);
        cur.setDate(cur.getDate() + 1);
      }
      return out;
    }

    // Apply to every "my" date
    var myDates = _datesInRange(s.my_date, s.my_end_date);
    myDates.forEach(function(dIso) {
      var period = dIso.substring(0, 7);
      var key = period + '|' + locKey + '|' + s.my_role + '|' + dIso;
      sched[key] = s.trade_with;
      sched[key + '|override'] = '1';
    });

    // If trade, apply to every "their" date too
    var isTrade = s.their_date && !(s.their_date === s.my_date && !s.their_end_date && !s.my_end_date);
    if (isTrade) {
      var theirDates = _datesInRange(s.their_date, s.their_end_date);
      theirDates.forEach(function(dIso) {
        var period = dIso.substring(0, 7);
        var key = period + '|' + locKey + '|' + s.my_role + '|' + dIso;
        sched[key] = s.requester_name;
        sched[key + '|override'] = '1';
      });
    }

    var schedR = await fetch(SB_URL + '/rest/v1/oncall_schedule?id=eq.current', {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: sched, updated_at: nowIso })
    });
    if (!schedR.ok) console.warn('Schedule write returned non-OK; swap still approved');

    ST.oncallSchedule = sched;

    // 3. Fire notifications — requester (their request was approved)
    //    and covering person (heads-up they're now on the schedule)
    var myIsRange = s.my_end_date && s.my_end_date !== s.my_date;
    var myRangeLabel = myIsRange ? (s.my_date + ' through ' + s.my_end_date) : s.my_date;
    var notifs = [
      {
        recipient_email: s.requester_email || '',
        recipient_name: s.requester_name,
        message: 'Your on-call swap request for ' + myRangeLabel + ' (' + s.my_role + ') was approved by ' + approver + '. ' + s.trade_with + ' will cover.',
        swap_id: swapId,
        status: 'approved',
        read: false
      }
    ];
    // If we can resolve an email for the covering person, notify them too.
    // Free-form names mean we can't always do this — fall back to best-effort name lookup in employees table
    var coveringEmail = null;
    try {
      var match = (ST.employees || []).find(function(e){ return e.name === s.trade_with; });
      if (match && match.email) coveringEmail = match.email;
    } catch(e) {}
    if (coveringEmail) {
      notifs.push({
        recipient_email: coveringEmail,
        recipient_name: s.trade_with,
        message: 'You have been assigned to cover on-call for ' + myRangeLabel + ' (' + s.my_role + ') — swap from ' + s.requester_name + ' was approved.',
        swap_id: swapId,
        status: 'approved',
        read: false
      });
    }
    for (var i = 0; i < notifs.length; i++) {
      try {
        await fetch(SB_URL + '/rest/v1/oncall_notifications', {
          method: 'POST',
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify(notifs[i])
        });
      } catch(e) { console.warn('Notification insert failed:', e); }
    }

    if (typeof logActivity === 'function') {
      logActivity('Swap Approved', s.requester_name + ' → ' + s.trade_with + ' · ' + s.my_date + ' · ' + s.my_role, 'on_call', s.requester_name);
    }
    toast('✓ Swap approved and schedule updated');
    await loadAll();
    if (ST.tab === 'swaps') renderSwaps();
  } catch(e) {
    toast('Approval failed: ' + e.message);
  }
}

async function _swapDeny(swapId) {
  var s = (ST.swapRequests || []).find(function(x){ return x.id === swapId; });
  if (!s) { toast('Swap not found'); return; }

  var reason = prompt('Reason for denial (required — this will be sent to the requester):');
  if (reason === null) return;
  reason = reason.trim();
  if (!reason) { toast('A denial reason is required'); return; }

  try {
    var nowIso = new Date().toISOString();
    var approver = (typeof getApprovedBy === 'function') ? getApprovedBy() : 'Admin';
    var patchR = await fetch(SB_URL + '/rest/v1/oncall_swap_requests?id=eq.' + swapId, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'denied', reviewed_by: approver, reviewed_at: nowIso })
    });
    if (!patchR.ok) throw new Error('Could not update swap status');

    // Notify requester with denial reason + range label
    var denyIsRange = s.my_end_date && s.my_end_date !== s.my_date;
    var denyRangeLabel = denyIsRange ? (s.my_date + ' through ' + s.my_end_date) : s.my_date;
    try {
      await fetch(SB_URL + '/rest/v1/oncall_notifications', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({
          recipient_email: s.requester_email || '',
          recipient_name: s.requester_name,
          message: 'Your on-call swap request for ' + denyRangeLabel + ' was denied. Reason: ' + reason,
          swap_id: swapId,
          status: 'denied',
          read: false
        })
      });
    } catch(e) { console.warn('Notification insert failed:', e); }

    // Also update the request row with the denial reason so tech can see it in their My Swaps list
    try {
      await fetch(SB_URL + '/rest/v1/oncall_swap_requests?id=eq.' + swapId, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ review_notes: reason })
      });
    } catch(e) {}

    if (typeof logActivity === 'function') {
      logActivity('Swap Denied', s.requester_name + ' · ' + s.my_date + ' · reason: ' + reason, 'on_call', s.requester_name);
    }
    toast('Swap denied');
    await loadAll();
    if (ST.tab === 'swaps') renderSwaps();
  } catch(e) {
    toast('Denial failed: ' + e.message);
  }
}

async function _swapDismiss(swapId) {
  var s = (ST.swapRequests || []).find(function(x){ return x.id === swapId; });
  if (!s) { toast('Swap not found'); return; }
  if (!confirm('Dismiss this swap request? (Use this for tests, duplicates, or requests that no longer apply. No notification will be sent.)')) return;

  try {
    var nowIso = new Date().toISOString();
    var approver = (typeof getApprovedBy === 'function') ? getApprovedBy() : 'Admin';
    await fetch(SB_URL + '/rest/v1/oncall_swap_requests?id=eq.' + swapId, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'dismissed', reviewed_by: approver, reviewed_at: nowIso })
    });
    toast('Swap dismissed');
    await loadAll();
    if (ST.tab === 'swaps') renderSwaps();
  } catch(e) {
    toast('Dismiss failed: ' + e.message);
  }
}

// Legacy — keep as no-op in case anything still calls it
async function resolveSwap(id, status) {
  if (status === 'approved') return _swapApprove(id);
  if (status === 'denied') return _swapDeny(id);
  return _swapDismiss(id);
}

async function resolveCorrection(corrId, status, entryId) {
  var correction = ST.corrections.find(function(c){ return c.id === corrId; });
  await fetch(SB_URL + '/rest/v1/time_corrections?id=eq.' + corrId, {
    method: 'PATCH',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ status: status })
  });
  // Fire SMS to employee notifying of the resolution
  if (correction) {
    var noteMsg = status === 'approved'
      ? 'Thanks — updating your timecard now.'
      : 'Please see your supervisor if you need to discuss.';
    smsCorrectionUpdate(correction, status, noteMsg);
  }
  if (status === 'approved' && entryId) {
    toast('Correction approved — edit the entry to apply the fix');
    logActivity('Correction Approved', 'Time correction approved for ' + (correction||{}).employee_name, 'corrections');
    await loadAll();
    editEntry(entryId);
  } else {
    toast(status === 'approved' ? '✓ Approved' : 'Dismissed');
    await loadAll();
    renderTimesheets();
  }
}
