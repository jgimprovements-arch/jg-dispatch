// Action 2: resend whatever existed before
async function _invActResendOriginal(empId) {
  var emp = ST.employees.find(function(e){ return e.id === empId; });
  if (!emp) { alert('Employee not found'); return; }

  try {
    var rows = await sb('/rest/v1/employee_invites?employee_id=eq.'+empId+'&status=eq.pending&order=sent_at.desc&limit=1');
    if (!rows || !rows.length) {
      if (!confirm('No pending invite found. Generate and send a new one instead?')) return;
      // No existing token → reset flow
      await _invActResetInvite(empId);
      return;
    }
    var invite = rows[0];
    var url = window.location.origin + window.location.pathname.replace(/[^\/]+$/, '') + 'onboarding.html?invite=' + invite.token;

    // Re-send via same channel
    var channel = invite.channel || 'email';
    var sendResult = await _sendInviteMessage(emp.name, url, emp.email, emp.phone, channel);

    // Log the resend (don't create a new invite row — just update sent_at)
    await fetch(SB_URL + '/rest/v1/employee_invites?id=eq.'+invite.id, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ sent_at: new Date().toISOString() })
    });
    logActivity('Invite Resent', emp.name + ' · resent to ' + channel, 'employees', emp.name);

    closeModal();
    setTimeout(function(){ _showInviteConfirmation(emp.name, url, channel); }, 180);
  } catch(e) {
    alert('Failed: ' + e.message);
  }
}

// Action 3: mint a new token, invalidate old pending invites, send fresh
async function _invActResetInvite(empId) {
  var emp = ST.employees.find(function(e){ return e.id === empId; });
  if (!emp) { alert('Employee not found'); return; }

  // Ask which channel
  var ch = prompt('Send new invite via:\n\n1 = SMS (requires phone)\n2 = Email\n3 = Both\n4 = Just give me the link\n\nEnter 1, 2, 3, or 4:', '2');
  if (!ch) return;
  var chanMap = { '1':'sms', '2':'email', '3':'both', '4':'link' };
  var channel = chanMap[ch.trim()];
  if (!channel) { alert('Invalid choice'); return; }

  if ((channel === 'sms' || channel === 'both') && !emp.phone) {
    alert('No phone on file — add one in Edit, or use email instead.');
    return;
  }
  if ((channel === 'email' || channel === 'both') && !emp.email) {
    alert('No email on file.');
    return;
  }

  try {
    // Invalidate prior pending invites — use existing 'revoked' status
    await fetch(SB_URL + '/rest/v1/employee_invites?employee_id=eq.'+empId+'&status=eq.pending', {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'revoked' })
    });

    // Create fresh
    var token = _generateInviteToken();
    var expiresAt = new Date(Date.now() + 7*24*60*60*1000).toISOString();
    var r = await fetch(SB_URL + '/rest/v1/employee_invites', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        token: token,
        employee_id: empId,
        employee_name: emp.name,
        sent_to_phone: emp.phone || null,
        sent_to_email: emp.email,
        channel: channel,
        status: 'pending',
        sent_at: new Date().toISOString(),
        expires_at: expiresAt,
        sent_by: getApprovedBy()
      })
    });
    if (!r.ok) throw new Error('Could not create invite record');

    var url = window.location.origin + window.location.pathname.replace(/[^\/]+$/, '') + 'onboarding.html?invite=' + token;

    // Flag employee as pending again (in case they were mid-onboarding)
    await fetch(SB_URL + '/rest/v1/employees?id=eq.'+empId, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ invite_pending: true })
    });

    if (channel !== 'link') {
      await _sendInviteMessage(emp.name, url, emp.email, emp.phone, channel);
    }
    logActivity('Invite Reset', emp.name + ' · new token via ' + channel, 'employees', emp.name);

    closeModal();
    setTimeout(function(){ _showInviteConfirmation(emp.name, url, channel); }, 180);
    await loadAll();
  } catch(e) {
    alert('Failed: ' + e.message);
  }
}

// Action 4: skip onboarding entirely, grant access now
async function _invActSkipOnboarding(empId) {
  var emp = ST.employees.find(function(e){ return e.id === empId; });
  if (!emp) { alert('Employee not found'); return; }

  if (!confirm(
    'SKIP ONBOARDING for ' + emp.name + '?\n\n' +
    'This bypasses:\n' +
    '  • Handbook acknowledgment\n' +
    '  • Non-compete signing\n' +
    '  • Personal info / emergency contact\n' +
    '  • All other onboarding steps\n\n' +
    'Employee will be marked active and can sign in immediately using their email.\n\n' +
    'Use only for contractors, paper-signed folks, or temp workers.\n\n' +
    'Continue?'
  )) return;

  try {
    var now = new Date().toISOString();
    // Try full patch first — writes audit columns if they exist
    var fullBody = {
      active: true,
      invite_pending: false,
      onboarding_signed_at: now,
      onboarding_skipped: true,
      onboarding_skipped_by: getApprovedBy(),
      onboarding_skipped_at: now
    };
    var r = await fetch(SB_URL + '/rest/v1/employees?id=eq.'+empId, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify(fullBody)
    });
    // If full patch failed (e.g. column doesn't exist), fall back to minimal
    if (!r.ok) {
      await fetch(SB_URL + '/rest/v1/employees?id=eq.'+empId, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ active: true, invite_pending: false, onboarding_signed_at: now })
      });
    }

    // Revoke any pending invites — PATCH (preserves audit history) rather than DELETE
    await fetch(SB_URL + '/rest/v1/employee_invites?employee_id=eq.'+empId+'&status=eq.pending', {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'revoked' })
    }).catch(function(){ /* non-fatal */ });

    logActivity('Onboarding Skipped', emp.name + ' · docs bypassed by admin · grants immediate access', 'employees', emp.name);

    alert('✅ ' + emp.name + ' can now sign in with their email.\n\nMake sure you\'ve added their personal email if they\'ll use Google Sign-In with a Gmail account.');
    closeModal();
    await loadAll();
  } catch(e) {
    alert('Failed: ' + e.message);
  }
}

// Shared helper — sends SMS/email via existing Zapier hook
async function _sendInviteMessage(name, url, email, phone, channel) {
  var smsBody = 'Hi '+name.split(' ')[0]+'! Welcome to JG Restoration. Complete your onboarding here (link expires in 7 days): '+url+' — Questions? Text us at (920) 428-4200.';
  var emailSubject = 'Welcome to JG Restoration — Finish Your Onboarding';
  var emailBody = 'Hi '+name.split(' ')[0]+',\n\nWelcome to JG Restoration! We\'ve set up your account.\n\nTo finish your onboarding, click this link (expires in 7 days):\n'+url+'\n\nYou\'ll confirm your info, review a few policies, and get access to the apps you need on the job. Takes about 5 minutes.\n\nQuestions? Reply to this email or call (920) 428-4200.\n\n— JG Restoration';

  if (channel === 'sms' || channel === 'both') {
    try {
      var normalizedPhone = _normalizePhoneE164(phone);
      if (normalizedPhone) {
        var smsParams = new URLSearchParams({ type: 'invite_sms', to: normalizedPhone, body: smsBody, employee_name: name });
        await fetch(HOOKS.onboarding, { method: 'POST', body: smsParams.toString(), headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
      }
    } catch(e) { console.warn('SMS send failed:', e); }
  }
  if (channel === 'email' || channel === 'both') {
    try {
      var emailParams = new URLSearchParams({ type: 'invite_email', to: email, subject: emailSubject, body: emailBody, employee_name: name });
      await fetch(HOOKS.onboarding, { method: 'POST', body: emailParams.toString(), headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
    } catch(e) { console.warn('Email send failed:', e); }
  }
  return true;
}

    if (ncSig.user_agent) h += '<div style="font-size:9px;color:var(--muted);margin-top:2px;word-break:break-all;">Device: '+ncSig.user_agent.substring(0,100)+(ncSig.user_agent.length>100?'...':'')+'</div>';
    h += '<div style="font-size:10px;color:var(--muted);margin-top:4px;">Source: '+(ncSig.source||'onboarding')+'</div>';
    h += '</div>';
    h += '</div>';

    h += '<div style="background:rgba(13,45,94,.04);border-radius:6px;padding:10px 12px;font-size:11px;color:var(--navy);line-height:1.5;">📋 <strong>Audit record:</strong> This employee electronically signed the JG Non-Competition Agreement. A filled and signed PDF copy with their typed signature, name, and date has been generated and stored in Supabase Storage. The signature is legally equivalent to a handwritten signature under Wisconsin\'s Uniform Electronic Transactions Act (Wis. Stat. § 137.15).</div>';
  } else {
    h += '<div style="padding:14px;background:rgba(192,32,32,.04);border-radius:8px;text-align:center;">';
    h += '<div style="font-size:13px;color:#c62828;margin-bottom:6px;"><strong>No signed non-compete on file</strong></div>';
    h += '<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">This employee has not yet signed the Non-Competition Agreement.</div>';
    h += '<button class="btn btn-sm" onclick="requestNoncompeteSignature(\''+emp.id+'\')" style="background:var(--orange);color:#fff;border-color:var(--orange);">📑 Request Signature</button>';
    h += '</div>';
  }
  h += '</div>';

  // ── DOCUMENTS & CERTIFICATIONS ──
  var docs = documents || [];
  var now = Date.now();
  var THIRTY_DAYS = 30*24*60*60*1000;
  h += '<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:16px;">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">';
  h += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;">📎 Documents & Certifications</div>';
  h += '<button class="btn btn-sm" onclick="openUploadDocument(\''+emp.id+'\')" style="background:var(--navy);color:#fff;border-color:var(--navy);">+ Upload</button>';
  h += '</div>';

  if (!docs.length) {
    h += '<div style="padding:20px;text-align:center;font-size:12px;color:var(--muted);background:rgba(13,45,94,.02);border-radius:8px;">No documents uploaded yet. Click Upload to add driver\'s license, certifications, W-4, etc.</div>';
  } else {
    h += '<div style="display:flex;flex-direction:column;gap:8px;">';
    docs.forEach(function(doc) {
      var typeIcon = {
        'drivers_license':'🪪','auto_insurance':'🚗','iicrc_cert':'🎓',
        'osha_training':'🦺','w4_form':'📋','i9_form':'📋',
        'background_check':'🔍','dot_medical':'⚕️','other':'📎'
      }[doc.doc_type] || '📎';

      var expiresSoon = false, expired = false, expiresLabel = '';
      if (doc.expires_at) {
        var exp = new Date(doc.expires_at + 'T00:00:00').getTime();
        var daysTil = Math.floor((exp - now) / (24*60*60*1000));
        if (daysTil < 0) { expired = true; expiresLabel = 'EXPIRED ' + Math.abs(daysTil) + ' days ago'; }
        else if (daysTil <= 30) { expiresSoon = true; expiresLabel = 'Expires in ' + daysTil + ' day' + (daysTil!==1?'s':''); }
        else { expiresLabel = 'Expires ' + new Date(doc.expires_at + 'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
      }

      var bgColor = expired ? 'rgba(192,32,32,.04)' : expiresSoon ? 'rgba(230,81,0,.04)' : '#fff';
      var borderColor = expired ? 'rgba(192,32,32,.3)' : expiresSoon ? 'rgba(230,81,0,.3)' : 'var(--border)';

      h += '<div style="border:1px solid '+borderColor+';background:'+bgColor+';border-radius:8px;padding:10px 12px;">';
      h += '<div style="display:flex;align-items:center;gap:10px;">';
      h += '<div style="font-size:22px;flex-shrink:0;">'+typeIcon+'</div>';
      h += '<div style="flex:1;min-width:0;">';
      h += '<div style="font-size:13px;font-weight:700;color:var(--navy);">'+(doc.label || _docTypeLabel(doc.doc_type))+'</div>';
      h += '<div style="font-size:10px;color:var(--muted);margin-top:2px;">';
      h += 'Uploaded '+ new Date(doc.uploaded_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      if (doc.uploaded_by) h += ' by '+doc.uploaded_by;
      if (expiresLabel) {
        var expColor = expired ? '#c62828' : expiresSoon ? '#e65100' : 'var(--muted)';
        h += ' · <span style="color:'+expColor+';font-weight:'+(expiresSoon||expired?'700':'500')+';">'+(expiresSoon||expired?'⚠ ':'')+expiresLabel+'</span>';

      h += '</div>';

      h += '</div>';
      h += '</div>';
      h += '</div>';
    });

  h += '</div>';
  // End Documents section

  // ── COMPENSATION HISTORY ──
  var compHist = compHistory || [];
  h += '<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:16px;">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">';

  h += '</div>';

  if (!compHist.length) {
    // Seed prompt — no history yet
    var currentRate = emp.pay_type === 'salary'
      ? (emp.annual_salary ? '$'+Number(emp.annual_salary).toLocaleString()+'/yr' : 'not set')

    h += '<div style="font-size:12px;color:var(--navy);margin-bottom:6px;"><strong>No compensation history recorded yet.</strong></div>';
    h += '<div style="font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5;">Current rate: '+currentRate+' · For the sale, you want a timestamped pay history. Start by seeding a baseline.</div>';

    h += '</div>';
  } else {
    h += '<div style="display:flex;flex-direction:column;gap:8px;">';
    compHist.forEach(function(ch, idx) {
      var typeIcon = { hire:'🎉', raise:'💵', promotion:'💼', adjustment:'📊', salary_to_hourly:'🔄', hourly_to_salary:'🔄' }[ch.change_type] || '📊';
      var fmtRate = function(type, rate) {
        if (!rate) return '—';
        if (type === 'salary') return '$'+Number(rate).toLocaleString()+'/yr';
        return '$'+Number(rate).toFixed(2)+'/hr';
      };
      var beforeLabel = ch.before_rate ? fmtRate(ch.before_pay_type || 'hourly', ch.before_rate) : null;
      var afterLabel = fmtRate(ch.after_pay_type || 'hourly', ch.after_rate);
      var changeLabel;
      if (ch.change_type === 'hire') {
        changeLabel = 'Initial rate: <strong>'+afterLabel+'</strong>';
      } else if (beforeLabel) {
        var deltaPct = '';
        if (ch.before_rate && ch.after_rate && (ch.before_pay_type||'hourly') === (ch.after_pay_type||'hourly')) {
          var pct = ((ch.after_rate - ch.before_rate) / ch.before_rate * 100).toFixed(1);
          var dollarDelta = (ch.after_rate - ch.before_rate).toFixed(2);
          deltaPct = ' <span style="color:'+(ch.after_rate>ch.before_rate?'#2e7d32':'#c62828')+';font-weight:700;">(' + (ch.after_rate>ch.before_rate?'+':'') + '$' + dollarDelta + ', ' + (pct > 0 ? '+' : '') + pct + '%)</span>';
        }
        changeLabel = beforeLabel + ' → <strong>' + afterLabel + '</strong>' + deltaPct;
      } else {
        changeLabel = 'Now: <strong>'+afterLabel+'</strong>';

      h += '<div style="border:1px solid var(--border);border-radius:8px;padding:10px 12px;">';

      h += '<div style="font-size:22px;flex-shrink:0;">'+typeIcon+'</div>';
      h += '<div style="flex:1;min-width:0;">';
      h += '<div style="font-size:13px;font-weight:700;color:var(--navy);">'+_compChangeTypeLabel(ch.change_type)+' — '+new Date(ch.effective_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</div>';
      h += '<div style="font-size:12px;color:var(--navy);margin-top:4px;">'+changeLabel+'</div>';
      if (ch.new_role && ch.new_role !== emp.role) h += '<div style="font-size:11px;color:var(--muted);margin-top:2px;">New role: <strong>'+ch.new_role+'</strong></div>';
      if (ch.reason) h += '<div style="font-size:11px;color:var(--navy);margin-top:4px;font-style:italic;">'+ch.reason+'</div>';
      h += '<div style="font-size:10px;color:var(--muted);margin-top:4px;">Recorded by '+(ch.recorded_by||'—')+' on '+new Date(ch.recorded_at||ch.effective_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</div>';
      h += '</div>';
      h += '<button class="btn btn-sm" onclick="deleteCompChange(\''+ch.id+'\',\''+emp.id+'\')" title="Delete this entry" style="color:#c62828;flex-shrink:0;">🗑</button>';
      h += '</div>';
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</div>';

  // ── PERFORMANCE REVIEWS ──
  var revs = reviews || [];
  h += '<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:16px;">';
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">';
  h += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;">📋 Performance Reviews</div>';
  h += '<button class="btn btn-sm" onclick="openReview(\''+emp.id+'\')" style="background:var(--navy);color:#fff;border-color:var(--navy);">+ Add Review</button>';
  h += '</div>';

  if (!revs.length) {
    h += '<div style="padding:20px;text-align:center;font-size:12px;color:var(--muted);background:rgba(13,45,94,.02);border-radius:8px;">No performance reviews yet. Click Add Review to document a conversation.</div>';
  } else {
    h += '<div style="display:flex;flex-direction:column;gap:8px;">';
    revs.forEach(function(rv) {
      var ratingMap = { 'exceeds':'⭐⭐⭐ Exceeds Expectations', 'meets':'⭐⭐ Meets Expectations', 'needs_improvement':'⭐ Needs Improvement', 'new_hire':'🌱 New Hire / 90-day' };
      var ratingLabel = ratingMap[rv.rating] || rv.rating || '';
      var ratingColor = {
        'exceeds':'#2e7d32', 'meets':'var(--navy)', 'needs_improvement':'#c62828', 'new_hire':'var(--orange)'
      }[rv.rating] || 'var(--muted)';

      h += '<div style="border:1px solid var(--border);border-radius:8px;padding:12px 14px;">';
      h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">';
      h += '<div>';
      h += '<div style="font-size:13px;font-weight:700;color:var(--navy);">'+(rv.review_type?rv.review_type.charAt(0).toUpperCase()+rv.review_type.slice(1):'Review')+' — '+new Date(rv.review_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</div>';
      if (ratingLabel) h += '<div style="font-size:11px;color:'+ratingColor+';font-weight:700;margin-top:2px;">'+ratingLabel+'</div>';
      h += '</div>';
      h += '<button class="btn btn-sm" onclick="deleteReview(\''+rv.id+'\',\''+emp.id+'\')" title="Delete review" style="color:#c62828;">🗑</button>';
      h += '</div>';

      if (rv.strengths) {
        h += '<div style="margin-top:8px;padding:8px 10px;background:rgba(46,125,50,.04);border-left:3px solid #2e7d32;border-radius:4px;">';
        h += '<div style="font-size:10px;font-weight:700;color:#2e7d32;text-transform:uppercase;margin-bottom:4px;">Strengths</div>';
        h += '<div style="font-size:12px;color:var(--navy);line-height:1.5;white-space:pre-wrap;">'+rv.strengths+'</div>';
        h += '</div>';
      }
      if (rv.growth_areas) {
        h += '<div style="margin-top:6px;padding:8px 10px;background:rgba(230,81,0,.04);border-left:3px solid var(--orange);border-radius:4px;">';
        h += '<div style="font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;margin-bottom:4px;">Growth Areas</div>';
        h += '<div style="font-size:12px;color:var(--navy);line-height:1.5;white-space:pre-wrap;">'+rv.growth_areas+'</div>';
        h += '</div>';
      }
      if (rv.goals) {
        h += '<div style="margin-top:6px;padding:8px 10px;background:rgba(13,45,94,.04);border-left:3px solid var(--navy);border-radius:4px;">';
        h += '<div style="font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;margin-bottom:4px;">Goals Next 12 Months</div>';
        h += '<div style="font-size:12px;color:var(--navy);line-height:1.5;white-space:pre-wrap;">'+rv.goals+'</div>';
        h += '</div>';
      }

      h += '<div style="font-size:10px;color:var(--muted);margin-top:8px;">Reviewed by '+(rv.reviewed_by||'—')+' on '+new Date(rv.created_at||rv.review_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }
  h += '</div>';

  if (invite) {
    h += '<div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px;">';
    h += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">📲 Invite Record</div>';
    h += _fileRow('Status', '<span style="text-transform:uppercase;font-weight:700;font-size:11px;padding:2px 8px;border-radius:4px;background:'+(invite.status==='accepted'?'rgba(46,125,50,.1);color:#2e7d32':invite.status==='pending'?'rgba(230,81,0,.1);color:#e65100':'rgba(192,32,32,.08);color:#c62828')+';">'+invite.status+'</span>');
    h += _fileRow('Sent Via', (invite.channel||'—').toUpperCase());
    h += _fileRow('Sent By', val(invite.sent_by));
    h += _fileRow('Sent At', fmtDT(invite.sent_at));
    if (invite.accepted_at) h += _fileRow('Accepted At', fmtDT(invite.accepted_at));
    h += '</div>';
  }

  return h;
}

function _fileRow(label, value) {
  return '<div style="display:flex;justify-content:space-between;align-items:start;gap:12px;padding:5px 0;font-size:12px;">' +
    '<span style="color:var(--muted);min-width:90px;flex-shrink:0;">'+label+'</span>' +
    '<span style="text-align:right;color:var(--navy);font-weight:500;">'+value+'</span>' +
    '</div>';
}

// ── COMPENSATION HISTORY ──
function _compChangeTypeLabel(t) {
  return {
    hire: 'Initial Hire',
    raise: 'Raise',
    promotion: 'Promotion',
    adjustment: 'Adjustment',
    salary_to_hourly: 'Converted to Hourly',
    hourly_to_salary: 'Converted to Salary'
  }[t] || 'Change';
}

async function _seedCompBaseline(empId) {
  if (!isAdmin()) { toast('Admin only'); return; }
  var emp = ST.employees.find(function(e){ return e.id === empId; });
  if (!emp) return;
  if (!confirm('Seed a baseline entry for '+emp.name+' using their current rate?\n\nThis creates a "Baseline" entry dated today. Use it as your starting point, then go add any historical entries you remember.')) return;

  var rate = emp.pay_type === 'salary' ? emp.annual_salary : emp.hourly_rate;
  if (!rate) { alert('No current rate set on this employee. Add a rate in Edit Employee first.'); return; }

  try {
    var today = new Date().toISOString().split('T')[0];
    await fetch(SB_URL + '/rest/v1/comp_history', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        employee_id: empId,
        employee_name: emp.name,
        change_type: 'adjustment',
        effective_date: today,
        before_rate: null,
        before_pay_type: null,
        after_rate: rate,
        after_pay_type: emp.pay_type || 'hourly',
        new_role: emp.role,
        reason: 'Baseline recorded — current rate at time compensation history was first seeded',
        recorded_by: getApprovedBy(),
        recorded_at: new Date().toISOString()
      })
    });
    logActivity('Comp Baseline Seeded', emp.name + ' · baseline rate recorded', 'employees', emp.name);
    toast('✓ Baseline recorded');
    setTimeout(function(){ openEmployeeFile(empId); }, 300);
  } catch(err) { alert('Seed failed: '+err.message); }
}

function openCompChange(empId) {
  if (!isAdmin()) { toast('Admin only'); return; }
  var emp = ST.employees.find(function(e){ return e.id === empId; });
  if (!emp) return;

  var currentType = emp.pay_type || 'hourly';
  var currentRate = currentType === 'salary' ? emp.annual_salary : emp.hourly_rate;

  var body = '';
  body += '<div style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5;">Record a compensation change for <strong>'+emp.name+'</strong>. Current rate: <strong>'+(currentRate?(currentType==='salary'?'$'+Number(currentRate).toLocaleString()+'/yr':'$'+Number(currentRate).toFixed(2)+'/hr'):'not set')+'</strong></div>';

  body += '<div class="form-row">';
  body += '<label class="form-label">Change Type *</label>';
  body += '<select id="cc-type" class="form-select">';
  [['raise','💵 Raise'],['promotion','💼 Promotion (new role + raise)'],['hire','🎉 Initial Hire (historical)'],['adjustment','📊 Adjustment'],['salary_to_hourly','🔄 Switched Salary → Hourly'],['hourly_to_salary','🔄 Switched Hourly → Salary']].forEach(function(opt){
    body += '<option value="'+opt[0]+'">'+opt[1]+'</option>';
  });
  body += '</select></div>';

  body += '<div class="form-row">';
  body += '<label class="form-label">Effective Date *</label>';
  body += '<input type="date" id="cc-date" class="form-input" value="'+new Date().toISOString().split('T')[0]+'">';
  body += '</div>';

  body += '<div class="form-row">';
  body += '<label class="form-label">New Pay Type *</label>';
  body += '<select id="cc-after-type" class="form-select">';
  body += '<option value="hourly"'+(currentType==='hourly'?' selected':'')+'>Hourly</option>';
  body += '<option value="salary"'+(currentType==='salary'?' selected':'')+'>Salary (annual)</option>';
  body += '</select></div>';

  body += '<div class="form-row">';
  body += '<label class="form-label">New Rate *</label>';
  body += '<input type="number" step="0.01" id="cc-after-rate" class="form-input" placeholder="e.g. 24.50 or 65000" value="'+(currentRate||'')+'">';
  body += '<div style="font-size:10px;color:var(--muted);margin-top:4px;">Enter hourly rate (like 24.50) OR annual salary (like 65000), depending on the pay type above.</div>';
  body += '</div>';

  body += '<div class="form-row">';
  body += '<label class="form-label">New Role <span style="font-weight:400;color:var(--muted);">(only for promotions)</span></label>';
  body += '<input type="text" id="cc-new-role" class="form-input" placeholder="e.g. Lead Technician" value="'+(emp.role||'')+'">';
  body += '</div>';

  body += '<div class="form-row">';
  body += '<label class="form-label">Reason *</label>';
  body += '<input type="text" id="cc-reason" class="form-input" placeholder="e.g. Annual review, strong performance. IICRC WRT completed.">';
  body += '<div style="font-size:10px;color:var(--muted);margin-top:4px;">Document why. This shows up in the audit trail.</div>';
  body += '</div>';

  body += '<div style="background:rgba(13,45,94,.04);border-radius:6px;padding:10px 12px;font-size:11px;color:var(--navy);line-height:1.5;">💡 <strong>This will update the live employee record</strong> with the new rate and role so payroll reports use the current figure going forward. The historical entry preserves the change for the audit trail.</div>';

  showModal('💰 Record Compensation Change — '+emp.name, body, "_submitCompChange('"+empId+"')");
}

async function _submitCompChange(empId) {
  var emp = ST.employees.find(function(e){ return e.id === empId; });
  if (!emp) return;

  var changeType = document.getElementById('cc-type').value;
  var effDate = document.getElementById('cc-date').value;
  var afterType = document.getElementById('cc-after-type').value;
  var afterRate = parseFloat(document.getElementById('cc-after-rate').value);
  var newRole = document.getElementById('cc-new-role').value.trim();
  var reason = document.getElementById('cc-reason').value.trim();

  if (!effDate) { alert('Effective date required'); return; }
  if (!afterRate || afterRate <= 0) { alert('Enter a valid rate'); return; }
  if (!reason) { alert('Reason required'); return; }

  try {
    // Record the comp history entry
    await fetch(SB_URL + '/rest/v1/comp_history', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        employee_id: empId,
        employee_name: emp.name,
        change_type: changeType,
        effective_date: effDate,
        before_rate: changeType === 'hire' ? null : (emp.pay_type === 'salary' ? emp.annual_salary : emp.hourly_rate),
        before_pay_type: changeType === 'hire' ? null : (emp.pay_type || 'hourly'),
        before_role: emp.role,
        after_rate: afterRate,
        after_pay_type: afterType,
        new_role: newRole || emp.role,
        reason: reason,
        recorded_by: getApprovedBy(),
        recorded_at: new Date().toISOString()
      })
    });

    // Update the live employee record
    var updatePayload = { pay_type: afterType };
    if (afterType === 'hourly') {
      updatePayload.hourly_rate = afterRate;
      updatePayload.annual_salary = null;
    } else {
      updatePayload.annual_salary = afterRate;
      updatePayload.hourly_rate = null;
    }
    if (newRole) updatePayload.role = newRole;

    await fetch(SB_URL + '/rest/v1/employees?id=eq.' + empId, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify(updatePayload)
    });

    logActivity('Compensation Changed', emp.name + ' · ' + _compChangeTypeLabel(changeType) + ' · ' + reason.substring(0, 100), 'employees', emp.name);
    closeModal();
    toast('✓ Comp change recorded · employee rate updated');
    await loadAll();
    setTimeout(function(){ openEmployeeFile(empId); }, 300);
  } catch(err) {
    console.error(err);
    alert('Failed: ' + err.message);
  }
}

// ── EMPLOYEE FILE PDF EXPORT ──
// Fetches all employee data + generates a curated 2-3 page diligence-grade PDF

async function _fetchEmployeeFileData(empId) {
  var emp = ST.employees.find(function(e){ return e.id === empId; });
  if (!emp) throw new Error('Employee not found');

  var results = await Promise.all([
    sb('/rest/v1/employee_invites?employee_id=eq.' + empId + '&order=sent_at.desc&limit=1'),
    sb('/rest/v1/noncompete_signatures?employee_id=eq.' + empId + '&order=signed_at.desc&limit=1'),
    sb('/rest/v1/employee_documents?employee_id=eq.' + empId + '&order=uploaded_at.desc'),
    sb('/rest/v1/comp_history?employee_id=eq.' + empId + '&order=effective_date.desc'),
    sb('/rest/v1/performance_reviews?employee_id=eq.' + empId + '&order=review_date.desc'),
    sb('/rest/v1/vacation_requests?or=(employee_id.eq.' + empId + ',employee_name.eq.' + encodeURIComponent(emp.name) + ')&order=submitted_at.desc')
  ]);

  return {
    emp: emp,
    invite: (results[0] && results[0].length) ? results[0][0] : null,
    ncSig: (results[1] && results[1].length) ? results[1][0] : null,
    documents: results[2] || [],
    compHistory: results[3] || [],
    reviews: results[4] || [],
    vacationRequests: results[5] || []
  };
}

function _fmtDate(iso, includeTime) {
  if (!iso) return '—';
  var d = new Date(iso.indexOf('T') === -1 ? iso + 'T00:00:00' : iso);
  if (includeTime) return d.toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

function _fmtRate(payType, rate) {
  if (!rate) return '—';
  if (payType === 'salary') return '$' + Number(rate).toLocaleString() + '/yr';
  return '$' + Number(rate).toFixed(2) + '/hr';
}

// Build the PDF document in jsPDF. Returns the jsPDF doc (caller decides what to do with it).
function _buildEmployeeFilePdf(data) {
  if (typeof window.jspdf === 'undefined') throw new Error('PDF library not loaded');
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ orientation:'portrait', unit:'pt', format:'letter' });

  var emp = data.emp;
  var pageW = doc.internal.pageSize.getWidth();
  var pageH = doc.internal.pageSize.getHeight();
  var margin = 40;

  // ===== Shared helpers =====
  var drawHeader = function(pageNum, totalPages) {
    doc.setFillColor(13, 45, 94);
    doc.rect(0, 0, pageW, 70, 'F');
    doc.setTextColor(255,255,255);
    doc.setFont('helvetica','bold'); doc.setFontSize(18);
    doc.text('JG RESTORATION', margin, 32);
    doc.setFont('helvetica','normal'); doc.setFontSize(11);
    doc.text('Confidential Employee File', margin, 52);
    doc.setFontSize(9);
    doc.text('Fire · Water · Mold · Reconstruction', pageW - margin, 32, { align:'right' });
    doc.text('jg-restoration.com  |  (920) 428-4200', pageW - margin, 48, { align:'right' });
    // Footer
    doc.setTextColor(150,150,150);
    doc.setFontSize(8);
    doc.text('CONFIDENTIAL — For internal use and authorized diligence only. Generated ' + new Date().toLocaleString(), margin, pageH - 20);
    doc.text('Page ' + pageNum + ' of ' + totalPages, pageW - margin, pageH - 20, { align:'right' });
  };

  var y = 0;
  var ensureSpace = function(needed) {
    if (y + needed > pageH - 50) {
      doc.addPage();
      y = 90;
    }
  };

  var sectionHeader = function(label) {
    ensureSpace(40);
    doc.setFillColor(240, 243, 250);
    doc.rect(margin, y, pageW - 2*margin, 22, 'F');
    doc.setTextColor(13,45,94);
    doc.setFont('helvetica','bold'); doc.setFontSize(10);
    doc.text(label.toUpperCase(), margin + 10, y + 15);
    y += 30;
  };

  var kvRow = function(label, value, valueColor) {
    ensureSpace(16);
    doc.setTextColor(100,100,100);
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    doc.text(label, margin + 10, y);
    doc.setTextColor.apply(doc, valueColor || [13,45,94]);
    doc.setFont('helvetica','bold');
    doc.text(String(value || '—'), margin + 130, y, { maxWidth: pageW - margin - 140 });
    y += 14;
  };

  var textBlock = function(text, color, italic) {
    if (!text) return;
    ensureSpace(20);
    doc.setTextColor.apply(doc, color || [50,50,50]);
    doc.setFont('helvetica', italic ? 'italic' : 'normal'); doc.setFontSize(9);
    var lines = doc.splitTextToSize(text, pageW - 2*margin - 20);
    lines.forEach(function(line) {
      ensureSpace(12);
      doc.text(line, margin + 10, y);
      y += 11;
    });
    y += 4;
  };

  // ============== PAGE 1 — EMPLOYEE SUMMARY ==============
  drawHeader(1, 3);
  y = 90;

  // Employee name & role banner
  doc.setTextColor(13,45,94);
  doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.text(emp.name || '—', margin, y);

  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  doc.setTextColor(100,100,100);
  y += 20;
  var subLine = [emp.role || '—', emp.market || '—', emp.active ? 'ACTIVE' : 'INACTIVE'].join('  ·  ');
  doc.text(subLine, margin, y);

  y += 6;
  doc.setDrawColor(220,225,235);
  doc.line(margin, y, pageW - margin, y);
  y += 16;

  // Personal Info
  sectionHeader('Personal Info');
  kvRow('Full Name', emp.name);
  kvRow('Email', emp.email);
  kvRow('Phone', emp.phone);
  kvRow('Address', emp.address);
  kvRow('Date of Birth', emp.dob ? _fmtDate(emp.dob) : null);
  kvRow('Hired', emp.hire_date ? _fmtDate(emp.hire_date) : (emp.created_at ? _fmtDate(emp.created_at) : null));
  kvRow('Location', emp.market);
  y += 8;

  // Emergency Contact
  if (emp.emergency_contact_name || emp.emergency_contact_phone) {
    sectionHeader('Emergency Contact');
    kvRow('Name', emp.emergency_contact_name);
    kvRow('Relationship', emp.emergency_contact_relationship);
    kvRow('Phone', emp.emergency_contact_phone);
    y += 8;
  }

  // Current Compensation
  sectionHeader('Current Compensation');
  var currentRate = emp.pay_type === 'salary'
    ? (emp.annual_salary ? '$' + Number(emp.annual_salary).toLocaleString() + ' / year' : '—')
    : (emp.hourly_rate ? '$' + Number(emp.hourly_rate).toFixed(2) + ' / hour' : '—');
  kvRow('Pay Type', (emp.pay_type || 'hourly').toUpperCase());
  kvRow('Current Rate', currentRate);
  kvRow('Role', emp.role);
  y += 8;

  // Documents summary
  sectionHeader('Documents & Certifications (' + data.documents.length + ')');
  if (!data.documents.length) {
    textBlock('No documents uploaded.', [120,120,120], true);
  } else {
    var docRows = data.documents.map(function(doc) {
      var exp = '';
      if (doc.expires_at) {
        var d = new Date(doc.expires_at + 'T00:00:00');
        var days = Math.floor((d.getTime() - Date.now()) / (24*60*60*1000));
        if (days < 0) exp = 'EXPIRED ' + Math.abs(days) + 'd ago';
        else if (days <= 30) exp = 'Expires in ' + days + 'd';
        else exp = _fmtDate(doc.expires_at);
      } else exp = '—';
      return [doc.label || _docTypeLabel(doc.doc_type), _fmtDate(doc.uploaded_at), exp];
    });
    doc.autoTable({
      startY: y,
      head: [['Document', 'Uploaded', 'Expires']],
      body: docRows,
      theme: 'grid',
      styles: { fontSize: 8, cellPadding: 4 },
      headStyles: { fillColor: [13,45,94], textColor: [255,255,255], fontStyle: 'bold' },
      alternateRowStyles: { fillColor: [248,249,252] },
      margin: { left: margin, right: margin }
    });
    y = doc.lastAutoTable.finalY + 10;
  }

  // ============== PAGE 2 — COMP & PERFORMANCE ==============
  doc.addPage();
  drawHeader(2, 3);
  y = 90;

  doc.setTextColor(13,45,94);
  doc.setFont('helvetica','bold'); doc.setFontSize(14);
  doc.text('Compensation & Performance', margin, y);
  y += 22;

  // Comp History
  sectionHeader('Compensation History (' + data.compHistory.length + ')');
  if (!data.compHistory.length) {
    textBlock('No compensation history recorded.', [120,120,120], true);
  } else {
    var compRows = data.compHistory.map(function(c) {
      var before = c.before_rate ? _fmtRate(c.before_pay_type || 'hourly', c.before_rate) : '—';
      var after = _fmtRate(c.after_pay_type || 'hourly', c.after_rate);
      var delta = '—';
      if (c.before_rate && c.after_rate && (c.before_pay_type||'hourly') === (c.after_pay_type||'hourly')) {
        var pct = ((c.after_rate - c.before_rate) / c.before_rate * 100).toFixed(1);
        delta = (c.after_rate > c.before_rate ? '+' : '') + '$' + (c.after_rate - c.before_rate).toFixed(2) + '  (' + (pct > 0 ? '+' : '') + pct + '%)';
      }
      return [_fmtDate(c.effective_date), _compChangeTypeLabel(c.change_type), before, after, delta, c.reason || ''];
    });
    doc.autoTable({
      startY: y,
      head: [['Effective', 'Type', 'Before', 'After', 'Change', 'Reason']],
      body: compRows,
      theme: 'grid',
      styles: { fontSize: 8, cellPadding: 4 },
      headStyles: { fillColor: [13,45,94], textColor: [255,255,255], fontStyle: 'bold' },
      alternateRowStyles: { fillColor: [248,249,252] },
      columnStyles: { 5: { cellWidth: 140 } },
      margin: { left: margin, right: margin }
    });
    y = doc.lastAutoTable.finalY + 16;
  }

  // Performance reviews
  sectionHeader('Performance Reviews (' + data.reviews.length + ')');
  if (!data.reviews.length) {
    textBlock('No performance reviews recorded.', [120,120,120], true);
  } else {
    var ratingLabels = { 'exceeds':'Exceeds Expectations', 'meets':'Meets Expectations', 'needs_improvement':'Needs Improvement', 'new_hire':'New Hire / 90-day' };
    data.reviews.forEach(function(rv, idx) {
      ensureSpace(80);
      // Header strip for each review
      doc.setFillColor(13,45,94);
      doc.rect(margin, y, pageW - 2*margin, 18, 'F');
      doc.setTextColor(255,255,255);
      doc.setFont('helvetica','bold'); doc.setFontSize(9);
      var title = (rv.review_type ? rv.review_type.charAt(0).toUpperCase()+rv.review_type.slice(1) : 'Review') + ' · ' + _fmtDate(rv.review_date) + ' · ' + (ratingLabels[rv.rating] || rv.rating || '');
      doc.text(title, margin + 8, y + 12);
      doc.setFont('helvetica','normal'); doc.setFontSize(8);
      doc.text('Reviewer: ' + (rv.reviewed_by || '—'), pageW - margin - 8, y + 12, { align:'right' });
      y += 24;

      if (rv.strengths) {
        doc.setTextColor(46,125,50);
        doc.setFont('helvetica','bold'); doc.setFontSize(8);
        ensureSpace(12); doc.text('STRENGTHS', margin + 10, y); y += 11;
        textBlock(rv.strengths, [50,50,50], false);
      }
      if (rv.growth_areas) {
        doc.setTextColor(230,81,0);
        doc.setFont('helvetica','bold'); doc.setFontSize(8);
        ensureSpace(12); doc.text('GROWTH AREAS', margin + 10, y); y += 11;
        textBlock(rv.growth_areas, [50,50,50], false);
      }
      if (rv.goals) {
        doc.setTextColor(13,45,94);
        doc.setFont('helvetica','bold'); doc.setFontSize(8);
        ensureSpace(12); doc.text('GOALS (Next 12 Months)', margin + 10, y); y += 11;
        textBlock(rv.goals, [50,50,50], false);
      }
      y += 8;
    });
  }

  // Time Off Request History
  sectionHeader('Time Off Request History (' + data.vacationRequests.length + ')');
  if (!data.vacationRequests.length) {
    textBlock('No time off requests on record.', [120,120,120], true);
  } else {
    var vrThisYearPdf = new Date().getFullYear();
    var vrPdfApproved = data.vacationRequests.filter(function(r){ return r.status === 'approved'; });
    var vrPdfDenied = data.vacationRequests.filter(function(r){ return r.status === 'denied'; });
    var vrPdfPending = data.vacationRequests.filter(function(r){ return r.status === 'pending'; });
    var vrPdfYtdDays = vrPdfApproved.filter(function(r){
      return new Date(r.start_date+'T12:00:00').getFullYear() === vrThisYearPdf;
    }).reduce(function(s,r){ return s + (parseFloat(r.days_requested)||0); }, 0);
    doc.setTextColor(100,100,100);
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    var vrSummary = 'Total: ' + data.vacationRequests.length +
                    '  ·  Approved: ' + vrPdfApproved.length +
                    '  ·  Denied: ' + vrPdfDenied.length +
                    '  ·  Pending: ' + vrPdfPending.length +
                    '  ·  ' + vrThisYearPdf + ' Days Taken: ' + vrPdfYtdDays;
    ensureSpace(14);
    doc.text(vrSummary, margin + 10, y);
    y += 16;
    var vrRows = data.vacationRequests.map(function(r) {
      var dateRange = r.start_date === r.end_date
        ? _fmtDate(r.start_date)
        : _fmtDate(r.start_date) + ' to ' + _fmtDate(r.end_date);
      var daysLabel = r.days_requested + 'd / ' + r.hours_requested + 'h';
      var statusLabel = (r.status || '').toUpperCase();
      var reviewer = '';
      if (r.status === 'approved' || r.status === 'denied') {
        reviewer = (r.reviewed_by || '—');
        if (r.reviewed_at) reviewer += '\n' + _fmtDate(r.reviewed_at);
      } else {
        reviewer = 'Pending';
      }
      var notesCol = '';
      if (r.notes) notesCol += 'Emp: ' + r.notes;
      if (r.review_notes) {
        if (notesCol) notesCol += '\n';
        notesCol += (r.status === 'denied' ? 'Denial: ' : 'Review: ') + r.review_notes;
      }
      if (r.notice_met === false) {
        if (notesCol) notesCol += '\n';
        notesCol += 'LATE NOTICE (' + (r.notice_days||0) + 'd of 30)';
      }
      return [
        _fmtDate(r.submitted_at),
        dateRange,
        daysLabel,
        r.reason || '—',
        statusLabel,
        reviewer,
        notesCol || '—'
      ];
    });
    doc.autoTable({
      startY: y,
      head: [['Submitted', 'Dates', 'Duration', 'Reason', 'Status', 'Reviewer', 'Notes']],
      body: vrRows,
      theme: 'grid',
      styles: { fontSize: 7, cellPadding: 3, overflow: 'linebreak' },
      headStyles: { fillColor: [13,45,94], textColor: [255,255,255], fontStyle: 'bold', fontSize: 8 },
      alternateRowStyles: { fillColor: [248,249,252] },
      columnStyles: {
        0: { cellWidth: 55 },
        1: { cellWidth: 95 },
        2: { cellWidth: 50 },
        3: { cellWidth: 50 },
        4: { cellWidth: 45 },
        5: { cellWidth: 55 },
        6: { cellWidth: 'auto' }
      },
      margin: { left: margin, right: margin },
      didParseCell: function(cd) {
        if (cd.column.index === 4 && cd.section === 'body') {
          var st = (cd.cell.raw || '').toString().toLowerCase();
          if (st === 'approved') cd.cell.styles.textColor = [46,125,50];
          else if (st === 'denied') cd.cell.styles.textColor = [198,40,40];
          else if (st === 'pending') cd.cell.styles.textColor = [230,81,0];
          cd.cell.styles.fontStyle = 'bold';
        }
      }
    });
    y = doc.lastAutoTable.finalY + 16;
  }

  // ============== PAGE 3 — LEGAL & COMPLIANCE ==============
  doc.addPage();
  drawHeader(3, 3);
  y = 90;

  doc.setTextColor(13,45,94);
  doc.setFont('helvetica','bold'); doc.setFontSize(14);
  doc.text('Legal & Compliance', margin, y);
  y += 22;

  // Onboarding
  sectionHeader('Onboarding Acknowledgments');
  var ob = data.invite && data.invite.acknowledgments ? data.invite.acknowledgments : null;
  if (ob && (ob.signed_at || ob.signature)) {
    kvRow('Signed', ob.signed_at ? _fmtDate(ob.signed_at, true) : 'Yes');
    kvRow('Typed Signature', ob.signature || emp.onboarding_signed_name || '—');
    if (ob.handbook_version) {
      kvRow('Handbook Version', _fmtDate(ob.handbook_version.version_date));
      kvRow('Handbook Hash', ob.handbook_version.file_hash ? (ob.handbook_version.file_hash.substring(0,24)+'…') : '—');
    }
    var ackItems = [];
    if (ob.code_of_conduct) ackItems.push('Code of Conduct');
    if (ob.safety_ppe) ackItems.push('Safety & PPE');
    if (ob.confidentiality) ackItems.push('Confidentiality');

async function exportAllEmployeeFilesPDF() {
  if (!isAdmin()) { toast('Admin only'); return; }
  if (typeof JSZip === 'undefined') { alert('ZIP library not loaded — refresh page'); return; }

  // Only active employees by default, confirm inclusion of inactive
  var active = ST.employees.filter(function(e){ return e.active; });
  var inactive = ST.employees.filter(function(e){ return !e.active; });

  var includeInactive = false;
  if (inactive.length > 0) {
    includeInactive = confirm('Include '+inactive.length+' inactive employee'+(inactive.length>1?'s':'')+' in the export?\n\nOK = include all employees\nCancel = only '+active.length+' active employees');
  }
  var toExport = includeInactive ? ST.employees.slice() : active;

  if (!toExport.length) { alert('No employees to export.'); return; }

  if (!confirm('Generate PDF for ' + toExport.length + ' employee' + (toExport.length>1?'s':'') + ' and download as a ZIP?\n\nThis may take ~' + Math.max(5, toExport.length * 2) + ' seconds.')) return;

  toast('Building ' + toExport.length + ' PDFs...');
  var zip = new JSZip();
  var folder = zip.folder('JG_Employee_Files_' + new Date().toISOString().split('T')[0]);
  var errors = [];

  for (var i = 0; i < toExport.length; i++) {
    var emp = toExport[i];
    try {
      var data = await _fetchEmployeeFileData(emp.id);
      var pdfDoc = _buildEmployeeFilePdf(data);
      var pdfBlob = pdfDoc.output('blob');
      var safeName = emp.name.replace(/[^a-zA-Z0-9]/g, '_');
      folder.file('JG_EmployeeFile_' + safeName + '.pdf', pdfBlob);
      toast('(' + (i+1) + '/' + toExport.length + ') ' + emp.name);
    } catch(err) {
      console.error('Failed for ' + emp.name + ':', err);
      errors.push(emp.name + ': ' + err.message);
    }
  }

  // Add manifest CSV with summary
  var manifestRows = [['Name','Role','Market','Status','Hired','Current Rate','Onboarding Signed','NC Signed','# Documents','# Comp Changes','# Reviews']];
  for (var j = 0; j < toExport.length; j++) {
    var e = toExport[j];
    try {
      var d = await _fetchEmployeeFileData(e.id);
      var rate = d.emp.pay_type === 'salary' ? ('$'+Number(d.emp.annual_salary||0).toLocaleString()+'/yr') : ('$'+Number(d.emp.hourly_rate||0).toFixed(2)+'/hr');
      manifestRows.push([
        e.name, e.role||'', e.market||'', e.active?'Active':'Inactive',
        e.hire_date ? _fmtDate(e.hire_date) : (e.created_at ? _fmtDate(e.created_at) : ''),
        rate,
        e.onboarding_signed_at ? 'YES' : 'NO',
        e.noncompete_signed_at ? 'YES' : 'NO',
        String(d.documents.length),
        String(d.compHistory.length),
        String(d.reviews.length)
      ]);
    } catch(e2) {}
  }
  var csv = manifestRows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  folder.file('_MANIFEST.csv', csv);

  // Add README
  var readme =
    'JG RESTORATION — EMPLOYEE FILES EXPORT\n' +
    '======================================\n\n' +
    'Generated: ' + new Date().toLocaleString() + '\n' +
    'Exported by: ' + getApprovedBy() + '\n' +
    'Employees in export: ' + toExport.length + '\n' +
    (errors.length ? 'Errors during generation: ' + errors.length + '\n' : '') +
    '\nEach PDF contains:\n' +
    '  Page 1 — Employee Summary (personal info, comp, documents)\n' +
    '  Page 2 — Compensation History + Performance Reviews\n' +
    '  Page 3 — Legal & Compliance (onboarding signatures, non-compete)\n' +
    '\nSupporting documents (signed non-competes, uploaded IDs, certifications)\n' +
    'are stored separately in Supabase Storage and are available on request.\n' +
    '\n_MANIFEST.csv — summary table of all employees in this export\n' +
    '\nCONFIDENTIAL — For authorized due diligence only.\n';
  folder.file('README.txt', readme);

  // Generate + save the ZIP
  var zipBlob = await zip.generateAsync({ type:'blob' });
  var url = URL.createObjectURL(zipBlob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'JG_Employee_Files_' + new Date().toISOString().split('T')[0] + '.zip';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  logActivity('Employee Files Bulk Exported', toExport.length + ' employees · ZIP + manifest', 'employees', null);
  if (errors.length) {
    alert('✓ Exported with ' + errors.length + ' errors:\n\n' + errors.join('\n'));
  } else {
    toast('✓ ZIP downloaded — ' + toExport.length + ' employee files');
  }
}

async function _submitDocumentUpload(empId) {
  var emp = ST.employees.find(function(e){ return e.id === empId; });
  if (!emp) { alert('Employee not found'); return; }

  var docType = document.getElementById('doc-type').value;
  var customLabel = (document.getElementById('doc-custom-label')||{}).value || '';
  var file = document.getElementById('doc-file').files[0];
  var expires = document.getElementById('doc-expires').value;
  var notes = document.getElementById('doc-notes').value.trim();

  if (!file) { alert('Please select a file to upload.'); return; }
  if (file.size > 10 * 1024 * 1024) { alert('File is too large. Maximum 10 MB.'); return; }
  if (docType === 'other' && !customLabel.trim()) { alert('Please provide a custom label for "Other" type.'); return; }

  var label = docType === 'other' ? customLabel.trim() : _docTypeLabel(docType);

  // Build safe filename
  var ext = (file.name.split('.').pop() || 'bin').toLowerCase();
  var safeName = emp.name.replace(/[^a-zA-Z0-9]/g, '_');
  var safeType = docType.replace(/[^a-zA-Z0-9_-]/g, '');
  var timestamp = Date.now();
  var filename = safeName + '_' + safeType + '_' + timestamp + '.' + ext;
  var storagePath = empId + '/' + filename;

  try {
    // 1. Upload to private bucket
    var uploadR = await fetch(SB_URL + '/storage/v1/object/employee-documents/' + storagePath, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': file.type || 'application/octet-stream',
        'x-upsert': 'true'
      },
      body: file
    });
    if (!uploadR.ok) {
      var errTxt = await uploadR.text();
      throw new Error('Upload failed ('+uploadR.status+'): ' + errTxt.substring(0,200));
    }

    // 2. Record in database
    var recordR = await fetch(SB_URL + '/rest/v1/employee_documents', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        employee_id: empId,
        employee_name: emp.name,
        doc_type: docType,
        label: label,
        storage_path: storagePath,
        original_filename: file.name,
        file_size: file.size,
        mime_type: file.type || 'application/octet-stream',
        expires_at: expires || null,
        notes: notes || null,
        uploaded_by: getApprovedBy(),
        uploaded_at: new Date().toISOString()
      })
    });
    if (!recordR.ok) {
      var recErr = await recordR.text();
      throw new Error('Record save failed: ' + recErr.substring(0, 200));
    }

    logActivity('Document Uploaded', emp.name + ' · ' + label + (expires ? ' · expires '+expires : ''), 'employees', emp.name);

    closeModal();
    toast('✓ ' + label + ' uploaded for ' + emp.name);
    // Reopen the employee file to show the new doc
    setTimeout(function(){ openEmployeeFile(empId); }, 300);
  } catch(err) {
    console.error(err);
    alert('Upload failed: ' + err.message);
  }
}

async function _submitNoncompeteRequest(empId) {
  var emp = ST.employees.find(function(e){ return e.id === empId; });
  if (!emp) { alert('Employee not found'); return; }

  var email = (document.getElementById('nc-req-email')||{}).value.trim().toLowerCase();
  var phone = (document.getElementById('nc-req-phone')||{}).value.trim();
  var channelEl = document.querySelector('input[name="nc-req-channel"]:checked');
  var channel = channelEl ? channelEl.value : 'link';

  if ((channel==='sms' || channel==='both') && !phone) { alert('Phone is required for SMS'); return; }
  if ((channel==='email' || channel==='both') && !email) { alert('Email is required for email channel'); return; }

  var token = _generateInviteToken();
  var expiresAt = new Date(Date.now() + 14*24*60*60*1000).toISOString();

  try {
    // Invalidate any prior pending requests for this employee
    await fetch(SB_URL + '/rest/v1/noncompete_requests?employee_id=eq.' + empId + '&status=eq.pending', {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'superseded' })
    });

    // Create new request record
    var createR = await fetch(SB_URL + '/rest/v1/noncompete_requests', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        token: token,
        employee_id: empId,
        employee_name: emp.name,
        sent_to_email: email || null,
        sent_to_phone: phone || null,
        channel: channel,
        status: 'pending',
        sent_at: new Date().toISOString(),
        expires_at: expiresAt,
        sent_by: getApprovedBy()
      })
    });
    if (!createR.ok) {
      var errText = await createR.text().catch(function(){return '';});
      if (errText.indexOf('does not exist') !== -1 || errText.indexOf('relation') !== -1) {
        throw new Error('Database table missing. Run the SQL for noncompete_requests table.');
      }
      throw new Error('Failed to create request: ' + errText.substring(0, 200));
    }

    // Build the signing URL
    var signUrl = window.location.origin + window.location.pathname.replace(/[^\/]+$/, '') + 'sign_noncompete.html?token=' + token;

    // Prepare messages
    var firstName = emp.name.split(' ')[0];
    var smsBody = 'Hi '+firstName+' — JG Restoration needs your signature on our Non-Competition Agreement. Tap here to review & sign (link expires in 14 days): '+signUrl+' — Questions? Call (920) 428-4200.';
    var emailSubject = 'Action Required: JG Restoration Non-Compete Agreement';
    var emailBody = 'Hi '+firstName+',\n\nAs part of our ongoing workplace documentation, JG Restoration is requiring all current employees to review and sign our Non-Competition Agreement.\n\nTo review and sign, click this secure link (expires in 14 days):\n'+signUrl+'\n\nThe signing process takes about 3 minutes. You\'ll see the full agreement before signing.\n\nIf you have questions before signing, please talk to Josh or call (920) 428-4200. If you have concerns about any terms, let us know — we\'d rather address them before you sign than afterward.\n\nThank you,\nJG Restoration';

    // Fire webhook(s)
    if (channel === 'sms' || channel === 'both') {
      try {
        var normalizedPhone = _normalizePhoneE164(phone);
        if (normalizedPhone) {
          var smsParams = new URLSearchParams({
            type: 'noncompete_sms',
            to: normalizedPhone,
            body: smsBody,
            employee_name: emp.name
          });
          await fetch(HOOKS.onboarding, {
            method: 'POST',
            body: smsParams.toString(),
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
          });
        }
      } catch(e) { console.warn('NC SMS send failed:', e); }
    }
    if (channel === 'email' || channel === 'both') {
      try {
        var emailParams = new URLSearchParams({
          type: 'noncompete_email',
          to: email,
          subject: emailSubject,
          body: emailBody,
          employee_name: emp.name
        });
        await fetch(HOOKS.onboarding, {
          method: 'POST',
          body: emailParams.toString(),
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });
      } catch(e) { console.warn('NC email send failed:', e); }
    }

    logActivity('Non-Compete Requested', emp.name + ' • sent via ' + channel, 'employees', emp.name);
    closeModal();

    // Show confirmation with copy link
    var confBody = '';
    confBody += '<div style="text-align:center;margin-bottom:16px;">';
    confBody += '<div style="font-size:40px;margin-bottom:8px;">✅</div>';
    confBody += '<div style="font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px;">Signing Request Sent</div>';
    confBody += '<div style="font-size:13px;color:var(--muted);">'+emp.name+' will receive their signing link via <strong>'+(channel==='both'?'SMS + email':channel==='sms'?'SMS':channel==='email'?'email':'link copy')+'</strong>.</div>';
    confBody += '</div>';
    confBody += '<div style="background:rgba(13,45,94,.04);border-radius:8px;padding:12px 14px;margin-bottom:12px;">';
    confBody += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;">Signing Link</div>';
    confBody += '<div style="font-size:11px;font-family:DM Mono,monospace;word-break:break-all;background:#fff;padding:8px 10px;border-radius:6px;border:1px solid var(--border);margin-bottom:8px;">'+signUrl+'</div>';
    confBody += '<button class="btn btn-sm" onclick="_copyInviteLink(this)" data-url="'+signUrl+'" style="background:var(--navy);color:#fff;border-color:var(--navy);">📋 Copy Link</button>';
    confBody += '</div>';
    confBody += '<div style="font-size:11px;color:var(--muted);padding:8px 12px;background:rgba(230,81,0,.04);border-radius:6px;line-height:1.5;">⏱ Link expires in <strong>14 days</strong>. You can send a new request if they don\'t sign in time.</div>';
    showModal('Request Sent', confBody, null);

  } catch(err) {
    console.error(err);
    alert('Request failed: ' + err.message);
  }
}

async function viewEmpLog(name, email) {
  var modal = document.getElementById('tc-modal');
  var body  = document.getElementById('tc-modal-body');
  var title = document.getElementById('tc-modal-title');
  if (!modal || !body || !title) return;
  title.textContent = '📋 Employee Log — ' + name;
  body.innerHTML = '<div style="padding:20px;color:var(--muted);">Loading...</div>';
  modal.style.display = 'flex';

  try {
    var r = await fetch(SB_URL + '/rest/v1/employee_log?employee_email=eq.' + encodeURIComponent(email) + '&order=date.desc&limit=50&select=*', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    var logs = await r.json() || [];
    if (!logs.length) {
      body.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);">No log entries yet</div>';
      return;
    }
    var html = '<table class="tc-table"><thead><tr><th>Date</th><th>Action</th><th>Detail</th><th>By</th></tr></thead><tbody>';
    logs.forEach(function(l) {
      var typeColor = l.type === 'oncall_swap' ? '#1565c0' : l.type === 'correction' ? '#e65100' : 'var(--muted)';
      html += '<tr>';
      html += '<td style="white-space:nowrap;">' + l.date + '</td>';
      html += '<td><span style="font-size:11px;font-weight:700;color:'+typeColor+';">' + (l.action||'—') + '</span></td>';
      html += '<td style="font-size:11px;max-width:260px;">' + (l.detail||'—') + '</td>';
      html += '<td style="font-size:11px;color:var(--muted);">' + (l.logged_by||'—') + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    body.innerHTML = html;
  } catch(e) {
    body.innerHTML = '<div style="padding:20px;color:var(--red);">Error loading log: ' + e.message + '</div>';
  }
}

function calcAflac() {
  var startEl = document.getElementById('emp-start-date');
  var dateEl  = document.getElementById('aflac-date');
  if (!startEl || !dateEl) return;
  if (startEl.value) {
    var p = startEl.value.split('-');
    var d = new Date(parseInt(p[0]), parseInt(p[1])-1, parseInt(p[2]) + 90);
    dateEl.innerHTML = d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  } else {
    dateEl.innerHTML = '<em style="color:#999;">Enter start date to calculate</em>';
  }
}

function calcPtoRemaining() {
  var total = parseFloat((document.getElementById('emp-pto-total') || {}).value) || 0;
  var used  = parseFloat((document.getElementById('emp-pto-used')  || {}).value) || 0;
  var remaining = Math.max(0, total - used);
  var dispEl = document.getElementById('emp-pto-remaining-display');
  var hiddenEl = document.getElementById('emp-pto-available');
  if (dispEl) {
    dispEl.textContent = remaining.toFixed(1) + ' hrs';
    dispEl.style.color = remaining <= 8 ? '#c62828' : remaining <= 24 ? '#e65100' : '#2e7d32';
  }
  if (hiddenEl) hiddenEl.value = remaining;
}

// Sync the Dispatch toggle's visual state (track color + thumb position) with the hidden checkbox
function updateDispatchToggle(cb) {
  var track = document.getElementById('emp-dispatch-track');
  var thumb = document.getElementById('emp-dispatch-thumb');
  if (track) track.style.background = cb.checked ? 'var(--orange)' : '#ccc';
  if (thumb) thumb.style.left = cb.checked ? '22px' : '2px';
}

function togglePayFields() {
  var type = (document.getElementById('emp-pay-type') || {}).value;
  var hourlyDiv = document.getElementById('emp-hourly-fields');
  var salaryDiv = document.getElementById('emp-salary-fields');
  if (hourlyDiv) hourlyDiv.style.display = type === 'salary' ? 'none' : 'block';
  if (salaryDiv) salaryDiv.style.display = type === 'salary' ? 'block' : 'none';
}

function calcDailyRate() {
  var salary = parseFloat((document.getElementById('emp-salary') || {}).value) || 0;
  var dailyEl = document.getElementById('emp-daily-rate');
  if (dailyEl && salary) dailyEl.value = (salary / 260).toFixed(2);
}

async function saveEmployee() {
  var personalEmail = ((document.getElementById('emp-personal-email')||{}).value || '').trim().toLowerCase();
  // Validate: if provided, must look like an email
  if (personalEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(personalEmail)) {
    alert('Personal email doesn\'t look right. Example: their.name@gmail.com');
    return;
  }
  var data = {
    name: document.getElementById('emp-name').value.trim(),
    email: document.getElementById('emp-email').value.trim().toLowerCase(),
    personal_email: personalEmail || null,
    role:             document.getElementById('emp-role').value,
    phone:            (document.getElementById('emp-phone')      ||{}).value || null,
    birthday:         (document.getElementById('emp-birthday')   ||{}).value || null,
    start_date:       (document.getElementById('emp-start-date') ||{}).value || null,
    termination_date: (document.getElementById('emp-term-date')  ||{}).value || null,
    market: document.getElementById('emp-market').value,
    hourly_rate: parseFloat(document.getElementById('emp-rate').value) || 0,
    active: document.getElementById('emp-active').checked,
    show_on_dispatch: document.getElementById('emp-dispatch') ? document.getElementById('emp-dispatch').checked : true,
    pay_type: (document.getElementById('emp-pay-type') || {}).value || 'hourly',
    annual_salary: parseFloat((document.getElementById('emp-salary') || {}).value) || null,
    daily_rate: parseFloat((document.getElementById('emp-daily-rate') || {}).value) || null,
    pto_hours_used: parseFloat((document.getElementById('emp-pto-used')||{}).value) || 0,
    pto_hours_available: Math.max(0, (parseFloat((document.getElementById('emp-pto-total')||{}).value)||0) - (parseFloat((document.getElementById('emp-pto-used')||{}).value)||0)),
    pto_accrual_rate: parseFloat(document.getElementById('emp-pto-accrual').value) || 0,
    pto_notes: (document.getElementById('emp-pto-notes').value || '').trim(),
    default_commission_rate: parseFloat((document.getElementById('emp-comm-rate')||{}).value) || null,
    albi_salesperson_name: ((document.getElementById('emp-albi-sales-name')||{}).value || '').trim() || null,
    paychex_id: (((document.getElementById('emp-paychex-id')||{}).value) || ((document.getElementById('emp-paychex-id-sal')||{}).value) || '').trim() || null
  };
  if (!data.name || !data.email) { toast('Name and email are required'); return; }
  var saveHeaders = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
  var saveResult;
  if (ST.editEmp) {
    saveResult = await fetch(SB_URL+'/rest/v1/employees?id=eq.'+ST.editEmp, {method:'PATCH', headers:saveHeaders, body:JSON.stringify(data)});
    if (!saveResult.ok) {
      // Fallback: try with only core columns in case new columns not yet in DB
      var coreData = { name: data.name, email: data.email, role: data.role, market: data.market, hourly_rate: data.hourly_rate, active: data.active };
      saveResult = await fetch(SB_URL+'/rest/v1/employees?id=eq.'+ST.editEmp, {method:'PATCH', headers:saveHeaders, body:JSON.stringify(coreData)});
      toast('⚠ Saved basic info — run SQL migration to enable all fields');
    } else {
      toast('✓ Employee updated');
    }
  } else {
    saveResult = await fetch(SB_URL+'/rest/v1/employees', {method:'POST', headers:{...saveHeaders,'Prefer':'return=minimal'}, body:JSON.stringify(data)});
    if (!saveResult.ok) {
      var coreData2 = { name: data.name, email: data.email, role: data.role, market: data.market, hourly_rate: data.hourly_rate, active: data.active };
      await fetch(SB_URL+'/rest/v1/employees', {method:'POST', headers:{...saveHeaders,'Prefer':'return=minimal'}, body:JSON.stringify(coreData2)});
      toast('⚠ Saved basic info — run SQL migration to enable all fields');
    }
    ST.editEmp = null;
    await loadAll();
    closeModal();
    showWelcomeMessage(data.name, data.email);
    return;
  }
  ST.editEmp = null;
  closeModal();
  await loadAll();
}


// ── DELETE EMPLOYEE (with audit-safe blocking) ────────────────────────────
// Only allows delete if employee has ZERO historical data that matters for the audit trail.
async function attemptDeleteEmployee(empId) {
  if (!isAdmin()) { toast('Admin only'); return; }
  var emp = ST.employees.find(function(e){ return e.id === empId; });
  if (!emp) { toast('Employee not found'); return; }

  // Check for blocking data in parallel — faster than sequential
  toast('Checking employee history...');
  try {
    var checks = await Promise.all([
      // time entries by id OR by name (legacy entries may not have id)
      sb('/rest/v1/time_entries?or=(employee_id.eq.'+empId+',employee_name.eq.'+encodeURIComponent(emp.name)+')&select=id&limit=1'),
      // approved timecards (archived)
      sb('/rest/v1/timecard_archive?employee_id=eq.'+empId+'&select=id&limit=1'),
      // commissions
      sb('/rest/v1/commissions?or=(employee_id.eq.'+empId+',employee_name.eq.'+encodeURIComponent(emp.name)+')&select=id&limit=1'),
      // absences
      sb('/rest/v1/absence_records?employee_name=eq.'+encodeURIComponent(emp.name)+'&select=id&limit=1'),
      // vacation requests
      sb('/rest/v1/vacation_requests?or=(employee_id.eq.'+empId+',employee_name.eq.'+encodeURIComponent(emp.name)+')&select=id&limit=1'),
      // count full rows for the "breakdown" on block
      sb('/rest/v1/time_entries?or=(employee_id.eq.'+empId+',employee_name.eq.'+encodeURIComponent(emp.name)+')&select=id'),
      sb('/rest/v1/timecard_archive?employee_id=eq.'+empId+'&select=id'),
      sb('/rest/v1/commissions?or=(employee_id.eq.'+empId+',employee_name.eq.'+encodeURIComponent(emp.name)+')&select=id'),
      sb('/rest/v1/absence_records?employee_name=eq.'+encodeURIComponent(emp.name)+'&select=id'),
      sb('/rest/v1/vacation_requests?or=(employee_id.eq.'+empId+',employee_name.eq.'+encodeURIComponent(emp.name)+')&select=id')
    ]);

    var counts = {
      timeEntries: (checks[5] || []).length,
      timecardArchives: (checks[6] || []).length,
      commissions: (checks[7] || []).length,
      absences: (checks[8] || []).length,
      vacationRequests: (checks[9] || []).length,
      signedOnboarding: emp.onboarding_signed_at ? 1 : 0
    };

    var hasHistory = counts.timeEntries > 0 || counts.timecardArchives > 0 ||
                     counts.commissions > 0 || counts.absences > 0 ||
                     counts.vacationRequests > 0 || counts.signedOnboarding > 0;

    if (hasHistory) {
      _showDeleteBlocked(emp, counts);
    } else {
      _showDeleteConfirm(emp);
    }
  } catch(err) {
    console.error(err);
    alert('Could not verify employee history. Refusing to delete.\n\nError: ' + err.message);
  }
}

async function _executeForceDelete() {
  var ctx = window._forceDeleteCtx;
  if (!ctx || !ctx.emp) return;
  var emp = ctx.emp;
  var counts = ctx.counts;
  var reason = document.getElementById('fd-reason').value.trim();

  var btn = document.getElementById('fd-confirm-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Destroying data...'; }

  var empId = emp.id;
  var empName = emp.name;
  var errors = [];

  // Build structured audit log entry BEFORE delete so we have record of what was destroyed
  var auditDetail = 'Force deleted ' + empName + ' (' + (emp.email||'no email') + '). Reason: "' + reason + '". Destroyed: ' +
    counts.timeEntries + ' time entries, ' +
    counts.timecardArchives + ' timecard archives, ' +
    counts.commissions + ' commissions, ' +
    counts.absences + ' absences, ' +
    counts.vacationRequests + ' vacation requests' +
    (counts.signedOnboarding > 0 ? ', signed onboarding' : '');

  try {
    // 1. Delete time entries (by id and by name to catch legacy)
    await fetch(SB_URL + '/rest/v1/time_entries?or=(employee_id.eq.'+empId+',employee_name.eq.'+encodeURIComponent(empName)+')', {
      method: 'DELETE', headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    }).catch(function(e){ errors.push('time_entries: '+e.message); });

    // 2. Delete timecard archives
    await fetch(SB_URL + '/rest/v1/timecard_archive?employee_id=eq.'+empId, {
      method: 'DELETE', headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    }).catch(function(e){ errors.push('timecard_archive: '+e.message); });

    // 3. Delete commissions
    await fetch(SB_URL + '/rest/v1/commissions?or=(employee_id.eq.'+empId+',employee_name.eq.'+encodeURIComponent(empName)+')', {
      method: 'DELETE', headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    }).catch(function(e){ errors.push('commissions: '+e.message); });

    // 4. Delete absence records
    await fetch(SB_URL + '/rest/v1/absence_records?employee_name=eq.'+encodeURIComponent(empName), {
      method: 'DELETE', headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    }).catch(function(e){ errors.push('absence_records: '+e.message); });

    // 5. Delete vacation requests
    await fetch(SB_URL + '/rest/v1/vacation_requests?or=(employee_id.eq.'+empId+',employee_name.eq.'+encodeURIComponent(empName)+')', {
      method: 'DELETE', headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    }).catch(function(e){ errors.push('vacation_requests: '+e.message); });

    // 6. Delete employee_invites (all statuses, this is a force wipe)
    await fetch(SB_URL + '/rest/v1/employee_invites?employee_id=eq.'+empId, {
      method: 'DELETE', headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    }).catch(function(e){ errors.push('employee_invites: '+e.message); });

    // 7. Delete noncompete_signatures + noncompete_requests
    await fetch(SB_URL + '/rest/v1/noncompete_signatures?employee_id=eq.'+empId, {
      method: 'DELETE', headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    }).catch(function(e){ errors.push('noncompete_signatures: '+e.message); });
    await fetch(SB_URL + '/rest/v1/noncompete_requests?employee_id=eq.'+empId, {
      method: 'DELETE', headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    }).catch(function(e){ errors.push('noncompete_requests: '+e.message); });

    // 8. Finally delete the employee row itself
    var r = await fetch(SB_URL + '/rest/v1/employees?id=eq.'+empId, {
      method: 'DELETE', headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    if (!r.ok) throw new Error('Employee delete failed: ' + r.status);

    // 9. Log to activity AFTER (so the audit survives even though emp row is gone)
    logActivity('Employee Force Deleted', auditDetail, 'employees', empName);

    closeModal();
    window._forceDeleteCtx = null;
    toast('⚠ Force deleted ' + empName + (errors.length ? ' (with '+errors.length+' non-fatal errors)' : ''));
    if (errors.length) console.warn('Force delete non-fatal errors:', errors);
    await loadAll();
  } catch(err) {
    console.error(err);
    alert('Force delete failed: ' + err.message + '\n\nSome data may have been destroyed before the failure. Check the activity log and Supabase directly.');
    if (btn) { btn.disabled = false; btn.textContent = '⚠ Permanently Destroy All Data'; btn.style.opacity = '1'; }
  }
}

async function _executeDelete(empId, empName) {
  var btn = document.getElementById('del-confirm-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Deleting...'; }

  try {
    // Mark any pending invites as revoked (keeps audit trail per your choice)
    var pendingInvites = await sb('/rest/v1/employee_invites?employee_id=eq.'+empId+'&status=eq.pending&select=id');
    if (pendingInvites && pendingInvites.length) {
      await fetch(SB_URL + '/rest/v1/employee_invites?employee_id=eq.'+empId+'&status=eq.pending', {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'revoked', accepted_at: null })
      });
    }

    // Delete the employee record
    var r = await fetch(SB_URL + '/rest/v1/employees?id=eq.'+empId, {
      method: 'DELETE',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    if (!r.ok) throw new Error('Delete failed: ' + r.status);

    // Log to activity
    logActivity('Employee Deleted', empName + ' • no historical data, clean delete', 'employees', empName);

    closeModal();
    toast('✓ ' + empName + ' deleted');
    await loadAll();
  } catch(err) {
    alert('Delete failed: ' + err.message);
    if (btn) { btn.disabled = false; btn.textContent = 'Permanently Delete'; btn.style.opacity = '1'; }
  }
}

function viewEntry(id) {
  var e = ST.entries.find(function(x){ return x.id===id; });
  if (!e) return;
  var fmt = function(iso){ if(!iso)return '--'; var d=new Date(iso),h=d.getHours()%12||12,m=d.getMinutes(),ap=d.getHours()>=12?'PM':'AM'; return h+':'+(m<10?'0':'')+m+' '+ap; };
  var breaks = ST.breaks.filter(function(b){ return b.entry_id === e.id; });
  var bkMins = breaks.reduce(function(s,b){ return s+(b.duration_minutes||0); }, 0);
  var billMins = billableMins(e, breaks);
  var fmtDur = function(m){ return Math.floor(m/60)+'h '+(m%60)+'m'; };
  var early = isEarlyClockIn(e.clock_in);

  var rows = [
    ['Employee', e.employee_name],
    ['Date', fmtD(new Date(e.clock_in))],
    ['Clock In', fmt(e.clock_in) + (early && !e.approved_early ? ' ⚠ Early (billable from 7:30)' : '')],
    ['Clock Out', e.clock_out ? fmt(e.clock_out) : 'Still active'],
    ['Billable Hours', fmtDur(billMins)],
    ['Break Time', bkMins ? fmtDur(bkMins) : 'None'],
    ['Job', e.job_name || 'No job'],
    ['Notes', e.notes || '—'],
    ['GPS', e.clock_in_lat ? e.clock_in_lat.toFixed(4)+', '+e.clock_in_lng.toFixed(4) : 'Not recorded']
  ];

  var html = '<div style="background:rgba(13,45,94,.03);border-radius:10px;overflow:hidden;">';
  rows.forEach(function(row){
    html += '<div style="display:flex;padding:10px 14px;border-bottom:1px solid var(--border);">';
    html += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;width:120px;flex-shrink:0;">'+row[0]+'</div>';
    html += '<div style="font-size:13px;color:var(--text);">'+row[1]+'</div>';

  html += '</div>';

  }

  showModal('Time Card — '+e.employee_name, html, null);
}
