    var p = JSON.parse(atob(r.credential.split('.')[1]));

      var el = document.getElementById('jg-login-err');

    localStorage.setItem('jg_platform_exp', String(Date.now()+43200000));

  --navy:#0d2d5e; --orange:#e85d04; --gold:#f5a623;

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
.mono{font-family:'DM Mono',monospace;}

/* ── LOGIN ── */

/* ── MAIN LAYOUT ── */

.tc-header-title{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px;}
.tc-header-title span{font-size:20px;}
.tc-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px;}
.tc-tab{padding:11px 16px;font-size:13px;font-weight:600;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;transition:color .15s;}

.tc-body{padding:20px 24px;max-width:1800px;margin:0 auto;}

.card-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:13px;font-weight:700;color:var(--navy);}

/* ── STAT GRID ── */

/* ── TABLE ── */

// Cooldown cache so we don't spam the same person repeatedly
var _smsCooldown = {};  // { "empName|type": timestamp } — 4 hour cooldown per pair
var SMS_COOLDOWN_MS = 4 * 60 * 60 * 1000;

async function fireSMS(type, payload) {
  if (!HOOKS.sms || HOOKS.sms.indexOf('REPLACE_ME') !== -1) {
    console.warn('SMS webhook not configured');
    toast('⚠ SMS webhook not configured — add Zapier URL to HOOKS.sms');
    return false;
  }
  if (!payload.phone) {
    console.warn('SMS skipped — no phone for', payload.employee_name);
    return false;
  }

  // Cooldown check
  var cooldownKey = (payload.employee_name || '') + '|' + type;
  var lastSent = _smsCooldown[cooldownKey];
  if (lastSent && (Date.now() - lastSent) < SMS_COOLDOWN_MS) {
    var minsAgo = Math.round((Date.now() - lastSent) / 60000);
    console.log('SMS cooldown:', payload.employee_name, type, 'last sent', minsAgo, 'min ago');
    return false;
  }

  try {
    var body = Object.assign({ type: type, sent_at: new Date().toISOString() }, payload);
    // Fire-and-forget; Zapier webhooks don't need CORS-compliant response
    await fetch(HOOKS.sms, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    _smsCooldown[cooldownKey] = Date.now();
    logActivity('SMS Sent', type + ' → ' + (payload.employee_name || '') + ' (' + payload.phone + ')', 'time_clock', payload.employee_name);
    return true;
  } catch (e) {
    console.warn('SMS fire failed:', e.message);
    return false;
  }
}

// Format a US phone for SMS (+1XXXXXXXXXX)
function _fmtSmsPhone(raw) {
  if (!raw) return null;
  var digits = String(raw).replace(/\D/g, '');
  if (digits.length === 10) return '+1' + digits;
  if (digits.length === 11 && digits[0] === '1') return '+' + digits;
  return null;
}

var ST = {
  tab: 'employees',
  employees: [],
  entries: [],
  breaks: [],
  approvals: {},   // keyed by "periodLabel|employeeName" → {status, approved_by, approved_at, id}
  filterEmp: 'All',
  filterDate: '',
  filterDateEnd: '',
  editEmp: null,
  payPeriod: JSON.parse(localStorage.getItem('jg_pay_period') || 'null') || { type: 'biweekly', start: '2025-01-06' }
};

function getPayPeriods(type, startStr, count) {
  var periods = [];
  var start = new Date(startStr + 'T00:00:00');
  var today = new Date();
  var days = type === 'weekly' ? 7 : type === 'biweekly' ? 14 : null;
  for (var i = 0; i < count; i++) {
    var s, e;
    if (days) {
      s = new Date(start); s.setDate(start.getDate() + i * days);
      e = new Date(s); e.setDate(s.getDate() + days - 1);
    } else {
      var mo = start.getMonth() + Math.floor(i/2);
      var yr = start.getFullYear() + Math.floor(mo/12); mo = mo % 12;
      if (i % 2 === 0) { s = new Date(yr, mo, 1); e = new Date(yr, mo, 15); }
      else              { s = new Date(yr, mo, 16); e = new Date(yr, mo+1, 0); }
    }
    periods.push({ start: s, end: e, label: fmtD(s) + ' - ' + fmtD(e) });
    if (s > today && periods.length > 3) break;
  }
  return periods.reverse();
}

function fmtD(d) { return (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear(); }

function getCurrentPeriod() {
  var periods = getPayPeriods(ST.payPeriod.type, ST.payPeriod.start, 40);
  var today = new Date(); today.setHours(0,0,0,0);
  return periods.find(function(p){ return today >= p.start && today <= p.end; }) || periods[0];
}

// Given any date (ISO string or Date), return the pay period label it falls in
function periodLabelFor(dateInput) {
  if (!dateInput) return null;
  var d = new Date(dateInput); d.setHours(0,0,0,0);
  var periods = getPayPeriods(ST.payPeriod.type, ST.payPeriod.start, 80);
  var match = periods.find(function(p){ return d >= p.start && d <= p.end; });
  return match ? match.label : null;
}

function billableStart(clockInISO, approvedEarly) {
  if (approvedEarly) return clockInISO;
  var dt = new Date(clockInISO);
  var cutoff = new Date(dt); cutoff.setHours(7, 30, 0, 0);
  return dt < cutoff ? cutoff.toISOString() : clockInISO;
}

function billableMins(entry, breaks) {
  var bStart = new Date(billableStart(entry.clock_in, entry.approved_early));
  var bEnd = entry.clock_out ? new Date(entry.clock_out) : new Date();
  var raw = Math.max(0, Math.floor((bEnd - bStart) / 60000));
  var bkMins = (breaks||[]).reduce(function(s,b){ return s+(b.duration_minutes||0); }, 0);
  return Math.max(0, raw - bkMins);
}

function isEarlyClockIn(clockInISO) {
  var dt = new Date(clockInISO);
  return dt.getHours() < 7 || (dt.getHours() === 7 && dt.getMinutes() < 30);
}

async function sb(path, opts) {
  opts = opts || {};
  var baseHeaders = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };
  opts.headers = Object.assign({}, baseHeaders, opts.headers || {});

}

async function loadAppSettings() {

    var rows = await sb('/rest/v1/app_settings?select=id,value');
    if (rows && rows.length) {
      rows.forEach(function(r) {
        if (r.id && r.value != null) {
          // pay_period_config is an object; labor_burden_rate and similar are numbers

            _appSettings[r.id] = r.value;
            // Hydrate ST.payPeriod from DB
            if (r.value.type && r.value.start) {
              ST.payPeriod = { type: r.value.type, start: r.value.start };
              // Mirror to localStorage for offline resilience
              try { localStorage.setItem('jg_pay_period', JSON.stringify(ST.payPeriod)); } catch(e){}
            }
          } else {
            _appSettings[r.id] = typeof r.value === 'number' ? r.value : (parseFloat(r.value) || _appSettings[r.id]);
          }
        }
      });
    }
  } catch(e) { console.warn('loadAppSettings failed:', e); }
  return _appSettings;
}

function getLaborBurdenRate() {
  return parseFloat(_appSettings.labor_burden_rate || 40);
}

// Compute labor burden cost for a given number of minutes
function laborBurdenCost(minutes) {
  return (minutes / 60) * getLaborBurdenRate();
}

// Format currency
function fmtMoney(n) {
  return '$' + Math.round(n).toLocaleString();
}

async function saveLaborBurdenRate(newRate) {
  var rate = parseFloat(newRate);
  if (isNaN(rate) || rate < 0) { toast('Invalid rate'); return false; }
  _appSettings.labor_burden_rate = rate;
  try {
    await fetch(SB_URL + '/rest/v1/app_settings', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ id: 'labor_burden_rate', value: rate, updated_at: new Date().toISOString() })
    });
    logActivity('Labor Burden Rate Updated', 'New rate: $' + rate + '/hr', 'general', null);
    toast('✓ Saved: $' + rate + '/hr');
    return true;
  } catch(e) { toast('Save failed'); return false; }
}

async function loadAll() {
  await loadAppSettings();

  // If Supabase doesn't have pay period config yet but localStorage does, seed it
  if (!_appSettings.pay_period_config && ST.payPeriod) {
    savePayPeriodConfig();  // fire-and-forget
  }

  var emps = await sb('/rest/v1/employees?order=name.asc&select=*');
  ST.employees = emps || [];

  var since = ST.filterDate || new Date(Date.now() - 60 * 86400000).toISOString().split('T')[0];
  var until = ST.filterDateEnd ? ST.filterDateEnd + 'T23:59:59' : new Date().toISOString();
  var entries = await sb('/rest/v1/time_entries?clock_in=gte.' + since + 'T00:00:00&clock_in=lte.' + until + '&order=clock_in.desc&limit=500&select=*');
  ST.entries = entries || [];

  var brks = await sb('/rest/v1/time_breaks?select=*');
  ST.breaks = brks || [];

  var abs = await sb('/rest/v1/absence_records?date=gte.' + since + '&order=date.desc&limit=200&select=*');
  ST.absences = abs || [];

  // Load timecard approvals (keyed by period|employee)
  var aps = await sb('/rest/v1/timecard_approvals?select=*&order=approved_at.desc&limit=500');
  ST.approvals = {};
  (aps || []).forEach(function(a) {
    ST.approvals[a.period_label + '|' + a.employee_name] = a;
  });

  // Load commissions (all rows; visibility filtered at render time)
  var coms = await sb('/rest/v1/commissions?select=*&order=earned_date.desc&limit=2000');
  ST.commissions = coms || [];

  // Preload pending vacation requests for accurate badge count (full refresh happens on Time Off tab visit)
  try {
    var pendingTo = await sb('/rest/v1/vacation_requests?status=eq.pending&select=*&order=submitted_at.desc&limit=500');
    // Merge into _toData if not already loaded; otherwise just update the cache
    if (!_toData) _toData = pendingTo || [];
  } catch(e) {}

  // Load on-call swap requests (all statuses; filtering done at render time)
  try {
    var swaps = await sb('/rest/v1/oncall_swap_requests?archived=eq.false&select=*&order=created_at.desc&limit=500');
    ST.swapRequests = swaps || [];
  } catch(e) { ST.swapRequests = []; }

  // Load on-call schedule (single 'current' row, JSONB keyed by period|location|role|date)
  try {
    var sched = await sb('/rest/v1/oncall_schedule?id=eq.current&select=data');
    ST.oncallSchedule = (sched && sched[0] && sched[0].data) ? sched[0].data : {};
  } catch(e) { ST.oncallSchedule = {}; }

  render();
}

// Notifications include URL hashes:
//   #corrections → switch to Timesheets tab, scroll to corrections section
function _handleAdminDeepLink() {
  var hash = window.location.hash || '';
  if (!hash || hash.length < 2) return;
  var hashContent = hash.substring(1);

  // Clear hash so reloads don't re-fire
  history.replaceState(null, '', window.location.pathname + window.location.search);

  if (hashContent === 'corrections') {
    var tabBtn = document.getElementById('tab-timesheets');
    if (typeof showTab === 'function') showTab('timesheets', tabBtn);
    var attempts = 0;
    var tryScroll = function() {
      attempts++;
      var el = document.getElementById('corrections-card');
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        el.style.transition = 'box-shadow .3s';
        el.style.boxShadow = '0 0 0 3px rgba(232,93,4,.4)';
        setTimeout(function(){ el.style.boxShadow = ''; }, 2500);
        return;
      }
      if (attempts < 12) setTimeout(tryScroll, 250);
    };
    setTimeout(tryScroll, 600);
  }
}

function showTab(tab, el) {
  // PM approval path: Swaps tab is open to anyone with canApproveSwap()
  if (tab === 'swaps') {

  if (isSwapOnlyPM()) {

  }

  var adminOnly = ['employees', 'reports', 'archive', 'timeoff'];
  var mapTabs = ['routes'];

    toast('Admin access required');
    return;
  }
  if (mapTabs.includes(tab) && !canViewMaps()) {
    toast('Office, PM, or Admin access required');

  render();
}

// ── PENDING APPROVAL COUNTERS (in-app badges) ─────────────────────────────
// Single source of truth for "what needs my attention" across all UI surfaces
async function getPendingApprovalCounts() {
  var counts = { timecards: 0, timeoff: 0, commissions: 0, swaps: 0, total: 0 };

  // Timecards: look at most recent 2 pay periods, count unapproved employees
  try {
    var periods = getPayPeriods(ST.payPeriod.type, ST.payPeriod.start, 6);
    var today = new Date();
    // Recent periods that have ended (end < today)
    var closedPeriods = periods.filter(function(p){ return p.end < today; }).slice(0, 2);

    var empNamesWithEntries = new Set();
    closedPeriods.forEach(function(p) {
      ST.entries.forEach(function(e) {
        if (!e.clock_in) return;
        var d = new Date(e.clock_in);
        if (d >= p.start && d <= p.end) {
          empNamesWithEntries.add(p.label + '|' + e.employee_name);
        }
      });
    });

    empNamesWithEntries.forEach(function(key) {
      var parts = key.split('|');
      var status = getApprovalStatus(parts[0], parts[1]);
      if (status !== 'approved') counts.timecards++;
    });
  } catch(e) {}

  // Time off: fetch pending vacation_requests count LIVE (works without visiting tab first)
  try {
    if (Array.isArray(_toData)) {
      // If Time Off tab already loaded data this session, use it — fresh from renderTimeOff
      counts.timeoff = _toData.filter(function(r){ return r.status === 'pending'; }).length;
    } else if (typeof isAdmin === 'function' && isAdmin()) {
      // Otherwise fetch a lightweight count from Supabase (admins only — non-admins don't see this tab)
      var pending = await sb('/rest/v1/vacation_requests?status=eq.pending&select=id');
      counts.timeoff = Array.isArray(pending) ? pending.length : 0;
    }
  } catch(e) {}

  // Commissions: count pending (awaiting admin approval before export)
  try {
    counts.commissions = (ST.commissions || []).filter(function(c){ return c.status === 'pending'; }).length;
  } catch(e) {}

  // Swaps: count pending swap requests
  try {
    counts.swaps = (ST.swapRequests || []).filter(function(s){ return s.status === 'pending'; }).length;
  } catch(e) {}

  counts.total = counts.timecards + counts.timeoff + counts.commissions + counts.swaps;
  return counts;
}

async function paintBadges() {
  var c = await getPendingApprovalCounts();

  function badge(tabId, n, title) {
    var btn = document.getElementById(tabId);
    if (!btn) return;
    // Remove old badge
    var old = btn.querySelector('.tab-badge');
    if (old) old.remove();
    if (n > 0) {
      var b = document.createElement('span');
      b.className = 'tab-badge';
      b.textContent = n > 99 ? '99+' : String(n);
      b.title = title || (n + ' pending');
      b.style.cssText = 'display:inline-block;margin-left:6px;background:#c62828;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:16px;text-align:center;line-height:14px;font-family:DM Sans,sans-serif;';
      btn.appendChild(b);
    }
  }

  badge('tab-timesheets', c.timecards, c.timecards + ' timecard(s) awaiting approval');
  badge('tab-timeoff', c.timeoff, c.timeoff + ' time off request(s) pending');
  badge('tab-swaps', c.swaps, c.swaps + ' swap request(s) pending');
  badge('tab-commissions', c.commissions, c.commissions + ' commission(s) pending approval');

  // Broadcast to other pages via localStorage (hub picks this up)
  try {
    localStorage.setItem('jg_pending_counts', JSON.stringify({
      counts: c,
      updatedAt: new Date().toISOString()
    }));
  } catch(e) {}
}

  var accessTab = document.getElementById('tab-access');
  if (accessTab) accessTab.style.display = (isAdmin() && !pmOnly) ? '' : 'none';

  // If a PM landed on this page and the default tab (timesheets) isn't their tab,
  // bounce them to Swaps immediately
  if (pmOnly && ST.tab !== 'swaps') {
    ST.tab = 'swaps';
    if (swapsTab) {
      document.querySelectorAll('.tc-tab').forEach(function(t) { t.classList.remove('active'); });
      swapsTab.classList.add('active');
    }
  }

  if (ST.tab === 'timesheets') renderTimesheets();
  else if (ST.tab === 'employees') { if (isAdmin()) renderEmployees(); }
  else if (ST.tab === 'reports')   { if (isAdmin()) renderReports(); }
  else if (ST.tab === 'routes')   renderRoutes();
  else if (ST.tab === 'commissions') { if (_canViewCommissionsTab()) renderCommissions(); else { ST.tab = 'timesheets'; renderTimesheets(); } }
  else if (ST.tab === 'timeoff')  { if (isAdmin()) renderTimeOff(); }

  else if (ST.tab === 'archive')  { if (isAdmin()) renderArchive(); }
  else if (ST.tab === 'activity') { if (isAdmin()) renderActivity(); }
  else if (ST.tab === 'access')   { if (isAdmin()) renderAccess(); }

  // Refresh in-app badges after any render
  try { paintBadges(); } catch(e) {}
}

function renderLive() {
  var today = new Date().toISOString().split('T')[0];
  var fmt = function(iso) { if (!iso) return ''; var d = new Date(iso), h = d.getHours() % 12 || 12, m = d.getMinutes(), ap = d.getHours() >= 12 ? 'PM' : 'AM'; return h + ':' + (m < 10 ? '0' : '') + m + ' ' + ap; };
  var fmtDur = function(mins) { return Math.floor(mins / 60) + 'h ' + (mins % 60) + 'm'; };
  var durMins = function(e) { var out = e.clock_out ? new Date(e.clock_out) : new Date(); return Math.floor((out - new Date(e.clock_in)) / 60000); };

  var active = ST.entries.filter(function(e) { return !e.clock_out && e.clock_in.startsWith(today); });
  var todayAll = ST.entries.filter(function(e) { return e.clock_in.startsWith(today); });
  var withGPS = active; // Show map for all clocked-in employees

  var h = '';
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;">';
  h += '<div class="stat-card"><div class="stat-val">' + active.length + '</div><div class="stat-lbl">Clocked In Now</div></div>';
  h += '<div class="stat-card"><div class="stat-val">' + todayAll.length + '</div><div class="stat-lbl">Entries Today</div></div>';
  h += '<div class="stat-card"><div class="stat-val">' + ST.employees.filter(function(e) { return e.active; }).length + '</div><div class="stat-lbl">Active Employees</div></div>';

    h += '<div class="stat-val" style="color:#2e7d32;">'+(ST.pendingEmployees||[]).length+'</div><div class="stat-lbl">Pending Approval</div></div>';
  }
  // Pending swap requests — now opens Swaps tab (was: wrong tab before)

    h += '<div class="stat-val" style="color:var(--orange);">'+pendingSwaps.length+'</div><div class="stat-lbl">Swap Requests</div></div>';

async function initLiveMap(entries) {
  await new Promise(function(r){ setTimeout(r, 50); }); // micro-delay for DOM settle
  var mapEl = document.getElementById('live-map');
  if (!mapEl) { console.warn('Map element not found'); return; }
  if (typeof L === 'undefined') { console.warn('Leaflet not loaded'); return; }
  if (_liveMap) { try { _liveMap.remove(); } catch(e){} _liveMap = null; }
  // Force map container to have explicit dimensions
  mapEl.style.height = '360px';
  mapEl.style.width = '100%';

  var colors = ['#e85d04','#0d2d5e','#2e7d32','#9c27b0','#00838f','#c62828','#f57c00','#795548'];
  _liveMap = L.map('live-map', { preferCanvas: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd', maxZoom: 19, crossOrigin: true
  }).addTo(_liveMap);
  var bounds = [];
  var fmtDur2 = function(mins){ return Math.floor(mins/60)+'h '+(mins%60)+'m'; };
  var fmtTime = function(iso){ var d=new Date(iso),h=d.getHours()%12||12,m=d.getMinutes(),ap=d.getHours()>=12?'PM':'AM'; return h+':'+(m<10?'0':'')+m+' '+ap; };

  // Load location pings for all active entries
  var entryIds = entries.map(function(e){ return e.id; }).join(',');
  var pingsData = {};
  try {
    var today = new Date().toISOString().split('T')[0];
    var pings = await sb('/rest/v1/location_pings?recorded_at=gte.'+today+'T00:00:00&order=recorded_at.asc&select=*');
    (pings || []).forEach(function(p) {
      if (!pingsData[p.entry_id]) pingsData[p.entry_id] = [];
      pingsData[p.entry_id].push(p);
    });
  } catch(e) { console.warn('Could not load pings:', e); }

  entries.forEach(function(e, i) {
    var color = colors[i % colors.length];
    var initials = e.employee_name.split(' ').map(function(n){return n[0]||'';}).join('').toUpperCase();
    var mins2 = Math.floor((Date.now() - new Date(e.clock_in).getTime()) / 60000);

    var entryPings = pingsData[e.id] || [];

    // Build full coordinate list: clock-in + pings + current location (last ping)
    var coords = [];
    if (e.clock_in_lat) coords.push({ lat: parseFloat(e.clock_in_lat), lng: parseFloat(e.clock_in_lng), time: e.clock_in, type: 'start' });
    entryPings.forEach(function(p) { coords.push({ lat: parseFloat(p.lat), lng: parseFloat(p.lng), time: p.recorded_at, type: 'ping' }); });

    // If no GPS at all, use Appleton as default location
    if (!coords.length) {
      var defLat = 44.2619; var defLng = -88.4154;
      bounds.push([defLat, defLng]);
      var noGpsIcon = L.divIcon({className:'',html:'<div style="background:'+color+';color:#fff;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:DM Sans,sans-serif;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3);opacity:.6;">'+initials+'</div>',iconSize:[38,38],iconAnchor:[19,19]});
      L.marker([defLat, defLng], {icon:noGpsIcon}).addTo(_liveMap).bindPopup('<b>'+e.employee_name+'</b><br>No GPS recorded at clock-in');
      return;
    }
    coords.forEach(function(c){ bounds.push([c.lat, c.lng]); });

    // Draw route polyline if 2+ points
    if (coords.length >= 2) {
      var latLngs = coords.map(function(c){ return [c.lat, c.lng]; });
      L.polyline(latLngs, {
        color: color, weight: 3, opacity: 0.7,
        dashArray: '6 4'
      }).addTo(_liveMap);

      // Small dots for ping points
      coords.slice(1, -1).forEach(function(c) {
        L.circleMarker([c.lat, c.lng], {
          radius: 5, fillColor: color, color: '#fff',
          weight: 2, opacity: 1, fillOpacity: 0.8
        }).addTo(_liveMap).bindTooltip(fmtTime(c.time), { permanent: false });
      });
    }

    // Clock-in marker (home icon)
    if (e.clock_in_lat) {
      var startIcon = L.divIcon({
        className: '',
        html: '<div style="background:#fff;color:'+color+';width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2.5px solid '+color+';box-shadow:0 2px 6px rgba(0,0,0,.25);">🏁</div>',
        iconSize: [28,28], iconAnchor: [14,14]
      });
      L.marker([parseFloat(e.clock_in_lat), parseFloat(e.clock_in_lng)], { icon: startIcon })
        .addTo(_liveMap)
        .bindTooltip('Clock-in: '+fmtTime(e.clock_in), { permanent: false });
    }

    // Current position marker (last known ping or clock-in)
    var last = coords[coords.length - 1];
    var mainIcon = L.divIcon({
      className: '',
      html: '<div style="background:'+color+';color:#fff;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:DM Sans,sans-serif;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.35);">'+initials+'</div>',
      iconSize: [38,38], iconAnchor: [19,19]
    });
    var popup = '<div style="font-family:DM Sans,sans-serif;min-width:180px;">' +
      '<div style="font-weight:700;color:#0d2d5e;font-size:14px;margin-bottom:6px;">'+e.employee_name+'</div>' +
      '<div style="font-size:12px;color:#6b7a96;margin-bottom:4px;">📋 '+(e.job_name||'No job assigned')+'</div>' +
      '<div style="font-size:12px;color:#2e7d32;font-weight:600;margin-bottom:4px;">⏱ On clock: '+fmtDur2(mins2)+'</div>' +
      '<div style="font-size:11px;color:#6b7a96;">'+entryPings.length+' location ping'+(entryPings.length!==1?'s':'')+' today</div>' +
      (last.type==='ping'?'<div style="font-size:11px;color:#6b7a96;margin-top:2px;">Last seen: '+fmtTime(last.time)+'</div>':'') +
      '</div>';
    L.marker([last.lat, last.lng], { icon: mainIcon }).addTo(_liveMap).bindPopup(popup).openPopup();
  });

  if (!bounds.length) {
    _liveMap.setView([44.2619, -88.4154], 12);
  } else if (bounds.length === 1) {
    _liveMap.setView(bounds[0], 14);
  } else {
    _liveMap.fitBounds(bounds, { padding: [50, 50] });
  }
  setTimeout(function(){ if (_liveMap) _liveMap.invalidateSize(); }, 300);
}

  var reason = (document.getElementById('abs-reason') || {}).value || 'Sick';

    reason: reason,
    notes: notes,
    market: market,

  };

    method: 'POST',

    body: JSON.stringify(payload)
  });

  var emp = ST.employees.find(function(e){ return e.name === name; });
  if (emp && DEFAULT_PAID_PTO_REASONS.indexOf(reason) !== -1) {
    var avail = parseFloat(emp.pto_hours_available || 0);
    if (avail > 0) {
      var deduct = Math.min(ABSENCE_FULL_DAY, avail);
      var newAvail = Math.max(0, avail - deduct);
      var newUsed = parseFloat(emp.pto_hours_used || 0) + deduct;
      await fetch(SB_URL + '/rest/v1/employees?id=eq.' + emp.id, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ pto_hours_available: newAvail, pto_hours_used: newUsed })
      });
      toast('✓ Absence recorded • ' + deduct.toFixed(0) + 'hr deducted from PTO (' + newAvail.toFixed(1) + 'hr remaining)');
    } else {
      toast('Absence recorded for ' + name + ' (unpaid — no PTO balance)');
    }
  } else if (reason === 'Sick') {
    toast('Absence recorded for ' + name + ' (Sick — unpaid by default; toggle to paid in absence history)');
  } else {
    toast('Absence recorded for ' + name);
  }

  closeModal();
  await loadAll();
  render();
}

// Find the most recent workday the employee is missing an entry for (within current pay period)
function _guessAbsenceDate(empName) {
  if (!empName) return new Date().toISOString().split('T')[0];
  var curPer = getCurrentPeriod();
  if (!curPer) return new Date().toISOString().split('T')[0];

  // Build a set of dates the employee DID clock in within the period
  var workedDates = new Set();
  ST.entries.forEach(function(e) {
    if (e.employee_name !== empName) return;
    var d = new Date(e.clock_in);
    if (d < curPer.start || d > curPer.end) return;
    workedDates.add(e.clock_in.split('T')[0]);
  });

  // Also exclude dates already logged as absences
  var absenceDates = new Set();
  (ST.absences || []).forEach(function(a) {
    if (a.employee_name === empName) absenceDates.add(a.date);
  });

  // Walk backwards from yesterday to period start, find first workday with no entry and no absence
  var today = new Date(); today.setHours(0,0,0,0);
  var yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
  var cursor = new Date(Math.min(yesterday.getTime(), curPer.end.getTime()));

  while (cursor >= curPer.start) {
    var dayOfWeek = cursor.getDay();
    if (dayOfWeek !== 0 && dayOfWeek !== 6) {  // skip Sat/Sun
      var dateStr = cursor.toISOString().split('T')[0];
      if (!workedDates.has(dateStr) && !absenceDates.has(dateStr)) {
        return dateStr;
      }
    }
    cursor.setDate(cursor.getDate() - 1);
  }

  // No missing workday found — default to today
  return new Date().toISOString().split('T')[0];
}

  var nameEl = document.getElementById('abs-name');

function exportPayPeriodCSV() {
  var rows = [['Employee','Date','Clock In','Clock Out','Actual Hrs','Billable Hrs','Reg Hrs','OT Hrs','Hourly Rate','Reg Pay','OT Pay','Total Pay','Break Mins','Job','Early Approved']];
  var fmt = function(iso){ if(!iso)return ''; var d=new Date(iso),h=d.getHours()%12||12,m=d.getMinutes(),ap=d.getHours()>=12?'PM':'AM'; return h+':'+(m<10?'0':'')+m+' '+ap; };
  var durMins = function(e){ var out=e.clock_out?new Date(e.clock_out):new Date(); return Math.floor((out-new Date(e.clock_in))/60000); };

  // Group by employee for OT calc
  var empGroups = {};
  ST.entries.forEach(function(e){
    if (!empGroups[e.employee_name]) empGroups[e.employee_name] = [];
    empGroups[e.employee_name].push(e);
  });

  ST.entries.forEach(function(e){
    var emp = ST.employees.find(function(x){ return x.name === e.employee_name; });
    var rate = emp ? parseFloat(emp.hourly_rate||0) : 0;
    var breaks = ST.breaks.filter(function(b){ return b.entry_id === e.id; });
    var actual = (e.duration_minutes || durMins(e)) / 60;
    var bill = billableMins(e, breaks) / 60;
    var bkMins = breaks.reduce(function(s,b){ return s+(b.duration_minutes||0); }, 0);
    // Per-entry OT: rough calc based on week position
    var wkKey = getWeekKey(e.clock_in);
    var wkEntries = (empGroups[e.employee_name]||[]).filter(function(x){ return getWeekKey(x.clock_in) === wkKey; });
    var wkMins = wkEntries.reduce(function(s,x){ var xb=ST.breaks.filter(function(b){return b.entry_id===x.id;}); return s+billableMins(x,xb); }, 0);
    var entryBill = billableMins(e, breaks);
    var wkReg = Math.min(wkMins, 2400); // 40hrs
    var entryFrac = wkMins > 0 ? entryBill / wkMins : 0;
    var regMins = Math.min(entryBill, Math.round(wkReg * entryFrac));
    var otMins = Math.max(0, entryBill - regMins);
    var regPay = rate * regMins / 60;
    var otPay = rate * 1.5 * otMins / 60;
    rows.push([e.employee_name, fmtD(new Date(e.clock_in)), fmt(e.clock_in), fmt(e.clock_out),
      actual.toFixed(2), bill.toFixed(2), (regMins/60).toFixed(2), (otMins/60).toFixed(2),
      rate?'$'+rate.toFixed(2):'', rate?'$'+regPay.toFixed(2):'', rate?'$'+otPay.toFixed(2):'', rate?'$'+(regPay+otPay).toFixed(2):'',
      bkMins, e.job_name||'', e.approved_early?'Yes':'']);
  });
  var csv = rows.map(function(r){ return r.map(function(c){ var s=String(c).split('"').join('""'); return '"'+s+'"'; }).join(','); }).join('\n');
  var a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'timesheets.csv'; a.click();
}

// Top-level OT helpers (also defined locally inside renderTimesheets — kept for module scope access)
function _getWeekKey(iso) {
  var d = new Date(iso); var day = d.getDay();
  var diff = d.getDate() - day + (day === 0 ? -6 : 1);
  var mon = new Date(d); mon.setDate(diff); mon.setHours(0,0,0,0);
  return mon.toISOString().split('T')[0];
}
function _calcOT(entries) {
  var weeks = {};
  entries.forEach(function(e){ var wk = _getWeekKey(e.clock_in); if (!weeks[wk]) weeks[wk] = []; weeks[wk].push(e); });
  var regMins = 0, otMins = 0;
  Object.values(weeks).forEach(function(wkE) {
    var wkMins = 0;
    wkE.forEach(function(e){ var eb = ST.breaks.filter(function(b){ return b.entry_id === e.id; }); wkMins += billableMins(e, eb); });
    if (wkMins > 2400) { regMins += 2400; otMins += (wkMins - 2400); } else { regMins += wkMins; }
  });
  return { regMins: regMins, otMins: otMins };
}

// Bulk: notify ALL employees with missed clock-outs
async function notifyAllMissedCO() {
  var missed = ST.entries.filter(function(e) {
    return !e.clock_out && ((Date.now() - new Date(e.clock_in).getTime()) > 12*60*60*1000);
  });
  if (!missed.length) { toast('No missed clock-outs'); return; }
  if (!confirm('Send in-app notification to ' + missed.length + ' employee(s) about missed clock-outs?')) return;

  // Group by employee — one notification per employee, not one per entry
  var byEmp = {};
  missed.forEach(function(e) {
    var emp = ST.employees.find(function(x){ return x.name === e.employee_name; });
    if (!emp) return;
    if (!byEmp[emp.id]) byEmp[emp.id] = { emp: emp, entries: [] };
    byEmp[emp.id].entries.push(e);
  });

  var sent = 0, skipped = 0;
  var empKeys = Object.keys(byEmp);
  for (var i = 0; i < empKeys.length; i++) {
    var bucket = byEmp[empKeys[i]];
    var emp = bucket.emp;
    var entries = bucket.entries;
    var oldest = entries.reduce(function(a,b){ return new Date(a.clock_in) < new Date(b.clock_in) ? a : b; });
    var hoursOpen = Math.round((Date.now() - new Date(oldest.clock_in).getTime()) / 3600000);
    var bodyText;
    if (entries.length === 1) {
      var entryDate = new Date(oldest.clock_in).toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
      var clockInTime = new Date(oldest.clock_in).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
      bodyText = 'You have an open time entry from ' + entryDate + ' at ' + clockInTime +
                 ' on ' + (oldest.job_name || 'no job') + ' — ' + hoursOpen + ' hours open. Please request a time correction.';
    } else {
      bodyText = 'You have ' + entries.length + ' open time entries — oldest is ' + hoursOpen +
                 ' hours old. Please review and close any you forgot.';
    }
    var payload = {
      recipient_employee_id: emp.id,
      recipient_email: emp.email || null,
      recipient_name: emp.name,
      category: 'timeclock',
      severity: 'urgent',
      title: 'Missed clock-out',
      body: bodyText,
      action_url: 'https://jgimprovements-arch.github.io/jg-dispatch/timeclock.html',
      action_label: 'Open Time Clock',
      metadata: { rule: 'missed_clockout_manual', entry_count: entries.length, hours_open: hoursOpen },
      expires_at: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString()
    };
    try {
      var r = await fetch(SB_URL + '/rest/v1/notifications', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(payload)
      });
      if (r.ok) sent++; else skipped++;
    } catch(err) { skipped++; }
  }
  toast('🔔 Sent ' + sent + ' notification(s)' + (skipped ? ', skipped ' + skipped : ''));
  if (typeof logActivity === 'function') {
    logActivity('Bulk Missed Clock-Out Notify', sent + ' employees notified', 'time_clock');
  }
}

// Flow 2: Verification reminder — send to all techs with unverified hours in current period
async function sendVerificationReminders() {
  var curPer = getCurrentPeriod();
  if (!curPer) { toast('No current pay period'); return; }
  var perStart = curPer.start.toISOString();
  var perEnd = new Date(curPer.end); perEnd.setHours(23,59,59,999);

  // Group entries by employee for current period
  var byEmp = {};
  ST.entries.forEach(function(e) {
    var d = new Date(e.clock_in);
    if (d < curPer.start || d > perEnd) return;
    if (!e.clock_out) return;  // skip active entries
    if (!byEmp[e.employee_name]) byEmp[e.employee_name] = { verified: 0, unverified: 0, totalMins: 0 };
    var brks = ST.breaks.filter(function(b){ return b.entry_id === e.id; });
    byEmp[e.employee_name].totalMins += billableMins(e, brks);
    if (e.self_verified) byEmp[e.employee_name].verified++;
    else byEmp[e.employee_name].unverified++;
  });

  // Filter to techs with at least one unverified entry
  var toNudge = Object.entries(byEmp).filter(function(kv){ return kv[1].unverified > 0; });
  if (!toNudge.length) { toast('All techs have verified hours — nothing to send'); return; }
  if (!confirm('Send verification reminder to ' + toNudge.length + ' employee(s) with unverified hours this period?')) return;

  var sent = 0, skipped = 0;
  for (var i = 0; i < toNudge.length; i++) {
    var nm = toNudge[i][0], d = toNudge[i][1];
    var emp = ST.employees.find(function(x){ return x.name === nm; });
    if (!emp || !emp.phone) { skipped++; continue; }
    var phone = _fmtSmsPhone(emp.phone);
    if (!phone) { skipped++; continue; }
    var hrs = (d.totalMins / 60).toFixed(1);
    var ok = await fireSMS('verify_reminder', {
      phone: phone,
      employee_name: nm,
      first_name: nm.split(' ')[0],
      total_hours: hrs,
      unverified_count: d.unverified,
      pay_period: curPer.label,
      review_url: 'https://jgimprovements-arch.github.io/jg-dispatch/timeclock.html'
    });
    if (ok) sent++; else skipped++;
  }
  toast('✓ Sent ' + sent + ' verification reminder(s)' + (skipped ? ', skipped ' + skipped : ''));
}

// ── TIMECARD PDF GENERATION ──────────────────────────────────────────────
function _computeTimecardTotals(empName, periodStart, periodEnd) {
  // Gather entries for this employee + period
  var pStart = new Date(periodStart); pStart.setHours(0,0,0,0);
  var pEnd = new Date(periodEnd); pEnd.setHours(23,59,59,999);

  var entries = ST.entries.filter(function(e) {
    if (e.employee_name !== empName) return false;
    var d = new Date(e.clock_in);
    return d >= pStart && d <= pEnd && e.clock_out;
  }).sort(function(a,b){ return new Date(a.clock_in) - new Date(b.clock_in); });

  var ot = _calcOT(entries);
  var emp = ST.employees.find(function(x){ return x.name === empName; });
  var rate = emp ? parseFloat(emp.hourly_rate || 0) : 0;
  var payType = emp ? (emp.pay_type || 'hourly') : 'hourly';
  var regHrs = ot.regMins / 60;
  var otHrs = ot.otMins / 60;

  // Absence hours (PTO, sick, training, etc.)
  var absenceBreakdown = getAbsenceHoursForPeriod(empName, periodStart, periodEnd);
  var ptoHrs = absenceBreakdown.ptoPaidHours;
  var trainingHrs = absenceBreakdown.regularPaidHours;

  var totalHrs = regHrs + otHrs + ptoHrs + trainingHrs;
  var regPay = 0, otPay = 0, ptoPay = 0, trainingPay = 0, gross = 0;

  if (payType === 'salary' && emp && emp.annual_salary) {
    var perPeriod = parseFloat(emp.annual_salary) / (ST.payPeriod.type==='weekly'?52:ST.payPeriod.type==='biweekly'?26:24);
    // Salary: paid period amount regardless. Absences tracked but don't reduce pay.
    gross = perPeriod;
    regPay = gross;
  } else if (rate) {
    regPay = rate * regHrs;
    otPay = rate * 1.5 * otHrs;
    ptoPay = rate * ptoHrs;
    trainingPay = rate * trainingHrs;
    gross = regPay + otPay + ptoPay + trainingPay;
  }

  return {
    entries: entries, employee: emp, rate: rate, payType: payType,
    regHrs: regHrs, otHrs: otHrs, ptoHrs: ptoHrs, trainingHrs: trainingHrs,
    totalHrs: totalHrs,
    regPay: regPay, otPay: otPay, ptoPay: ptoPay, trainingPay: trainingPay,
    gross: gross,
    absenceBreakdown: absenceBreakdown
  };
}

function generateTimecardPDF(empName, periodLabel, approverName, approvedAt) {
  if (typeof window.jspdf === 'undefined') { toast('PDF library not loaded — refresh page'); return null; }
  var jsPDF = window.jspdf.jsPDF;

  // Find period dates from label
  var periods = getPayPeriods(ST.payPeriod.type, ST.payPeriod.start, 80);
  var period = periods.find(function(p){ return p.label === periodLabel; });
  if (!period) { toast('Period not found for PDF'); return null; }

  var t = _computeTimecardTotals(empName, period.start, period.end);
  var doc = new jsPDF({ orientation:'portrait', unit:'pt', format:'letter' });
  var pageW = doc.internal.pageSize.getWidth();

  // Header band
  doc.setFillColor(13, 45, 94);
  doc.rect(0, 0, pageW, 70, 'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold'); doc.setFontSize(18);
  doc.text('JG RESTORATION', 40, 32);
  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  doc.text('Approved Timecard', 40, 52);
  doc.setFontSize(9);
  doc.text('Fire • Water • Mold • Reconstruction', pageW - 40, 32, { align: 'right' });
  doc.text('jg-restoration.com  |  (920) 428-4200', pageW - 40, 48, { align: 'right' });

  // Employee info block
  var y = 96;
  doc.setTextColor(13,45,94);
  doc.setFont('helvetica','bold'); doc.setFontSize(13);
  doc.text(empName, 40, y);
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.setTextColor(100,100,100);
  y += 16;
  doc.text('Pay Period: ' + periodLabel, 40, y);
  y += 14;
  doc.text('Pay Type: ' + t.payType + (t.rate ? '  •  Rate: $' + t.rate.toFixed(2) + '/hr' : ''), 40, y);
  y += 14;
  doc.text('Approved by: ' + approverName + '  •  ' + new Date(approvedAt).toLocaleString(), 40, y);
  y += 20;

  // Summary card
  doc.setFillColor(248, 249, 252);
  doc.rect(40, y, pageW - 80, 70, 'F');
  doc.setDrawColor(220,225,235);
  doc.rect(40, y, pageW - 80, 70);

  var colW = (pageW - 80) / 4;
  var cells = [
    { label: 'Total Hours', value: t.totalHrs.toFixed(2) },
    { label: 'Regular', value: t.regHrs.toFixed(2) },
    { label: 'Overtime', value: t.otHrs.toFixed(2) },
    { label: 'Gross Pay', value: '$' + t.gross.toFixed(2) }
  ];
  cells.forEach(function(c, i) {
    doc.setFont('helvetica','normal'); doc.setFontSize(8);
    doc.setTextColor(120,120,135);
    doc.text(c.label.toUpperCase(), 40 + i*colW + 12, y + 22);
    doc.setFont('helvetica','bold'); doc.setFontSize(16);
    doc.setTextColor(13,45,94);
    if (c.label === 'Overtime' && t.otHrs > 0) doc.setTextColor(232, 93, 4);
    doc.text(c.value, 40 + i*colW + 12, y + 48);
  });
  y += 90;

  // Entry detail table
  var body = t.entries.map(function(e) {
    var breaks = ST.breaks.filter(function(b){ return b.entry_id === e.id; });
    var actual = e.duration_minutes || 0;
    var bill = billableMins(e, breaks);
    var bkMins = breaks.reduce(function(s,b){ return s + (b.duration_minutes||0); }, 0);
    var fmtDt = function(iso) { var d=new Date(iso); return d.toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'2-digit'}); };
    var fmtTm = function(iso) { if(!iso) return '-'; var d=new Date(iso); var h=d.getHours()%12||12; var m=d.getMinutes(); var ap=d.getHours()>=12?'PM':'AM'; return h+':'+(m<10?'0':'')+m+' '+ap; };
    var fmtHM = function(mins) { return Math.floor(mins/60)+'h '+(mins%60)+'m'; };
    return [
      fmtDt(e.clock_in),
      fmtTm(e.clock_in),
      fmtTm(e.clock_out),
      fmtHM(actual),
      bkMins ? fmtHM(bkMins) : '-',
      fmtHM(bill),
      (e.job_name || '-').substring(0, 30),
      e.self_verified ? '✓' : ''
    ];
  });

  doc.autoTable({
    startY: y,
    head: [['Date','Clock In','Clock Out','Actual','Break','Billable','Job','Verified']],
    body: body,
    theme: 'grid',
    styles: { fontSize: 8, cellPadding: 4 },
    headStyles: { fillColor: [13, 45, 94], textColor: 255, fontStyle: 'bold' },
    alternateRowStyles: { fillColor: [248, 249, 252] },
    margin: { left: 40, right: 40 }
  });

  // Footer
  var finalY = doc.lastAutoTable.finalY + 20;
  doc.setFont('helvetica','italic'); doc.setFontSize(8);
  doc.setTextColor(130,130,145);
  doc.text('This document represents an approved and locked timecard. Any changes require admin unlock before edits can be made.', 40, finalY, { maxWidth: pageW - 80 });
  doc.text('Generated ' + new Date().toLocaleString() + ' by ' + getApprovedBy(), 40, finalY + 14);

  return doc;
}

  // YTD stat cards
