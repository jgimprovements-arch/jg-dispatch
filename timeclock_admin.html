var _albiJobs = null;

// Standalone Albi load — safe to call from anywhere, caches globally.
// Stores {id, name, market} for job pickers + {salesPerson, actualRevenue, closedBoolean, updatedAt, status, projectType}
// for the commission preview feature. Existing consumers only use id/name/market so they're unaffected.
async function ensureAlbiJobsLoaded() {
  if (_albiJobs) return _albiJobs;
  try {
    var allJobs = [];
    var page = 1;
    while (page <= 20) {
      var r = await fetch('https://jg-proxy-v2.vercel.app/api/albi?pageSize=50&page=' + page);
      if (!r.ok) break;
      var data = await r.json();
      var items = Array.isArray(data) ? data : (data.data || data.results || data.projects || data.items || []);
      if (!items.length) break;
      items.forEach(function(p) {
        var jid = String(p.uniqueNumber || p.id || '');
        var name = p.name || p.projectName || jid;
        var loc = (p.location || '').toString().toLowerCase();
        var market = (loc.includes('stevens') || loc.includes('point')) ? 'Stevens Point' : 'Appleton';
        if (jid) allJobs.push({
          id: jid,
          name: name,
          market: market,
          // Commission preview fields
          salesPerson: p.salesPerson || null,
          actualRevenue: p.actualRevenue || null,
          estimatedRevenue: p.estimatedRevenue || null,
          closedBoolean: p.closedBoolean === true,
          status: p.status || null,
          projectType: p.projectType || null,
          updatedAt: p.updatedAt || null,
          closedDate: p.statusDate || p.updatedAt || null,  // best-effort close date proxy
          customerName: p.customerName || null,
          url: p.url || null
        });
      });
      if (items.length < 50) break;
      page++;
    }
    _albiJobs = allJobs.sort(function(a,b){ return a.name.localeCompare(b.name); });
  } catch(err) {
    _albiJobs = [];
  }
  return _albiJobs;
}

// Quick lookup — resolves a job_id (or a job_name that IS an ID) to Albi project name
function resolveJobName(jobId, fallbackName) {
  if (!_albiJobs) return fallbackName || jobId || 'No Job';
  var idStr = String(jobId || fallbackName || '');
  var match = _albiJobs.find(function(j){ return j.id === idStr; });
  if (match) return match.name;
  // If fallback is already a readable name (contains a dash and non-numeric), use it
  if (fallbackName && /[a-zA-Z]/.test(fallbackName) && fallbackName.indexOf('-') !== -1) return fallbackName;
  return fallbackName || ('ID: ' + idStr);
}

function showDataQualityReport() {
  var durMins = function(e){ var out=e.clock_out?new Date(e.clock_out):new Date(); return Math.floor((out-new Date(e.clock_in))/60000); };
  var fmt = function(iso){ if(!iso)return ''; var d=new Date(iso),h=d.getHours()%12||12,m=d.getMinutes(),ap=d.getHours()>=12?'PM':'AM'; return h+':'+(m<10?'0':'')+m+' '+ap; };

  var rawFiltered = ST.entries.filter(function(e){
    return ST.filterEmp === 'All' || e.employee_name === ST.filterEmp;
  });

  var issues = rawFiltered.map(function(e){
    var mins = e.duration_minutes || durMins(e);
    var resolvedName = resolveJobName(e.job_id, e.job_name);
    var problems = [];
    if (mins === 0 && e.clock_out) problems.push('0 min duration');
    if (!resolvedName || resolvedName === 'No Job Assigned' || (resolvedName.indexOf('ID: ') === 0 && !e.job_name)) problems.push('no job');
    if (!e.clock_out && ((Date.now() - new Date(e.clock_in).getTime()) > 12*60*60*1000)) problems.push('missed clock-out');
    return problems.length ? { e: e, problems: problems, mins: mins, resolvedName: resolvedName } : null;
  }).filter(Boolean);

  if (!issues.length) {
    showModal('Data Quality', '<div style="padding:20px;text-align:center;color:#2e7d32;font-weight:700;">✓ No data quality issues in current view.</div>', null);
    return;
  }

  var body = '<div style="font-size:12px;color:var(--muted);margin-bottom:12px;">' + issues.length + ' entries with data issues. Click Fix to open and correct.</div>';
  body += '<div style="max-height:440px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;">';
  body += '<table style="width:100%;border-collapse:collapse;font-size:12px;">';
  body += '<thead style="background:rgba(13,45,94,.04);position:sticky;top:0;"><tr>';
  body += '<th style="padding:8px;text-align:left;">Employee</th>';
  body += '<th style="padding:8px;text-align:left;">Date</th>';
  body += '<th style="padding:8px;text-align:left;">Issues</th>';
  body += '<th style="padding:8px;text-align:left;">Job</th>';
  body += '<th style="padding:8px;"></th>';
  body += '</tr></thead><tbody>';
  issues.forEach(function(iss) {
    var e = iss.e;
    var dt = new Date(e.clock_in);
    var dtStr = (dt.getMonth()+1) + '/' + dt.getDate() + ' ' + fmt(e.clock_in);
    body += '<tr style="border-top:1px solid var(--border);">';
    body += '<td style="padding:8px;"><strong>'+e.employee_name+'</strong></td>';
    body += '<td style="padding:8px;">'+dtStr+'</td>';
    body += '<td style="padding:8px;color:#c62828;font-weight:700;font-size:11px;">'+iss.problems.join(', ')+'</td>';
    body += '<td style="padding:8px;color:var(--muted);font-size:11px;">'+iss.resolvedName+'</td>';
    body += '<td style="padding:8px;"><button class="btn btn-sm" onclick="closeModal();editEntry(\''+e.id+'\')">Fix</button></td>';
    body += '</tr>';
  });
  body += '</tbody></table></div>';
  showModal('Data Quality Issues ('+issues.length+')', body, null);
}

function filterJobOptions(q) {

  }) : _albiJobs;

    dropdown.innerHTML = '<div style="padding:10px 14px;font-size:12px;color:var(--muted);">No jobs found</div>';

async function saveEntry(id) {
  var inVal = document.getElementById('entry-in').value;
  var outVal = document.getElementById('entry-out').value;
  var jobName = (document.getElementById('entry-job-name') || {}).value || (document.getElementById('entry-job-search') || {}).value || '';
  var jobId   = (document.getElementById('entry-job-id')   || {}).value || '';
  var jobVal = jobName;
  var notesVal = document.getElementById('entry-notes').value;

  // Validation — prevent blank jobs or zero-duration entries from being saved
  if (!jobId && !jobName.trim()) {
    alert('⚠ A job must be selected. Search for an Albi project in the Job field.');
    return;
  }
  if (inVal && outVal && new Date(outVal) <= new Date(inVal)) {
    alert('⚠ Clock-out time must be AFTER clock-in time.');
    return;
  }

  var inISO = inVal ? new Date(inVal).toISOString() : null;
  var outISO = outVal ? new Date(outVal).toISOString() : null;
  var dur = (inISO && outISO) ? Math.floor((new Date(outISO)-new Date(inISO))/60000) : null;

  // Optimistic update — patch ST.entries locally so UI reflects change instantly,
  // BEFORE waiting for the slow full reload.
  var localIdx = ST.entries.findIndex(function(e){ return e.id === id; });
  if (localIdx >= 0) {
    Object.assign(ST.entries[localIdx], {
      clock_in: inISO, clock_out: outISO, duration_minutes: dur,
      job_id: jobId || null, job_name: jobVal, notes: notesVal
    });
  }

  // Capture which timecard detail modal (if any) was open BEFORE we close the edit modal,
  // so we can re-open it with fresh data after save.
  var openTimecardEmp = null;
  var detailModal = document.getElementById('tc-detail-modal');
  if (detailModal) {
    // Pull employee name from the modal header
    var hdr = detailModal.querySelector('div[style*="font-size:18px"]');
    if (hdr) {
      var t = hdr.textContent || '';
      openTimecardEmp = t.replace(/^📋\s*/, '').trim();
    }
  }

  closeModal();  // closes the edit modal (showModal-based)
  render();      // Re-render the page with optimistic data
  toast('✓ Entry updated');

  // If the timecard detail modal was open, refresh it in place with new data
  if (openTimecardEmp && typeof openTimecardDetail === 'function') {
    closeTimecardDetail();
    openTimecardDetail(openTimecardEmp);
  }

  // Now persist to server and reload (slower path; happens in background)
  try {
    var r = await fetch(SB_URL+'/rest/v1/time_entries?id=eq.'+id, {method:'PATCH', headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}, body:JSON.stringify({clock_in:inISO,clock_out:outISO,duration_minutes:dur,job_id:jobId||null,job_name:jobVal,notes:notesVal})});
    if (!r.ok) {
      toast('⚠ Save failed — refreshing');
    }
  } catch(e) { toast('⚠ Save error — refreshing'); }
  await loadAll();
}

async function sendInvite() {
  var name  = (document.getElementById('inv-name')  || {}).value || '';
  var email = (document.getElementById('inv-email') || {}).value || '';
  var role  = (document.getElementById('inv-role')  || {}).value || 'Technician';
  var market = (document.getElementById('inv-market')|| {}).value || 'Appleton';
  var rate  = (document.getElementById('inv-rate')  || {}).value || '0';
  var statusEl = document.getElementById('invite-status');

  if (!name.trim() || !email.trim()) {
    if (statusEl) statusEl.innerHTML = '<div style="padding:10px 14px;border-radius:8px;background:var(--danger-bg);color:var(--red);font-size:13px;font-weight:600;">Name and email are required.</div>';
    return;
  }

  var btn = document.querySelector('#tc-body .btn-orange');
  if (btn) { btn.textContent = 'Sending...'; btn.disabled = true; }
  if (statusEl) statusEl.innerHTML = '';

  try {
    var r = await fetch('https://jg-proxy-v2.vercel.app/api/albi', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'invite', email: email.trim().toLowerCase(), name: name.trim(), role: role||'Technician', market: market||'Appleton', hourly_rate: parseFloat(rate)||0 })
    });
    var data = await r.json().catch(function(){ return { error: 'Request failed' }; });

    if (r.ok && data.success) {
      if (statusEl) statusEl.innerHTML = '<div style="padding:10px 14px;border-radius:8px;background:var(--ok-bg);color:var(--green);font-size:13px;font-weight:600;">✓ Invite sent to '+email+'</div>';

      ['inv-name','inv-email','inv-rate'].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
      toast('✓ Invite sent to ' + email);
      // Reload employee list
      await loadAll();

      throw new Error(data.error || 'Invite failed');
    }
  } catch(e) {
    if (statusEl) statusEl.innerHTML = '<div style="padding:10px 14px;border-radius:8px;background:var(--danger-bg);color:var(--red);font-size:13px;font-weight:600;">Error: '+e.message+'</div>';

  if (btn) { btn.textContent = '✉️ Send Invite Email'; btn.disabled = false; }
}

async function exportCSV(days) {
  var entries = ST.entries;
  if (days) {
    var since = new Date(Date.now()-days*86400000).toISOString();
    entries = entries.filter(function(e){ return e.clock_in >= since; });
  }
  var rows = ['Employee,Email,Date,Clock In,Clock Out,Duration (mins),Break (mins),Job,Notes,GPS In,GPS Out'];
  var fmt = function(d){ return d?new Date(d).toLocaleString():''; };
  entries.forEach(function(e) {
    var empBreaks = ST.breaks.filter(function(b){ return b.entry_id===e.id; });
    var breakMins = empBreaks.reduce(function(s,b){return s+(b.duration_minutes||0);},0);
    var dur = e.duration_minutes || (e.clock_out?Math.floor((new Date(e.clock_out)-new Date(e.clock_in))/60000):'');
    var gpsIn = (e.clock_in_lat&&e.clock_in_lng)?e.clock_in_lat.toFixed(4)+','+e.clock_in_lng.toFixed(4):'';
    var gpsOut = (e.clock_out_lat&&e.clock_out_lng)?e.clock_out_lat.toFixed(4)+','+e.clock_out_lng.toFixed(4):'';
    rows.push(['"'+(e.employee_name||'')+'"','"'+(e.employee_email||'')+'"','"'+new Date(e.clock_in).toLocaleDateString()+'"','"'+fmt(e.clock_in)+'"','"'+fmt(e.clock_out)+'"',dur,breakMins,'"'+(e.job_name||'')+'"','"'+(e.notes||'')+'"','"'+gpsIn+'"','"'+gpsOut+'"'].join(','));
  });
  var blob = new Blob([rows.join('\n')],{type:'text/csv'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href=url; a.download='jg-timeclock-export.csv'; a.click();
  toast('✓ CSV downloaded');
}

// ── BREAK MANAGEMENT (admin-side) ─────────────────────────────────────────
// Edit/add/delete breaks on any time entry. Reuses the showModal infrastructure.
async function openBreakEditor(entryId) {
  var entry = ST.entries.find(function(e){ return e.id === entryId; });
  if (!entry) { toast('Entry not found'); return; }
  var breaks = ST.breaks.filter(function(b){ return b.entry_id === entryId; })
                        .sort(function(a,b){ return new Date(a.break_start) - new Date(b.break_start); });

  var entryStart = new Date(entry.clock_in);
  var entryEnd = entry.clock_out ? new Date(entry.clock_out) : new Date();
  var entryDur = Math.floor((entryEnd - entryStart) / 60000);
  var totalBkMins = breaks.reduce(function(s,b){ return s + (b.duration_minutes || 0); }, 0);

  // Smart defaults for "Add a break" — same date as entry, noon to 12:30
  // datetime-local format = "YYYY-MM-DDTHH:MM" in LOCAL time
  function localDtStr(d) {
    var pad = function(n){ return n<10?'0'+n:''+n; };
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
  }
  var defaultStart = new Date(entryStart); defaultStart.setHours(12, 0, 0, 0);
  var defaultEnd = new Date(entryStart); defaultEnd.setHours(12, 30, 0, 0);
  var defStartStr = localDtStr(defaultStart);
  var defEndStr = localDtStr(defaultEnd);

  var body = '';
  // Compact header — single line
  body += '<div style="font-size:11px;color:var(--muted);margin-bottom:10px;padding:8px 10px;background:rgba(13,45,94,.04);border-radius:6px;">';
  body += '<strong style="color:var(--navy);font-size:12px;">'+(entry.employee_name || 'Tech')+'</strong> · '+(entry.job_name || 'No job')+' · '+entryStart.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+entryStart.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})+'→'+(entry.clock_out ? entryEnd.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : 'Active')+' · '+Math.floor(entryDur/60)+'h '+(entryDur%60)+'m total';
  if (totalBkMins) body += ' · '+totalBkMins+'m breaks';
  body += '</div>';

  // Existing breaks — tighter rows
  if (breaks.length) {
    body += '<div style="margin-bottom:10px;">';
    breaks.forEach(function(b, i) {
      var bs = new Date(b.break_start);
      var be = b.break_end ? new Date(b.break_end) : null;
      var bsLocal = localDtStr(bs);
      var beLocal = be ? localDtStr(be) : '';
      body += '<div style="border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;background:#fff;">';
      body += '<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-bottom:4px;"><strong style="color:var(--navy);">Break '+(i+1)+'</strong> · '+(b.duration_minutes || 0)+' min</div>';
      body += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">';
      body += '<input type="datetime-local" id="bk-start-'+b.id+'" value="'+bsLocal+'" style="padding:5px;border:1px solid var(--border);border-radius:5px;font-family:inherit;font-size:12px;">';
      body += '<input type="datetime-local" id="bk-end-'+b.id+'" value="'+beLocal+'" style="padding:5px;border:1px solid var(--border);border-radius:5px;font-family:inherit;font-size:12px;">';
      body += '</div>';
      body += '<div style="display:flex;gap:6px;margin-top:6px;">';
      body += '<button class="btn btn-sm" onclick="_bkUpdate(\''+b.id+'\',\''+entryId+'\')" style="background:#0d2d5e;color:#fff;border-color:#0d2d5e;flex:1;">Save</button>';
      body += '<button class="btn btn-sm" onclick="_bkDelete(\''+b.id+'\',\''+entryId+'\')" style="background:#c62828;color:#fff;border-color:#c62828;">Delete</button>';
      body += '</div></div>';
    });
    body += '</div>';
  }

  // Add a break — smart defaults pre-filled
  body += '<div style="border-top:1px solid var(--border);padding-top:10px;">';
  body += '<div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:6px;">+ Add break (defaults to 12:00–12:30 on entry date)</div>';
  body += '<div style="display:grid;grid-template-columns:1fr 1fr 70px;gap:6px;">';
  body += '<input type="datetime-local" id="bk-add-start" value="'+defStartStr+'" style="padding:5px;border:1px solid var(--border);border-radius:5px;font-family:inherit;font-size:12px;">';
  body += '<input type="datetime-local" id="bk-add-end" value="'+defEndStr+'" style="padding:5px;border:1px solid var(--border);border-radius:5px;font-family:inherit;font-size:12px;">';
  body += '<button class="btn btn-sm" onclick="_bkAdd(\''+entryId+'\')" style="background:#2e7d32;color:#fff;border-color:#2e7d32;">+ Add</button>';
  body += '</div></div>';

  showModal('☕ Breaks — '+(entry.employee_name || ''), body, null);
}

async function _bkUpdate(breakId, entryId) {
  var sVal = document.getElementById('bk-start-'+breakId).value;
  var eVal = document.getElementById('bk-end-'+breakId).value;
  if (!sVal) { toast('Start required'); return; }
  var sISO = new Date(sVal).toISOString();
  var eISO = eVal ? new Date(eVal).toISOString() : null;
  var dur = eISO ? Math.max(0, Math.floor((new Date(eISO)-new Date(sISO))/60000)) : null;

  // Optimistic update
  var idx = ST.breaks.findIndex(function(b){ return b.id === breakId; });
  if (idx >= 0) Object.assign(ST.breaks[idx], { break_start: sISO, break_end: eISO, duration_minutes: dur });
  toast('✓ Break updated');
  closeModal();
  render();

  try {
    await fetch(SB_URL+'/rest/v1/time_breaks?id=eq.'+breakId, {
      method:'PATCH',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},
      body: JSON.stringify({ break_start: sISO, break_end: eISO, duration_minutes: dur })
    });
  } catch(e) { toast('⚠ Save failed'); }
  _refreshTimecardModalIfOpen();
  await loadAll();
}

async function _bkDelete(breakId, entryId) {
  if (!confirm('Delete this break?')) return;
  ST.breaks = ST.breaks.filter(function(b){ return b.id !== breakId; });
  toast('✓ Break deleted');
  closeModal();
  render();
  try {
    await fetch(SB_URL+'/rest/v1/time_breaks?id=eq.'+breakId, {
      method:'DELETE',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
  } catch(e) { toast('⚠ Delete failed'); }
  _refreshTimecardModalIfOpen();
  await loadAll();
}

async function _bkAdd(entryId) {
  var sVal = document.getElementById('bk-add-start').value;
  var eVal = document.getElementById('bk-add-end').value;
  if (!sVal) { toast('Start required'); return; }
  var sISO = new Date(sVal).toISOString();
  var eISO = eVal ? new Date(eVal).toISOString() : null;
  var dur = eISO ? Math.max(0, Math.floor((new Date(eISO)-new Date(sISO))/60000)) : null;

  try {
    var r = await fetch(SB_URL+'/rest/v1/time_breaks', {
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
      body: JSON.stringify({ entry_id: entryId, break_start: sISO, break_end: eISO, duration_minutes: dur })
    });
    if (r.ok) {
      var rows = await r.json();
      if (rows && rows[0]) ST.breaks.push(rows[0]);
      toast('✓ Break added');
    } else {
      toast('⚠ Add failed');
    }
  } catch(e) { toast('⚠ Add error'); }
  closeModal();
  render();
  _refreshTimecardModalIfOpen();
  await loadAll();
}

function closeModal() { var m=document.getElementById('tc-modal'); if(m)m.remove(); ST.editEmp=null; }

// ── TIMECARD DETAIL MODAL ─────────────────────────────────────────────────
// Opens a full-screen modal with the employee's complete period detail.
// Handles three cases:
//   (a) hourly with entries — shows entries table
//   (b) salaried (any) — also shows day grid for the period with absence editing
//   (c) commission earners — shows commission section
function openTimecardDetail(empName) {
  // Local copies of helpers that are scoped inside renderTimesheets
  var fmt = function(iso){ if(!iso)return ''; var d=new Date(iso),h=d.getHours()%12||12,m=d.getMinutes(),ap=d.getHours()>=12?'PM':'AM'; return h+':'+(m<10?'0':'')+m+' '+ap; };
  var fmtDur = function(mins){ if(!mins&&mins!==0)return '-'; return Math.floor(mins/60)+'h '+(mins%60)+'m'; };
  var durMins = function(e){ var out=e.clock_out?new Date(e.clock_out):new Date(); return Math.floor((out-new Date(e.clock_in))/60000); };
  var fmtHM = function(mins){ var h=Math.floor(mins/60),m=Math.round(mins%60); return h+'h '+(m<10?'0':'')+m+'m'; };
  var calcOT = function(entries){
    var weeklyMins = {};
    entries.forEach(function(e){
      if (!e.clock_out) return;
      var d = new Date(e.clock_in);
      var wkStart = new Date(d); wkStart.setDate(d.getDate() - d.getDay()); wkStart.setHours(0,0,0,0);
      var wkKey = wkStart.toISOString().split('T')[0];
      var brks = (ST.breaks||[]).filter(function(b){return b.entry_id===e.id;});
      weeklyMins[wkKey] = (weeklyMins[wkKey]||0) + billableMins(e, brks);
    });
    var regMins=0, otMins=0;
    Object.values(weeklyMins).forEach(function(mins){
      if (mins <= 2400) { regMins += mins; }
      else { regMins += 2400; otMins += (mins - 2400); }
    });
    return { regMins: regMins, otMins: otMins };
  };

  var periods = getPayPeriods(ST.payPeriod.type, ST.payPeriod.start, 6);
  var periodLabel = ST.selPeriod || (periods[0] ? periods[0].label : null);
  if (!periodLabel) { toast('No pay period selected'); return; }

  var emp = ST.employees.find(function(e){ return e.name === empName; });
  var curPer = periods.find(function(p){ return p.label === periodLabel; });
  if (!curPer) { toast('Period not found'); return; }

  var perEnd = new Date(curPer.end); perEnd.setHours(23,59,59,999);
  var entries = ST.entries.filter(function(e) {
    if (e.employee_name !== empName) return false;
    if (!e.clock_in) return false;
    var d = new Date(e.clock_in);
    return d >= curPer.start && d <= perEnd;
  }).sort(function(a,b){ return new Date(a.clock_in) - new Date(b.clock_in); });

  // Commissions for this employee in this period
  var empCommissions = (ST.commissions || []).filter(function(c) {
    if (c.employee_name !== empName) return false;
    if (c.status === 'paid') return false;
    var dc = new Date((c.earned_date||'') + 'T00:00:00');
    return dc >= curPer.start && dc <= perEnd;
  });
  var commissionTotal = empCommissions.reduce(function(s,c){ return s + parseFloat(c.amount || 0); }, 0);

  var ot = calcOT(entries);
  var rate = emp ? parseFloat(emp.hourly_rate || 0) : 0;
  var isSalary = emp && parseFloat(emp.annual_salary || 0) > 0;
  var regPay = 0, otPay = 0, totalPay = 0, periodPay = 0, perPeriodDays = 10, workedDays = 0, missedDays = 0, deduction = 0;
  if (isSalary && emp.annual_salary) {
    var annSal = parseFloat(emp.annual_salary);
    perPeriodDays = ST.payPeriod.type === 'weekly' ? 5 : 10;
    periodPay = annSal / (ST.payPeriod.type === 'weekly' ? 52 : ST.payPeriod.type === 'biweekly' ? 26 : 24);
    workedDays = new Set(entries.map(function(e){return e.clock_in.split('T')[0];})).size;
    // Salary deducts ONLY for explicit unpaid absences (Vacation w/o PTO, etc).
    // Days with no entry AND no absence record stay paid — salary covers them.
    var absBrkPre = getAbsenceHoursForPeriod(empName, curPer.start, curPer.end);
    missedDays = absBrkPre.unpaidDays || 0;
    deduction = missedDays * (periodPay / perPeriodDays);
    regPay = periodPay - deduction;
    totalPay = regPay;
  } else {
    regPay = rate * (ot.regMins / 60);
    otPay = rate * 1.5 * (ot.otMins / 60);
    totalPay = regPay + otPay;
  }
  // Add commissions to total pay
  totalPay += commissionTotal;

  var approvalStatus = getApprovalStatus(periodLabel, empName);
  var isApproved = approvalStatus === 'approved';
  var approvalInfo = ST.approvals[getApprovalKey(periodLabel, empName)] || {};
  var absBrk = getAbsenceHoursForPeriod(empName, curPer.start, curPer.end);

  // Build modal HTML
  var safeNm = empName.replace(/'/g, "\\'");
  var safePeriod = periodLabel.replace(/'/g, "\\'");
  var h = '';
  h += '<div id="tc-detail-modal" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2100;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;" onclick="if(event.target===this)closeTimecardDetail()">';
  h += '<div style="background:#fff;border-radius:12px;width:100%;max-width:1200px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);" onclick="event.stopPropagation()">';

  // Header bar
  var hdrBg = isApproved ? 'linear-gradient(135deg,rgba(46,125,50,.12),rgba(46,125,50,.04))' : 'linear-gradient(135deg,rgba(13,45,94,.06),rgba(13,45,94,.02))';
  var hdrBorder = isApproved ? '#2e7d32' : 'var(--navy)';
  h += '<div style="padding:20px 24px;background:'+hdrBg+';border-bottom:2px solid '+hdrBorder+';border-radius:12px 12px 0 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">';
  h += '<div>';
  h += '<div style="font-size:18px;font-weight:700;color:var(--navy);">📋 '+empName+'</div>';
  var subtitle = 'Pay Period: '+periodLabel+'  •  '+entries.length+' entries';
  if (isSalary) subtitle += '  •  Salary';
  if (commissionTotal > 0) subtitle += '  •  $'+commissionTotal.toFixed(2)+' comm';
  h += '<div style="font-size:12px;color:var(--muted);margin-top:2px;">'+subtitle+'</div>';
  h += '</div>';
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
  if (isApproved) {
    h += '<div style="font-size:12px;color:#2e7d32;font-weight:700;padding:6px 12px;background:rgba(46,125,50,.1);border-radius:8px;display:flex;align-items:center;">✓ Approved by '+(approvalInfo.approved_by || 'Admin')+'</div>';
    if (typeof isAdmin === 'function' && isAdmin()) {
      h += '<button class="btn" onclick="closeTimecardDetail();unlockTimecard(\''+safePeriod+'\',\''+safeNm+'\')">🔓 Unlock</button>';
    }
  } else {
    h += '<button class="btn btn-primary" style="background:#2e7d32;border-color:#2e7d32;font-size:14px;padding:10px 18px;" onclick="_modalApprove(\''+safePeriod+'\',\''+safeNm+'\')">✓ Approve Timecard</button>';
  }
  h += '<button class="btn" onclick="closeTimecardDetail()">✕ Close</button>';
  h += '</div></div>';

  // Summary strip
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1px;background:var(--border);">';
  function statBox(label, value, color) {
    return '<div style="background:#fff;padding:14px 16px;text-align:center;">'+
      '<div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:.04em;margin-bottom:4px;">'+label+'</div>'+
      '<div style="font-size:18px;font-weight:700;color:'+(color||'var(--navy)')+';">'+value+'</div>'+
    '</div>';
  }
  if (isSalary) {
    h += statBox('Days Worked', workedDays + ' / ' + perPeriodDays, missedDays > 0 ? '#c62828' : '#2e7d32');
    h += statBox('Period Pay', '$' + periodPay.toFixed(2));
    if (deduction > 0) h += statBox('Deduction', '-$' + deduction.toFixed(2), '#c62828');
  } else {
    h += statBox('Regular', fmtHM(ot.regMins));
    h += statBox('Overtime', fmtHM(ot.otMins), ot.otMins > 0 ? '#c62828' : 'var(--muted)');
  }
  if (absBrk.ptoPaidHours > 0) h += statBox('PTO', absBrk.ptoPaidHours.toFixed(1) + 'h', '#1565c0');
  if (commissionTotal > 0) h += statBox('Commissions', '$' + commissionTotal.toFixed(2), '#6a1b9a');
  if (rate || isSalary) h += statBox('Est. Pay', '$' + totalPay.toFixed(2), '#2e7d32');
  if (rate) h += statBox('Rate', '$' + rate.toFixed(2) + '/hr');
  if (isSalary) h += statBox('Salary', '$' + Number(emp.annual_salary).toLocaleString() + '/yr');
  h += '</div>';

  // Body
  h += '<div style="padding:20px 24px;">';

  // ── Salaried day grid: shows each working day in period ──
  if (isSalary) {
    var startDate = new Date(curPer.start); startDate.setHours(0,0,0,0);
    var endDate = new Date(curPer.end); endDate.setHours(0,0,0,0);
    var dayList = [];
    var iterDate = new Date(startDate);
    while (iterDate <= endDate) {
      var dow = iterDate.getDay();
      if (dow >= 1 && dow <= 5) { // Mon-Fri only
        dayList.push(new Date(iterDate));
      }
      iterDate.setDate(iterDate.getDate() + 1);
    }
    var workedDaySet = new Set(entries.map(function(e){ return e.clock_in.split('T')[0]; }));
    var absencesByDate = {};
    (absBrk.records || []).forEach(function(rec){
      absencesByDate[rec.absence.date] = rec;
    });

    h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">';
    h += '<div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;">Day Grid — '+dayList.length+' working days</div>';
    if (!isApproved && typeof isAdmin === 'function' && isAdmin()) {
      h += '<button class="btn btn-sm" onclick="_dgMarkAllWorked(\''+safeNm+'\',\''+safePeriod+'\')" style="background:#2e7d32;color:#fff;border-color:#2e7d32;">✓ Mark All Worked</button>';
    }
    h += '</div>';

    h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;margin-bottom:20px;">';
    dayList.forEach(function(d) {
      var dateStr = d.toISOString().split('T')[0];
      var dayLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      var worked = workedDaySet.has(dateStr);
      var absRec = absencesByDate[dateStr];
      var bg, color, status, statusIcon;
      if (worked) {
        bg = 'rgba(46,125,50,.06)'; color = '#2e7d32'; status = 'Worked'; statusIcon = '✓';
      } else if (absRec) {
        var paid = absRec.classification.category === 'pto_paid' || absRec.classification.category === 'regular_paid';
        bg = paid ? 'rgba(21,101,192,.06)' : 'rgba(198,40,40,.06)';
        color = paid ? '#1565c0' : '#c62828';
        status = absRec.absence.reason || 'Absent';
        statusIcon = paid ? '🏖' : '✗';
      } else {
        bg = 'rgba(230,81,0,.06)'; color = '#e65100'; status = 'Not recorded'; statusIcon = '?';
      }
      var clickable = !isApproved && typeof isAdmin === 'function' && isAdmin();
      var cursor = clickable ? 'cursor:pointer;' : '';
      var onclick = clickable ? 'onclick="_dgEditDay(\''+safeNm+'\',\''+dateStr+'\')"' : '';
      h += '<div '+onclick+' style="padding:10px;background:'+bg+';border:1px solid '+color+';border-radius:8px;'+cursor+'transition:transform .1s;" onmouseover="this.style.transform=\'scale(1.02)\'" onmouseout="this.style.transform=\'\'">';
      h += '<div style="font-size:11px;font-weight:700;color:var(--navy);">'+dayLabel+'</div>';
      h += '<div style="font-size:11px;color:'+color+';font-weight:600;margin-top:2px;">'+statusIcon+' '+status+'</div>';
      if (absRec && absRec.absence.notes) {
        h += '<div style="font-size:10px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+absRec.absence.notes+'</div>';
      }
      h += '</div>';
    });
    h += '</div>';
  }

  // ── Commissions section ──
  if (empCommissions.length) {
    h += '<div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">Commissions ('+empCommissions.length+') — $'+commissionTotal.toFixed(2)+'</div>';
    h += '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:20px;">';
    empCommissions.forEach(function(c) {
      var bg = c.status === 'approved' ? 'rgba(46,125,50,.06)' : 'rgba(106,27,154,.06)';
      var color = c.status === 'approved' ? '#2e7d32' : '#6a1b9a';
      var earnedD = c.earned_date ? new Date(c.earned_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—';
      h += '<div style="padding:10px 14px;background:'+bg+';border-left:3px solid '+color+';border-radius:6px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">';
      h += '<div>';
      h += '<div style="font-size:13px;font-weight:700;color:var(--navy);">'+(c.description || c.commission_type || 'Commission')+'</div>';
      h += '<div style="font-size:11px;color:var(--muted);margin-top:2px;">'+earnedD+(c.notes ? ' • ' + c.notes : '')+'</div>';
      h += '</div>';
      h += '<div style="display:flex;align-items:center;gap:10px;">';
      h += '<span style="font-size:10px;color:'+color+';text-transform:uppercase;font-weight:700;">'+(c.status || 'pending')+'</span>';
      h += '<span style="font-size:16px;font-weight:700;color:'+color+';">$'+parseFloat(c.amount||0).toFixed(2)+'</span>';
      h += '</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // ── Entries table ──
  if (entries.length) {
    h += '<div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">Time Entries ('+entries.length+')</div>';
    h += '<div style="overflow-x:auto;"><table class="tc-table" style="width:100%;font-size:13px;"><thead><tr><th>Date</th><th>Clock In</th><th>Clock Out</th><th>Actual</th><th>Billable</th><th>Break</th><th>Job</th><th>Verified</th><th>Flags</th><th></th></tr></thead><tbody>';
    entries.forEach(function(e) {
      var breaks = ST.breaks.filter(function(b){ return b.entry_id === e.id; });
      var actual = e.duration_minutes || durMins(e);
      var bill = billableMins(e, breaks);
      var bkMins = breaks.reduce(function(s,b){ return s + (b.duration_minutes || 0); }, 0);
      var early = isEarlyClockIn(e.clock_in);
      var active = !e.clock_out;
      var missedCO = active && ((Date.now() - new Date(e.clock_in).getTime()) > 12*60*60*1000);
      var flagCell = '';
      if (missedCO) {
        flagCell = '<span style="color:#c62828;font-size:11px;font-weight:700;">⚠ Missed CO<br><button class="btn btn-sm" onclick="editEntry(\''+e.id+'\')">Fix</button> <button class="btn btn-sm" onclick="notifyMissedCO(\''+e.id+'\')" style="background:#6a1b9a;color:#fff;border-color:#6a1b9a;">🔔 Notify</button></span>';
      } else if (early && !e.approved_early) {
        flagCell = '<span style="color:#c62828;font-size:11px;font-weight:700;">Early<br><button class="btn btn-sm" onclick="approveEarly(\''+e.id+'\')">Approve</button></span>';
      } else if (early && e.approved_early) {
        flagCell = '<span style="color:#2e7d32;font-size:11px;">Early OK</span>';
      }
      var verifiedCell;
      if (e.self_verified) {
        verifiedCell = '<span title="Verified — click to unverify" style="color:#2e7d32;font-size:16px;font-weight:700;cursor:pointer;" onclick="toggleVerified(\''+e.id+'\',false)">✓</span>';
      } else if (active) {
        verifiedCell = '<span style="color:var(--muted);font-size:11px;">—</span>';
      } else {
        verifiedCell = (typeof isAdmin === 'function' && isAdmin())
          ? '<button title="Mark as verified" onclick="toggleVerified(\''+e.id+'\',true)" style="padding:2px 8px;border:1px solid #c62828;background:transparent;color:#c62828;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;">unverified</button>'
          : '<span style="color:#c62828;font-size:11px;">unverified</span>';
      }
      var rowBg = missedCO ? 'background:rgba(198,40,40,.08);' : (early && !e.approved_early ? 'background:rgba(198,40,40,.04);' : '');
      h += '<tr style="'+rowBg+'">';
      h += '<td>'+fmtD(new Date(e.clock_in))+'</td>';
      h += '<td class="mono"'+(early && !e.approved_early ? ' style="color:#c62828;font-weight:700;"' : '')+'>'+fmt(e.clock_in)+'</td>';
      h += '<td class="mono">'+(active ? (missedCO ? '<span class="badge" style="background:#c62828;color:#fff;">MISSED</span>' : '<span class="badge badge-green">Active</span>') : fmt(e.clock_out))+'</td>';
      h += '<td>'+fmtDur(actual)+'</td>';
      h += '<td><strong>'+fmtDur(bill)+'</strong></td>';
      h += '<td>'+(bkMins ? fmtDur(bkMins) : '-')+'</td>';
      h += '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+(e.job_name || '-')+'</td>';
      h += '<td style="text-align:center;">'+verifiedCell+'</td>';
      h += '<td>'+flagCell+'</td>';
      if (!isApproved && typeof isAdmin === 'function' && isAdmin()) {
        h += '<td><button class="btn btn-sm" onclick="editEntry(\''+e.id+'\')">Edit</button> <button class="btn btn-sm" onclick="openBreakEditor(\''+e.id+'\')" style="background:#6a1b9a;color:#fff;border-color:#6a1b9a;" title="Edit breaks">☕</button></td>';
      } else {
        h += '<td></td>';
      }
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  } else if (!isSalary && empCommissions.length === 0) {
    h += '<div style="padding:40px;text-align:center;color:var(--muted);font-size:13px;">No entries for this period.</div>';
  }

  // ── Other absences (anything not on the day grid for hourly, or PTO summary for salary) ──
  if (absBrk.records && absBrk.records.length && !isSalary) {
    h += '<div style="margin-top:20px;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">Absences / PTO ('+absBrk.records.length+')</div>';
    h += '<div style="display:flex;flex-direction:column;gap:6px;">';
    absBrk.records.forEach(function(rec) {
      var a = rec.absence;
      var c = rec.classification;
      var paid = c.category === 'pto_paid' || c.category === 'regular_paid';
      var bg = paid ? 'rgba(46,125,50,.06)' : 'rgba(198,40,40,.06)';
      var color = paid ? '#2e7d32' : '#c62828';
      var detail = paid ? ' (paid '+(c.paidHours||0)+'h, '+c.category.replace('_',' ')+')' : ' (unpaid)';
      h += '<div style="padding:8px 12px;background:'+bg+';border-left:3px solid '+color+';border-radius:6px;font-size:12px;">';
      h += '<strong>'+a.date+'</strong> — '+(a.reason||'Absent')+detail;
      if (a.notes) h += '<div style="font-size:11px;color:var(--muted);margin-top:2px;">'+a.notes+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  h += '</div>';
  h += '</div>';
  h += '</div>';

  var existing = document.getElementById('tc-detail-modal');
  if (existing) existing.remove();
  document.body.insertAdjacentHTML('beforeend', h);
  document.addEventListener('keydown', _tcDetailEscHandler);
}

function _tcDetailEscHandler(e) {
  if (e.key === 'Escape') closeTimecardDetail();
}

// Wrapper around approveTimecard that surfaces errors via toast/alert.
// Existed to debug a "click does nothing" issue in the timecard modal.
async function _modalApprove(periodLabel, empName) {
  try {
    if (typeof approveTimecard !== 'function') {
      alert('ERROR: approveTimecard function not loaded. Hard-refresh the page (Ctrl+Shift+R).');
      return;
    }
    if (typeof isAdmin === 'function' && !isAdmin()) {
      alert('Cannot approve: your account does not have admin/office permissions.\nLogged in as: ' + (ST.user ? ST.user.email : 'unknown') + '\nRole: ' + (ST.user ? ST.user.role : 'unknown'));
      return;
    }
    if (typeof toast === 'function') toast('Approving ' + empName + '...');
    var result = await approveTimecard(periodLabel, empName);
    if (typeof closeTimecardDetail === 'function') closeTimecardDetail();
    if (typeof render === 'function') render();
  } catch(err) {
    console.error('Approve failed:', err);
    alert('Approve failed: ' + (err && err.message ? err.message : String(err)) + '\n\nThis message tells us what to fix.');
  }
}

function closeTimecardDetail() {
  var m = document.getElementById('tc-detail-modal');
  if (m) m.remove();
  document.removeEventListener('keydown', _tcDetailEscHandler);
}

// ── Day Grid: edit/mark a single day ─────────────────────────────────────
async function _dgEditDay(empName, dateStr) {
  if (typeof isAdmin === 'function' && !isAdmin()) { toast('Admin access required'); return; }
  var emp = ST.employees.find(function(x){ return x.name === empName; });
  var dateLabel = new Date(dateStr+'T12:00:00').toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });

  // Check existing absence on this date
  var existing = (ST.absences || []).find(function(a){ return a.employee_name === empName && a.date === dateStr; });

  var body = '<div style="font-size:13px;color:var(--navy);margin-bottom:14px;">'+dateLabel+'</div>';
  if (existing) {
    body += '<div style="padding:10px;background:rgba(13,45,94,.05);border-radius:8px;margin-bottom:14px;font-size:12px;color:var(--navy);">';
    body += '<strong>Currently logged:</strong> '+(existing.reason || 'Absent')+(existing.notes ? ' — ' + existing.notes : '');
    body += '</div>';
  }
  body += '<label style="display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;">Status for this day</label>';
  body += '<select id="dg-status" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:DM Sans,sans-serif;outline:none;background:#fff;margin-bottom:12px;">';
  body += '<option value="worked">✓ Worked (no time entry needed for salary)</option>';
  body += '<option value="PTO"'+(existing && existing.reason==='PTO' ? ' selected' : '')+'>🏖 PTO (paid)</option>';
  body += '<option value="Vacation"'+(existing && existing.reason==='Vacation' ? ' selected' : '')+'>🏖 Vacation (paid)</option>';
  body += '<option value="Sick"'+(existing && existing.reason==='Sick' ? ' selected' : '')+'>🤒 Sick</option>';
  body += '<option value="Personal"'+(existing && existing.reason==='Personal' ? ' selected' : '')+'>👤 Personal</option>';
  body += '<option value="Holiday"'+(existing && existing.reason==='Holiday' ? ' selected' : '')+'>🎉 Holiday (paid)</option>';
  body += '<option value="Unpaid"'+(existing && existing.reason==='Unpaid' ? ' selected' : '')+'>✗ Unpaid Absence</option>';
  body += '</select>';
  body += '<label style="display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;">Notes (optional)</label>';
  body += '<textarea id="dg-notes" rows="2" placeholder="Optional context..." style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:DM Sans,sans-serif;outline:none;resize:none;box-sizing:border-box;">'+(existing && existing.notes ? existing.notes : '')+'</textarea>';
  if (existing) {
    body += '<button class="btn" onclick="_dgRemoveDay(\''+existing.id+'\')" style="margin-top:10px;background:#fff;color:#c62828;border-color:#c62828;width:100%;">🗑 Remove this absence</button>';
  }

  showModal('📅 '+empName+' — '+dateLabel, body, '_dgSaveDay(\''+empName.replace(/\'/g,"\\'") + '\',\''+dateStr+'\')');
}

async function _dgSaveDay(empName, dateStr) {
  var status = (document.getElementById('dg-status') || {}).value || 'worked';
  var notes = ((document.getElementById('dg-notes') || {}).value || '').trim();
  var emp = ST.employees.find(function(x){ return x.name === empName; });
  if (!emp) { toast('Employee not found'); return; }

  // Find existing absence record on this date for this person
  var existing = (ST.absences || []).find(function(a){ return a.employee_name === empName && a.date === dateStr; });

  if (status === 'worked') {
    // Mark as worked = remove any existing absence record
    if (existing) {
      await fetch(SB_URL + '/rest/v1/absence_records?id=eq.' + existing.id, {
        method: 'DELETE',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
      });
      ST.absences = (ST.absences || []).filter(function(a){ return a.id !== existing.id; });
      toast('✓ Marked as worked');
    } else {
      toast('Already counted as worked');
    }
  } else {
    var payload = {
      employee_name: empName,
      date: dateStr,
      reason: status,
      notes: notes,
      market: emp.market || 'Appleton',
      logged_by: 'admin',
      hours: 8
    };
    if (existing) {
      // Update existing
      await fetch(SB_URL + '/rest/v1/absence_records?id=eq.' + existing.id, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ reason: status, notes: notes })
      });
      existing.reason = status;
      existing.notes = notes;
      toast('✓ Updated');
    } else {
      // Create new
      var r = await fetch(SB_URL + '/rest/v1/absence_records', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
        body: JSON.stringify(payload)
      });
      if (r.ok) {
        var rows = await r.json();
        if (rows && rows.length) (ST.absences = ST.absences || []).push(rows[0]);
      }
      toast('✓ Marked as ' + status);
    }
  }

  closeModal();
  closeTimecardDetail();
  // Reopen modal with fresh data
  setTimeout(function(){ openTimecardDetail(empName); }, 100);
  if (typeof logActivity === 'function') {
    logActivity('Day Status Updated', empName + ' — ' + dateStr + ' → ' + status, 'time_clock', empName);
  }
}

async function _dgRemoveDay(absenceId) {
  if (!confirm('Remove this absence record?')) return;
  await fetch(SB_URL + '/rest/v1/absence_records?id=eq.' + absenceId, {
    method: 'DELETE',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  var removed = (ST.absences || []).find(function(a){ return a.id === absenceId; });
  ST.absences = (ST.absences || []).filter(function(a){ return a.id !== absenceId; });
  toast('Absence removed');
  if (removed) {
    closeModal();
    closeTimecardDetail();
    setTimeout(function(){ openTimecardDetail(removed.employee_name); }, 100);
  }
}

async function _dgMarkAllWorked(empName, periodLabel) {
  if (!confirm('Mark ALL non-recorded days as worked for '+empName+'?\n\nThis removes any "Not recorded" status. Existing absences (PTO, Sick, etc.) are kept.')) return;
  // For salary, "worked" with no entry just means: no absence record exists.
  // We don't actually create anything — we just note this in activity log.
  toast('✓ All days assumed worked (no missing absences need entries)');
  if (typeof logActivity === 'function') {
    logActivity('All Days Worked', empName + ' — ' + periodLabel + ' marked as fully worked', 'time_clock', empName);
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg) {
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},3000);
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  if (window._pendingUser) { jgShowUser(window._pendingUser); window._pendingUser=null; return; }
  jgCheckAuth();
  // Deep-link from notifications (e.g. #corrections)
  setTimeout(_handleAdminDeepLink, 1800);
});

(function() {

  }

  async function tcSb(path, opts) {
