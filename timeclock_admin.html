// ── COMMISSION PREVIEW (from Albi closed jobs) ─────────────────────────
// State for the preview panel
var _commPreviewData = null;  // cached Albi closed jobs with salesperson
var _commPreviewLoading = false;
var _commPreviewFilter = { days: 30 };  // lookback window

// Build the preview HTML block. Called from renderCommissions.
function _renderCommissionPreview(isAdminUser, myName, canEdit) {
  var h = '';
  h += '<div class="card" style="margin-bottom:16px;border:2px solid rgba(232,93,4,.3);">';
  h += '<div class="card-hdr" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:linear-gradient(135deg,rgba(232,93,4,.06),rgba(232,93,4,.02));">';
  h += '<div>';
  h += '<div class="card-title" style="color:var(--orange);">🔮 Upcoming Pay — Closed Jobs from Albi</div>';
  h += '<div style="font-size:10px;color:var(--muted);margin-top:2px;font-weight:500;">Only showing: <strong style="color:var(--navy);">closed</strong> + <strong style="color:var(--navy);">actual revenue posted</strong> + <strong style="color:var(--navy);">sales rep assigned</strong></div>';
  h += '</div>';
  h += '<div style="display:flex;gap:8px;align-items:center;">';
  h += '<select class="form-select" onchange="_commPreviewFilter.days=parseInt(this.value);_commPreviewData=null;renderCommissions();" style="font-size:12px;padding:6px 10px;">';
  [7, 14, 30, 60, 90].forEach(function(d){
    h += '<option value="'+d+'"'+(_commPreviewFilter.days===d?' selected':'')+'>Last '+d+' days</option>';
  });
  h += '</select>';
  h += '<button class="btn btn-sm" onclick="_loadCommPreview(true)">↻ Refresh</button>';
  h += '</div>';
  h += '</div>';

  if (_commPreviewLoading) {
    h += '<div class="card-body"><div style="text-align:center;padding:30px;color:var(--muted);">Loading Albi jobs...</div></div>';
    h += '</div>';
    return h;
  }

  if (!_commPreviewData) {
    // Trigger background load
    _loadCommPreview();
    h += '<div class="card-body"><div style="text-align:center;padding:30px;color:var(--muted);">Fetching closed jobs from Albi...</div></div>';
    h += '</div>';
    return h;
  }

  // Filter to lookback window + map Albi salesPerson to JG employees
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - _commPreviewFilter.days);

  var eligible = _commPreviewData.filter(function(j) {
    if (!j.closedBoolean) return false;           // must be marked closed in Albi
    if (!j.salesPerson || !j.salesPerson.trim()) return false;  // must have rep assigned
    var actual = parseFloat(j.actualRevenue || 0);
    if (!(actual > 0)) return false;              // must have ACTUAL revenue posted (not estimate)
    var d = j.closedDate ? new Date(j.closedDate) : null;
    if (!d || isNaN(d.getTime())) return false;
    return d >= cutoff;
  });

  // Map to JG employees — match on albi_salesperson_name OR employee name
  eligible = eligible.map(function(j) {
    var matched = ST.employees.find(function(e) {
      var albiName = (e.albi_salesperson_name || e.name || '').trim().toLowerCase();
      var jobName = (j.salesPerson || '').trim().toLowerCase();
      return albiName && jobName && albiName === jobName;
    });
    return Object.assign({}, j, {
      matchedEmployee: matched || null,
      alreadyConverted: (ST.commissions || []).some(function(c) { return c.job_id === j.id; })
    });
  });

  // Separate matched (actionable) from unmatched (warnings)
  var matched = eligible.filter(function(j){ return j.matchedEmployee; });
  var unmatched = eligible.filter(function(j){ return !j.matchedEmployee; });

  // Filter matched to what the current user can see
  if (!isAdminUser) {
    matched = matched.filter(function(j) { return j.matchedEmployee.name === myName; });
    unmatched = [];  // non-admin never sees unmatched
  }

  // ─── NO RESULTS BLOCK ────────────────────────────────────────────────
  if (!matched.length && !unmatched.length) {
    h += '<div class="card-body">';
    h += '<div style="text-align:center;padding:24px;color:var(--muted);font-size:12px;">';
    h += 'No closed Albi jobs with <strong>actual revenue</strong> and a salesperson assignment in the last ' + _commPreviewFilter.days + ' days';
    if (!isAdminUser) h += ' attributed to you';
    h += '.<br><span style="font-size:11px;margin-top:6px;display:block;color:var(--muted);">Commission preview requires: <code style="background:rgba(13,45,94,.05);padding:1px 6px;border-radius:3px;">closedBoolean = true</code>, <code style="background:rgba(13,45,94,.05);padding:1px 6px;border-radius:3px;">actualRevenue > 0</code>, and <code style="background:rgba(13,45,94,.05);padding:1px 6px;border-radius:3px;">salesPerson</code> populated in Albi.</span>';
    h += '</div></div></div>';
    return h;
  }

  // ─── SUMMARY STATS ───────────────────────────────────────────────────
  var alreadyConvertedCount = matched.filter(function(j){ return j.alreadyConverted; }).length;
  var totalPotentialCommission = matched
    .filter(function(j){ return !j.alreadyConverted && j.matchedEmployee.default_commission_rate; })
    .reduce(function(s, j) {
      var rev = parseFloat(j.actualRevenue || 0);  // actualRevenue only — no fallback
      var rate = parseFloat(j.matchedEmployee.default_commission_rate || 0);
      return s + (rev * rate / 100);
    }, 0);

  h += '<div class="card-body">';

  // Stat strip
  h += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;font-size:11px;">';
  h += '<div style="background:rgba(46,125,50,.08);padding:6px 12px;border-radius:6px;"><strong style="color:#2e7d32;">'+matched.length+'</strong> matched to JG rep</div>';
  if (isAdminUser && unmatched.length) {
    h += '<div style="background:rgba(198,40,40,.08);padding:6px 12px;border-radius:6px;"><strong style="color:#c62828;">⚠ '+unmatched.length+'</strong> with unrecognized rep name <span style="color:var(--muted);">(data quality issue)</span></div>';
  }
  if (alreadyConvertedCount) {
    h += '<div style="background:rgba(13,45,94,.08);padding:6px 12px;border-radius:6px;"><strong style="color:var(--navy);">'+alreadyConvertedCount+'</strong> already in ledger</div>';
  }
  if (totalPotentialCommission > 0) {
    h += '<div style="margin-left:auto;background:rgba(232,93,4,.1);padding:6px 12px;border-radius:6px;"><span style="color:var(--muted);">Est. unpaid liability:</span> <strong style="color:var(--orange);">$'+totalPotentialCommission.toFixed(2)+'</strong></div>';
  }
  h += '</div>';

  // ─── MATCHED TABLE (actionable) ──────────────────────────────────────
  if (matched.length) {
    h += '<table class="tc-table" style="font-size:12px;"><thead><tr>';
    h += '<th>Job</th><th>Closed</th><th>Rep</th>';
    h += '<th style="text-align:right;">Actual Revenue</th>';
    h += '<th style="text-align:right;">Est. Commission</th>';
    h += '<th></th>';
    h += '</tr></thead><tbody>';

    // Sort: already converted last, then by closed date desc
    matched.sort(function(a,b) {
      if (a.alreadyConverted !== b.alreadyConverted) return a.alreadyConverted ? 1 : -1;
      return new Date(b.closedDate) - new Date(a.closedDate);
    });

    matched.forEach(function(j, idx) {
      var closedD = new Date(j.closedDate);
      var closedStr = closedD.toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'2-digit'});
      var revenue = parseFloat(j.actualRevenue || 0);
      var revenueLabel = '$'+revenue.toLocaleString();

      var repCell = '<strong style="color:var(--navy);">'+j.matchedEmployee.name+'</strong>';
      var estCommCell = '<span style="color:var(--muted);">—</span>';
      var rate = parseFloat(j.matchedEmployee.default_commission_rate || 0);
      if (rate > 0) {
        var est = revenue * rate / 100;
        estCommCell = '<strong style="color:var(--orange);">$'+est.toFixed(2)+'</strong> <span style="color:var(--muted);font-size:10px;">('+rate+'%)</span>';
      } else {
        estCommCell = '<span style="color:var(--muted);font-size:11px;">no rate set</span>';
      }

      var actionCell;
      if (j.alreadyConverted) {
        actionCell = '<span style="color:var(--muted);font-size:11px;">✓ In ledger</span>';
      } else if (canEdit) {
        actionCell = '<button class="btn btn-sm" onclick="_convertJobToCommission('+idx+')" style="background:var(--orange);color:#fff;border-color:var(--orange);font-size:11px;">→ Add</button>';
      } else {
        actionCell = '';
      }

      h += '<tr'+(j.alreadyConverted?' style="opacity:.55;"':'')+'>';
      h += '<td><strong>'+j.name+'</strong><div style="font-size:10px;color:var(--muted);">'+(j.customerName||'')+(j.projectType?' • '+j.projectType:'')+'</div></td>';
      h += '<td style="font-size:11px;white-space:nowrap;">'+closedStr+'</td>';
      h += '<td>'+repCell+'</td>';
      h += '<td style="text-align:right;white-space:nowrap;font-weight:700;">'+revenueLabel+'</td>';
      h += '<td style="text-align:right;white-space:nowrap;">'+estCommCell+'</td>';
      h += '<td>'+actionCell+'</td>';
      h += '</tr>';
    });
    h += '</tbody></table>';
  }

  // ─── UNMATCHED WARNING SECTION (admin only) ──────────────────────────
  if (isAdminUser && unmatched.length) {
    var unmatchedByName = {};
    unmatched.forEach(function(j) {
      var nm = (j.salesPerson||'').trim();
      if (!unmatchedByName[nm]) unmatchedByName[nm] = { count: 0, revenue: 0, jobs: [] };
      unmatchedByName[nm].count++;
      unmatchedByName[nm].revenue += parseFloat(j.actualRevenue || 0);
      unmatchedByName[nm].jobs.push(j);
    });

    h += '<div style="margin-top:14px;background:rgba(198,40,40,.05);border:1px solid rgba(198,40,40,.2);border-left:4px solid #c62828;border-radius:8px;padding:12px 14px;">';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">';
    h += '<div style="font-size:12px;font-weight:700;color:#c62828;">⚠ Data Quality: Unrecognized Sales Rep Names</div>';
    h += '<span style="font-size:10px;color:var(--muted);">'+unmatched.length+' job'+(unmatched.length!==1?'s':'')+'</span>';
    h += '</div>';
    h += '<div style="font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5;">These closed jobs have actual revenue and a sales rep assigned in Albi, but the rep name doesn\'t match any active JG employee. Fix by editing the employee record and setting their <strong>Albi Salesperson Name</strong> field — or correct the spelling in Albi.</div>';
    Object.keys(unmatchedByName).sort().forEach(function(nm) {
      var d = unmatchedByName[nm];
      h += '<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#fff;border-radius:6px;margin-bottom:4px;">';
      h += '<div><strong style="color:#c62828;">"'+nm+'"</strong> <span style="color:var(--muted);font-size:11px;">— in Albi but no JG match</span></div>';
      h += '<div style="font-size:11px;color:var(--muted);"><strong>'+d.count+' job'+(d.count!==1?'s':'')+'</strong> · <strong style="color:var(--navy);">$'+d.revenue.toLocaleString()+'</strong></div>';
      h += '</div>';
    });
    h += '</div>';
  }

  h += '</div></div>';

  // Store matched list for action callbacks (only matched can be converted)
  window._commPreviewEligible = matched;

  return h;
}

async function _loadCommPreview(forceRefresh) {
  if (_commPreviewLoading) return;
  _commPreviewLoading = true;
  if (forceRefresh) _albiJobs = null;  // force refresh of entire cache
  try {
    await ensureAlbiJobsLoaded();
    _commPreviewData = _albiJobs || [];
  } catch(err) {
    console.warn('Albi preview load failed:', err);
    _commPreviewData = [];
  }
  _commPreviewLoading = false;
  if (ST.tab === 'commissions') renderCommissions();
}

function _convertJobToCommission(idx) {
  var j = (window._commPreviewEligible || [])[idx];
  if (!j || !j.matchedEmployee) return;

  // Pre-fill the commission modal with job data
  openCommissionModal();

  // Wait a tick for modal to render, then populate
  setTimeout(function() {
    var empSel = document.getElementById('comm-emp');
    var typeSel = document.getElementById('comm-type');
    var jobIdEl = document.getElementById('comm-job-id');
    var jobNameEl = document.getElementById('comm-job-name');
    var jobSearchEl = document.getElementById('comm-job-search');
    var revEl = document.getElementById('comm-revenue');
    var rateEl = document.getElementById('comm-rate');
    var amtEl = document.getElementById('comm-amount');
    var descEl = document.getElementById('comm-desc');

    if (empSel) empSel.value = j.matchedEmployee.name;
    if (typeSel) { typeSel.value = 'commission'; _commTypeChanged(); }
    if (jobIdEl) jobIdEl.value = j.id;
    if (jobNameEl) jobNameEl.value = j.name;
    if (jobSearchEl) jobSearchEl.value = j.name;

    var revenue = parseFloat(j.actualRevenue || 0);  // actualRevenue only — estimates don't pay commission
    var rate = parseFloat(j.matchedEmployee.default_commission_rate || 0);
    if (revEl) revEl.value = revenue > 0 ? revenue.toFixed(2) : '';
    if (rateEl) rateEl.value = rate > 0 ? rate : '';
    if (revenue > 0 && rate > 0 && amtEl) amtEl.value = (revenue * rate / 100).toFixed(2);
    if (descEl) descEl.value = 'Commission: '+j.name+' ('+(j.customerName||'')+')';
  }, 50);
}

// ── COMMISSIONS TAB ──────────────────────────────────────────────────────
// Manual entry ledger for commissions, bonuses, referrals, and spiffs.
// Visibility: everyone sees their own; admins see all.
var _commFilter = { employee: 'All', type: 'All', status: 'All', period: 'all' };

function _getCurrentUserName() {
  try {
    var u = JSON.parse(localStorage.getItem('jg_platform_user') || '{}');
    return u.name || '';
  } catch(e) { return ''; }
}

function _canViewCommissionsTab() {
  // Admin bypasses all restrictions
  if (isAdmin()) return true;
  return _userHasAccess('tab_commissions');
}

function _canSeeCommission(commission) {
  if (isAdmin()) return true;
  // Everyone who can view the tab sees their own entries only
  var myName = _getCurrentUserName();
  return commission.employee_name === myName;
}

function _canEditCommissions() {
  // Admin always; otherwise, check the tab_commissions_edit access setting
  if (isAdmin()) return true;
  return _userHasAccess('tab_commissions_edit');
}

async function renderCommissions() {
  var body = document.getElementById('tc-body');
  var isAdminUser = isAdmin();
  var canEdit = _canEditCommissions();
  var myName = _getCurrentUserName();

  // Filter to what this user can see
  var visible = (ST.commissions || []).filter(_canSeeCommission);

  // Apply filters
  var filtered = visible.slice();
  if (_commFilter.employee !== 'All') filtered = filtered.filter(function(c){ return c.employee_name === _commFilter.employee; });
  if (_commFilter.type !== 'All') filtered = filtered.filter(function(c){ return c.type === _commFilter.type; });
  if (_commFilter.status !== 'All') filtered = filtered.filter(function(c){ return c.status === _commFilter.status; });
  if (_commFilter.period === 'current') {
    var cur = getCurrentPeriod();
    if (cur) {
      filtered = filtered.filter(function(c){
        var d = new Date(c.earned_date + 'T00:00:00');
        return d >= cur.start && d <= cur.end;
      });
    }
  } else if (_commFilter.period === 'ytd') {
    var yearStart = new Date(new Date().getFullYear(), 0, 1);
    filtered = filtered.filter(function(c){ return new Date(c.earned_date+'T00:00:00') >= yearStart; });
  }

  // Stats
  var pendingTotal = filtered.filter(function(c){ return c.status === 'pending'; }).reduce(function(s,c){ return s + parseFloat(c.amount||0); }, 0);
  var approvedTotal = filtered.filter(function(c){ return c.status === 'approved'; }).reduce(function(s,c){ return s + parseFloat(c.amount||0); }, 0);
  var paidTotal = filtered.filter(function(c){ return c.status === 'paid'; }).reduce(function(s,c){ return s + parseFloat(c.amount||0); }, 0);
  var grandTotal = pendingTotal + approvedTotal + paidTotal;

  var h = '';

  // ─── UPCOMING PAY — Preview of jobs closed in Albi where salesPerson matches a JG employee ───
  // Admins see all. Non-admins see only jobs attributed to them.
  if (isAdminUser || canEdit || true) {  // keep available to all — they only see their own by name match
    h += _renderCommissionPreview(isAdminUser, myName, canEdit);
  }

  // Header card
  h += '<div class="card" style="margin-bottom:16px;">';
  h += '<div class="card-hdr" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">';
  h += '<div class="card-title">💵 Commissions & Bonuses' + (isAdminUser ? '' : ' — '+myName) + '</div>';
  if (canEdit) {
    h += '<button class="btn btn-primary" onclick="openCommissionModal()" style="background:var(--orange);border-color:var(--orange);">+ Add Entry</button>';
  }
  h += '</div>';

  // Filter bar
  h += '<div class="card-body">';
  h += '<div class="filter-bar" style="gap:12px;flex-wrap:wrap;">';

  // Employee filter (admin only — techs see only their own)
  if (isAdminUser) {
    var allEmps = [...new Set((ST.commissions||[]).map(function(c){ return c.employee_name; }).filter(Boolean))].sort();
    h += '<div><label class="form-label">Employee</label><select class="form-select" onchange="_commFilter.employee=this.value;renderCommissions();">';
    h += '<option value="All">All Employees</option>';
    allEmps.forEach(function(e){ h += '<option value="'+e+'"'+(_commFilter.employee===e?' selected':'')+'>'+e+'</option>'; });
    h += '</select></div>';
  }

  // Type filter
  h += '<div><label class="form-label">Type</label><select class="form-select" onchange="_commFilter.type=this.value;renderCommissions();">';
  ['All','commission','bonus','referral','spiff'].forEach(function(t){ h += '<option value="'+t+'"'+(_commFilter.type===t?' selected':'')+'>'+t.charAt(0).toUpperCase()+t.slice(1)+'</option>'; });
  h += '</select></div>';

  // Status filter
  h += '<div><label class="form-label">Status</label><select class="form-select" onchange="_commFilter.status=this.value;renderCommissions();">';
  ['All','pending','approved','paid'].forEach(function(s){ h += '<option value="'+s+'"'+(_commFilter.status===s?' selected':'')+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>'; });
  h += '</select></div>';

  // Period filter
  h += '<div><label class="form-label">Period</label><select class="form-select" onchange="_commFilter.period=this.value;renderCommissions();">';
  [['all','All Time'],['current','Current Pay Period'],['ytd','Year-to-Date']].forEach(function(p){ h += '<option value="'+p[0]+'"'+(_commFilter.period===p[0]?' selected':'')+'>'+p[1]+'</option>'; });
  h += '</select></div>';

  h += '</div></div></div>';

  // Stat cards
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px;">';
  h += '<div class="stat-card"><div class="stat-val">$'+grandTotal.toFixed(2)+'</div><div class="stat-lbl">Total Filtered</div></div>';
  h += '<div class="stat-card"><div class="stat-val" style="color:var(--warn);">$'+pendingTotal.toFixed(2)+'</div><div class="stat-lbl">Pending</div></div>';
  h += '<div class="stat-card"><div class="stat-val" style="color:#0d2d5e;">$'+approvedTotal.toFixed(2)+'</div><div class="stat-lbl">Approved (unpaid)</div></div>';
  h += '<div class="stat-card"><div class="stat-val" style="color:#2e7d32;">$'+paidTotal.toFixed(2)+'</div><div class="stat-lbl">Paid</div></div>';
  h += '</div>';

  // Ledger table
  if (!filtered.length) {
    h += '<div class="card"><div class="empty" style="padding:40px;">No entries match the current filters.</div></div>';
  } else {
    h += '<div class="card"><div class="card-hdr"><div class="card-title">Entries ('+filtered.length+')</div></div>';
    h += '<table class="tc-table">';
    h += '<thead><tr>';
    h += '<th>Date</th>';
    if (isAdminUser) h += '<th>Employee</th>';
    h += '<th>Type</th>';
    h += '<th>Description</th>';
    h += '<th style="text-align:right;">Amount</th>';
    h += '<th>Status</th>';
    if (canEdit) h += '<th></th>';
    h += '</tr></thead><tbody>';

    filtered.forEach(function(c, idx) {
      var d = new Date(c.earned_date + 'T12:00:00');
      var dateStr = d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'2-digit' });
      var typeColor = {commission:'#0d2d5e', bonus:'#2e7d32', referral:'#e85d04', spiff:'#9c27b0'}[c.type] || 'var(--muted)';
      var typeBadge = '<span style="font-size:10px;padding:2px 8px;background:'+typeColor+';color:#fff;border-radius:4px;font-weight:700;text-transform:uppercase;">'+c.type+'</span>';
      var statusColor = {pending:'var(--warn)', approved:'#0d2d5e', paid:'#2e7d32'}[c.status] || 'var(--muted)';
      var statusBadge = '<span style="font-size:10px;padding:2px 8px;background:rgba(0,0,0,.04);color:'+statusColor+';border:1px solid '+statusColor+';border-radius:4px;font-weight:700;text-transform:uppercase;">'+c.status+'</span>';

      h += '<tr>';
      h += '<td style="font-size:11px;white-space:nowrap;">'+dateStr+'</td>';
      if (isAdminUser) h += '<td><strong>'+c.employee_name+'</strong></td>';
      h += '<td>'+typeBadge+'</td>';
      var descMain = c.description || '—';
      var descSub = '';
      if (c.job_name) descSub += c.job_name;
      if (c.commission_rate && c.job_revenue) descSub += ' • '+c.commission_rate+'% of $'+parseFloat(c.job_revenue).toFixed(0);
      h += '<td><div>'+descMain+'</div>' + (descSub ? '<div style="font-size:10px;color:var(--muted);">'+descSub+'</div>' : '') + '</td>';
      h += '<td style="text-align:right;font-weight:700;color:'+statusColor+';">$'+parseFloat(c.amount||0).toFixed(2)+'</td>';
      h += '<td>'+statusBadge+'</td>';
      if (canEdit) {
        h += '<td style="white-space:nowrap;">';
        if (c.status === 'pending') {
          h += '<button class="btn btn-sm" onclick="approveCommission(\''+c.id+'\')" style="background:#2e7d32;color:#fff;border-color:#2e7d32;font-size:10px;">✓ Approve</button> ';
        }
        if (c.status === 'approved') {
          h += '<button class="btn btn-sm" onclick="markCommissionPaid(\''+c.id+'\')" style="background:#0d2d5e;color:#fff;border-color:#0d2d5e;font-size:10px;">💵 Paid</button> ';
        }
        h += '<button class="btn btn-sm" onclick="editCommission(\''+c.id+'\')" style="font-size:10px;">Edit</button> ';
        h += '<button class="btn btn-sm" onclick="deleteCommission(\''+c.id+'\')" style="font-size:10px;color:#c62828;">✕</button>';
        h += '</td>';
      }
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }

  body.innerHTML = h;
}

// Commission add/edit modal
function openCommissionModal(editId) {
  if (!_canEditCommissions()) { toast('Admin access required'); return; }
  var existing = editId ? (ST.commissions||[]).find(function(c){ return c.id === editId; }) : null;

  var activeEmps = ST.employees.filter(function(e){ return e.active; }).sort(function(a,b){ return a.name.localeCompare(b.name); });
  var empOptions = '<option value="">-- Select --</option>';
  activeEmps.forEach(function(e) {
    var sel = existing && existing.employee_name === e.name ? ' selected' : '';
    empOptions += '<option value="'+e.name+'"'+sel+'>'+e.name+'</option>';
  });

  var body = '';
  body += '<div class="form-row">';
  body += '<div><label class="form-label">Employee *</label><select class="form-select" id="comm-emp">'+empOptions+'</select></div>';
  body += '<div><label class="form-label">Type *</label><select class="form-select" id="comm-type" onchange="_commTypeChanged()">';
  ['commission','bonus','referral','spiff'].forEach(function(t){
    var sel = existing && existing.type === t ? ' selected' : '';
    body += '<option value="'+t+'"'+sel+'>'+t.charAt(0).toUpperCase()+t.slice(1)+'</option>';
  });
  body += '</select></div>';
  body += '</div>';

  body += '<div class="form-row">';
  body += '<div><label class="form-label">Earned Date *</label><input type="date" class="form-input" id="comm-date" value="'+(existing ? existing.earned_date : new Date().toISOString().split('T')[0])+'"></div>';
  body += '<div><label class="form-label">Status</label><select class="form-select" id="comm-status">';
  ['pending','approved','paid'].forEach(function(s){
    var sel = existing && existing.status === s ? ' selected' : (!existing && s==='pending' ? ' selected' : '');
    body += '<option value="'+s+'"'+sel+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>';
  });
  body += '</select></div>';
  body += '</div>';

  // Commission calculator (shown only for type=commission)
  body += '<div id="comm-calc-wrap" style="background:rgba(13,45,94,.04);border-radius:8px;padding:12px;margin-bottom:12px;'+(existing && existing.type!=='commission'?'display:none;':'')+'">';
  body += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">Commission Calculator <span style="font-weight:400;text-transform:none;">(pick an Albi job & rate to auto-fill amount)</span></div>';
  body += '<div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-bottom:8px;">';
  body += '<div style="position:relative;">';
  body += '<input type="text" class="form-input" id="comm-job-search" placeholder="Search Albi job..." value="'+(existing && existing.job_name ? existing.job_name : '')+'" oninput="_filterCommJobs(this.value)" autocomplete="off">';
  body += '<div id="comm-job-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--border);border-radius:8px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.15);"></div>';
  body += '<input type="hidden" id="comm-job-id" value="'+(existing && existing.job_id ? existing.job_id : '')+'">';
  body += '<input type="hidden" id="comm-job-name" value="'+(existing && existing.job_name ? existing.job_name : '')+'">';
  body += '</div>';
  body += '<input type="number" class="form-input" id="comm-revenue" placeholder="Revenue $" step="0.01" value="'+(existing && existing.job_revenue ? existing.job_revenue : '')+'" oninput="_commCalcAmount()">';
  body += '<input type="number" class="form-input" id="comm-rate" placeholder="Rate %" step="0.1" value="'+(existing && existing.commission_rate ? existing.commission_rate : '')+'" oninput="_commCalcAmount()">';
  body += '</div>';
  body += '</div>';

  body += '<div class="form-row">';
  body += '<div><label class="form-label">Amount ($) *</label><input type="number" class="form-input" id="comm-amount" step="0.01" value="'+(existing ? existing.amount : '')+'" placeholder="0.00"></div>';
  body += '<div><label class="form-label">Description</label><input type="text" class="form-input" id="comm-desc" placeholder="e.g. Q4 performance bonus" value="'+(existing && existing.description ? existing.description.replace(/"/g,'&quot;') : '')+'"></div>';
  body += '</div>';

  body += '<div><label class="form-label">Notes (internal)</label><input type="text" class="form-input" id="comm-notes" placeholder="Optional internal notes" value="'+(existing && existing.notes ? existing.notes.replace(/"/g,'&quot;') : '')+'"></div>';

  showModal(existing ? '✏️ Edit Entry' : '💵 Add Commission / Bonus / Spiff', body, 'saveCommission('+(existing ? "'"+existing.id+"'" : 'null')+')');

  // Pre-load Albi jobs for the search
  ensureAlbiJobsLoaded();
}

function _commTypeChanged() {
  var type = (document.getElementById('comm-type')||{}).value;
  var wrap = document.getElementById('comm-calc-wrap');
  if (wrap) wrap.style.display = type === 'commission' ? 'block' : 'none';
}

function _commCalcAmount() {
  var rev = parseFloat((document.getElementById('comm-revenue')||{}).value) || 0;
  var rate = parseFloat((document.getElementById('comm-rate')||{}).value) || 0;
  if (rev > 0 && rate > 0) {
    var amt = (rev * rate / 100);
    var amtEl = document.getElementById('comm-amount');
    if (amtEl) amtEl.value = amt.toFixed(2);
  }
}

function _filterCommJobs(q) {
  var dropdown = document.getElementById('comm-job-dropdown');
  if (!dropdown) return;
  if (!q || q.length < 2 || !_albiJobs) { dropdown.style.display = 'none'; return; }
  var matches = _albiJobs.filter(function(j){ return j.name.toLowerCase().indexOf(q.toLowerCase()) !== -1; }).slice(0, 10);
  if (!matches.length) { dropdown.style.display = 'none'; return; }
  var html = '';
  matches.forEach(function(j) {
    html += '<div onclick="_pickCommJob(\''+j.id+'\',\''+j.name.replace(/\'/g,"\\'")+'\')" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:12px;" onmouseover="this.style.background=\'rgba(13,45,94,.05)\'" onmouseout="this.style.background=\'transparent\'">';
    html += '<strong>'+j.name+'</strong> <span style="color:var(--muted);font-size:10px;">'+j.market+'</span>';
    html += '</div>';
  });
  dropdown.innerHTML = html;
  dropdown.style.display = 'block';
}

async function saveCommission(existingId) {
  if (!_canEditCommissions()) { toast('Admin access required'); return; }
  var empName = (document.getElementById('comm-emp')||{}).value;
  var type = (document.getElementById('comm-type')||{}).value;
  var earnedDate = (document.getElementById('comm-date')||{}).value;
  var status = (document.getElementById('comm-status')||{}).value || 'pending';
  var amount = parseFloat((document.getElementById('comm-amount')||{}).value) || 0;
  var desc = ((document.getElementById('comm-desc')||{}).value || '').trim();
  var notes = ((document.getElementById('comm-notes')||{}).value || '').trim();
  var jobId = (document.getElementById('comm-job-id')||{}).value || null;
  var jobName = (document.getElementById('comm-job-name')||{}).value || null;
  var revenue = parseFloat((document.getElementById('comm-revenue')||{}).value) || null;
  var rate = parseFloat((document.getElementById('comm-rate')||{}).value) || null;

  if (!empName) { alert('Select an employee'); return; }
  if (!earnedDate) { alert('Enter an earned date'); return; }
  if (!amount || amount <= 0) { alert('Enter a positive amount'); return; }

  var emp = ST.employees.find(function(e){ return e.name === empName; });
  var payload = {
    employee_name: empName,
    employee_id: emp ? emp.id : null,
    type: type,
    amount: amount,
    description: desc || null,
    earned_date: earnedDate,
    status: status,
    job_id: jobId,
    job_name: jobName,
    job_revenue: revenue,
    commission_rate: rate,
    notes: notes || null,
    created_by: getApprovedBy()
  };

  // If status is approved or paid, stamp approved_by + approved_at
  if (status === 'approved' || status === 'paid') {
    payload.approved_by = getApprovedBy();
    payload.approved_at = new Date().toISOString();
  }

  var r;
  if (existingId) {
    r = await fetch(SB_URL + '/rest/v1/commissions?id=eq.' + existingId, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } else {
    r = await fetch(SB_URL + '/rest/v1/commissions', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(payload)
    });
  }
  if (!r.ok) { toast('Save failed — check console'); console.warn('Commission save failed:', r.status); return; }

  toast('✓ ' + type.charAt(0).toUpperCase()+type.slice(1) + ' saved: $' + amount.toFixed(2) + ' for ' + empName);
  logActivity(existingId ? 'Commission Edited' : 'Commission Added', empName + ' • ' + type + ' • $' + amount.toFixed(2) + (desc?' — '+desc:''), 'commissions', empName);
  closeModal();
  await loadAll();
  renderCommissions();
}

// ── TIME OFF REQUESTS (admin approval) ────────────────────────────────────
var _toData = null;
var _toFilter = { status: 'pending' };

async function renderTimeOff() {
  var body = document.getElementById('tc-body');
  if (!_toData) {
    body.innerHTML = '<div class="card"><div class="empty" style="padding:40px;">Loading time off requests...</div></div>';
    _toData = await sb('/rest/v1/vacation_requests?select=*&order=submitted_at.desc&limit=500') || [];
  }

  var data = _toData.slice();
  if (_toFilter.status !== 'all') {
    data = data.filter(function(r){ return r.status === _toFilter.status; });
  }

  var pendingCount = _toData.filter(function(r){ return r.status === 'pending'; }).length;
  var approvedCount = _toData.filter(function(r){ return r.status === 'approved'; }).length;
  var deniedCount = _toData.filter(function(r){ return r.status === 'denied'; }).length;

  var h = '';

  // Header card
  h += '<div class="card" style="margin-bottom:16px;">';
  h += '<div class="card-hdr" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">';
  h += '<div class="card-title">🏖 Time Off Requests</div>';
  h += '<button class="btn btn-sm" onclick="_toData=null;renderTimeOff();">↻ Refresh</button>';
  h += '</div>';

  h += '<div class="card-body">';
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
  var statuses = [
    {key:'pending', label:'⏳ Pending', count:pendingCount, color:'#e65100'},
    {key:'approved', label:'✓ Approved', count:approvedCount, color:'#2e7d32'},
    {key:'denied', label:'✕ Denied', count:deniedCount, color:'#c62828'},
    {key:'all', label:'All', count:_toData.length, color:'#0d2d5e'}
  ];
  statuses.forEach(function(s) {
    var isActive = _toFilter.status === s.key;
    h += '<button onclick="_toFilter.status=\''+s.key+'\';renderTimeOff();" style="padding:8px 14px;border-radius:8px;border:1.5px solid '+(isActive?s.color:'var(--border)')+';background:'+(isActive?'rgba(0,0,0,.04)':'var(--surface)')+';color:'+(isActive?s.color:'var(--muted)')+';font-size:12px;font-weight:'+(isActive?'700':'500')+';cursor:pointer;font-family:DM Sans,sans-serif;">';
    h += s.label + ' <span style="font-size:11px;margin-left:4px;">('+s.count+')</span></button>';
  });
  h += '</div></div></div>';

  // Warning banner if there are pending requests
  if (pendingCount > 0 && _toFilter.status !== 'pending') {
    h += '<div style="background:rgba(230,81,0,.06);border:1px solid rgba(230,81,0,.3);border-left:4px solid #e65100;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#e65100;">';
    h += '<strong>⏳ '+pendingCount+' pending request'+(pendingCount!==1?'s':'')+'</strong> — click "⏳ Pending" above to review';
    h += '</div>';
  }

  // Request cards
  if (!data.length) {
    h += '<div class="card"><div class="empty" style="padding:40px;">No '+(_toFilter.status==='all'?'':_toFilter.status+' ')+'requests found.</div></div>';
  } else {
    data.forEach(function(r, idx) {
      h += _toRenderCard(r, idx);
    });
  }

  window._toFiltered = data;
  body.innerHTML = h;
}

function _toRenderCard(r, idx) {
  var startD = new Date(r.start_date+'T12:00:00');
  var endD = new Date(r.end_date+'T12:00:00');
  var startLabel = startD.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  var endLabel = endD.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});

  var statusColor = {pending:'#e65100', approved:'#2e7d32', denied:'#c62828'}[r.status] || 'var(--muted)';
  var statusBg = {pending:'rgba(230,81,0,.05)', approved:'rgba(46,125,50,.05)', denied:'rgba(198,40,40,.05)'}[r.status] || 'transparent';
  var statusIcon = {pending:'⏳', approved:'✓', denied:'✕'}[r.status] || '';

  var daysSinceSubmit = Math.round((new Date() - new Date(r.submitted_at)) / (24*60*60*1000));
  var submitLabel = daysSinceSubmit === 0 ? 'today' : daysSinceSubmit + 'd ago';

  // Check employee PTO balance
  var emp = ST.employees.find(function(e){ return e.name === r.employee_name; });
  var ptoAvail = emp ? parseFloat(emp.pto_hours_available || 0) : 0;
  var hoursRequested = parseFloat(r.hours_requested || 0);
  var ptoDeficit = hoursRequested - ptoAvail;

  var h = '';
  h += '<div class="card" style="margin-bottom:12px;padding:0;overflow:hidden;border-left:4px solid '+statusColor+';">';
  h += '<div style="padding:14px 18px;background:'+statusBg+';">';

  // Top row: employee name + status badge
  h += '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:10px;">';
  h += '<div style="display:flex;align-items:center;gap:10px;">';
  h += '<div style="width:36px;height:36px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;">'+(r.employee_name||'?')[0]+'</div>';
  h += '<div>';
  h += '<div style="font-size:14px;font-weight:700;color:var(--navy);">'+r.employee_name+'</div>';
  h += '<div style="font-size:11px;color:var(--muted);">Submitted '+submitLabel+'</div>';
  h += '</div></div>';
  h += '<div style="font-size:11px;font-weight:700;padding:4px 12px;border-radius:6px;background:'+statusColor+';color:#fff;text-transform:uppercase;letter-spacing:.04em;">'+statusIcon+' '+r.status+'</div>';
  h += '</div>';

  // Date range + details
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:10px;">';
  h += '<div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;">Start</div><div style="font-size:13px;font-weight:600;color:var(--navy);">'+startLabel+'</div></div>';
  h += '<div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;">End</div><div style="font-size:13px;font-weight:600;color:var(--navy);">'+endLabel+'</div></div>';
  h += '<div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;">Days</div><div style="font-size:13px;font-weight:700;color:var(--navy);">'+r.days_requested+' ('+r.hours_requested+'h)</div></div>';
  h += '<div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;">Reason</div><div style="font-size:13px;font-weight:600;color:var(--navy);">'+r.reason+'</div></div>';
  h += '</div>';

  // Flags row
  var flags = [];
  if (r.notice_met === false) {
    flags.push('<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;background:rgba(198,40,40,.1);color:#c62828;font-size:10px;font-weight:700;">⚠ Late notice ('+(r.notice_days||0)+'d of 30)</span>');
  } else if (r.notice_met === true && r.days_requested > 1 && r.reason !== 'Medical' && r.reason !== 'Family') {
    flags.push('<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;background:rgba(46,125,50,.1);color:#2e7d32;font-size:10px;font-weight:700;">✓ '+(r.notice_days||0)+' day notice</span>');
  }
  if (r.reason === 'Medical' || r.reason === 'Family') {
    flags.push('<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;background:rgba(13,45,94,.1);color:var(--navy);font-size:10px;font-weight:700;">🛡 Emergency reason (exempt)</span>');
  }
  if (ptoDeficit > 0 && r.status === 'pending') {
    flags.push('<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;background:rgba(198,40,40,.1);color:#c62828;font-size:10px;font-weight:700;">⚠ Over PTO by '+ptoDeficit.toFixed(1)+'h</span>');
  }
  if (r.status === 'pending') {
    flags.push('<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;background:rgba(13,45,94,.08);color:var(--navy);font-size:10px;font-weight:700;">Balance: '+ptoAvail.toFixed(1)+'h</span>');
  }
  if (flags.length) {
    h += '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;">'+flags.join('')+'</div>';
  }

  // Notes from employee
  if (r.notes) {
    h += '<div style="background:#fff;border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:var(--muted);border-left:3px solid var(--border);"><strong style="color:var(--navy);">Employee note:</strong> '+r.notes+'</div>';
  }

  // Review notes (if already reviewed)
  if (r.status !== 'pending' && (r.reviewed_by || r.review_notes)) {
    h += '<div style="background:#fff;border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:var(--muted);">';
    h += '<strong style="color:var(--navy);">Reviewed by '+(r.reviewed_by||'Admin')+'</strong>';
    if (r.reviewed_at) h += ' • '+new Date(r.reviewed_at).toLocaleDateString();
    if (r.review_notes) h += '<br><em>"'+r.review_notes+'"</em>';
    h += '</div>';
  }

  // Action buttons (pending only)
  if (r.status === 'pending') {
    h += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
    h += '<button onclick="_toApprove(\''+r.id+'\')" style="padding:8px 16px;background:#2e7d32;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">✓ Approve</button>';
    h += '<button onclick="_toDeny(\''+r.id+'\')" style="padding:8px 16px;background:#c62828;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">✕ Deny</button>';
    h += '</div>';
  }

  h += '</div></div>';
  return h;
}

async function _toApprove(requestId) {
  if (!isAdmin()) { toast('Admin only'); return; }
  var r = (_toData||[]).find(function(x){ return x.id === requestId; });
  if (!r) return;

  var emp = ST.employees.find(function(e){ return e.name === r.employee_name; });
  var ptoAvail = emp ? parseFloat(emp.pto_hours_available || 0) : 0;
  var hoursRequested = parseFloat(r.hours_requested || 0);

  var confirmMsg = 'Approve ' + r.days_requested + ' day' + (r.days_requested!==1?'s':'') + ' time off for ' + r.employee_name + '?\n\n';
  confirmMsg += 'Dates: ' + r.start_date + ' → ' + r.end_date + '\n';
  confirmMsg += 'Hours: ' + hoursRequested + 'h\n';
  confirmMsg += 'Current PTO balance: ' + ptoAvail.toFixed(1) + 'h\n';
  if (hoursRequested > ptoAvail) {
    confirmMsg += '\n⚠ This exceeds their PTO balance by ' + (hoursRequested - ptoAvail).toFixed(1) + 'h.';
    confirmMsg += '\nOnly ' + Math.min(hoursRequested, ptoAvail).toFixed(1) + 'h will be deducted.';
  }
  confirmMsg += '\n\nAbsence records will be auto-created for each workday. Continue?';

  if (!confirm(confirmMsg)) return;

  var approver = getApprovedBy();
  var nowIso = new Date().toISOString();

  // 1. Mark request approved
  var absenceIds = [];
  try {
    // 2. Create absence_records for each workday in range
    var cur = new Date(r.start_date + 'T00:00:00');
    var endDate = new Date(r.end_date + 'T00:00:00');
    var createdCount = 0;
    while (cur <= endDate) {
      var dow = cur.getDay();
      if (dow !== 0 && dow !== 6) {
        var dateStr = cur.toISOString().split('T')[0];
        var absReason = r.reason === 'Medical' ? 'Sick' : (r.reason === 'Family' ? 'Bereavement' : 'PTO');
        var absPayload = {
          employee_name: r.employee_name,
          date: dateStr,
          reason: absReason,
          notes: 'Time off request approved by ' + approver + (r.notes ? ' • '+r.notes : ''),
          market: emp ? (emp.market||'Appleton') : 'Appleton',
          logged_by: approver,
          hours: 8,
          paid: true
        };
        var absR = await fetch(SB_URL + '/rest/v1/absence_records', {
          method: 'POST',
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
          body: JSON.stringify(absPayload)
        });
        if (absR.ok) {
          var absData = await absR.json();
          if (absData && absData[0] && absData[0].id) absenceIds.push(absData[0].id);
          createdCount++;
        }
      }
      cur.setDate(cur.getDate() + 1);
    }

    // 3. Deduct PTO balance from employee (only what's available)
    if (emp && ptoAvail > 0) {
      var deduct = Math.min(hoursRequested, ptoAvail);
      var newAvail = Math.max(0, ptoAvail - deduct);
      var newUsed = parseFloat(emp.pto_hours_used || 0) + deduct;
      await fetch(SB_URL + '/rest/v1/employees?id=eq.' + emp.id, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ pto_hours_available: newAvail, pto_hours_used: newUsed })
      });
      emp.pto_hours_available = newAvail;
      emp.pto_hours_used = newUsed;
    }

    // 4. Update vacation_requests status
    await fetch(SB_URL + '/rest/v1/vacation_requests?id=eq.' + requestId, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        status: 'approved',
        reviewed_by: approver,
        reviewed_at: nowIso,
        created_absence_ids: absenceIds
      })
    });

    // 5. Log to activity feed
    logActivity('Time Off Approved', r.employee_name + ' • ' + r.days_requested + ' days ' + r.start_date + ' → ' + r.end_date + ' (' + r.reason + ')', 'time_clock', r.employee_name);

    toast('✓ Approved — ' + createdCount + ' absence days created, PTO deducted');
    _toData = null;
    await loadAll();
    renderTimeOff();
  } catch(err) {
    alert('Approval failed: ' + err.message + '\n\nPartial changes may have been saved. Please refresh and verify.');
    console.error(err);
  }
}

async function _toDeny(requestId) {
  if (!isAdmin()) { toast('Admin only'); return; }
  var r = (_toData||[]).find(function(x){ return x.id === requestId; });
  if (!r) return;

  var reason = prompt('Why is this request being denied? (shown to employee)\n\nExamples:\n• Staffing conflict that week\n• Not enough PTO balance\n• Less than 30 days notice', '');
  if (reason === null) return;  // cancelled
  if (!reason.trim()) { alert('A reason is required for denial.'); return; }

  var approver = getApprovedBy();
  var nowIso = new Date().toISOString();

  try {
    await fetch(SB_URL + '/rest/v1/vacation_requests?id=eq.' + requestId, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        status: 'denied',
        reviewed_by: approver,
        reviewed_at: nowIso,
        review_notes: reason.trim()
      })
    });
    logActivity('Time Off Denied', r.employee_name + ' • ' + r.start_date + ' → ' + r.end_date + ' — ' + reason.trim(), 'time_clock', r.employee_name);
    toast('✓ Request denied');
    _toData = null;
    renderTimeOff();
  } catch(err) {
    alert('Denial failed: ' + err.message);
  }
}

async function renderArchive() {
  var body = document.getElementById('tc-body');
  if (!_archiveData) {
    body.innerHTML = '<div class="card"><div class="empty" style="padding:40px;">Loading archive...</div></div>';
    _archiveData = await sb('/rest/v1/timecard_archive?select=*&order=approved_at.desc&limit=2000') || [];
  }

  var data = _archiveData.slice();

  // Apply filters
  if (_archiveFilter.employee !== 'All') {
    data = data.filter(function(r){ return r.employee_name === _archiveFilter.employee; });
  }
  if (_archiveFilter.year !== 'All') {
    data = data.filter(function(r){ return new Date(r.approved_at).getFullYear() === parseInt(_archiveFilter.year); });
  }
  if (_archiveFilter.search) {
    var q = _archiveFilter.search.toLowerCase();
    data = data.filter(function(r){
      return (r.employee_name && r.employee_name.toLowerCase().indexOf(q) !== -1)
        || (r.period_label && r.period_label.toLowerCase().indexOf(q) !== -1)

    });

  var allYears = [...new Set(_archiveData.map(function(r){ return new Date(r.approved_at).getFullYear(); }))].sort(function(a,b){ return b - a; });

  // Summary stats
  var totalHours = data.reduce(function(s,r){ return s + (parseFloat(r.total_hours)||0); }, 0);
  var totalGross = data.reduce(function(s,r){ return s + (parseFloat(r.gross_pay)||0); }, 0);

  var h = '';

  h += '<div class="card-title">🗄 Timecard Archive <span style="font-size:11px;font-weight:400;color:var(--muted);">(all approved timecards, all time)</span></div>';
  h += '<button class="btn btn-sm" onclick="_archiveData=null;renderArchive();">↻ Refresh</button>';
  h += '</div>';
  h += '<div class="card-body">';
  h += '<div class="filter-bar" style="gap:12px;">';

  // Employee filter
  h += '<div><label class="form-label">Employee</label><select class="form-select" onchange="_archiveFilter.employee=this.value;renderArchive();">';

  allEmps.forEach(function(e){ h += '<option value="'+e+'"'+(_archiveFilter.employee===e?' selected':'')+'>'+e+'</option>'; });
  h += '</select></div>';

  // Year filter
  h += '<div><label class="form-label">Year</label><select class="form-select" onchange="_archiveFilter.year=this.value;renderArchive();">';
  h += '<option value="All">All Years</option>';
  allYears.forEach(function(y){ h += '<option value="'+y+'"'+(_archiveFilter.year==y?' selected':'')+'>'+y+'</option>'; });
  h += '</select></div>';

  // Search
  h += '<div style="flex:1;"><label class="form-label">Search</label><input type="text" class="form-input" placeholder="Search employee, period, approver..." value="'+(_archiveFilter.search||'')+'" oninput="_archiveFilter.search=this.value;clearTimeout(_archiveSearchTimer);_archiveSearchTimer=setTimeout(renderArchive,300);"></div>';

  h += '</div></div></div>';

  // Stats row
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px;">';
  h += '<div class="stat-card"><div class="stat-val">'+data.length+'</div><div class="stat-lbl">Approved Timecards</div></div>';
  h += '<div class="stat-card"><div class="stat-val">'+uniqueEmps+'</div><div class="stat-lbl">Employees</div></div>';
  h += '<div class="stat-card"><div class="stat-val">'+totalHours.toFixed(1)+'h</div><div class="stat-lbl">Total Hours</div></div>';
  h += '<div class="stat-card"><div class="stat-val" style="color:#2e7d32;">$'+totalGross.toFixed(0)+'</div><div class="stat-lbl">Total Gross</div></div>';
  h += '</div>';

  // Records table
  if (!data.length) {
    h += '<div class="card"><div class="empty" style="padding:40px;">No approved timecards match these filters.</div></div>';
  } else {
    h += '<div class="card"><div class="card-hdr"><div class="card-title">Archived Records ('+data.length+')</div></div>';
    h += '<table class="tc-table">';
    h += '<thead><tr><th>Employee</th><th>Pay Period</th><th>Total Hrs</th><th>Reg</th><th>OT</th><th style="text-align:right;">Gross</th><th>Approved By</th><th>Approved At</th><th></th></tr></thead><tbody>';

    data.forEach(function(r, idx) {
      var apprDate = r.approved_at ? new Date(r.approved_at).toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'2-digit'}) : '—';
      h += '<tr>';
      h += '<td><strong style="color:var(--navy);">'+r.employee_name+'</strong></td>';
      h += '<td style="font-size:11px;">'+r.period_label+'</td>';
      h += '<td style="font-weight:700;">'+(parseFloat(r.total_hours)||0).toFixed(2)+'h</td>';
      h += '<td>'+(parseFloat(r.reg_hours)||0).toFixed(2)+'h</td>';
      h += '<td style="color:'+((parseFloat(r.ot_hours)||0)>0?'#c62828':'var(--muted)')+';">'+(parseFloat(r.ot_hours)||0).toFixed(2)+'h</td>';
      h += '<td style="text-align:right;font-weight:700;color:#2e7d32;">$'+(parseFloat(r.gross_pay)||0).toFixed(2)+'</td>';
      h += '<td style="font-size:11px;">'+(r.approved_by||'—')+'</td>';
      h += '<td style="font-size:11px;color:var(--muted);">'+apprDate+'</td>';
      h += '<td><button class="btn btn-sm" onclick="_archiveRedownload('+idx+')" title="Re-download PDF">📄 PDF</button> ';
      h += '<button class="btn btn-sm" onclick="_archiveViewSnapshot('+idx+')" title="View entry snapshot">👁</button></td>';
      h += '</tr>';
    });

  // Store filtered list for action callbacks
  window._archiveFiltered = data;

var _archiveSearchTimer = null;

async function _archiveRedownload(idx) {
  var r = (window._archiveFiltered || [])[idx];
  if (!r) return;
  toast('Regenerating PDF for ' + r.employee_name + '...');
  // Regenerate from archived snapshot data directly
  try {
    var doc = _archiveGeneratePDFFromSnapshot(r);
    if (!doc) return;
    var nameSlug = r.employee_name.replace(/[^a-z0-9]+/gi, '_');
    var dateSlug = r.approved_at ? r.approved_at.split('T')[0] : new Date().toISOString().split('T')[0];
    doc.save(nameSlug + '_archived_' + dateSlug + '.pdf');
  } catch (e) {
    console.warn('PDF regen failed:', e.message);
    toast('PDF generation failed');
  }
}

function _archiveGeneratePDFFromSnapshot(record) {
  if (typeof window.jspdf === 'undefined') { toast('PDF library not loaded'); return null; }
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ orientation:'portrait', unit:'pt', format:'letter' });
  var pageW = doc.internal.pageSize.getWidth();

  // Header
  doc.setFillColor(13, 45, 94);
  doc.rect(0, 0, pageW, 70, 'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold'); doc.setFontSize(18);
  doc.text('JG RESTORATION', 40, 32);
  doc.setFont('helvetica','normal'); doc.setFontSize(11);
  doc.text('Archived Timecard', 40, 52);
  doc.setFontSize(9);
  doc.text('Fire • Water • Mold • Reconstruction', pageW - 40, 32, { align: 'right' });
  doc.text('jg-restoration.com  |  (920) 428-4200', pageW - 40, 48, { align: 'right' });

  var y = 96;
  doc.setTextColor(13,45,94);
  doc.setFont('helvetica','bold'); doc.setFontSize(13);
  doc.text(record.employee_name, 40, y);
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.setTextColor(100,100,100);
  y += 16; doc.text('Pay Period: ' + record.period_label, 40, y);
  y += 14; doc.text('Pay Type: ' + (record.pay_type||'hourly') + (record.rate ? '  •  Rate: $' + parseFloat(record.rate).toFixed(2) + '/hr' : ''), 40, y);
  y += 14; doc.text('Approved by: ' + (record.approved_by||'Admin') + '  •  ' + new Date(record.approved_at).toLocaleString(), 40, y);
  y += 20;

  // Summary card
  doc.setFillColor(248, 249, 252);
  doc.rect(40, y, pageW - 80, 70, 'F');
  doc.setDrawColor(220,225,235);
  doc.rect(40, y, pageW - 80, 70);
  var colW = (pageW - 80) / 4;
  var cells = [
    { label: 'Total Hours', value: (parseFloat(record.total_hours)||0).toFixed(2) },
    { label: 'Regular', value: (parseFloat(record.reg_hours)||0).toFixed(2) },
    { label: 'Overtime', value: (parseFloat(record.ot_hours)||0).toFixed(2) },
    { label: 'Gross Pay', value: '$' + (parseFloat(record.gross_pay)||0).toFixed(2) }
  ];
  cells.forEach(function(c, i) {
    doc.setFont('helvetica','normal'); doc.setFontSize(8);
    doc.setTextColor(120,120,135);
    doc.text(c.label.toUpperCase(), 40 + i*colW + 12, y + 22);
    doc.setFont('helvetica','bold'); doc.setFontSize(16);
    doc.setTextColor(13,45,94);
    if (c.label === 'Overtime' && (parseFloat(record.ot_hours)||0) > 0) doc.setTextColor(232, 93, 4);
    doc.text(c.value, 40 + i*colW + 12, y + 48);
  });
  y += 90;

  // Entry detail from snapshot
  var snap = [];
  try { snap = typeof record.entry_snapshot === 'string' ? JSON.parse(record.entry_snapshot) : (record.entry_snapshot || []); }
  catch(e) { snap = []; }

  var fmtDt = function(iso) { if(!iso) return '-'; var d=new Date(iso); return d.toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'2-digit'}); };
  var fmtTm = function(iso) { if(!iso) return '-'; var d=new Date(iso); var h=d.getHours()%12||12; var m=d.getMinutes(); var ap=d.getHours()>=12?'PM':'AM'; return h+':'+(m<10?'0':'')+m+' '+ap; };
  var fmtHM = function(mins) { return Math.floor(mins/60)+'h '+(mins%60)+'m'; };

  var tableBody = snap.map(function(e) {
    return [
      fmtDt(e.clock_in),
      fmtTm(e.clock_in),
      fmtTm(e.clock_out),
      fmtHM(e.duration_minutes||0),
      (e.job_name || '-').substring(0, 30),
      e.self_verified ? '✓' : ''
    ];
  });

  if (tableBody.length && doc.autoTable) {
    doc.autoTable({
      startY: y,
      head: [['Date','Clock In','Clock Out','Duration','Job','Verified']],
      body: tableBody,
      theme: 'grid',
      styles: { fontSize: 8, cellPadding: 4 },
      headStyles: { fillColor: [13, 45, 94], textColor: 255, fontStyle: 'bold' },
      alternateRowStyles: { fillColor: [248, 249, 252] },
      margin: { left: 40, right: 40 }
    });
    y = doc.lastAutoTable.finalY + 20;
  }

  // Commission snapshot section
  var commSnap = [];
  try { commSnap = typeof record.commission_snapshot === 'string' ? JSON.parse(record.commission_snapshot) : (record.commission_snapshot || []); }
  catch(e) { commSnap = []; }

  if (commSnap.length) {
    // Header for commission block
    if (y > 680) { doc.addPage(); y = 40; }
    doc.setFillColor(106, 27, 154);
    doc.rect(40, y, pageW - 80, 18, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text('COMMISSIONS EARNED THIS PERIOD', 48, y + 12);
    y += 24;

    var commBody = commSnap.map(function(c) {
      var jobLabel = c.job_name ? (c.job_name.length > 28 ? c.job_name.substring(0, 25)+'...' : c.job_name) : '-';
      var rateLabel = c.commission_rate ? c.commission_rate+'%' : '-';
      return [
        c.type.charAt(0).toUpperCase() + c.type.slice(1),
        jobLabel,
        c.job_revenue ? '$'+Math.round(c.job_revenue).toLocaleString() : '-',
        rateLabel,
        '$'+parseFloat(c.amount).toFixed(2),
        c.status.toUpperCase(),
        c.approved_by || '-'
      ];
    });
    var commTotal = commSnap.reduce(function(s,c){return s+parseFloat(c.amount);}, 0);
    commBody.push([
      { content: 'TOTAL', colSpan: 4, styles: { fontStyle: 'bold', halign: 'right' } },
      { content: '$'+commTotal.toFixed(2), styles: { fontStyle: 'bold', textColor: [106,27,154] } },
      '',
      ''
    ]);

    doc.autoTable({
      startY: y,
      head: [['Type','Job','Job Revenue','Rate','Amount','Status','Approved By']],
      body: commBody,
      theme: 'grid',
      styles: { fontSize: 8, cellPadding: 4 },
      headStyles: { fillColor: [106, 27, 154], textColor: 255, fontStyle: 'bold' },
      alternateRowStyles: { fillColor: [252, 249, 253] },
      margin: { left: 40, right: 40 }
    });
    y = doc.lastAutoTable.finalY + 20;
  }

  doc.setFont('helvetica','italic'); doc.setFontSize(8);
  doc.setTextColor(130,130,145);
  doc.text('Archived timecard — immutable snapshot from approval date. Regenerated ' + new Date().toLocaleString() + ' by ' + getApprovedBy(), 40, y, { maxWidth: pageW - 80 });

  return doc;
}

function _archiveExportCSV() {
  var data = window._archiveFiltered || [];
  if (!data.length) { toast('Nothing to export'); return; }
  var rows = [['Employee','Pay Period','Pay Type','Rate','Total Hours','Regular','Overtime','Gross Pay','Approved By','Approved At','Entry Count']];
  data.forEach(function(r) {
    rows.push([
      r.employee_name,
      r.period_label,
      r.pay_type || '',
      r.rate != null ? '$' + parseFloat(r.rate).toFixed(2) : '',
      (parseFloat(r.total_hours)||0).toFixed(2),
      (parseFloat(r.reg_hours)||0).toFixed(2),
      (parseFloat(r.ot_hours)||0).toFixed(2),
      '$' + (parseFloat(r.gross_pay)||0).toFixed(2),
      r.approved_by || '',
      r.approved_at ? new Date(r.approved_at).toLocaleString() : '',
      r.entry_count || 0
    ]);
  });
  var csv = rows.map(function(row){
    return row.map(function(c){ var s=String(c==null?'':c).split('"').join('""'); return '"'+s+'"'; }).join(',');
  }).join('\n');
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'timecard_archive_' + new Date().toISOString().split('T')[0] + '.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('✓ Archive exported');
}

async function renderActivity() {
  var h = '';
  var today = new Date().toISOString().split('T')[0];

  // Filters
  h += '<div class="filter-bar" style="margin-bottom:16px;flex-wrap:wrap;gap:8px;">';
  h += '<select id="act-cat" class="form-select" onchange="renderActivity()" style="min-width:160px;">';
  h += '<option value="">All Categories</option>';
  ['time_clock','dispatch','on_call','employees','corrections','general'].forEach(function(c){
    var label = {time_clock:'⏱ Time Clock',dispatch:'📋 Dispatch',on_call:'📅 On-Call',employees:'👥 Employees',corrections:'✏️ Corrections',general:'⚙ General'}[c]||c;
    h += '<option value="'+c+'">'+label+'</option>';
  });
  h += '</select>';
  h += '<input type="date" id="act-from" class="form-input" style="max-width:150px;" value="' + new Date(Date.now()-7*86400000).toISOString().split('T')[0] + '" onchange="renderActivity()">';
  h += '<span style="font-size:12px;color:var(--muted);align-self:center;">to</span>';
  h += '<input type="date" id="act-to" class="form-input" style="max-width:150px;" value="' + today + '" onchange="renderActivity()">';
  h += '<input type="text" id="act-search" class="form-input" placeholder="Search..." style="max-width:200px;" oninput="renderActivity()">';
  h += '<button class="btn btn-sm" onclick="exportActivityCSV()" style="margin-left:auto;">Export CSV</button>';
  h += '</div>';

  h += '<div id="act-table-wrap"><div class="empty" style="padding:24px;">Loading activity...</div></div>';
  document.getElementById('tc-body').innerHTML = h;

  // Load data
  var cat    = (document.getElementById('act-cat')    || {}).value || '';
  var from   = (document.getElementById('act-from')   || {}).value || '';
  var to     = (document.getElementById('act-to')     || {}).value || '';
  var search = ((document.getElementById('act-search') || {}).value || '').toLowerCase();

  var url = SB_URL + '/rest/v1/platform_activity?order=ts.desc&limit=500&select=*';
  if (cat)  url += '&category=eq.' + encodeURIComponent(cat);
  if (from) url += '&ts=gte.' + from + 'T00:00:00';
  if (to)   url += '&ts=lte.' + to + 'T23:59:59';

  try {
    var r = await fetch(url, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } });
    var rows = await r.json() || [];

    if (search) rows = rows.filter(function(row){
      return (row.action||'').toLowerCase().includes(search) ||
             (row.detail||'').toLowerCase().includes(search) ||
             (row.performed_by||'').toLowerCase().includes(search) ||
             (row.employee_name||'').toLowerCase().includes(search);
    });

    var wrap = document.getElementById('act-table-wrap');
    if (!wrap) return;

    if (!rows.length) { wrap.innerHTML = '<div class="empty" style="padding:24px;">No activity found</div>'; return; }

    var CAT_COLORS = {
      time_clock:'#1565c0', dispatch:'#0d2d5e', on_call:'#6a1b9a',
      employees:'#2e7d32', corrections:'#e65100', general:'#546e7a'
    };
    var CAT_LABELS = {
      time_clock:'⏱ Time', dispatch:'📋 Dispatch', on_call:'📅 On-Call',
      employees:'👥 Employees', corrections:'✏️ Correction', general:'⚙ General'
    };

    var fmtTs = function(iso) {
      var d = new Date(iso);
      return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
             d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    };

    // Group by date
    var byDate = {};
    rows.forEach(function(row) {
      var dateKey = new Date(row.ts).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
      if (!byDate[dateKey]) byDate[dateKey] = [];
      byDate[dateKey].push(row);
    });

    var html = '';
    Object.entries(byDate).forEach(function(kv) {
      var dateLabel = kv[0], dayRows = kv[1];
      html += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:12px 0 6px;border-bottom:2px solid var(--border);">'+dateLabel+' <span style="font-weight:400;">('+dayRows.length+')</span></div>';
      html += '<table class="tc-table" style="margin-bottom:8px;"><thead><tr><th style="width:130px;">Time</th><th style="width:120px;">Category</th><th>Action</th><th>Detail</th><th>Employee</th><th>By</th></tr></thead><tbody>';
      dayRows.forEach(function(row) {
        var col = CAT_COLORS[row.category] || '#546e7a';
        var catLabel = CAT_LABELS[row.category] || row.category;
        html += '<tr>';
        html += '<td class="mono" style="font-size:11px;color:var(--muted);white-space:nowrap;">' + fmtTs(row.ts) + '</td>';
        html += '<td><span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:rgba('+hexToRgbAdmin(col)+',.1);color:'+col+';">'+catLabel+'</span></td>';
        html += '<td style="font-size:12px;font-weight:600;">' + (row.action||'—') + '</td>';
        html += '<td style="font-size:11px;color:var(--muted);max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="'+(row.detail||'')+'">' + (row.detail||'—') + '</td>';
        html += '<td style="font-size:11px;">' + (row.employee_name||'—') + '</td>';
        html += '<td style="font-size:11px;color:var(--muted);">' + (row.performed_by||'—') + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
    });

    wrap.innerHTML = html;

    // Summary bar
    var summaryHtml = '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;background:var(--surface);border-radius:10px;border:1px solid var(--border);">';
    summaryHtml += '<div style="font-size:12px;font-weight:700;color:var(--navy);">'+rows.length+' events</div>';
    var performers = [...new Set(rows.map(function(r){return r.performed_by;}).filter(Boolean))];
    performers.slice(0,5).forEach(function(p){
      var cnt = rows.filter(function(r){return r.performed_by===p;}).length;
      summaryHtml += '<div style="font-size:11px;color:var(--muted);"><strong>'+p+'</strong>: '+cnt+'</div>';
    });
    summaryHtml += '</div>';

    wrap.innerHTML = summaryHtml + html;
  } catch(e) {
    var w = document.getElementById('act-table-wrap');
    if (w) w.innerHTML = '<div class="empty" style="padding:24px;color:var(--red);">Error loading activity: ' + e.message + '</div>';
  }
}

function hexToRgbAdmin(hex) {
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}

function exportActivityCSV() {
  var rows = document.querySelectorAll('#act-table-wrap tbody tr');
  var csv = 'Time,Category,Action,Detail,Employee,Performed By\n';
  rows.forEach(function(row) {
    var cells = row.querySelectorAll('td');
    if (cells.length >= 6) {
      csv += [cells[0].textContent,cells[1].textContent,cells[2].textContent,
              (cells[3].getAttribute('title')||cells[3].textContent),
              cells[4].textContent,cells[5].textContent]
        .map(function(c){ return '"'+c.trim().replace(/"/g,'""')+'"'; }).join(',') + '\n';

  });
  var a = document.createElement('a');

function getAccessSettings() {
  var merged = Object.assign({}, ACCESS_DEFAULTS, TAB_ACCESS_DEFAULTS);
  try {
    var saved = JSON.parse(localStorage.getItem('jg_access_settings') || 'null');
    return saved ? Object.assign({}, merged, saved) : merged;
  } catch(e) { return merged; }
}

// Get the current user's role (returns e.g. "Admin", "Office", "Technician", etc.)
function _getCurrentUserRole() {
  try {
    var u = JSON.parse(localStorage.getItem('jg_platform_user') || '{}');
    var emp = ST.employees && ST.employees.find(function(e){ return e.email === u.email; });
    return emp ? (emp.role || 'Technician') : null;
  } catch(e) { return null; }
}

// Check if the current user has a given access key (page or tab)
function _userHasAccess(key) {
  var role = _getCurrentUserRole();
  if (!role) return false;
  var settings = getAccessSettings();
  var allowed = settings[key] || TAB_ACCESS_DEFAULTS[key] || ACCESS_DEFAULTS[key] || [];
  return allowed.indexOf(role) !== -1;
}

function saveAccessSettings(settings) {
  localStorage.setItem('jg_access_settings', JSON.stringify(settings));
  // Also save to Supabase for platform-wide sync
  fetch(SB_URL + '/rest/v1/platform_activity', {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ action: 'Access Settings Updated', detail: 'Dashboard access permissions updated', category: 'employees', performed_by: 'Admin', ts: new Date().toISOString() })
  }).catch(function(){});
}

async function saveAccessToDB(settings) {
  try {
    await fetch(SB_URL + '/rest/v1/access_settings', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ id: 'current', settings: settings, updated_at: new Date().toISOString() })
    });
  } catch(e) {}
}

async function loadAccessFromDB() {
  try {
    var r = await fetch(SB_URL + '/rest/v1/access_settings?id=eq.current&select=settings', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    var rows = await r.json();
    if (rows && rows[0] && rows[0].settings) {
      localStorage.setItem('jg_access_settings', JSON.stringify(rows[0].settings));
      return rows[0].settings;
    }
  } catch(e) {}
  return getAccessSettings();
}

function hexToRgbAccess(hex) {
  hex = hex.replace('#','');
  return parseInt(hex.slice(0,2),16)+','+parseInt(hex.slice(2,4),16)+','+parseInt(hex.slice(4,6),16);
}

function toggleAccess(pageKey, role) {
  var settings = getAccessSettings();
  if (!settings[pageKey]) settings[pageKey] = [];
  var idx = settings[pageKey].indexOf(role);
  if (idx > -1) settings[pageKey].splice(idx, 1);
  else settings[pageKey].push(role);
  saveAccessSettings(settings);
  saveAccessToDB(settings);
  renderAccess();
}

function cycleEmpAccess(empId, pageKey) {
  var settings = getAccessSettings();
  var grantKey = '_emp_' + empId;
  var denyKey  = '_deny_' + empId;
  if (!settings[grantKey]) settings[grantKey] = [];
  if (!settings[denyKey])  settings[denyKey]  = [];
  var isGranted = settings[grantKey].includes(pageKey);
  var isDenied  = settings[denyKey].includes(pageKey);
  // Cycle: default → grant → deny → default
  if (!isGranted && !isDenied) {
    settings[grantKey].push(pageKey);
  } else if (isGranted) {
    settings[grantKey] = settings[grantKey].filter(function(p){return p!==pageKey;});
    settings[denyKey].push(pageKey);
  } else {
    settings[denyKey] = settings[denyKey].filter(function(p){return p!==pageKey;});
  }
  saveAccessSettings(settings);
  saveAccessToDB(settings);
  renderAccess();
}

function resetAccessDefaults() {
  if (!confirm('Reset all access settings to defaults?')) return;
  saveAccessSettings(Object.assign({}, ACCESS_DEFAULTS));
  saveAccessToDB(Object.assign({}, ACCESS_DEFAULTS));
  renderAccess();
  toast('Access settings reset to defaults');
}

function renderRoutes() {
  var h = '';
  var today = new Date().toISOString().split('T')[0];

  var durMinsLive = function(e){ var out=e.clock_out?new Date(e.clock_out):new Date(); return Math.floor((out-new Date(e.clock_in))/60000); };
  var todayStr = today;
  var active = ST.entries.filter(function(e){ return !e.clock_out && e.clock_in.startsWith(todayStr); });

  h += '</div>';

  // ── DRIVE AUDIT ──────────────────────────────────────────────────────────

  // Flags suspicious gaps where actual drive took significantly longer than expected.
  var weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
  var weekAgoStr = weekAgo.toISOString().split('T')[0];
