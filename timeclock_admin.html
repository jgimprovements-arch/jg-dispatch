  h += '</div></div>';

  document.getElementById('tc-body').innerHTML = h;
}

var _routeMap = null;

async function loadRouteMap() {
  var empName = (document.getElementById('route-emp') || {}).value || '';
  var date    = (document.getElementById('route-date') || {}).value || new Date().toISOString().split('T')[0];

  var wrap = document.getElementById('route-map-wrap');
  if (wrap) wrap.style.display = 'block';

  // Load entries for this date
  var entryFilter = '/rest/v1/time_entries?clock_in=gte.'+date+'T00:00:00&clock_in=lte.'+date+'T23:59:59&order=clock_in.asc&select=*';
  if (empName) entryFilter += '&employee_name=eq.'+encodeURIComponent(empName);
  var entries = await sb(entryFilter) || [];

  if (!entries.length) {
    var wrap2 = document.getElementById('route-map-wrap');
    if (wrap2) wrap2.innerHTML = '<div class="card"><div class="empty" style="padding:24px;">No entries found for this date and employee</div></div>';
    return;
  }

  // Load pings for this date
  var pingFilter = '/rest/v1/location_pings?recorded_at=gte.'+date+'T00:00:00&recorded_at=lte.'+date+'T23:59:59&order=recorded_at.asc&select=*';
  var allPings = await sb(pingFilter) || [];

  // Group pings by entry_id
  var pingsByEntry = {};
  allPings.forEach(function(p){
    if (!pingsByEntry[p.entry_id]) pingsByEntry[p.entry_id] = [];
    pingsByEntry[p.entry_id].push(p);
  });

  // Init map
  if (_routeMap) { try { _routeMap.remove(); } catch(e){} _routeMap = null; }
  var mapEl = document.getElementById('route-map');
  if (!mapEl) { console.warn('[ROUTE MAP] map element not found'); return; }
  if (typeof L === 'undefined') {
    // Wait up to 3s for Leaflet
    var waited = 0;
    while (typeof L === 'undefined' && waited < 30) {
      await new Promise(function(r){ setTimeout(r, 100); });
      waited++;
    }
    if (typeof L === 'undefined') { console.warn('[ROUTE MAP] Leaflet not loaded after wait'); return; }
  }

  // Force dimensions
  mapEl.style.height = '480px';
  mapEl.style.width = '100%';
  mapEl.style.display = 'block';

  _routeMap = L.map('route-map', { preferCanvas: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
    crossOrigin: true
  }).addTo(_routeMap);

  var colors = ['#e85d04','#0d2d5e','#2e7d32','#9c27b0','#00838f','#c62828','#f57c00','#795548'];
  var bounds = [];
  var fmtTime = function(iso){ var d=new Date(iso),h=d.getHours()%12||12,m=d.getMinutes(),ap=d.getHours()>=12?'PM':'AM'; return h+':'+(m<10?'0':'')+m+' '+ap; };
  var fmtDur = function(mins){ return Math.floor(mins/60)+'h '+(mins%60)+'m'; };

  // Build legend
  var legendHtml = '';
  var timelineHtml = '<div class="card"><div class="card-hdr"><div class="card-title">Day Timeline</div></div><div style="padding:0;">';

  // Group entries by employee for color assignment
  var empColors = {};
  var colorIdx = 0;
  entries.forEach(function(e){
    if (!empColors[e.employee_name]) empColors[e.employee_name] = colors[colorIdx++ % colors.length];
  });

  entries.forEach(function(e) {
    var color = empColors[e.employee_name];
    var pings = pingsByEntry[e.id] || [];
    var initials = e.employee_name.split(' ').map(function(n){return n[0]||'';}).join('').toUpperCase();
    var totalMins = e.duration_minutes || Math.floor(((e.clock_out?new Date(e.clock_out):new Date())-new Date(e.clock_in))/60000);

    // Full coordinate path
    var coords = [];
    if (e.clock_in_lat) coords.push({ lat: parseFloat(e.clock_in_lat), lng: parseFloat(e.clock_in_lng), time: e.clock_in, type: 'start' });
    pings.forEach(function(p){ coords.push({ lat: parseFloat(p.lat), lng: parseFloat(p.lng), time: p.recorded_at, type: 'ping' }); });
    if (e.clock_out_lat) coords.push({ lat: parseFloat(e.clock_out_lat), lng: parseFloat(e.clock_out_lng), time: e.clock_out, type: 'end' });

    coords.forEach(function(c){ bounds.push([c.lat, c.lng]); });

    // Draw route
    if (coords.length >= 2) {
      L.polyline(coords.map(function(c){return [c.lat,c.lng];}), {
        color: color, weight: 4, opacity: 0.75, dashArray: null
      }).addTo(_routeMap);
    }

    // Ping dots with time tooltip
    coords.filter(function(c){return c.type==='ping';}).forEach(function(c){
      L.circleMarker([c.lat,c.lng],{radius:5,fillColor:color,color:'#fff',weight:2,fillOpacity:0.9})
        .addTo(_routeMap)
        .bindTooltip('<b>'+e.employee_name+'</b><br>'+fmtTime(c.time),{permanent:false});
    });

    // Start marker
    if (e.clock_in_lat) {
      var startIco = L.divIcon({className:'',html:'<div style="background:#fff;color:'+color+';width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:2.5px solid '+color+';box-shadow:0 2px 6px rgba(0,0,0,.25);">▶</div>',iconSize:[28,28],iconAnchor:[14,14]});
      L.marker([parseFloat(e.clock_in_lat),parseFloat(e.clock_in_lng)],{icon:startIco}).addTo(_routeMap)
        .bindPopup('<b>'+e.employee_name+'</b><br>Clocked in: '+fmtTime(e.clock_in)+'<br>Job: '+(e.job_name||'No job'));
    }

    // End marker
    if (e.clock_out_lat) {
      var endIco = L.divIcon({className:'',html:'<div style="background:'+color+';color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.25);">■</div>',iconSize:[28,28],iconAnchor:[14,14]});
      L.marker([parseFloat(e.clock_out_lat),parseFloat(e.clock_out_lng)],{icon:endIco}).addTo(_routeMap)
        .bindPopup('<b>'+e.employee_name+'</b><br>Clocked out: '+fmtTime(e.clock_out));
    } else {
      // Current position (last ping)
      var last = coords[coords.length-1];
      if (last) {
        var nowIco = L.divIcon({className:'',html:'<div style="background:'+color+';color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:DM Sans,sans-serif;border:3px solid #fff;box-shadow:0 3px 10px rgba(0,0,0,.3);">'+initials+'</div>',iconSize:[36,36],iconAnchor:[18,18]});
        L.marker([last.lat,last.lng],{icon:nowIco}).addTo(_routeMap)
          .bindPopup('<b>'+e.employee_name+'</b><br>Still clocked in<br>'+fmtTime(last.time));
      }
    }

    // Legend
    legendHtml += '<div style="display:flex;align-items:center;gap:6px;padding:5px 10px;background:rgba(13,45,94,.04);border-radius:8px;">';
    legendHtml += '<div style="width:14px;height:14px;border-radius:50%;background:'+color+';flex-shrink:0;"></div>';
    legendHtml += '<span style="font-size:12px;font-weight:600;color:var(--navy);">'+e.employee_name+'</span>';
    legendHtml += '<span style="font-size:11px;color:var(--muted);">'+fmtTime(e.clock_in)+' – '+(e.clock_out?fmtTime(e.clock_out):'Active')+'</span>';
    legendHtml += '<span style="font-size:11px;font-weight:700;color:'+color+';">'+fmtDur(totalMins)+'</span>';
    legendHtml += '</div>';

    // Timeline row
    timelineHtml += '<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);">';
    timelineHtml += '<div style="width:12px;height:12px;border-radius:50%;background:'+color+';flex-shrink:0;"></div>';
    timelineHtml += '<div style="flex:1;">';
    timelineHtml += '<div style="font-size:13px;font-weight:700;color:var(--navy);">'+e.employee_name+'</div>';
    timelineHtml += '<div style="font-size:11px;color:var(--muted);">'+(e.job_name||'No job')+'</div>';
    timelineHtml += '</div>';
    timelineHtml += '<div style="text-align:right;">';
    timelineHtml += '<div style="font-size:12px;font-weight:600;">'+fmtTime(e.clock_in)+' → '+(e.clock_out?fmtTime(e.clock_out):'Active')+'</div>';
    timelineHtml += '<div style="font-size:11px;color:var(--muted);">'+fmtDur(totalMins)+' · '+pings.length+' GPS ping'+(pings.length!==1?'s':'')+'</div>';
    timelineHtml += '</div></div>';
  });

  timelineHtml += '</div></div>';

  var legendEl = document.getElementById('route-legend');
  if (legendEl) legendEl.innerHTML = legendHtml;
  var timelineEl = document.getElementById('route-timeline');
  if (timelineEl) timelineEl.innerHTML = timelineHtml;

  if (bounds.length === 1) _routeMap.setView(bounds[0], 14);
  else if (bounds.length > 1) _routeMap.fitBounds(bounds, { padding: [50,50] });
  else { _routeMap.setView([44.26, -88.41], 11); }
  // Force tile render
  setTimeout(function(){ if (_routeMap) _routeMap.invalidateSize(); }, 300);
}


// ── DRIVE AUDIT ────────────────────────────────────────────────────────
// Computes expected vs actual drive time between consecutive clocked jobs.
// Uses OSRM public routing service (free, no API key).
// Flags gaps where actual exceeds expected by configured threshold.

function _osrmDriveSeconds(lat1, lng1, lat2, lng2) {
  // Returns driving duration in seconds, or null on failure.
  // OSRM expects {lon},{lat} order. Free public endpoint; throttle caller to 1 req/sec.
  return new Promise(function(resolve) {
    var url = 'https://router.project-osrm.org/route/v1/driving/' + lng1 + ',' + lat1 + ';' + lng2 + ',' + lat2 + '?overview=false';
    var ctrl = new AbortController();
    var timer = setTimeout(function(){ ctrl.abort(); }, 6000);
    fetch(url, { signal: ctrl.signal })
      .then(function(r){ clearTimeout(timer); return r.json(); })
      .then(function(data){
        if (data && data.routes && data.routes[0] && typeof data.routes[0].duration === 'number') {
          resolve(data.routes[0].duration);
        } else resolve(null);
      })
      .catch(function(){ clearTimeout(timer); resolve(null); });
  });
}

function _haversineMeters(lat1, lng1, lat2, lng2) {
  // Straight-line distance — used as sanity check when OSRM unavailable
  var toRad = function(d){ return d * Math.PI / 180; };
  var R = 6371000;
  var dLat = toRad(lat2 - lat1);
  var dLng = toRad(lng2 - lng1);
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(toRad(lat1))*Math.cos(toRad(lat2)) * Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function runDriveAudit() {
  var empName  = (document.getElementById('audit-emp')  || {}).value || '';
  var startDate = (document.getElementById('audit-start') || {}).value;
  var endDate   = (document.getElementById('audit-end')   || {}).value;
  var threshold = parseFloat((document.getElementById('audit-threshold') || {}).value || '1.5');
  var resultsEl = document.getElementById('audit-results');
  if (!resultsEl) return;

  if (!startDate || !endDate) { resultsEl.innerHTML = '<div class="empty">Pick a date range</div>'; return; }

  resultsEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);"><span class="spinner" style="display:inline-block;width:14px;height:14px;border:2px solid #e1e4ea;border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px;"></span>Running audit… calculating drive times…</div>';

  // Fetch entries
  var filter = '/rest/v1/time_entries?clock_in=gte.'+startDate+'T00:00:00&clock_in=lte.'+endDate+'T23:59:59&order=employee_name.asc,clock_in.asc&select=*';
  if (empName) filter += '&employee_name=eq.' + encodeURIComponent(empName);
  var entries = await sb(filter) || [];

  if (!entries.length) {
    resultsEl.innerHTML = '<div class="empty" style="padding:30px;">No time entries found in that range</div>';
    return;
  }

  // Group by employee
  var byEmp = {};
  entries.forEach(function(e){
    if (!byEmp[e.employee_name]) byEmp[e.employee_name] = [];
    byEmp[e.employee_name].push(e);
  });

  // Build consecutive-pair gaps per employee
  var allGaps = [];
  Object.keys(byEmp).forEach(function(name) {
    var list = byEmp[name].sort(function(a,b){ return new Date(a.clock_in) - new Date(b.clock_in); });
    for (var i = 0; i < list.length - 1; i++) {
      var a = list[i], b = list[i+1];
      // Only analyze if prior entry has clock_out + GPS, and next has clock_in + GPS
      if (!a.clock_out || !a.clock_out_lat || !a.clock_out_lng) continue;
      if (!b.clock_in_lat || !b.clock_in_lng) continue;
      var tOut = new Date(a.clock_out).getTime();
      var tIn  = new Date(b.clock_in).getTime();
      var gapMin = (tIn - tOut) / 60000;
      if (gapMin < 5)   continue; // instant job switch, not worth analyzing
      if (gapMin > 720) continue; // > 12hr = overnight, skip
      // Same-spot check: if coords within 100m, probably didn't drive
      var dMeters = _haversineMeters(parseFloat(a.clock_out_lat), parseFloat(a.clock_out_lng), parseFloat(b.clock_in_lat), parseFloat(b.clock_in_lng));
      if (dMeters < 100) continue;
      allGaps.push({
        employee: name,
        date: a.clock_out.split('T')[0],
        fromJob: a.job_name || '(No job)',
        toJob:   b.job_name || '(No job)',
        fromLat: parseFloat(a.clock_out_lat), fromLng: parseFloat(a.clock_out_lng),
        toLat:   parseFloat(b.clock_in_lat),  toLng:   parseFloat(b.clock_in_lng),
        clockOutTime: a.clock_out,
        clockInTime:  b.clock_in,
        gapMin: Math.round(gapMin),
        straightLineMiles: (dMeters / 1609.34),
        expectedMin: null,
        flag: null
      });
    }
  });

  if (!allGaps.length) {
    resultsEl.innerHTML = '<div class="empty" style="padding:30px;">No analyzable gaps in this range (needs GPS on both ends, gap 5 min – 12 hr, and actual travel > 100m)</div>';
    return;
  }

  // Protective cap — OSRM is throttled at ~1 req/sec and long audits frustrate users
  var gapCap = 100;
  var skippedCount = 0;
  if (allGaps.length > gapCap) {
    skippedCount = allGaps.length - gapCap;
    allGaps = allGaps.slice(0, gapCap);
  }

  // Fetch OSRM estimates with 1 req/sec throttle
  var progress = 0, total = allGaps.length;
  var updateProgress = function(){
    progress++;
    resultsEl.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);"><span class="spinner" style="display:inline-block;width:14px;height:14px;border:2px solid #e1e4ea;border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px;"></span>Calculating drive times ('+progress+'/'+total+')…' + (skippedCount ? ' <span style="color:var(--red);">(+'+skippedCount+' gaps skipped — narrow date range for full audit)</span>' : '') + '</div>';
  };

  for (var k = 0; k < allGaps.length; k++) {
    var g = allGaps[k];
    var dur = await _osrmDriveSeconds(g.fromLat, g.fromLng, g.toLat, g.toLng);
    if (dur !== null) {
      g.expectedMin = Math.round(dur / 60);
      // Flag if actual > expected * threshold + 15 buffer
      g.flag = g.gapMin > (g.expectedMin * threshold + 15);
    }
    updateProgress();
    // Throttle: wait 1100ms before next call (OSRM public ~1/sec limit)
    if (k < allGaps.length - 1) await new Promise(function(r){ setTimeout(r, 1100); });
  }

  renderDriveAuditResults(allGaps);
}

function renderDriveAuditResults(gaps) {
  var resultsEl = document.getElementById('audit-results');
  if (!resultsEl) return;

  var flagged = gaps.filter(function(g){ return g.flag === true; });
  var normal  = gaps.filter(function(g){ return g.flag === false; });
  var unknown = gaps.filter(function(g){ return g.flag === null; });
  var totalFlaggedMin = flagged.reduce(function(sum, g){ return sum + (g.gapMin - (g.expectedMin||0)); }, 0);

  var uniqEmpsFlagged = {};
  flagged.forEach(function(g){ uniqEmpsFlagged[g.employee] = true; });
  var fEmpCount = Object.keys(uniqEmpsFlagged).length;

  // Format helpers
  var fmt = function(iso){ if(!iso)return ''; var d=new Date(iso); var h=d.getHours()%12||12,m=d.getMinutes(),ap=d.getHours()>=12?'PM':'AM'; return h+':'+(m<10?'0':'')+m+' '+ap; };
  var fmtDate = function(s){ if(!s)return ''; var p=s.split('-'); return p[1]+'/'+p[2]+'/'+p[0].slice(2); };
  var fmtMin = function(m){ if(m==null)return '—'; if (m < 60) return m+'m'; return Math.floor(m/60)+'h '+(m%60)+'m'; };

  var h = '';

  // Summary card
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;">';
  h += '<div class="stat-card" style="border-left:4px solid var(--red);"><div class="stat-val" style="color:var(--red);">'+flagged.length+'</div><div class="stat-lbl">Flagged Gaps</div></div>';
  h += '<div class="stat-card"><div class="stat-val">'+fEmpCount+'</div><div class="stat-lbl">Employees Flagged</div></div>';
  h += '<div class="stat-card"><div class="stat-val">'+fmtMin(totalFlaggedMin)+'</div><div class="stat-lbl">Unexplained Time</div></div>';
  h += '<div class="stat-card"><div class="stat-val" style="color:var(--green);">'+normal.length+'</div><div class="stat-lbl">Normal Gaps</div></div>';
  if (unknown.length) h += '<div class="stat-card"><div class="stat-val" style="color:var(--muted);">'+unknown.length+'</div><div class="stat-lbl">OSRM Failed</div></div>';
  h += '</div>';

  if (!flagged.length && !unknown.length && normal.length) {
    h += '<div class="card"><div class="card-body"><div style="padding:20px;text-align:center;color:var(--green);"><strong>✓ No suspicious gaps found.</strong><br><span style="color:var(--muted);font-size:12px;">All '+normal.length+' analyzable gaps completed within expected drive time + threshold.</span></div></div></div>';
    resultsEl.innerHTML = h;
    return;
  }

  // Flagged table
  if (flagged.length) {
    h += '<div class="card" style="margin-bottom:16px;border-left:4px solid var(--red);"><div class="card-hdr"><div class="card-title">⚠ Flagged Gaps</div></div>';
    h += '<table class="tc-table"><thead><tr><th>Employee</th><th>Date</th><th>From → To</th><th>Clock Out → In</th><th>Actual</th><th>Expected</th><th>Variance</th><th>Map</th></tr></thead><tbody>';
    flagged.sort(function(a,b){ return (b.gapMin - (b.expectedMin||0)) - (a.gapMin - (a.expectedMin||0)); });
    flagged.forEach(function(g) {
      var variance = g.gapMin - (g.expectedMin || 0);
      h += '<tr>';
      h += '<td><strong>'+g.employee+'</strong></td>';
      h += '<td class="mono">'+fmtDate(g.date)+'</td>';
      h += '<td style="font-size:12px;">'+g.fromJob+' <span style="color:var(--muted);">→</span> '+g.toJob+'</td>';
      h += '<td class="mono" style="font-size:12px;">'+fmt(g.clockOutTime)+' → '+fmt(g.clockInTime)+'</td>';
      h += '<td><strong>'+fmtMin(g.gapMin)+'</strong></td>';
      h += '<td>'+fmtMin(g.expectedMin)+'</td>';
      h += '<td><strong style="color:var(--red);">+'+fmtMin(variance)+'</strong></td>';
      h += '<td><a href="https://www.google.com/maps/dir/'+g.fromLat+','+g.fromLng+'/'+g.toLat+','+g.toLng+'/" target="_blank" style="color:var(--orange);font-size:11px;">📍 View</a></td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }

  // Unknown table — OSRM failed
  if (unknown.length) {
    h += '<div class="card" style="margin-bottom:16px;"><div class="card-hdr"><div class="card-title" style="color:var(--muted);">⚠ Could Not Calculate Drive Time ('+unknown.length+')</div></div>';
    h += '<table class="tc-table"><thead><tr><th>Employee</th><th>Date</th><th>From → To</th><th>Actual Gap</th><th>Straight Line</th></tr></thead><tbody>';
    unknown.forEach(function(g) {
      h += '<tr>';
      h += '<td>'+g.employee+'</td>';
      h += '<td class="mono">'+fmtDate(g.date)+'</td>';
      h += '<td style="font-size:12px;">'+g.fromJob+' → '+g.toJob+'</td>';
      h += '<td>'+fmtMin(g.gapMin)+'</td>';
      h += '<td class="mono">'+g.straightLineMiles.toFixed(1)+' mi</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }

  // Normal summary — collapsed detail
  if (normal.length) {
    h += '<details style="margin-top:16px;"><summary style="cursor:pointer;font-weight:700;color:var(--green);padding:8px;">✓ '+normal.length+' Normal Gaps (click to expand)</summary>';
    h += '<div class="card" style="margin-top:8px;"><table class="tc-table"><thead><tr><th>Employee</th><th>Date</th><th>From → To</th><th>Actual</th><th>Expected</th></tr></thead><tbody>';
    normal.forEach(function(g) {
      h += '<tr>';
      h += '<td>'+g.employee+'</td>';
      h += '<td class="mono">'+fmtDate(g.date)+'</td>';
      h += '<td style="font-size:12px;">'+g.fromJob+' → '+g.toJob+'</td>';
      h += '<td>'+fmtMin(g.gapMin)+'</td>';
      h += '<td>'+fmtMin(g.expectedMin)+'</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div></details>';
  }

  resultsEl.innerHTML = h;
}

function _rptToggleSection(key) {

function _rptSectionHeader(key, label, desc) {
  var isOpen = _rptSectionsOpen[key];
  var h = '<div onclick="_rptToggleSection(\''+key+'\')" style="cursor:pointer;margin-top:18px;margin-bottom:10px;padding:10px 14px;background:var(--navy);color:#fff;border-radius:8px 8px '+(isOpen?'0 0':'8px 8px')+';display:flex;align-items:center;justify-content:space-between;user-select:none;">';
  h += '<div>';
  h += '<div style="font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;">'+label+'</div>';
  if (desc) h += '<div style="font-size:10px;color:rgba(255,255,255,.6);margin-top:2px;font-weight:400;">'+desc+'</div>';
  h += '</div>';
  h += '<div style="font-size:16px;opacity:.7;">'+(isOpen?'▼':'▶')+'</div>';
  h += '</div>';
  return h;
}

// ─── Labor Cost by Market (Appleton vs Stevens Point) ──────────────────
function _rptLaborByMarket(byEmp) {
  var fmtDur = function(mins){ return Math.floor(mins/60)+'h '+(mins%60)+'m'; };
  var durMins = function(e){ var out=e.clock_out?new Date(e.clock_out):new Date(); return Math.floor((out-new Date(e.clock_in))/60000); };

  // Build employee → market lookup
  var empMarket = {};
  (ST.employees||[]).forEach(function(emp) {
    empMarket[emp.name] = emp.market || 'Unassigned';
  });

  var byMarket = {};
  ST.entries.forEach(function(e) {
    var mkt = empMarket[e.employee_name] || 'Unassigned';
    if (!byMarket[mkt]) byMarket[mkt] = { mins: 0, entries: 0, techs: new Set() };
    byMarket[mkt].mins += e.duration_minutes || durMins(e);
    byMarket[mkt].entries++;
    byMarket[mkt].techs.add(e.employee_name);
  });

  var totalMins = Object.values(byMarket).reduce(function(s,d){return s+d.mins;},0);

  var h = '<div class="card" style="margin-bottom:12px;">';
  h += '<div class="card-hdr"><div class="card-title">🏢 Labor Cost by Market</div></div>';
  h += '<div style="padding:16px;">';

  if (!Object.keys(byMarket).length) {
    h += '<div style="color:var(--muted);text-align:center;padding:20px;font-size:12px;">No data in this window.</div>';
    h += '</div></div>';
    return h;
  }

  // Horizontal bar chart
  var marketColors = {'Appleton':'#e85d04','Stevens Point':'#1565c0','Unassigned':'#6b7a96'};
  Object.entries(byMarket).sort(function(a,b){return b[1].mins - a[1].mins;}).forEach(function(kv) {
    var mkt = kv[0], d = kv[1];
    var pct = totalMins > 0 ? Math.round(d.mins/totalMins*100) : 0;
    var cost = laborBurdenCost(d.mins);
    var color = marketColors[mkt] || '#6b7a96';

    h += '<div style="margin-bottom:14px;">';
    h += '<div style="display:flex;justify-content:space-between;margin-bottom:6px;">';
    h += '<div><strong style="color:var(--navy);">'+mkt+'</strong> <span style="font-size:11px;color:var(--muted);">· '+d.techs.size+' techs · '+d.entries+' entries</span></div>';
    h += '<div style="font-family:DM Mono,monospace;font-weight:700;color:var(--navy);">'+fmtDur(d.mins)+' <span style="color:var(--orange);">'+fmtMoney(cost)+'</span> <span style="color:var(--muted);font-size:11px;font-weight:400;">('+pct+'%)</span></div>';
    h += '</div>';
    h += '<div style="height:14px;background:var(--border);border-radius:7px;overflow:hidden;">';
    h += '<div style="height:100%;background:'+color+';width:'+pct+'%;border-radius:7px;transition:width .4s;"></div>';
    h += '</div></div>';
  });

  h += '</div></div>';
  return h;
}

// ─── Labor Cost by Job Type (from Albi projectType) ────────────────────
function _rptLaborByJobType() {
  var fmtDur = function(mins){ return Math.floor(mins/60)+'h '+(mins%60)+'m'; };
  var durMins = function(e){ var out=e.clock_out?new Date(e.clock_out):new Date(); return Math.floor((out-new Date(e.clock_in))/60000); };

  // Build job_id → project type lookup from Albi
  var jobTypeMap = {};
  (_albiJobs||[]).forEach(function(j) {
    if (j.id && j.projectType) jobTypeMap[j.id] = j.projectType;
  });

  var byType = {};
  var untaggedMins = 0;
  ST.entries.forEach(function(e) {
    var mins = e.duration_minutes || durMins(e);
    if (e.job_id && jobTypeMap[e.job_id]) {
      var type = jobTypeMap[e.job_id];
      if (!byType[type]) byType[type] = { mins: 0, entries: 0 };
      byType[type].mins += mins;
      byType[type].entries++;
    } else {
      untaggedMins += mins;
    }
  });

  var totalMins = Object.values(byType).reduce(function(s,d){return s+d.mins;},0) + untaggedMins;

  var h = '<div class="card" style="margin-bottom:12px;">';
  h += '<div class="card-hdr"><div class="card-title">🔧 Labor Cost by Job Type</div></div>';
  h += '<div style="padding:16px;">';

  if (!Object.keys(byType).length && !untaggedMins) {
    h += '<div style="color:var(--muted);text-align:center;padding:20px;font-size:12px;">No data in this window.</div>';
    h += '</div></div>';
    return h;
  }

  var typeColors = {'Water Mitigation':'#1565c0','Reconstruction':'#e85d04','Mold':'#2e7d32','Fire Mitigation':'#c62828','Contents':'#6a1b9a','CAT3':'#00838f','Board Up':'#5d4037','General Clean':'#546e7a'};

  Object.entries(byType).sort(function(a,b){return b[1].mins - a[1].mins;}).forEach(function(kv) {
    var type = kv[0], d = kv[1];
    var pct = totalMins > 0 ? Math.round(d.mins/totalMins*100) : 0;
    var cost = laborBurdenCost(d.mins);
    var color = typeColors[type] || '#6b7a96';

    h += '<div style="margin-bottom:12px;">';
    h += '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">';
    h += '<div><strong style="color:var(--navy);">'+type+'</strong> <span style="font-size:11px;color:var(--muted);">· '+d.entries+' entries</span></div>';
    h += '<div style="font-family:DM Mono,monospace;font-weight:700;color:var(--navy);">'+fmtDur(d.mins)+' <span style="color:var(--orange);">'+fmtMoney(cost)+'</span> <span style="color:var(--muted);font-size:11px;font-weight:400;">('+pct+'%)</span></div>';
    h += '</div>';
    h += '<div style="height:10px;background:var(--border);border-radius:5px;overflow:hidden;">';
    h += '<div style="height:100%;background:'+color+';width:'+pct+'%;border-radius:5px;"></div>';
    h += '</div></div>';
  });

  if (untaggedMins > 0) {
    var pct = totalMins > 0 ? Math.round(untaggedMins/totalMins*100) : 0;
    h += '<div style="margin-bottom:12px;padding-top:10px;border-top:1px dashed var(--border);">';
    h += '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">';
    h += '<div><span style="color:var(--muted);font-style:italic;">⚠ Untagged (no job_id or not in Albi)</span></div>';
    h += '<div style="font-family:DM Mono,monospace;color:var(--muted);">'+fmtDur(untaggedMins)+' <span style="color:var(--orange);">'+fmtMoney(laborBurdenCost(untaggedMins))+'</span> ('+pct+'%)</div>';
    h += '</div></div>';
  }

  if (!_albiJobs || !_albiJobs.length) {
    h += '<div style="margin-top:8px;padding:8px 12px;background:rgba(230,81,0,.06);border-radius:6px;font-size:11px;color:#e65100;">⚠ Albi job list hasn\'t loaded yet. This report is limited until it does.</div>';
  }

  h += '</div></div>';
  return h;
}

// ─── Utilization Rate ──────────────────────────────────────────────────
function _rptUtilization(byEmp) {
  // Compute workdays in the filter window
  var since = new Date(ST.filterDate || new Date(Date.now() - 60*86400000));
  var until = new Date(ST.filterDateEnd || new Date());
  var workdays = 0;
  var cur = new Date(since);
  while (cur <= until) {
    var dow = cur.getDay();
    if (dow !== 0 && dow !== 6) workdays++;
    cur.setDate(cur.getDate() + 1);
  }
  var expectedHoursPerEmp = workdays * 8;

  var h = '<div class="card" style="margin-bottom:12px;">';
  h += '<div class="card-hdr"><div class="card-title">⏱ Utilization Rate</div></div>';
  h += '<div style="padding:16px;">';
  h += '<div style="font-size:11px;color:var(--muted);margin-bottom:12px;padding:8px 12px;background:rgba(13,45,94,.04);border-radius:6px;">Assumes <strong>8 hrs/workday × '+workdays+' workdays</strong> ('+expectedHoursPerEmp+'h) baseline per full-time employee. Actual utilization = clocked hours ÷ baseline.</div>';

  if (!Object.keys(byEmp).length) {
    h += '<div style="color:var(--muted);text-align:center;padding:20px;font-size:12px;">No data in this window.</div>';
    h += '</div></div>';
    return h;
  }

  // Only count active employees
  var activeEmps = (ST.employees||[]).filter(function(e){ return e.active; });

  h += '<table class="tc-table" style="font-size:12px;"><thead><tr><th>Employee</th><th style="text-align:right;">Hours Clocked</th><th style="text-align:right;">Baseline</th><th style="text-align:center;">Utilization</th><th></th></tr></thead><tbody>';

  activeEmps.sort(function(a,b) {
    var am = (byEmp[a.name]||{mins:0}).mins;
    var bm = (byEmp[b.name]||{mins:0}).mins;
    return bm - am;
  }).forEach(function(emp) {
    var d = byEmp[emp.name] || { mins: 0 };
    var clockedHrs = d.mins / 60;
    var utilRate = expectedHoursPerEmp > 0 ? (clockedHrs / expectedHoursPerEmp * 100) : 0;

    var color = utilRate >= 90 ? '#2e7d32' : utilRate >= 70 ? '#e65100' : '#c62828';
    var status = utilRate >= 90 ? 'High' : utilRate >= 70 ? 'Normal' : 'Low';

    h += '<tr>';
    h += '<td><strong>'+emp.name+'</strong> <span style="font-size:10px;color:var(--muted);">'+(emp.role||'Tech')+'</span></td>';
    h += '<td style="text-align:right;font-family:DM Mono,monospace;font-weight:700;">'+clockedHrs.toFixed(1)+'h</td>';
    h += '<td style="text-align:right;font-family:DM Mono,monospace;color:var(--muted);">'+expectedHoursPerEmp+'h</td>';
    h += '<td style="text-align:center;"><strong style="color:'+color+';font-size:14px;">'+utilRate.toFixed(0)+'%</strong></td>';
    h += '<td><div style="width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;"><div style="height:100%;background:'+color+';width:'+Math.min(100,utilRate)+'%;"></div></div></td>';
    h += '</tr>';
  });

  h += '</tbody></table>';
  h += '<div style="font-size:10px;color:var(--muted);margin-top:10px;"><strong>Legend:</strong> <span style="color:#2e7d32;">●</span> 90%+ High · <span style="color:#e65100;">●</span> 70-89% Normal · <span style="color:#c62828;">●</span> <70% Low (possible PTO, slow period, or tracking gap)</div>';
  h += '</div></div>';
  return h;
}

// ─── OT Trend (by pay period) ──────────────────────────────────────────
function _rptOTTrend() {
  var fmtDur = function(mins){ return Math.floor(mins/60)+'h '+(mins%60)+'m'; };
  var durMins = function(e){ var out=e.clock_out?new Date(e.clock_out):new Date(); return Math.floor((out-new Date(e.clock_in))/60000); };

  // Group entries into weeks (Sun-Sat), compute per-employee OT per week
  var weekMap = {};  // weekStart ISO date → { totalMins, regMins, otMins, empCount }
  var empWeekMap = {};  // "weekStart|emp" → mins

  ST.entries.forEach(function(e) {
    if (!e.clock_in) return;
    var inDate = new Date(e.clock_in);
    var weekStart = new Date(inDate);
    weekStart.setDate(inDate.getDate() - inDate.getDay());
    weekStart.setHours(0,0,0,0);
    var wsKey = weekStart.toISOString().split('T')[0];
    var empKey = wsKey + '|' + e.employee_name;
    if (!empWeekMap[empKey]) empWeekMap[empKey] = 0;
    empWeekMap[empKey] += e.duration_minutes || durMins(e);
  });

  // Now sum per week, tracking OT (hours > 40h per employee per week)
  Object.entries(empWeekMap).forEach(function(kv) {
    var parts = kv[0].split('|');
    var wsKey = parts[0];
    var mins = kv[1];
    if (!weekMap[wsKey]) weekMap[wsKey] = { totalMins: 0, otMins: 0, regMins: 0, empCount: 0 };
    var hrs = mins / 60;
    var otHrs = Math.max(0, hrs - 40);
    var regHrs = hrs - otHrs;
    weekMap[wsKey].totalMins += mins;
    weekMap[wsKey].otMins += otHrs * 60;
    weekMap[wsKey].regMins += regHrs * 60;
    weekMap[wsKey].empCount++;
  });

  var weeks = Object.entries(weekMap).sort(function(a,b){ return a[0].localeCompare(b[0]); });

  var h = '<div class="card" style="margin-bottom:12px;">';
  h += '<div class="card-hdr"><div class="card-title">📈 Overtime Trend</div></div>';
  h += '<div style="padding:16px;">';

  if (!weeks.length) {
    h += '<div style="color:var(--muted);text-align:center;padding:20px;font-size:12px;">No data in this window.</div>';
    h += '</div></div>';
    return h;
  }

  // Totals
  var totalOTMins = weeks.reduce(function(s,w){return s + w[1].otMins;}, 0);
  var totalRegMins = weeks.reduce(function(s,w){return s + w[1].regMins;}, 0);
  var otPct = (totalOTMins + totalRegMins) > 0 ? totalOTMins / (totalOTMins + totalRegMins) * 100 : 0;
  var otCost = laborBurdenCost(totalOTMins) * 1.5;  // OT is typically 1.5x labor rate
  var otCostVsReg = laborBurdenCost(totalOTMins);   // if paid at reg rate, for comparison

  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;">';
  h += '<div style="background:rgba(13,45,94,.04);border-radius:8px;padding:10px 12px;"><div style="font-size:20px;font-weight:700;color:var(--navy);">'+fmtDur(totalOTMins)+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:2px;">Total OT Hours</div></div>';
  h += '<div style="background:rgba(198,40,40,.06);border-radius:8px;padding:10px 12px;border:1px solid rgba(198,40,40,.2);"><div style="font-size:20px;font-weight:700;color:#c62828;">'+otPct.toFixed(1)+'%</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:2px;">OT as % of Total</div></div>';
  h += '<div style="background:rgba(232,93,4,.06);border-radius:8px;padding:10px 12px;border:1px solid rgba(232,93,4,.2);"><div style="font-size:20px;font-weight:700;color:var(--orange);">'+fmtMoney(otCost)+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:2px;">OT Cost (@ 1.5x)</div></div>';
  h += '</div>';

  // Weekly bars
  var maxOT = Math.max.apply(null, weeks.map(function(w){ return w[1].otMins; }).concat([1]));
  h += '<div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;">Weekly Breakdown</div>';
  weeks.forEach(function(kv) {
    var ws = kv[0], d = kv[1];
    var wsDate = new Date(ws+'T12:00:00');
    var label = wsDate.toLocaleDateString('en-US',{month:'numeric',day:'numeric'});
    var otHrs = d.otMins / 60;
    var regHrs = d.regMins / 60;
    var pct = maxOT > 0 ? (d.otMins / maxOT * 100) : 0;
    h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:5px;">';
    h += '<div style="min-width:70px;font-size:11px;color:var(--muted);">Wk of '+label+'</div>';
    h += '<div style="flex:1;height:14px;background:var(--border);border-radius:7px;overflow:hidden;position:relative;">';
    if (otHrs > 0) h += '<div style="height:100%;background:#c62828;width:'+pct+'%;border-radius:7px;"></div>';
    h += '</div>';
    h += '<div style="min-width:120px;text-align:right;font-size:11px;font-family:DM Mono,monospace;">'+regHrs.toFixed(1)+'h reg + <strong style="color:'+(otHrs>0?'#c62828':'var(--muted)')+';">'+otHrs.toFixed(1)+'h OT</strong></div>';
    h += '</div>';
  });

  h += '</div></div>';
  return h;
}

// ─── Absence Summary ───────────────────────────────────────────────────
function _rptAbsenceSummary() {
  var h = '<div class="card" style="margin-bottom:12px;">';
  h += '<div class="card-hdr"><div class="card-title">🏖 Absence Summary</div></div>';
  h += '<div style="padding:16px;">';

  var absences = ST.absences || [];

  // Apply date filter
  var since = ST.filterDate || new Date(Date.now() - 60*86400000).toISOString().split('T')[0];
  var until = ST.filterDateEnd || new Date().toISOString().split('T')[0];
  var filtered = absences.filter(function(a) {
    return a.date >= since && a.date <= until;
  });

  if (!filtered.length) {
    h += '<div style="color:var(--muted);text-align:center;padding:20px;font-size:12px;">No absences logged in this window.</div>';
    h += '</div></div>';
    return h;
  }

  // By reason
  var byReason = {};
  filtered.forEach(function(a) {
    var r = a.reason || 'Unknown';
    if (!byReason[r]) byReason[r] = 0;
    byReason[r]++;
  });

  // By employee
  var byEmp = {};
  filtered.forEach(function(a) {
    var n = a.employee_name || 'Unknown';
    if (!byEmp[n]) byEmp[n] = { total: 0, reasons: {} };
    byEmp[n].total++;
    var r = a.reason || 'Unknown';
    byEmp[n].reasons[r] = (byEmp[n].reasons[r]||0) + 1;
  });

  // By reason chart
  var reasonColors = {'PTO':'#2e7d32','Sick':'#e65100','Personal Day':'#1565c0','Bereavement':'#546e7a','Jury Duty':'#6a1b9a','Training':'#00838f','Injured':'#c62828','No Call No Show':'#c62828','Missed On-Call':'#e65100'};

  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">';

  // Left: by reason
  h += '<div>';
  h += '<div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;">By Reason</div>';
  var maxReason = Math.max.apply(null, Object.values(byReason).concat([1]));
  Object.entries(byReason).sort(function(a,b){return b[1]-a[1];}).forEach(function(kv) {
    var pct = Math.round(kv[1]/maxReason*100);
    var color = reasonColors[kv[0]] || '#6b7a96';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;">';
    h += '<div style="min-width:110px;font-size:12px;color:var(--navy);">'+kv[0]+'</div>';
    h += '<div style="flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden;"><div style="height:100%;background:'+color+';width:'+pct+'%;border-radius:5px;"></div></div>';
    h += '<div style="min-width:30px;text-align:right;font-size:12px;font-weight:700;">'+kv[1]+'</div>';
    h += '</div>';
  });
  h += '</div>';

  // Right: by employee
  h += '<div>';
  h += '<div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;">By Employee</div>';
  Object.entries(byEmp).sort(function(a,b){return b[1].total - a[1].total;}).forEach(function(kv) {
    var reasonDetail = Object.entries(kv[1].reasons).map(function(r){ return r[1]+'× '+r[0]; }).join(', ');
    h += '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;">';
    h += '<div><strong>'+kv[0]+'</strong><div style="font-size:10px;color:var(--muted);">'+reasonDetail+'</div></div>';
    h += '<div style="font-weight:700;color:var(--navy);">'+kv[1].total+'</div>';
    h += '</div>';
  });
  h += '</div>';

  h += '</div>';
  h += '<div style="margin-top:14px;font-size:11px;color:var(--muted);padding:8px 12px;background:rgba(13,45,94,.04);border-radius:6px;">Total: <strong style="color:var(--navy);">'+filtered.length+' absences</strong> across <strong style="color:var(--navy);">'+Object.keys(byEmp).length+' employees</strong> in this window.</div>';
  h += '</div></div>';
  return h;
}

function _filterJobSearch(q) {
  var dd = document.getElementById('job-search-dropdown');
  if (!dd) return;
  if (!q || q.length < 2 || !_albiJobs) { dd.style.display = 'none'; return; }
  var matches = _albiJobs.filter(function(j){ return j.name.toLowerCase().indexOf(q.toLowerCase()) !== -1; }).slice(0, 15);
  if (!matches.length) {
    dd.innerHTML = '<div style="padding:12px;color:var(--muted);font-size:12px;">No matching jobs found.</div>';
    dd.style.display = 'block';
    return;
  }
  var html = '';
  matches.forEach(function(j) {
    html += '<div onclick="_pickJobSearch(\''+j.id+'\',\''+j.name.replace(/\'/g,"\\'")+'\')" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px;" onmouseover="this.style.background=\'rgba(13,45,94,.06)\'" onmouseout="this.style.background=\'transparent\'">';
    html += '<div style="font-weight:600;color:var(--navy);">'+j.name+'</div>';
    html += '<div style="font-size:11px;color:var(--muted);">'+(j.market||'')+(j.projectType?' • '+j.projectType:'')+(j.customerName?' • '+j.customerName:'')+'</div>';
    html += '</div>';
  });
  dd.innerHTML = html;
  dd.style.display = 'block';
}

function _pickJobSearch(id, name) {

  renderReports();
}

function _clearJobSearch() {

}

function _renderJobSearchResults() {
  var fmt = function(iso){ if(!iso)return ''; var d=new Date(iso),h=d.getHours()%12||12,m=d.getMinutes(),ap=d.getHours()>=12?'PM':'AM'; return h+':'+(m<10?'0':'')+m+' '+ap; };
  var fmtDate = function(iso){ var d=new Date(iso); return d.toLocaleDateString('en-US',{weekday:'short',month:'numeric',day:'numeric',year:'2-digit'}); };
  var fmtDur = function(mins){ return Math.floor(mins/60)+'h '+(mins%60)+'m'; };
  var durMins = function(e){ var out=e.clock_out?new Date(e.clock_out):new Date(); return Math.floor((out-new Date(e.clock_in))/60000); };

  // Match by job_id OR job_name (defensive — older entries may have name without id)
  var jobIdStr = String(ST.jobSearchId||'');
  var jobNameStr = (ST.jobSearchName||'').toLowerCase();
  var matched = ST.entries.filter(function(e) {
    if (!e.clock_in) return false;
    if (e.job_id && String(e.job_id) === jobIdStr) return true;
    if (e.job_name && e.job_name.toLowerCase() === jobNameStr) return true;
    return false;
  }).sort(function(a,b){ return new Date(b.clock_in) - new Date(a.clock_in); });

  if (!matched.length) {
    return '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px;background:rgba(198,40,40,.04);border-radius:8px;">No clock-in entries found for this job.<br><span style="font-size:11px;">This either hasn\'t been worked yet, or technicians didn\'t tag their time entries with this job.</span></div>';
  }

  // Summary stats
  var totalMins = matched.reduce(function(s,e){ return s + (e.duration_minutes || durMins(e)); }, 0);
  var byTech = {};
  var dateSet = new Set();
  matched.forEach(function(e) {
    if (!byTech[e.employee_name]) byTech[e.employee_name] = { mins: 0, count: 0 };
    var m = e.duration_minutes || durMins(e);
    byTech[e.employee_name].mins += m;
    byTech[e.employee_name].count++;
    dateSet.add(e.clock_in.split('T')[0]);
  });
  var techCount = Object.keys(byTech).length;
  var uniqueDays = dateSet.size;

  // Stat strip
  var burdenCost = laborBurdenCost(totalMins);
  var h = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px;">';
  h += '<div style="background:rgba(13,45,94,.04);border-radius:8px;padding:10px 12px;"><div style="font-size:22px;font-weight:700;color:var(--navy);line-height:1;">'+fmtDur(totalMins)+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:4px;">Total Hours</div></div>';
  h += '<div style="background:rgba(232,93,4,.06);border-radius:8px;padding:10px 12px;border:1px solid rgba(232,93,4,.2);"><div style="font-size:22px;font-weight:700;color:var(--orange);line-height:1;">'+fmtMoney(burdenCost)+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:4px;">Labor Cost (@ $'+getLaborBurdenRate()+'/hr)</div></div>';
  h += '<div style="background:rgba(13,45,94,.04);border-radius:8px;padding:10px 12px;"><div style="font-size:22px;font-weight:700;color:var(--navy);line-height:1;">'+matched.length+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:4px;">Clock-ins</div></div>';
  h += '<div style="background:rgba(13,45,94,.04);border-radius:8px;padding:10px 12px;"><div style="font-size:22px;font-weight:700;color:var(--navy);line-height:1;">'+techCount+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:4px;">Technicians</div></div>';
  h += '<div style="background:rgba(13,45,94,.04);border-radius:8px;padding:10px 12px;"><div style="font-size:22px;font-weight:700;color:var(--navy);line-height:1;">'+uniqueDays+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;margin-top:4px;">Unique Days</div></div>';
  h += '</div>';

  // Breakdown by tech
  h += '<div style="background:var(--surface);border-radius:8px;padding:12px 14px;margin-bottom:14px;">';
  h += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">Hours by Technician</div>';
  Object.entries(byTech).sort(function(a,b){return b[1].mins - a[1].mins;}).forEach(function(kv) {
    var pct = totalMins > 0 ? Math.round(kv[1].mins / totalMins * 100) : 0;
    var techBurden = laborBurdenCost(kv[1].mins);
    h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">';
    h += '<div style="min-width:110px;font-size:12px;font-weight:700;color:var(--navy);">'+kv[0]+'</div>';
    h += '<div style="flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;"><div style="height:100%;background:var(--orange);width:'+pct+'%;border-radius:4px;"></div></div>';
    h += '<div style="min-width:85px;text-align:right;font-size:12px;font-weight:600;font-family:DM Mono,monospace;">'+fmtDur(kv[1].mins)+'</div>';
    h += '<div style="min-width:75px;text-align:right;font-size:12px;font-weight:700;font-family:DM Mono,monospace;color:var(--orange);">'+fmtMoney(techBurden)+'</div>';
    h += '<div style="min-width:40px;text-align:right;font-size:11px;color:var(--muted);">('+kv[1].count+' clk)</div>';
    h += '</div>';
  });
  h += '</div>';

  // Detail table — every clock-in
  h += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;">';
  h += '<div style="padding:10px 14px;background:var(--navy);color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;">Every Clock-In on This Job</div>';
  h += '<table class="tc-table" style="margin:0;">';
  h += '<thead><tr><th>Date</th><th>Tech</th><th>Clock In</th><th>Clock Out</th><th>Duration</th><th>Notes</th></tr></thead><tbody>';
  matched.forEach(function(e) {
    var m = e.duration_minutes || durMins(e);
    h += '<tr>';
    h += '<td style="font-size:12px;white-space:nowrap;">'+fmtDate(e.clock_in)+'</td>';
    h += '<td><strong style="color:var(--navy);">'+e.employee_name+'</strong></td>';
    h += '<td class="mono">'+fmt(e.clock_in)+'</td>';
    h += '<td class="mono">'+(e.clock_out ? fmt(e.clock_out) : '<span style="color:var(--warn);">in progress</span>')+'</td>';
    h += '<td><strong>'+fmtDur(m)+'</strong></td>';
    h += '<td style="font-size:11px;color:var(--muted);max-width:200px;">'+(e.notes||'-')+'</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';

  return h;
}

async function _submitQuickInvite() {
  var name = (document.getElementById('qi-name')||{}).value.trim();
  var email = (document.getElementById('qi-email')||{}).value.trim().toLowerCase();
  var personalEmail = ((document.getElementById('qi-personal-email')||{}).value || '').trim().toLowerCase();
  var phone = (document.getElementById('qi-phone')||{}).value.trim();
  var role = (document.getElementById('qi-role')||{}).value;
  var market = (document.getElementById('qi-market')||{}).value;
  var payType = (document.getElementById('qi-paytype')||{}).value;
  var rate = parseFloat((document.getElementById('qi-rate')||{}).value) || 0;

  if (!name) { alert('Name is required'); return; }
  if (!email) { alert('Work email is required — this is their primary sign-in'); return; }
  if (personalEmail && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(personalEmail)) {
    alert('Personal email doesn\'t look right. Example: their.name@gmail.com');
    return;
  }

  // Dupe check
  var existing = (ST.employees||[]).find(function(e){ return (e.email||'').toLowerCase() === email; });
  if (!existing) {
    try {
      var liveCheck = await sb('/rest/v1/employees?email=eq.' + encodeURIComponent(email) + '&select=id,name,active&limit=1');
      if (liveCheck && liveCheck.length) existing = liveCheck[0];
    } catch(e) { /* non-fatal */ }
  }
  if (existing) {
    if (!confirm('An employee with this email already exists: '+existing.name+'\n\nActivate them with skip-docs instead of creating new?')) return;
    // Update existing record to active + skipped
    var now = new Date().toISOString();
    try {
      // Try full payload first (with audit columns if they exist)
      var fullBody = {
        name: name, phone: phone || null, role: role, market: market,
        pay_type: payType, hourly_rate: rate || existing.hourly_rate,
        personal_email: personalEmail || null,
        active: true, invite_pending: false,
        onboarding_signed_at: existing.onboarding_signed_at || now,
        onboarding_skipped: true,
        onboarding_skipped_by: getApprovedBy(),
        onboarding_skipped_at: now
      };
      var r = await fetch(SB_URL + '/rest/v1/employees?id=eq.'+existing.id, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify(fullBody)
      });
      if (!r.ok) {
        // Fallback — strip audit columns if they don't exist
        await fetch(SB_URL + '/rest/v1/employees?id=eq.'+existing.id, {
          method: 'PATCH',
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: name, phone: phone || null, role: role, market: market,
            pay_type: payType, hourly_rate: rate || existing.hourly_rate,
            personal_email: personalEmail || null,
            active: true, invite_pending: false,
            onboarding_signed_at: existing.onboarding_signed_at || now
          })
        });
      }
      logActivity('Quick Invite (Existing)', name + ' · ' + role + ' · ' + market + ' · docs bypassed', 'employees', name);
      alert('✅ ' + name + ' is active and can sign in with ' + email + (personalEmail ? ' or ' + personalEmail : ''));
      closeModal();
      await loadAll();
    } catch(e) { alert('Failed: ' + e.message); }
    return;
  }

  // Create new
  var nowIso = new Date().toISOString();
  try {
    // Try full payload first
    var fullNewBody = {
      name: name, email: email, personal_email: personalEmail || null,
      phone: phone || null, role: role, market: market,
      pay_type: payType, hourly_rate: rate,
      active: true, invite_pending: false,
      onboarding_signed_at: nowIso,
      onboarding_skipped: true,
      onboarding_skipped_by: getApprovedBy(),
      onboarding_skipped_at: nowIso
    };
    var createR = await fetch(SB_URL + '/rest/v1/employees', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify(fullNewBody)
    });
    // Fallback if audit columns missing
    if (!createR.ok) {
      createR = await fetch(SB_URL + '/rest/v1/employees', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
        body: JSON.stringify({
          name: name, email: email, personal_email: personalEmail || null,
          phone: phone || null, role: role, market: market,
          pay_type: payType, hourly_rate: rate,
          active: true, invite_pending: false,
          onboarding_signed_at: nowIso
        })
      });
    }
    if (!createR.ok) {
      var errText = await createR.text().catch(function(){ return ''; });
      throw new Error('HTTP ' + createR.status + (errText ? ' · ' + errText.substring(0,200) : ''));
    }
    logActivity('Quick Invite (New)', name + ' · ' + role + ' · ' + market + ' · docs bypassed', 'employees', name);
    alert('✅ ' + name + ' is active and can sign in with ' + email + (personalEmail ? ' or ' + personalEmail : '') + '\n\nThey bypass all onboarding. Handle docs on paper separately.');
    closeModal();
    await loadAll();
  } catch(e) {
    alert('Failed: ' + e.message);
  }
}

async function _submitInvite() {
  var name = (document.getElementById('inv-name')||{}).value.trim();
  var email = (document.getElementById('inv-email')||{}).value.trim().toLowerCase();
  var phone = (document.getElementById('inv-phone')||{}).value.trim();
  var role = (document.getElementById('inv-role')||{}).value;
  var market = (document.getElementById('inv-market')||{}).value;
  var payType = (document.getElementById('inv-paytype')||{}).value;
  var channelEl = document.querySelector('input[name="inv-channel"]:checked');
  var channel = channelEl ? channelEl.value : 'link';

  if (!name) { alert('Name is required'); return; }
  if (!email) { alert('Email is required'); return; }
  if (channel === 'sms' && !phone) { alert('Phone is required for SMS invite'); return; }
  if (channel === 'both' && !phone) { alert('Phone is required for SMS + email'); return; }

  // Check for dupes — local cache first
  var existingEmp = (ST.employees||[]).find(function(e) {
    return (e.email||'').toLowerCase() === email || (e.name||'').toLowerCase() === name.toLowerCase();
  });

  // Live check against Supabase (catches inactive employees or stale cache)
  if (!existingEmp) {
    try {
      var liveCheck = await sb('/rest/v1/employees?email=eq.' + encodeURIComponent(email) + '&select=id,name,active&limit=1');
      if (liveCheck && liveCheck.length) {
        existingEmp = liveCheck[0];
      }
    } catch(e) { /* non-fatal — continue */ }
  }

  if (existingEmp) {
    var activeMsg = (existingEmp.active === false) ? ' (currently INACTIVE)' : '';
    if (!confirm('An employee with this email or name already exists: '+existingEmp.name+activeMsg+'\n\nSend them a new invite anyway? This will re-link their existing record.')) return;
  }

  // Generate secure token
  var token = _generateInviteToken();

  try {
    // 1. Create employee record (if new)
    var empId;
    if (existingEmp) {
      empId = existingEmp.id;
      // Update their info to match
      await fetch(SB_URL + '/rest/v1/employees?id=eq.' + empId, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, email: email, phone: phone || null, role: role, market: market, pay_type: payType })
      });
    } else {
      var createR = await fetch(SB_URL + '/rest/v1/employees', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
        body: JSON.stringify({
          name: name,
          email: email,
          phone: phone || null,
          role: role,
          market: market,
          pay_type: payType,
          active: true,
          invite_pending: true
        })
      });
      if (!createR.ok) {
        var errText = await createR.text().catch(function(){ return ''; });
        // Parse Supabase error for clearer message
        var errMsg = 'Failed to create employee record (HTTP '+createR.status+')';
        if (createR.status === 409) {
          errMsg = 'An employee with this email already exists.\n\nThe email "'+email+'" is in use, but wasn\'t detected in the duplicate check (possibly because it\'s inactive, or has a case mismatch).\n\nTo fix: Check Employees tab for this email — if the record is there, edit it instead of creating new.';
        } else if (errText) {
          errMsg += '\n\nDetails: ' + errText.substring(0, 300);
        }
        throw new Error(errMsg);
      }
      var created = await createR.json();
      empId = created[0].id;
    }

    // 2. Create invite record
    var expiresAt = new Date(Date.now() + 7*24*60*60*1000).toISOString();  // 7 days
    var inviteR = await fetch(SB_URL + '/rest/v1/employee_invites', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        token: token,
        employee_id: empId,
        employee_name: name,
        sent_to_phone: phone || null,
        sent_to_email: email,
        channel: channel,
        status: 'pending',
        sent_at: new Date().toISOString(),
        expires_at: expiresAt,
        sent_by: getApprovedBy()
      })
    });
    if (!inviteR.ok) {
      var inviteErrText = await inviteR.text().catch(function(){ return ''; });
      var inviteErrMsg = 'Failed to create invite record (HTTP '+inviteR.status+')';
      if (inviteR.status === 404 || (inviteErrText && inviteErrText.indexOf('does not exist') !== -1) || (inviteErrText && inviteErrText.indexOf('relation') !== -1)) {
        inviteErrMsg = 'The employee_invites table doesn\'t exist in Supabase yet.\n\nRun this SQL in your Supabase SQL editor:\n\nCREATE TABLE IF NOT EXISTS employee_invites (\n  id uuid PRIMARY KEY DEFAULT gen_random_uuid(),\n  token text UNIQUE NOT NULL,\n  employee_id uuid,\n  employee_name text,\n  sent_to_phone text,\n  sent_to_email text,\n  channel text NOT NULL,\n  status text NOT NULL DEFAULT \'pending\',\n  sent_at timestamptz DEFAULT now(),\n  accepted_at timestamptz,\n  expires_at timestamptz,\n  sent_by text,\n  acknowledgments jsonb\n);';
      } else if (inviteErrText) {
        inviteErrMsg += '\n\nDetails: ' + inviteErrText.substring(0, 300);
      }
      throw new Error(inviteErrMsg);
    }

    // 3. Build the invite URL
    var inviteUrl = window.location.origin + window.location.pathname.replace(/[^\/]+$/, '') + 'onboarding.html?invite=' + token;

    // 4. Fire SMS / email via Zapier
    var messages = [];
    var smsBody = 'Hi '+name.split(' ')[0]+'! Welcome to JG Restoration. Complete your onboarding here (link expires in 7 days): '+inviteUrl+' — Questions? Text us at (920) 428-4200.';
    var emailSubject = 'Welcome to JG Restoration — Finish Your Onboarding';
    var emailBody = 'Hi '+name.split(' ')[0]+',\n\nWelcome to JG Restoration! We\'ve set up your account.\n\nTo finish your onboarding, click this link (expires in 7 days):\n'+inviteUrl+'\n\nYou\'ll confirm your info, review a few policies, and get access to the apps you need on the job. Takes about 5 minutes.\n\nQuestions? Reply to this email or call (920) 428-4200.\n\n— JG Restoration';

    if (channel === 'sms' || channel === 'both') {
      try {
        // Normalize phone to E.164 format (+1XXXXXXXXXX) so Twilio accepts it
        var normalizedPhone = _normalizePhoneE164(phone);
        if (!normalizedPhone) {
          console.warn('Invalid phone format — skipping SMS:', phone);
        } else {
          // Use URL-encoded form data (not JSON) to bypass CORS preflight
          var smsParams = new URLSearchParams({
            type: 'invite_sms',
            to: normalizedPhone,
            body: smsBody,
            employee_name: name
          });
          await fetch(HOOKS.onboarding, {
            method: 'POST',
            body: smsParams.toString(),
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
          });
        }
      } catch(e) { console.warn('SMS send failed:', e); }
    }
    if (channel === 'email' || channel === 'both') {
      try {
        var emailParams = new URLSearchParams({
          type: 'invite_email',
          to: email,
          subject: emailSubject,
          body: emailBody,
          employee_name: name
        });
        await fetch(HOOKS.onboarding, {
          method: 'POST',
          body: emailParams.toString(),
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });
      } catch(e) { console.warn('Email send failed:', e); }
    }

    // 5. Log activity
    logActivity('Employee Invited', name + ' • ' + role + ' • ' + market + ' • via ' + channel, 'employees', name);

    closeModal();

    // 6. Show the link in a confirmation modal (so you can copy it)
    _showInviteConfirmation(name, inviteUrl, channel);

    // Refresh employee list
    await loadAll();
  } catch(err) {
    alert('Invite failed: ' + err.message);
    console.error(err);
  }
}

function _copyInviteLink(btn) {
  var url = btn.getAttribute('data-url');
  if (!url) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function(){
      btn.textContent = '✓ Copied!';
      setTimeout(function(){ btn.innerHTML = '📋 Copy Link'; }, 2000);
    });
  } else {
    // Fallback: select the displayed URL
    var tmp = document.createElement('input');
    tmp.value = url;
    document.body.appendChild(tmp);
    tmp.select();
    document.execCommand('copy');
    tmp.remove();
    btn.textContent = '✓ Copied!';
    setTimeout(function(){ btn.innerHTML = '📋 Copy Link'; }, 2000);
  }
}

// Normalize any US phone number into E.164 format (+1XXXXXXXXXX) for Twilio.
// Accepts any input: "(920) 215-1767", "920-215-1767", "920.215.1767",
// "9202151767", "19202151767", "+19202151767", etc. Returns null if invalid.
function _normalizePhoneE164(raw) {
  if (!raw) return null;
  // Strip everything except digits
  var digits = String(raw).replace(/\D/g, '');
  if (!digits) return null;
  // 10 digits → assume US, prepend 1
  if (digits.length === 10) return '+1' + digits;
  // 11 digits starting with 1 → US with country code
  if (digits.length === 11 && digits.charAt(0) === '1') return '+' + digits;
  // Anything else is ambiguous — refuse rather than send garbage to Twilio
  return null;
}

function _generateInviteToken() {
  // Generate a URL-safe random token (crypto-strong if available)
  var arr = new Uint8Array(24);
  if (window.crypto && window.crypto.getRandomValues) {
    window.crypto.getRandomValues(arr);
  } else {
    for (var i=0; i<24; i++) arr[i] = Math.floor(Math.random()*256);
  }
  var token = '';
  for (var j=0; j<arr.length; j++) {
    token += ('0' + arr[j].toString(16)).slice(-2);
  }
  return token;
}

// ── INVITE ACTIONS MENU ───────────────────────────────────────────────────
// Surfaced from the employee detail modal. Four actions covering different
// real-world recovery scenarios: lost email, expired link, wrong phone, etc.
// ── SIGN-IN DIAGNOSTIC ───────────────────────────────────────────────────
// Real-world problem: employee says "I can't sign in." Admin has no way to know
// what email they're trying with. This tool lets you paste what they tried,
// compares it to what's on file, and offers to fix the mismatch in place.
// ── SEND SIGN-IN LINK ─────────────────────────────────────────────────────
// For onboarded employees: sends them the timeclock URL via SMS + email
// so they know where to go. Useful for employees who lost the link, got a new
// phone, or never saved it after completing onboarding.
async function sendSignInLink(empId) {
  if (!isAdmin()) { toast('Admin only'); return; }
  var emp = (ST.employees||[]).find(function(e){ return e.id === empId; });
  if (!emp) { alert('Employee not found'); return; }

  // Figure out which email + phone are on file
  var email = emp.email || emp.personal_email || '';
  var phone = emp.phone || '';

  if (!email && !phone) {
    alert('No email OR phone on file for ' + emp.name + '.\n\nAdd one in Edit first.');
    return;
  }

  // Preview what they'll get
  var timeclockUrl = 'https://jgimprovements-arch.github.io/jg-dispatch/timeclock.html';
  var channels = [];
  if (phone) channels.push('SMS to ' + phone);
  if (email) channels.push('email to ' + email);

  if (!confirm(
    'Send sign-in link to ' + emp.name + '?\n\n' +
    'Will send via:\n  • ' + channels.join('\n  • ') + '\n\n' +
    'Message: ' + timeclockUrl
  )) return;

  try {
    var sent = [];
    var failed = [];

    // SMS
    if (phone) {
      try {
        var normalizedPhone = _normalizePhoneE164(phone);
        if (!normalizedPhone) {
          failed.push('SMS (invalid phone format)');
        } else {
          var smsParams = new URLSearchParams({
            type: 'invite_sms',
            to: normalizedPhone,
            body: 'JG Restoration Time Clock: ' + timeclockUrl,
            employee_name: emp.name
          });
          var smsR = await fetch(HOOKS.onboarding, {
            method: 'POST',
            body: smsParams.toString(),
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
          });
          if (smsR.ok) sent.push('SMS'); else failed.push('SMS (HTTP ' + smsR.status + ')');
        }
      } catch(e) { failed.push('SMS (' + e.message + ')'); }
    }

    // Email
    if (email) {
      try {
        var emailParams = new URLSearchParams({
          type: 'invite_email',
          to: email,
          subject: 'JG Restoration — Time Clock Sign-In Link',
          body: 'Hi ' + emp.name.split(' ')[0] + ',\n\nHere is your JG Restoration time clock sign-in link:\n\n' + timeclockUrl + '\n\nSign in with the email address we have on file. Questions? Call the office at (920) 428-4200.\n\n— JG Restoration',
          employee_name: emp.name
        });
        var emailR = await fetch(HOOKS.onboarding, {
          method: 'POST',
          body: emailParams.toString(),
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });
        if (emailR.ok) sent.push('email'); else failed.push('email (HTTP ' + emailR.status + ')');
      } catch(e) { failed.push('email (' + e.message + ')'); }
    }

    logActivity('Sign-In Link Sent', emp.name + ' · sent to ' + (sent.join(' + ') || 'nothing'), 'employees', emp.name);

    var msg;
    if (sent.length && !failed.length) {
      msg = '✅ Sent via ' + sent.join(' and ') + '.\n\n' + emp.name + ' should receive the link shortly.';
    } else if (sent.length && failed.length) {
      msg = '⚠ Partially sent.\n\nDelivered: ' + sent.join(', ') + '\nFailed: ' + failed.join(', ');
    } else {
      msg = '❌ Both delivery attempts failed:\n\n' + failed.join('\n');
    }
    alert(msg);
  } catch(e) {
    alert('Failed: ' + e.message);
  }
}

// Live comparison as admin types what the employee tried
function _diagCheck(empId) {
  var emp = (ST.employees||[]).find(function(e){ return e.id === empId; });
  if (!emp) return;
  var tried = ((document.getElementById('diag-email')||{}).value || '').trim().toLowerCase();
  var resultEl = document.getElementById('diag-result');
  if (!resultEl) return;

  if (!tried) { resultEl.innerHTML = ''; return; }

  var workEmail = (emp.email || '').toLowerCase();
  var personalEmail = (emp.personal_email || '').toLowerCase();

  // Does it match either?
  if (tried === workEmail || tried === personalEmail) {
    // Perfect match — they should be able to sign in. Check other reasons.
    var reasons = [];
    if (emp.active === false) reasons.push('Account is marked <strong style="color:var(--red);">inactive</strong> — reactivate in Edit');
    if (emp.invite_pending && !emp.onboarding_signed_at) reasons.push('Their invite is still <strong style="color:var(--orange);">pending</strong> — they may need to complete onboarding first, or admin can use ⚡ Skip Onboarding under Invite Actions');

    if (reasons.length) {
      resultEl.innerHTML = '<div style="background:rgba(230,81,0,.06);border:1.5px solid rgba(230,81,0,.3);border-radius:8px;padding:14px;">' +
        '<div style="font-weight:700;color:var(--orange);margin-bottom:6px;">⚠ Email matches, but sign-in is blocked</div>' +
        '<ul style="margin:6px 0 0 18px;padding:0;font-size:12px;line-height:1.7;">' + reasons.map(function(r){return '<li>'+r+'</li>';}).join('') + '</ul>' +
      '</div>';
    } else {
      resultEl.innerHTML = '<div style="background:rgba(46,125,50,.06);border:1.5px solid rgba(46,125,50,.3);border-radius:8px;padding:14px;">' +
        '<div style="font-weight:700;color:var(--green);margin-bottom:6px;">✓ Email matches — this should work</div>' +
        '<div style="font-size:12px;color:var(--muted);line-height:1.6;">The email they tried is on file and the account is active. Issue is likely browser cache. Ask them to:<br>1. Close the PWA completely (swipe out of recents)<br>2. Reopen the app<br>3. Try again<br>If still failing, have them try a different browser (Chrome → Safari or vice versa).</div>' +
      '</div>';
    }
    return;
  }

  // No match — find closest suggestion
  var candidates = [workEmail, personalEmail].filter(function(e){ return e; });
  var suggestion = null;
  candidates.forEach(function(c){
    // Simple check — same local part OR same domain, likely typo
    var triedParts = tried.split('@');
    var cParts = c.split('@');
    if (triedParts[0] === cParts[0] || triedParts[1] === cParts[1]) {
      if (!suggestion) suggestion = c;
    }
  });

  var h = '<div style="background:rgba(192,32,32,.06);border:1.5px solid rgba(192,32,32,.3);border-radius:8px;padding:14px;">';
  h += '<div style="font-weight:700;color:var(--red);margin-bottom:6px;">✗ Email mismatch — "not authorized" error</div>';
  h += '<div style="font-size:12px;line-height:1.6;color:var(--text);margin-bottom:10px;">';
  h += '<strong>They tried:</strong> <code style="background:#fff;padding:1px 6px;border-radius:4px;border:1px solid var(--border);">'+_escHtml(tried)+'</code><br>';
  h += '<strong>On file:</strong> '+(workEmail ? '<code style="background:#fff;padding:1px 6px;border-radius:4px;border:1px solid var(--border);">'+_escHtml(workEmail)+'</code> (primary)' : '(no primary email)');
  if (personalEmail) h += ' + <code style="background:#fff;padding:1px 6px;border-radius:4px;border:1px solid var(--border);">'+_escHtml(personalEmail)+'</code> (backup)';
  h += '</div>';

  if (suggestion) {
    h += '<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Looks like a typo or similar address. Possible match: <strong>'+_escHtml(suggestion)+'</strong></div>';
  }

  // One smart button — figures out where to put the email
  h += '<div style="margin-top:10px;">';
  h += '<button class="btn" onclick="_diagAddSignInEmail(\''+empId+'\',\''+_escAttr(tried)+'\')" style="background:var(--orange);color:#fff;border-color:var(--orange);width:100%;padding:12px 14px;text-align:left;">✚ Add this as their sign-in email → <strong>'+_escHtml(tried)+'</strong></button>';
  h += '<div style="font-size:10px;color:var(--muted);margin-top:6px;text-align:center;">The system will place this in whichever email field is empty, or ask you if both are filled.</div>';
  h += '</div>';
  h += '</div>';

  resultEl.innerHTML = h;
}

// Simple HTML escapers for the diagnostic
function _escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function _escAttr(s) { return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'\\\''); }

// Smart fix — figures out where to put the email based on what's on file.
// Empty primary → fills it. Has primary but empty backup → fills backup. Both filled → asks admin.
async function _diagAddSignInEmail(empId, triedEmail) {
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(triedEmail)) {
    alert('That doesn\'t look like a valid email. Please correct it first.');
    return;
  }
  var emp = ST.employees.find(function(e){ return e.id === empId; });
  if (!emp) return;

  var primary = (emp.email || '').toLowerCase();
  var backup  = (emp.personal_email || '').toLowerCase();

  var patch = {};
  var actionLabel = '';

  if (!primary) {
    // No primary — fill it
    patch = { email: triedEmail };
    actionLabel = 'sign-in email';
  } else if (!backup) {
    // Primary exists, backup empty — add as backup
    patch = { personal_email: triedEmail };
    actionLabel = 'backup sign-in email';
  } else {
    // Both filled — admin must choose which to overwrite
    var which = prompt(
      'Both sign-in email slots are already filled:\n\n' +
      '  Primary: ' + primary + '\n' +
      '  Backup:  ' + backup + '\n\n' +
      'To add "' + triedEmail + '", which should be replaced?\n\n' +
      'Type:\n' +
      '  1 = replace Primary\n' +
      '  2 = replace Backup\n' +
      '  anything else = cancel',
      '2'
    );
    if (which === '1') {
      patch = { email: triedEmail };
      actionLabel = 'sign-in email (replaced ' + primary + ')';
    } else if (which === '2') {
      patch = { personal_email: triedEmail };
      actionLabel = 'backup sign-in email (replaced ' + backup + ')';
    } else {
      return; // cancelled
    }
  }

  if (!confirm('Save ' + triedEmail + ' as ' + emp.name + '\'s ' + actionLabel + '?')) return;

  try {
    var r = await fetch(SB_URL + '/rest/v1/employees?id=eq.'+empId, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify(patch)
    });
    if (!r.ok) {
      var et = await r.text().catch(function(){return '';});
      var msg = 'HTTP '+r.status;
      if (r.status === 409) msg = 'Another employee already has this email on file. Try a different one, or remove the duplicate first.';
      else if (et) msg += ' · ' + et.substring(0,200);
      throw new Error(msg);
    }
    logActivity('Sign-In Email Fixed', emp.name + ' · added ' + triedEmail + ' as ' + actionLabel, 'employees', emp.name);
    alert('✅ Done. ' + emp.name + ' can now sign in with ' + triedEmail + '.\n\nTell them to close and reopen the app, then try signing in again.');
    closeModal();
    await loadAll();
  } catch(e) {
    alert('Failed: ' + e.message);
  }
}
