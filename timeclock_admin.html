};

body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-left:var(--sidebar-w);}

/* ── MAIN LAYOUT ── */

.tc-header-title{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px;}

.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:4px;}

/* ── TABLE ── */
.tc-table{width:100%;border-collapse:collapse;font-size:12px;}
.tc-table th{padding:8px 12px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;border-bottom:1.5px solid var(--border);background:var(--s2);}
.tc-table td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);}

.badge-red{background:var(--danger-bg);color:var(--red);}
.badge-warn{background:var(--warn-bg);color:var(--warn);}
.badge-blue{background:rgba(21,101,192,.1);color:var(--blue);}
.badge-gray{background:rgba(107,122,150,.1);color:var(--muted);}

/* ── LIVE DOT ── */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite;margin-right:6px;}

/* ── FORM ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;display:block;}
.form-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:#fff;}
.form-input:focus{border-color:var(--orange);}
.form-select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:#fff;appearance:none;}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;border:1.5px solid var(--border);background:transparent;color:var(--navy);transition:background .15s,color .15s;}
.btn:hover{background:rgba(13,45,94,.06);color:var(--navy);}
.btn-primary{background:var(--navy) !important;color:#fff !important;border-color:var(--navy);}
.btn-primary:hover{background:#0a2248 !important;color:#fff !important;}
.btn-orange{background:var(--orange) !important;color:#fff !important;border-color:var(--orange);}

.btn-danger{background:var(--danger-bg);color:var(--red);border-color:rgba(192,32,32,.3);}
.btn-danger:hover{background:rgba(192,32,32,.15);color:var(--red);}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-danger{background:var(--danger-bg);color:var(--red);border-color:rgba(192,32,32,.3);}
.btn-sm{padding:4px 10px;font-size:11px;}

/* ── PROGRESS BAR ── */
.prog-bar{height:5px;background:rgba(13,45,94,.08);border-radius:3px;overflow:hidden;margin-top:4px;}

/* ── FILTERS ── */

.filter-bar input:focus,.filter-bar select:focus{border-color:var(--orange);}

.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#0d1f3c;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:300;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

<script>
var SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';

var ST = {
  tab: 'live',
  employees: [],
  entries: [],
  breaks: [],
  filterEmp: 'All',
  filterDate: '',
  filterDateEnd: '',
  editEmp: null,
  payPeriod: JSON.parse(localStorage.getItem('jg_pay_period') || 'null') || { type: 'biweekly', start: '2025-01-06' }
};

function getPayPeriods(type, startStr, count) {
  var periods = [];
  var start = new Date(startStr + 'T00:00:00');
  var today = new Date();
  var days = type === 'weekly' ? 7 : type === 'biweekly' ? 14 : null;
  for (var i = 0; i < count; i++) {
    var s, e;
    if (days) {
      s = new Date(start); s.setDate(start.getDate() + i * days);
      e = new Date(s); e.setDate(s.getDate() + days - 1);
    } else {
      var mo = start.getMonth() + Math.floor(i/2);
      var yr = start.getFullYear() + Math.floor(mo/12); mo = mo % 12;
      if (i % 2 === 0) { s = new Date(yr, mo, 1); e = new Date(yr, mo, 15); }
      else              { s = new Date(yr, mo, 16); e = new Date(yr, mo+1, 0); }
    }
    periods.push({ start: s, end: e, label: fmtD(s) + ' - ' + fmtD(e) });
    if (s > today && periods.length > 3) break;
  }
  return periods.reverse();
}

function fmtD(d) { return (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear(); }

function getCurrentPeriod() {
  var periods = getPayPeriods(ST.payPeriod.type, ST.payPeriod.start, 40);
  var today = new Date(); today.setHours(0,0,0,0);
  return periods.find(function(p){ return today >= p.start && today <= p.end; }) || periods[0];
}

function billableStart(clockInISO, approvedEarly) {
  if (approvedEarly) return clockInISO;
  var dt = new Date(clockInISO);
  var cutoff = new Date(dt); cutoff.setHours(7, 30, 0, 0);
  return dt < cutoff ? cutoff.toISOString() : clockInISO;
}

function billableMins(entry, breaks) {
  var bStart = new Date(billableStart(entry.clock_in, entry.approved_early));
  var bEnd = entry.clock_out ? new Date(entry.clock_out) : new Date();
  var raw = Math.max(0, Math.floor((bEnd - bStart) / 60000));
  var bkMins = (breaks||[]).reduce(function(s,b){ return s+(b.duration_minutes||0); }, 0);
  return Math.max(0, raw - bkMins);
}

function isEarlyClockIn(clockInISO) {
  var dt = new Date(clockInISO);
  return dt.getHours() < 7 || (dt.getHours() === 7 && dt.getMinutes() < 30);
}

// ── AUTH ──────────────────────────────────────────────────────────────────
function jgShowUser(u) {
  document.getElementById('sb-nm').textContent = u.name.split(' ')[0];
  document.getElementById('sb-av').textContent = u.name[0];
  loadAll();
}
function jgSignOut() {
  if (confirm('Sign out?')) { localStorage.removeItem('jg_platform_user'); localStorage.removeItem('jg_platform_exp'); window.location.href='hub.html'; }
}
function jgCheckAuth() {
  var r=localStorage.getItem('jg_platform_user'), e=localStorage.getItem('jg_platform_exp');
  if (r&&e&&Date.now()<parseInt(e)) { jgShowUser(JSON.parse(r)); return true; }
  document.getElementById('jg-login').style.display='flex'; return false;
}

var ADMIN_EMAILS = ['josh@jg-restoration.com','jgimprovements@gmail.com'];

function isAdmin() {
  try {
    var u = JSON.parse(localStorage.getItem('jg_platform_user') || 'null');
    if (!u) return false;
    var email = (u.email || '').toLowerCase();
    if (ADMIN_EMAILS.includes(email)) return true;
    // Also check if employee role is Admin
    var emp = ST.employees.find(function(e){ return e.email === email; });
    return emp && emp.role === 'Admin';
  } catch(e) { return false; }
}

// ── SUPABASE ──────────────────────────────────────────────────────────────
async function sb(path, opts) {
  var r = await fetch(SB_URL+path, Object.assign({
    headers: {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}
  }, opts||{}));
  if (!r.ok) return null;
  return r.json().catch(function(){return null;});
}

// ── LOAD ──────────────────────────────────────────────────────────────────
async function loadAll() {
  var emps = await sb('/rest/v1/employees?order=name.asc&select=*');
  ST.employees = emps || [];

  var since = ST.filterDate || new Date(Date.now()-60*86400000).toISOString().split('T')[0];
  var until = ST.filterDateEnd ? ST.filterDateEnd+'T23:59:59' : new Date().toISOString();
  var entries = await sb('/rest/v1/time_entries?clock_in=gte.'+since+'T00:00:00&clock_in=lte.'+until+'&order=clock_in.desc&limit=500&select=*');
  ST.entries = entries || [];

  var brks = await sb('/rest/v1/time_breaks?select=*');
  ST.breaks = brks || [];

  var abs = await sb('/rest/v1/absence_records?date=gte.'+since+'&order=date.desc&limit=200&select=*');
  ST.absences = abs || [];

  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() { renderTab(ST.tab); }

function showTab(tab, el) {
  ST.tab = tab;
  document.querySelectorAll('.tc-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  renderTab(tab);
}

function renderTab(tab) {
  if (tab === 'live') renderLive();
  else if (tab === 'timesheets') renderTimesheets();
  else if (tab === 'employees') renderEmployees();
  else if (tab === 'reports') renderReports();
}

// ── LIVE TAB ──────────────────────────────────────────────────────────────
function renderLive() {
  var today = new Date().toISOString().split('T')[0];
  var active = ST.entries.filter(function(e){ return !e.clock_out && e.clock_in.startsWith(today); });
  var todayAll = ST.entries.filter(function(e){ return e.clock_in.startsWith(today); });

  var fmt = function(d){ var dt=new Date(d),h=dt.getHours()%12||12,m=dt.getMinutes(),ap=dt.getHours()>=12?'PM':'AM'; return h+':'+(m<10?'0':'')+m+' '+ap; };
  var fmtDur = function(mins){ return Math.floor(mins/60)+'h '+(mins%60)+'m'; };
  var durMins = function(e){ var out=e.clock_out?new Date(e.clock_out):new Date(); return Math.floor((out-new Date(e.clock_in))/60000); };

  var h = '';

  // Stats
  var todayMins = 0;
  todayAll.forEach(function(e){ todayMins += durMins(e); });
  h += '<div class="stat-grid">';
  h += '<div class="stat-card"><div class="stat-val" style="color:var(--green);">'+active.length+'</div><div class="stat-lbl">Clocked In Now</div></div>';
  h += '<div class="stat-card"><div class="stat-val">'+todayAll.length+'</div><div class="stat-lbl">Entries Today</div></div>';
  h += '<div class="stat-card"><div class="stat-val">'+fmtDur(todayMins)+'</div><div class="stat-lbl">Total Hours Today</div></div>';
  h += '<div class="stat-card"><div class="stat-val">'+ST.employees.filter(function(e){return e.active;}).length+'</div><div class="stat-lbl">Active Employees</div></div>';
  h += '</div>';

  // Currently clocked in
  h += '<div class="card"><div class="card-hdr"><div class="card-title"><span class="live-dot"></span>Currently Clocked In</div><span style="font-size:11px;color:var(--muted);">'+active.length+' of '+ST.employees.filter(function(e){return e.active;}).length+' active employees</span></div>';
  if (!active.length) {
    h += '<div class="empty">No one clocked in right now</div>';
  } else {
    h += '<table class="tc-table"><thead><tr><th>Employee</th><th>Job</th><th>Clocked In</th><th>Duration</th><th>GPS</th><th>Status</th></tr></thead><tbody>';
    active.forEach(function(e) {
      var mins = durMins(e);
      var alert = mins > 600;
      var hasBreak = ST.breaks.some(function(b){ return b.entry_id === e.id && !b.break_end; });
      h += '<tr>';
      h += '<td><strong>'+e.employee_name+'</strong><div style="font-size:10px;color:var(--muted);">'+e.employee_email+'</div></td>';
      h += '<td>'+(e.job_name||'<span style="color:var(--muted);">No job</span>')+'</td>';
      h += '<td>'+fmt(e.clock_in)+'</td>';
      h += '<td><strong style="color:'+(alert?'var(--red)':'var(--green)')+';">'+fmtDur(mins)+'</strong></td>';
      h += '<td>'+(e.clock_in_lat?'<span class="badge badge-green">'+e.clock_in_lat.toFixed(3)+','+e.clock_in_lng.toFixed(3)+'</span>':'<span class="badge badge-gray">None</span>')+'</td>';
      h += '<td>'+(hasBreak?'<span class="badge badge-warn">On Break</span>':alert?'<span class="badge badge-red">Long Shift</span>':'<span class="badge badge-green">Active</span>')+'</td>';
      h += '</tr>';
    });
    h += '</tbody></table>';
  }
  h += '</div>';

  // Today's entries
  h += '<div class="card"><div class="card-hdr"><div class="card-title">Today by Employee</div></div>';
  if (!todayAll.length) {
    h += '<div class="empty">No entries today</div>';
  } else {
    var byEmp = {};
    todayAll.forEach(function(e) {
      if (!byEmp[e.employee_name]) byEmp[e.employee_name] = { mins: 0, entries: [], clocked: false };
      byEmp[e.employee_name].mins += durMins(e);
      byEmp[e.employee_name].entries.push(e);
      if (!e.clock_out) byEmp[e.employee_name].clocked = true;
    });
    h += '<table class="tc-table"><thead><tr><th>Employee</th><th>Hours</th><th>Entries</th><th>Status</th></tr></thead><tbody>';
    Object.entries(byEmp).sort(function(a,b){return b[1].mins-a[1].mins;}).forEach(function(kv) {
      var name=kv[0], d=kv[1];
      var pct=Math.min(100,Math.round(d.mins/480*100));
      h += '<tr>';
      h += '<td><strong>'+name+'</strong></td>';
      h += '<td><strong>'+fmtDur(d.mins)+'</strong><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%;background:'+(d.clocked?'var(--green)':'var(--navy)');+'"></div></div></td>';
      h += '<td>'+d.entries.length+'</td>';
      h += '<td>'+(d.clocked?'<span class="badge badge-green">Clocked In</span>':'<span class="badge badge-gray">Clocked Out</span>')+'</td>';
      h += '</tr>';
    });
    h += '</tbody></table>';
  }
  h += '</div>';

  document.getElementById('tc-body').innerHTML = h;
}

// ── TIMESHEETS TAB ────────────────────────────────────────────────────────
function renderTimesheets() {
  var fmt = function(iso){ if(!iso)return ''; var d=new Date(iso),h=d.getHours()%12||12,m=d.getMinutes(),ap=d.getHours()>=12?'PM':'AM'; return h+':'+(m<10?'0':'')+m+' '+ap; };
  var fmtDur = function(mins){ if(!mins&&mins!==0)return '-'; return Math.floor(mins/60)+'h '+(mins%60)+'m'; };
  var durMins = function(e){ var out=e.clock_out?new Date(e.clock_out):new Date(); return Math.floor((out-new Date(e.clock_in))/60000); };

  var periods = getPayPeriods(ST.payPeriod.type, ST.payPeriod.start, 40);
  var selPeriod = ST.selPeriod || (periods[0] ? periods[0].label : null);

  var h = '';

  // Pay period settings bar
  h += '<div class="card" style="margin-bottom:16px;">';
  h += '<div class="card-hdr" style="cursor:pointer;" onclick="var b=document.getElementById(\'pp-settings\');b.style.display=b.style.display===\'none\'?\'block\':\'none\'">';
  h += '<div class="card-title">Pay Period Settings</div>';
  h += '<div style="font-size:11px;color:var(--muted);">Click to configure</div>';
  h += '</div>';
  h += '<div id="pp-settings" style="display:none;padding:14px;border-top:1px solid var(--border);">';
  h += '<div class="form-row">';
  h += '<div><label class="form-label">Period Type</label>';
  h += '<select class="form-select" id="pp-type" onchange="ST.payPeriod.type=this.value;localStorage.setItem(\'jg_pay_period\',JSON.stringify(ST.payPeriod));renderTimesheets();">';
  ['weekly','biweekly','semimonthly'].forEach(function(t){
    h += '<option value="'+t+'"'+(ST.payPeriod.type===t?' selected':'')+'>'+({weekly:'Weekly',biweekly:'Bi-Weekly',semimonthly:'Semi-Monthly'}[t])+'</option>';
  });
  h += '</select></div>';
  h += '<div><label class="form-label">First Period Start Date</label>';
  h += '<input type="date" class="form-input" id="pp-start" value="'+ST.payPeriod.start+'" onchange="ST.payPeriod.start=this.value;localStorage.setItem(\'jg_pay_period\',JSON.stringify(ST.payPeriod));renderTimesheets();">';
  h += '</div></div>';
  h += '<div style="font-size:11px;color:var(--muted);margin-top:8px;">7:30 AM rule: Clock-ins before 7:30am are adjusted to 7:30am for billable hours unless admin approves early start.</div>';
  h += '</div></div>';

  // Period selector
  h += '<div class="filter-bar">';
  h += '<select onchange="ST.selPeriod=this.value;ST.filterEmp=\'All\';renderTimesheets();" style="min-width:220px;">';
  h += '<option value="">-- Select Pay Period --</option>';
  periods.forEach(function(p){
    var isCur = p.label === selPeriod;
    h += '<option value="'+p.label+'"'+(isCur?' selected':'')+'>'+p.label+'</option>';
  });
  h += '</select>';
  h += '<select onchange="ST.filterEmp=this.value;renderTimesheets()" style="min-width:160px;">';
  h += '<option value="All">All Employees</option>';
  var empNames = [...new Set(ST.entries.map(function(e){return e.employee_name;}))].sort();
  empNames.forEach(function(n){ h += '<option value="'+n+'"'+(ST.filterEmp===n?' selected':'')+'>'+n+'</option>'; });
  h += '</select>';
  h += '<button class="btn btn-primary" onclick="exportPayPeriodCSV()" style="margin-left:auto;">Export CSV</button>';
  h += '</div>';

  // Find entries in selected period
  var curPer = periods.find(function(p){ return p.label === selPeriod; });
  var filtered = ST.entries.filter(function(e){
    if (!curPer) return false;
    var d = new Date(e.clock_in); d.setHours(0,0,0,0);
    return d >= curPer.start && d <= curPer.end;
  }).filter(function(e){
    return ST.filterEmp === 'All' || e.employee_name === ST.filterEmp;
  });

  // Group by employee for summary
  var byEmp = {};
  filtered.forEach(function(e){
    if (!byEmp[e.employee_name]) byEmp[e.employee_name] = { entries: [], totalBillable: 0, totalActual: 0, earlyFlags: 0 };
    var breaks = ST.breaks.filter(function(b){ return b.entry_id === e.id; });
    var bill = billableMins(e, breaks);
    var actual = e.duration_minutes || durMins(e);
    byEmp[e.employee_name].entries.push(e);
    byEmp[e.employee_name].totalBillable += bill;
    byEmp[e.employee_name].totalActual += actual;
    if (isEarlyClockIn(e.clock_in) && !e.approved_early) byEmp[e.employee_name].earlyFlags++;
  });

  if (!curPer) {
    h += '<div class="card"><div class="empty" style="padding:24px;">Select a pay period above</div></div>';
  } else if (!filtered.length) {
    h += '<div class="card"><div class="empty" style="padding:24px;">No entries for this pay period</div></div>';
  } else {
    // Group entries by week for OT calc
    function getWeekKey(iso) {
      var d = new Date(iso);
      // Get Monday of that week
      var day = d.getDay();
      var diff = d.getDate() - day + (day === 0 ? -6 : 1);
      var mon = new Date(d); mon.setDate(diff); mon.setHours(0,0,0,0);
      return mon.toISOString().split('T')[0];
    }

    function calcOT(entries, breaks) {
      // Group by week
      var weeks = {};
      entries.forEach(function(e){
        var wk = getWeekKey(e.clock_in);
        if (!weeks[wk]) weeks[wk] = [];
        weeks[wk].push(e);
      });
      var regMins = 0, otMins = 0;
      Object.values(weeks).forEach(function(wkEntries){
        var wkMins = 0;
        wkEntries.forEach(function(e){
          var eb = ST.breaks.filter(function(b){ return b.entry_id === e.id; });
          wkMins += billableMins(e, eb);
        });
        var reg40 = 40 * 60;
        if (wkMins > reg40) {
          regMins += reg40;
          otMins  += (wkMins - reg40);
        } else {
          regMins += wkMins;
        }
      });
      return { regMins: regMins, otMins: otMins };
    }

    // Summary cards per employee
    h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:16px;">';
    Object.entries(byEmp).forEach(function(kv){
      var nm = kv[0], d = kv[1];
      var emp = ST.employees.find(function(e){ return e.name === nm; });
      var rate = emp ? parseFloat(emp.hourly_rate) : 0;
      var ot = calcOT(d.entries, ST.breaks);
      var regHrs  = ot.regMins / 60;
      var otHrs   = ot.otMins  / 60;
      var regPay  = rate * regHrs;
      var otPay   = rate * 1.5 * otHrs;
      var totalPay = regPay + otPay;

      h += '<div class="card" style="padding:16px;margin:0;">';
      h += '<div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px;">'+nm+'</div>';

      // Hours breakdown
      h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;">';
      h += '<div style="background:rgba(13,45,94,.04);border-radius:8px;padding:8px;text-align:center;">';
      h += '<div style="font-size:18px;font-weight:700;color:var(--navy);">'+regHrs.toFixed(1)+'</div>';
      h += '<div style="font-size:10px;color:var(--muted);font-weight:600;">REG HRS</div></div>';
      h += '<div style="background:'+(otHrs>0?'rgba(198,40,40,.06)':'rgba(13,45,94,.04)')+'";border-radius:8px;padding:8px;text-align:center;">';
      h += '<div style="font-size:18px;font-weight:700;color:'+(otHrs>0?'#c62828':'var(--muted)')+';">'+otHrs.toFixed(1)+'</div>';
      h += '<div style="font-size:10px;color:var(--muted);font-weight:600;">OT HRS</div></div>';
      h += '</div>';

      if (rate) {
        // Pay breakdown
        h += '<div style="border-top:1px solid var(--border);padding-top:10px;">';
        h += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">';
        h += '<span style="color:var(--muted);">Regular ('+regHrs.toFixed(1)+'h @ $'+rate.toFixed(2)+'/hr)</span>';
        h += '<span style="font-weight:600;">$'+regPay.toFixed(2)+'</span></div>';
        if (otHrs > 0) {
          h += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">';
          h += '<span style="color:#c62828;">Overtime ('+otHrs.toFixed(1)+'h @ $'+(rate*1.5).toFixed(2)+'/hr)</span>';
          h += '<span style="font-weight:600;color:#c62828;">$'+otPay.toFixed(2)+'</span></div>';
        }
        h += '<div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;border-top:1px solid var(--border);padding-top:6px;margin-top:6px;">';
        h += '<span>Est. Gross Pay</span>';
        h += '<span style="color:#2e7d32;">$'+totalPay.toFixed(2)+'</span></div>';
        h += '</div>';
      } else {
        h += '<div style="font-size:11px;color:var(--muted);font-style:italic;">No hourly rate set — edit employee to add rate</div>';
      }

      if (d.earlyFlags) h += '<div style="font-size:11px;color:#c62828;margin-top:8px;">&#9888; '+d.earlyFlags+' early clock-in(s) pending approval</div>';
      h += '</div>';
    });

    // Period totals
    var periodRegMins = 0, periodOtMins = 0, periodTotalPay = 0;
    Object.entries(byEmp).forEach(function(kv){
      var d = kv[1], nm = kv[0];
      var emp = ST.employees.find(function(e){ return e.name === nm; });
      var rate = emp ? parseFloat(emp.hourly_rate||0) : 0;
      var ot = calcOT(d.entries);
      periodRegMins += ot.regMins;
      periodOtMins  += ot.otMins;
      periodTotalPay += rate*(ot.regMins/60) + rate*1.5*(ot.otMins/60);
    });
    h += '</div>';
    h += '<div style="background:rgba(13,45,94,.04);border-radius:10px;padding:14px;margin-bottom:16px;display:flex;gap:24px;flex-wrap:wrap;">';
    h += '<div><div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;">Period Total</div>';
    h += '<div style="font-size:18px;font-weight:700;color:var(--navy);">'+((periodRegMins+periodOtMins)/60).toFixed(1)+'h</div></div>';
    h += '<div><div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;">Regular</div>';
    h += '<div style="font-size:18px;font-weight:700;color:var(--navy);">'+(periodRegMins/60).toFixed(1)+'h</div></div>';
    h += '<div><div style="font-size:11px;color:#c62828;font-weight:700;text-transform:uppercase;letter-spacing:.04em;">Overtime</div>';
    h += '<div style="font-size:18px;font-weight:700;color:'+(periodOtMins>0?'#c62828':'var(--muted)');+';">'+(periodOtMins/60).toFixed(1)+'h</div></div>';
    if (periodTotalPay > 0) {
      h += '<div style="margin-left:auto;"><div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;">Est. Total Payroll</div>';
      h += '<div style="font-size:22px;font-weight:700;color:#2e7d32;">$'+periodTotalPay.toFixed(2)+'</div></div>';
    }
    h += '</div>';

    // Detail table
    h += '<div class="card"><div class="card-hdr"><div class="card-title">Time Entries — '+selPeriod+'</div></div>';
    h += '<table class="tc-table"><thead><tr>';
    h += '<th>Employee</th><th>Date</th><th>Clock In</th><th>Clock Out</th>';
    h += '<th>Actual</th><th>Billable</th><th>Break</th><th>Job</th><th>Flags</th><th></th>';
    h += '</tr></thead><tbody>';

    filtered.sort(function(a,b){ return new Date(a.clock_in)-new Date(b.clock_in); });
    filtered.forEach(function(e){
      var breaks = ST.breaks.filter(function(b){ return b.entry_id === e.id; });
      var actual = e.duration_minutes || durMins(e);
      var bill = billableMins(e, breaks);
      var bkMins = breaks.reduce(function(s,b){ return s+(b.duration_minutes||0); }, 0);
      var early = isEarlyClockIn(e.clock_in);
      var active = !e.clock_out;
      var flagCell = '';
      if (early && !e.approved_early) flagCell = '<span style="color:#c62828;font-size:11px;font-weight:700;">Early<br><button class="btn btn-sm" onclick="approveEarly(\''+e.id+'\')">Approve</button></span>';
      else if (early && e.approved_early) flagCell = '<span style="color:#2e7d32;font-size:11px;">Approved</span>';
      h += '<tr'+(early&&!e.approved_early?' style="background:rgba(198,40,40,.04);"':'')+'>';
      h += '<td><strong>'+e.employee_name+'</strong></td>';
      h += '<td>'+fmtD(new Date(e.clock_in))+'</td>';
      h += '<td class="mono"'+(early&&!e.approved_early?' style="color:#c62828;font-weight:700;"':'')+'>'+fmt(e.clock_in)+'</td>';
      h += '<td class="mono">'+(active?'<span class="badge badge-green">Active</span>':fmt(e.clock_out))+'</td>';
      h += '<td>'+fmtDur(actual)+'</td>';
      h += '<td><strong>'+fmtDur(bill)+'</strong></td>';
      h += '<td>'+(bkMins?fmtDur(bkMins):'-')+'</td>';
      h += '<td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+(e.job_name||'-')+'</td>';
      h += '<td>'+flagCell+'</td>';
      h += '<td>'+(isAdmin() ? '<button class="btn btn-sm" onclick="editEntry(\''+e.id+'\')">Edit</button>' : '<button class="btn btn-sm" onclick="viewEntry(\''+e.id+'\')">View</button>')+'</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';

    // Absence records for this period
    var periodAbsences = ST.absences.filter(function(a){
      if (!curPer) return false;
      var d = new Date(a.date + 'T00:00:00'); d.setHours(0,0,0,0);
      return d >= curPer.start && d <= curPer.end;
    }).filter(function(a){
      return ST.filterEmp === 'All' || a.employee_name === ST.filterEmp;
    });

    if (periodAbsences.length) {
      h += '<div class="card" style="margin-top:12px;"><div class="card-hdr"><div class="card-title">Absences / Out of Office</div></div>';
      h += '<table class="tc-table"><thead><tr><th>Employee</th><th>Date</th><th>Reason</th><th>Market</th><th>Logged By</th><th>Notes</th><th></th></tr></thead><tbody>';
      periodAbsences.forEach(function(a){
        var badge = {
          'Sick': 'badge-red', 'PTO': 'badge-green', 'No Call No Show': 'badge-red',
          'Personal': 'badge-warn', 'Injured': 'badge-red', 'Training': 'badge-green',
          'Shop Time': 'badge-warn', 'Jury Duty': 'badge-gray', 'Bereavement': 'badge-gray'
        }[a.reason] || 'badge-gray';
        h += '<tr>';
        h += '<td><strong>'+a.employee_name+'</strong></td>';
        h += '<td>'+fmtD(new Date(a.date+'T00:00:00'))+'</td>';
        h += '<td><span class="badge '+badge+'">'+a.reason+'</span></td>';
        h += '<td>'+(a.market||'-')+'</td>';
        h += '<td style="font-size:11px;color:var(--muted);">'+(a.logged_by||'admin')+'</td>';
        h += '<td style="font-size:11px;color:var(--muted);">'+(a.notes||'')+'</td>';
        h += '<td><button class="btn btn-sm btn-danger" onclick="deleteAbsence(\''+a.id+'\')">Remove</button></td>';
        h += '</tr>';
      });
      h += '</tbody></table></div>';
    }
  }

  document.getElementById('tc-body').innerHTML = h;
}

async function approveEarly(entryId) {
  await fetch(SB_URL + '/rest/v1/time_entries?id=eq.' + entryId, {
    method: 'PATCH',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ approved_early: true })
  });
  toast('Early start approved');
  await loadAll();
  renderTimesheets();
}

async function deleteAbsence(id) {
  if (!confirm('Remove this absence record?')) return;
  await fetch(SB_URL + '/rest/v1/absence_records?id=eq.' + id, {
    method: 'DELETE',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
  });
  toast('Absence removed');
  await loadAll();
  renderTimesheets();
}

async function addAbsence() {
  var name   = (document.getElementById('abs-name')   || {}).value || '';
  var date   = (document.getElementById('abs-date')   || {}).value || '';
  var reason = (document.getElementById('abs-reason') || {}).value || 'Sick';
  var notes  = (document.getElementById('abs-notes')  || {}).value || '';
  var market = (document.getElementById('abs-market') || {}).value || 'Appleton';
  if (!name || !date) { toast('Name and date required'); return; }
  await fetch(SB_URL + '/rest/v1/absence_records', {
    method: 'POST',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ employee_name: name, date: date, reason: reason, notes: notes, market: market, logged_by: 'admin' })
  });
  toast('Absence recorded for ' + name);
  await loadAll();
  showTab('timesheets', document.getElementById('tab-timesheets'));
}

function exportPayPeriodCSV() {
  var rows = [['Employee','Date','Clock In','Clock Out','Actual Hrs','Billable Hrs','Reg Hrs','OT Hrs','Hourly Rate','Reg Pay','OT Pay','Total Pay','Break Mins','Job','Early Approved']];
  var fmt = function(iso){ if(!iso)return ''; var d=new Date(iso),h=d.getHours()%12||12,m=d.getMinutes(),ap=d.getHours()>=12?'PM':'AM'; return h+':'+(m<10?'0':'')+m+' '+ap; };
  var durMins = function(e){ var out=e.clock_out?new Date(e.clock_out):new Date(); return Math.floor((out-new Date(e.clock_in))/60000); };

  // Group by employee for OT calc
  var empGroups = {};
  ST.entries.forEach(function(e){
    if (!empGroups[e.employee_name]) empGroups[e.employee_name] = [];
    empGroups[e.employee_name].push(e);
  });

  ST.entries.forEach(function(e){
    var emp = ST.employees.find(function(x){ return x.name === e.employee_name; });
    var rate = emp ? parseFloat(emp.hourly_rate||0) : 0;
    var breaks = ST.breaks.filter(function(b){ return b.entry_id === e.id; });
    var actual = (e.duration_minutes || durMins(e)) / 60;
    var bill = billableMins(e, breaks) / 60;
    var bkMins = breaks.reduce(function(s,b){ return s+(b.duration_minutes||0); }, 0);
    // Per-entry OT: rough calc based on week position
    var wkKey = getWeekKey(e.clock_in);
    var wkEntries = (empGroups[e.employee_name]||[]).filter(function(x){ return getWeekKey(x.clock_in) === wkKey; });
    var wkMins = wkEntries.reduce(function(s,x){ var xb=ST.breaks.filter(function(b){return b.entry_id===x.id;}); return s+billableMins(x,xb); }, 0);
    var entryBill = billableMins(e, breaks);
    var wkReg = Math.min(wkMins, 2400); // 40hrs
    var entryFrac = wkMins > 0 ? entryBill / wkMins : 0;
    var regMins = Math.min(entryBill, Math.round(wkReg * entryFrac));
    var otMins = Math.max(0, entryBill - regMins);
    var regPay = rate * regMins / 60;
    var otPay = rate * 1.5 * otMins / 60;
    rows.push([e.employee_name, fmtD(new Date(e.clock_in)), fmt(e.clock_in), fmt(e.clock_out),
      actual.toFixed(2), bill.toFixed(2), (regMins/60).toFixed(2), (otMins/60).toFixed(2),
      rate?'$'+rate.toFixed(2):'', rate?'$'+regPay.toFixed(2):'', rate?'$'+otPay.toFixed(2):'', rate?'$'+(regPay+otPay).toFixed(2):'',
      bkMins, e.job_name||'', e.approved_early?'Yes':'']);
  });
  var csv = rows.map(function(r){ return r.map(function(c){ var s=String(c).split('"').join('""'); return '"'+s+'"'; }).join(','); }).join('\n');
  var a = document.createElement('a'); a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'timesheets.csv'; a.click();
}


// ── EMPLOYEES TAB ─────────────────────────────────────────────────────────
function renderEmployees() {
  var h = '';

  // Employee list header with invite button
  h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">';
  h += '<div style="font-size:13px;font-weight:700;color:var(--navy);">Employees ('+ST.employees.length+')</div>';

// ── REPORTS TAB ───────────────────────────────────────────────────────────
function renderReports() {
  var fmtDur = function(mins){ return Math.floor(mins/60)+'h '+(mins%60)+'m'; };
  var durMins = function(e){ var out=e.clock_out?new Date(e.clock_out):new Date(); return Math.floor((out-new Date(e.clock_in))/60000); };

  var byEmp = {};
  ST.entries.forEach(function(e) {
    if (!byEmp[e.employee_name]) byEmp[e.employee_name] = { mins: 0, days: new Set(), ot: 0 };
    var m = e.duration_minutes || durMins(e);
    byEmp[e.employee_name].mins += m;
    byEmp[e.employee_name].days.add(e.clock_in.split('T')[0]);
  });

  // Compute OT (over 40h/week is simplified here)
  Object.values(byEmp).forEach(function(d){
    var hrs = d.mins / 60;
    d.ot = Math.max(0, hrs - 40);
  });

  var totalMins = Object.values(byEmp).reduce(function(s,d){return s+d.mins;},0);
  var totalOT = Object.values(byEmp).reduce(function(s,d){return s+d.ot;},0);

  var h = '';

  // Stats
  h += '<div class="stat-grid">';
  h += '<div class="stat-card"><div class="stat-val">'+fmtDur(totalMins)+'</div><div class="stat-lbl">Total Hours</div></div>';
  h += '<div class="stat-card"><div class="stat-val" style="color:var(--red);">'+totalOT.toFixed(1)+'h</div><div class="stat-lbl">Overtime Hours</div></div>';
  h += '<div class="stat-card"><div class="stat-val">'+Object.keys(byEmp).length+'</div><div class="stat-lbl">Employees</div></div>';
  h += '<div class="stat-card"><div class="stat-val">'+ST.entries.length+'</div><div class="stat-lbl">Total Entries</div></div>';
  h += '</div>';

  h += '<div style="display:flex;gap:8px;margin-bottom:16px;">';
  h += '<button class="btn btn-primary" onclick="exportCSV(7)">↓ CSV — Last 7 Days</button>';
  h += '<button class="btn btn-primary" onclick="exportCSV(14)">↓ CSV — Last 14 Days</button>';
  h += '<button class="btn btn-primary" onclick="exportCSV(30)">↓ CSV — Last 30 Days</button>';
  h += '<button class="btn" onclick="exportCSV()" style="margin-left:auto;">↓ CSV — Current Filter</button>';
  h += '</div>';

  h += '<div class="card"><div class="card-hdr"><div class="card-title">Hours by Employee</div></div>';
  h += '<table class="tc-table"><thead><tr><th>Employee</th><th>Total Hours</th><th>Days Worked</th><th>Avg/Day</th><th>OT Hours</th><th>vs 40h Week</th></tr></thead><tbody>';
  Object.entries(byEmp).sort(function(a,b){return b[1].mins-a[1].mins;}).forEach(function(kv) {
    var name=kv[0], d=kv[1];
    var hrs = d.mins/60;
    var days = d.days.size;
    var avgDay = days ? (hrs/days).toFixed(1) : 0;
    var vs40 = hrs - 40;
    h += '<tr>';
    h += '<td><strong>'+name+'</strong></td>';
    h += '<td><strong class="mono">'+fmtDur(d.mins)+'</strong></td>';
    h += '<td>'+days+'</td>';
    h += '<td class="mono">'+avgDay+'h</td>';
    h += '<td>'+(d.ot>0?'<strong style="color:var(--red);">'+d.ot.toFixed(1)+'h</strong>':'-')+'</td>';
    h += '<td>'+(vs40>0?'<span class="badge badge-red">+'+vs40.toFixed(1)+'h OT</span>':'<span class="badge badge-green">'+Math.abs(vs40).toFixed(1)+'h left</span>')+'</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div>';


  // Absence / Out of Office log section
  h += '<div class="card" style="margin-top:20px;">';
  h += '<div class="card-hdr"><div class="card-title">Log Absence / Out of Office</div></div>';
  h += '<div class="card-body">';
  h += '<p style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5;">Manually log an employee absence. This will appear in timesheets for the pay period.</p>';
  h += '<div class="form-row">';
  h += '<div><label class="form-label">Employee *</label><select class="form-select" id="abs-name"><option value="">-- Select --</option>';
  ST.employees.filter(function(e){return e.active;}).forEach(function(e){ h += '<option>'+e.name+'</option>'; });
  h += '</select></div>';
  h += '<div><label class="form-label">Date *</label><input type="date" class="form-input" id="abs-date" value="'+new Date().toISOString().split('T')[0]+'"></div>';
  h += '</div>';
  h += '<div class="form-row">';
  h += '<div><label class="form-label">Reason</label><select class="form-select" id="abs-reason"><option>Sick</option><option>PTO</option><option>Personal Day</option><option>No Call No Show</option><option>Injured</option><option>Training</option><option>Shop Time</option><option>Jury Duty</option><option>Bereavement</option><option>Other</option></select></div>';
  h += '<div><label class="form-label">Market</label><select class="form-select" id="abs-market"><option>Appleton</option><option>Stevens Point</option></select></div>';
  h += '</div>';
  h += '<div><label class="form-label">Notes (optional)</label><input type="text" class="form-input" id="abs-notes" placeholder="e.g. Called in sick at 6am..."></div>';
  h += '<button class="btn btn-primary" onclick="addAbsence()" style="margin-top:12px;width:100%;padding:11px;">+ Log Absence</button>';

async function sendInviteFromModal() {
  // Pull values from the open modal form
  var name   = (document.getElementById('emp-name')   || {}).value || '';
  var email  = (document.getElementById('emp-email')  || {}).value || '';
  var role   = (document.getElementById('emp-role')   || {}).value || 'Technician';
  var market = (document.getElementById('emp-market') || {}).value || 'Appleton';
  var rate   = (document.getElementById('emp-rate')   || {}).value || '0';
  if (!name.trim() || !email.trim()) { toast('Name and email are required'); return; }

  var btn = document.querySelector('#tc-modal .btn-orange');
  if (btn) { btn.textContent = 'Sending...'; btn.disabled = true; }

  try {
    var r = await fetch('https://jg-proxy-v2.vercel.app/api/albi', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'invite', email: email.trim().toLowerCase(), name: name.trim(), role: role||'Technician', market: market||'Appleton', hourly_rate: parseFloat(rate)||0 })
    });
    var data = await r.json().catch(function(){ return { error: 'Request failed' }; });
    if (r.ok && data.success) {
      toast('✓ Invite sent to ' + email);
      closeModal();
      await loadAll();
    } else {
      throw new Error(data.error || 'Invite failed');
    }
  } catch(e) {
    toast('Error: ' + e.message);
    if (btn) { btn.textContent = '✉️ Save & Send Invite Email'; btn.disabled = false; }
  }
}

    pto_hours_available: parseFloat(document.getElementById('emp-pto-available').value) || 0,
    pto_hours_used: parseFloat(document.getElementById('emp-pto-used').value) || 0,
    pto_accrual_rate: parseFloat(document.getElementById('emp-pto-accrual').value) || 0,
    pto_notes: (document.getElementById('emp-pto-notes').value || '').trim()
  };
  if (!data.name || !data.email) { toast('Name and email are required'); return; }
  if (ST.editEmp) {
    await fetch(SB_URL+'/rest/v1/employees?id=eq.'+ST.editEmp, {method:'PATCH', headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}, body:JSON.stringify(data)});

  closeModal();

}

var _albiJobs = null;

async function loadAlbiJobsForModal() {
  var dropdown = document.getElementById('entry-job-dropdown');
  if (!dropdown) return;

  if (!_albiJobs) {
    try {
      var allJobs = [];
      var page = 1;
      while (page <= 20) {
        var r = await fetch('https://jg-proxy-v2.vercel.app/api/albi?pageSize=50&page=' + page);
        if (!r.ok) break;
        var data = await r.json();
        var items = Array.isArray(data) ? data : (data.data || data.results || data.projects || data.items || []);
        if (!items.length) break;
        items.forEach(function(p) {
          var jid = String(p.uniqueNumber || p.id || '');
          var name = p.name || p.projectName || jid;
          var loc = (p.location || '').toString().toLowerCase();
          var market = (loc.includes('stevens') || loc.includes('point')) ? 'Stevens Point' : 'Appleton';
          if (jid) allJobs.push({ id: jid, name: name, market: market });
        });
        if (items.length < 50) break;
        page++;
      }
      _albiJobs = allJobs.sort(function(a,b){ return a.name.localeCompare(b.name); });
    } catch(err) {
      _albiJobs = [];
    }
  }

  filterJobOptions(document.getElementById('entry-job-search') ? document.getElementById('entry-job-search').value : '');
}

function filterJobOptions(q) {
  var dropdown = document.getElementById('entry-job-dropdown');
  var search = document.getElementById('entry-job-search');
  if (!dropdown || !_albiJobs) return;

  var filtered = q ? _albiJobs.filter(function(j){
    return j.name.toLowerCase().includes(q.toLowerCase()) || j.id.includes(q);
  }) : _albiJobs;

  if (!filtered.length) {
    dropdown.innerHTML = '<div style="padding:10px 14px;font-size:12px;color:var(--muted);">No jobs found</div>';
    dropdown.style.display = 'block';
    return;
  }

  dropdown.innerHTML = filtered.slice(0, 50).map(function(j){
    return '<div onclick="selectJobOption(\''+j.id+'\',\''+j.name.replace(/'/g,'\\')+'\')" style="padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;" onmouseover="this.style.background=\'#f0f4ff\'" onmouseout="this.style.background=\'\'">'+
      '<span>'+j.name+'</span>'+
      '<span style="font-size:10px;color:var(--muted);margin-left:8px;">'+j.market+'</span>'+
    '</div>';
  }).join('');
  dropdown.style.display = 'block';

  // Close dropdown on outside click
  setTimeout(function(){
    document.addEventListener('click', function closeDD(ev){
      if (!dropdown.contains(ev.target) && ev.target !== search) {
        dropdown.style.display = 'none';
        document.removeEventListener('click', closeDD);
      }
    });
  }, 100);
}

function selectJobOption(id, name) {
  var search = document.getElementById('entry-job-search');
  var hiddenId = document.getElementById('entry-job-id');
  var hiddenName = document.getElementById('entry-job-name');
  var dropdown = document.getElementById('entry-job-dropdown');
  if (search) search.value = name;

async function sendInvite() {
  var name  = (document.getElementById('inv-name')  || {}).value || '';
  var email = (document.getElementById('inv-email') || {}).value || '';
  var role  = (document.getElementById('inv-role')  || {}).value || 'Technician';
  var market = (document.getElementById('inv-market')|| {}).value || 'Appleton';
  var rate  = (document.getElementById('inv-rate')  || {}).value || '0';
  var statusEl = document.getElementById('invite-status');

  if (!name.trim() || !email.trim()) {
    if (statusEl) statusEl.innerHTML = '<div style="padding:10px 14px;border-radius:8px;background:var(--danger-bg);color:var(--red);font-size:13px;font-weight:600;">Name and email are required.</div>';
    return;
  }

  var btn = document.querySelector('#tc-body .btn-orange');
  if (btn) { btn.textContent = 'Sending...'; btn.disabled = true; }
  if (statusEl) statusEl.innerHTML = '';

  try {
    var r = await fetch('https://jg-proxy-v2.vercel.app/api/albi', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'invite', email: email.trim().toLowerCase(), name: name.trim(), role: role||'Technician', market: market||'Appleton', hourly_rate: parseFloat(rate)||0 })
    });
    var data = await r.json().catch(function(){ return { error: 'Request failed' }; });

    if (r.ok && data.success) {
      if (statusEl) statusEl.innerHTML = '<div style="padding:10px 14px;border-radius:8px;background:var(--ok-bg);color:var(--green);font-size:13px;font-weight:600;">✓ Invite sent to '+email+'</div>';
      // Clear form
      ['inv-name','inv-email','inv-rate'].forEach(function(id){ var el=document.getElementById(id); if(el) el.value=''; });
      toast('✓ Invite sent to ' + email);
      // Reload employee list
      await loadAll();
    } else {
      throw new Error(data.error || 'Invite failed');
    }
  } catch(e) {
    if (statusEl) statusEl.innerHTML = '<div style="padding:10px 14px;border-radius:8px;background:var(--danger-bg);color:var(--red);font-size:13px;font-weight:600;">Error: '+e.message+'</div>';
  }

  if (btn) { btn.textContent = '✉️ Send Invite Email'; btn.disabled = false; }
}

// ── EXPORT CSV ────────────────────────────────────────────────────────────
async function exportCSV(days) {
  var entries = ST.entries;
  if (days) {
    var since = new Date(Date.now()-days*86400000).toISOString();
    entries = entries.filter(function(e){ return e.clock_in >= since; });
  }
  var rows = ['Employee,Email,Date,Clock In,Clock Out,Duration (mins),Break (mins),Job,Notes,GPS In,GPS Out'];
  var fmt = function(d){ return d?new Date(d).toLocaleString():''; };
  entries.forEach(function(e) {
    var empBreaks = ST.breaks.filter(function(b){ return b.entry_id===e.id; });
    var breakMins = empBreaks.reduce(function(s,b){return s+(b.duration_minutes||0);},0);
    var dur = e.duration_minutes || (e.clock_out?Math.floor((new Date(e.clock_out)-new Date(e.clock_in))/60000):'');
    var gpsIn = (e.clock_in_lat&&e.clock_in_lng)?e.clock_in_lat.toFixed(4)+','+e.clock_in_lng.toFixed(4):'';
    var gpsOut = (e.clock_out_lat&&e.clock_out_lng)?e.clock_out_lat.toFixed(4)+','+e.clock_out_lng.toFixed(4):'';
    rows.push(['"'+(e.employee_name||'')+'"','"'+(e.employee_email||'')+'"','"'+new Date(e.clock_in).toLocaleDateString()+'"','"'+fmt(e.clock_in)+'"','"'+fmt(e.clock_out)+'"',dur,breakMins,'"'+(e.job_name||'')+'"','"'+(e.notes||'')+'"','"'+gpsIn+'"','"'+gpsOut+'"'].join(','));
  });
  var blob = new Blob([rows.join('\n')],{type:'text/csv'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href=url; a.download='jg-timeclock-export.csv'; a.click();
  toast('✓ CSV downloaded');
}
