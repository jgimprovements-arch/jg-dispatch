<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JG Sales">
<meta name="theme-color" content="#0d2d5e">
<link rel="apple-touch-icon" href="logo.png">
<link rel="apple-touch-icon" sizes="152x152" href="logo.png">
<link rel="apple-touch-icon" sizes="180x180" href="logo.png">
<link rel="apple-touch-icon" sizes="167x167" href="logo.png">
<link rel="shortcut icon" href="logo.png">
<title>JG Sales</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d2d5e;
    --navy-dark: #081d40;
    --orange: #e85d04;
    --gold: #f5a623;
    --green: #2e7d32;
    --red: #c62828;
    --bg: #f5f6fa;
    --surface: #ffffff;
    --border: rgba(13,45,94,.1);
    --muted: #6b7a96;
    --text: #0d1f3c;
    --safe-bottom: env(safe-area-inset-bottom, 16px);
    --nav-h: 64px;
    --header-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .hdr {
    background: var(--navy);
    height: var(--header-h);
    padding: 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    padding-top: env(safe-area-inset-top, 0);
  }
  .hdr-logo { display: flex; align-items: center; gap: 8px; }
  .hdr-mark { width: 28px; height: 28px; background: var(--orange); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; font-family: 'DM Mono', monospace; }
  .hdr-title { font-size: 15px; font-weight: 700; color: #fff; }
  .hdr-user { display: flex; align-items: center; gap: 8px; }
  .hdr-avatar { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; cursor: pointer; }
  .hdr-dropdown {
    position: absolute;
    top: calc(var(--header-h) - 4px);
    right: 12px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(13,45,94,.2);
    min-width: 180px;
    overflow: hidden;
    z-index: 500;
    display: none;
  }
  .hdr-dropdown.open { display: block; animation: fadeIn .15s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: translateY(0); } }
  .hdr-dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
    width: 100%;
    text-align: left;
    font-family: 'DM Sans', sans-serif;
  }
  .hdr-dropdown-item:last-child { border-bottom: none; }
  .hdr-dropdown-item:active { background: rgba(13,45,94,.05); }
  .hdr-dropdown-user { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .hdr-dropdown-uname { font-size: 13px; font-weight: 700; color: var(--navy); }
  .hdr-dropdown-email { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .hdr-name { font-size: 12px; color: rgba(255,255,255,.7); }

  /* ── SCREEN CONTAINER ── */
  .screens {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .screen {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 16px calc(var(--nav-h) + var(--safe-bottom) + 16px);
    display: none;
  }
  .screen.active { display: block; }

  /* ── BOTTOM NAV ── */
  .nav {
    height: calc(var(--nav-h) + var(--safe-bottom));
    padding-bottom: var(--safe-bottom);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    flex-shrink: 0;
    box-shadow: 0 -4px 20px rgba(13,45,94,.06);
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 0;
    color: var(--muted);
    transition: color .15s;
  }
  .nav-btn.active { color: var(--orange); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn span { font-size: 10px; font-weight: 600; letter-spacing: .02em; }

  /* ── HOME SCREEN ── */
  .greeting { margin-bottom: 20px; }
  .greeting-name { font-size: 22px; font-weight: 700; color: var(--navy); }
  .greeting-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* Big log touch button */
  .log-touch-btn {
    width: 100%;
    padding: 12px;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 16px;
    box-shadow: 0 3px 12px rgba(232,93,4,.3);
    transition: transform .1s, box-shadow .1s;
  }
  .log-touch-btn:active { transform: scale(.97); box-shadow: 0 2px 10px rgba(232,93,4,.2); }

  /* Today's route card */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 10px;
  }
  .route-card {
    background: var(--surface);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(13,45,94,.06);
  }
  .route-card-hdr {
    background: var(--navy);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .route-card-hdr-title { font-size: 13px; font-weight: 700; color: #fff; }
  .route-card-hdr-meta { font-size: 11px; color: rgba(255,255,255,.6); }
  .route-stop-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .1s;
  }
  .route-stop-row:last-child { border-bottom: none; }
  .route-stop-row:active { background: rgba(13,45,94,.04); }
  .route-stop-num {
    width: 26px; height: 26px;
    border-radius: 8px;
    background: var(--navy);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .route-stop-num.done { background: var(--green); }
  .route-stop-info { flex: 1; min-width: 0; }
  .route-stop-name { font-size: 13px; font-weight: 600; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .route-stop-time { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .route-stop-log { padding: 6px 12px; border-radius: 8px; background: var(--orange); color: #fff; font-size: 11px; font-weight: 700; border: none; cursor: pointer; flex-shrink: 0; }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface);
    border-radius: 14px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(13,45,94,.05);
  }
  .stat-val { font-size: 26px; font-weight: 700; color: var(--navy); font-family: 'DM Mono', monospace; line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: .04em; }

  /* Overdue alerts */
  .alert-card {
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .alert-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .alert-row:last-child { border-bottom: none; }
  .alert-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .alert-name { font-size: 13px; font-weight: 600; flex: 1; }
  .alert-days { font-size: 11px; font-weight: 700; }

  /* ── PARTNERS SCREEN ── */
  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0 12px;
    margin-bottom: 12px;
  }
  .search-bar input {
    flex: 1;
    border: none;
    outline: none;
    padding: 12px 0;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    background: transparent;
  }
  .type-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
    margin-bottom: 12px;
    scrollbar-width: none;
  }
  .type-scroll::-webkit-scrollbar { display: none; }
  .type-pill {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    background: var(--surface);
    color: var(--muted);
    white-space: nowrap;
  }
  .type-pill.active { background: var(--navy); color: #fff; border-color: var(--navy); }

  .partner-row {
    background: var(--surface);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(13,45,94,.05);
    transition: transform .1s;
  }
  .partner-row:active { transform: scale(.98); }
  .p-avatar {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .p-info { flex: 1; min-width: 0; }
  .p-name { font-size: 14px; font-weight: 700; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .p-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .p-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px; background: rgba(13,45,94,.08); color: var(--navy); }
  .p-touch-days { font-size: 11px; font-weight: 700; flex-shrink: 0; }

  /* ── ROUTES SCREEN ── */
  .routes-empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .route-card-full {
    background: var(--surface);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(13,45,94,.06);
  }

  /* ── FOLLOW-UPS SCREEN ── */
  .fu-card {
    background: var(--surface);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(13,45,94,.05);
  }
  .fu-info { flex: 1; min-width: 0; }
  .fu-name { font-size: 14px; font-weight: 700; color: var(--navy); }
  .fu-reason { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fu-days { font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .fu-done-btn { padding: 6px 12px; border-radius: 8px; background: var(--green); color: #fff; font-size: 11px; font-weight: 700; border: none; cursor: pointer; flex-shrink: 0; }

  /* ── LOG TOUCH SHEET ── */
  .sheet-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 90dvh;
    overflow-y: auto;
    padding: 8px 20px calc(var(--safe-bottom) + 24px);
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
  }
  .sheet-overlay.open .sheet { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: #d0d5dd; margin: 10px auto 20px; }
  .sheet-title { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 18px; }
  .field-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; margin-top: 14px; }
  .field-input {
    width: 100%;
    padding: 13px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    background: var(--bg);
  }
  .field-input:focus { border-color: var(--orange); background: #fff; }
  .field-select {
    width: 100%;
    padding: 13px 14px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    background: var(--bg);
    appearance: none;
    -webkit-appearance: none;
  }
  .search-results {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    max-height: 200px;
    overflow-y: auto;
    margin-top: 4px;
  }
  .search-result-row {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .search-result-row:last-child { border-bottom: none; }
  .search-result-row.selected { background: rgba(232,93,4,.08); }
  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--orange);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 20px;
    box-shadow: 0 4px 16px rgba(232,93,4,.3);
  }
  .submit-btn:active { opacity: .85; }

  /* ── PARTNER DETAIL SHEET ── */
  .detail-section { margin-bottom: 16px; }
  .detail-stat-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
  .detail-stat { background: var(--bg); border-radius: 10px; padding: 10px; text-align: center; }
  .detail-stat-val { font-size: 20px; font-weight: 700; color: var(--navy); }
  .detail-stat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; }
  .contact-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .contact-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .contact-btn.call { background: rgba(13,45,94,.08); color: var(--navy); }
  .contact-btn.email { background: rgba(232,93,4,.08); color: var(--orange); }
  .intel-chip { background: var(--bg); border-radius: 8px; padding: 8px 12px; font-size: 12px; margin-bottom: 6px; }
  .intel-chip b { color: var(--navy); }
  .touch-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .touch-row:last-child { border-bottom: none; }

  /* ── LOGIN ── */
  /* #login-screen controlled via JS display toggle */
  .login-logo { width: 56px; height: 56px; background: var(--orange); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 20px; }
  .login-title { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: rgba(255,255,255,.5); margin-bottom: 40px; }
  .login-err { font-size: 12px; color: #ff6b6b; margin-top: 12px; min-height: 16px; text-align: center; }

  /* Loading */
  .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--muted); gap: 8px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--navy-dark);
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }

  /* Install banner */
  .install-banner {
    position: fixed;
    bottom: calc(var(--nav-h) + var(--safe-bottom) + 10px);
    left: 12px; right: 12px;
    background: var(--navy);
    color: #fff;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 4px 20px rgba(13,45,94,.4);
    z-index: 50;
    animation: slideUp .4s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
  .install-banner-text { flex: 1; font-size: 13px; font-weight: 600; }
  .install-banner-sub { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 2px; font-weight: 400; }
  .install-banner-btn { background: var(--orange); border: none; color: #fff; padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
  .install-banner-close { background: none; border: none; color: rgba(255,255,255,.5); font-size: 18px; cursor: pointer; padding: 0; line-height: 1; }
</style>
<!-- Auth handled via redirect to sales.html -->
</head>
<body>

<!-- No login screen - auth handled by redirect to sales.html -->

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo">
    <div class="hdr-mark">JG</div>
    <div class="hdr-title">Sales</div>
  </div>
  <div class="hdr-user" style="position:relative;">
    <div class="hdr-name" id="hdr-name">—</div>
    <div class="hdr-avatar" id="hdr-avatar" onclick="toggleHdrDropdown()">?</div>
    <div id="hdr-dropdown" class="hdr-dropdown">
      <div class="hdr-dropdown-user">
        <div class="hdr-dropdown-uname" id="dd-name">—</div>
        <div class="hdr-dropdown-email" id="dd-email">—</div>
      </div>
      <button class="hdr-dropdown-item" onclick="showInstallHelp();toggleHdrDropdown()">
        <span>📲</span> Add to Home Screen
      </button>
      <button class="hdr-dropdown-item" onclick="signOut()">
        <span>👋</span> Sign Out
      </button>
    </div>
  </div>
</div>

<!-- SCREENS -->
<div class="screens">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="greeting">
      <div class="greeting-name" id="greeting-name">Good morning</div>
      <div class="greeting-sub" id="greeting-date">Loading...</div>
    </div>

    <button class="log-touch-btn" onclick="openLogTouch(null)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Log a Touch
    </button>

    <div class="section-title">Today's Route</div>
    <div id="home-route">
      <div class="loading">Loading route...</div>
    </div>

    <div class="section-title">My Stats</div>
    <div class="stats-row" id="home-stats">
      <div class="stat-card"><div class="stat-val" id="stat-partners">—</div><div class="stat-lbl">My Partners</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-touches">—</div><div class="stat-lbl">Touches This Week</div></div>
    </div>

    <div class="section-title">Overdue Follow-ups</div>
    <div id="home-overdue"></div>
  </div>

  <!-- PARTNERS -->
  <div class="screen" id="screen-partners">
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b7a96" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Search partners..." id="partner-search-input" oninput="filterPartners()">
    </div>
    <div class="type-scroll" id="type-pills"></div>
    <div id="partner-list-app"></div>
  </div>

  <!-- ROUTES -->
  <div class="screen" id="screen-routes">
    <div id="routes-list"></div>
  </div>

  <!-- FOLLOW-UPS -->
  <div class="screen" id="screen-followups">
    <div id="fu-list"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="nav">

<script>

const REPS = {
  'kristina@jg-restoration.com': 'Kristina',

};

const TYPE_COLORS = {

  'Property Manager':'#e65100','GC':'#4a148c','Fire Department':'#b71c1c',
  'Firefighter':'#e53935','Charity':'#2e7d32','Chamber of Commerce':'#f57f17',

// ── STATE ─────────────────────────────────────────────────────────────────
var APP = {
  user: null,
  repName: '',
  partners: [],
  touches: [],

  followups: [],

// ── AUTH ──────────────────────────────────────────────────────────────────
// Auth handled via OAuth redirect

function checkAuth() {
  var raw = localStorage.getItem(_JG_KEY);
  var exp = localStorage.getItem(_JG_EXP);
  if (raw && exp && Date.now() < parseInt(exp)) {
    return JSON.parse(raw);
  }
  return null;
}

// ── INIT ──────────────────────────────────────────────────────────────────
function initApp(u) {
  try {
  APP.user = u;
  APP.repName = REPS[u.email.toLowerCase()] || u.name.split(' ')[0];
  var ls = document.getElementById('login-screen'); if (ls) ls.style.display = 'none';
  document.getElementById('hdr-name').textContent = APP.repName;
  document.getElementById('hdr-avatar').textContent = APP.repName[0];
  var ddName = document.getElementById('dd-name'); if(ddName) ddName.textContent = u.name||APP.repName;
  var ddEmail = document.getElementById('dd-email'); if(ddEmail) ddEmail.textContent = u.email||'';

  // Greeting
  var h = new Date().getHours();
  var greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greeting-name').textContent = greet + ', ' + APP.repName + ' 👋';
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var now = new Date();
  document.getElementById('greeting-date').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate();

  loadAll();
  // Show install banner and header button if not already installed
  setTimeout(function() {
    showInstallBanner();
    if (!window.matchMedia('(display-mode: standalone)').matches) {
      // Install available via avatar dropdown
    }
  }, 2000);
  } catch(e) { document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#c62828;"><b>App error:</b> ' + e.message + '<br><br><a href="sales.html">Go to Sales Dashboard</a></div>'; }
}

// ── DATA ──────────────────────────────────────────────────────────────────
async function sb(path, opts) {
  var r = await fetch(SB_URL + path, Object.assign({
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' }
  }, opts || {}));
  if (!r.ok) return null;
  return r.json().catch(function(){ return null; });
}

async function loadAll() {
  var market = 'Appleton'; // load both markets for partners

  // Load partners
  var allP = [];
  for (var pg = 0; pg < 10; pg++) {
    var chunk = await sb('/rest/v1/sales_partners?order=tier.asc,name.asc&limit=1000&offset=' + (pg*1000));
    if (!chunk || !chunk.length) break;
    allP = allP.concat(chunk);
    if (chunk.length < 1000) break;
  }
  APP.partners = allP;

  // Touches this week
  var weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
  var t = await sb('/rest/v1/sales_touches?logged_by=eq.' + encodeURIComponent(APP.repName) + '&touch_date=gte.' + weekAgo.toISOString().split('T')[0] + '&limit=200');
  APP.touches = t || [];

  // Routes
  var today = new Date().toISOString().split('T')[0];
  var r = await sb('/rest/v1/sales_routes?rep_name=eq.' + encodeURIComponent(APP.repName) + '&order=route_date.desc&limit=20');
  APP.routes = r || [];

  // Follow-ups
  var f = await sb('/rest/v1/sales_followups?assigned_to=eq.' + encodeURIComponent(APP.repName) + '&completed=eq.false&order=due_date.asc&limit=100');
  APP.followups = f || [];

  renderHome();
  renderPartners();
  renderRoutes();
  renderFollowups();
}

// ── HOME ──────────────────────────────────────────────────────────────────
function renderHome() {
  var today = new Date().toISOString().split('T')[0];

  // Stats
  var myPartners = APP.partners.filter(function(p){ return p.assigned_to === APP.repName; });
  document.getElementById('stat-partners').textContent = myPartners.length;
  document.getElementById('stat-touches').textContent = APP.touches.length;

  // Today's route
  var todayRoute = APP.routes.find(function(r){ return r.route_date === today; });
  var routeEl = document.getElementById('home-route');
  if (!todayRoute || !(todayRoute.stops||[]).length) {
    routeEl.innerHTML = '<div style="background:var(--surface);border-radius:14px;padding:20px;text-align:center;color:var(--muted);font-size:13px;border:1px solid var(--border);">No route planned for today.<br><br><button onclick="showScreen(\'routes\')" style="padding:8px 20px;border-radius:10px;background:var(--navy);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;">View Routes</button></div>';
  } else {
    var stops = todayRoute.stops || [];
    var done = stops.filter(function(s){ return s.completed; }).length;
    var startMins = 8*60;
    var html = '<div class="route-card"><div class="route-card-hdr"><div class="route-card-hdr-title">Today — ' + stops.length + ' stops</div><div class="route-card-hdr-meta">' + done + '/' + stops.length + ' done</div></div>';
    stops.forEach(function(s, i) {
      var endMins = startMins + (s.duration||45);
      var fmt = function(m){ var h=Math.floor(m/60),mn=m%60; return h+':'+(mn<10?'0':'')+mn; };
      html += '<div class="route-stop-row" onclick="openLogTouchForStop(\'' + s.partner_id + '\',\'' + (s.partner_name||'').replace(/'/g,"\\x27") + '\')">';
      html += '<div class="route-stop-num' + (s.completed?' done':'') + '">' + (s.completed?'✓':(i+1)) + '</div>';
      html += '<div class="route-stop-info"><div class="route-stop-name">' + (s.partner_name||'Stop '+(i+1)) + '</div>';
      html += '<div class="route-stop-time">' + fmt(startMins) + ' – ' + fmt(endMins) + (s.address?' · '+s.address:'') + '</div></div>';
      if (!s.completed) html += '<button class="route-stop-log" onclick="event.stopPropagation();openLogTouchForStop(\'' + s.partner_id + '\',\'' + (s.partner_name||'').replace(/'/g,"\\x27") + '\')">Log</button>';
      html += '</div>';
      startMins = endMins + 15;
    });
    html += '</div>';
    routeEl.innerHTML = html;
  }

  // Overdue follow-ups
  var now = new Date(); now.setHours(0,0,0,0);
  var overdue = APP.followups.filter(function(f){ return new Date(f.due_date) < now; }).slice(0,5);
  var overdueEl = document.getElementById('home-overdue');
  if (!overdue.length) {
    overdueEl.innerHTML = '<div style="background:var(--surface);border-radius:14px;padding:16px;text-align:center;color:var(--muted);font-size:13px;border:1px solid var(--border);">All caught up!</div>';
  } else {
    var html = '<div class="alert-card">';
    overdue.forEach(function(f) {
      var days = Math.floor((now - new Date(f.due_date)) / 86400000);
      html += '<div class="alert-row" onclick="showScreen(\'followups\')">';
      html += '<div class="alert-dot" style="background:#c62828;"></div>';
      html += '<div class="alert-name">' + (f.partner_name||'Unknown') + '</div>';
      html += '<div class="alert-days" style="color:#c62828;">' + days + 'd overdue</div>';
      html += '</div>';
    });
    html += '</div>';
    overdueEl.innerHTML = html;
  }
}

// ── PARTNERS ──────────────────────────────────────────────────────────────
function renderTypePills() {
  var types = ['All','Plumber','Realtor','Insurance Agent','Property Manager','GC','Fire Department','Firefighter','Charity','Chamber of Commerce','Customer','Other'];
  var el = document.getElementById('type-pills');
  el.innerHTML = types.map(function(t) {
    var active = APP.filterType === t;
    return '<button class="type-pill' + (active?' active':'') + '" onclick="setType(\'' + t + '\')">' + t + '</button>';
  }).join('');
}

function setType(t) { APP.filterType = t; renderTypePills(); renderPartners(); }

function renderPartners() {
  renderTypePills();
  var q = (document.getElementById('partner-search-input')||{}).value || '';
  var filtered = APP.partners.filter(function(p) {
    if (APP.filterType !== 'All' && p.type !== APP.filterType) return false;
    if (q) {
      var ql = q.toLowerCase();
      return (p.name||'').toLowerCase().includes(ql) || (p.company||'').toLowerCase().includes(ql);
    }
    return true;
  }).slice(0, 50);

  if (!filtered.length) {
    document.getElementById('partner-list-app').innerHTML = '<div class="empty">No partners found</div>';
    return;
  }

  document.getElementById('partner-list-app').innerHTML = filtered.map(function(p) {
    var days = p.last_touch_date ? Math.floor((Date.now()-new Date(p.last_touch_date).getTime())/86400000) : null;
    var daysTxt = days === null ? 'Never' : days === 0 ? 'Today' : days + 'd';
    var daysColor = days === null || days > 30 ? '#c62828' : days > 14 ? '#e65100' : '#2e7d32';
    var color = TYPE_COLORS[p.type] || '#546e7a';
    var initials = (p.name||'?').split(' ').map(function(w){ return w[0]; }).slice(0,2).join('');
    return '<div class="partner-row" onclick="openPartnerDetail(\'' + p.id + '\')">' +
      '<div class="p-avatar" style="background:' + color + ';">' + initials + '</div>' +
      '<div class="p-info">' +
        '<div class="p-name">' + (p.name||'') + '</div>' +
        '<div class="p-meta">' + (p.company||'') + (p.type?' · '+p.type:'') + (p.city?' · '+p.city:'') + '</div>' +
      '</div>' +
      '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">' +
        '<span class="p-badge">' + (p.tier||'C') + '</span>' +
        '<span class="p-touch-days" style="color:' + daysColor + ';">' + daysTxt + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

function filterPartners() { renderPartners(); }

// ── PARTNER DETAIL ────────────────────────────────────────────────────────
function openPartnerDetail(pid) {
  var p = APP.partners.find(function(x){ return x.id === pid; });
  if (!p) return;
  var days = p.last_touch_date ? Math.floor((Date.now()-new Date(p.last_touch_date).getTime())/86400000) : null;
  var color = TYPE_COLORS[p.type] || '#546e7a';
  var initials = (p.name||'?').split(' ').map(function(w){ return w[0]; }).slice(0,2).join('');
  var html = '';

  // Header
  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">';
  html += '<div style="width:52px;height:52px;border-radius:14px;background:' + color + ';color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + initials + '</div>';
  html += '<div><div style="font-size:18px;font-weight:700;color:var(--navy);">' + (p.name||'') + '</div>';
  html += '<div style="font-size:12px;color:var(--muted);">' + (p.company||'') + (p.type?' · '+p.type:'') + '</div></div></div>';

  // Contact buttons
  html += '<div class="contact-row">';
  if (p.phone) html += '<a href="tel:' + p.phone + '" class="contact-btn call">📞 ' + p.phone + '</a>';
  if (p.email) html += '<a href="https://mail.google.com/mail/?view=cm&to=' + encodeURIComponent(p.email) + '" target="_blank" class="contact-btn email">✉️ Email</a>';
  html += '</div>';

  // Stats
  html += '<div class="detail-stat-row">';
  html += '<div class="detail-stat"><div class="detail-stat-val">' + (p.touch_count||0) + '</div><div class="detail-stat-lbl">Touches</div></div>';
  html += '<div class="detail-stat"><div class="detail-stat-val">' + (p.referral_count||0) + '</div><div class="detail-stat-lbl">Referrals</div></div>';
  html += '<div class="detail-stat"><div class="detail-stat-val" style="font-size:14px;">' + (days===null?'Never':days+'d ago') + '</div><div class="detail-stat-lbl">Last Touch</div></div>';
  html += '</div>';

  // Intel
  if (p.favorite_treats) html += '<div class="intel-chip"><b>Treats:</b> ' + p.favorite_treats + '</div>';
  if (p.family_members)  html += '<div class="intel-chip"><b>Family:</b> ' + p.family_members + '</div>';
  if (p.last_convo_note) html += '<div class="intel-chip"><b>Last convo:</b> ' + p.last_convo_note + '</div>';
  if (p.notes)           html += '<div class="intel-chip" style="color:var(--muted);">' + p.notes + '</div>';

  // Log touch button
  html += '<button class="submit-btn" style="margin-top:16px;" onclick="closePartnerDetail();openLogTouchForStop(\'' + p.id + '\',\'' + (p.name||'').replace(/'/g,"\\x27") + '\')">📋 Log Touch</button>';

  document.getElementById('partner-detail-body').innerHTML = html;
  document.getElementById('partner-detail-overlay').classList.add('open');
}

function closePartnerDetail() {
  document.getElementById('partner-detail-overlay').classList.remove('open');
}

// ── ROUTES ────────────────────────────────────────────────────────────────
function renderRoutes() {
  var el = document.getElementById('routes-list');
  if (!APP.routes.length) {
    el.innerHTML = '<div class="routes-empty"><div style="font-size:40px;margin-bottom:12px;">🚗</div><div>No routes yet</div><div style="font-size:12px;margin-top:6px;">Plan routes in the Sales Dashboard</div></div>';
    return;
  }
  el.innerHTML = APP.routes.map(function(route) {
    var stops = route.stops || [];
    var done = stops.filter(function(s){ return s.completed; }).length;
    var startMins = 8*60;
    var html = '<div class="route-card-full"><div class="route-card-hdr">';
    html += '<div class="route-card-hdr-title">' + fmtDate(route.route_date) + '</div>';
    html += '<div class="route-card-hdr-meta">' + done + '/' + stops.length + ' stops · ' + (route.status||'Planned') + '</div>';
    html += '</div>';
    stops.forEach(function(s, i) {
      var endMins = startMins + (s.duration||45);
      var fmt = function(m){ var h=Math.floor(m/60),mn=m%60; return h+':'+(mn<10?'0':'')+mn; };
      html += '<div class="route-stop-row">';
      html += '<div class="route-stop-num' + (s.completed?' done':'') + '">' + (s.completed?'✓':(i+1)) + '</div>';
      html += '<div class="route-stop-info"><div class="route-stop-name">' + (s.partner_name||'Stop '+(i+1)) + '</div>';
      html += '<div class="route-stop-time">' + fmt(startMins) + ' – ' + fmt(endMins) + '</div></div>';
      if (!s.completed) html += '<button class="route-stop-log" onclick="openLogTouchForStop(\'' + s.partner_id + '\',\'' + (s.partner_name||'').replace(/'/g,"\\x27") + '\')">Log</button>';
      html += '</div>';
      startMins = endMins + 15;
    });
    html += '</div>';
    return html;
  }).join('');
}

// ── FOLLOW-UPS ────────────────────────────────────────────────────────────
function renderFollowups() {
  var el = document.getElementById('fu-list');
  if (!APP.followups.length) {
    el.innerHTML = '<div class="empty" style="padding-top:60px;">🎉<br><br>All caught up on follow-ups!</div>';
    return;
  }
  var now = new Date(); now.setHours(0,0,0,0);
  el.innerHTML = APP.followups.map(function(f) {
    var days = Math.floor((now - new Date(f.due_date)) / 86400000);
    var isOverdue = days > 0;
    var color = isOverdue ? '#c62828' : days === 0 ? '#e85d04' : '#2e7d32';
    var daysTxt = isOverdue ? days + 'd overdue' : days === 0 ? 'Today' : 'In ' + Math.abs(days) + 'd';
    return '<div class="fu-card">' +
      '<div class="fu-info">' +
        '<div class="fu-name">' + (f.partner_name||'Unknown') + '</div>' +
        '<div class="fu-reason">' + (f.reason||f.notes||'—') + '</div>' +
      '</div>' +
      '<div class="fu-days" style="color:' + color + ';">' + daysTxt + '</div>' +
      '<button class="fu-done-btn" onclick="completeFU(\'' + f.id + '\')">Done ✓</button>' +
    '</div>';
  }).join('');
}

async function completeFU(id) {
  await fetch(SB_URL + '/rest/v1/sales_followups?id=eq.' + id, {
    method: 'PATCH',
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ completed: true, completed_at: new Date().toISOString() })
  });
  APP.followups = APP.followups.filter(function(f){ return f.id !== id; });
  renderFollowups();
  renderHome();
  toast('✓ Follow-up completed');
}

// ── LOG TOUCH ─────────────────────────────────────────────────────────────
function openLogTouch(partnerId) {
  APP.ltPartnerId = null;
  APP.ltPartnerName = '';
  APP.ltPartnerType = '';
  document.getElementById('lt-search').value = '';
  document.getElementById('lt-results').style.display = 'none';
  document.getElementById('lt-selected-display').style.display = 'none';
  document.getElementById('lt-notes').value = '';
  if (partnerId) {
    var p = APP.partners.find(function(x){ return x.id === partnerId; });
    if (p) selectLtPartner(p.id, p.name, p.type||'');
  }
  document.getElementById('log-touch-overlay').classList.add('open');
  setTimeout(function(){ if (!partnerId) document.getElementById('lt-search').focus(); }, 300);
}

function openLogTouchForStop(pid, pname) {
  openLogTouch(pid);
}

function closeLogTouch() {
  document.getElementById('log-touch-overlay').classList.remove('open');
}

function ltSearch() {
  var q = document.getElementById('lt-search').value.toLowerCase();
  var resultsEl = document.getElementById('lt-results');
  if (!q) { resultsEl.style.display = 'none'; return; }
  var matches = APP.partners.filter(function(p){
    return (p.name||'').toLowerCase().includes(q) || (p.company||'').toLowerCase().includes(q);
  }).slice(0, 10);
  if (!matches.length) { resultsEl.style.display = 'none'; return; }
  resultsEl.innerHTML = matches.map(function(p) {
    return '<div class="search-result-row" onclick="selectLtPartner(\'' + p.id + '\',\'' + (p.name||'').replace(/'/g,"\\x27") + '\',\'' + (p.type||'').replace(/'/g,"\\x27") + '\')">' +
      '<div style="font-size:13px;font-weight:600;color:var(--navy);">' + p.name + '</div>' +
      '<div style="font-size:11px;color:var(--muted);">' + (p.company||'') + (p.type?' · '+p.type:'') + '</div>' +
    '</div>';
  }).join('');
  resultsEl.style.display = 'block';
}

function selectLtPartner(id, name, type) {
  APP.ltPartnerId = id;
  APP.ltPartnerName = name;
  APP.ltPartnerType = type;
  document.getElementById('lt-search').value = '';
  document.getElementById('lt-results').style.display = 'none';
  var disp = document.getElementById('lt-selected-display');
  disp.textContent = '✓ ' + name;
  disp.style.display = 'block';
}

async function submitLogTouch() {
  if (!APP.ltPartnerId) { toast('Select a partner first'); return; }
  var today = new Date().toISOString().split('T')[0];
  var data = {
    partner_id: APP.ltPartnerId,
    partner_name: APP.ltPartnerName,
    partner_type: APP.ltPartnerType,
    touch_type: document.getElementById('lt-type').value,
    touch_date: today,
    outcome: document.getElementById('lt-outcome').value,
    notes: document.getElementById('lt-notes').value,
    logged_by: APP.repName,
    market: 'Appleton'
  };
  try {
    await fetch(SB_URL + '/rest/v1/sales_touches', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(data)
    });
    // Update partner touch count and date
    var p = APP.partners.find(function(x){ return x.id === APP.ltPartnerId; });
    if (p) {
      await fetch(SB_URL + '/rest/v1/sales_partners?id=eq.' + APP.ltPartnerId, {
        method: 'PATCH',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ last_touch_date: today, touch_count: (p.touch_count||0)+1, updated_at: new Date().toISOString() })
      });
      p.last_touch_date = today;
      p.touch_count = (p.touch_count||0)+1;
    }
    closeLogTouch();
    toast('✓ Touch logged for ' + APP.ltPartnerName);
    APP.touches.push(data);
    renderHome();
  } catch(e) { toast('Error saving touch'); }
}

// ── NAV ───────────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  APP.screen = name;
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '—';
  var dt = new Date(d + 'T00:00:00');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[dt.getMonth()] + ' ' + dt.getDate();
}

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 3000);
}

// ── AUTH CALLBACK — handled by pre-declared window.appGoogleCb in <head> ──

window.appGoogleCb = function(r) {
  try {
    var p = JSON.parse(atob(r.credential.split('.')[1]));
    if (!p.email.endsWith('@jg-restoration.com')) {
      document.getElementById('login-err').textContent = 'Use your @jg-restoration.com account.';
      return;
    }
    var u = { name: p.name||p.given_name, email: p.email, picture: p.picture||'' };
    localStorage.setItem(_JG_KEY, JSON.stringify(u));
    localStorage.setItem(_JG_EXP, String(Date.now() + 43200000));
    initApp(u);
  } catch(e) {
    document.getElementById('login-err').textContent = 'Sign in failed — try again.';
  }
};

// ── START ─────────────────────────────────────────────────────────────────
// ── PWA INSTALL ───────────────────────────────────────────────────────────
var _deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  _deferredInstallPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  // Don't show if already installed
  if (window.matchMedia('(display-mode: standalone)').matches) return;
  if (localStorage.getItem('jg_install_dismissed')) return;
  var banner = document.getElementById('install-banner');
  if (!banner) return;
  // Detect platform for instructions
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  var instrEl = document.getElementById('install-instructions');
  if (isIOS && instrEl) {
    instrEl.textContent = 'Tap the Share button ↗ then "Add to Home Screen"';
    document.getElementById('install-btn').style.display = 'none'; // iOS can't use prompt
  }
  banner.style.display = 'flex';
}

function toggleHdrDropdown() {
  var dd = document.getElementById('hdr-dropdown');
  dd.classList.toggle('open');
  // Close when clicking outside
  if (dd.classList.contains('open')) {
    setTimeout(function() {
      document.addEventListener('click', function closeDD(e) {
        if (!dd.contains(e.target) && e.target.id !== 'hdr-avatar') {
          dd.classList.remove('open');
          document.removeEventListener('click', closeDD);
        }
      });
    }, 10);
  }
}

function signOut() {
  if (confirm('Sign out?')) {
    localStorage.removeItem('jg_platform_user');
    localStorage.removeItem('jg_platform_exp');
    window.location.reload();
  }
}

function showInstallHelp() {
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  var isSafari = /Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent);
  var msg = '';
  if (isIOS || isSafari) {
    msg = 'To install:\n1. Tap Share (Safari) or 3-dot menu (Chrome)\n2. Tap "Add to Home Screen"\n3. Tap "Add" or "Install"';
  } else {
    msg = 'To install on Android:\n1. Tap the 3-dot menu in Chrome\n2. Tap "Add to Home Screen"\n3. Tap "Install"';
  }
  alert(msg);
}

function triggerInstall() {
  if (_deferredInstallPrompt) {
    _deferredInstallPrompt.prompt();
    _deferredInstallPrompt.userChoice.then(function(r) {
      if (r.outcome === 'accepted') {
        document.getElementById('install-banner').style.display = 'none';
        localStorage.setItem('jg_install_dismissed', '1');
      }
      _deferredInstallPrompt = null;
    });
  }
}

document.addEventListener('DOMContentLoaded', function() {
  try {
    if (window._pendingAppUser) { dbg('pending user found'); initApp(window._pendingAppUser); window._pendingAppUser = null; return; }
      var u = checkAuth();
      if (u) { initApp(u); return; }
      var base = 'https://jgimprovements-arch.github.io/jg-dispatch/';
    var returnUrl = base + 'sales_app.html';
    window.location.replace(base + 'sales.html?return=' + encodeURIComponent(returnUrl));
  } catch(e) {
      document.body.innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#c62828;"><b>Error:</b> ' + e.message + '<br><br><pre>' + e.stack + '</pre><br><a href="sales.html">Go to Sales Dashboard</a></div>';
  }
});
</script>
