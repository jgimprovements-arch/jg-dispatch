<style>
  :root {
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --text-soft: #5a6478;
    --muted: #7884a0; --line: #e3e7f0; --navy: #0d2d5e; --orange: #e85d04;
    --gold: #f5a623; --green: #2d9c5f; --red: #d64545; --blue-primary: #2563eb;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html { color-scheme: light; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    overscroll-behavior-y: contain;
    padding-bottom: calc(72px + var(--safe-bottom));
  }

  .topbar {
    padding: calc(var(--safe-top) + 16px) 16px 8px;
    display: flex; align-items: center; gap: 12px;
    background: var(--bg);
  }
  .menu-btn { background: transparent; border: 0; padding: 6px; cursor: pointer; font-family: inherit; }
  .menu-btn svg { width: 24px; height: 24px; color: var(--navy); }
  .topbar-title { flex: 1; font-size: 20px; font-weight: 800; color: var(--navy); letter-spacing: -.3px; }
  .topbar-sub { font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 600; }
  .topbar-logo { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: var(--navy); }

  main { padding: 8px 14px 20px; max-width: 720px; margin: 0 auto; }

  /* Section headings */
  .section-label {
    font-size: 11px; font-weight: 800; color: var(--navy);
    text-transform: uppercase; letter-spacing: .8px;
    margin: 20px 0 8px; padding-left: 2px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .section-label-link {
    font-size: 11px; font-weight: 700; color: var(--orange);
    text-decoration: none; text-transform: none; letter-spacing: 0;
  }

  /* Stat cards row */
  .stat-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin-bottom: 6px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 14px 12px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: transform .1s, border-color .15s;
    display: block;
  }
  .stat-card:active { transform: scale(.98); border-color: var(--orange); }
  .stat-card .label {
    font-size: 10px; font-weight: 800; color: var(--muted);
    text-transform: uppercase; letter-spacing: .6px;
  }
  .stat-card .value {
    font-size: 28px; font-weight: 800; color: var(--navy); margin: 2px 0;
    letter-spacing: -.5px; line-height: 1;
  }
  .stat-card .sub { font-size: 11px; color: var(--text-soft); font-weight: 600; }
  .stat-card.orange .value { color: var(--orange); }
  .stat-card.green .value { color: var(--green); }
  .stat-card.red .value { color: var(--red); }

  /* Time clock (carpenter only) */
  .timeclock-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 4px;
  }
  .timeclock-card.clocked-in {
    background: linear-gradient(135deg, rgba(45,156,95,.08), rgba(45,156,95,.02));
    border-color: rgba(45,156,95,.3);
  }
  .timeclock-card .heading {
    display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;
  }
  .timeclock-card .heading-title { font-size: 12px; font-weight: 800; color: var(--navy); text-transform: uppercase; letter-spacing: .6px; }
  .timeclock-card .status {
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; white-space: nowrap;
  }
  .timeclock-card .status.in { background: rgba(45,156,95,.15); color: var(--green); }
  .timeclock-card .status.out { background: var(--bg); color: var(--muted); }
  .timeclock-card .current-job { font-size: 13px; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
  .timeclock-card .current-job b { color: var(--navy); }
  .timeclock-card .duration {
    font-size: 24px; font-weight: 800; color: var(--green);
    letter-spacing: -.3px; margin: 4px 0 10px;
  }
  .clock-btn {
    display: block; width: 100%; text-align: center;
    background: var(--blue-primary); color: #fff;
    padding: 13px; border-radius: 10px;
    font-size: 15px; font-weight: 800;
    text-decoration: none;
    border: 0; cursor: pointer; font-family: inherit;
  }
  .clock-btn.out { background: var(--red); }
  .clock-btn:active { transform: scale(.99); }

  /* List cards */
  .list-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 7px;
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: transform .1s, border-color .15s;
  }
  .list-card:active { transform: scale(.99); border-color: var(--orange); }
  .list-card .ico-wrap {
    width: 36px; height: 36px;
    background: var(--bg); border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .list-card .main { flex: 1; min-width: 0; }
  .list-card .title {
    font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.25;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .list-card .meta {
    font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .list-card .right {
    font-size: 11px; color: var(--muted); font-weight: 700; flex-shrink: 0;
  }
  .list-card .pill {
    font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: .3px;
    background: var(--bg); color: var(--muted); flex-shrink: 0;
  }
  .list-card .pill.overdue { background: rgba(214,69,69,.15); color: var(--red); }
  .list-card .pill.today { background: rgba(232,93,4,.15); color: var(--orange); }
  .list-card .pill.upcoming { background: rgba(245,166,35,.15); color: var(--gold); }
  .list-card .pill.in-progress { background: rgba(45,156,95,.15); color: var(--green); }
  .list-card .pill.unread { background: var(--orange); color: #fff; }

  /* Empty state */
  .empty {
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: 12px;
    padding: 24px 14px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }
  .empty b { color: var(--text); display: block; margin-bottom: 4px; font-size: 13px; }

  .loading { padding: 40px 14px; text-align: center; color: var(--muted); font-size: 13px; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--line);
    display: grid; grid-template-columns: repeat(5, 1fr);
    padding: 4px 0 calc(var(--safe-bottom) + 4px);
    z-index: 50;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--muted);
    background: transparent; border: 0;
    text-decoration: none; cursor: pointer;
    font-family: inherit; font-size: 10px; font-weight: 700;
    padding: 8px 0 4px;
    position: relative;
    gap: 2px;
  }
  .nav-item.on { color: var(--orange); }
  .nav-item.on::before {
    content: '';
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 24px; height: 3px; background: var(--orange); border-radius: 0 0 3px 3px;
  }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-item:active { color: var(--orange); }

  /* Side menu */
  .side-menu-back {
    position: fixed; inset: 0; background: rgba(13,45,94,.5);
    display: none; z-index: 99;
  }
  .side-menu-back.on { display: block; }
  .side-menu {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 280px;
    background: var(--card);
    transform: translateX(-100%); transition: transform .25s;
    z-index: 100;
    padding: calc(var(--safe-top) + 16px) 0 calc(var(--safe-bottom) + 16px);
    display: flex; flex-direction: column;
  }
  .side-menu.on { transform: translateX(0); }
  .side-menu .header { padding: 0 18px 16px; border-bottom: 1px solid var(--line); }
  .side-menu .name { font-size: 16px; font-weight: 800; color: var(--navy); }
  .side-menu .role { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }
  .side-menu .link {
    display: block; padding: 11px 18px;
    color: var(--text); text-decoration: none;
    font-size: 14px; font-weight: 600;
    border-bottom: 1px solid var(--line);
  }
  .side-menu .link:active { background: var(--bg); }
  .side-menu .link .ico { display: inline-block; width: 22px; margin-right: 6px; }
  .side-menu .signout {
    margin: auto 18px 0;
    background: var(--bg); color: var(--red);
    padding: 11px; text-align: center;
    border-radius: 9px;
    text-decoration: none;
    font-size: 13px; font-weight: 700;
    border: 1px solid var(--line);
  }
</style>
</head>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const sb = createClient(SB_URL, SB_ANON);

const ADMIN_EMAILS = new Set(['josh@jg-restoration.com', 'jgimprovements@gmail.com']);
const PM_EMAILS = new Set(['hannah@jg-restoration.com', 'kristina@jg-restoration.com', 'brent@jg-restoration.com', 'anthony@jg-restoration.com', 'ana@jg-restoration.com']);

const state = {
  email: null, name: null, role: null,
  employee: null,
  myProjectIds: new Set(),
  myTodos: [],
  todaysPhases: [],
  recentMessages: [],
  totalJobsCount: 0,
  clockedIn: false, clockInfo: null, clockStart: null,
};

const $ = sel => document.querySelector(sel);
const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function localISO(d = new Date()) {
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off * 60000);
  return local.toISOString().slice(0, 10);
}
function todayStr() { return localISO(new Date()); }
function greetingText() {
  const h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}
function fmtDate(d) {
  return new Date(d).toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
}
function relTime(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 7) return `${d}d ago`;
  return new Date(iso).toLocaleDateString();
}

async function init() {
  let user = null;
  try { user = JSON.parse(localStorage.getItem('jg_platform_user') || 'null'); } catch {}
  if (!user?.email) {
    location.href = 'hub.html';
    return;
  }
  state.email = user.email.toLowerCase();
  state.name = user.name || state.email.split('@')[0];
  state.role = ADMIN_EMAILS.has(state.email) ? 'admin'
    : PM_EMAILS.has(state.email) ? 'pm'
    : 'field';

  // Personalize topbar
  const first = (state.name || '').split(' ')[0] || '';
  $('#greeting').textContent = `${greetingText()}${first ? ', ' + first : ''}`;
  $('#dateLine').textContent = fmtDate(new Date());

  // Side menu
  $('#sideMenuName').textContent = state.name;
  $('#sideMenuRole').textContent = state.role === 'admin' ? 'Administrator' : state.role === 'pm' ? 'Project Manager' : 'Field Tech';
  if (state.role === 'field') {
    $('#adminTimeclockLink').style.display = 'none';
    $('#rebuildLink').style.display = 'none';
  }

  // Load employee record for field role queries
  const { data: emp } = await sb.from('employees')
    .select('id, name')
    .or(`email.eq.${state.email},personal_email.eq.${state.email}`)
    .maybeSingle();
  state.employee = emp || null;

  // Compute "my project IDs"
  await loadMyProjectIds();

  // Parallel load of dashboard data
  await Promise.all([
    loadTodaysSchedule(),
    loadRecentMessages(),
    loadMyTodos(),
    loadClockStatus(),
  ]);

  render();
  wireMenu();

  // Tick the clock duration every 30s
  setInterval(() => {
    if (state.clockedIn && state.clockStart) {
      const el = $('#clockDuration');
      if (el) el.textContent = clockDurationStr();
    }
  }, 30000);
}

async function loadMyProjectIds() {
  if (state.role === 'admin') {
    // Admin sees all — fetch IDs of all active projects
    const { data } = await sb.from('rebuild_projects')
      .select('id')
      .neq('albi_status_normalized', 'completed')
      .neq('albi_status_normalized', 'lost');
    state.myProjectIds = new Set((data || []).map(p => p.id));
    state.totalJobsCount = state.myProjectIds.size;
  } else if (state.role === 'pm') {
    const { data } = await sb.from('rebuild_projects')
      .select('id')
      .eq('albi_pm_email', state.email)
      .neq('albi_status_normalized', 'completed')
      .neq('albi_status_normalized', 'lost');
    state.myProjectIds = new Set((data || []).map(p => p.id));
    state.totalJobsCount = state.myProjectIds.size;
  } else {
    // Field tech — get projects via phase assignments
    if (!state.employee) { state.myProjectIds = new Set(); state.totalJobsCount = 0; return; }
    const { data } = await sb.from('rebuild_phase_assignees')
      .select('phase:rebuild_phases!inner(project_id, status)')
      .eq('employee_id', state.employee.id);
    const ids = new Set();
    (data || []).forEach(a => {
      if (a.phase?.project_id && a.phase?.status !== 'completed') {
        ids.add(a.phase.project_id);
      }
    });
    state.myProjectIds = ids;
    state.totalJobsCount = ids.size;
  }
}

async function loadTodaysSchedule() {
  const today = todayStr();
  if (!state.myProjectIds.size) { state.todaysPhases = []; return; }
  const projIds = Array.from(state.myProjectIds);

  let q = sb.from('rebuild_phases')
    .select('id, phase_name, status, scheduled_start, scheduled_end, project_id, project:rebuild_projects(albi_job_number, customer_name)')
    .in('project_id', projIds)
    .lte('scheduled_start', today)
    .gte('scheduled_end', today)
    .order('scheduled_start');

  // For field techs, also filter to phases they're assigned to
  if (state.role === 'field' && state.employee) {
    // Two-step: get their phase IDs first
    const { data: assigns } = await sb.from('rebuild_phase_assignees')
      .select('phase_id')
      .eq('employee_id', state.employee.id);
    const phaseIds = (assigns || []).map(a => a.phase_id);
    if (!phaseIds.length) { state.todaysPhases = []; return; }
    q = q.in('id', phaseIds);
  }

  const { data } = await q;
  state.todaysPhases = data || [];
}

async function loadRecentMessages() {
  if (!state.myProjectIds.size) { state.recentMessages = []; return; }
  const projIds = Array.from(state.myProjectIds);
  const { data } = await sb.from('rebuild_messages')
    .select('id, body, created_at, author_name, author_email, project_id, project:rebuild_projects(albi_job_number, customer_name)')
    .in('project_id', projIds)
    .order('created_at', { ascending: false })
    .limit(5);
  state.recentMessages = data || [];
}

async function loadMyTodos() {
  // mobile_todos.html stores assignments via the assignee field; mirror its logic
  if (state.role === 'admin' || state.role === 'pm') {
    // PMs and admins see todos they created OR todos on their projects
    if (!state.myProjectIds.size) { state.myTodos = []; return; }
    const projIds = Array.from(state.myProjectIds);
    const { data } = await sb.from('rebuild_todos')
      .select('id, title, due_date, completed, project_id, assignee_email, project:rebuild_projects(albi_job_number, customer_name)')
      .in('project_id', projIds)
      .eq('completed', false)
      .or(`assignee_email.eq.${state.email},assignee_email.is.null`)
      .order('due_date', { ascending: true, nullsFirst: false })
      .limit(20);
    state.myTodos = (data || []).slice(0, 5); // top 5 only on home
  } else {
    // Field techs see todos assigned to them
    const { data } = await sb.from('rebuild_todos')
      .select('id, title, due_date, completed, project_id, assignee_email, project:rebuild_projects(albi_job_number, customer_name)')
      .eq('assignee_email', state.email)
      .eq('completed', false)
      .order('due_date', { ascending: true, nullsFirst: false })
      .limit(5);
    state.myTodos = data || [];
  }
}

async function loadClockStatus() {
  if (!state.employee) { state.clockedIn = false; return; }
  const { data: open } = await sb.from('time_entries')
    .select('id, clock_in, project_id, project:rebuild_projects(albi_job_number, customer_name)')
    .eq('employee_id', state.employee.id)
    .is('clock_out', null)
    .order('clock_in', { ascending: false })
    .limit(1);
  if (open && open.length) {
    state.clockedIn = true;
    state.clockInfo = open[0];
    state.clockStart = open[0].clock_in;
  } else {
    state.clockedIn = false;
    state.clockInfo = null;
    state.clockStart = null;
  }
}

function clockDurationStr() {
  if (!state.clockStart) return '';
  const ms = Date.now() - new Date(state.clockStart).getTime();
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return `${h}h ${m}m`;
}

function render() {
  const main = $('#main');
  const showClock = state.role === 'field'; // carpenters/techs only, per request
  let html = '';

  // Time clock (carpenters only)
  if (showClock) {
    if (state.clockedIn) {
      const ci = state.clockInfo;
      const jobLabel = ci?.project?.albi_job_number || ci?.project?.customer_name || 'unassigned';
      html += `
        <div class="timeclock-card clocked-in">
          <div class="heading">
            <div class="heading-title">Time Clock</div>
            <span class="status in">● Clocked In</span>
          </div>
          <div class="current-job">On <b>${esc(jobLabel)}</b></div>
          <div class="duration" id="clockDuration">${clockDurationStr()}</div>
          <a href="timeclock.html" class="clock-btn out">Clock Out</a>
        </div>
      `;
    } else {
      html += `
        <div class="timeclock-card">
          <div class="heading">
            <div class="heading-title">Time Clock</div>
            <span class="status out">Clocked Out</span>
          </div>
          <a href="timeclock.html" class="clock-btn">Clock In</a>
        </div>
      `;
    }
  }

  // Stat tiles row
  const todosCount = state.myTodos.length;
  const overdueTodos = state.myTodos.filter(t => t.due_date && t.due_date < todayStr()).length;
  const todayCount = state.todaysPhases.length;
  html += `
    <div class="stat-row">
      <a href="project.html" class="stat-card">
        <div class="label">My Jobs</div>
        <div class="value">${state.totalJobsCount}</div>
        <div class="sub">${state.totalJobsCount === 1 ? 'active project' : 'active projects'}</div>
      </a>
      <a href="mobile_schedule.html" class="stat-card ${todayCount ? 'orange' : ''}">
        <div class="label">Today</div>
        <div class="value">${todayCount}</div>
        <div class="sub">${todayCount === 1 ? 'phase scheduled' : 'phases scheduled'}</div>
      </a>
    </div>
    <div class="stat-row">
      <a href="mobile_todos.html" class="stat-card ${overdueTodos ? 'red' : ''}">
        <div class="label">My To-Dos</div>
        <div class="value">${todosCount}</div>
        <div class="sub">${overdueTodos ? overdueTodos + ' overdue' : (todosCount === 1 ? 'item open' : 'items open')}</div>
      </a>
      <a href="mobile_schedule.html" class="stat-card">
        <div class="label">This Week</div>
        <div class="value">📅</div>
        <div class="sub">View schedule</div>
      </a>
    </div>
  `;

  // Today's schedule
  html += `
    <div class="section-label">
      Today's Schedule
      <a href="mobile_schedule.html" class="section-label-link">View week →</a>
    </div>
  `;
  if (state.todaysPhases.length) {
    html += state.todaysPhases.map(p => {
      const status = p.status || 'pending';
      const pillCls = status === 'in_progress' ? 'in-progress' : (status === 'completed' ? '' : 'today');
      return `
        <a href="project_detail.html?p=${esc(p.project_id)}" class="list-card">
          <div class="ico-wrap">🔨</div>
          <div class="main">
            <div class="title">${esc(p.phase_name)}</div>
            <div class="meta">${esc(p.project?.albi_job_number || p.project?.customer_name || '—')}</div>
          </div>
          <span class="pill ${pillCls}">${esc(status.replace('_',' '))}</span>
        </a>
      `;
    }).join('');
  } else {
    html += `<div class="empty"><b>Nothing on the schedule today</b>Enjoy the breather, or check tomorrow.</div>`;
  }

  // My To-Dos
  html += `
    <div class="section-label">
      My To-Dos
      <a href="mobile_todos.html" class="section-label-link">See all →</a>
    </div>
  `;
  if (state.myTodos.length) {
    html += state.myTodos.map(t => {
      const overdue = t.due_date && t.due_date < todayStr();
      const isToday = t.due_date === todayStr();
      let pillCls = 'upcoming', pillTxt = t.due_date ? new Date(t.due_date + 'T00:00').toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) : 'No date';
      if (overdue) { pillCls = 'overdue'; pillTxt = 'Overdue'; }
      else if (isToday) { pillCls = 'today'; pillTxt = 'Today'; }
      return `
        <a href="mobile_todos.html" class="list-card">
          <div class="ico-wrap">✓</div>
          <div class="main">
            <div class="title">${esc(t.title)}</div>
            <div class="meta">${esc(t.project?.albi_job_number || t.project?.customer_name || 'No project')}</div>
          </div>
          <span class="pill ${pillCls}">${esc(pillTxt)}</span>
        </a>
      `;
    }).join('');
  } else {
    html += `<div class="empty"><b>All caught up</b>No open to-dos. Tap + on a project to add one.</div>`;
  }

  // Recent Messages
  html += `
    <div class="section-label">Recent Messages</div>
  `;
  if (state.recentMessages.length) {
    html += state.recentMessages.map(m => {
      const body = (m.body || '').replace(/\s+/g, ' ').trim().slice(0, 80);
      const author = m.author_name || (m.author_email || '').split('@')[0] || 'someone';
      return `
        <a href="project_messages.html?p=${esc(m.project_id)}" class="list-card">
          <div class="ico-wrap">💬</div>
          <div class="main">
            <div class="title">${esc(body)}${m.body && m.body.length > 80 ? '…' : ''}</div>
            <div class="meta">${esc(author)} · ${esc(m.project?.albi_job_number || m.project?.customer_name || '—')}</div>
          </div>
          <span class="right">${esc(relTime(m.created_at))}</span>
        </a>
      `;
    }).join('');
  } else {
    html += `<div class="empty"><b>No recent messages</b>Messages from your projects will appear here.</div>`;
  }

  main.innerHTML = html;
}

function wireMenu() {
  $('#menuBtn').addEventListener('click', () => {
    $('#sideMenu').classList.add('on');
    $('#sideMenuBack').classList.add('on');
  });
  $('#sideMenuBack').addEventListener('click', () => {
    $('#sideMenu').classList.remove('on');
    $('#sideMenuBack').classList.remove('on');
  });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js', { scope: '/jg-dispatch/' }).catch(() => {});
}

init();
</script>
</body>
</html>
