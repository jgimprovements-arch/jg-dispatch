<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="jg-version-check.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d2d5e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Selections">
<link rel="manifest" href="manifest.json">
<title>Selections · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<style>
  :root {
    --bg: #f4f6fb; --card: #fff; --text: #1a2540; --muted: #7884a0;
    --line: #e3e7f0; --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623;
    --green: #2d9c5f; --red: #d64545;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding-bottom: var(--safe-bottom); }

  .topbar {
    background: var(--navy); color: #fff;
    padding: calc(var(--safe-top) + 14px) 16px 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.16);
    color: #fff;
    border-radius: 10px;
    padding: 7px 12px 7px 10px;
    font-size: 14px; font-weight: 600;
    text-decoration: none;
    flex-shrink: 0;
    font-family: inherit;
    line-height: 1;
    transition: background .15s;
  }
  .back-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .back-btn:active { background: rgba(255,255,255,.18); }
  .title { flex: 1; min-width: 0; }
  .title h1 { margin: 0; font-size: 17px; font-weight: 800; letter-spacing: -.3px; }
  .title .sub { font-size: 11px; color: rgba(255,255,255,.7); margin-top: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }

  main { padding: 14px; max-width: 720px; margin: 0 auto; }
  .info-banner { background: rgba(232,93,4,.08); border: 1px solid rgba(232,93,4,.2); color: var(--navy); padding: 10px 14px; border-radius: 10px; font-size: 12px; margin-bottom: 12px; line-height: 1.5; }

  .sel-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 10px; cursor: pointer; transition: transform .12s, box-shadow .12s; border-left-width: 4px; }
  .sel-card:active { transform: scale(.99); box-shadow: 0 2px 8px rgba(13,45,94,.06); }
  .sel-card.draft         { border-left-color: var(--muted); }
  .sel-card.awaiting_vendor { border-left-color: var(--gold); }
  .sel-card.awaiting_customer { border-left-color: var(--orange); }
  .sel-card.awaiting_customer_install { border-left-color: var(--orange); }
  .sel-card.customer_approved { border-left-color: var(--green); }
  .sel-card.complete      { border-left-color: var(--green); }
  .sel-card.cancelled     { border-left-color: var(--red); opacity: .7; }

  .sel-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .sel-category { font-size: 16px; font-weight: 800; color: var(--navy); letter-spacing: -.2px; }
  .sel-vendor { font-size: 13px; color: var(--text); margin-top: 3px; font-weight: 600; }
  .sel-meta { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

  .status-pill { font-size: 10px; font-weight: 800; padding: 3px 9px; border-radius: 999px; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; flex-shrink: 0; }
  .status-pill.draft         { background: rgba(120,132,160,.15); color: var(--muted); }
  .status-pill.awaiting_vendor { background: rgba(245,166,35,.18); color: #b87900; }
  .status-pill.awaiting_customer { background: rgba(232,93,4,.18); color: var(--orange); }
  .status-pill.awaiting_customer_install { background: rgba(232,93,4,.18); color: var(--orange); }
  .status-pill.customer_approved { background: rgba(45,156,95,.15); color: var(--green); }
  .status-pill.complete      { background: rgba(45,156,95,.18); color: var(--green); }
  .status-pill.cancelled     { background: rgba(214,69,69,.15); color: var(--red); }

  .empty { background: var(--card); border: 1px dashed var(--line); border-radius: 12px; padding: 36px 16px; text-align: center; }
  .empty .ico { font-size: 42px; opacity: .4; margin-bottom: 8px; }
  .empty h3 { color: var(--navy); margin: 0 0 4px; }
  .empty p { margin: 0; font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* Bottom sheet (selection detail) */
  .sheet-back { position: fixed; inset: 0; background: rgba(13,45,94,.55); z-index: 9999; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(2px); }
  .sheet { background: var(--card); width: 100%; max-width: 560px; max-height: 92vh; border-radius: 18px 18px 0 0; display: flex; flex-direction: column; box-shadow: 0 -8px 32px rgba(0,0,0,.2); }
  .sheet-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 14px 18px; border-bottom: 1px solid var(--line); gap: 12px; }
  .sheet-header h3 { margin: 0; font-size: 17px; color: var(--navy); font-weight: 800; }
  .sheet-header .sub { font-size: 11px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .4px; font-weight: 700; }
  .sheet-close { background: transparent; border: none; font-size: 22px; color: var(--muted); cursor: pointer; padding: 0 4px; }
  .sheet-body { padding: 16px 18px; overflow-y: auto; flex: 1; }
  .kv { display: grid; grid-template-columns: 110px 1fr; gap: 6px 12px; margin-bottom: 12px; }
  .kv dt { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; padding-top: 2px; }
  .kv dd { margin: 0; font-size: 14px; color: var(--text); }
  .sheet-section-label { font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 14px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--line); }
  .sheet-actions { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .sheet-actions .row { display: flex; gap: 8px; }
  .sheet-actions .row .sheet-btn { flex: 1; }
  .sheet-btn { padding: 11px 14px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid var(--line); background: var(--card); color: var(--text); font-family: inherit; text-align: center; transition: background .12s; }
  .sheet-btn:active { background: var(--bg); }
  .sheet-btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
  .sheet-btn.warn { background: var(--orange); color: #fff; border-color: var(--orange); }
  .sheet-footer { padding: 12px 18px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; }

  .toast { position: fixed; bottom: calc(var(--safe-bottom) + 20px); left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 16px rgba(13,45,94,.3); z-index: 10001; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.on { opacity: 1; }

  /* Floating Add button (PM only) */
  .fab {
    position: fixed; right: 18px; bottom: calc(var(--safe-bottom) + 100px);
    background: var(--orange); color: #fff;
    border: none; border-radius: 999px;
    padding: 13px 20px;
    font-size: 14px; font-weight: 800;
    box-shadow: 0 6px 20px rgba(232,93,4,.4);
    cursor: pointer;
    z-index: 200;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: inherit;
    transition: transform .12s, box-shadow .12s;
  }
  .fab:active { transform: scale(.96); box-shadow: 0 3px 10px rgba(232,93,4,.4); }
  .fab svg { width: 18px; height: 18px; }

  /* Form fields in sheet */
  .field { display: block; margin-bottom: 13px; }
  .field > .label { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
  .field input[type="text"], .field input[type="number"], .field input[type="date"], .field textarea, .field select {
    width: 100%; padding: 11px 12px;
    border: 1px solid var(--line); border-radius: 10px;
    font-size: 15px; background: var(--card); color: var(--text);
    font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 64px; }
  .field-row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
  .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* Photo uploader */
  .photo-uploader { display: flex; flex-direction: column; gap: 10px; }
  .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .photo-thumb { position: relative; aspect-ratio: 1; border-radius: 10px; overflow: hidden; background: var(--bg); border: 1px solid var(--line); }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-thumb .remove { position: absolute; top: 4px; right: 4px; background: rgba(0,0,0,.65); color: #fff; border: none; width: 22px; height: 22px; border-radius: 50%; font-size: 14px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
  .photo-thumb .uploading-overlay { position: absolute; inset: 0; background: rgba(13,45,94,.6); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
  .photo-add-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    aspect-ratio: 1; border-radius: 10px;
    background: rgba(232,93,4,.06);
    border: 2px dashed rgba(232,93,4,.4);
    color: var(--orange);
    font-size: 11px; font-weight: 700;
    cursor: pointer;
    gap: 4px;
    font-family: inherit;
  }
  .photo-add-btn:active { background: rgba(232,93,4,.12); }
  .photo-add-btn .ico { font-size: 22px; }
  .photo-input { display: none; }

  /* Photos in detail sheet (read-only) */
  .photo-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 6px; }
  .photo-strip a { aspect-ratio: 1; border-radius: 10px; overflow: hidden; background: var(--bg); border: 1px solid var(--line); display: block; }
  .photo-strip img { width: 100%; height: 100%; object-fit: cover; }

  /* jg-bottom-nav-padding */
  main, .with-bottom-nav { padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 84px) !important; }

  /* Bottom navigation — kept identical across every mobile sub-page so the
     5-tab anchor stays consistent as the user drills in and out. Hardcoded
     colors instead of CSS vars so this block drops cleanly into any file's
     existing variable scheme. */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #ffffff;
    border-top: 1px solid #e3e7f0;
    padding: 8px 4px calc(env(safe-area-inset-bottom, 0px) + 4px);
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    z-index: 50;
  }
  .bottom-nav .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 0;
    text-decoration: none;
    color: #7884a0;
    font-size: 11px;
    font-weight: 600;
    border: 0;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    transition: color .15s;
    position: relative;
  }
  .bottom-nav .nav-item.on { color: #e85d04; }
  .bottom-nav .nav-item.on::before {
    content: '';
    position: absolute;
    top: 0; left: 28%; right: 28%;
    height: 3px;
    background: #e85d04;
    border-radius: 0 0 4px 4px;
  }
  .bottom-nav .nav-item svg { width: 22px; height: 22px; }
  .bottom-nav .nav-item:active { color: #e85d04; }
</style>
</head>
<body>

<div class="topbar">
  <a href="#" class="back-btn" id="backBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Back</a>
  <div class="title">
    <h1 id="topJob">Selections</h1>
    <div class="sub" id="topSub">Loading…</div>
  </div>
</div>

<main id="main">
  <div class="empty"><p>Loading…</p></div>
</main>

<button class="fab" id="addSelFab" style="display:none;" type="button">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  Add Selection
</button>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const sb = createClient(SB_URL, SB_ANON);

// Zapier hook used by every other page on this app to push outbound email
// through the platform mailer. Re-using here keeps mobile-sent selections in
// the same audit trail as desktop-sent ones.
const MESSAGE_HOOK = 'https://hooks.zapier.com/hooks/catch/12653197/uzwjg6r/';
const ADMIN_EMAILS = new Set(['josh@jg-restoration.com','jgimprovements@gmail.com']);

const params = new URLSearchParams(window.location.search);
const projectId = params.get('p');

const state = { project: null, selections: [], subs: [], userEmail: null, canSend: false };

try {
  const u = JSON.parse(localStorage.getItem('jg_platform_user') || 'null');
  if (u?.email) state.userEmail = u.email.toLowerCase();
} catch {}

document.getElementById('backBtn').addEventListener('click', (e) => {
  e.preventDefault();
  if (window.history.length > 1 && document.referrer && new URL(document.referrer).origin === location.origin) {
    history.back();
  } else {
    location.href = 'project.html';
  }
});

const STATUS_LABEL = {
  draft: 'Draft',
  awaiting_vendor: 'Awaiting Vendor',
  awaiting_customer: 'Awaiting Customer',
  awaiting_customer_install: 'Awaiting Install Date',
  customer_approved: 'Customer Approved',
  vendor_approved: 'Vendor Confirmed',
  complete: 'Complete',
  cancelled: 'Cancelled',
};

const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDate = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
const fmtMoney = n => n == null ? '' : '$' + Number(n).toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:0});

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2200);
}

function showEmpty(title, msg) {
  document.getElementById('main').innerHTML = `<div class="empty"><div class="ico">📋</div><h3>${esc(title)}</h3><p>${esc(msg)}</p></div>`;
}

async function init() {
  if (!projectId) return showEmpty('Missing project', 'Open from project list');

  // Role lookup decides whether the user gets "Send" affordances. Carpenters,
  // techs, and any non-PM role see selections read-only — same gating
  // philosophy as the other PM-driven mobile pages.
  const empPromise = state.userEmail
    ? sb.from('employees')
        .select('id, role')
        .or(`email.eq.${state.userEmail},personal_email.eq.${state.userEmail}`)
        .maybeSingle()
    : Promise.resolve({ data: null });

  const [{ data: project }, { data: selections }, { data: subs }, empRes] = await Promise.all([
    sb.from('rebuild_projects').select('*').eq('id', projectId).maybeSingle(),
    sb.from('rebuild_selections').select('*, vendor_sub:rebuild_subs(id, company_name, primary_contact, email, phone)').eq('project_id', projectId).order('created_at', { ascending: false }),
    sb.from('rebuild_subs').select('id, company_name, primary_contact, email, phone').eq('active', true).order('company_name'),
    empPromise,
  ]);

  if (!project) return showEmpty('Project not found', 'It may have been deleted.');
  state.project = project;
  state.selections = selections || [];
  state.subs = subs || [];

  const emp = empRes?.data;
  if (emp) {
    const role = String(emp.role || '').toLowerCase();
    state.canSend = ADMIN_EMAILS.has(state.userEmail)
      || /admin|owner|project[ _-]?manager|\bpm\b/.test(role);
  } else {
    state.canSend = ADMIN_EMAILS.has(state.userEmail);
  }

  document.getElementById('topJob').textContent = `Selections · ${project.albi_job_number || ''}`;
  document.getElementById('topSub').textContent = project.customer_name || '';

  render();

  // Realtime: keep the list fresh if the desktop changes anything mid-session
  sb.channel('sels_' + projectId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rebuild_selections', filter: `project_id=eq.${projectId}` },
      async () => {
        const { data } = await sb.from('rebuild_selections').select('*, vendor_sub:rebuild_subs(id, company_name, primary_contact, email, phone)').eq('project_id', projectId).order('created_at', { ascending: false });
        state.selections = data || [];
        render();
      })
    .subscribe();
}

function render() {
  // FAB visibility tracks role
  const fab = document.getElementById('addSelFab');
  if (fab) {
    fab.style.display = state.canSend ? '' : 'none';
    fab.onclick = openAddSheet;
  }

  const sels = (state.selections || []).filter(s => s.status !== 'cancelled' || state.canSend);

  if (!sels.length) {
    document.getElementById('main').innerHTML = `
      <div class="empty">
        <div class="ico">🎨</div>
        <h3>No selections yet</h3>
        <p>${state.canSend
          ? 'Tap the orange <b>+ Add Selection</b> button to create one.'
          : 'When your PM creates selections for finishes and materials, they\'ll appear here.'}</p>
      </div>
    `;
    return;
  }

  const banner = !state.canSend
    ? `<div class="info-banner">View-only — your PM manages selections from the desktop app.</div>`
    : '';

  document.getElementById('main').innerHTML = banner + sels.map(selCard).join('');

  document.querySelectorAll('[data-sel-id]').forEach(el => {
    el.addEventListener('click', () => openSheet(el.dataset.selId));
  });
}

function selCard(s) {
  const status = s.status || 'draft';
  const vendor = s.vendor_sub?.company_name || s.vendor_name || 'No vendor set';
  const metaBits = [];
  if (s.sku) metaBits.push('SKU ' + esc(s.sku));
  if (s.quantity) metaBits.push(s.quantity + (s.unit ? ' ' + esc(s.unit) : ''));
  if (s.unit_price) metaBits.push(fmtMoney(s.unit_price));
  if (s.approved_install_date) metaBits.push('Install ' + fmtDate(s.approved_install_date));

  return `
    <div class="sel-card ${status}" data-sel-id="${s.id}">
      <div class="sel-top">
        <div style="flex:1;min-width:0;">
          <div class="sel-category">${esc(s.category || 'Selection')}</div>
          <div class="sel-vendor">${esc(vendor)}</div>
        </div>
        <div class="status-pill ${status}">${esc(STATUS_LABEL[status] || status)}</div>
      </div>
      ${metaBits.length ? `<div class="sel-meta">${metaBits.join(' · ')}</div>` : ''}
    </div>
  `;
}

// ─── Detail sheet ──────────────────────────────────────────────────────────
function openSheet(selId) {
  const s = state.selections.find(x => x.id === selId);
  if (!s) return;
  const status = s.status || 'draft';
  const vendor = s.vendor_sub?.company_name || s.vendor_name || '—';
  const project = state.project;

  const existing = document.getElementById('selSheet');
  if (existing) existing.remove();

  // Action buttons depend on status and role. Non-senders see info only.
  const customerToken = s.customer_token;
  const vendorToken   = s.vendor_token;
  const approvalUrl   = customerToken
    ? `${location.origin}${location.pathname.replace(/[^/]*$/, '')}approval.html?t=${customerToken}`
    : null;
  const installApprovalUrl = customerToken
    ? `${location.origin}${location.pathname.replace(/[^/]*$/, '')}install_approval.html?t=${customerToken}`
    : null;
  const vendorUrl = vendorToken
    ? `${location.origin}${location.pathname.replace(/[^/]*$/, '')}vendor.html?t=${vendorToken}`
    : null;

  const actions = [];
  if (state.canSend) {
    // Edit is the most common follow-up action — put it first
    actions.push({ act: 'edit', label: '✏️ Edit Selection', cls: 'primary' });

    // Always-available
    if (approvalUrl) actions.push({ act: 'copy-customer', label: '🔗 Copy Customer Approval Link', cls: '' });
    if (installApprovalUrl) actions.push({ act: 'copy-install', label: '🔗 Copy Install Date Link', cls: '' });
    if (vendorUrl) actions.push({ act: 'copy-vendor', label: '🔗 Copy Vendor Link', cls: '' });

    // Send actions
    if (project.customer_email && approvalUrl && (status === 'draft' || status === 'awaiting_customer')) {
      actions.push({ act: 'send-customer-approval', label: `📧 Send to ${esc(project.customer_name || 'customer')} for approval`, cls: 'warn' });
    }
    if (project.customer_email && installApprovalUrl && (status === 'awaiting_customer_install' || status === 'vendor_approved')) {
      actions.push({ act: 'send-customer-install', label: `📧 Send install date to ${esc(project.customer_name || 'customer')}`, cls: 'warn' });
    }
    const vendorEmail = s.vendor_sub?.email || s.vendor_email;
    if (vendorEmail && vendorUrl && (status === 'draft' || status === 'customer_approved' || status === 'awaiting_vendor')) {
      actions.push({ act: 'send-vendor', label: `📧 Send to ${esc(vendor)}`, cls: 'primary' });
    }
  }

  document.body.insertAdjacentHTML('beforeend', `
    <div id="selSheet" class="sheet-back">
      <div class="sheet">
        <div class="sheet-header">
          <div style="min-width:0;">
            <h3>${esc(s.category || 'Selection')}</h3>
            <div class="sub">${esc(STATUS_LABEL[status] || status)}</div>
          </div>
          <button class="sheet-close" id="selSheetX">&times;</button>
        </div>
        <div class="sheet-body">
          <dl class="kv">
            <dt>Vendor</dt><dd>${esc(vendor)}</dd>
            ${s.sku ? `<dt>SKU</dt><dd>${esc(s.sku)}</dd>` : ''}
            ${s.quantity ? `<dt>Quantity</dt><dd>${esc(s.quantity)}${s.unit ? ' ' + esc(s.unit) : ''}</dd>` : ''}
            ${s.unit_price ? `<dt>Unit Price</dt><dd>${fmtMoney(s.unit_price)}</dd>` : ''}
            ${s.total_price ? `<dt>Total</dt><dd>${fmtMoney(s.total_price)}</dd>` : ''}
            ${s.approved_install_date ? `<dt>Install Date</dt><dd>${fmtDate(s.approved_install_date)}</dd>` : ''}
            ${s.customer_notes ? `<dt>Customer Notes</dt><dd>${esc(s.customer_notes)}</dd>` : ''}
            ${s.internal_notes && state.canSend ? `<dt>Internal Notes</dt><dd>${esc(s.internal_notes)}</dd>` : ''}
          </dl>

          ${(s.attachment_urls && s.attachment_urls.length) ? `
            <div class="sheet-section-label">Photos</div>
            <div class="photo-strip">
              ${s.attachment_urls.map(url => `<a href="${esc(url)}" target="_blank" rel="noopener"><img src="${esc(url)}" alt="Selection photo" loading="lazy"></a>`).join('')}
            </div>
          ` : ''}

          ${actions.length ? `
            <div class="sheet-section-label">Actions</div>
            <div class="sheet-actions">
              ${actions.map(a => `<button class="sheet-btn ${a.cls}" data-sel-act="${a.act}">${a.label}</button>`).join('')}
            </div>
          ` : ''}

          ${!state.canSend ? `<div class="info-banner" style="margin-top:14px;">View-only — your PM controls sending.</div>` : ''}
        </div>
        <div class="sheet-footer">
          <button class="sheet-btn" id="selSheetClose">Close</button>
        </div>
      </div>
    </div>
  `);

  const sheet = document.getElementById('selSheet');
  const close = () => sheet.remove();
  sheet.addEventListener('click', e => { if (e.target === sheet) close(); });
  document.getElementById('selSheetX').addEventListener('click', close);
  document.getElementById('selSheetClose').addEventListener('click', close);

  document.querySelectorAll('[data-sel-act]').forEach(btn => {
    btn.addEventListener('click', () => handleSelAction(btn.dataset.selAct, s, { approvalUrl, installApprovalUrl, vendorUrl }));
  });
}

// ─── Action handlers ───────────────────────────────────────────────────────
async function handleSelAction(act, s, urls) {
  if (act === 'edit')          return openEditorSheet(s);
  if (act === 'copy-customer') return copy(urls.approvalUrl, 'Customer approval link copied');
  if (act === 'copy-install')  return copy(urls.installApprovalUrl, 'Install date link copied');
  if (act === 'copy-vendor')   return copy(urls.vendorUrl, 'Vendor link copied');

  if (act === 'send-customer-approval') return sendCustomerApproval(s, urls.approvalUrl);
  if (act === 'send-customer-install')  return sendCustomerInstall(s, urls.installApprovalUrl);
  if (act === 'send-vendor')            return sendVendor(s, urls.vendorUrl);
}

async function copy(url, msg) {
  if (!url) { toast('No link available'); return; }
  try { await navigator.clipboard.writeText(url); toast(msg); }
  catch { toast('Copy failed — link: ' + url); }
}

async function sendCustomerApproval(s, url) {
  const p = state.project;
  if (!p.customer_email) { toast('No customer email on file'); return; }
  if (!confirm(`Send ${s.category} selection to ${p.customer_name} (${p.customer_email}) for approval?`)) return;

  const firstName = (p.customer_name || '').split(' ')[0] || 'there';
  const vendor = s.vendor_sub?.company_name || s.vendor_name || 'our vendor';
  const subject = `Selection for your approval — ${s.category}`;
  const body = `Hi ${firstName},\n\nWe have a ${s.category} selection from ${vendor} ready for your review and approval. Please take a moment to look it over and confirm or request changes here:\n\n${url}\n\nIf anything looks off, reply to this email or call me directly.\n\nThanks,\nJG Restoration`;

  await fireHook(s, p, p.customer_email, p.customer_name, 'customer', subject, body);
  await sb.from('rebuild_selections').update({ status: 'awaiting_customer' }).eq('id', s.id);
  await sb.from('rebuild_selections_history').insert({
    selection_id: s.id, action: 'sent_to_customer', actor: state.userEmail || 'mobile-pwa',
    details: `Customer approval link sent · ${p.customer_email}`,
  });
  document.getElementById('selSheet')?.remove();
  toast('Sent to customer');
}

async function sendCustomerInstall(s, url) {
  const p = state.project;
  if (!p.customer_email) { toast('No customer email on file'); return; }
  if (!s.approved_install_date) { toast('Set the install date on desktop first'); return; }
  if (!confirm(`Send install date (${fmtDate(s.approved_install_date)}) to ${p.customer_name}?`)) return;

  const firstName = (p.customer_name || '').split(' ')[0] || 'there';
  const vendor = s.vendor_sub?.company_name || s.vendor_name || 'our vendor';
  const subject = `Install date approval — ${s.category}`;
  const body = `Hi ${firstName},\n\n${vendor} has confirmed your ${s.category} and is ready to schedule installation on ${fmtDate(s.approved_install_date)}.\n\nPlease review and confirm here:\n\n${url}\n\nIf this date doesn't work, you can request a different one through the link or call me directly.\n\nThanks,\nJG Restoration`;

  await fireHook(s, p, p.customer_email, p.customer_name, 'customer', subject, body);
  await sb.from('rebuild_selections_history').insert({
    selection_id: s.id, action: 'install_sent_to_customer', actor: state.userEmail || 'mobile-pwa',
    details: `Install date sent to customer: ${fmtDate(s.approved_install_date)}`,
  });
  document.getElementById('selSheet')?.remove();
  toast('Install date sent');
}

async function sendVendor(s, url) {
  const p = state.project;
  const vendorEmail = s.vendor_sub?.email || s.vendor_email;
  const vendorName = s.vendor_sub?.company_name || s.vendor_name || 'Vendor';
  if (!vendorEmail) { toast('No vendor email on file'); return; }
  if (!confirm(`Send ${s.category} selection request to ${vendorName} (${vendorEmail})?`)) return;

  const contact = s.vendor_sub?.primary_contact || vendorName;
  const subject = `Selection request — ${p.albi_job_number || ''} · ${s.category}`;
  const body = `Hi ${contact.split(' ')[0]},\n\nWe have a selection for project ${p.albi_job_number || ''} (${p.customer_name || ''}). Please review the customer's choice and confirm pricing, lead time, and install availability here:\n\n${url}\n\nThanks,\nJG Restoration`;

  await fireHook(s, p, vendorEmail, vendorName, 'sub', subject, body);
  await sb.from('rebuild_selections').update({ status: 'awaiting_vendor' }).eq('id', s.id);
  await sb.from('rebuild_selections_history').insert({
    selection_id: s.id, action: 'sent_to_vendor', actor: state.userEmail || 'mobile-pwa',
    details: `Vendor link sent · ${vendorEmail}`,
  });
  document.getElementById('selSheet')?.remove();
  toast('Sent to vendor');
}

async function fireHook(s, p, toEmail, toName, recipientType, subject, body) {
  // Log the outbound message for the audit trail BEFORE firing, then mark
  // sent after the hook returns. Same pattern as the WO reminder send so the
  // M&A diligence story stays consistent across mobile and desktop.
  const { data: msgData } = await sb.from('rebuild_messages').insert({
    project_id: p.id, recipient_type: recipientType,
    recipient_name: toName, recipient_email: toEmail,
    channel: 'email', direction: 'outbound', subject, body,
    sent_by_email: state.userEmail || p.albi_pm_email,
    sent_by_name: state.userEmail || 'JG Restoration', status: 'queued',
  }).select();

  try {
    await fetch(MESSAGE_HOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      mode: 'no-cors',
      body: JSON.stringify({
        message_id: msgData?.[0]?.id, project_id: p.id, albi_project_id: p.albi_project_id,
        job_number: p.albi_job_number, channel: 'email', to_email: toEmail,
        from_email: state.userEmail || p.albi_pm_email || 'info@jg-restoration.com',
        from_name: p.albi_pm_name || 'JG Restoration',
        recipient_name: toName, recipient_type: recipientType,
        subject, body, attachment_count: 0, attachment_urls: '',
      }),
    });
    if (msgData?.[0]) await sb.from('rebuild_messages').update({ status: 'sent' }).eq('id', msgData[0].id);
  } catch (e) { console.error('hook fire failed:', e); }
}

// ─── Add / Edit Selection sheet ────────────────────────────────────────────
// PM/admin-only. Single sheet covers both create and edit modes — if a
// selection is passed in, the form is pre-filled and Save runs an UPDATE
// instead of an INSERT. Photo lists track existing URLs (removable) and
// newly-staged File objects (uploaded on save) separately.
let _editorNewFiles = []; // staged File objects pending upload
let _editorExistingUrls = []; // already-uploaded photo URLs currently on the selection
let _editorMode = 'create'; // 'create' | 'edit'
let _editorSelectionId = null;

function openAddSheet() {
  openEditorSheet(null);
}

function openEditorSheet(selection) {
  _editorMode = selection ? 'edit' : 'create';
  _editorSelectionId = selection?.id || null;
  _editorNewFiles = [];
  _editorExistingUrls = Array.isArray(selection?.attachment_urls) ? [...selection.attachment_urls] : [];

  // Close the detail sheet if we're transitioning into edit from it
  document.getElementById('selSheet')?.remove();
  document.getElementById('selAddSheet')?.remove();

  // Sub options for the vendor picker. Keeps the link to canonical sub
  // profile (vendor_sub_id) so the same vendor doesn't end up free-text-only
  // when it's already in the subs roster.
  const subOptions = state.subs.map(s =>
    `<option value="${esc(s.id)}"${selection?.vendor_sub_id === s.id ? ' selected' : ''}>${esc(s.company_name)}${s.primary_contact ? ' · ' + esc(s.primary_contact) : ''}</option>`
  ).join('');

  const title = _editorMode === 'edit' ? 'Edit Selection' : 'Add Selection';
  const saveLabel = _editorMode === 'edit' ? 'Save Changes' : 'Save Selection';

  document.body.insertAdjacentHTML('beforeend', `
    <div id="selAddSheet" class="sheet-back">
      <div class="sheet">
        <div class="sheet-header">
          <div style="min-width:0;">
            <h3>${title}</h3>
            <div class="sub">${esc(state.project.albi_job_number || '')} · ${esc(state.project.customer_name || '')}</div>
          </div>
          <button class="sheet-close" id="addSheetX" type="button">&times;</button>
        </div>
        <div class="sheet-body">
          <div class="field">
            <div class="label">Category *</div>
            <input type="text" id="addCategory" placeholder="e.g. Flooring, Cabinets, Countertops, Paint" autocomplete="off" value="${esc(selection?.category || '')}">
          </div>

          <div class="field">
            <div class="label">Vendor</div>
            <select id="addVendorSub">
              <option value="">— Pick from subs, or type below —</option>
              ${subOptions}
            </select>
          </div>

          <div class="field">
            <div class="label">Vendor name (if not in list)</div>
            <input type="text" id="addVendorName" placeholder="Free-text vendor name" autocomplete="off" value="${esc(selection?.vendor_name || '')}">
          </div>

          <div class="field">
            <div class="label">SKU / Product code</div>
            <input type="text" id="addSku" placeholder="Optional" autocomplete="off" value="${esc(selection?.sku || '')}">
          </div>

          <div class="field-row-3">
            <div class="field">
              <div class="label">Qty</div>
              <input type="number" id="addQty" step="0.01" min="0" value="${selection?.quantity ?? ''}">
            </div>
            <div class="field">
              <div class="label">Unit</div>
              <input type="text" id="addUnit" placeholder="SF, EA, LF" value="${esc(selection?.unit || '')}">
            </div>
            <div class="field">
              <div class="label">Unit $</div>
              <input type="number" id="addUnitPrice" step="0.01" min="0" value="${selection?.unit_price ?? ''}">
            </div>
          </div>

          <div class="field">
            <div class="label">Customer notes (visible to customer)</div>
            <textarea id="addCustomerNotes" placeholder="What the customer should know">${esc(selection?.customer_notes || '')}</textarea>
          </div>

          <div class="field">
            <div class="label">Internal notes</div>
            <textarea id="addInternalNotes" placeholder="Only PMs see this">${esc(selection?.internal_notes || '')}</textarea>
          </div>

          <div class="field">
            <div class="label">Photos</div>
            <div class="photo-uploader">
              <div class="photo-grid" id="photoGrid"></div>
              <input type="file" class="photo-input" id="photoInput" accept="image/*" multiple>
            </div>
          </div>
        </div>
        <div class="sheet-footer" style="justify-content:space-between;">
          <button class="sheet-btn" id="addSheetCancel" type="button">Cancel</button>
          <button class="sheet-btn primary" id="addSheetSave" type="button">${saveLabel}</button>
        </div>
      </div>
    </div>
  `);

  renderPhotoThumbs();

  const sheet = document.getElementById('selAddSheet');
  const close = () => { sheet.remove(); _editorNewFiles = []; _editorExistingUrls = []; };
  sheet.addEventListener('click', e => { if (e.target === sheet) close(); });
  document.getElementById('addSheetX').addEventListener('click', close);
  document.getElementById('addSheetCancel').addEventListener('click', close);
  document.getElementById('addSheetSave').addEventListener('click', () => saveSelection(close));

  // Photo input wiring (input element is rebuilt by renderPhotoThumbs siblings; the input itself stays)
  const photoInput = document.getElementById('photoInput');
  photoInput.addEventListener('change', e => {
    const files = Array.from(e.target.files || []);
    files.forEach(f => _editorNewFiles.push(f));
    e.target.value = '';
    renderPhotoThumbs();
  });

  // Mutual-exclusion hint between vendor dropdown and free-text field — if a
  // sub is picked, clear the free-text vendor name and vice versa, so we
  // don't store both and have ambiguity later.
  const vendorSel = document.getElementById('addVendorSub');
  const vendorName = document.getElementById('addVendorName');
  vendorSel.addEventListener('change', () => { if (vendorSel.value) vendorName.value = ''; });
  vendorName.addEventListener('input', () => { if (vendorName.value) vendorSel.value = ''; });
}

function renderPhotoThumbs() {
  const grid = document.getElementById('photoGrid');
  if (!grid) return;

  // Existing photos (already uploaded — URLs only)
  const existingHtml = _editorExistingUrls.map((url, idx) => `
    <div class="photo-thumb" data-existing-idx="${idx}">
      <img src="${esc(url)}" alt="Photo">
      <button type="button" class="remove" data-remove-existing="${idx}" title="Remove">&times;</button>
    </div>
  `).join('');

  // New photos (File objects, blob URLs)
  const newHtml = _editorNewFiles.map((f, idx) => {
    const url = URL.createObjectURL(f);
    return `
      <div class="photo-thumb" data-new-idx="${idx}">
        <img src="${url}" alt="Photo">
        <button type="button" class="remove" data-remove-new="${idx}" title="Remove">&times;</button>
      </div>
    `;
  }).join('');

  grid.innerHTML = existingHtml + newHtml + `
    <button type="button" class="photo-add-btn" id="photoAddBtn">
      <span class="ico">📷</span>
      <span>${(_editorExistingUrls.length + _editorNewFiles.length) ? 'Add more' : 'Take or upload'}</span>
    </button>
  `;

  // Re-wire add + remove buttons (innerHTML replaced everything inside grid)
  document.getElementById('photoAddBtn').addEventListener('click', () => document.getElementById('photoInput').click());
  grid.querySelectorAll('[data-remove-existing]').forEach(btn => {
    btn.addEventListener('click', () => {
      _editorExistingUrls.splice(parseInt(btn.dataset.removeExisting, 10), 1);
      renderPhotoThumbs();
    });
  });
  grid.querySelectorAll('[data-remove-new]').forEach(btn => {
    btn.addEventListener('click', () => {
      _editorNewFiles.splice(parseInt(btn.dataset.removeNew, 10), 1);
      renderPhotoThumbs();
    });
  });
}

async function saveSelection(closeFn) {
  const category = document.getElementById('addCategory').value.trim();
  if (!category) { toast('Category is required'); return; }

  const vendorSubId = document.getElementById('addVendorSub').value || null;
  const vendorName  = document.getElementById('addVendorName').value.trim() || null;
  const sku         = document.getElementById('addSku').value.trim() || null;
  const qty         = parseFloat(document.getElementById('addQty').value) || null;
  const unit        = document.getElementById('addUnit').value.trim() || null;
  const unitPrice   = parseFloat(document.getElementById('addUnitPrice').value) || null;
  const totalPrice  = (qty && unitPrice) ? +(qty * unitPrice).toFixed(2) : null;
  const customerNotes = document.getElementById('addCustomerNotes').value.trim() || null;
  const internalNotes = document.getElementById('addInternalNotes').value.trim() || null;

  const saveBtn = document.getElementById('addSheetSave');
  saveBtn.disabled = true;
  saveBtn.textContent = _editorNewFiles.length ? 'Uploading…' : 'Saving…';

  // Upload any new photos first; their URLs land alongside the kept-existing
  // ones in attachment_urls. Removed existing photos drop off the array
  // (storage objects stay — cleanup is a separate concern, intentional so a
  // misclick doesn't permanently destroy a customer record).
  const uploadedUrls = [];
  for (let i = 0; i < _editorNewFiles.length; i++) {
    saveBtn.textContent = `Uploading ${i + 1}/${_editorNewFiles.length}…`;
    const url = await uploadSelectionPhoto(_editorNewFiles[i]);
    if (url) uploadedUrls.push(url);
  }
  saveBtn.textContent = 'Saving…';

  const combinedUrls = [..._editorExistingUrls, ...uploadedUrls];

  const payload = {
    category,
    vendor_sub_id: vendorSubId,
    vendor_name: vendorName,
    sku,
    quantity: qty,
    unit,
    unit_price: unitPrice,
    total_price: totalPrice,
    customer_notes: customerNotes,
    internal_notes: internalNotes,
    attachment_urls: combinedUrls.length ? combinedUrls : null,
  };

  let rows, error;
  if (_editorMode === 'edit' && _editorSelectionId) {
    ({ data: rows, error } = await sb.from('rebuild_selections')
      .update(payload)
      .eq('id', _editorSelectionId)
      .select('*, vendor_sub:rebuild_subs(id, company_name, primary_contact, email, phone)'));
  } else {
    ({ data: rows, error } = await sb.from('rebuild_selections')
      .insert({
        ...payload,
        project_id: projectId,
        status: 'draft',
        created_by: state.userEmail || 'mobile-pwa',
      })
      .select('*, vendor_sub:rebuild_subs(id, company_name, primary_contact, email, phone)'));
  }

  if (error) {
    console.error(error);
    saveBtn.disabled = false;
    saveBtn.textContent = _editorMode === 'edit' ? 'Save Changes' : 'Save Selection';
    toast('Save failed: ' + error.message);
    return;
  }

  // Audit log — separate action for create vs edit so M&A diligence can see
  // who changed what when.
  if (rows?.[0]) {
    const action = _editorMode === 'edit' ? 'edited' : 'created';
    const detailParts = [category];
    if (uploadedUrls.length) detailParts.push(`+${uploadedUrls.length} photo${uploadedUrls.length === 1 ? '' : 's'}`);
    if (_editorMode === 'edit' && _editorExistingUrls.length < (rows[0].attachment_urls?.length || 0) === false) {
      // (we removed some — note it)
    }
    sb.from('rebuild_selections_history').insert({
      selection_id: rows[0].id,
      action,
      actor: state.userEmail || 'mobile-pwa',
      details: `${_editorMode === 'edit' ? 'Edited from mobile' : 'Created from mobile'} · ${detailParts.join(' · ')}`,
    }).then(({ error: histErr }) => { if (histErr) console.warn('history log failed:', histErr); });
  }

  // Optimistic state update so the change shows immediately without waiting
  // for the realtime channel.
  if (rows?.[0]) {
    if (_editorMode === 'edit') {
      const idx = state.selections.findIndex(x => x.id === rows[0].id);
      if (idx >= 0) state.selections[idx] = rows[0];
    } else {
      state.selections = [rows[0], ...state.selections];
    }
  }
  closeFn();
  render();
  toast(_editorMode === 'edit' ? 'Selection updated' : `Added — ${category}`);
}

async function uploadSelectionPhoto(file) {
  try {
    const safe = (file.name || 'photo').replace(/[^a-zA-Z0-9._-]/g, '_');
    const path = `projects/${projectId}/selections/${Date.now()}-${safe}`;
    const { error: upErr } = await sb.storage.from('rebuild-documents').upload(path, file, {
      contentType: file.type || 'image/jpeg',
      upsert: false,
    });
    if (upErr) { console.error('photo upload:', upErr); return null; }
    const { data: urlData } = sb.storage.from('rebuild-documents').getPublicUrl(path);
    return urlData.publicUrl;
  } catch (e) {
    console.error('photo upload exception:', e);
    return null;
  }
}

init();
</script>
