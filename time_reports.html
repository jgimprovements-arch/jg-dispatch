<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JG Time Reports</title>
<link rel="icon" type="image/png" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<link rel="apple-touch-icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d2d5e;
  --navy-deep: #08203f;
  --orange: #e85d04;
  --gold: #f5a623;
  --bg: #f7f9fc;
  --card: #ffffff;
  --border: #e1e5ec;
  --muted: #6b82a0;
  --text: #1a2942;
  --green: #22a66c;
  --red: #c62828;
  --yellow: #ff9800;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
}

/* LOGIN SCREEN */
#login-screen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-deep) 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000; color: #fff; padding: 20px;
}
#login-screen.hide { display: none; }
.login-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.login-sub { font-size: 13px; color: rgba(255,255,255,.65); margin-bottom: 28px; }
.login-err { font-size: 12px; color: #ff8a8a; margin-top: 12px; min-height: 18px; text-align: center; max-width: 320px; }

/* HEADER */
.hdr {
  background: var(--navy);
  color: #fff;
  padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
}
.hdr-left { display: flex; align-items: center; gap: 14px; }
.hdr-mark {
  background: var(--orange); color: #fff;
  width: 38px; height: 38px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px;
  letter-spacing: .02em;
}
.hdr-logo {
  height: 44px;
  width: auto;
  border-radius: 6px;
  background: #fff;
  padding: 4px 8px;
  object-fit: contain;
  display: block;
}
.hdr-title { font-size: 17px; font-weight: 700; letter-spacing: .01em; }
.hdr-right { display: flex; align-items: center; gap: 14px; font-size: 12px; color: rgba(255,255,255,.85); }
.btn-back {
  background: rgba(255,255,255,.1);
  border: 1px solid rgba(255,255,255,.2);
  color: #fff;
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  font-family: inherit;
}
.btn-back:hover { background: rgba(255,255,255,.18); }

/* MAIN LAYOUT */
.wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

.section-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}

/* JOB PICKER CARD */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 18px;
}

.search-input {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color .15s;
  box-sizing: border-box;
}
.search-input:focus { border-color: var(--navy); }

.job-list {
  margin-top: 12px;
  max-height: 280px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fbfcfe;
}
.job-row {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: background .1s;
}
.job-row:last-child { border-bottom: none; }
.job-row:hover { background: rgba(13,45,94,.04); }
.job-row.selected { background: rgba(232,93,4,.08); border-left: 3px solid var(--orange); padding-left: 11px; }
.job-row-name { font-weight: 600; font-size: 13px; color: var(--text); }
.job-row-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.job-row-stats { font-size: 11px; color: var(--navy); font-weight: 600; }

/* DATE RANGE */
.date-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.date-preset {
  background: #fff;
  border: 1.5px solid var(--border);
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  transition: all .12s;
}
.date-preset:hover { border-color: var(--navy); }
.date-preset.active { background: var(--navy); color: #fff; border-color: var(--navy); }
.date-input {
  padding: 8px 10px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-family: inherit;
  font-size: 12px;
  outline: none;
}
.date-input:focus { border-color: var(--navy); }
.date-label { font-size: 11px; color: var(--muted); font-weight: 600; }

/* RUN BUTTON */
.btn-primary {
  background: var(--orange);
  color: #fff;
  border: none;
  padding: 11px 22px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s;
}
.btn-primary:hover { opacity: .92; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-secondary {
  background: var(--navy);
  color: #fff;
  border: none;
  padding: 11px 22px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.btn-secondary:hover { opacity: .92; }
.btn-secondary:disabled { opacity: .5; cursor: not-allowed; }

/* REPORT */
#report-section { display: none; }
.report-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px;
  background: var(--navy);
  color: #fff;
  border-radius: 12px 12px 0 0;
  flex-wrap: wrap;
  gap: 12px;
}
.report-title-block { flex: 1; min-width: 250px; }
.report-job-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.report-job-id { font-size: 12px; color: rgba(255,255,255,.7); }
.report-actions { display: flex; gap: 8px; }

.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.summary-stat {
  background: #fff;
  padding: 14px 16px;
}
.summary-stat-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 4px;
}
.summary-stat-val {
  font-size: 22px; font-weight: 700; color: var(--navy);
  font-family: 'DM Mono', monospace;
}

/* TABLE */
.report-body { background: #fff; border-radius: 0 0 12px 12px; overflow: hidden; }
.report-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.report-table thead th {
  background: #fafbfd;
  padding: 10px 12px;
  text-align: left;
  border-bottom: 1.5px solid var(--border);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--muted);
}
.report-table tbody td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.report-table tbody tr:last-child td { border-bottom: none; }
.report-table tbody tr:hover { background: rgba(13,45,94,.02); }
.tech-name { font-weight: 600; color: var(--text); }
.tech-market { font-size: 10px; color: var(--muted); margin-top: 1px; }
.duration-cell { font-family: 'DM Mono', monospace; font-weight: 600; color: var(--navy); }
.notes-cell { font-size: 12px; color: var(--muted); max-width: 220px; word-break: break-word; }
.gps-yes { color: var(--green); font-size: 11px; font-weight: 700; }
.gps-no { color: var(--muted); font-size: 11px; }

.tech-summary {
  margin-top: 18px;
  padding: 14px 18px;
  background: #fafbfd;
  border-radius: 8px;
}
.tech-summary-title {
  font-size: 11px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}
.tech-summary-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.tech-summary-row:last-child { border-bottom: none; }
.tech-summary-name { font-weight: 600; }
.tech-summary-hours { font-family: 'DM Mono', monospace; font-weight: 700; color: var(--navy); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: .4; }

.toast {
  position: fixed; top: 20px; right: 20px;
  background: var(--navy); color: #fff;
  padding: 12px 18px;
  border-radius: 8px;
  font-size: 13px; font-weight: 600;
  z-index: 9999;
  opacity: 0; transform: translateY(-10px);
  transition: all .25s;
  box-shadow: 0 4px 20px rgba(0,0,0,.15);
}
.toast.show { opacity: 1; transform: translateY(0); }

#loading {
  text-align: center; padding: 60px 20px; color: var(--muted);
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <img src="https://jgimprovements-arch.github.io/jg-dispatch/logo.png" alt="JG Restoration" style="width:140px;height:140px;object-fit:contain;border-radius:24px;margin-bottom:18px;filter:drop-shadow(0 4px 20px rgba(0,0,0,.3));">
  <div class="login-title">JG Time Reports</div>
  <div class="login-sub">Restricted to PMs, Office, and Admin</div>
  <div id="g_id_onload" data-client_id="209231675110-6id8vr3ehcocg4df7tvpc89jsmrvhogk.apps.googleusercontent.com" data-ux_mode="popup" data-callback="onGoogleSignIn" data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_black" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left" data-width="288"></div>
  <div class="login-err" id="login-err"></div>
</div>

<!-- HEADER -->
<div class="hdr" id="app-header" style="display:none;">
  <div class="hdr-left">
    <img src="https://jgimprovements-arch.github.io/jg-dispatch/logo.png" alt="JG" class="hdr-logo" onerror="this.style.display='none'">
    <div class="hdr-title">Time Reports</div>
  </div>
  <div class="hdr-right">
    <span id="user-label"></span>
    <button class="btn-back" onclick="goHome()" type="button">← Back to Hub</button>
  </div>
</div>

<!-- MAIN -->
<div class="wrap" id="app-main" style="display:none;">

  <!-- JOB PICKER -->
  <div class="card">
    <div class="section-title">1. Pick a Job</div>
    <input type="text" class="search-input" id="job-search"
      placeholder="Search jobs by name or job number (e.g., Lam-2214)..."
      oninput="filterJobs()">
    <div id="job-list-wrap">
      <div id="loading-jobs" style="padding:24px;text-align:center;color:var(--muted);font-size:13px;">Loading jobs with logged hours...</div>
    </div>
  </div>

  <!-- DATE RANGE -->
  <div class="card">
    <div class="section-title">2. Date Range</div>
    <div class="date-row">
      <button class="date-preset active" data-range="all" onclick="setDateRange('all',this)">All Time</button>
      <button class="date-preset" data-range="today" onclick="setDateRange('today',this)">Today</button>
      <button class="date-preset" data-range="week" onclick="setDateRange('week',this)">This Week</button>
      <button class="date-preset" data-range="last_week" onclick="setDateRange('last_week',this)">Last Week</button>
      <button class="date-preset" data-range="month" onclick="setDateRange('month',this)">This Month</button>
      <button class="date-preset" data-range="last_month" onclick="setDateRange('last_month',this)">Last Month</button>
    </div>
    <div class="date-row" style="margin-top:12px;">
      <span class="date-label">From</span>
      <input type="date" class="date-input" id="date-from" onchange="markCustomRange()">
      <span class="date-label">To</span>
      <input type="date" class="date-input" id="date-to" onchange="markCustomRange()">
      <button class="btn-secondary" onclick="runAllJobsReport()" id="all-jobs-btn" style="margin-left:auto;">📊 All Jobs</button>
      <button class="btn-primary" onclick="runReport()" id="run-btn">Run Report</button>
    </div>
  </div>

  <!-- REPORT -->
  <div id="report-section">
    <div class="report-header">
      <div style="display:flex;align-items:center;gap:14px;flex:1;min-width:250px;">
        <img src="https://jgimprovements-arch.github.io/jg-dispatch/logo.png" alt="JG"
             style="height:48px;width:auto;border-radius:6px;background:#fff;padding:3px;object-fit:contain;flex-shrink:0;"
             onerror="this.style.display='none'">
        <div class="report-title-block">
          <div class="report-job-name" id="rpt-job-name">—</div>
          <div class="report-job-id" id="rpt-job-meta">—</div>
        </div>
      </div>
      <div class="report-actions">
        <button class="btn-secondary" onclick="window.print()">🖨 Print</button>
        <button class="btn-primary" onclick="exportPDF()" id="pdf-btn">📄 Export PDF</button>
      </div>
    </div>
    <div class="summary-grid" id="rpt-summary"></div>
    <div class="report-body" id="rpt-body"></div>
  </div>

  <div id="loading" style="display:none;">
    <div class="spinner"></div>
    Loading time entries...
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Google Sign-In -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<!-- jsPDF for PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const ADMIN_EMAILS = ['josh@jg-restoration.com','josh.greil@jg-restoration.com'];
const ALLOWED_ROLES = ['Project Manager','Office','Admin'];
const AUTH_KEY = 'jg_time_reports_user';
const AUTH_EXP = 'jg_time_reports_exp';

// ── STATE ──────────────────────────────────────────────────────────────────
const STATE = {
  user: null,
  employee: null,
  jobs: [],            // [{job_id, job_name, total_minutes, tech_count}]
  filteredJobs: [],
  selectedJob: null,
  entries: [],         // current report's time_entries
  dateRange: 'all',
  fromDate: null,
  toDate: null
};

// ── HELPERS ────────────────────────────────────────────────────────────────
const LOGO_URL = 'https://jgimprovements-arch.github.io/jg-dispatch/logo.png';
let LOGO_DATA_URL = null; // populated on first PDF export, cached after

// Fetch logo and convert to base64 data URL — used by jsPDF.addImage()
async function loadLogoDataUrl() {
  if (LOGO_DATA_URL) return LOGO_DATA_URL;
  try {
    const r = await fetch(LOGO_URL);
    if (!r.ok) return null;
    const blob = await r.blob();
    const dataUrl = await new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = reject;
      fr.readAsDataURL(blob);
    });
    LOGO_DATA_URL = dataUrl;
    return dataUrl;
  } catch(e) {
    console.warn('Logo load failed:', e);
    return null;
  }
}

function goHome() {
  // Use relative path; falls back to absolute GitHub Pages URL if context is wrong
  try {
    window.location.href = 'hub.html';
  } catch(e) {
    window.location.href = 'https://jgimprovements-arch.github.io/jg-dispatch/hub.html';
  }
}

async function sb(path, opts) {
  const headers = {
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY,
    'Content-Type': 'application/json'
  };
  const merged = Object.assign({}, opts || {}, { headers: Object.assign({}, headers, (opts || {}).headers) });
  const r = await fetch(SB_URL + path, merged);
  if (!r.ok) {
    console.error('SB error', r.status, path, await r.text().catch(()=>''));
    return null;
  }
  const t = await r.text();
  if (!t) return true;
  try { return JSON.parse(t); } catch(e) { return null; }
}

function fmtDuration(minutes) {
  if (!minutes && minutes !== 0) return '—';
  const h = Math.floor(minutes / 60);
  const m = Math.round(minutes % 60);
  return h + 'h ' + (m < 10 ? '0' : '') + m + 'm';
}
function fmtDecimalHours(minutes) {
  if (!minutes && minutes !== 0) return '0.00';
  return (minutes / 60).toFixed(2);
}
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}
function fmtDateForInput(d) {
  return d.toISOString().split('T')[0];
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── AUTH ───────────────────────────────────────────────────────────────────
window.onGoogleSignIn = async function(resp) {
  try {
    const payload = JSON.parse(atob(resp.credential.split('.')[1]));
    const email = (payload.email || '').toLowerCase();
    const errEl = document.getElementById('login-err');

    // Hard-restrict to @jg-restoration.com
    if (!email.endsWith('@jg-restoration.com')) {
      errEl.textContent = 'Access restricted to @jg-restoration.com accounts.';
      return;
    }

    // Verify role
    const empRows = await sb('/rest/v1/employees?email=eq.' + encodeURIComponent(email) + '&select=id,name,email,role,active');
    const emp = empRows && empRows[0];
    if (!emp) {
      errEl.textContent = 'Your account is not in the employee roster.';
      return;
    }
    if (emp.active === false) {
      errEl.textContent = 'Your account is inactive.';
      return;
    }

    // Allow if Admin email OR allowed role
    const isAdmin = ADMIN_EMAILS.indexOf(email) !== -1;
    const role = emp.role || '';
    const roleAllowed = ALLOWED_ROLES.indexOf(role) !== -1;
    if (!isAdmin && !roleAllowed) {
      errEl.textContent = 'This page is restricted to Project Managers, Office staff, and Admins.';
      return;
    }

    const u = { name: payload.name || payload.given_name || email.split('@')[0], email: email, role: role };
    localStorage.setItem(AUTH_KEY, JSON.stringify(u));
    localStorage.setItem(AUTH_EXP, String(Date.now() + 43200000)); // 12 hours
    STATE.user = u;
    STATE.employee = emp;
    initApp();
  } catch(e) {
    console.error('Sign in error', e);
    document.getElementById('login-err').textContent = 'Sign in failed — try again.';
  }
};

function checkExistingAuth() {
  const raw = localStorage.getItem(AUTH_KEY);
  const exp = localStorage.getItem(AUTH_EXP);
  if (raw && exp && Date.now() < parseInt(exp)) {
    try {
      STATE.user = JSON.parse(raw);
      return true;
    } catch(e) {}
  }
  return false;
}

async function initApp() {
  document.getElementById('login-screen').classList.add('hide');
  document.getElementById('app-header').style.display = 'flex';
  document.getElementById('app-main').style.display = 'block';
  document.getElementById('user-label').textContent = STATE.user.name;
  // Kick off logo preload in the background — PDF export will use the cached version
  loadLogoDataUrl();
  await loadJobsList();
}

// ── LOAD JOBS LIST ─────────────────────────────────────────────────────────
// Pull every job from the Albi proxy (same source as dispatch board + timeclock).
// Includes ALL project types — mitigation (WTR/FRE/MLD/CT3/BRD/CNT) AND
// reconstruction (REB/RZE/REM). Then merge logged-hours data from time_entries
// so each job shows "X hrs · Y techs" or "No hours yet".
async function loadJobsList() {
  const target = document.getElementById('job-list-wrap');
  target.innerHTML = '<div id="loading-jobs" style="padding:24px;text-align:center;color:var(--muted);font-size:13px;">Loading jobs...</div>';
  try {
    // 1) Pull every Albi project (paginated)
    const PROXY = 'https://jg-proxy-v2.vercel.app/api/albi';
    const albiJobs = {};
    let page = 1;
    let hasMore = true;
    while (hasMore && page <= 30) { // 30 pages × 50 = 1500 jobs cap
      try {
        const r = await fetch(PROXY + '?pageSize=50&page=' + page);
        if (!r.ok) { hasMore = false; break; }
        const data = await r.json();
        const items = Array.isArray(data) ? data : (data.data || data.results || data.projects || data.items || []);
        if (!items.length) { hasMore = false; break; }
        items.forEach(p => {
          const jid = String(p.uniqueNumber || p.id || '');
          if (!jid || albiJobs[jid]) return;
          const name = p.name || p.projectName || jid;
          const loc = (p.location || p.locationId || '').toString().toLowerCase();
          const market = (loc.includes('stevens') || loc.includes('point')) ? 'Stevens Point' : 'Appleton';
          const status = p.status || '';
          const projectType = p.projectType || p.project_type || p.type || '';
          albiJobs[jid] = {
            job_id: jid,
            job_name: name,
            market: market,
            status: status,
            project_type: projectType,
            createdAt: p.createdAt || p.createdDate || p.created_at || ''
          };
        });
        hasMore = items.length === 50;
        page++;
      } catch(e) {
        console.warn('Albi page ' + page + ' failed:', e.message);
        hasMore = false;
      }
    }

    // 2) Pull time_entries to get hours/tech-count per job
    const all = [];
    let from = 0;
    const PAGE = 1000;
    for (let i = 0; i < 50; i++) {
      const rows = await sb('/rest/v1/time_entries?job_id=not.is.null&select=job_id,job_name,employee_id,duration_minutes,clock_in,clock_out&order=clock_in.desc&limit=' + PAGE + '&offset=' + from);
      if (!rows || !rows.length) break;
      all.push(...rows);
      if (rows.length < PAGE) break;
      from += PAGE;
    }

    // 3) Aggregate hours by job_id
    const hoursByJob = {};
    all.forEach(r => {
      const jid = String(r.job_id);
      if (!jid) return;
      if (!hoursByJob[jid]) {
        hoursByJob[jid] = {
          total_minutes: 0,
          techs: new Set(),
          last_activity: r.clock_in,
          job_name_from_entries: r.job_name || ''
        };
      }
      let mins = parseFloat(r.duration_minutes);
      if (isNaN(mins) || mins <= 0) {
        if (r.clock_in && r.clock_out) {
          mins = (new Date(r.clock_out) - new Date(r.clock_in)) / 60000;
        } else {
          mins = 0;
        }
      }
      hoursByJob[jid].total_minutes += mins;
      if (r.employee_id) hoursByJob[jid].techs.add(r.employee_id);
    });

    // 4) Build the unified job list — Albi as source of truth, hours merged in.
    //    Also include any time_entries jobs that DON'T appear in Albi
    //    (e.g., shop time, internal codes, jobs that fell out of the proxy window).
    const merged = {};
    Object.keys(albiJobs).forEach(jid => {
      const a = albiJobs[jid];
      const h = hoursByJob[jid] || { total_minutes: 0, techs: new Set(), last_activity: null };
      merged[jid] = {
        job_id: jid,
        job_name: a.job_name,
        market: a.market,
        status: a.status,
        project_type: a.project_type,
        total_minutes: h.total_minutes,
        tech_count: h.techs.size,
        last_activity: h.last_activity || a.createdAt,
        from_albi: true
      };
    });
    Object.keys(hoursByJob).forEach(jid => {
      if (merged[jid]) return; // already covered by Albi
      const h = hoursByJob[jid];
      merged[jid] = {
        job_id: jid,
        job_name: h.job_name_from_entries || jid,
        market: '',
        status: '',
        project_type: '',
        total_minutes: h.total_minutes,
        tech_count: h.techs.size,
        last_activity: h.last_activity,
        from_albi: false
      };
    });

    // 5) Sort: jobs WITH hours first (most recent activity), then jobs WITHOUT
    //    hours (alphabetical by name). PMs typically want active jobs first.
    STATE.jobs = Object.values(merged).sort((a, b) => {
      const aHas = a.total_minutes > 0;
      const bHas = b.total_minutes > 0;
      if (aHas && !bHas) return -1;
      if (!aHas && bHas) return 1;
      if (aHas && bHas) {
        return new Date(b.last_activity || 0) - new Date(a.last_activity || 0);
      }
      return (a.job_name || '').localeCompare(b.job_name || '');
    });

    STATE.filteredJobs = STATE.jobs;
    renderJobsList();
  } catch(e) {
    console.error('Jobs load failed', e);
    target.innerHTML = '<div style="padding:24px;text-align:center;color:var(--red);font-size:13px;">Could not load jobs. Refresh to try again.</div>';
  }
}

function renderJobsList() {
  const target = document.getElementById('job-list-wrap');
  if (!STATE.filteredJobs.length) {
    target.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px;">No matching jobs found.</div>';
    return;
  }
  const html = '<div class="job-list">' +
    STATE.filteredJobs.slice(0, 200).map(j => {
      const sel = STATE.selectedJob && STATE.selectedJob.job_id === j.job_id ? ' selected' : '';
      const hasHours = j.total_minutes > 0;
      const stats = hasHours
        ? fmtDecimalHours(j.total_minutes) + ' hrs · ' + j.tech_count + ' tech' + (j.tech_count !== 1 ? 's' : '')
        : '<span style="color:var(--muted);font-weight:500;">No hours yet</span>';
      // Build a meta line: market · status · type (if known)
      const metaParts = [];
      if (j.market) metaParts.push(escapeHtml(j.market));
      if (j.status) metaParts.push(escapeHtml(j.status));
      if (j.project_type) metaParts.push(escapeHtml(j.project_type));
      const meta = metaParts.length ? metaParts.join(' · ') : 'ID: ' + escapeHtml(j.job_id);
      return '<div class="job-row' + sel + '" onclick="selectJob(\'' + j.job_id.replace(/'/g, "\\'") + '\')">' +
        '<div style="flex:1;min-width:0;">' +
          '<div class="job-row-name">' + escapeHtml(j.job_name) + '</div>' +
          '<div class="job-row-meta">' + meta + '</div>' +
        '</div>' +
        '<div class="job-row-stats" style="flex-shrink:0;text-align:right;">' + stats + '</div>' +
      '</div>';
    }).join('') +
    (STATE.filteredJobs.length > 200 ? '<div style="padding:10px;text-align:center;color:var(--muted);font-size:11px;">Showing 200 of ' + STATE.filteredJobs.length + ' — narrow your search to see more</div>' : '') +
    '</div>';
  target.innerHTML = html;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function filterJobs() {
  const q = (document.getElementById('job-search').value || '').toLowerCase().trim();
  if (!q) {
    STATE.filteredJobs = STATE.jobs;
  } else {
    STATE.filteredJobs = STATE.jobs.filter(j =>
      (j.job_name || '').toLowerCase().includes(q) ||
      (j.job_id || '').toLowerCase().includes(q) ||
      (j.project_type || '').toLowerCase().includes(q) ||
      (j.market || '').toLowerCase().includes(q) ||
      (j.status || '').toLowerCase().includes(q)
    );
  }
  renderJobsList();
}

function selectJob(jobId) {
  STATE.selectedJob = STATE.jobs.find(j => j.job_id === jobId) || null;
  renderJobsList();
}

// ── DATE RANGE ─────────────────────────────────────────────────────────────
function setDateRange(range, btn) {
  STATE.dateRange = range;
  document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const now = new Date();
  const fromEl = document.getElementById('date-from');
  const toEl = document.getElementById('date-to');

  let from = null, to = null;
  if (range === 'all') {
    fromEl.value = '';
    toEl.value = '';
    return;
  } else if (range === 'today') {
    from = new Date(now); from.setHours(0,0,0,0);
    to = new Date(now); to.setHours(23,59,59,999);
  } else if (range === 'week') {
    // Sunday = start of week
    from = new Date(now);
    from.setDate(now.getDate() - now.getDay());
    from.setHours(0,0,0,0);
    to = new Date(now); to.setHours(23,59,59,999);
  } else if (range === 'last_week') {
    from = new Date(now);
    from.setDate(now.getDate() - now.getDay() - 7);
    from.setHours(0,0,0,0);
    to = new Date(from);
    to.setDate(from.getDate() + 6);
    to.setHours(23,59,59,999);
  } else if (range === 'month') {
    from = new Date(now.getFullYear(), now.getMonth(), 1);
    to = new Date(now); to.setHours(23,59,59,999);
  } else if (range === 'last_month') {
    from = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    to = new Date(now.getFullYear(), now.getMonth(), 0);
    to.setHours(23,59,59,999);
  }
  if (from) fromEl.value = fmtDateForInput(from);
  if (to) toEl.value = fmtDateForInput(to);
}

function markCustomRange() {
  STATE.dateRange = 'custom';
  document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
}

// ── RUN REPORT ─────────────────────────────────────────────────────────────
async function runReport() {
  if (!STATE.selectedJob) {
    showToast('Pick a job first');
    return;
  }
  STATE.allJobsMode = false;
  const fromVal = document.getElementById('date-from').value;
  const toVal = document.getElementById('date-to').value;
  STATE.fromDate = fromVal || null;
  STATE.toDate = toVal || null;

  const reportSection = document.getElementById('report-section');
  const loadingEl = document.getElementById('loading');
  reportSection.style.display = 'none';
  loadingEl.style.display = 'block';

  try {
    let url = '/rest/v1/time_entries?job_id=eq.' + encodeURIComponent(STATE.selectedJob.job_id) +
              '&select=*&order=clock_in.asc';
    if (STATE.fromDate) url += '&clock_in=gte.' + STATE.fromDate + 'T00:00:00';
    if (STATE.toDate)   url += '&clock_in=lte.' + STATE.toDate + 'T23:59:59';

    const entries = await sb(url);
    STATE.entries = Array.isArray(entries) ? entries : [];
    renderReport();
    loadingEl.style.display = 'none';
    reportSection.style.display = 'block';
    reportSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch(e) {
    console.error('Report run failed', e);
    loadingEl.style.display = 'none';
    showToast('Could not load entries — check console');
  }
}

// Run an "All Jobs" report for the selected date range. Pulls every time_entries
// row with a job_id assigned, groups by job, and shows per-job totals + a
// company-wide tech breakdown. Use case: monthly billing audit, customer
// dispute on a tech's productivity, period-end labor cost reports.
async function runAllJobsReport() {
  const fromVal = document.getElementById('date-from').value;
  const toVal = document.getElementById('date-to').value;
  if (!fromVal && !toVal) {
    if (!confirm('No date range selected — this will pull EVERY time entry across ALL jobs. Continue?')) return;
  }
  STATE.allJobsMode = true;
  STATE.selectedJob = null;
  STATE.fromDate = fromVal || null;
  STATE.toDate = toVal || null;

  const reportSection = document.getElementById('report-section');
  const loadingEl = document.getElementById('loading');
  reportSection.style.display = 'none';
  loadingEl.style.display = 'block';

  try {
    // Paginate through all entries with a job_id. Same pattern as the job-list
    // load: PostgREST caps at 1000 per request.
    const PAGE = 1000;
    let from = 0;
    let allEntries = [];
    while (true) {
      let url = '/rest/v1/time_entries?job_id=not.is.null&select=*&order=clock_in.asc&limit=' + PAGE + '&offset=' + from;
      if (STATE.fromDate) url += '&clock_in=gte.' + STATE.fromDate + 'T00:00:00';
      if (STATE.toDate)   url += '&clock_in=lte.' + STATE.toDate + 'T23:59:59';
      const rows = await sb(url);
      if (!Array.isArray(rows) || rows.length === 0) break;
      allEntries = allEntries.concat(rows);
      if (rows.length < PAGE) break;
      from += PAGE;
      if (from > 50000) {
        showToast('Result capped at 50,000 entries — narrow the date range');
        break;
      }
    }
    STATE.entries = allEntries;
    renderAllJobsReport();
    loadingEl.style.display = 'none';
    reportSection.style.display = 'block';
    reportSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch(e) {
    console.error('All-jobs report failed', e);
    loadingEl.style.display = 'none';
    showToast('Could not load entries — check console');
  }
}

function renderAllJobsReport() {
  const entries = STATE.entries || [];

  // Header
  document.getElementById('rpt-job-name').textContent = 'All Jobs Time Report';
  let metaText;
  if (STATE.fromDate || STATE.toDate) {
    metaText = (STATE.fromDate ? fmtDate(STATE.fromDate + 'T00:00:00') : 'Beginning') +
               ' – ' + (STATE.toDate ? fmtDate(STATE.toDate + 'T00:00:00') : 'Today');
  } else {
    metaText = 'All time';
  }
  metaText += '  ·  ' + entries.length.toLocaleString() + ' entries';
  document.getElementById('rpt-job-meta').textContent = metaText;

  // Aggregate
  let totalMins = 0;
  const jobMap = {};   // job_id -> { name, total_minutes, entry_count, techs:{name:minutes} }
  const techMap = {};  // tech key -> { name, market, total_minutes, entry_count, jobs:Set }

  entries.forEach(e => {
    let mins = parseFloat(e.duration_minutes);
    if (isNaN(mins) || mins <= 0) {
      if (e.clock_in && e.clock_out) mins = (new Date(e.clock_out) - new Date(e.clock_in)) / 60000;
      else mins = 0;
    }
    totalMins += mins;

    const jid = String(e.job_id);
    if (!jobMap[jid]) {
      jobMap[jid] = { job_id: jid, name: e.job_name || '(no name)', total_minutes: 0, entry_count: 0, techs: {} };
    }
    jobMap[jid].total_minutes += mins;
    jobMap[jid].entry_count += 1;
    const tName = e.employee_name || '(unknown)';
    jobMap[jid].techs[tName] = (jobMap[jid].techs[tName] || 0) + mins;

    const tKey = e.employee_id || tName;
    if (!techMap[tKey]) {
      techMap[tKey] = { name: tName, market: e.market || '', total_minutes: 0, entry_count: 0, jobs: new Set() };
    }
    techMap[tKey].total_minutes += mins;
    techMap[tKey].entry_count += 1;
    techMap[tKey].jobs.add(jid);
  });

  const jobs = Object.values(jobMap).sort((a,b) => b.total_minutes - a.total_minutes);
  const techs = Object.values(techMap).sort((a,b) => b.total_minutes - a.total_minutes);

  // Summary cards
  document.getElementById('rpt-summary').innerHTML =
    '<div class="summary-card"><div class="summary-value">' + fmtDecimalHours(totalMins) + '</div><div class="summary-label">Total Hours</div></div>' +
    '<div class="summary-card"><div class="summary-value">' + jobs.length + '</div><div class="summary-label">Jobs</div></div>' +
    '<div class="summary-card"><div class="summary-value">' + techs.length + '</div><div class="summary-label">Technicians</div></div>' +
    '<div class="summary-card"><div class="summary-value">' + entries.length.toLocaleString() + '</div><div class="summary-label">Entries</div></div>';

  if (entries.length === 0) {
    document.getElementById('rpt-body').innerHTML =
      '<div style="padding:60px 20px;text-align:center;color:var(--muted);">No time entries in the selected range.</div>';
    return;
  }

  // Tech breakdown across all jobs
  const techSummary = '<div class="tech-summary">' +
    '<div class="tech-summary-title">Hours by Technician (across all jobs)</div>' +
    techs.map(t =>
      '<div class="tech-summary-row">' +
        '<span class="tech-summary-name">' + escapeHtml(t.name) +
          (t.market ? ' <span style="font-size:10px;color:var(--muted);">· ' + escapeHtml(t.market) + '</span>' : '') +
        '</span>' +
        '<span class="tech-summary-hours">' + fmtDecimalHours(t.total_minutes) + ' hrs ' +
          '<span style="font-size:10px;color:var(--muted);font-weight:400;">(' + t.entry_count + ' entries · ' + t.jobs.size + ' jobs)</span>' +
        '</span>' +
      '</div>'
    ).join('') +
    '</div>';

  // Per-job rows: name, hours, entries, top tech
  const jobRows = jobs.map(j => {
    const topTech = Object.entries(j.techs).sort((a,b) => b[1]-a[1])[0];
    const topTechLabel = topTech ? escapeHtml(topTech[0]) + ' (' + fmtDecimalHours(topTech[1]) + 'h)' : '—';
    return '<tr>' +
      '<td>' +
        '<div class="tech-name">' + escapeHtml(j.name) + '</div>' +
        '<div class="tech-market" style="font-size:10px;color:var(--muted);">ID: ' + escapeHtml(j.job_id) + '</div>' +
      '</td>' +
      '<td class="duration-cell">' + fmtDecimalHours(j.total_minutes) + 'h</td>' +
      '<td>' + j.entry_count + '</td>' +
      '<td>' + Object.keys(j.techs).length + '</td>' +
      '<td style="font-size:11px;">' + topTechLabel + '</td>' +
    '</tr>';
  }).join('');

  const tableHtml = '<div style="padding:18px 22px;">' + techSummary + '</div>' +
    '<table class="report-table">' +
      '<thead><tr>' +
        '<th>Job</th>' +
        '<th>Hours</th>' +
        '<th>Entries</th>' +
        '<th>Techs</th>' +
        '<th>Top Tech</th>' +
      '</tr></thead>' +
      '<tbody>' + jobRows + '</tbody>' +
    '</table>';

  document.getElementById('rpt-body').innerHTML = tableHtml;
}

function renderReport() {
  const job = STATE.selectedJob;
  document.getElementById('rpt-job-name').textContent = job.job_name;
  let metaText = 'Job ID: ' + job.job_id;
  if (STATE.fromDate || STATE.toDate) {
    metaText += '  ·  ' + (STATE.fromDate ? fmtDate(STATE.fromDate + 'T00:00:00') : 'Beginning') +
                ' – ' + (STATE.toDate ? fmtDate(STATE.toDate + 'T00:00:00') : 'Today');
  } else {
    metaText += '  ·  All Time';
  }
  document.getElementById('rpt-job-meta').textContent = metaText;

  // Summary stats
  const entries = STATE.entries;
  let totalMins = 0;
  const techMap = {};
  let firstDate = null, lastDate = null;
  let entriesWithGps = 0;

  entries.forEach(e => {
    let mins = parseFloat(e.duration_minutes);
    if (isNaN(mins) || mins <= 0) {
      if (e.clock_in && e.clock_out) {
        mins = (new Date(e.clock_out) - new Date(e.clock_in)) / 60000;
      } else {
        mins = 0;
      }
    }
    totalMins += mins;
    const techKey = e.employee_id || e.employee_name;
    if (!techMap[techKey]) {
      techMap[techKey] = {
        name: e.employee_name || '(unknown)',
        market: e.market || '',
        total_minutes: 0,
        entry_count: 0
      };
    }
    techMap[techKey].total_minutes += mins;
    techMap[techKey].entry_count += 1;

    if (e.clock_in) {
      const d = new Date(e.clock_in);
      if (!firstDate || d < firstDate) firstDate = d;
      if (!lastDate || d > lastDate) lastDate = d;
    }
    if (e.clock_in_lat && e.clock_in_lng) entriesWithGps += 1;
  });

  const techs = Object.values(techMap).sort((a, b) => b.total_minutes - a.total_minutes);

  // Render summary
  const summary = [
    { label: 'Total Hours', val: fmtDecimalHours(totalMins) },
    { label: 'Total Entries', val: entries.length },
    { label: 'Techs', val: techs.length },
    { label: 'First Activity', val: firstDate ? fmtDate(firstDate) : '—' },
    { label: 'Last Activity', val: lastDate ? fmtDate(lastDate) : '—' },
    { label: 'GPS Verified', val: entries.length ? Math.round((entriesWithGps / entries.length) * 100) + '%' : '—' }
  ];
  document.getElementById('rpt-summary').innerHTML = summary.map(s =>
    '<div class="summary-stat">' +
      '<div class="summary-stat-label">' + s.label + '</div>' +
      '<div class="summary-stat-val">' + s.val + '</div>' +
    '</div>'
  ).join('');

  // Render body
  if (!entries.length) {
    document.getElementById('rpt-body').innerHTML =
      '<div class="empty-state"><div class="empty-state-icon">📋</div>' +
      'No time entries found for this job in the selected range.</div>';
    return;
  }

  // Per-tech summary first, then full entry list
  const techSummary = '<div class="tech-summary">' +
    '<div class="tech-summary-title">Hours by Technician</div>' +
    techs.map(t =>
      '<div class="tech-summary-row">' +
        '<span class="tech-summary-name">' + escapeHtml(t.name) +
          (t.market ? ' <span style="font-size:10px;color:var(--muted);">· ' + escapeHtml(t.market) + '</span>' : '') +
        '</span>' +
        '<span class="tech-summary-hours">' + fmtDecimalHours(t.total_minutes) + ' hrs ' +
          '<span style="font-size:10px;color:var(--muted);font-weight:400;">(' + t.entry_count + ' entries)</span>' +
        '</span>' +
      '</div>'
    ).join('') +
    '</div>';

  const entryRows = entries.map(e => {
    let mins = parseFloat(e.duration_minutes);
    if (isNaN(mins) || mins <= 0) {
      if (e.clock_in && e.clock_out) mins = (new Date(e.clock_out) - new Date(e.clock_in)) / 60000;
      else mins = 0;
    }
    const isOpen = !e.clock_out;
    const gpsIn = (e.clock_in_lat && e.clock_in_lng) ? '<span class="gps-yes">●</span>' : '<span class="gps-no">○</span>';
    const gpsOut = (e.clock_out_lat && e.clock_out_lng) ? '<span class="gps-yes">●</span>' : '<span class="gps-no">○</span>';
    return '<tr>' +
      '<td>' +
        '<div class="tech-name">' + escapeHtml(e.employee_name || '—') + '</div>' +
        '<div class="tech-market">' + escapeHtml(e.market || '') + '</div>' +
      '</td>' +
      '<td>' + fmtDate(e.clock_in) + '</td>' +
      '<td>' + fmtTime(e.clock_in) + ' ' + gpsIn + '</td>' +
      '<td>' + (isOpen ? '<span style="color:var(--yellow);font-weight:700;">OPEN</span>' : (fmtTime(e.clock_out) + ' ' + gpsOut)) + '</td>' +
      '<td class="duration-cell">' + (isOpen ? '—' : fmtDecimalHours(mins) + 'h') + '</td>' +
      '<td><span style="font-size:11px;color:var(--muted);">' + escapeHtml(e.status || 'active') + '</span></td>' +
      '<td class="notes-cell">' + escapeHtml(e.notes || '') + '</td>' +
    '</tr>';
  }).join('');

  const tableHtml = '<div style="padding:18px 22px;">' + techSummary + '</div>' +
    '<table class="report-table">' +
      '<thead><tr>' +
        '<th>Technician</th>' +
        '<th>Date</th>' +
        '<th>Clock In</th>' +
        '<th>Clock Out</th>' +
        '<th>Hours</th>' +
        '<th>Status</th>' +
        '<th>Notes</th>' +
      '</tr></thead>' +
      '<tbody>' + entryRows + '</tbody>' +
    '</table>';

  document.getElementById('rpt-body').innerHTML = tableHtml;
}

// ── PDF EXPORT ─────────────────────────────────────────────────────────────

    showToast('Use the Print button for All Jobs reports');
    return;
  }
  if (!STATE.selectedJob || !STATE.entries) {
    showToast('Run a report first');
    return;
  }

  const btn = document.getElementById('pdf-btn');
  const orig = btn.textContent;
  btn.textContent = 'Generating...';
  btn.disabled = true;

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'letter');
    const pageW = doc.internal.pageSize.getWidth();
    const pageH = doc.internal.pageSize.getHeight();

    // Brand colors
    const navy = [13, 45, 94];
    const orange = [232, 93, 4];
    const muted = [107, 130, 160];

    // Pre-load logo for PDF embedding
    const logoData = await loadLogoDataUrl();

    // ── HEADER ──
    doc.setFillColor(...navy);
    doc.rect(0, 0, pageW, 30, 'F');

    // Embed logo on left side of header
    if (logoData) {
      try {
        // Logo is ~1500x1093 — preserve aspect ratio at 22mm tall
        const logoH = 22;
        const logoW = logoH * (1500 / 1093);
        // White background pill so the JPG's black areas don't clash with navy
        doc.setFillColor(255, 255, 255);
        doc.roundedRect(10, 4, logoW + 6, logoH + 4, 2, 2, 'F');
        doc.addImage(logoData, 'JPEG', 13, 6, logoW, logoH);
        // Title to right of logo
        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(15);
        doc.text('Time on Job Report', logoW + 22, 14);
        doc.setFontSize(9);
        doc.setFont('helvetica', 'normal');
        doc.text('JG Restoration  ·  Fire · Water · Mold', logoW + 22, 21);
      } catch(e) {
        // Fallback if image embedding fails
        console.warn('Logo embed failed, using text fallback', e);
        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(18);
        doc.text('JG RESTORATION', 14, 14);
        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        doc.text('Time on Job Report', 14, 21);
      }
    } else {
      // No logo loaded — text-only header
      doc.setTextColor(255, 255, 255);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(18);
      doc.text('JG RESTORATION', 14, 14);
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.text('Time on Job Report', 14, 21);
    }

    // Right side of header — generation metadata
    doc.setFontSize(8);
    doc.setTextColor(255, 255, 255);
    doc.text('Generated ' + new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) +
             ' by ' + STATE.user.name, pageW - 14, 14, { align: 'right' });
    doc.text('(920) 428-4200  ·  jg-restoration.com', pageW - 14, 20, { align: 'right' });

    // ── JOB INFO ──
    let y = 40;
    doc.setTextColor(...navy);
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.text(STATE.selectedJob.job_name, 14, y);
    y += 6;
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...muted);
    let metaLine = 'Job ID: ' + STATE.selectedJob.job_id;
    if (STATE.fromDate || STATE.toDate) {
      metaLine += '   |   Range: ' +
        (STATE.fromDate ? fmtDate(STATE.fromDate + 'T00:00:00') : 'Beginning') + ' – ' +
        (STATE.toDate ? fmtDate(STATE.toDate + 'T00:00:00') : 'Today');
    } else {
      metaLine += '   |   Range: All Time';
    }
    doc.text(metaLine, 14, y);
    y += 8;

    // ── SUMMARY ──
    let totalMins = 0;
    const techMap = {};
    STATE.entries.forEach(e => {
      let mins = parseFloat(e.duration_minutes);
      if (isNaN(mins) || mins <= 0) {
        if (e.clock_in && e.clock_out) mins = (new Date(e.clock_out) - new Date(e.clock_in)) / 60000;
        else mins = 0;
      }
      totalMins += mins;
      const k = e.employee_id || e.employee_name;
      if (!techMap[k]) techMap[k] = { name: e.employee_name || '(unknown)', market: e.market || '', mins: 0, count: 0 };
      techMap[k].mins += mins;
      techMap[k].count += 1;
    });
    const techs = Object.values(techMap).sort((a, b) => b.mins - a.mins);

    // Summary box
    doc.setFillColor(247, 249, 252);
    doc.rect(14, y, pageW - 28, 22, 'F');
    doc.setTextColor(...navy);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.text('TOTAL HOURS', 18, y + 6);
    doc.text('TOTAL ENTRIES', 60, y + 6);
    doc.text('TECHNICIANS', 102, y + 6);
    doc.text('JOB STATUS', 144, y + 6);

    doc.setFontSize(14);
    doc.text(fmtDecimalHours(totalMins) + 'h', 18, y + 14);
    doc.text(String(STATE.entries.length), 60, y + 14);
    doc.text(String(techs.length), 102, y + 14);
    const openCount = STATE.entries.filter(e => !e.clock_out).length;
    doc.text(openCount > 0 ? openCount + ' OPEN' : 'CLOSED', 144, y + 14);
    y += 28;

    // ── HOURS BY TECHNICIAN ──
    doc.setTextColor(...navy);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.text('HOURS BY TECHNICIAN', 14, y);
    y += 2;

    doc.autoTable({
      startY: y + 2,
      head: [['Technician', 'Market', 'Entries', 'Hours']],
      body: techs.map(t => [t.name, t.market || '—', t.count, fmtDecimalHours(t.mins)]),
      theme: 'grid',
      headStyles: { fillColor: navy, textColor: 255, fontSize: 9, fontStyle: 'bold' },
      bodyStyles: { fontSize: 9, textColor: [26, 41, 66] },
      alternateRowStyles: { fillColor: [250, 251, 253] },
      columnStyles: {
        0: { cellWidth: 60, fontStyle: 'bold' },
        1: { cellWidth: 35 },
        2: { cellWidth: 25, halign: 'right' },
        3: { cellWidth: 30, halign: 'right', fontStyle: 'bold' }
      },
      margin: { left: 14, right: 14 }
    });
    y = doc.lastAutoTable.finalY + 8;

    // ── TIME ENTRIES TABLE ──
    if (y > pageH - 60) {
      doc.addPage();
      y = 20;
    }
    doc.setTextColor(...navy);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.text('TIME ENTRIES', 14, y);

    const sortedEntries = [...STATE.entries].sort((a,b) => new Date(a.clock_in) - new Date(b.clock_in));
    const rows = sortedEntries.map(e => {
      let mins = parseFloat(e.duration_minutes);
      if (isNaN(mins) || mins <= 0) {
        if (e.clock_in && e.clock_out) mins = (new Date(e.clock_out) - new Date(e.clock_in)) / 60000;
        else mins = 0;
      }
      const isOpen = !e.clock_out;
      const gps = (e.clock_in_lat && e.clock_in_lng) ? 'Y' : 'N';
      const inT = e.clock_in ? new Date(e.clock_in).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }) : '—';
      const outT = isOpen ? 'OPEN' : (e.clock_out ? new Date(e.clock_out).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }) : '—');
      return [
        e.employee_name || '—',
        e.clock_in ? fmtDate(e.clock_in) : '—',
        inT,
        outT,
        isOpen ? '—' : fmtDecimalHours(mins),
        gps,
        e.notes || ''
      ];
    });

    doc.autoTable({
      startY: y + 2,
      head: [['Tech', 'Date', 'In', 'Out', 'Hours', 'GPS', 'Notes']],
      body: rows,
      theme: 'grid',
      headStyles: { fillColor: navy, textColor: 255, fontSize: 8, fontStyle: 'bold' },
      bodyStyles: { fontSize: 8, textColor: [26, 41, 66] },
      alternateRowStyles: { fillColor: [250, 251, 253] },
      columnStyles: {
        0: { cellWidth: 32, fontStyle: 'bold' },
        1: { cellWidth: 22 },
        2: { cellWidth: 18 },
        3: { cellWidth: 18 },
        4: { cellWidth: 16, halign: 'right', fontStyle: 'bold' },
        5: { cellWidth: 12, halign: 'center' },
        6: { cellWidth: 'auto' }
      },
      margin: { left: 14, right: 14 },
      didDrawPage: function(data) {
        // Page footer with page number
        const pageCount = doc.internal.getNumberOfPages();
        const current = data.pageNumber;
        doc.setFontSize(8);
        doc.setTextColor(...muted);
        doc.text('Page ' + current + ' of ' + pageCount, pageW - 14, pageH - 8, { align: 'right' });
        doc.text('JG Restoration Time Report  ·  ' + STATE.selectedJob.job_id, 14, pageH - 8);
      }
    });

    // Filename: jobname_dates.pdf
    const safeName = (STATE.selectedJob.job_name || STATE.selectedJob.job_id).replace(/[^a-zA-Z0-9_-]/g, '_').slice(0, 50);
    let dateTag = '';
    if (STATE.fromDate || STATE.toDate) {
      dateTag = '_' + (STATE.fromDate || 'start') + '_to_' + (STATE.toDate || 'today');
    } else {
      dateTag = '_alltime';
    }
    doc.save(safeName + dateTag + '.pdf');
    showToast('PDF downloaded');
  } catch(e) {
    console.error('PDF export failed', e);
    showToast('PDF export failed — check console');
  } finally {
    btn.textContent = orig;
    btn.disabled = false;
  }
}

// ── BOOT ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  if (checkExistingAuth()) {
    // Re-verify role on boot (may have changed since cookie was issued)
    try {
      const empRows = await sb('/rest/v1/employees?email=eq.' + encodeURIComponent(STATE.user.email) + '&select=id,name,email,role,active');
      const emp = empRows && empRows[0];
      if (!emp || emp.active === false) {
        localStorage.removeItem(AUTH_KEY);
        localStorage.removeItem(AUTH_EXP);
        return;
      }
      const isAdmin = ADMIN_EMAILS.indexOf(STATE.user.email) !== -1;
      const roleAllowed = ALLOWED_ROLES.indexOf(emp.role || '') !== -1;
      if (!isAdmin && !roleAllowed) {
        localStorage.removeItem(AUTH_KEY);
        localStorage.removeItem(AUTH_EXP);
        return;
      }
      STATE.employee = emp;
      initApp();
    } catch(e) {
      console.error('Auth re-verify failed', e);
    }
  }
});
</script>
