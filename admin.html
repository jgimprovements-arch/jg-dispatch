<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JG Restoration — Admin Panel</title>
<link rel="icon" type="image/png" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="auth.js?v=20260419-1"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#0d2d5e;--orange:#e85d04;--gold:#f5a623;
  --bg:#f0ede8;--s1:#faf9f7;--s2:#f0ede8;--s3:#e8e4df;
  --brd:rgba(13,45,94,.12);--brdH:rgba(13,45,94,.3);
  --surface:#faf9f7;--border:rgba(13,45,94,.12);--muted:#6b7a96;
  --acc:#e85d04;--accD:rgba(232,93,4,.08);
  --txt:#0d1f3c;--dim:#6b7a96;--mut:#a0abbf;
  --red:#c02020;--redD:rgba(192,32,32,.08);
  --grn:#2e7d32;--grnD:rgba(46,125,50,.08);
  --wrn:#e65100;--wrnD:rgba(230,81,0,.08);
  --blu:#1565c0;--bluD:rgba(21,101,192,.08);
  --purp:#6a1b9a;--purpD:rgba(106,27,154,.08);
  --ok:#2e7d32;--danger:#c02020;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;}
.mono{font-family:'DM Mono',monospace}
@keyframes spin{to{transform:rotate(360deg)}}

/* Header */
.admin-hdr{background:var(--navy);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:95;}
.export-btn{padding:8px 16px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;}

/* Top-level panel tabs */
.panel-tabs{background:#fff;border-bottom:1px solid var(--brd);padding:0 16px;display:flex;gap:0;position:sticky;top:50px;z-index:94;}
.panel-tab{padding:12px 20px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--dim);cursor:pointer;border-bottom:3px solid transparent;font-family:'DM Sans',sans-serif;}
.panel-tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700;}
.panel-tab:hover{color:var(--navy);}

/* Sub-tab bar within a panel */
.sub-tab-bar{background:var(--s1);border-bottom:1px solid var(--brd);padding:0 16px;display:flex;gap:0;}
.sub-tab{padding:10px 18px;border:none;background:transparent;font-size:12px;font-weight:500;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;}
.sub-tab.active{color:var(--orange);border-bottom-color:var(--orange);font-weight:700;}

/* Sales admin styles */
.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--orange));}
.kpi-val{font-size:28px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;line-height:1;}
.kpi-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:6px;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.section-hdr{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:20px 0 10px;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:8px;}
.section-hdr::after{content:'';flex:1;height:1px;background:var(--border);}
.rep-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}
.rep-avatar{width:34px;height:34px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.bar-wrap{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:var(--orange);transition:width .4s ease;}
.touch-type-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.period-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--muted);font-family:'DM Sans',sans-serif;}
.period-btn.active{background:var(--navy);border-color:var(--navy);color:#fff;}

/* Access control card styles */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;}
.btn{padding:7px 14px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface);color:var(--navy);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn:hover{border-color:var(--brdH);}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--mut);border-radius:3px}
</style>
</head>
<body>

<!-- Login overlay -->
<div id="jg-login" style="display:none;position:fixed;inset:0;background:rgba(13,29,60,.96);align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4);">
    <img src="https://jgimprovements-arch.github.io/jg-dispatch/logo.png" style="height:72px;width:auto;margin-bottom:14px;">
    <div style="font-size:19px;font-weight:700;color:#0d2d5e;margin-bottom:4px;">JG Restoration</div>
    <div style="font-size:13px;color:#6b82a0;margin-bottom:24px;">Sign in with your @jg-restoration.com account</div>
    <div id="g_id_onload" data-client_id="209231675110-6id8vr3ehcocg4df7tvpc89jsmrvhogk.apps.googleusercontent.com" data-ux_mode="popup" data-callback="jgGoogleCb" data-auto_prompt="false"></div>
    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left" data-width="288"></div>
    <div id="jg-login-err" style="font-size:12px;color:#c0392b;margin-top:12px;min-height:16px;"></div>
  </div>
</div>

<!-- Sidebar -->
<!-- Header -->
<div class="admin-hdr">
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:18px;">🛡</span>
    <span style="font-size:13px;font-weight:600;color:#fff;letter-spacing:-.3px;">JG Restoration <span style="color:var(--gold);">Admin Panel</span></span>
  </div>
  <div id="hdr-actions" style="display:flex;gap:8px;align-items:center;"></div>
</div>

<!-- Panel tabs -->
<div class="panel-tabs">
  <button class="panel-tab active" id="ptab-sales" onclick="switchPanel('sales')">🛠 Sales Admin</button>
  <button class="panel-tab" id="ptab-access" onclick="switchPanel('access')">🔐 Access Control</button>
  <button class="panel-tab" id="ptab-presence" onclick="switchPanel('presence')">
    👥 Platform Users
    <span id="presence-count-badge" style="background:#2e7d32;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;display:none;">0</span>
  </button>
</div>

<div id="app"><div style="padding:40px;text-align:center;color:#6b7a96;">Loading...</div></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// SHARED CORE
// ═══════════════════════════════════════════════════════════════════════════
const SB_URL='https://nuykvchgecpiuikoerze.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const ALBI_PROXY='https://jg-proxy-v2.vercel.app/api/albi';
const REPS=['Kristina','Rylan','David','Brent','Josh'];
const REP_COLORS=['#e85d04','#1565c0','#2e7d32','#6a1b9a','#0d2d5e'];

var CURRENT_PANEL = 'sales';  // 'sales' | 'access'

// ═══════════════════════════════════════════════════════════════════════════
// AUTH (Google Sign-In for @jg-restoration.com)
// ═══════════════════════════════════════════════════════════════════════════
const _JG_KEY='jg_platform_user',_JG_EXP='jg_platform_exp';
function jgGoogleCb(r){try{const p=JSON.parse(atob(r.credential.split('.')[1]));if(!p.email.endsWith('@jg-restoration.com')){document.getElementById('jg-login-err').textContent='Access restricted to @jg-restoration.com accounts.';return;}const u={name:p.name||p.given_name,email:p.email,picture:p.picture||''};localStorage.setItem(_JG_KEY,JSON.stringify(u));localStorage.setItem(_JG_EXP,String(Date.now()+43200000));jgHideLogin();jgShowUser(u);bootAdmin();}catch(e){document.getElementById('jg-login-err').textContent='Sign in failed.';}}
function jgCheckAuth(){const r=localStorage.getItem(_JG_KEY),e=localStorage.getItem(_JG_EXP);if(r&&e&&Date.now()<parseInt(e)){jgHideLogin();jgShowUser(JSON.parse(r));return true;}jgShowLogin();return false;}
function jgShowLogin(){const e=document.getElementById('jg-login');if(e)e.style.display='flex';}
function jgHideLogin(){const e=document.getElementById('jg-login');if(e)e.style.display='none';}
function jgShowUser(u){const n=document.getElementById('sb-nm'),a=document.getElementById('sb-av');if(n)n.textContent=u.name?u.name.split(' ')[0]:u.email.split('@')[0];if(a)a.innerHTML=u.picture?'<img src="'+u.picture+'" style="width:22px;height:22px;border-radius:50%;">':'👤';}
function jgSignOut(){if(confirm('Sign out?')){localStorage.removeItem(_JG_KEY);localStorage.removeItem(_JG_EXP);window.location.href='hub.html';}}

// ═══════════════════════════════════════════════════════════════════════════
// SHARED SUPABASE HELPER
// ═══════════════════════════════════════════════════════════════════════════
async function sbGet(path) {
  try {
    var r = await fetch(SB_URL + path, {
      method: 'GET',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    if (!r.ok) { console.error('sbGet '+r.status); return []; }
    var data = await r.json();
    return Array.isArray(data) ? data : [];
  } catch(e) { console.error('sbGet error:', e.message); return []; }
}

async function logActivity(action, detail, category, repName) {
  try {
    var u = JSON.parse(localStorage.getItem('jg_platform_user') || '{}');
    await fetch(SB_URL + '/rest/v1/platform_activity', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        action: action, detail: detail, category: category || 'sales',
        employee_name: repName || null,
        performed_by: u.name || u.email || 'Admin',
        performed_by_email: u.email || null,
        ts: new Date().toISOString()
      })
    });
  } catch(e) {}
}

function toast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0d2d5e;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.25);';
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2500);
}

// ═══════════════════════════════════════════════════════════════════════════
// PANEL SWITCHER
// ═══════════════════════════════════════════════════════════════════════════
function switchPanel(panel) {
  CURRENT_PANEL = panel;
  document.querySelectorAll('.panel-tab').forEach(function(t){ t.classList.remove('active'); });
  var btn = document.getElementById('ptab-' + panel);
  if (btn) btn.classList.add('active');

  // Update header actions per panel
  var hdrActions = document.getElementById('hdr-actions');
  if (panel === 'sales') {
    hdrActions.innerHTML = (AD.lastRefresh ? '<span style="font-size:10px;color:rgba(255,255,255,.5);">Updated '+AD.lastRefresh.toLocaleTimeString()+'</span>' : '') +
      '<button class="export-btn" style="background:var(--gold);color:var(--navy);" onclick="sa_exportExcel()">📊 Excel</button>' +
      '<button class="export-btn" style="background:#6a1b9a;color:#fff;" onclick="sa_exportWeeklyPDF()">📄 Weekly PDF</button>' +
      '<button class="export-btn" style="background:#c0392b;color:#fff;" onclick="sa_exportMonthlyPDF()">📄 Monthly PDF</button>' +
      '<button class="export-btn" style="background:rgba(255,255,255,.1);color:#fff;" onclick="sa_loadData()">↻ Refresh</button>';
    sa_render();
  } else if (panel === 'access') {
    hdrActions.innerHTML = '<button class="export-btn" style="background:rgba(255,255,255,.1);color:#fff;" onclick="ac_resetDefaults()">Reset Defaults</button>';
    ac_render();
  } else if (panel === 'presence') {
    hdrActions.innerHTML = '<span id="presence-updated" style="font-size:10px;color:rgba(255,255,255,.5);"></span>' +
      '<button class="export-btn" style="background:rgba(255,255,255,.1);color:#fff;" onclick="pr_render()">↻ Refresh</button>';
    pr_render();
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// SALES ADMIN PANEL  (prefix: sa_)
// ═══════════════════════════════════════════════════════════════════════════
var AD = {
  period: 30, market: 'All', loading: false,
  partners: [], touches: [], routes: [], followups: [],
  albiJobs: [], albiLoading: false, lastRefresh: null, tab: 'dashboard'
};

function sa_mkPeriodBtn(d) {
  var cls = 'period-btn' + (AD.period===d ? ' active' : '');
  return '<button class="'+cls+'" onclick="sa_setPeriod('+d+')">Last '+d+' days</button>';
}
function sa_setPeriod(d) { AD.period=d; sa_loadData(); }
function sa_mkMarketBtn(m) {
  var cls = 'period-btn' + (AD.market===m ? ' active' : '');
  return '<button class="'+cls+'" onclick="sa_setMkt(this)">'+m+'</button>';
}
function sa_setMkt(el) { AD.market = el.textContent.trim(); sa_loadData(); }
function sa_setTab(tab) { AD.tab = tab; sa_render(); }

async function sa_loadData() {
  AD.loading = true; sa_render();
  try {
    var cutoff = new Date(); cutoff.setDate(cutoff.getDate() - AD.period);
    var cutoffStr = cutoff.toISOString().split('T')[0];
    var mFilter = AD.market === 'All' ? '' : '&market=eq.'+encodeURIComponent(AD.market);

    var allP = [];
    for (var pg = 0; pg < 5; pg++) {
      var chunk = await sbGet('/rest/v1/sales_partners?order=name.asc&limit=1000&offset='+(pg*1000)+mFilter);
      if (!chunk || !chunk.length) break;
      allP = allP.concat(chunk);
      if (chunk.length < 1000) break;
    }

    var results = await Promise.all([
      sbGet('/rest/v1/sales_touches?touch_date=gte.'+cutoffStr+'&order=touch_date.desc&limit=2000'+mFilter),
      sbGet('/rest/v1/sales_routes?route_date=gte.'+cutoffStr+'&order=route_date.desc&limit=200'+mFilter),
      sbGet('/rest/v1/sales_followups?order=due_date.asc&limit=1000'+mFilter)
    ]);

    AD.partners  = allP||[];
    AD.touches   = results[0]||[];
    AD.routes    = results[1]||[];
    AD.followups = results[2]||[];
    AD.lastRefresh = new Date();
  } catch(e) { console.error('sa_loadData failed:', e); }
  AD.loading = false;
  if (CURRENT_PANEL === 'sales') sa_render();
}

async function sa_loadAlbi() {
  AD.albiLoading = true; sa_render();
  try {
    var cutoff = new Date(); cutoff.setDate(cutoff.getDate() - AD.period);
    var results = await Promise.all([
      fetch(ALBI_PROXY, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'get_projects',locationId:222,limit:100})}).then(function(r){return r.ok?r.json():{};}),
      fetch(ALBI_PROXY, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'get_projects',locationId:1477,limit:100})}).then(function(r){return r.ok?r.json():{};})
    ]);
    var appJobs = results[0], spJobs = results[1];
    var jobs = ((appJobs.projects||appJobs.data||[]).map(function(j){return Object.assign({location:'Appleton'},j);})
      .concat((spJobs.projects||spJobs.data||[]).map(function(j){return Object.assign({location:'Stevens Point'},j);})));
    AD.albiJobs = jobs.filter(function(j) {
      var d = j.createdAt||j.created_at||j.dateCreated||'';
      return !d || new Date(d) >= cutoff;
    });
  } catch(e) { console.error('Albi pull failed:', e); AD.albiJobs = []; }
  logActivity('Albi Data Pull', 'Pulled '+AD.albiJobs.length+' jobs from Albi — Last '+AD.period+' days', 'sales');
  AD.albiLoading = false; sa_render();
}

function sa_getStats() {
  var p = AD.partners, t = AD.touches, r = AD.routes, f = AD.followups;
  var now = new Date(); now.setHours(0,0,0,0);
  var stale = p.filter(function(x) {
    if(!x.last_touch_date) return true;
    return (now - new Date(x.last_touch_date+'T00:00:00')) > 30*86400000;
  }).length;
  var byRep = {};
  REPS.forEach(function(rep) { byRep[rep] = t.filter(function(x){return x.logged_by===rep;}).length; });
  var maxTouches = Math.max.apply(null, Object.values(byRep).concat([1]));
  var byType = {};
  t.forEach(function(x) { byType[x.touch_type||'Other'] = (byType[x.touch_type||'Other']||0)+1; });
  var fuTotal = f.length, fuDone = f.filter(function(x){return x.completed;}).length;
  var fuRate = fuTotal > 0 ? Math.round(fuDone/fuTotal*100) : 0;
  var fuOverdue = f.filter(function(x){return !x.completed && new Date(x.due_date+'T00:00:00') < now;}).length;
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-AD.period);
  var newPartners = p.filter(function(x){ return x.created_at && new Date(x.created_at) >= cutoff; }).length;
  var refByRep = {};
  REPS.forEach(function(rep) {
    refByRep[rep] = p.filter(function(x){return x.assigned_to===rep;}).reduce(function(s,x){return s+(x.referral_count||0);},0);
  });
  var totalStops = 0, completedStops = 0;
  r.forEach(function(rt) { var stops = rt.stops||[]; totalStops += stops.length; completedStops += stops.filter(function(s){return s.completed;}).length; });
  var routeRate = totalStops > 0 ? Math.round(completedStops/totalStops*100) : 0;
  var posRate = t.length > 0 ? Math.round(t.filter(function(x){return x.outcome==='Positive';}).length/t.length*100) : 0;
  return {stale:stale,byRep:byRep,maxTouches:maxTouches,byType:byType,fuTotal:fuTotal,fuDone:fuDone,fuRate:fuRate,fuOverdue:fuOverdue,newPartners:newPartners,refByRep:refByRep,routeRate:routeRate,posRate:posRate,totalStops:totalStops,completedStops:completedStops};
}

function sa_render() {
  var a = document.getElementById('app'); if(!a) return;
  var h = '';

  // Period + market filter bar
  h += '<div style="background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;gap:10px;align-items:center;">';
  h += '<span style="font-size:11px;font-weight:600;color:var(--muted);">PERIOD:</span>';
  [7,30,90].forEach(function(d) { h += sa_mkPeriodBtn(d); });
  h += '<span style="margin-left:12px;font-size:11px;font-weight:600;color:var(--muted);">MARKET:</span>';
  ['All','Appleton','Stevens Point'].forEach(function(m) { h += sa_mkMarketBtn(m); });
  h += '</div>';

  // Sub-tabs
  h += '<div class="sub-tab-bar">';
  ['dashboard','activity'].forEach(function(tab) {
    var isActive = (AD.tab||'dashboard') === tab;
    var label = tab === 'dashboard' ? '📊 Dashboard' : '📜 Activity Log';
    h += '<button class="sub-tab'+(isActive?' active':'')+'" onclick="sa_setTab(\''+tab+'\')">'+label+'</button>';
  });
  h += '</div>';

  h += '<div style="padding:16px;max-width:1300px;margin:0 auto;">';

  if ((AD.tab||'dashboard') === 'activity') {
    h += '</div>'; a.innerHTML = h;
    sa_renderActivity();
    return;
  }

  if(AD.loading) {
    h += '<div style="text-align:center;padding:60px;color:var(--muted);">Loading sales data...</div>';
    h += '</div>'; a.innerHTML=h; return;
  }

  var S = sa_getStats();

  // KPI cards
  h += '<div class="section-hdr">Key Metrics — Last '+AD.period+' Days</div>';
  h += '<div class="admin-grid">';
  var kpis = [
    {val:AD.touches.length, lbl:'Total Touches', sub:AD.period+'d window', accent:'#e85d04'},
    {val:S.posRate+'%', lbl:'Positive Rate', sub:AD.touches.filter(function(t){return t.outcome==='Positive';}).length+' positive', accent:'#2e7d32'},
    {val:S.newPartners, lbl:'Partners Added', sub:'Last '+AD.period+' days', accent:'#1565c0'},
    {val:AD.partners.length, lbl:'Total Partners', sub:AD.market+' market', accent:'#0d2d5e'},
    {val:S.stale, lbl:'Stale Partners', sub:'30+ days no touch', accent:'#c0392b'},
    {val:S.fuRate+'%', lbl:'Follow-up Rate', sub:S.fuDone+'/'+S.fuTotal+' completed', accent:'#6a1b9a'},
    {val:S.fuOverdue, lbl:'Overdue Follow-ups', sub:'Need attention now', accent:'#e65100'},
    {val:S.routeRate+'%', lbl:'Route Completion', sub:S.completedStops+'/'+S.totalStops+' stops', accent:'#00838f'}
  ];
  kpis.forEach(function(k) {
    h += '<div class="kpi-card" style="--accent:'+k.accent+';">';

async function sa_renderActivity() {
  var app = document.getElementById('app');
  if (!document.getElementById('act-results')) {
    var today = new Date().toISOString().split('T')[0];
    var fromDefault = new Date(Date.now() - 30*86400000).toISOString().split('T')[0];
    var wrap = document.createElement('div');
    wrap.style.cssText = 'padding:16px;max-width:1300px;margin:0 auto;';
    wrap.innerHTML =
      '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;">' +
        '<select id="act-rep" onchange="sa_fetchActivity()" style="padding:8px 12px;border-radius:6px;border:1.5px solid var(--brd);background:#fff;font-size:12px;">' +
          '<option value="">All Reps</option>' +
          REPS.map(function(r){ return '<option value="'+r+'">'+r+'</option>'; }).join('') +
        '</select>' +
        '<input type="date" id="act-from" value="'+fromDefault+'" onchange="sa_fetchActivity()" style="padding:8px 12px;border-radius:6px;border:1.5px solid var(--brd);font-size:12px;">' +
        '<span style="font-size:12px;color:var(--dim);">to</span>' +
        '<input type="date" id="act-to" value="'+today+'" onchange="sa_fetchActivity()" style="padding:8px 12px;border-radius:6px;border:1.5px solid var(--brd);font-size:12px;">' +
        '<input type="text" id="act-search" placeholder="Search..." oninput="sa_fetchActivity()" style="padding:8px 12px;border-radius:6px;border:1.5px solid var(--brd);font-size:12px;min-width:180px;">' +
      '</div>' +
      '<div id="act-results"><div style="text-align:center;padding:40px;color:var(--dim);">Loading...</div></div>';
    app.appendChild(wrap);
  }
  await sa_fetchActivity();
}

async function sa_fetchActivity() {
  var resultsEl = document.getElementById('act-results');
  if (!resultsEl) return;
  resultsEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--dim);">Loading...</div>';

  var rep = (document.getElementById('act-rep')||{}).value || '';
  var from = (document.getElementById('act-from')||{}).value || '';
  var to = (document.getElementById('act-to')||{}).value || '';
  var search = ((document.getElementById('act-search')||{}).value || '').toLowerCase().trim();

  var url = SB_URL + '/rest/v1/platform_activity?order=ts.desc&limit=500&select=*&category=eq.sales';
  if (rep) url += '&performed_by=eq.' + encodeURIComponent(rep);
  if (from) url += '&ts=gte.' + from + 'T00:00:00';
  if (to) url += '&ts=lte.' + to + 'T23:59:59';

  try {
    var r = await fetch(url, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var rows = await r.json() || [];

    if (search) rows = rows.filter(function(row) {
      return (row.action||'').toLowerCase().includes(search) ||
             (row.detail||'').toLowerCase().includes(search) ||
             (row.performed_by||'').toLowerCase().includes(search);
    });

    if (!rows.length) { resultsEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--dim);">No activity found</div>'; return; }

    var fmtTs = function(iso) {
      var d = new Date(iso);
      return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    };

    var html = '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;padding:10px 14px;background:var(--s1);border-radius:10px;border:1px solid var(--brd);">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--navy);">'+rows.length+' events</div>';
    html += '</div>';

    html += '<table style="width:100%;border-collapse:collapse;font-size:11px;">';
    html += '<thead><tr style="background:var(--navy);color:#fff;">';
    ['Time','Action','Detail','By'].forEach(function(c){html+='<th style="padding:7px 10px;text-align:left;font-size:9px;">'+c+'</th>';});
    html += '</tr></thead><tbody>';
    rows.forEach(function(row,i) {
      html += '<tr style="background:'+(i%2===0?'var(--s1)':'#fff')+';border-bottom:1px solid var(--border);">';
      html += '<td style="padding:6px 10px;font-family:DM Mono,monospace;font-size:10px;color:var(--dim);">'+fmtTs(row.ts)+'</td>';
      html += '<td style="padding:6px 10px;font-weight:600;">'+(row.action||'—')+'</td>';
      html += '<td style="padding:6px 10px;color:var(--dim);">'+(row.detail||'—')+'</td>';
      html += '<td style="padding:6px 10px;font-size:11px;color:var(--dim);">'+(row.performed_by||'—')+'</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    resultsEl.innerHTML = html;
  } catch(e) {
    resultsEl.innerHTML = '<div style="padding:20px;color:var(--red);">Error: '+e.message+'</div>';
  }
}

    doc.text(refs+' referrals',140,y+5);
    var barW=Math.round((cnt/Math.max(S.maxTouches,1))*50);
    doc.setFillColor(232,93,4); doc.rect(160,y+2,barW,3,'F');
    y+=8;

  y+=6;

  doc.setFillColor(13,45,94);
  doc.rect(0,272,216,8,'F');

  doc.text('JG Restoration | Appleton & Stevens Point | Confidential Sales Report', 14, 277);

  var fname='JG_Sales_'+(type==='weekly'?'Weekly':'Monthly')+'_'+new Date().toISOString().split('T')[0]+'.pdf';

      body: JSON.stringify({ id: 'current', settings: settings, updated_at: new Date().toISOString() })

async function ac_loadFromDB() {

}

}

function ac_toggle(pageKey, role) {
  var settings = ac_getSettings();
  if (!settings[pageKey]) settings[pageKey] = [];
  var idx = settings[pageKey].indexOf(role);
  if (idx > -1) settings[pageKey].splice(idx, 1);
  else settings[pageKey].push(role);
  ac_saveSettings(settings);
  ac_saveToDB(settings);
  ac_render();
}

function ac_cycleEmp(empId, pageKey) {
  var settings = ac_getSettings();
  var grantKey = '_emp_' + empId;
  var denyKey = '_deny_' + empId;
  if (!settings[grantKey]) settings[grantKey] = [];
  if (!settings[denyKey]) settings[denyKey] = [];
  var isGranted = settings[grantKey].includes(pageKey);
  var isDenied = settings[denyKey].includes(pageKey);
  if (!isGranted && !isDenied) {
    settings[grantKey].push(pageKey);
  } else if (isGranted) {
    settings[grantKey] = settings[grantKey].filter(function(p){return p!==pageKey;});
    settings[denyKey].push(pageKey);
  } else {
    settings[denyKey] = settings[denyKey].filter(function(p){return p!==pageKey;});
  }
  ac_saveSettings(settings);
  ac_saveToDB(settings);
  ac_render();
}

function ac_resetDefaults() {
  if (!confirm('Reset all access settings to defaults?')) return;
  var defaults = Object.assign({}, ACCESS_DEFAULTS, TAB_ACCESS_DEFAULTS);
  ac_saveSettings(defaults);
  ac_saveToDB(defaults);
  ac_render();
  toast('Access settings reset to defaults');
}

var PR = { allEmployees: [], unsubscribe: null, loaded: false, loading: false, loadError: null, showDisabled: true };

async function pr_loadEmployees(){
  if (PR.loading) return;
  PR.loading = true;

  try {
    // Fetch ALL employees (including disabled) so admins can re-enable them
    var r = await fetch(SB_URL + '/rest/v1/employees?select=id,name,email,role,market,active,pending_approval&order=name.asc', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    if (r.ok) {
      PR.allEmployees = await r.json() || [];
    } else {
      PR.loadError = 'Roster fetch returned ' + r.status;
      PR.allEmployees = [];
    }
  } catch(e) {
    PR.loadError = e.message || 'Network error';
    PR.allEmployees = [];
  }
  PR.loaded = true;
  PR.loading = false;
}

// Safety-check: don't let admins disable themselves or other admins by accident
function pr_canModify(emp){
  var me = JSON.parse(localStorage.getItem('jg_platform_user')||'null');
  if (!me) return false;
  var myEmail = (me.email||'').toLowerCase();
  var theirEmail = (emp.email||'').toLowerCase();
  // Can't modify yourself
  if (myEmail === theirEmail) return false;
  // Only Josh can modify other admins
  var adminEmails = ['josh@jg-restoration.com','jgimprovements@gmail.com'];
  if (adminEmails.indexOf(theirEmail) !== -1 && adminEmails.indexOf(myEmail) === -1) return false;
  return true;
}

async function pr_toggleActive(empId, currentlyActive){
  var emp = PR.allEmployees.filter(function(e){ return e.id === empId; })[0];
  if (!emp) return;
  if (!pr_canModify(emp)) { alert('You do not have permission to modify this user.'); return; }

  var action = currentlyActive ? 'disable' : 'enable';
  var warning = currentlyActive
    ? 'Disable ' + emp.name + '?\n\nThey will be locked out on their next page load. Any active time clock entries will NOT be auto-closed.\n\nClick OK to confirm.'
    : 'Re-enable ' + emp.name + '?\n\nThey will be able to sign back into the platform immediately.';
  if (!confirm(warning)) return;

  try {
    var r = await fetch(SB_URL + '/rest/v1/employees?id=eq.' + empId, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ active: !currentlyActive, pending_approval: false })
    });
    if (!r.ok) { alert('Update failed: HTTP ' + r.status); return; }
    // Log the action
    try {
      var me = JSON.parse(localStorage.getItem('jg_platform_user')||'{}');
      await fetch(SB_URL + '/rest/v1/platform_activity', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify({
          action: currentlyActive ? 'User Disabled' : 'User Re-enabled',
          detail: emp.name + ' (' + emp.email + ') was ' + action + 'd',
          category: 'admin',
          employee_name: emp.name,
          performed_by: me.name || 'Admin',
          performed_by_email: (me.email||'').toLowerCase(),
          ts: new Date().toISOString()
        })
      });
    } catch(e) {}
    // Refresh roster
    PR.loaded = false;
    await pr_loadEmployees();
    pr_render();
  } catch(e) {
    alert('Update failed: ' + e.message);
  }
}

async function pr_approvePending(empId){
  var emp = PR.allEmployees.filter(function(e){ return e.id === empId; })[0];
  if (!emp) return;
  if (!confirm('Approve ' + emp.name + ' for platform access?')) return;
  try {
    var r = await fetch(SB_URL + '/rest/v1/employees?id=eq.' + empId, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },

function pr_fmtSince(ts){
  if (!ts) return '';
  var s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

      h += '<div style="font-size:13px;font-weight:600;color:#0d1f3c;">' + e.name + '</div>';
      h += '<div style="font-size:11px;color:#6b7a96;font-family:\'DM Mono\',monospace;">' + (e.role||'—') + (e.market?' · '+e.market:'') + ' · ' + (e.email||'') + '</div>';
      h += '</div>';
      h += '<button onclick="pr_approvePending(\'' + e.id + '\')" style="background:#2e7d32;color:#fff;border:none;padding:8px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;">✓ Approve</button>';
      h += '</div>';
    });
    h += '</div>';
  }

  // Active roster
  h += '<div style="background:#fff;border:1px solid rgba(13,45,94,.1);border-radius:10px;overflow:hidden;margin-bottom:16px;">';
  h += '<div style="padding:12px 16px;border-bottom:1px solid rgba(13,45,94,.08);background:rgba(13,45,94,.03);">';
  h += '<span style="font-size:12px;font-weight:700;color:#0d2d5e;font-family:\'DM Mono\',monospace;text-transform:uppercase;letter-spacing:.05em;">👥 Active Users — ' + activeEmps.length + '</span>';
  h += '</div>';
  if (!activeEmps.length) {
    h += '<div style="padding:20px;text-align:center;color:#a0abbf;font-size:13px;">No active users</div>';
  } else {
    activeEmps.forEach(function(e){
      var isOnline = !!onlineEmails[(e.email||'').toLowerCase()];
      var canModify = pr_canModify(e);
      var isJGEmail = (e.email||'').toLowerCase().endsWith('@jg-restoration.com');
      var authBadge = isJGEmail
        ? '<span title="Google SSO" style="font-size:9px;color:#1565c0;background:rgba(21,101,192,.1);padding:2px 7px;border-radius:10px;font-weight:700;font-family:\'DM Mono\',monospace;margin-left:4px;">G</span>'
        : '<span title="Email + Password" style="font-size:9px;color:#e85d04;background:rgba(232,93,4,.1);padding:2px 7px;border-radius:10px;font-weight:700;font-family:\'DM Mono\',monospace;margin-left:4px;">✉</span>';
      h += '<div style="padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(13,45,94,.05);' + (isOnline ? '' : 'opacity:.75;') + '">';
      h += '<div style="width:32px;height:32px;border-radius:50%;background:' + (isOnline ? '#2e7d32' : '#a0abbf') + ';color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:\'DM Mono\',monospace;flex-shrink:0;">';
      h += pr_initials(e.name) + '</div>';
      h += '<div style="flex:1;min-width:0;">';
      h += '<div style="font-size:12px;font-weight:600;color:#0d1f3c;">' + e.name + authBadge + (isOnline ? ' <span style="color:#2e7d32;font-size:10px;font-weight:700;">● LIVE</span>' : '') + '</div>';
      h += '<div style="font-size:10px;color:#6b7a96;font-family:\'DM Mono\',monospace;">' + (e.role||'') + (e.market?' · '+e.market:'') + ' · ' + (e.email||'') + '</div>';
      h += '</div>';
      if (canModify) {
        h += '<button onclick="pr_toggleActive(\'' + e.id + '\',true)" style="background:none;border:1px solid rgba(192,32,32,.3);color:#c02020;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;">🚫 Disable</button>';
      } else {
        h += '<span style="font-size:10px;color:#a0abbf;font-style:italic;padding:6px 10px;">you</span>';
      }
      h += '</div>';
    });
  }
  h += '</div>';

  // Disabled users
  if (disabledEmps.length) {
    h += '<div style="background:#fff;border:1px solid rgba(192,32,32,.2);border-radius:10px;overflow:hidden;margin-bottom:16px;">';
    h += '<div style="padding:12px 16px;border-bottom:1px solid rgba(13,45,94,.08);background:rgba(192,32,32,.04);">';
    h += '<span style="font-size:12px;font-weight:700;color:#c02020;font-family:\'DM Mono\',monospace;text-transform:uppercase;letter-spacing:.05em;">🚫 Disabled — ' + disabledEmps.length + '</span>';
    h += '</div>';
    disabledEmps.forEach(function(e){
      h += '<div style="padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(13,45,94,.05);opacity:.7;">';
      h += '<div style="width:32px;height:32px;border-radius:50%;background:#a0abbf;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:\'DM Mono\',monospace;flex-shrink:0;text-decoration:line-through;">';
      h += pr_initials(e.name) + '</div>';
      h += '<div style="flex:1;min-width:0;">';
      h += '<div style="font-size:12px;font-weight:600;color:#6b7a96;text-decoration:line-through;">' + e.name + '</div>';
      h += '<div style="font-size:10px;color:#a0abbf;font-family:\'DM Mono\',monospace;">' + (e.role||'') + (e.market?' · '+e.market:'') + ' · ' + (e.email||'') + '</div>';
      h += '</div>';
      if (pr_canModify(e)) {
        h += '<button onclick="pr_toggleActive(\'' + e.id + '\',false)" style="background:none;border:1px solid rgba(46,125,50,.3);color:#2e7d32;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;">↻ Re-enable</button>';
      }
      h += '</div>';
    });
    h += '</div>';
  }

  h += '<div style="margin-top:14px;padding:10px 14px;background:rgba(13,45,94,.04);border-radius:8px;font-size:11px;color:#6b7a96;line-height:1.5;">';
  h += '<strong>Disable vs. Delete:</strong> Disabling a user locks them out on their next page load but preserves all their time clock entries, sales history, and other records. Disabled users can be re-enabled anytime. You cannot disable yourself or another admin.';
  h += '</div>';

  h += '</div>';
  app.innerHTML = h;
}

// Subscribe to presence updates so the panel auto-refreshes when someone joins/leaves
(function setupPresenceSubscription(){
  function tryWire(){
    if (!window.JGPresence) { setTimeout(tryWire, 500); return; }
    PR.unsubscribe = window.JGPresence.subscribe(function(){
      // Only re-render if this panel is currently active
      if (CURRENT_PANEL === 'presence') pr_render();
      // Update badge regardless of active panel
      var badge = document.getElementById('presence-count-badge');
      var n = window.JGPresence.count();
      if (badge) {
        if (n > 0) { badge.textContent = n; badge.style.display = 'inline-block'; }
        else { badge.style.display = 'none'; }
      }
    });
  }
  tryWire();
})();
