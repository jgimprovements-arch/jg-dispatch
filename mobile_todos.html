<link rel="manifest" href="manifest.json">
<title>To-Dos · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<style>
  :root {
    --bg: #f4f6fb; --bg-elev: #ffffff; --bg-input: #ffffff;
    --text: #1a2540; --text-soft: #5a6478; --muted: #7884a0;
    --line: #e3e7f0; --line-strong: #c8cfdc;
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623;
    --green: #2d9c5f; --red: #d64545; --blue-primary: #2563eb;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html { color-scheme: light; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); overscroll-behavior-y: contain; padding-bottom: calc(var(--safe-bottom) + 72px); }

  .topbar { padding: calc(var(--safe-top) + 14px) 18px 12px; display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .menu-btn { background: transparent; border: 0; color: var(--text); width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; }
  .menu-btn:active { background: var(--bg-elev); }
  .menu-btn svg { width: 24px; height: 24px; }
  .page-title { font-size: 20px; font-weight: 800; letter-spacing: -.2px; }
  .add-btn { background: var(--blue-primary); color: #fff; border: 0; width: 38px; height: 38px; border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; box-shadow: 0 4px 12px rgba(37,99,235,.3); font-family: inherit; }
  .add-btn:active { transform: scale(.92); }

  main { padding: 0 14px; max-width: 720px; margin: 0 auto; }

  /* Filter pill row */
  .filter-row { display: flex; gap: 6px; margin: 8px 0 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip { background: var(--bg-elev); border: 1px solid var(--line); border-radius: 999px; padding: 7px 14px; font-size: 12px; font-weight: 700; color: var(--navy); white-space: nowrap; cursor: pointer; flex-shrink: 0; }
  .filter-chip.on { background: var(--navy); color: #fff; border-color: var(--navy); }

  /* To-do cards */
  .todos-list { display: flex; flex-direction: column; gap: 8px; }
  .todo-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    transition: transform .1s, border-color .15s;
    border-left-width: 4px;
  }
  .todo-card:active { transform: scale(.99); border-color: var(--orange); }
  .todo-card.done { opacity: .55; }
  .todo-card.done .todo-title { text-decoration: line-through; }
  .todo-card.urgent { border-left-color: var(--red); }
  .todo-card.high { border-left-color: var(--orange); }
  .todo-card.normal { border-left-color: var(--blue-primary); }
  .todo-card.low { border-left-color: var(--muted); }
  .todo-check {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid var(--line-strong);
    background: var(--bg-input);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    margin-top: 2px;
    font-size: 14px;
    transition: all .15s;
  }
  .todo-check:active { transform: scale(.92); }
  .todo-card.done .todo-check { background: var(--green); border-color: var(--green); color: #fff; }

  .todo-main { flex: 1; min-width: 0; }
  .todo-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; line-height: 1.3; word-wrap: break-word; }
  .todo-meta { font-size: 11px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .todo-meta .pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--bg);
    border: 1px solid var(--line);
    font-size: 10px;
    font-weight: 600;
    color: var(--navy);
  }
  .todo-meta .pill.project { background: rgba(13,45,94,.08); border-color: rgba(13,45,94,.2); }
  .todo-meta .pill.due { background: rgba(232,93,4,.10); border-color: rgba(232,93,4,.3); color: var(--orange); }
  .todo-meta .pill.due.overdue { background: rgba(214,69,69,.10); border-color: rgba(214,69,69,.3); color: var(--red); }
  .todo-meta .pill.task-type { background: rgba(74,144,226,.10); border-color: rgba(74,144,226,.3); color: #4a90e2; }
  .todo-body { font-size: 12px; color: var(--text-soft); margin-top: 6px; line-height: 1.4; }

  /* Empty state */
  .empty-block { background: var(--bg-elev); border: 1px dashed var(--line); border-radius: 14px; padding: 40px 20px; text-align: center; color: var(--muted); margin-top: 14px; }
  .empty-block .ico { font-size: 42px; opacity: .4; margin-bottom: 8px; }
  .empty-block h3 { color: var(--text); margin: 0 0 4px; font-size: 15px; }
  .empty-block p { margin: 0; font-size: 13px; }

  .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }

  /* Bottom nav (same as project.html) */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-elev); border-top: 1px solid var(--line); padding: 8px 4px calc(var(--safe-bottom) + 4px); display: grid; grid-template-columns: repeat(5, 1fr); z-index: 50; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 0; text-decoration: none; color: var(--muted); font-size: 11px; font-weight: 600; border: 0; background: transparent; cursor: pointer; font-family: inherit; position: relative; }
  .nav-item.on { color: var(--orange); }
  .nav-item.on::before { content: ''; position: absolute; top: 0; left: 28%; right: 28%; height: 3px; background: var(--orange); border-radius: 0 0 4px 4px; }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-item:active { color: var(--orange); }

  /* Bottom sheet for new to-do */
  .sheet-back { position: fixed; inset: 0; background: rgba(13,45,94,.5); z-index: 100; display: none; align-items: flex-end; }
  .sheet-back.on { display: flex; }
  .sheet { background: var(--bg-elev); width: 100%; max-width: 720px; margin: 0 auto; border-radius: 18px 18px 0 0; padding: 18px 16px calc(var(--safe-bottom) + 18px); box-shadow: 0 -8px 32px rgba(13,45,94,.3); max-height: 92vh; overflow-y: auto; animation: sheetUp .25s ease-out; }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet h3 { margin: 0 0 14px; color: var(--navy); font-size: 17px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
  .sheet .close-x { background: var(--bg); border: 0; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; color: var(--muted); }
  .sheet label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin: 10px 0 4px; }
  .sheet input, .sheet select, .sheet textarea { width: 100%; border: 1px solid var(--line); background: var(--bg-input); border-radius: 9px; padding: 11px 13px; font-size: 14px; font-family: inherit; color: var(--text); }
  .sheet input:focus, .sheet select:focus, .sheet textarea:focus { outline: none; border-color: var(--orange); }
  .sheet textarea { min-height: 90px; resize: vertical; line-height: 1.4; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .actions { display: flex; gap: 8px; margin-top: 14px; }
  .btn { flex: 1; padding: 12px; border-radius: 999px; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid transparent; font-family: inherit; }
  .btn.primary { background: var(--orange); color: #fff; border-color: var(--orange); }
  .btn.primary:disabled { opacity: .5; }
  .btn.ghost { background: var(--bg); color: var(--navy); border-color: var(--line); }

  /* Searchable picker button (replaces select) */
  .picker-btn {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 11px 13px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    text-align: left;
  }
  .picker-btn:active { border-color: var(--orange); }
  .picker-label {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .picker-label.placeholder { color: var(--muted); }
  .picker-caret {
    color: var(--muted);
    font-size: 20px;
    line-height: 1;
    transform: rotate(90deg);
    flex-shrink: 0;
  }

  /* Picker overlay */
  .picker-back { position: fixed; inset: 0; background: rgba(13,45,94,.5); z-index: 200; display: none; }
  .picker-back.on { display: block; }
  .picker-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    z-index: 210;
    transform: translateY(100%);
    transition: transform .25s;
    display: flex;
    flex-direction: column;
    max-width: 720px;
    margin: 0 auto;
  }
  .picker-overlay.on { transform: translateY(0); }
  .picker-header {
    padding: calc(var(--safe-top) + 14px) 14px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--line);
  }
  .picker-search {
    flex: 1;
    border: 1px solid var(--line);
    background: var(--bg-input);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 15px;
    color: var(--text);
    font-family: inherit;
  }
  .picker-search:focus { outline: none; border-color: var(--orange); }
  .picker-close {
    background: var(--orange);
    color: #fff;
    border: 0;
    border-radius: 999px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .picker-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px 14px calc(var(--safe-bottom) + 14px);
  }
  .picker-item {
    padding: 14px 12px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background .15s;
  }
  .picker-item:active { background: var(--bg-elev); }
  .picker-item.selected { background: rgba(232,93,4,.08); border-left: 3px solid var(--orange); padding-left: 9px; }
  .picker-item-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .picker-item-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .picker-item.clear { color: var(--muted); font-style: italic; }
  .picker-item.clear .picker-item-title { color: var(--muted); font-weight: 600; }

  .toast { position: fixed; bottom: calc(var(--safe-bottom) + 90px); left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 16px rgba(13,45,94,.3); z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.on { opacity: 1; }

  /* Side menu (same pattern) */
  .side-menu-back { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 90; display: none; }
  .side-menu-back.on { display: block; }
  .side-menu { position: fixed; top: 0; left: 0; bottom: 0; width: 78%; max-width: 320px; background: var(--bg-elev); padding: calc(var(--safe-top) + 22px) 0 var(--safe-bottom); transform: translateX(-100%); transition: transform .25s; z-index: 100; display: flex; flex-direction: column; }
  .side-menu.on { transform: translateX(0); }
  .side-menu .header { padding: 0 22px 18px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 12px; }
  .side-menu .header img { width: 42px; height: 42px; border-radius: 8px; background: var(--bg); padding: 4px; }
  .side-menu .header .name { font-weight: 800; font-size: 15px; color: var(--text); }
  .side-menu .header .role { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; font-weight: 700; }
  .side-menu .links { padding: 8px 0; flex: 1; overflow-y: auto; }
  .side-menu .link { display: flex; align-items: center; gap: 12px; padding: 14px 22px; color: var(--text); text-decoration: none; font-size: 14px; font-weight: 600; }
  .side-menu .link:active { background: var(--bg); }
  .side-menu .link .ico { font-size: 20px; opacity: .8; }
  .side-menu .footer { padding: 12px 22px; border-top: 1px solid var(--line); font-size: 11px; color: var(--muted); }
</style>
</head>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const sb = createClient(SB_URL, SB_ANON);

const ADMIN_EMAILS = new Set(['josh@jg-restoration.com','jgimprovements@gmail.com']);
const PM_EMAILS = new Set(['hannah@jg-restoration.com','kristina@jg-restoration.com','brent@jg-restoration.com','anthony@jg-restoration.com','ana@jg-restoration.com']);

const TASK_TYPES = [
  'Albi: Schedule Inspection','Albi: Mitigation','Albi: Mold Test','Albi: Drying',
  'Albi: Customer Call','Albi: Estimate','Albi: Approval','Albi: Material Order',
  'Albi: Schedule Reconstruction','Albi: Reconstruction','Albi: QC Walkthrough',
  'Albi: Final Bill','Albi: Final Payment','Albi: Close Job','Albi: Other',
  'Order Materials','Sub Coordination','Site Visit','Other',
];

const state = {
  email: null, name: null, role: null,
  todos: [], projects: [], staff: [],
  filter: 'mine', // mine | assigned | created | open | done
  search: '',
  prefilledProjectId: null,
  prefilledAssigneeEmail: null,
};

const $ = sel => document.querySelector(sel);
const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2200);
}

async function init() {
  let user = null;
  try { user = JSON.parse(localStorage.getItem('jg_platform_user') || 'null'); } catch {}
  state.email = (user?.email || '').toLowerCase();
  state.name = user?.name || (state.email ? state.email.split('@')[0] : '');
  if (!state.email) {
    $('#content').innerHTML = `<div class="empty-block"><div class="ico">🔒</div><h3>Sign in required</h3><p>Open the JG Hub in a browser, sign in, then return here.</p></div>`;
    return;
  }
  state.role = ADMIN_EMAILS.has(state.email) ? 'admin' : PM_EMAILS.has(state.email) ? 'pm' : 'field';

  $('#sideMenuName').textContent = state.name;
  $('#sideMenuRole').textContent = state.role === 'admin' ? 'Administrator' : state.role === 'pm' ? 'Project Manager' : 'Field Tech';

  // Deep-link params
  const params = new URLSearchParams(location.search);
  state.prefilledProjectId = params.get('project');
  const autoAction = params.get('action');

  await Promise.all([loadTodos(), loadProjects(), loadStaff()]);
  renderFilters();
  render();
  wire();

  // Realtime
  sb.channel('mob_todos_' + state.email)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rebuild_todos' },
      async () => { await loadTodos(); render(); })
    .subscribe();

  if (autoAction === 'new') {
    setTimeout(() => openNewSheet(), 150);
  }
}

async function loadTodos() {
  const { data } = await sb.from('rebuild_todos')
    .select('*, project:rebuild_projects(id, albi_job_number, customer_name)')
    .order('created_at', { ascending: false })
    .limit(200);
  state.todos = data || [];
}

async function loadProjects() {
  const { data } = await sb.from('rebuild_projects')
    .select('id, albi_job_number, customer_name, albi_project_id')
    .order('albi_project_id_num', { ascending: false, nullsLast: true })
    .limit(100);
  state.projects = data || [];
}

async function loadStaff() {
  const { data } = await sb.from('employees')
    .select('id, name, email, personal_email, role, active')
    .eq('active', true)
    .order('name');
  state.staff = data || [];
}

function renderFilters() {
  $('#filterRow').innerHTML = `
    <div class="filter-chip ${state.filter === 'mine' ? 'on' : ''}" data-f="mine">Mine</div>
    <div class="filter-chip ${state.filter === 'assigned' ? 'on' : ''}" data-f="assigned">Assigned to Me</div>
    <div class="filter-chip ${state.filter === 'created' ? 'on' : ''}" data-f="created">Created by Me</div>
    <div class="filter-chip ${state.filter === 'open' ? 'on' : ''}" data-f="open">All Open</div>
    <div class="filter-chip ${state.filter === 'done' ? 'on' : ''}" data-f="done">Completed</div>
  `;
  $('#filterRow').querySelectorAll('.filter-chip').forEach(c => {
    c.addEventListener('click', () => {
      state.filter = c.dataset.f;
      renderFilters();
      render();
    });
  });
}

function filtered() {
  const me = state.email;
  return state.todos.filter(t => {
    if (state.filter === 'mine') {
      return (t.assignee_email === me || t.created_by_email === me) && t.status !== 'completed';
    }
    if (state.filter === 'assigned') return t.assignee_email === me && t.status !== 'completed';
    if (state.filter === 'created') return t.created_by_email === me && t.status !== 'completed';
    if (state.filter === 'open') return t.status !== 'completed';
    if (state.filter === 'done') return t.status === 'completed';
    return true;
  });
}

function render() {
  const list = filtered();
  if (!list.length) {
    $('#content').innerHTML = `
      <div class="empty-block">
        <div class="ico">${state.filter === 'done' ? '✓' : '📋'}</div>
        <h3>${state.filter === 'done' ? 'No completed to-dos yet' : 'No to-dos'}</h3>
        <p>${state.filter === 'done' ? 'Get to work — completed items will show up here.' : 'Tap + to add one.'}</p>
      </div>
    `;
    return;
  }
  $('#content').innerHTML = `<div class="todos-list">${list.map(todoCard).join('')}</div>`;
  document.querySelectorAll('.todo-check').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDone(el.dataset.id);
    });
  });
  document.querySelectorAll('.todo-card').forEach(el => {
    el.addEventListener('click', () => {
      const t = state.todos.find(x => x.id === el.dataset.id);
      if (t?.project_id) location.href = `project_detail.html?p=${t.project_id}`;
    });
  });
}

function fmtDue(d) {
  if (!d) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const due = new Date(d + 'T00:00:00');
  const diff = Math.round((due - today) / 86400000);
  const overdue = diff < 0;
  const label = diff === 0 ? 'Today' : diff === 1 ? 'Tomorrow' : diff === -1 ? 'Yesterday' : overdue ? `${Math.abs(diff)}d overdue` : due.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return { label, overdue };
}

function todoCard(t) {
  const isDone = t.status === 'completed';
  const due = fmtDue(t.due_date);
  return `
    <div class="todo-card ${isDone ? 'done' : ''} ${t.priority || 'normal'}" data-id="${t.id}">
      <div class="todo-check" data-id="${t.id}">${isDone ? '✓' : ''}</div>
      <div class="todo-main">
        <div class="todo-title">${esc(t.title || '(no title)')}</div>
        <div class="todo-meta">
          ${t.project ? `<span class="pill project">${esc(t.project.albi_job_number || 'project')}</span>` : ''}
          ${t.task_type ? `<span class="pill task-type">${esc(t.task_type)}</span>` : ''}
          ${due ? `<span class="pill due ${due.overdue ? 'overdue' : ''}">📅 ${esc(due.label)}</span>` : ''}
          ${t.assignee_email && t.assignee_email !== state.email ? `<span class="pill">→ ${esc(t.assignee_name || t.assignee_email.split('@')[0])}</span>` : ''}
        </div>
        ${t.body && !isDone ? `<div class="todo-body">${esc(t.body.slice(0, 140))}${t.body.length > 140 ? '…' : ''}</div>` : ''}
      </div>
    </div>
  `;
}

async function toggleDone(id) {
  const t = state.todos.find(x => x.id === id);
  if (!t) return;
  const newStatus = t.status === 'completed' ? 'open' : 'completed';
  const updates = { status: newStatus };
  if (newStatus === 'completed') {
    updates.completed_at = new Date().toISOString();
    updates.completed_by_email = state.email;
  } else {
    updates.completed_at = null;
    updates.completed_by_email = null;
  }
  await sb.from('rebuild_todos').update(updates).eq('id', id);
  await sb.from('rebuild_todo_history').insert({
    todo_id: id, action: newStatus === 'completed' ? 'completed' : 'reopened',
    actor: state.email,
  });
  toast(newStatus === 'completed' ? 'Marked done' : 'Reopened');
}

function openNewSheet() {
  // Initialize project picker value
  const prefilled = state.prefilledProjectId
    ? state.projects.find(p => p.id === state.prefilledProjectId)
    : null;
  setPickedProject(prefilled || null);

  // Populate assignees
  const assignSel = $('#t_assignee');
  assignSel.innerHTML = `<option value="self">Me (${esc(state.name)})</option>` +
    state.staff
      .filter(s => (s.email || s.personal_email) && (s.email || s.personal_email).toLowerCase() !== state.email)
      .map(s => `<option value="${esc(s.email || s.personal_email)}|${esc(s.name)}">${esc(s.name)}</option>`).join('');

  // Populate task types
  $('#t_type').innerHTML = '<option value="">— None —</option>' +
    TASK_TYPES.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');

  // Reset fields
  $('#t_title').value = '';
  $('#t_body').value = '';
  $('#t_priority').value = 'normal';
  $('#t_due').value = '';
  $('#t_type').value = '';
  validateNew();

  $('#newSheetBack').classList.add('on');
  setTimeout(() => $('#t_title').focus(), 100);
}

// ─── Project picker ───
function setPickedProject(project) {
  const hidden = $('#t_project');
  const label = $('#t_project_label');
  if (project) {
    hidden.value = project.id;
    label.textContent = `${project.albi_job_number || ''} · ${project.customer_name || ''}`.replace(/^ · /, '');
    label.classList.remove('placeholder');
  } else {
    hidden.value = '';
    label.textContent = '— No project (personal) —';
    label.classList.add('placeholder');
  }
}

function openProjectPicker() {
  $('#projectPickerBack').classList.add('on');
  $('#projectPicker').classList.add('on');
  $('#picker_search').value = '';
  renderPickerList('');
  setTimeout(() => $('#picker_search').focus(), 100);
}

function closeProjectPicker() {
  $('#projectPickerBack').classList.remove('on');
  $('#projectPicker').classList.remove('on');
}

function renderPickerList(q) {
  q = (q || '').trim().toLowerCase();
  const current = $('#t_project').value;
  const filtered = q
    ? state.projects.filter(p =>
        (p.albi_job_number || '').toLowerCase().includes(q) ||
        (p.customer_name || '').toLowerCase().includes(q) ||
        (p.property_address || '').toLowerCase().includes(q))
    : state.projects;

  const items = [`
    <div class="picker-item clear ${!current ? 'selected' : ''}" data-id="">
      <div class="picker-item-title">— No project (personal) —</div>
    </div>
  `];
  filtered.forEach(p => {
    items.push(`
      <div class="picker-item ${current === p.id ? 'selected' : ''}" data-id="${esc(p.id)}">
        <div class="picker-item-title">${esc(p.albi_job_number || '')} · ${esc(p.customer_name || '')}</div>
        ${p.property_address ? `<div class="picker-item-sub">${esc(p.property_address)}</div>` : ''}
      </div>
    `);
  });
  $('#picker_list').innerHTML = items.join('') || `<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px;">No matches.</div>`;
  $('#picker_list').querySelectorAll('.picker-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      const project = id ? state.projects.find(p => p.id === id) : null;
      setPickedProject(project);
      closeProjectPicker();
    });
  });
}

function closeNewSheet() {
  $('#newSheetBack').classList.remove('on');
}

function validateNew() {
  const title = $('#t_title').value.trim();
  $('#saveNew').disabled = !title;
}

async function saveNew() {
  const title = $('#t_title').value.trim();
  if (!title) return;
  const projectId = $('#t_project').value || null;
  const assignVal = $('#t_assignee').value;
  let assignee_email, assignee_name;
  if (assignVal === 'self') {
    assignee_email = state.email;
    assignee_name = state.name;
  } else {
    const [email, name] = assignVal.split('|');
    assignee_email = email;
    assignee_name = name;
  }
  const priority = $('#t_priority').value;
  const task_type = $('#t_type').value || null;
  const due_date = $('#t_due').value || null;
  const body = $('#t_body').value.trim() || null;

  $('#saveNew').disabled = true;
  $('#saveNew').textContent = 'Saving…';

  const { data, error } = await sb.from('rebuild_todos').insert({
    project_id: projectId,
    title, body,
    priority, task_type, due_date,
    assignee_email: assignee_email.toLowerCase(),
    assignee_name,
    assignee_kind: 'employee',
    created_by_email: state.email,
    created_by_name: state.name,
    status: 'open',
  }).select();

  if (error) {
    console.error(error);
    toast('Save failed: ' + error.message);
    $('#saveNew').disabled = false;
    $('#saveNew').textContent = 'Create To-Do';
    return;
  }
  const newTodo = data?.[0];
  if (newTodo) {
    await sb.from('rebuild_todo_history').insert({
      todo_id: newTodo.id, action: 'created', actor: state.email,
      details: `Created by ${state.name}${assignee_email !== state.email ? ', assigned to ' + assignee_name : ''}`,
    });
    // Notify assignee (skip if assigning to self)
    if (assignee_email !== state.email) {
      try {
        await sb.from('rebuild_notifications').insert({
          project_id: projectId,
          recipient_email: assignee_email.toLowerCase(),
          event_type: 'todo_assigned',
          title: `New to-do: ${title}`,
          body: `${state.name} assigned you a to-do${projectId ? '' : ' (personal)'}.${body ? '\n\n' + body : ''}`,
        });
      } catch (e) { console.warn(e); }
    }
  }

  toast('To-do created');
  $('#saveNew').textContent = 'Create To-Do';
  closeNewSheet();
}

function wire() {
  // Side menu
  $('#menuBtn').addEventListener('click', () => {
    $('#sideMenu').classList.add('on');
    $('#sideMenuBack').classList.add('on');
  });
  $('#sideMenuBack').addEventListener('click', () => {
    $('#sideMenu').classList.remove('on');
    $('#sideMenuBack').classList.remove('on');
  });
  // Add button
  $('#addBtn').addEventListener('click', () => openNewSheet());
  // Sheet controls
  $('#closeSheet').addEventListener('click', closeNewSheet);
  $('#cancelNew').addEventListener('click', closeNewSheet);
  $('#newSheetBack').addEventListener('click', (e) => { if (e.target.id === 'newSheetBack') closeNewSheet(); });
  $('#t_title').addEventListener('input', validateNew);
  $('#saveNew').addEventListener('click', saveNew);

  // Project picker
  $('#t_project_btn').addEventListener('click', openProjectPicker);
  $('#picker_close').addEventListener('click', closeProjectPicker);
  $('#projectPickerBack').addEventListener('click', closeProjectPicker);
  $('#picker_search').addEventListener('input', (e) => renderPickerList(e.target.value));
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js', { scope: '/jg-dispatch/' }).catch(() => {});
}

init();
</script>
</body>
</html>
