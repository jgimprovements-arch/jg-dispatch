<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d2d5e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JG Project">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>JG Project Hub</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<style>
  :root {
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623; --green: #2d9c5f; --red: #d64545;
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --muted: #7884a0; --line: #e3e7f0;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    overscroll-behavior-y: contain;
  }

  /* Topbar */
  .topbar {
    background: linear-gradient(135deg, #0d2d5e 0%, #1a4080 100%);
    color: #fff;
    padding: calc(var(--safe-top) + 14px) 18px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 12px rgba(13,45,94,.25);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar img { width: 34px; height: 34px; object-fit: contain; background: #fff; padding: 4px; border-radius: 6px; }
  .topbar h1 { margin: 0; font-size: 16px; font-weight: 800; letter-spacing: .3px; }
  .topbar .tag { font-size: 10px; opacity: .8; letter-spacing: .8px; text-transform: uppercase; }
  .topbar .user-chip {
    margin-left: auto;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }

  main { padding: 16px 14px calc(var(--safe-bottom) + 28px); max-width: 720px; margin: 0 auto; }

  /* Field view */
  .field-hero {
    background: linear-gradient(135deg, var(--orange) 0%, #f5a623 100%);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 16px;
    color: #fff;
    box-shadow: 0 8px 24px rgba(232,93,4,.25);
  }
  .field-hero .greet {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    opacity: .9;
    margin-bottom: 6px;
  }
  .field-hero h2 { margin: 0 0 4px; font-size: 24px; font-weight: 800; }
  .field-hero .date { font-size: 13px; opacity: .85; }

  .clock-btn-wrap {
    margin: 0 0 18px;
  }
  .clock-btn {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, var(--green) 0%, #25864e 100%);
    color: #fff;
    border: 0;
    border-radius: 16px;
    padding: 22px;
    font-size: 18px;
    font-weight: 800;
    text-decoration: none;
    text-align: center;
    box-shadow: 0 8px 24px rgba(45,156,95,.3);
    letter-spacing: .3px;
    transition: transform .15s, box-shadow .15s;
    cursor: pointer;
    font-family: inherit;
  }
  .clock-btn:active { transform: translateY(2px); box-shadow: 0 4px 12px rgba(45,156,95,.3); }
  .clock-btn .clock-icon { font-size: 32px; display: block; margin-bottom: 4px; }
  .clock-btn .sub { font-size: 12px; font-weight: 500; opacity: .9; margin-top: 4px; text-transform: uppercase; letter-spacing: .6px; }

  .field-job-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(13,45,94,.06);
  }
  .field-job-card .job-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 6px;
  }
  .field-job-card .job-num {
    font-size: 18px;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: -.2px;
  }
  .field-job-card .job-status {
    background: rgba(232,93,4,.12);
    color: var(--orange);
    font-size: 10px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: .4px;
    white-space: nowrap;
  }
  .field-job-card .job-customer {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .field-job-card .job-addr {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 12px;
    line-height: 1.4;
  }
  .field-job-card .job-addr a {
    color: var(--orange);
    text-decoration: none;
    font-weight: 600;
  }
  .field-job-card .job-phases {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding-top: 10px;
    border-top: 1px solid var(--line);
  }
  .phase-chip {
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    color: var(--navy);
  }
  .phase-chip.in_progress { background: rgba(232,93,4,.10); color: var(--orange); border-color: rgba(232,93,4,.3); }
  .phase-chip.completed { background: rgba(45,156,95,.10); color: var(--green); border-color: rgba(45,156,95,.3); }

  .field-empty {
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: 14px;
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
  }
  .field-empty .icon { font-size: 42px; opacity: .4; margin-bottom: 8px; }
  .field-empty h3 { color: var(--navy); margin: 0 0 4px; font-size: 16px; }
  .field-empty p { margin: 0; font-size: 13px; }

  /* PM view */
  .pm-hero {
    background: linear-gradient(135deg, #0d2d5e 0%, #1a4080 100%);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 16px;
    color: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(13,45,94,.18);
  }
  .pm-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(232,93,4,.22) 0%, transparent 70%);
    pointer-events: none;
  }
  .pm-hero .tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--orange);
    background: rgba(232,93,4,.18);
    border: 1px solid rgba(232,93,4,.4);
    padding: 3px 11px;
    border-radius: 999px;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  .pm-hero h2 { margin: 0 0 2px; font-size: 22px; font-weight: 800; position: relative; z-index: 1; }
  .pm-hero .sub { font-size: 12px; opacity: .8; position: relative; z-index: 1; }

  .pm-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .pm-stat {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .pm-stat .num {
    font-size: 22px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1;
  }
  .pm-stat .lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    font-weight: 700;
    margin-top: 4px;
  }
  .pm-stat.alert .num { color: var(--orange); }

  .pm-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .pm-action-btn {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
    text-decoration: none;
    color: var(--navy);
    font-weight: 700;
    font-size: 12px;
    transition: border-color .15s, background .15s;
  }
  .pm-action-btn .ico { font-size: 22px; display: block; margin-bottom: 4px; }
  .pm-action-btn:active { background: var(--bg); border-color: var(--orange); }

  .search-bar {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 14px;
    background: var(--card);
    margin-bottom: 12px;
    font-family: inherit;
    color: var(--navy);
  }
  .search-bar:focus { outline: none; border-color: var(--orange); }

  .pm-project-list { display: flex; flex-direction: column; gap: 8px; }
  .pm-project {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .pm-project:active { border-color: var(--orange); box-shadow: 0 2px 8px rgba(232,93,4,.1); }
  .pm-project .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .pm-project .job {
    font-weight: 800;
    color: var(--navy);
    font-size: 14px;
  }
  .pm-project .stat-pill {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: .4px;
    background: rgba(120,132,160,.15);
    color: var(--muted);
    white-space: nowrap;
  }
  .pm-project .stat-pill.active { background: rgba(45,156,95,.15); color: var(--green); }
  .pm-project .stat-pill.planning { background: rgba(120,132,160,.15); color: var(--muted); }
  .pm-project .customer { font-size: 13px; color: var(--text); margin: 4px 0 2px; }
  .pm-project .meta { font-size: 11px; color: var(--muted); }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
  }

  /* Install prompt */
  .install-prompt {
    position: fixed;
    bottom: 16px;
    left: 16px;
    right: 16px;
    background: var(--navy);
    color: #fff;
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: 0 10px 32px rgba(13,45,94,.4);
    display: none;
    align-items: center;
    gap: 12px;
    z-index: 100;
  }
  .install-prompt.on { display: flex; }
  .install-prompt-text { flex: 1; font-size: 13px; }
  .install-prompt-text b { font-size: 14px; }
  .install-prompt button {
    background: var(--orange);
    color: #fff;
    border: 0;
    border-radius: 999px;
    padding: 8px 14px;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  .install-prompt .dismiss {
    background: transparent;
    color: rgba(255,255,255,.6);
    padding: 6px 10px;
  }

  /* Offline indicator */
  .offline-banner {
    display: none;
    background: var(--gold);
    color: #fff;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    letter-spacing: .3px;
  }
  body.offline .offline-banner { display: block; }

  /* PM bottom nav (for quick switching) */
  .bottom-link {
    display: block;
    text-align: center;
    margin-top: 18px;
    color: var(--muted);
    font-size: 12px;
    text-decoration: none;
    padding: 10px;
  }
  .bottom-link:active { color: var(--orange); }
</style>
</head>
<body>

<div class="offline-banner">⚡ You're offline — showing cached data</div>

<div class="topbar">
  <img src="https://jgimprovements-arch.github.io/jg-dispatch/logo.png" alt="JG">
  <div>
    <h1>JG Project Hub</h1>
    <div class="tag" id="roleTag">Loading…</div>
  </div>
  <div class="user-chip" id="userChip">…</div>
</div>

<main id="main">
  <div class="loading">Loading…</div>
</main>

<div class="install-prompt" id="installPrompt">
  <div class="install-prompt-text">
    <b>Install JG Project</b><br>
    Add to home screen for one-tap access
  </div>
  <button id="installBtn">Install</button>
  <button class="dismiss" id="dismissInstall">×</button>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const sb = createClient(SB_URL, SB_ANON);

const ADMIN_EMAILS = new Set(['josh@jg-restoration.com', 'jgimprovements@gmail.com']);
const PM_EMAILS = new Set(['hannah@jg-restoration.com', 'kristina@jg-restoration.com', 'brent@jg-restoration.com', 'anthony@jg-restoration.com', 'ana@jg-restoration.com']);

const state = {
  email: null,
  name: null,
  role: null, // 'admin' | 'pm' | 'field'
  projects: [],
  fieldJobs: [],
  search: '',
};

const $ = sel => document.querySelector(sel);
const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDate = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) : '';
const todayWords = () => new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

async function init() {
  // Read user from same storage as platform
  let user = null;
  try { user = JSON.parse(localStorage.getItem('jg_platform_user') || 'null'); } catch {}
  state.email = (user?.email || '').toLowerCase();
  state.name = user?.name || (state.email ? state.email.split('@')[0] : '');

  if (!state.email) {
    $('#main').innerHTML = `
      <div class="field-empty" style="margin-top:40px;">
        <div class="icon">🔒</div>
        <h3>Sign in required</h3>
        <p>Please open the JG Platform in a browser, sign in, then return here.</p>
        <a href="hub.html" style="display:inline-block;margin-top:14px;background:var(--orange);color:#fff;padding:10px 22px;border-radius:999px;text-decoration:none;font-weight:700;">Go to JG Hub</a>
      </div>
    `;
    $('#userChip').textContent = 'Not signed in';
    return;
  }

  state.role = ADMIN_EMAILS.has(state.email) ? 'admin'
    : PM_EMAILS.has(state.email) ? 'pm'
    : 'field';

  $('#userChip').textContent = state.name;
  $('#roleTag').textContent = state.role === 'admin' ? 'Admin View'
    : state.role === 'pm' ? 'PM View'
    : 'Field Tech';

  if (state.role === 'field') {
    await renderFieldView();
  } else {
    await renderPmView();
  }
}

// ─────────── FIELD TECH VIEW ───────────
async function renderFieldView() {
  // Find today's phases assigned to this user (via employees table)
  const { data: emp } = await sb.from('employees')
    .select('id, name')
    .or(`email.eq.${state.email},personal_email.eq.${state.email}`)
    .maybeSingle();

  let jobs = [];
  if (emp) {
    // Find phases scheduled for today that include this employee as an assignee
    const today = new Date().toISOString().slice(0, 10);
    const { data } = await sb.from('rebuild_phase_assignees')
      .select(`
        phase:rebuild_phases!inner(
          id, phase_name, status, scheduled_start, scheduled_end, project_id,
          project:rebuild_projects(id, albi_job_number, customer_name, property_address, market, albi_status)
        )
      `)
      .eq('employee_id', emp.id)
      .lte('phase.scheduled_start', today)
      .gte('phase.scheduled_end', today);
    jobs = (data || []).map(r => r.phase).filter(Boolean);
  }

  // Dedupe by project_id (one card per project, list phases under it)
  const projectMap = new Map();
  jobs.forEach(j => {
    if (!j.project) return;
    if (!projectMap.has(j.project_id)) {
      projectMap.set(j.project_id, { project: j.project, phases: [] });
    }
    projectMap.get(j.project_id).phases.push(j);
  });
  const todaysProjects = Array.from(projectMap.values());

  const greet = (() => {
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    return 'Good evening';
  })();

  $('#main').innerHTML = `
    <div class="field-hero">
      <div class="greet">${greet}, ${esc(state.name.split(' ')[0])}</div>
      <h2>Today's Work</h2>
      <div class="date">${todayWords()}</div>
    </div>

    <div class="clock-btn-wrap">
      <a href="timeclock.html" class="clock-btn">
        <span class="clock-icon">⏱</span>
        Clock In / Out
        <div class="sub">Open Time Clock</div>
      </a>
    </div>

    ${todaysProjects.length === 0 ? `
      <div class="field-empty">
        <div class="icon">📅</div>
        <h3>No jobs scheduled today</h3>
        <p>If you think this is wrong, check with your PM.</p>
      </div>
    ` : todaysProjects.map(({ project, phases }) => `
      <a href="project_detail.html?p=${project.id}" class="field-job-card" style="text-decoration:none;color:inherit;display:block;">
        <div class="job-head">
          <div class="job-num">${esc(project.albi_job_number || '')}</div>
          <div class="job-status">${esc(project.albi_status || 'Active')}</div>
        </div>
        <div class="job-customer">${esc(project.customer_name || '')}</div>
        ${project.property_address ? `
          <div class="job-addr">
            📍 ${esc(project.property_address)}
          </div>
        ` : ''}
        <div class="job-phases">
          ${phases.map(p => `<span class="phase-chip ${p.status}">${esc(p.phase_name)}</span>`).join('')}
        </div>
      </a>
    `).join('')}

    <a href="hub.html" class="bottom-link">← Back to JG Hub</a>
  `;
}

// ─────────── PM/ADMIN VIEW ───────────
async function renderPmView() {
  const { data } = await sb.from('rebuild_projects')
    .select('id, albi_job_number, customer_name, property_address, market, albi_status, albi_status_normalized, albi_pm_name, scope_amount, updated_at')
    .order('updated_at', { ascending: false })
    .limit(150);
  state.projects = data || [];

  // Stats: total active, in active construction, on hold
  const active = state.projects.filter(p =>
    ['active_construction','final_construction','wo_scheduling','material_hold','down_payment_received'].includes(p.albi_status_normalized)
  );
  const construction = active.filter(p => p.albi_status_normalized === 'active_construction');
  const onHold = state.projects.filter(p => p.albi_status_normalized === 'on_hold');

  $('#main').innerHTML = `
    <div class="pm-hero">
      <div class="tag">${state.role === 'admin' ? 'Admin' : 'PM'} Dashboard</div>
      <h2>Projects</h2>
      <div class="sub">${state.projects.length} total · tap any to open in full app</div>
    </div>

    <div class="pm-stats">
      <div class="pm-stat"><div class="num">${active.length}</div><div class="lbl">Active</div></div>
      <div class="pm-stat alert"><div class="num">${construction.length}</div><div class="lbl">In Construction</div></div>
      <div class="pm-stat"><div class="num">${onHold.length}</div><div class="lbl">On Hold</div></div>
    </div>

    <div class="pm-actions">
      <a href="timeclock_admin.html" class="pm-action-btn">
        <span class="ico">📊</span>
        Time / Payroll
      </a>
      <a href="timeclock.html" class="pm-action-btn">
        <span class="ico">⏱</span>
        My Time
      </a>
      <a href="todos.html" class="pm-action-btn">
        <span class="ico">✅</span>
        My To-Dos
      </a>
    </div>

    <input type="text" class="search-bar" id="searchInput" placeholder="🔍 Search job # or customer…">

    <div class="pm-project-list" id="projectList"></div>

    <a href="hub.html" class="bottom-link">← Back to JG Hub</a>
  `;

  renderProjectList();
  $('#searchInput').addEventListener('input', (e) => {
    state.search = e.target.value.toLowerCase().trim();
    renderProjectList();
  });
}

function renderProjectList() {
  const list = $('#projectList');
  if (!list) return;
  let items = state.projects;
  if (state.search) {
    items = items.filter(p =>
      (p.albi_job_number || '').toLowerCase().includes(state.search) ||
      (p.customer_name || '').toLowerCase().includes(state.search) ||
      (p.property_address || '').toLowerCase().includes(state.search)
    );
  }
  // Cap at 50 visible in mobile (perf)
  items = items.slice(0, 50);

  if (!items.length) {
    list.innerHTML = `<div class="field-empty"><p>No projects match.</p></div>`;
    return;
  }

  list.innerHTML = items.map(p => {
    const isActive = ['active_construction','final_construction'].includes(p.albi_status_normalized);
    const isPlanning = ['new','waiting_for_mit','estimate_shipped','down_payment_received'].includes(p.albi_status_normalized);
    const pillCls = isActive ? 'active' : (isPlanning ? 'planning' : '');
    const market = p.market === 'stevens_point' ? 'Stevens Point' : 'Appleton';
    return `
      <a href="project_detail.html?p=${p.id}" class="pm-project">
        <div class="row">
          <div class="job">${esc(p.albi_job_number || '')}</div>
          <div class="stat-pill ${pillCls}">${esc(p.albi_status || '')}</div>
        </div>
        <div class="customer">${esc(p.customer_name || '')}</div>
        <div class="meta">${esc(market)}${p.albi_pm_name ? ' · PM: ' + esc(p.albi_pm_name.split(' ')[0]) : ''}${p.scope_amount ? ' · $' + Number(p.scope_amount).toLocaleString() : ''}</div>
      </a>
    `;
  }).join('');
}

// ─────────── PWA INSTALL PROMPT ───────────
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Don't show again if user dismissed recently
  const dismissed = parseInt(localStorage.getItem('jg_install_dismissed_at') || '0');
  if (Date.now() - dismissed < 7 * 24 * 60 * 60 * 1000) return;
  $('#installPrompt').classList.add('on');
});

$('#installBtn').addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  $('#installPrompt').classList.remove('on');
});
$('#dismissInstall').addEventListener('click', () => {
  $('#installPrompt').classList.remove('on');
  localStorage.setItem('jg_install_dismissed_at', String(Date.now()));
});

// ─────────── OFFLINE STATUS ───────────
function updateOnlineStatus() {
  document.body.classList.toggle('offline', !navigator.onLine);
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ─────────── REGISTER SERVICE WORKER ───────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js', { scope: '/jg-dispatch/' })
    .catch(err => console.warn('SW registration failed:', err));
}

init();
</script>
</body>
</html>
