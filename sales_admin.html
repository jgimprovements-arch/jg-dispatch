<!DOCTYPE html>
<html lang="en">
<head>

<style>

:root{
  --navy:#0d2d5e;--orange:#e85d04;--gold:#f5a623;
  --bg:#f0ede8;--s1:#faf9f7;--s2:#f0ede8;--s3:#e8e4df;
  --brd:rgba(13,45,94,.12);--brdH:rgba(13,45,94,.3);
  --acc:#e85d04;--accD:rgba(232,93,4,.08);
  --txt:#0d1f3c;--dim:#6b7a96;--mut:#a0abbf;
  --red:#c02020;--redD:rgba(192,32,32,.08);
  --grn:#2e7d32;--grnD:rgba(46,125,50,.08);
  --wrn:#e65100;--wrnD:rgba(230,81,0,.08);
  --blu:#1565c0;--bluD:rgba(21,101,192,.08);
  --purp:#6a1b9a;--purpD:rgba(106,27,154,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;padding:16px 20px;}
.mono{font-family:'DM Mono',monospace}
.container{max-width:1020px;margin:0 auto;padding-left:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
input[type=text],input[type=password]{padding:10px 12px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:13px;font-family:'DM Mono',monospace;outline:none}
input:focus{border-color:var(--acc)!important;box-shadow:0 0 0 2px var(--accD)}
textarea{width:100%;min-height:60px;padding:10px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:12px;font-family:'DM Sans',sans-serif;resize:vertical;line-height:1.5;outline:none;box-sizing:border-box}
textarea:focus{border-color:var(--acc);box-shadow:0 0 0 2px var(--accD)}
input[type=file]{display:none}
.act-btn{border:1px solid var(--brd);background:transparent;color:var(--dim);padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;margin-right:8px}
.act-btn:hover{border-color:var(--brdH);color:var(--txt)}
.act-btn.sc{background:var(--grnD);border-color:var(--grn);color:var(--grn)}
.act-btn.sj{background:var(--wrnD);border-color:var(--wrn);color:var(--wrn)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:'DM Mono',monospace}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--mut);border-radius:3px}

#jg-login{position:fixed;inset:0;background:rgba(13,29,60,.96);align-items:center;justify-content:center;z-index:9999;display:none;}
#jg-login-box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4);}
#jg-login-err{font-size:12px;color:#c0392b;margin-top:12px;min-height:16px;}

/* ── COLLAPSIBLE SIDEBAR ── */
#jg-sidebar{
  position:fixed;left:0;top:0;bottom:0;
  width:48px; /* collapsed = icon only */
  background:#0d2d5e;
  display:flex;flex-direction:column;
  z-index:90;
  box-shadow:2px 0 12px rgba(0,0,0,.15);
  transition:width .22s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
  white-space:nowrap;
}
#jg-sidebar:hover,
#jg-sidebar.expanded{
  width:200px;
  z-index:200;
  box-shadow:4px 0 24px rgba(0,0,0,.3);
}
#jg-sidebar .sb-logo{
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;
  min-height:52px;flex-shrink:0;
}
#jg-sidebar .sb-logo img{
  height:28px;width:28px;
  object-fit:contain;flex-shrink:0;
  border-radius:4px;
}
#jg-sidebar .sb-sec{
  font-size:9px;font-weight:700;color:rgba(255,255,255,.3);
  text-transform:uppercase;letter-spacing:.1em;
  padding:12px 14px 4px;
  font-family:monospace;
  opacity:0;
  transition:opacity .15s .1s;
}
#jg-sidebar:hover .sb-sec,
#jg-sidebar.expanded .sb-sec{opacity:1;}
#jg-sidebar a.sb-lnk{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;
  font-size:12px;font-weight:500;
  color:rgba(255,255,255,.65);
  text-decoration:none;
  border-left:3px solid transparent;
  transition:all .15s;
  flex-shrink:0;
}
#jg-sidebar a.sb-lnk:hover{
  background:rgba(255,255,255,.08);color:#fff;
  border-left-color:rgba(255,255,255,.3);
}
#jg-sidebar a.sb-lnk.active{
  background:rgba(255,255,255,.12);color:#fff;
  border-left-color:#e85d04;font-weight:600;
}
#jg-sidebar .sb-icon{
  font-size:16px;width:20px;text-align:center;flex-shrink:0;
}
#jg-sidebar .sb-label{
  opacity:0;transition:opacity .15s .05s;
  overflow:hidden;
}
#jg-sidebar:hover .sb-label,
#jg-sidebar.expanded .sb-label{opacity:1;}
#jg-sidebar .sb-btm{
  margin-top:auto;padding:10px 14px;
  border-top:1px solid rgba(255,255,255,.1);
  flex-shrink:0;
}
#jg-sidebar .sb-user{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:rgba(255,255,255,.55);
  cursor:pointer;padding:4px 0;
}
#jg-sidebar .sb-user:hover{color:#fff;}
#jg-sidebar .sb-user-label{
  opacity:0;transition:opacity .15s .05s;overflow:hidden;
}
#jg-sidebar:hover .sb-user-label,
#jg-sidebar.expanded .sb-user-label{opacity:1;}
/* Body offset — collapsed width only */
body{padding-left:48px;box-sizing:border-box;}
* {box-sizing:border-box;}

/* ── QA DISPATCH STYLING ── */
.qa-hdr{background:var(--navy);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:95;}
.qa-hdr-l{display:flex;align-items:center;gap:10px;}
.qa-logo-mk{width:26px;height:26px;background:var(--orange);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.qa-hdr-title{font-size:13px;font-weight:600;color:#fff;letter-spacing:-.3px;}
.qa-hdr-title span{color:var(--gold);}
.qa-pill{font-size:10px;padding:2px 8px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);border-radius:20px;border:1px solid rgba(255,255,255,.18);}
.qa-hdr-r{display:flex;align-items:center;gap:6px;}
.qa-body{padding:14px 16px;max-width:920px;margin:0 auto;}
.qa-card{background:var(--s1);border:1px solid var(--brd);border-radius:10px;box-shadow:0 1px 3px rgba(13,45,94,.08),0 4px 16px rgba(13,45,94,.06);overflow:hidden;margin-bottom:14px;}
.qa-card-hd{background:var(--navy);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;}
.qa-card-hd-title{font-size:11px;font-weight:600;color:#fff;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
.qa-card-body{padding:16px;}
.qa-upload-zone{border:2px dashed var(--brd);border-radius:8px;padding:26px 16px;text-align:center;cursor:pointer;transition:all .15s;background:transparent;}
.qa-upload-zone:hover{border-color:var(--orange);background:rgba(232,93,4,.04);}
.qa-upload-zone.loaded{border-style:solid;border-color:var(--grn);background:rgba(46,125,50,.04);text-align:left;padding:12px 16px;}
.qa-btn{padding:8px 18px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.qa-btn-primary{background:var(--orange);color:#fff;}
.qa-btn-primary:hover{background:#c94a00;}
.qa-btn-primary:disabled{opacity:.45;cursor:default;}
.qa-btn-ghost{background:transparent;border:1px solid var(--brd);color:var(--dim);}
.qa-btn-ghost:hover{border-color:var(--navy);color:var(--navy);}
.qa-btn-green{background:var(--grn);color:#fff;}
.qa-btn-navy{background:var(--navy);color:#fff;}
.qa-step-bar{display:flex;gap:6px;margin-bottom:16px;}
.qa-step{flex:1;padding:8px 10px;border-radius:6px;border:1px solid var(--brd);text-align:center;background:var(--s2);}
.qa-step.active{background:var(--s1);border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.12);}
.qa-step.done{background:rgba(46,125,50,.06);border-color:var(--grn);}
.qa-step-lbl{font-size:11px;font-weight:600;color:var(--dim);font-family:'DM Mono',monospace;}
.qa-step.active .qa-step-lbl{color:var(--orange);}
.qa-step.done .qa-step-lbl{color:var(--grn);}
.qa-gap-row{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:14px;margin-bottom:8px;border-left:4px solid var(--brd);}
.qa-gap-row.HIGH{border-left-color:var(--red);}
.qa-gap-row.MEDIUM{border-left-color:var(--wrn);}
.qa-gap-row.LOW{border-left-color:var(--blu);}
.qa-gap-row.MANDATORY{border-left-color:var(--purp);}
.sev-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.04em;}
.sev-HIGH{background:var(--redD);color:var(--red);}
.sev-MEDIUM{background:var(--wrnD);color:var(--wrn);}
.sev-LOW{background:var(--bluD);color:var(--blu);}
.sev-MANDATORY{background:var(--purpD);color:var(--purp);}
.qa-filter-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.qa-filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--brd);background:var(--s1);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;color:var(--dim);transition:all .15s;}
.qa-filter-btn.on{background:var(--navy);border-color:var(--navy);color:#fff;}
.qa-stat-row{display:flex;gap:0;border:1px solid var(--brd);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.qa-stat-box{flex:1;padding:10px 14px;border-right:1px solid var(--brd);background:var(--s1);}
.qa-stat-box:last-child{border-right:none;}
.qa-stat-val{font-size:22px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;}
.qa-stat-val.red{color:var(--red);}
.qa-stat-val.grn{color:var(--grn);}
.qa-stat-lbl{font-size:9px;font-weight:500;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
.qa-progress-bar{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.qa-spin{width:16px;height:16px;border:2px solid var(--brd);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.qa-evidence-box{background:rgba(21,101,192,.04);border:1px solid rgba(21,101,192,.14);border-radius:6px;padding:9px 12px;margin-top:8px;}
.qa-defense-box{background:rgba(46,125,50,.04);border:1px solid rgba(46,125,50,.14);border-radius:6px;padding:9px 12px;margin-top:8px;}
.qa-dispute-box{background:rgba(176,106,0,.04);border:1px solid rgba(176,106,0,.14);border-radius:6px;padding:9px 12px;margin-top:8px;}
.qa-textarea{width:100%;padding:10px 12px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:12px;font-family:'DM Sans',sans-serif;resize:vertical;line-height:1.6;outline:none;box-sizing:border-box;}
.qa-textarea:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.1);}
.qa-input{width:100%;padding:9px 12px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box;}
.qa-input:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.1);}
.qa-label{display:block;font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;font-family:'DM Mono',monospace;}
.no-op-badge{font-size:9px;padding:2px 8px;background:rgba(106,27,154,.1);border:1px solid rgba(106,27,154,.25);color:var(--purp);border-radius:20px;font-weight:700;font-family:'DM Mono',monospace;}
.qa-defend-btn{padding:5px 12px;border-radius:5px;border:1px solid var(--grn);background:rgba(46,125,50,.06);color:var(--grn);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.qa-defend-btn.on{background:var(--grn);color:#fff;}
.qa-concede-btn{padding:5px 12px;border-radius:5px;border:1px solid var(--wrn);background:rgba(176,106,0,.06);color:var(--wrn);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.qa-concede-btn.on{background:var(--wrn);color:#fff;}
input[type=file]{display:none}



.admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;position:relative;overflow:hidden;}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--orange));}
.kpi-val{font-size:28px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;line-height:1;}
.kpi-lbl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:6px;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.section-hdr{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:20px 0 10px;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:8px;}
.section-hdr::after{content:'';flex:1;height:1px;background:var(--border);}
.rep-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}
.rep-avatar{width:34px;height:34px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.bar-wrap{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:var(--orange);transition:width .4s ease;}
.touch-type-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.admin-hdr{background:var(--navy);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:95;}
.export-btn{padding:8px 16px;border-radius:6px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;}
.period-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--muted);font-family:'DM Sans',sans-serif;}
.period-btn.active{background:var(--navy);border-color:var(--navy);color:#fff;}

</style>
</head>

<script>
function mkPeriodBtn(d) {
  var cls = 'period-btn' + (AD.period===d ? ' active' : '');
  return '<button class="' + cls + '" onclick="setPeriod(' + d + ')">Last ' + d + ' days</button>';
}
function setPeriod(d) { AD.period=d; loadAdminData(); }
function mkMarketBtn(m) {
  var cls = "period-btn" + (AD.market===m ? " active" : "");
  return "<button class=\"" + cls + "\" onclick=\"setMkt(this)\">" + m + "</button>";
}
function setMkt(el) { AD.market = el.textContent.trim(); loadAdminData(); }
function setMarketFilter(m) { AD.market=m; loadAdminData(); }

const _JG_KEY='jg_platform_user',_JG_EXP='jg_platform_exp';
function jgGoogleCb(r){try{const p=JSON.parse(atob(r.credential.split('.')[1]));if(!p.email.endsWith('@jg-restoration.com')){document.getElementById('jg-login-err').textContent='Access restricted to @jg-restoration.com accounts.';return;}const u={name:p.name||p.given_name,email:p.email,picture:p.picture||''};localStorage.setItem(_JG_KEY,JSON.stringify(u));localStorage.setItem(_JG_EXP,String(Date.now()+43200000));jgHideLogin();jgShowUser(u);}catch(e){document.getElementById('jg-login-err').textContent='Sign in failed.';}}
function jgCheckAuth(){const r=localStorage.getItem(_JG_KEY),e=localStorage.getItem(_JG_EXP);if(r&&e&&Date.now()<parseInt(e)){jgHideLogin();jgShowUser(JSON.parse(r));return true;}jgShowLogin();return false;}
function jgShowLogin(){const e=document.getElementById('jg-login');if(e)e.style.display='flex';}
function jgHideLogin(){const e=document.getElementById('jg-login');if(e)e.style.display='none';}
function jgShowUser(u){const n=document.getElementById('sb-nm'),a=document.getElementById('sb-av');if(n)n.textContent=u.name?u.name.split(' ')[0]:u.email.split('@')[0];if(a)a.innerHTML=u.picture?'<img src="'+u.picture+'" style="width:22px;height:22px;border-radius:50%;">':'👤';}
function jgSignOut(){if(confirm('Sign out?')){localStorage.removeItem(_JG_KEY);localStorage.removeItem(_JG_EXP);window.location.href='hub.html';}}
window.addEventListener('storage',e=>{if(e.key===_JG_KEY){if(e.newValue){jgHideLogin();jgShowUser(JSON.parse(e.newValue));}else jgShowLogin();}});
Object.defineProperty(window,'currentUser',{get:()=>{try{return JSON.parse(localStorage.getItem(_JG_KEY)||'null')?.name||null;}catch(e){return null;}},configurable:true});

async function sbGet(path) {
  var r = await fetch(SB_URL+path, {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  return r.ok ? r.json() : [];
}

async function loadAdminData() {
  AD.loading = true; render();
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate() - AD.period);
  var cutoffStr = cutoff.toISOString().split('T')[0];
  var mFilter = AD.market === 'All' ? '' : '&market=eq.'+encodeURIComponent(AD.market);

  // Paginate partners
  var allP = []; var pg = 0;
  while(true) {
    var chunk = await sbGet('/rest/v1/sales_partners?order=name.asc&limit=1000&offset='+(pg*1000)+mFilter);
    allP = allP.concat(chunk||[]);
    if((chunk||[]).length < 1000) break;
    pg++;
  }

  var [touches, routes, followups] = await Promise.all([
    sbGet('/rest/v1/sales_touches?touch_date=gte.'+cutoffStr+'&order=touch_date.desc&limit=2000'+mFilter),
    sbGet('/rest/v1/sales_routes?route_date=gte.'+cutoffStr+'&order=route_date.desc&limit=200'+mFilter),
    sbGet('/rest/v1/sales_followups?order=due_date.asc&limit=1000'+mFilter)
  ]);

  AD.partners  = allP||[];
  AD.touches   = touches||[];
  AD.routes    = routes||[];
  AD.followups = followups||[];
  AD.lastRefresh = new Date();
  AD.loading = false;
  render();
}

async function loadAlbiSales() {
  AD.albiLoading = true; render();

    var [appJobs, spJobs] = await Promise.all([

    ]);
    var jobs = ((appJobs.projects||appJobs.data||[]).map(function(j){return Object.assign({location:'Appleton'},j);})
      .concat((spJobs.projects||spJobs.data||[]).map(function(j){return Object.assign({location:'Stevens Point'},j);})));

    });

}

function getStats() {
  var p = AD.partners, t = AD.touches, r = AD.routes, f = AD.followups;
  var now = new Date(); now.setHours(0,0,0,0);
  var stale = p.filter(function(x) {
    if(!x.last_touch_date) return true;
    return (now - new Date(x.last_touch_date+'T00:00:00')) > 30*86400000;
  }).length;

  // Touches by rep
  var byRep = {};
  REPS.forEach(function(rep) { byRep[rep] = t.filter(function(x){return x.logged_by===rep;}).length; });
  var maxTouches = Math.max.apply(null, Object.values(byRep).concat([1]));

  // Touches by type
  var byType = {};
  t.forEach(function(x) { byType[x.touch_type||'Other'] = (byType[x.touch_type||'Other']||0)+1; });

  // Follow-up completion
  var fuTotal = f.length;
  var fuDone  = f.filter(function(x){return x.completed;}).length;
  var fuRate  = fuTotal > 0 ? Math.round(fuDone/fuTotal*100) : 0;
  var fuOverdue = f.filter(function(x){return !x.completed && new Date(x.due_date+'T00:00:00') < now;}).length;

  // Partners added in period
  var cutoff = new Date(); cutoff.setDate(cutoff.getDate()-AD.period);
  var newPartners = p.filter(function(x){
    return x.created_at && new Date(x.created_at) >= cutoff;
  }).length;

  // Referrals by rep
  var refByRep = {};
  REPS.forEach(function(rep) {
    refByRep[rep] = p.filter(function(x){return x.assigned_to===rep;})
                    .reduce(function(s,x){return s+(x.referral_count||0);},0);
  });

  // Route completion
  var totalStops = 0, completedStops = 0;
  r.forEach(function(rt) {
    var stops = rt.stops||[];
    totalStops += stops.length;
    completedStops += stops.filter(function(s){return s.completed;}).length;
  });
  var routeRate = totalStops > 0 ? Math.round(completedStops/totalStops*100) : 0;

  // Positive outcome rate
  var posRate = t.length > 0 ? Math.round(t.filter(function(x){return x.outcome==='Positive';}).length/t.length*100) : 0;

  return {stale,byRep,maxTouches,byType,fuTotal,fuDone,fuRate,fuOverdue,newPartners,refByRep,routeRate,posRate,totalStops,completedStops};
}

function exportExcel() {
  var wb = XLSX.utils.book_new();

  // Sheet 1: Touches
  var tHeaders = ['Date','Rep','Partner','Type','Outcome','Notes','Market'];
  var tData = AD.touches.map(function(t){return[t.touch_date||'',t.logged_by||'',t.partner_name||'',t.touch_type||'',t.outcome||'',t.notes||'',t.market||''];});
  var tSheet = [['JG RESTORATION — SALES TOUCHES REPORT'],['Period: Last '+AD.period+' days','Market: '+AD.market],[],tHeaders,...tData];
  var ws1 = XLSX.utils.aoa_to_sheet(tSheet);
  ws1['!cols']=[{wch:12},{wch:12},{wch:25},{wch:10},{wch:14},{wch:40},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Touches');

  // Sheet 2: Partners
  var pHeaders=['Name','Company','Type','Tier','Phone','Email','City','Market','Assigned To','Touches','Referrals','Last Touch','Status'];
  var pData = AD.partners.map(function(p){return[p.name||'',p.company||'',p.type||'',p.tier||'',p.phone||'',p.email||'',p.city||'',p.market||'',p.assigned_to||'',p.touch_count||0,p.referral_count||0,p.last_touch_date||'',p.status||''];});
  var pSheet = [['JG RESTORATION — PARTNER LIST'],[],pHeaders,...pData];
  var ws2 = XLSX.utils.aoa_to_sheet(pSheet);
  ws2['!cols']=[{wch:22},{wch:22},{wch:18},{wch:6},{wch:14},{wch:28},{wch:14},{wch:14},{wch:12},{wch:8},{wch:10},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Partners');

  // Sheet 3: Rep Summary
  var S = getStats();
  var rHeaders=['Rep','Assigned Partners','Touches','Referrals','Avg Touches/Partner'];
  var rData = REPS.map(function(rep){
    var assigned=AD.partners.filter(function(p){return p.assigned_to===rep;}).length;
    var touches=S.byRep[rep]||0;
    var refs=S.refByRep[rep]||0;
    return[rep,assigned,touches,refs,assigned>0?Math.round(touches/assigned*10)/10:0];
  });
  var rSheet=[['JG RESTORATION — REP SUMMARY'],['Period: Last '+AD.period+' days'],[],rHeaders,...rData];
  var ws3=XLSX.utils.aoa_to_sheet(rSheet);
  ws3['!cols']=[{wch:14},{wch:18},{wch:10},{wch:12},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws3,'Rep Summary');

  // Sheet 4: Follow-ups
  var fHeaders=['Partner','Type','Due Date','Priority','Reason','Assigned To','Status'];
  var fData=AD.followups.map(function(f){return[f.partner_name||'',f.partner_type||'',f.due_date||'',f.priority||'',f.reason||'',f.assigned_to||'',f.completed?'Completed':'Open'];});
  var fSheet=[['JG RESTORATION — FOLLOW-UPS'],[],fHeaders,...fData];
  var ws4=XLSX.utils.aoa_to_sheet(fSheet);
  XLSX.utils.book_append_sheet(wb,ws4,'Follow-ups');

  var today=new Date().toISOString().split('T')[0];
  XLSX.writeFile(wb, 'JG_Sales_Report_'+today+'.xlsx');
}

  doc.text('JG RESTORATION', 14, 12);
  doc.setFontSize(11); doc.setFont('helvetica','normal');
  doc.text('Sales '+periodLabel+' — Last '+AD.period+' Days', 14, 20);
  doc.setFontSize(9);
  doc.text('Generated: '+today+' | Market: '+AD.market, 216-14, 20, {align:'right'});

  var y = 36;

  // KPI summary boxes
  doc.setTextColor(13,45,94);
  doc.setFontSize(9); doc.setFont('helvetica','bold');
  doc.text('KEY METRICS', 14, y); y+=6;

  var kpiData = [
    ['Total Touches', AD.touches.length],
    ['Positive Rate', S.posRate+'%'],
    ['Partners Added', S.newPartners],
    ['Total Partners', AD.partners.length],
    ['Stale Partners', S.stale],
    ['Follow-up Rate', S.fuRate+'%'],
    ['Overdue Follow-ups', S.fuOverdue],
    ['Route Completion', S.routeRate+'%']
  ];
  var cols=4, colW=47, rowH=14;
  kpiData.forEach(function(k,i) {
    var cx=14+(i%cols)*colW, cy=y+Math.floor(i/cols)*rowH;
    doc.setFillColor(248,248,250); doc.setDrawColor(220,225,235);
    doc.roundedRect(cx,cy,colW-2,rowH-2,2,2,'FD');
    doc.setFontSize(14); doc.setFont('helvetica','bold'); doc.setTextColor(13,45,94);
    doc.text(String(k[1]),cx+4,cy+8);
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(107,122,150);
    doc.text(k[0].toUpperCase(),cx+4,cy+12);
  });
  y += Math.ceil(kpiData.length/cols)*rowH + 6;

  // Touches by rep table
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(13,45,94);
  doc.text('TOUCHES BY REP', 14, y); y+=5;
  REPS.forEach(function(rep) {
    var cnt=S.byRep[rep]||0, refs=S.refByRep[rep]||0;
    var assigned=AD.partners.filter(function(p){return p.assigned_to===rep;}).length;
    doc.setFillColor(248,248,250); doc.rect(14,y,188,7,'F');
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(13,45,94);
    doc.text(rep,16,y+5);
    doc.setFont('helvetica','normal'); doc.setTextColor(107,122,150);
    doc.text(cnt+' touches',70,y+5);
    doc.text(assigned+' assigned',100,y+5);
    doc.text(refs+' referrals',140,y+5);
    // Bar
    var barW=Math.round((cnt/Math.max(S.maxTouches,1))*50);
    doc.setFillColor(232,93,4); doc.rect(160,y+2,barW,3,'F');
    y+=8;
  });
  y+=6;

  // Touches by type
  doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(13,45,94);
  doc.text('TOUCHES BY TYPE', 14, y); y+=5;
  Object.entries(S.byType).sort(function(a,b){return b[1]-a[1];}).forEach(function(e) {
    doc.setFillColor(248,248,250); doc.rect(14,y,188,6,'F');
    doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(13,45,94);
    doc.text(e[0],16,y+4);
    doc.text(String(e[1]),80,y+4);
    var barW=Math.round((e[1]/Math.max.apply(null,Object.values(S.byType).concat([1])))*80);
    doc.setFillColor(13,45,94); doc.rect(100,y+1,barW,3,'F');
    y+=7;
  });
  y+=6;

  // Recent touches (if space)
  if(y < 220) {
    doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(13,45,94);
    doc.text('RECENT TOUCHES', 14, y); y+=5;
    doc.setFillColor(13,45,94);
    doc.rect(14,y,188,6,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7);
    ['Date','Rep','Partner','Type','Outcome'].forEach(function(c,i){doc.text(c,[14,45,85,135,160][i],y+4);});
    y+=7;
    AD.touches.slice(0,15).forEach(function(t,i) {
      if(y>260) return;
      doc.setFillColor(i%2===0?248:255,i%2===0?248:255,i%2===0?250:255);
      doc.rect(14,y,188,6,'F');
      doc.setTextColor(13,45,94); doc.setFontSize(7); doc.setFont('helvetica','normal');
      doc.text((t.touch_date||'').slice(5),14,y+4);
      doc.text(t.logged_by||'',45,y+4);
      doc.text((t.partner_name||'').slice(0,22),85,y+4);
      doc.text(t.touch_type||'',135,y+4);
      doc.setTextColor(t.outcome==='Positive'?46:t.outcome==='Not Interested'?192:107, t.outcome==='Positive'?125:32, t.outcome==='Positive'?50:32);
      doc.text(t.outcome||'',160,y+4);
      y+=7;
    });
  }

  // Footer
  doc.setFillColor(13,45,94);
  doc.rect(0,272,216,8,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(7);
  doc.text('JG Restoration | Appleton & Stevens Point | Confidential Sales Report', 14, 277);
  doc.text('Page 1', 202, 277, {align:'right'});

  var fname='JG_Sales_'+(type==='weekly'?'Weekly':'Monthly')+'_'+new Date().toISOString().split('T')[0]+'.pdf';
  doc.save(fname);
}

document.addEventListener('DOMContentLoaded',function(){
  jgCheckAuth();
  var u=JSON.parse(localStorage.getItem('jg_platform_user')||'null');
  if(u) jgShowUser(u);
  var key=localStorage.getItem('jg_key');
  if(key) AD.apiKey=key;
  loadAdminData();
});

</script>
</body>
</html>
