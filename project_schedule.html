<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d2d5e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Schedule · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623; --green: #2d9c5f; --red: #d64545;
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --muted: #7884a0; --line: #e3e7f0;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }

  .topbar { background: linear-gradient(135deg, #0d2d5e 0%, #1a4080 100%); color: #fff; padding: calc(var(--safe-top) + 14px) 16px 14px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 12px rgba(13,45,94,.25); position: sticky; top: 0; z-index: 10; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.16);
    color: #fff;
    border-radius: 10px;
    padding: 7px 12px 7px 10px;
    font-size: 14px; font-weight: 600;
    text-decoration: none;
    flex-shrink: 0;
    font-family: inherit;
    line-height: 1;
    transition: background .15s;
  }
  .back-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .back-btn:active { background: rgba(255,255,255,.18); }
  .title { flex: 1; min-width: 0; }
  .title h1 { margin: 0; font-size: 15px; font-weight: 800; }
  .title .sub { font-size: 10px; opacity: .8; letter-spacing: .8px; text-transform: uppercase; }

  main { padding: 14px 14px calc(var(--safe-bottom) + 28px); max-width: 720px; margin: 0 auto; }

  .filter-row { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip { background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 7px 14px; font-size: 12px; font-weight: 700; color: var(--navy); white-space: nowrap; cursor: pointer; }
  .filter-chip.on { background: var(--navy); color: #fff; border-color: var(--navy); }

  .phase-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .phase-card.in_progress { border-left: 4px solid var(--orange); padding-left: 13px; }
  .phase-card.completed { border-left: 4px solid var(--green); padding-left: 13px; opacity: .85; }
  .phase-card.blocked { border-left: 4px solid var(--red); padding-left: 13px; }
  .phase-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .phase-name { font-size: 15px; font-weight: 800; color: var(--navy); letter-spacing: -.1px; }
  .phase-seq { font-size: 10px; color: var(--muted); font-weight: 700; }
  .status-pill { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 999px; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
  .status-pill.not_started { background: rgba(120,132,160,.15); color: var(--muted); }
  .status-pill.in_progress { background: rgba(232,93,4,.15); color: var(--orange); }
  .status-pill.completed { background: rgba(45,156,95,.15); color: var(--green); }
  .status-pill.blocked { background: rgba(214,69,69,.15); color: var(--red); }
  .phase-dates { font-size: 12px; color: var(--text); margin: 8px 0; }
  .phase-dates b { color: var(--navy); }
  .phase-assignees { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .assignee-chip { background: var(--bg); border: 1px solid var(--line); padding: 3px 9px; border-radius: 999px; font-size: 11px; color: var(--navy); font-weight: 600; }
  .assignee-chip.carp { background: rgba(232,93,4,.10); border-color: rgba(232,93,4,.3); color: var(--orange); }
  .phase-actions { display: flex; gap: 6px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); flex-wrap: wrap; }
  .phase-action { flex: 1; min-width: 100px; background: var(--bg); border: 1px solid var(--line); color: var(--navy); border-radius: 999px; padding: 8px 12px; font-size: 12px; font-weight: 700; text-align: center; cursor: pointer; font-family: inherit; }
  .phase-action:active { background: var(--orange); color: #fff; border-color: var(--orange); }
  .phase-action.primary { background: var(--orange); color: #fff; border-color: var(--orange); }
  .phase-action.primary:active { background: #d05303; }

  .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty .ico { font-size: 42px; opacity: .4; margin-bottom: 8px; }
  .empty h3 { color: var(--navy); margin: 0 0 4px; }
  .empty p { margin: 0; font-size: 13px; }

  .toast { position: fixed; bottom: calc(var(--safe-bottom) + 20px); left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 16px rgba(13,45,94,.3); z-index: 100; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.on { opacity: 1; }

  /* Editable dates row + confirmed tag */
  .phase-dates.editable { cursor: pointer; padding: 6px 10px; border-radius: 8px; margin-left: -10px; transition: background .15s; }
  .phase-dates.editable:active { background: rgba(13,45,94,.06); }
  .phase-dates .edit-hint { font-size: 11px; opacity: .55; margin-left: 4px; }
  .confirmed-tag { display: inline-block; font-size: 10px; font-weight: 800; color: var(--green); background: rgba(45,156,95,.12); padding: 2px 7px; border-radius: 999px; margin-left: 8px; vertical-align: 1px; letter-spacing: .3px; }
  .phase-action.set-dates { color: var(--orange); border-color: rgba(232,93,4,.3); background: rgba(232,93,4,.06); }
  .phase-action.ghost { background: transparent; border: 1px dashed var(--line); color: var(--muted); }

  /* Bottom sheet (date editor) */
  .sheet-back { position: fixed; inset: 0; background: rgba(13,45,94,.55); z-index: 9999; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(2px); }
  .sheet { background: var(--card); width: 100%; max-width: 520px; max-height: 90vh; border-radius: 18px 18px 0 0; display: flex; flex-direction: column; box-shadow: 0 -8px 32px rgba(0,0,0,.2); }
  .sheet-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 14px 18px; border-bottom: 1px solid var(--line); gap: 12px; }
  .sheet-title { margin: 0; font-size: 16px; color: var(--navy); }
  .sheet-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .sheet-close { background: transparent; border: none; font-size: 22px; color: var(--muted); cursor: pointer; line-height: 1; padding: 0 4px; }
  .sheet-body { padding: 16px 18px; overflow-y: auto; flex: 1; }
  .sheet-body .field { display: block; margin-bottom: 14px; }
  .sheet-body .field .label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
  .sheet-body input[type="date"] { width: 100%; padding: 11px 12px; border: 1px solid var(--line); border-radius: 10px; font-size: 15px; background: var(--card); color: var(--text); font-family: inherit; }
  .sheet-hint { font-size: 11px; color: var(--muted); line-height: 1.5; padding: 10px 12px; background: rgba(13,45,94,.04); border-radius: 8px; }
  .sheet-footer { padding: 12px 18px; border-top: 1px solid var(--line); display: flex; gap: 10px; justify-content: flex-end; }
  .sheet-btn { padding: 10px 18px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid transparent; font-family: inherit; }
  .sheet-btn.ghost { background: transparent; color: var(--muted); border-color: var(--line); }
  .sheet-btn.primary { background: var(--navy); color: #fff; }
</style>
</head>
<body>

<div class="topbar">
  <a href="#" class="back-btn" id="backBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Back</a>
  <div class="title">
    <h1 id="topJob">Schedule</h1>
    <div class="sub" id="topSub">Loading…</div>
  </div>
</div>

<main id="main">
  <div class="empty"><p>Loading…</p></div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const sb = createClient(SB_URL, SB_ANON);

const params = new URLSearchParams(window.location.search);
const projectId = params.get('p');
document.getElementById('backBtn').href = `project_detail.html?p=${projectId}`;

const state = { project: null, phases: [], filter: 'all', userEmail: null, employeeId: null, canEdit: false };

// Initialize current user from localStorage (jg_platform_user — written by
// the timeclock SSO mirror and the rebuild app login).
try {
  const user = JSON.parse(localStorage.getItem('jg_platform_user') || 'null');
  if (user?.email) state.userEmail = user.email.toLowerCase();
} catch {}

// Phases in this DB sometimes carry 'pending' or null status — neither was in
// the label map before, which is why the action button rendered as
// "undefined" and the click was a no-op. Normalize at use and label them all.
const ADMIN_EMAILS = new Set(['josh@jg-restoration.com','jgimprovements@gmail.com']);
const STATUS_NEXT = {
  not_started: 'in_progress',
  pending:     'in_progress',
  in_progress: 'completed',
  completed:   'completed',
  blocked:     'in_progress',
};
const STATUS_LABEL = {
  not_started: 'Start',
  pending:     'Start',
  in_progress: 'Mark Complete',
  completed:   '✓ Complete',
  blocked:     'Unblock',
};
function _phaseStatus(p) { return p.status || 'not_started'; }

const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmtDate = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—';
const titleCase = s => String(s || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2000);
}

async function init() {
  if (!projectId) return showEmpty('Missing project', 'Open from project list');

  // Resolve role to gate the schedule-editing UI. Admins and PMs can edit
  // phase dates and confirm schedules; carpenters and others see read-only.
  const empPromise = state.userEmail
    ? sb.from('employees')
        .select('id, role')
        .or(`email.eq.${state.userEmail},personal_email.eq.${state.userEmail}`)
        .maybeSingle()
    : Promise.resolve({ data: null });

  const [{ data: project }, { data: phases }, empRes] = await Promise.all([
    sb.from('rebuild_projects').select('id, albi_job_number, customer_name, market, albi_status').eq('id', projectId).maybeSingle(),
    sb.from('rebuild_phases').select(`*, assignees:rebuild_phase_assignees(id, assignee_type, sub_id, employee_id, sub:rebuild_subs(company_name), employee:employees(name))`).eq('project_id', projectId).order('sequence'),
    empPromise,
  ]);

  if (!project) return showEmpty('Project not found', 'It may have been deleted.');
  state.project = project;
  state.phases = phases || [];

  const emp = empRes?.data;
  if (emp) {
    state.employeeId = emp.id;
    const role = String(emp.role || '').toLowerCase();
    state.canEdit = ADMIN_EMAILS.has(state.userEmail)
      || /admin|owner|project[ _-]?manager|\bpm\b/.test(role);
  } else {
    state.canEdit = ADMIN_EMAILS.has(state.userEmail);
  }

  document.getElementById('topJob').textContent = `Schedule · ${project.albi_job_number || ''}`;
  document.getElementById('topSub').textContent = project.customer_name || '';

  render();
}

function render() {
  const filtered = state.filter === 'all' ? state.phases
    : state.filter === 'active' ? state.phases.filter(p => _phaseStatus(p) === 'in_progress')
    : state.filter === 'upcoming' ? state.phases.filter(p => ['not_started','pending'].includes(_phaseStatus(p)))
    : state.filter === 'done' ? state.phases.filter(p => _phaseStatus(p) === 'completed')
    : state.phases;

  const upcomingCount = state.phases.filter(p => ['not_started','pending'].includes(_phaseStatus(p))).length;

  document.getElementById('main').innerHTML = `
    <div class="filter-row">
      <div class="filter-chip ${state.filter === 'all' ? 'on' : ''}" data-filter="all">All (${state.phases.length})</div>
      <div class="filter-chip ${state.filter === 'active' ? 'on' : ''}" data-filter="active">In Progress (${state.phases.filter(p => _phaseStatus(p) === 'in_progress').length})</div>
      <div class="filter-chip ${state.filter === 'upcoming' ? 'on' : ''}" data-filter="upcoming">Upcoming (${upcomingCount})</div>
      <div class="filter-chip ${state.filter === 'done' ? 'on' : ''}" data-filter="done">Done (${state.phases.filter(p => _phaseStatus(p) === 'completed').length})</div>
    </div>

    ${filtered.length === 0 ? `
      <div class="empty">
        <div class="ico">📅</div>
        <h3>No phases ${state.filter === 'all' ? '' : 'match this filter'}</h3>
        <p>${state.filter === 'all' ? 'Set up phases in the full app first.' : 'Try a different filter.'}</p>
      </div>
    ` : filtered.map(p => phaseCard(p)).join('')}
  `;

  // Wire filter chips
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      state.filter = chip.dataset.filter;
      render();
    });
  });

  // Wire action buttons
  document.querySelectorAll('[data-act]').forEach(btn => {
    btn.addEventListener('click', () => handleAction(btn.dataset.act, btn.dataset.id));
  });
}

function phaseCard(p) {
  const status = _phaseStatus(p);
  const assignees = (p.assignees || []).map(a => a.assignee_type === 'sub'
    ? `<span class="assignee-chip">${esc(a.sub?.company_name || 'Sub')}</span>`
    : `<span class="assignee-chip carp">🏠 ${esc(a.employee?.name || 'Carpenter')}</span>`).join('');
  const canAdvance = status !== 'completed';
  const hasDates = !!(p.scheduled_start || p.scheduled_end);
  const confirmed = !!p.schedule_confirmed_at;

  // Dates row — tappable for editors, just a label for viewers
  const datesHtml = hasDates
    ? `<div class="phase-dates ${state.canEdit ? 'editable' : ''}" ${state.canEdit ? `data-act="edit-dates" data-id="${p.id}"` : ''}>📅 <b>${fmtDate(p.scheduled_start)}</b> → <b>${fmtDate(p.scheduled_end)}</b>${confirmed ? ' <span class="confirmed-tag">✓ Confirmed</span>' : ''}${state.canEdit ? ' <span class="edit-hint">✏️</span>' : ''}</div>`
    : (state.canEdit
        ? `<button class="phase-action ghost set-dates" data-act="edit-dates" data-id="${p.id}">📅 Set Dates</button>`
        : '');

  return `
    <div class="phase-card ${status}">
      <div class="phase-top">
        <div>
          <div class="phase-seq">PHASE ${String(p.sequence).padStart(2,'0')}</div>
          <div class="phase-name">${esc(p.phase_name)}</div>
        </div>
        <div class="status-pill ${status}">${titleCase(status)}</div>
      </div>
      ${datesHtml}
      ${assignees ? `<div class="phase-assignees">${assignees}</div>` : ''}
      <div class="phase-actions">
        ${canAdvance ? `<button class="phase-action primary" data-act="advance" data-id="${p.id}">▶ ${STATUS_LABEL[status]}</button>` : ''}
        ${state.canEdit && hasDates && !confirmed ? `<button class="phase-action" data-act="confirm-schedule" data-id="${p.id}">✓ Confirm Schedule</button>` : ''}
        ${status !== 'blocked' && status !== 'completed' ? `<button class="phase-action" data-act="block" data-id="${p.id}">⚠ Block</button>` : ''}
        ${status === 'blocked' ? `<button class="phase-action" data-act="unblock" data-id="${p.id}">↺ Unblock</button>` : ''}
      </div>
    </div>
  `;
}

async function handleAction(act, phaseId) {
  const phase = state.phases.find(p => p.id === phaseId);
  if (!phase) return;

  if (act === 'edit-dates') return openDatesSheet(phase);
  if (act === 'confirm-schedule') return confirmSchedule(phase);

  let newStatus = _phaseStatus(phase);
  if (act === 'advance') newStatus = STATUS_NEXT[_phaseStatus(phase)];
  else if (act === 'block') newStatus = 'blocked';
  else if (act === 'unblock') newStatus = 'in_progress';

  if (newStatus === phase.status) return;

  const { error } = await sb.from('rebuild_phases').update({ status: newStatus }).eq('id', phaseId);
  if (error) { toast('Update failed'); return; }
  phase.status = newStatus;
  toast(`${phase.phase_name} → ${titleCase(newStatus)}`);
  render();
}

// ─── Date-edit bottom sheet ────────────────────────────────────────────────
function openDatesSheet(phase) {
  const existing = document.getElementById('datesSheet');
  if (existing) existing.remove();

  const startVal = phase.scheduled_start || '';
  const endVal   = phase.scheduled_end   || '';

  document.body.insertAdjacentHTML('beforeend', `
    <div id="datesSheet" class="sheet-back">
      <div class="sheet">
        <div class="sheet-header">
          <div>
            <h3 class="sheet-title">Set Schedule</h3>
            <div class="sheet-sub">${esc(phase.phase_name)} · Phase ${String(phase.sequence).padStart(2,'0')}</div>
          </div>
          <button class="sheet-close" type="button" id="datesCloseX">&times;</button>
        </div>
        <div class="sheet-body">
          <label class="field">
            <div class="label">Start date</div>
            <input type="date" id="dateStart" value="${esc(startVal)}">
          </label>
          <label class="field">
            <div class="label">End date</div>
            <input type="date" id="dateEnd" value="${esc(endVal)}">
          </label>
          <div class="sheet-hint">Saving sets the schedule but does NOT mark it confirmed. Tap <b>Confirm Schedule</b> on the card afterward to lock it in.</div>
        </div>
        <div class="sheet-footer">
          <button class="sheet-btn ghost" type="button" id="datesCancel">Cancel</button>
          <button class="sheet-btn primary" type="button" id="datesSave">Save</button>
        </div>
      </div>
    </div>
  `);

  const sheet = document.getElementById('datesSheet');
  const close = () => sheet.remove();
  sheet.addEventListener('click', e => { if (e.target === sheet) close(); });
  document.getElementById('datesCloseX').addEventListener('click', close);
  document.getElementById('datesCancel').addEventListener('click', close);
  document.getElementById('datesSave').addEventListener('click', async () => {
    const start = document.getElementById('dateStart').value || null;
    const end   = document.getElementById('dateEnd').value || null;
    if (start && end && end < start) { toast('End date must be on or after start'); return; }
    // Setting/changing dates after a confirmation means the schedule needs
    // re-confirmation — clear the confirmed_at so the PM can't accidentally
    // leave a stale "confirmed" badge on dates that have shifted.
    const { error } = await sb.from('rebuild_phases').update({
      scheduled_start: start,
      scheduled_end:   end,
      schedule_confirmed_at:    null,
      schedule_confirmed_by:    null,
    }).eq('id', phase.id);
    if (error) { toast('Save failed: ' + error.message); return; }
    phase.scheduled_start = start;
    phase.scheduled_end   = end;
    phase.schedule_confirmed_at = null;
    phase.schedule_confirmed_by = null;
    close();
    toast('Schedule saved');
    render();
  });
}

async function confirmSchedule(phase) {
  if (!confirm(`Confirm the schedule for ${phase.phase_name}?\n\nDates: ${fmtDate(phase.scheduled_start)} → ${fmtDate(phase.scheduled_end)}`)) return;
  const now = new Date().toISOString();
  const { error } = await sb.from('rebuild_phases').update({
    schedule_confirmed_at: now,
    schedule_confirmed_by: state.userEmail || null,
  }).eq('id', phase.id);
  if (error) { toast('Confirm failed: ' + error.message); return; }
  phase.schedule_confirmed_at = now;
  phase.schedule_confirmed_by = state.userEmail || null;
  toast('Schedule confirmed');
  render();
}

function showEmpty(t, m) {
  document.getElementById('main').innerHTML = `<div class="empty"><h3>${esc(t)}</h3><p>${esc(m)}</p></div>`;
}

init();
</script>
</body>
</html>
