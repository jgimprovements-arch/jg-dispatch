<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My To-Dos · JG Platform</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<style>
  :root {
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623; --green: #2d9c5f; --red: #d64545;
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --muted: #7884a0; --line: #e3e7f0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    background: var(--navy);
    color: #fff;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(13,45,94,.12);
  }
  header img { width: 40px; height: 40px; object-fit: contain; background: #fff; padding: 4px; border-radius: 6px; }
  header h1 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: .3px; }
  header .meta { font-size: 11px; opacity: .85; letter-spacing: .5px; text-transform: uppercase; margin-top: 2px; }

  main { max-width: 1100px; margin: 0 auto; padding: 24px; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
  }
  .stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stat-chip .num {
    font-size: 22px;
    font-weight: 800;
    color: var(--orange);
  }
  .stat-chip.overdue .num { color: var(--red); }
  .stat-chip.done .num { color: var(--green); }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filters select, .filters input {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 13px;
    font-family: inherit;
    background: #fff;
    color: var(--navy);
    min-width: 140px;
  }
  .filters input { flex: 1; min-width: 200px; }

  .group {
    margin-bottom: 28px;
  }
  .group-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--line);
  }
  .group-head h2 {
    margin: 0;
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .group-head .group-count {
    background: var(--orange);
    color: #fff;
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 700;
  }
  .group.overdue .group-head { border-bottom-color: var(--red); }
  .group.overdue .group-head h2 { color: var(--red); }
  .group.overdue .group-count { background: var(--red); }
  .group.today .group-head { border-bottom-color: var(--orange); }

  .todo-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 8px;
    transition: border-color .15s, box-shadow .15s;
    cursor: pointer;
  }
  .todo-card:hover { border-color: var(--orange); box-shadow: 0 2px 8px rgba(232,93,4,.1); }
  .todo-card.done { opacity: .55; }
  .todo-card.done .title { text-decoration: line-through; color: var(--muted); }
  .todo-card-main {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
  }
  .check {
    width: 24px; height: 24px; flex-shrink: 0;
    border-radius: 50%;
    border: 2px solid var(--line);
    background: #fff;
    cursor: pointer;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }
  .check:hover { border-color: var(--orange); }
  .check.checked { background: var(--green); border-color: var(--green); }

  .todo-body { flex: 1; min-width: 0; }
  .title {
    font-weight: 700;
    color: var(--navy);
    font-size: 15px;
    margin-bottom: 3px;
    word-wrap: break-word;
  }
  .desc {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 8px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    margin-top: 6px;
    font-size: 12px;
  }
  .pill {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .4px;
    padding: 3px 8px;
    border-radius: 999px;
  }
  .pill.urgent { background: rgba(214,69,69,.12); color: var(--red); }
  .pill.high { background: rgba(232,93,4,.12); color: var(--orange); }
  .pill.normal { background: rgba(120,132,160,.12); color: var(--muted); }
  .pill.low { background: rgba(74,144,226,.12); color: #4a90e2; }
  .pill.in_progress { background: rgba(232,93,4,.15); color: var(--orange); }
  .pill.open { background: rgba(120,132,160,.12); color: var(--muted); }

  .meta-item { color: var(--text); }
  .meta-item.overdue { color: var(--red); font-weight: 700; }
  .meta-item.today { color: var(--orange); font-weight: 700; }

  .project-link {
    color: var(--navy);
    text-decoration: none;
    font-weight: 600;
    background: var(--bg);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 12px;
  }
  .project-link:hover { background: var(--navy); color: #fff; }

  .empty {
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: 10px;
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }
  .empty .icon { font-size: 48px; margin-bottom: 12px; opacity: .5; }
  .empty h3 { color: var(--navy); margin: 0 0 6px; }

  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--navy); color: #fff;
    padding: 10px 18px; border-radius: 6px; font-size: 13px;
    box-shadow: 0 4px 12px rgba(0,0,0,.2);
    z-index: 9999; opacity: 0; transition: opacity .2s;
  }
  .toast.on { opacity: 1; }

  @media (max-width: 600px) {
    main { padding: 14px; }
    header { padding: 14px 16px; }
    .filters select, .filters input { min-width: 100%; }
  }
</style>
</head>
<body>

<header>
  <img src="https://jgimprovements-arch.github.io/jg-dispatch/logo.png" alt="JG">
  <div>
    <h1>My To-Dos</h1>
    <div class="meta" id="userEmail">Loading…</div>
  </div>
</header>

<main>
  <div class="top-bar">
    <div class="stats" id="stats"></div>
  </div>

  <div class="filters">
    <select id="filterStatus">
      <option value="open">Open & In Progress</option>
      <option value="all">All</option>
      <option value="done">Completed Only</option>
    </select>
    <select id="filterPriority">
      <option value="all">All Priorities</option>
      <option value="urgent">🔥 Urgent</option>
      <option value="high">⚡ High</option>
      <option value="normal">Normal</option>
      <option value="low">Low</option>
    </select>
    <select id="filterAssignment">
      <option value="me">Assigned to Me</option>
      <option value="created">Created by Me</option>
      <option value="both">Both</option>
    </select>
    <input type="text" id="filterSearch" placeholder="🔍 Search title or details…">
  </div>

  <div id="content" class="loading">Loading to-dos…</div>
</main>

<div id="toast" class="toast"></div>

<script src="sidebar.js"></script>
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const sb = createClient(SB_URL, SB_ANON);

const state = {
  email: null,
  name: null,
  todos: [],
  projects: {},
  filterStatus: 'open',
  filterPriority: 'all',
  filterAssignment: 'me',
  filterSearch: '',
};

const esc = s => String(s == null ? '' : s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const fmtDate = d => d ? new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
const todayISO = () => new Date().toISOString().slice(0,10);
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2000);
}

async function init() {
  // Read user from same localStorage key sidebar.js uses
  let user = null;
  try { user = JSON.parse(localStorage.getItem('jg_platform_user') || 'null'); } catch {}
  state.email = (user?.email || '').toLowerCase();
  state.name = user?.name || (state.email ? state.email.split('@')[0] : '');

  if (!state.email) {
    document.getElementById('content').innerHTML = `<div class="empty"><h3>Sign in required</h3><p>Please sign in via the sidebar to view your to-dos.</p></div>`;
    return;
  }

  document.getElementById('userEmail').textContent = state.email;

  await loadTodos();
  await loadProjects();
  wire();
  render();

  // Realtime
  sb.channel('my_todos_' + state.email)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rebuild_todos' }, async () => {
      await loadTodos();
      render();
    })
    .subscribe();
}

async function loadTodos() {
  const email = state.email;
  // Fetch todos where user is either assignee or creator
  const { data } = await sb.from('rebuild_todos')
    .select('*')
    .or(`assignee_email.eq.${email},created_by_email.eq.${email}`)
    .order('due_date', { ascending: true, nullsFirst: false })
    .order('priority', { ascending: false })
    .order('created_at', { ascending: false });
  state.todos = data || [];
}

async function loadProjects() {
  const ids = Array.from(new Set(state.todos.map(t => t.project_id).filter(Boolean)));
  if (!ids.length) { state.projects = {}; return; }
  const { data } = await sb.from('rebuild_projects')
    .select('id, albi_job_number, customer_name, property_address, market')
    .in('id', ids);
  const map = {};
  (data || []).forEach(p => { map[p.id] = p; });
  state.projects = map;
}

function wire() {
  document.getElementById('filterStatus').addEventListener('change', e => { state.filterStatus = e.target.value; render(); });
  document.getElementById('filterPriority').addEventListener('change', e => { state.filterPriority = e.target.value; render(); });
  document.getElementById('filterAssignment').addEventListener('change', e => { state.filterAssignment = e.target.value; render(); });
  document.getElementById('filterSearch').addEventListener('input', e => { state.filterSearch = e.target.value.toLowerCase(); render(); });
}

function applyFilters(todos) {
  const me = state.email;
  return todos.filter(t => {
    // Assignment filter
    if (state.filterAssignment === 'me' && (t.assignee_email || '').toLowerCase() !== me) return false;
    if (state.filterAssignment === 'created' && (t.created_by_email || '').toLowerCase() !== me) return false;
    // Status filter
    if (state.filterStatus === 'open' && t.status !== 'open' && t.status !== 'in_progress') return false;
    if (state.filterStatus === 'done' && t.status !== 'done' && t.status !== 'cancelled') return false;
    // Priority filter
    if (state.filterPriority !== 'all' && t.priority !== state.filterPriority) return false;
    // Search filter
    if (state.filterSearch) {
      const hay = (t.title + ' ' + (t.body || '')).toLowerCase();
      if (!hay.includes(state.filterSearch)) return false;
    }
    return true;
  });
}

function render() {
  const filtered = applyFilters(state.todos);

  // Stats — based on what's assigned to me regardless of current filters
  const mine = state.todos.filter(t => (t.assignee_email || '').toLowerCase() === state.email);
  const today = todayISO();
  const myOpen = mine.filter(t => t.status === 'open' || t.status === 'in_progress');
  const overdue = myOpen.filter(t => t.due_date && t.due_date < today);
  const dueToday = myOpen.filter(t => t.due_date === today);
  const myDoneThisWeek = mine.filter(t => {
    if (t.status !== 'done' || !t.completed_at) return false;
    const d = new Date(t.completed_at);
    const week = new Date(); week.setDate(week.getDate() - 7);
    return d >= week;
  });

  document.getElementById('stats').innerHTML = `
    <div class="stat-chip"><span class="num">${myOpen.length}</span><span>Open</span></div>
    <div class="stat-chip overdue"><span class="num">${overdue.length}</span><span>Overdue</span></div>
    <div class="stat-chip"><span class="num">${dueToday.length}</span><span>Due Today</span></div>
    <div class="stat-chip done"><span class="num">${myDoneThisWeek.length}</span><span>Done (7d)</span></div>
  `;

  const c = document.getElementById('content');

  if (!filtered.length) {
    c.innerHTML = `<div class="empty"><div class="icon">✓</div><h3>All clear</h3><p>No to-dos match your filters.</p></div>`;
    return;
  }

  // Group by status: overdue / today / upcoming / no-date / in_progress / done
  const groups = { overdue: [], today: [], upcoming: [], noDate: [], inProgress: [], done: [] };
  for (const t of filtered) {
    if (t.status === 'done' || t.status === 'cancelled') {
      groups.done.push(t);
    } else if (t.status === 'in_progress') {
      groups.inProgress.push(t);
    } else if (!t.due_date) {
      groups.noDate.push(t);
    } else if (t.due_date < today) {
      groups.overdue.push(t);
    } else if (t.due_date === today) {
      groups.today.push(t);
    } else {
      groups.upcoming.push(t);
    }
  }

  const renderCard = (t) => {
    const isDone = t.status === 'done' || t.status === 'cancelled';
    const proj = state.projects[t.project_id];
    const dueClass = t.due_date && !isDone
      ? (t.due_date < today ? 'overdue' : (t.due_date === today ? 'today' : ''))
      : '';
    const projHref = proj ? `rebuild.html#p=${t.project_id}&t=todos` : '#';
    const projLabel = proj
      ? `${proj.albi_job_number || 'Job'} · ${proj.customer_name || ''}`
      : '(project)';
    const isMyAssignee = (t.assignee_email || '').toLowerCase() === state.email;
    return `
      <div class="todo-card ${isDone ? 'done' : ''}" data-id="${t.id}">
        <div class="todo-card-main">
          <button class="check ${isDone ? 'checked' : ''}" data-act="toggle" data-id="${t.id}">${isDone ? '✓' : ''}</button>
          <div class="todo-body">
            <div class="title">${esc(t.title)}</div>
            ${t.body ? `<div class="desc">${esc(t.body)}</div>` : ''}
            <div class="meta">
              <span class="pill ${t.priority}">${t.priority}</span>
              ${t.status === 'in_progress' ? `<span class="pill in_progress">In Progress</span>` : ''}
              <a class="project-link" href="${projHref}">📂 ${esc(projLabel)}</a>
              ${t.due_date ? `<span class="meta-item ${dueClass}">📅 ${fmtDate(t.due_date)}${dueClass === 'overdue' ? ' (overdue)' : ''}</span>` : ''}
              ${isMyAssignee
                ? `<span class="meta-item" style="color:var(--muted);">from ${esc(t.created_by_name || t.created_by_email)}</span>`
                : `<span class="meta-item" style="color:var(--muted);">→ ${esc(t.assignee_name || t.assignee_email)}</span>`}
            </div>
          </div>
        </div>
      </div>
    `;
  };

  let html = '';
  const groupCfg = [
    ['overdue', '⚠ Overdue', 'overdue'],
    ['today', '📅 Due Today', 'today'],
    ['inProgress', '▶ In Progress', ''],
    ['upcoming', '⏭ Upcoming', ''],
    ['noDate', '📌 No Due Date', ''],
    ['done', '✓ Completed', ''],
  ];
  for (const [key, label, cls] of groupCfg) {
    if (!groups[key].length) continue;
    html += `<div class="group ${cls}">
      <div class="group-head">
        <h2>${label}</h2>
        <span class="group-count">${groups[key].length}</span>
      </div>
      ${groups[key].map(renderCard).join('')}
    </div>`;
  }
  c.innerHTML = html;

  // Wire toggle (stop propagation so clicking checkbox doesn't navigate)
  c.querySelectorAll('[data-act="toggle"]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleDone(btn.dataset.id);
    });
  });

  // Project chip already navigates on its own — stop bubbling so we don't double-navigate
  c.querySelectorAll('.project-link').forEach(a => {
    a.addEventListener('click', e => e.stopPropagation());
  });

  // Click anywhere else on the card → open the job at the To-Dos tab
  c.querySelectorAll('.todo-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = card.dataset.id;
      const t = state.todos.find(x => x.id === id);
      if (!t || !t.project_id) return;
      window.location.href = `rebuild.html#p=${t.project_id}&t=todos`;
    });
  });
}

async function toggleDone(id) {
  const t = state.todos.find(x => x.id === id);
  if (!t) return;
  const isDone = t.status === 'done';
  const updates = isDone
    ? { status: 'open', completed_at: null, completed_by_email: null }
    : { status: 'done', completed_at: new Date().toISOString(), completed_by_email: state.email };
  await sb.from('rebuild_todos').update(updates).eq('id', id);
  await sb.from('rebuild_todo_history').insert({
    todo_id: id, action: isDone ? 'reopened' : 'completed', actor: state.email,
    details: isDone ? 'Reopened' : `Completed by ${state.name || state.email}`,
  });
  // Notify creator if completing and creator != self
  if (!isDone && t.created_by_email && t.created_by_email.toLowerCase() !== state.email) {
    try {
      await sb.from('rebuild_notifications').insert({
        project_id: t.project_id,
        recipient_email: t.created_by_email.toLowerCase(),
        event_type: 'todo_completed',
        selection_id: id,
        title: `To-do completed: ${t.title}`,
        body: `${state.name || state.email} marked your to-do done.`,
      });
    } catch (e) { console.warn('todo done notif failed', e); }
  }
  toast(isDone ? 'Reopened' : 'Done ✓');
  await loadTodos();
  render();
}

init();
</script>
</body>
</html>
