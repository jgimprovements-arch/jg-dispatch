<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d2d5e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Relationships">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>Relationships · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<style>
  :root {
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --text-soft: #5a6478;
    --muted: #7884a0; --line: #e3e7f0; --navy: #0d2d5e; --orange: #e85d04;
    --gold: #f5a623; --green: #2d9c5f; --red: #d64545; --blue-primary: #2563eb;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html { color-scheme: light; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); overscroll-behavior-y: contain; padding-bottom: calc(var(--safe-bottom) + 20px); }

  .topbar {
    padding: calc(var(--safe-top) + 14px) 18px 12px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; background: var(--bg); z-index: 10;
    border-bottom: 1px solid var(--line);
  }
  .back-btn { background: transparent; border: 0; color: var(--navy); width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; font-family: inherit; }
  .back-btn:active { background: var(--card); }
  .back-btn svg { width: 22px; height: 22px; }
  .topbar-title { flex: 1; font-size: 16px; font-weight: 800; color: var(--text); }
  .topbar-sub { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 1px; }
  .add-btn { background: var(--orange); color: #fff; border: 0; width: 38px; height: 38px; border-radius: 50%; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; box-shadow: 0 4px 12px rgba(232,93,4,.3); font-family: inherit; }
  .add-btn:active { transform: scale(.92); }

  main { padding: 14px; max-width: 720px; margin: 0 auto; }

  /* Group cards */
  .group-section { margin-bottom: 22px; }
  .group-label { font-size: 11px; font-weight: 800; color: var(--navy); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; padding-left: 2px; display: flex; justify-content: space-between; align-items: center; }
  .group-count { font-size: 11px; color: var(--muted); font-weight: 700; }

  .rel-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: transform .1s, border-color .15s;
  }
  .rel-card:active { transform: scale(.99); border-color: var(--orange); }
  .rel-card.albi { border-left: 4px solid #4a90e2; }
  .rel-card.jg { border-left: 4px solid var(--orange); }
  .rel-top {
    display: flex; align-items: flex-start; gap: 10px;
  }
  .rel-name-block { flex: 1; min-width: 0; }
  .rel-name { font-size: 15px; font-weight: 800; color: var(--text); letter-spacing: -.1px; }
  .rel-role { font-size: 11px; color: var(--navy); font-weight: 700; text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }
  .rel-company { font-size: 12px; color: var(--text-soft); margin-top: 2px; }
  .rel-source-pill {
    font-size: 9px; font-weight: 800; padding: 2px 7px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; flex-shrink: 0;
  }
  .rel-source-pill.albi { background: rgba(74,144,226,.15); color: #4a90e2; }
  .rel-source-pill.jg { background: rgba(232,93,4,.15); color: var(--orange); }
  .rel-source-pill.primary { background: rgba(245,166,35,.15); color: var(--gold); margin-left: 4px; }

  .rel-actions {
    display: flex; gap: 6px; margin-top: 12px;
    padding-top: 10px; border-top: 1px solid var(--line);
  }
  .rel-action-btn {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--navy);
    border-radius: 8px;
    padding: 9px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    transition: background .15s, border-color .15s, color .15s;
  }
  .rel-action-btn:active { background: var(--orange); border-color: var(--orange); color: #fff; }
  .rel-action-btn.disabled { opacity: .35; pointer-events: none; }
  .rel-action-btn svg { width: 14px; height: 14px; }

  .empty-block { background: var(--card); border: 1px dashed var(--line); border-radius: 14px; padding: 40px 20px; text-align: center; color: var(--muted); margin-top: 14px; }
  .empty-block .ico { font-size: 42px; opacity: .4; margin-bottom: 8px; }
  .empty-block h3 { color: var(--text); margin: 0 0 4px; font-size: 15px; }
  .empty-block p { margin: 0; font-size: 13px; }

  .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }

  /* Edit/Add sheet */
  .sheet-back { position: fixed; inset: 0; background: rgba(13,45,94,.5); z-index: 100; display: none; align-items: flex-end; }
  .sheet-back.on { display: flex; }
  .sheet {
    background: var(--card);
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    border-radius: 18px 18px 0 0;
    padding: 18px 16px calc(var(--safe-bottom) + 18px);
    box-shadow: 0 -8px 32px rgba(13,45,94,.3);
    max-height: 92vh;
    overflow-y: auto;
    animation: sheetUp .25s ease-out;
  }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet h3 { margin: 0 0 14px; color: var(--navy); font-size: 17px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
  .sheet .close-x { background: var(--bg); border: 0; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; color: var(--muted); font-family: inherit; }
  .sheet label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin: 10px 0 4px; }
  .sheet input, .sheet select, .sheet textarea {
    width: 100%;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 9px;
    padding: 11px 13px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
  }
  .sheet input:focus, .sheet select:focus, .sheet textarea:focus { outline: none; border-color: var(--orange); }
  .sheet textarea { min-height: 70px; resize: vertical; line-height: 1.4; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .opts { display: flex; align-items: center; gap: 12px; padding: 10px 0 4px; font-size: 13px; color: var(--text); }
  .opts label { display: flex; align-items: center; gap: 8px; cursor: pointer; margin: 0; text-transform: none; color: var(--text); font-weight: 600; letter-spacing: 0; }
  .opts input[type=checkbox] { accent-color: var(--orange); width: 18px; height: 18px; }
  .actions { display: flex; gap: 8px; margin-top: 14px; }
  .btn { flex: 1; padding: 12px; border-radius: 999px; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid transparent; font-family: inherit; }
  .btn.primary { background: var(--orange); color: #fff; border-color: var(--orange); }
  .btn.primary:disabled { opacity: .5; }
  .btn.ghost { background: var(--bg); color: var(--navy); border-color: var(--line); }
  .btn.danger { background: rgba(214,69,69,.1); color: var(--red); border-color: rgba(214,69,69,.3); flex: 0 0 80px; }
  .btn.danger:active { background: var(--red); color: #fff; }

  .source-note { background: rgba(74,144,226,.08); border-left: 3px solid #4a90e2; padding: 8px 12px; border-radius: 6px; font-size: 11px; color: var(--text-soft); margin-bottom: 8px; line-height: 1.4; }
  .source-note b { color: #4a90e2; }

  .toast { position: fixed; bottom: calc(var(--safe-bottom) + 30px); left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 16px rgba(13,45,94,.3); z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.on { opacity: 1; }

  /* Directory entry button in topbar */
  .dir-btn {
    background: rgba(13,45,94,.08);
    color: var(--navy);
    border: 1px solid var(--line);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: inherit;
    margin-right: 6px;
  }
  .dir-btn:active { background: var(--navy); color: #fff; }

  /* "From directory" badge on Name label */
  .from-dir-badge {
    display: inline-block;
    background: rgba(74,144,226,.15);
    color: #4a90e2;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: .4px;
    margin-left: 8px;
    vertical-align: middle;
    text-transform: uppercase;
  }

  /* Autocomplete suggestions under Name input */
  .autocomplete-wrap {
    position: relative;
  }
  .autocomplete-list {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--card);
    border: 1px solid var(--line);
    border-top: 0;
    border-radius: 0 0 9px 9px;
    box-shadow: 0 6px 14px rgba(13,45,94,.1);
    max-height: 260px;
    overflow-y: auto;
    z-index: 30;
    display: none;
  }
  .autocomplete-list.on { display: block; }
  .ac-item {
    padding: 10px 13px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    font-size: 13px;
  }
  .ac-item:last-child { border-bottom: 0; }
  .ac-item:active { background: var(--bg); }
  .ac-item-name { font-weight: 700; color: var(--text); }
  .ac-item-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ac-item-role { font-size: 9px; color: #4a90e2; font-weight: 800; text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }

  /* Directory full-screen picker */
  .dir-back { position: fixed; inset: 0; background: rgba(13,45,94,.5); z-index: 200; display: none; }
  .dir-back.on { display: block; }
  .dir-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    z-index: 210;
    transform: translateY(100%);
    transition: transform .25s;
    display: flex;
    flex-direction: column;
    max-width: 720px;
    margin: 0 auto;
  }
  .dir-overlay.on { transform: translateY(0); }
  .dir-header {
    padding: calc(var(--safe-top) + 14px) 14px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border-bottom: 1px solid var(--line);
  }
  .dir-search {
    flex: 1;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 15px;
    color: var(--text);
    font-family: inherit;
  }
  .dir-search:focus { outline: none; border-color: var(--orange); }
  .dir-close {
    background: var(--orange);
    color: #fff;
    border: 0;
    border-radius: 999px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .dir-tabs {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 14px;
    background: var(--card);
    border-bottom: 1px solid var(--line);
    overflow-x: auto;
  }
  .dir-tab {
    background: transparent;
    border: 0;
    color: var(--muted);
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border-radius: 999px;
    font-family: inherit;
    white-space: nowrap;
  }
  .dir-tab.on { background: var(--navy); color: #fff; }
  .dir-show-customers {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-soft);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .dir-show-customers input { accent-color: var(--orange); width: 16px; height: 16px; }
  .dir-list {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 6px 14px calc(var(--safe-bottom) + 14px);
  }
  .dir-item {
    padding: 12px 12px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background .15s;
  }
  .dir-item:active { background: var(--card); }
  .dir-item-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .dir-item-meta { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .dir-item-role-pill {
    display: inline-block;
    background: rgba(13,45,94,.10);
    color: var(--navy);
    padding: 2px 7px;
    border-radius: 999px;
    font-size: 9px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .3px;
    margin-right: 4px;
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" id="backBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div style="flex:1;min-width:0;">
    <div class="topbar-title">Relationships</div>
    <div class="topbar-sub" id="topbarSub">Loading…</div>
  </div>
  <button class="dir-btn" id="dirBtn" title="Browse directory">📇</button>
  <button class="add-btn" id="addBtn" title="Add relationship">+</button>
</div>

<main id="main">
  <div class="loading">Loading relationships…</div>
</main>

<!-- Add/Edit sheet -->
<div class="sheet-back" id="sheetBack">
  <div class="sheet" id="sheet">
    <h3 id="sheetTitle">Add Relationship <button class="close-x" id="closeSheet">×</button></h3>

    <label>Role *</label>
    <select id="f_role">
      <optgroup label="Albi roles">
        <option value="customer">Customer</option>
        <option value="insurance_adjuster">Insurance Adjuster</option>
        <option value="insurance_carrier_rep">Insurance Carrier Rep</option>
        <option value="public_adjuster">Public Adjuster</option>
        <option value="real_estate_agent">Real Estate Agent</option>
        <option value="lender">Lender</option>
        <option value="property_manager">Property Manager</option>
        <option value="mortgage_company">Mortgage Company</option>
        <option value="attorney">Attorney</option>
      </optgroup>
      <optgroup label="Trade & Supplier">
        <option value="subcontractor">Subcontractor</option>
        <option value="vendor">Vendor</option>
      </optgroup>
      <optgroup label="JG roles">
        <option value="tech">Tech</option>
        <option value="carpenter">Carpenter</option>
        <option value="estimator">Estimator</option>
        <option value="project_manager">Project Manager</option>
        <option value="office_admin">Office Admin</option>
        <option value="other">Other</option>
      </optgroup>
    </select>

    <label>Name * <span class="from-dir-badge" id="fromDirBadge" style="display:none;">📇 From directory</span></label>
    <div class="autocomplete-wrap">
      <input type="text" id="f_name" autocomplete="off" placeholder="Start typing or browse directory">
      <div class="autocomplete-list" id="autocompleteList"></div>
    </div>

    <label>Company / Org</label>
    <input type="text" id="f_company" autocomplete="off" placeholder="e.g. State Farm">

    <div class="row2">
      <div>
        <label>Phone</label>
        <input type="tel" id="f_phone" autocomplete="off">
      </div>
      <div>
        <label>Phone (alt)</label>
        <input type="tel" id="f_phone_secondary" autocomplete="off">
      </div>
    </div>

    <label>Email</label>
    <input type="email" id="f_email" autocomplete="off">

    <label>Notes</label>
    <textarea id="f_notes" placeholder="Best contact time, preferences, claim-specific details…"></textarea>

    <div class="opts">
      <label><input type="checkbox" id="f_primary"> Mark as primary for this role</label>
    </div>

    <div class="actions">
      <button class="btn danger" id="deleteBtn" style="display:none;">Delete</button>
      <button class="btn ghost" id="cancelBtn">Cancel</button>
      <button class="btn primary" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<!-- Directory picker overlay -->
<div class="dir-back" id="dirBack"></div>
<div class="dir-overlay" id="dirOverlay">
  <div class="dir-header">
    <input type="text" class="dir-search" id="dirSearch" placeholder="Search 5,300+ contacts and orgs…">
    <button class="dir-close" id="dirClose">Done</button>
  </div>
  <div class="dir-tabs">
    <button class="dir-tab on" data-tab="people">People</button>
    <button class="dir-tab" data-tab="orgs">Organizations</button>
    <label class="dir-show-customers"><input type="checkbox" id="dirShowCustomers"> Include customers</label>
  </div>
  <div class="dir-list" id="dirList">
    <div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">Type to search…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const sb = createClient(SB_URL, SB_ANON);

// Relationships live in JG only — Albi Zapier integration doesn't expose
// relationship create/update/delete actions, so we don't push.

const params = new URLSearchParams(location.search);
const projectId = params.get('p');

const state = {
  project: null,
  relationships: [],
  editingId: null,
  userEmail: null,
  userName: null,
  // Directory tracking for the currently-open Add/Edit sheet
  sheetDirectoryContactId: null,
  sheetDirectoryOrgId: null,
  dirTab: 'people',           // 'people' or 'orgs'
  dirShowCustomers: false,
};

// Read user from localStorage
try {
  const user = JSON.parse(localStorage.getItem('jg_platform_user') || 'null');
  if (user?.email) {
    state.userEmail = user.email.toLowerCase();
    state.userName = user.name || state.userEmail.split('@')[0];
  }
} catch {}

const $ = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);
const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2400);
}

// Role display
const ROLE_LABELS = {
  customer: 'Customer',
  insurance_adjuster: 'Insurance Adjuster',
  insurance_carrier_rep: 'Insurance Carrier Rep',
  public_adjuster: 'Public Adjuster',
  real_estate_agent: 'Real Estate Agent',
  lender: 'Lender',
  property_manager: 'Property Manager',
  mortgage_company: 'Mortgage Company',
  attorney: 'Attorney',
  tech: 'Tech',
  carpenter: 'Carpenter',
  subcontractor: 'Subcontractor',
  vendor: 'Vendor',
  estimator: 'Estimator',
  project_manager: 'Project Manager',
  office_admin: 'Office Admin',
  other: 'Other',
};

// Group order
const GROUP_ORDER = [
  { key: 'Customer & Property', roles: ['customer','property_manager'] },
  { key: 'Insurance', roles: ['insurance_adjuster','insurance_carrier_rep','public_adjuster'] },
  { key: 'Financial', roles: ['lender','mortgage_company','attorney'] },
  { key: 'Real Estate', roles: ['real_estate_agent'] },
  { key: 'Trade & Supplier', roles: ['subcontractor','vendor'] },
  { key: 'JG Team', roles: ['project_manager','estimator','tech','carpenter','office_admin'] },
  { key: 'Other', roles: ['other'] },
];

async function init() {
  if (!projectId) { showError('Missing project ID.'); return; }
  const { data: project, error } = await sb.from('rebuild_projects')
    .select('id, albi_project_id, albi_job_number, customer_name, property_address')
    .eq('id', projectId).maybeSingle();
  if (error || !project) { showError('Project not found.'); return; }
  state.project = project;
  $('#topbarSub').textContent = `${project.albi_job_number || ''} · ${project.customer_name || ''}`;

  await loadRelationships();
  render();
  wire();

  // Realtime sync
  sb.channel('rel_' + projectId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rebuild_project_relationships', filter: `project_id=eq.${projectId}` },
      async () => { await loadRelationships(); render(); })
    .subscribe();
}

async function loadRelationships() {
  const { data, error } = await sb.from('rebuild_project_relationships')
    .select('*')
    .eq('project_id', projectId)
    .is('deleted_at', null)
    .order('is_primary', { ascending: false })
    .order('display_name');
  if (error) { console.error(error); state.relationships = []; return; }
  state.relationships = data || [];
}

function render() {
  if (!state.relationships.length) {
    $('#main').innerHTML = `
      <div class="empty-block">
        <div class="ico">👥</div>
        <h3>No relationships yet</h3>
        <p>Tap + to add agents, adjusters, customers, subs, or JG team.</p>
      </div>
    `;
    return;
  }
  // Bucket by group
  const byGroup = {};
  GROUP_ORDER.forEach(g => byGroup[g.key] = []);
  byGroup.Other = [];

  state.relationships.forEach(r => {
    const matched = GROUP_ORDER.find(g => g.roles.includes(r.role));
    if (matched) byGroup[matched.key].push(r);
    else byGroup.Other.push(r);
  });

  const sections = GROUP_ORDER
    .concat([{ key: 'Other', roles: [] }])
    .filter(g => (byGroup[g.key] || []).length > 0)
    .map(g => `
      <div class="group-section">
        <div class="group-label">${esc(g.key)} <span class="group-count">${byGroup[g.key].length}</span></div>
        ${byGroup[g.key].map(relCard).join('')}
      </div>
    `).join('');

  $('#main').innerHTML = sections;

  document.querySelectorAll('[data-edit]').forEach(el => {
    el.addEventListener('click', (e) => {
      // Don't open edit sheet when an action button (a tel:, mailto:) was tapped
      if (e.target.closest('.rel-action-btn')) return;
      openEditSheet(el.dataset.edit);
    });
  });
}

function relCard(r) {
  const phoneBtn = r.phone
    ? `<a href="tel:${esc(r.phone)}" class="rel-action-btn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.29 21 3 13.71 3 4.5 3 3.95 3.45 3.5 4 3.5h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>Call</a>`
    : `<span class="rel-action-btn disabled">Call</span>`;
  const emailBtn = r.email
    ? `<a href="mailto:${esc(r.email)}" class="rel-action-btn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>Email</a>`
    : `<span class="rel-action-btn disabled">Email</span>`;
  const smsBtn = r.phone
    ? `<a href="sms:${esc(r.phone)}" class="rel-action-btn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>Text</a>`
    : `<span class="rel-action-btn disabled">Text</span>`;

  const sourceClass = r.source === 'albi' ? 'albi' : 'jg';
  const sourceLabel = r.source === 'albi' ? 'ALBI' : 'JG';

  return `
    <div class="rel-card ${sourceClass}" data-edit="${esc(r.id)}">
      <div class="rel-top">
        <div class="rel-name-block">
          <div class="rel-name">${esc(r.display_name)}</div>
          <div class="rel-role">${esc(ROLE_LABELS[r.role] || r.role)}${r.role_label ? ' · ' + esc(r.role_label) : ''}</div>
          ${r.company ? `<div class="rel-company">${esc(r.company)}</div>` : ''}
        </div>
        <span class="rel-source-pill ${sourceClass}">${sourceLabel}</span>
        ${r.is_primary ? `<span class="rel-source-pill primary">Primary</span>` : ''}
      </div>
      <div class="rel-actions">
        ${phoneBtn}
        ${smsBtn}
        ${emailBtn}
      </div>
    </div>
  `;
}

function openEditSheet(id) {
  const r = state.relationships.find(x => x.id === id);
  if (!r) return;
  state.editingId = id;
  state.sheetDirectoryContactId = r.directory_contact_id || null;
  state.sheetDirectoryOrgId = r.directory_org_id || null;
  $('#sheetTitle').firstChild.textContent = 'Edit Relationship ';
  $('#deleteBtn').style.display = 'block';
  $('#fromDirBadge').style.display = r.directory_contact_id ? 'inline-block' : 'none';
  $('#f_role').value = r.role || 'other';
  $('#f_name').value = r.display_name || '';
  $('#f_company').value = r.company || '';
  $('#f_phone').value = r.phone || '';
  $('#f_phone_secondary').value = r.phone_secondary || '';
  $('#f_email').value = r.email || '';
  $('#f_notes').value = r.notes || '';
  $('#f_primary').checked = !!r.is_primary;
  hideAutocomplete();
  $('#sheetBack').classList.add('on');
}

function openAddSheet() {
  state.editingId = null;
  state.sheetDirectoryContactId = null;
  state.sheetDirectoryOrgId = null;
  $('#sheetTitle').firstChild.textContent = 'Add Relationship ';
  $('#deleteBtn').style.display = 'none';
  $('#fromDirBadge').style.display = 'none';
  $('#f_role').value = 'customer';
  $('#f_name').value = '';
  $('#f_company').value = '';
  $('#f_phone').value = '';
  $('#f_phone_secondary').value = '';
  $('#f_email').value = '';
  $('#f_notes').value = '';
  $('#f_primary').checked = false;
  hideAutocomplete();
  $('#sheetBack').classList.add('on');
  setTimeout(() => $('#f_name').focus(), 100);
}

function closeSheet() {
  $('#sheetBack').classList.remove('on');
  state.editingId = null;
}

async function saveRelationship() {
  const name = $('#f_name').value.trim();
  const role = $('#f_role').value;
  if (!name) { toast('Name is required'); return; }

  const saveBtn = $('#saveBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';

  const fields = {
    project_id: projectId,
    role,
    display_name: name,
    company: $('#f_company').value.trim() || null,
    phone: $('#f_phone').value.trim() || null,
    phone_secondary: $('#f_phone_secondary').value.trim() || null,
    email: $('#f_email').value.trim() || null,
    notes: $('#f_notes').value.trim() || null,
    is_primary: $('#f_primary').checked,
    directory_contact_id: state.sheetDirectoryContactId,
    directory_org_id: state.sheetDirectoryOrgId,
  };

  let savedRow;
  let action;
  if (state.editingId) {
    // Update
    const { data, error } = await sb.from('rebuild_project_relationships')
      .update(fields)
      .eq('id', state.editingId)
      .select();
    if (error) { toast('Save failed: ' + error.message); saveBtn.disabled = false; saveBtn.textContent = 'Save'; return; }
    savedRow = data[0];
    action = 'edited';
  } else {
    // DEDUPE: if no directory_contact_id was already set (user didn't pick from directory),
    // call find_or_create_contact to either find an existing match or create a new directory entry.
    let matchedExisting = false;
    if (!fields.directory_contact_id) {
      const { data: dirId, error: rpcErr } = await sb.rpc('find_or_create_contact', {
        p_display_name: fields.display_name,
        p_phone: fields.phone,
        p_email: fields.email,
        p_role: fields.role,
        p_company: fields.company,
      });
      if (rpcErr) {
        console.warn('find_or_create_contact failed, continuing without dedupe:', rpcErr);
      } else if (dirId) {
        fields.directory_contact_id = dirId;
        // Pull the canonical contact info from the directory to ensure consistency
        const { data: existing } = await sb.from('contact_directory')
          .select('display_name, mobile_phone, email, organization_name, role')
          .eq('id', dirId).maybeSingle();
        if (existing) {
          // Detect if this was an existing match (vs. brand new)
          const isMatch = (
            existing.display_name?.trim().toLowerCase() === fields.display_name.trim().toLowerCase() &&
            (
              (fields.phone && existing.mobile_phone &&
                existing.mobile_phone.replace(/\D/g,'') === fields.phone.replace(/\D/g,'')) ||
              (fields.email && existing.email &&
                existing.email.toLowerCase() === fields.email.toLowerCase())
            )
          );
          // For both matches and creates, use the canonical directory values
          fields.display_name = existing.display_name;
          fields.phone = fields.phone || existing.mobile_phone;
          fields.email = fields.email || existing.email;
          fields.company = fields.company || existing.organization_name;
          matchedExisting = isMatch;
        }
      }
    }

    // Insert
    fields.source = 'jg';
    fields.created_by_email = state.userEmail;
    fields.created_by_name = state.userName;
    const { data, error } = await sb.from('rebuild_project_relationships')
      .insert(fields).select();
    if (error) { toast('Save failed: ' + error.message); saveBtn.disabled = false; saveBtn.textContent = 'Save'; return; }
    savedRow = data[0];
    action = matchedExisting ? 'created_from_existing' : 'created';
    // Show a brief signal that it merged
    if (matchedExisting) toast('Matched existing contact');
  }

  // History log
  try {
    await sb.from('rebuild_project_relationship_history').insert({
      relationship_id: savedRow.id,
      project_id: projectId,
      action,
      actor: state.userEmail || 'unknown',
      actor_name: state.userName,
      changes: fields,
    });
  } catch (e) { console.warn('History log failed:', e); }

  await loadRelationships();
  render();
  // Only show the generic toast if we didn't already show "Matched existing contact"
  if (action !== 'created_from_existing') {
    toast(state.editingId ? 'Relationship updated' : 'Relationship added');
  }
  saveBtn.disabled = false;
  saveBtn.textContent = 'Save';
  closeSheet();
}

// ═══════════════ DIRECTORY (autocomplete + browse) ═══════════════
let autocompleteTimer = null;

function hideAutocomplete() {
  $('#autocompleteList').classList.remove('on');
  $('#autocompleteList').innerHTML = '';
}

function onNameInput(e) {
  const v = e.target.value.trim();
  // Typing a new name detaches from directory
  if (state.sheetDirectoryContactId && state.editingId == null) {
    state.sheetDirectoryContactId = null;
    state.sheetDirectoryOrgId = null;
    $('#fromDirBadge').style.display = 'none';
  }
  clearTimeout(autocompleteTimer);
  if (v.length < 2) { hideAutocomplete(); return; }
  autocompleteTimer = setTimeout(() => runAutocomplete(v), 200);
}

async function runAutocomplete(q) {
  // Search contact directory by name OR organization, exclude customer-only by default
  const { data, error } = await sb.from('contact_directory')
    .select('id, display_name, role, contact_type, mobile_phone, email, organization_name, job_title, is_customer_only')
    .or(`display_name.ilike.%${q}%,organization_name.ilike.%${q}%,email.ilike.%${q}%`)
    .eq('is_customer_only', false)
    .is('deleted_at', null)
    .limit(6);
  if (error) { console.warn(error); return; }
  if (!data || !data.length) { hideAutocomplete(); return; }

  const list = $('#autocompleteList');
  list.innerHTML = data.map(c => `
    <div class="ac-item" data-contact-id="${esc(c.id)}">
      <div class="ac-item-name">${esc(c.display_name)}</div>
      <div class="ac-item-sub">${esc([c.job_title, c.organization_name].filter(Boolean).join(' · '))}${c.email ? ' · ' + esc(c.email) : ''}</div>
      ${c.role ? `<div class="ac-item-role">${esc(ROLE_LABELS[c.role] || c.role)}</div>` : ''}
    </div>
  `).join('');
  list.classList.add('on');
  list.querySelectorAll('[data-contact-id]').forEach(el => {
    el.addEventListener('click', () => {
      const contact = data.find(x => x.id === el.dataset.contactId);
      if (contact) pickDirectoryContact(contact);
    });
  });
}

function pickDirectoryContact(c) {
  $('#f_name').value = c.display_name || '';
  $('#f_email').value = c.email || '';
  $('#f_phone').value = c.mobile_phone || '';
  $('#f_company').value = c.organization_name || '';
  if (c.role) $('#f_role').value = c.role;
  state.sheetDirectoryContactId = c.id;
  $('#fromDirBadge').style.display = 'inline-block';
  hideAutocomplete();
}

function pickDirectoryOrg(o) {
  $('#f_name').value = o.name || '';
  $('#f_email').value = o.email || '';
  $('#f_phone').value = o.phone || '';
  $('#f_company').value = o.name || '';
  state.sheetDirectoryOrgId = o.id;
  state.sheetDirectoryContactId = null; // org pick = not a person
  $('#fromDirBadge').style.display = 'inline-block';
  hideAutocomplete();
}

// ─── Directory full-screen picker ───
let dirSearchTimer = null;

function openDirectory() {
  $('#dirBack').classList.add('on');
  $('#dirOverlay').classList.add('on');
  $('#dirSearch').value = '';
  state.dirTab = 'people';
  renderDirTabs();
  runDirectorySearch('');
  setTimeout(() => $('#dirSearch').focus(), 100);
}

function closeDirectory() {
  $('#dirBack').classList.remove('on');
  $('#dirOverlay').classList.remove('on');
}

function renderDirTabs() {
  $$('.dir-tab').forEach(t => t.classList.toggle('on', t.dataset.tab === state.dirTab));
}

async function runDirectorySearch(q) {
  q = (q || '').trim();
  const showCustomers = state.dirShowCustomers;

  let queryRes;
  if (state.dirTab === 'people') {
    let qb = sb.from('contact_directory')
      .select('id, display_name, role, contact_type, mobile_phone, email, organization_name, job_title, is_customer_only')
      .is('deleted_at', null);
    if (!showCustomers) qb = qb.eq('is_customer_only', false);
    if (q.length >= 2) {
      qb = qb.or(`display_name.ilike.%${q}%,organization_name.ilike.%${q}%,email.ilike.%${q}%`);
    }
    qb = qb.order('display_name').limit(50);
    queryRes = await qb;
  } else {
    let qb = sb.from('organization_directory')
      .select('id, name, org_type, phone, email, city, state, is_customer_only')
      .is('deleted_at', null);
    if (!showCustomers) qb = qb.eq('is_customer_only', false);
    if (q.length >= 2) {
      qb = qb.or(`name.ilike.%${q}%,email.ilike.%${q}%,city.ilike.%${q}%`);
    }
    qb = qb.order('name').limit(50);
    queryRes = await qb;
  }
  const { data, error } = queryRes;
  if (error) { console.error(error); $('#dirList').innerHTML = `<div style="padding:20px;color:var(--red);">Error: ${esc(error.message)}</div>`; return; }
  renderDirList(data || []);
}

function renderDirList(items) {
  const list = $('#dirList');
  if (!items.length) {
    list.innerHTML = `<div style="padding:30px;text-align:center;color:var(--muted);font-size:13px;">No matches. Try a different search.</div>`;
    return;
  }
  if (state.dirTab === 'people') {
    list.innerHTML = items.map(c => `
      <div class="dir-item" data-pick="contact" data-id="${esc(c.id)}">
        <div class="dir-item-name">${esc(c.display_name)}</div>
        <div class="dir-item-meta">
          ${c.role ? `<span class="dir-item-role-pill">${esc(ROLE_LABELS[c.role] || c.role)}</span>` : ''}
          ${esc([c.job_title, c.organization_name].filter(Boolean).join(' · ') || '—')}
          ${c.email ? `<br>${esc(c.email)}` : ''}
          ${c.mobile_phone ? ` · ${esc(c.mobile_phone)}` : ''}
        </div>
      </div>
    `).join('');
  } else {
    list.innerHTML = items.map(o => `
      <div class="dir-item" data-pick="org" data-id="${esc(o.id)}">
        <div class="dir-item-name">${esc(o.name)}</div>
        <div class="dir-item-meta">
          ${o.org_type ? `<span class="dir-item-role-pill">${esc(o.org_type)}</span>` : ''}
          ${esc([o.city, o.state].filter(Boolean).join(', ') || '—')}
          ${o.email ? `<br>${esc(o.email)}` : ''}
          ${o.phone ? ` · ${esc(o.phone)}` : ''}
        </div>
      </div>
    `).join('');
  }
  list.querySelectorAll('[data-pick]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      if (el.dataset.pick === 'contact') {
        const c = items.find(x => x.id === id);
        if (c) {
          // Make sure sheet is open
          if (!$('#sheetBack').classList.contains('on')) openAddSheet();
          pickDirectoryContact(c);
        }
      } else {
        const o = items.find(x => x.id === id);
        if (o) {
          if (!$('#sheetBack').classList.contains('on')) openAddSheet();
          pickDirectoryOrg(o);
        }
      }
      closeDirectory();
    });
  });
}

async function deleteRelationship() {
  if (!state.editingId) return;
  const r = state.relationships.find(x => x.id === state.editingId);
  if (!r) return;
  if (!confirm(`Delete relationship "${r.display_name}"?`)) return;

  // Soft-delete
  const { error } = await sb.from('rebuild_project_relationships')
    .update({ deleted_at: new Date().toISOString() })
    .eq('id', state.editingId);
  if (error) { toast('Delete failed: ' + error.message); return; }

  try {
    await sb.from('rebuild_project_relationship_history').insert({
      relationship_id: state.editingId,
      project_id: projectId,
      action: 'deleted',
      actor: state.userEmail || 'unknown',
      actor_name: state.userName,
    });
  } catch (e) { console.warn(e); }

  toast('Relationship deleted');
  closeSheet();
  await loadRelationships();
  render();
}

function showError(msg) {
  $('#main').innerHTML = `<div class="empty-block"><div class="ico">⚠</div><h3>${esc(msg)}</h3></div>`;
}

function wire() {
  $('#backBtn').addEventListener('click', () => {
    if (document.referrer && document.referrer.includes(location.origin)) history.back();
    else location.href = `project_detail.html?p=${projectId}`;
  });
  $('#addBtn').addEventListener('click', openAddSheet);
  $('#closeSheet').addEventListener('click', closeSheet);
  $('#cancelBtn').addEventListener('click', closeSheet);
  $('#sheetBack').addEventListener('click', (e) => { if (e.target.id === 'sheetBack') closeSheet(); });
  $('#saveBtn').addEventListener('click', saveRelationship);
  $('#deleteBtn').addEventListener('click', deleteRelationship);

  // Directory entry
  $('#dirBtn').addEventListener('click', openDirectory);
  $('#dirClose').addEventListener('click', closeDirectory);
  $('#dirBack').addEventListener('click', closeDirectory);
  $('#dirSearch').addEventListener('input', (e) => {
    clearTimeout(dirSearchTimer);
    dirSearchTimer = setTimeout(() => runDirectorySearch(e.target.value), 200);
  });
  $$('.dir-tab').forEach(t => {
    t.addEventListener('click', () => {
      state.dirTab = t.dataset.tab;
      renderDirTabs();
      runDirectorySearch($('#dirSearch').value);
    });
  });
  $('#dirShowCustomers').addEventListener('change', (e) => {
    state.dirShowCustomers = e.target.checked;
    runDirectorySearch($('#dirSearch').value);
  });

  // Autocomplete on Name input
  $('#f_name').addEventListener('input', onNameInput);
  $('#f_name').addEventListener('blur', () => setTimeout(hideAutocomplete, 200));
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js', { scope: '/jg-dispatch/' }).catch(() => {});
}

init();
</script>
