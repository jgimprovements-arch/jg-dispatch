<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d2d5e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Project · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623; --green: #2d9c5f; --red: #d64545;
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --muted: #7884a0; --line: #e3e7f0;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    overscroll-behavior-y: contain;
  }

  /* Topbar with back nav */
  .topbar {
    background: linear-gradient(135deg, #0d2d5e 0%, #1a4080 100%);
    color: #fff;
    padding: calc(var(--safe-top) + 14px) 16px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 12px rgba(13,45,94,.25);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar .back-btn {
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
    border-radius: 999px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    text-decoration: none;
    flex-shrink: 0;
  }
  .topbar .back-btn:active { background: rgba(255,255,255,.22); }
  .topbar .title {
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }
  .topbar h1 {
    margin: 0;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: .2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .topbar .sub {
    font-size: 10px;
    opacity: .8;
    letter-spacing: .8px;
    text-transform: uppercase;
  }
  .topbar .full-app-btn {
    background: var(--orange);
    color: #fff;
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 700;
    text-decoration: none;
    border: 0;
    flex-shrink: 0;
  }

  main { padding: 14px 14px calc(var(--safe-bottom) + 28px); max-width: 720px; margin: 0 auto; }

  /* Hero card with project basics */
  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, #1a4080 100%);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 14px;
    color: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(13,45,94,.18);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50px; right: -50px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(232,93,4,.22) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--orange);
    background: rgba(232,93,4,.18);
    border: 1px solid rgba(232,93,4,.4);
    padding: 2px 10px;
    border-radius: 999px;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  .hero h2 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -.2px;
    position: relative;
    z-index: 1;
  }
  .hero .customer { font-size: 14px; font-weight: 700; position: relative; z-index: 1; }
  .hero .status-chip {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.2);
    padding: 3px 10px;
    border-radius: 999px;
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }

  /* Contact action grid */
  .contact-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .contact-btn {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 8px 12px;
    text-align: center;
    text-decoration: none;
    color: var(--navy);
    transition: border-color .15s, background .15s, transform .15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .contact-btn:active {
    background: var(--bg);
    border-color: var(--orange);
    transform: scale(.97);
  }
  .contact-btn.disabled {
    opacity: .35;
    pointer-events: none;
  }
  .contact-btn .ico {
    font-size: 24px;
    line-height: 1;
  }
  .contact-btn .lbl {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .4px;
    color: var(--muted);
  }
  .contact-btn .val {
    font-size: 11px;
    color: var(--navy);
    font-weight: 600;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }
  .contact-btn.call .ico { color: var(--green); }
  .contact-btn.email .ico { color: var(--orange); }
  .contact-btn.map .ico { color: #4a90e2; }

  /* PM info card */
  .pm-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .pm-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--orange);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 15px;
    flex-shrink: 0;
  }
  .pm-info { flex: 1; min-width: 0; }
  .pm-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .pm-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
  }
  .pm-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .pm-action {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--navy);
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 700;
    text-decoration: none;
  }
  .pm-action:active { background: var(--orange); color: #fff; border-color: var(--orange); }

  /* Section navigation grid */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin: 18px 0 8px;
    padding-left: 4px;
  }
  .section-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .section-btn {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 16px;
    text-decoration: none;
    color: var(--text);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    overflow: hidden;
  }
  .section-btn:active {
    transform: scale(.97);
    border-color: var(--orange);
    box-shadow: 0 4px 14px rgba(232,93,4,.1);
  }
  .section-btn .ico-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .section-btn .ico {
    font-size: 28px;
    line-height: 1;
  }
  .section-btn .badge {
    background: var(--orange);
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    padding: 3px 9px;
    border-radius: 999px;
    line-height: 1;
  }
  .section-btn .badge.alert { background: var(--red); }
  .section-btn .name {
    font-size: 15px;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: -.1px;
  }
  .section-btn .desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.3;
  }

  /* Loading / errors */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
  }
  .error-state {
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: 14px;
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    margin-top: 20px;
  }
  .error-state h3 { color: var(--navy); margin: 0 0 6px; }
  .error-state p { margin: 0 0 12px; font-size: 13px; }
  .error-state a {
    display: inline-block;
    margin-top: 10px;
    background: var(--orange);
    color: #fff;
    padding: 10px 20px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="project.html" class="back-btn" title="Back">←</a>
  <div class="title">
    <h1 id="topJob">Loading…</h1>
    <div class="sub" id="topMarket"></div>
  </div>
  <a href="#" class="full-app-btn" id="fullAppBtn">Full App ↗</a>
</div>

<main id="main">
  <div class="loading">Loading project…</div>
</main>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const sb = createClient(SB_URL, SB_ANON);

const params = new URLSearchParams(window.location.search);
const projectId = params.get('p');

const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtPhone = p => {
  if (!p) return '';
  const d = p.replace(/\D/g, '');
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  if (d.length === 11 && d[0] === '1') return `(${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
  return p;
};

async function init() {
  if (!projectId) {
    showError('No project specified', 'Open this page from the project list.');
    return;
  }

  const { data: project, error } = await sb.from('rebuild_projects')
    .select('*')
    .eq('id', projectId)
    .maybeSingle();

  if (error || !project) {
    showError('Project not found', 'It may have been deleted or you may not have access.');
    return;
  }

  // Pull counts in parallel for badges
  const [phases, wos, sels, docs, msgs] = await Promise.all([
    sb.from('rebuild_phases').select('id, status', { count: 'exact', head: false }).eq('project_id', projectId),
    sb.from('rebuild_work_orders').select('id, status').eq('project_id', projectId),
    sb.from('rebuild_selections').select('id, status').eq('project_id', projectId),
    sb.from('rebuild_documents').select('id', { count: 'exact', head: true }).eq('project_id', projectId),
    sb.from('rebuild_messages').select('id', { count: 'exact', head: true }).eq('project_id', projectId),
  ]);

  // Compute badge values
  const phasesInProgress = (phases.data || []).filter(p => p.status === 'in_progress').length;
  const wosAwaitingSig = (wos.data || []).filter(w => w.status === 'sent').length;
  const wosTotal = (wos.data || []).filter(w => !['superseded','cancelled'].includes(w.status)).length;
  const selsAwaiting = (sels.data || []).filter(s => s.status === 'awaiting_customer' || s.status === 'awaiting_customer_install').length;
  const docsTotal = docs.count || 0;
  const msgsTotal = msgs.count || 0;

  render(project, {
    phaseInProgress: phasesInProgress,
    phaseTotal: (phases.data || []).length,
    wosAwaitingSig,
    wosTotal,
    selsAwaiting,
    docsTotal,
    msgsTotal,
  });
}

function render(p, counts) {
  // Topbar
  document.getElementById('topJob').textContent = p.albi_job_number || ('Albi #' + p.albi_project_id);
  document.getElementById('topMarket').textContent = `${p.market === 'stevens_point' ? 'Stevens Point' : 'Appleton'}${p.albi_status ? ' · ' + p.albi_status : ''}`;
  document.getElementById('fullAppBtn').href = `rebuild.html#p=${p.id}`;

  const pmName = p.albi_pm_name || '';
  const pmInitials = pmName.split(' ').map(s => s[0]).filter(Boolean).slice(0,2).join('').toUpperCase() || 'JG';

  // Build contact buttons
  const phoneBtn = p.customer_phone
    ? `<a href="tel:${p.customer_phone}" class="contact-btn call">
        <div class="ico">📞</div>
        <div class="lbl">Call</div>
        <div class="val">${fmtPhone(p.customer_phone)}</div>
      </a>`
    : `<div class="contact-btn disabled">
        <div class="ico">📞</div>
        <div class="lbl">Call</div>
        <div class="val">—</div>
      </div>`;

  const emailBtn = p.customer_email
    ? `<a href="mailto:${p.customer_email}" class="contact-btn email">
        <div class="ico">✉</div>
        <div class="lbl">Email</div>
        <div class="val">${esc(p.customer_email)}</div>
      </a>`
    : `<div class="contact-btn disabled">
        <div class="ico">✉</div>
        <div class="lbl">Email</div>
        <div class="val">—</div>
      </div>`;

  const mapBtn = p.property_address
    ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.property_address)}" target="_blank" class="contact-btn map">
        <div class="ico">📍</div>
        <div class="lbl">Map</div>
        <div class="val">Open</div>
      </a>`
    : `<div class="contact-btn disabled">
        <div class="ico">📍</div>
        <div class="lbl">Map</div>
        <div class="val">—</div>
      </div>`;

  document.getElementById('main').innerHTML = `
    <div class="hero">
      <div class="hero-tag">Project</div>
      <h2>${esc(p.customer_name || 'Project')}</h2>
      <div class="customer">${esc(p.albi_job_number || '')}</div>
      ${p.property_address ? `<div style="font-size:12px;opacity:.8;margin-top:4px;position:relative;z-index:1;">${esc(p.property_address)}</div>` : ''}
      ${p.albi_status ? `<div class="status-chip">${esc(p.albi_status)}</div>` : ''}
    </div>

    <div class="section-label">Customer</div>
    <div class="contact-grid">
      ${phoneBtn}
      ${emailBtn}
      ${mapBtn}
    </div>

    ${pmName ? `
      <div class="pm-card">
        <div class="pm-avatar">${esc(pmInitials)}</div>
        <div class="pm-info">
          <div class="pm-label">Project Manager</div>
          <div class="pm-name">${esc(pmName)}</div>
        </div>
        <div class="pm-actions">
          ${p.albi_pm_phone ? `<a href="tel:${p.albi_pm_phone}" class="pm-action">📞</a>` : ''}
          ${p.albi_pm_email ? `<a href="mailto:${p.albi_pm_email}" class="pm-action">✉</a>` : ''}
        </div>
      </div>
    ` : ''}

    <div class="section-label">Project Sections</div>
    <div class="section-grid">
      <a href="project_schedule.html?p=${p.id}" class="section-btn">
        <div class="ico-row">
          <span class="ico">📅</span>
          ${counts.phaseInProgress ? `<span class="badge">${counts.phaseInProgress}</span>` : ''}
        </div>
        <div class="name">Schedule</div>
        <div class="desc">${counts.phaseTotal} phases${counts.phaseInProgress ? ` · ${counts.phaseInProgress} in progress` : ''}</div>
      </a>

      <a href="project_messages.html?p=${p.id}" class="section-btn">
        <div class="ico-row">
          <span class="ico">💬</span>
          ${counts.msgsTotal ? `<span class="badge">${counts.msgsTotal}</span>` : ''}
        </div>
        <div class="name">Messages</div>
        <div class="desc">${counts.msgsTotal ? counts.msgsTotal + ' on file' : 'No messages yet'}</div>
      </a>

      <a href="project_workorders.html?p=${p.id}" class="section-btn">
        <div class="ico-row">
          <span class="ico">📋</span>
          ${counts.wosAwaitingSig ? `<span class="badge alert">${counts.wosAwaitingSig}</span>` : ''}
        </div>
        <div class="name">Work Orders</div>
        <div class="desc">${counts.wosTotal} active${counts.wosAwaitingSig ? ` · ${counts.wosAwaitingSig} unsigned` : ''}</div>
      </a>

      <a href="project_documents.html?p=${p.id}" class="section-btn">
        <div class="ico-row">
          <span class="ico">📂</span>
        </div>
        <div class="name">Documents</div>
        <div class="desc">${counts.docsTotal} files</div>
      </a>
    </div>
  `;
}

function showError(title, msg) {
  document.getElementById('main').innerHTML = `
    <div class="error-state">
      <h3>${esc(title)}</h3>
      <p>${esc(msg)}</p>
      <a href="project.html">← Back to projects</a>
    </div>
  `;
}

init();
</script>
</body>
</html>
