<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script src="jg-version-check.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d2d5e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Project · JG Restoration · v2</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623; --green: #2d9c5f; --red: #d64545;
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --muted: #7884a0; --line: #e3e7f0;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    overscroll-behavior-y: contain;
  }

  /* Topbar with back nav */
  .topbar {
    background: linear-gradient(135deg, #0d2d5e 0%, #1a4080 100%);
    color: #fff;
    padding: calc(var(--safe-top) + 14px) 16px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 12px rgba(13,45,94,.25);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar .back-btn {
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
    border-radius: 999px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    text-decoration: none;
    flex-shrink: 0;
  }
  .topbar .back-btn:active { background: rgba(255,255,255,.22); }
  .topbar .title {
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }
  .topbar h1 {
    margin: 0;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: .2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .topbar .sub {
    font-size: 10px;
    opacity: .8;
    letter-spacing: .8px;
    text-transform: uppercase;
  }
  .topbar .full-app-btn {
    background: var(--orange);
    color: #fff;
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 700;
    text-decoration: none;
    border: 0;
    flex-shrink: 0;
  }

  main { padding: 14px 14px calc(var(--safe-bottom) + 28px); max-width: 720px; margin: 0 auto; }

  /* Hero card with project basics */
  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, #1a4080 100%);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 14px;
    color: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(13,45,94,.18);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50px; right: -50px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(232,93,4,.22) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--orange);
    background: rgba(232,93,4,.18);
    border: 1px solid rgba(232,93,4,.4);
    padding: 2px 10px;
    border-radius: 999px;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  .hero h2 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -.2px;
    position: relative;
    z-index: 1;
  }
  .hero .customer { font-size: 14px; font-weight: 700; position: relative; z-index: 1; }
  .hero .status-chip {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.2);
    padding: 3px 10px;
    border-radius: 999px;
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }
  .hero .margin-chip {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    padding: 4px 11px;
    border-radius: 999px;
    margin-top: 8px;
    margin-left: 6px;
    position: relative;
    z-index: 1;
    border: 1px solid rgba(255,255,255,.25);
  }
  .hero .margin-chip.margin-green { background: rgba(45,156,95,.85); color: #fff; }
  .hero .margin-chip.margin-yellow { background: rgba(245,166,35,.85); color: #fff; }
  .hero .margin-chip.margin-red { background: rgba(214,69,69,.85); color: #fff; }

  /* Contact action grid */
  .contact-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .contact-btn {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 8px 12px;
    text-align: center;
    text-decoration: none;
    color: var(--navy);
    transition: border-color .15s, background .15s, transform .15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .contact-btn:active {
    background: var(--bg);
    border-color: var(--orange);
    transform: scale(.97);
  }
  .contact-btn.disabled {
    opacity: .35;
    pointer-events: none;
  }
  .contact-btn .ico {
    font-size: 24px;
    line-height: 1;
  }
  .contact-btn .lbl {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .4px;
    color: var(--muted);
  }
  .contact-btn .val {
    font-size: 11px;
    color: var(--navy);
    font-weight: 600;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }
  .contact-btn.call .ico { color: var(--green); }
  .contact-btn.email .ico { color: var(--orange); }
  .contact-btn.map .ico { color: #4a90e2; }

  /* PM info card */
  .pm-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .pm-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--orange);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 15px;
    flex-shrink: 0;
  }
  .pm-info { flex: 1; min-width: 0; }
  .pm-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .pm-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
  }
  .pm-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .pm-action {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--navy);
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 700;
    text-decoration: none;
  }
  .pm-action:active { background: var(--orange); color: #fff; border-color: var(--orange); }

  /* Section navigation grid */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin: 18px 0 8px;
    padding-left: 4px;
  }
  .section-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-right: 4px;
  }
  .edit-pill {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--navy);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    text-transform: none;
    letter-spacing: 0;
    transition: background .15s, border-color .15s, color .15s;
  }
  .edit-pill:active {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
  }
  .section-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* Primary Capture Photo button */
  .capture-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: linear-gradient(135deg, var(--orange) 0%, #f5a623 100%);
    color: #fff;
    border-radius: 14px;
    padding: 16px 18px;
    text-decoration: none;
    margin-bottom: 4px;
    box-shadow: 0 6px 18px rgba(232,93,4,.25);
    transition: transform .15s, box-shadow .15s;
  }
  .capture-btn:active {
    transform: scale(.98);
    box-shadow: 0 3px 10px rgba(232,93,4,.25);
  }
  .capture-ico {
    width: 38px;
    height: 38px;
    flex-shrink: 0;
  }
  .capture-text { flex: 1; min-width: 0; }
  .capture-title { font-size: 16px; font-weight: 800; letter-spacing: -.1px; line-height: 1.1; }
  .capture-sub { font-size: 12px; opacity: .9; margin-top: 2px; }
  .capture-arrow { width: 18px; height: 18px; opacity: .7; flex-shrink: 0; }

  /* Add Note button (similar layout to capture-btn, navy theme) */
  .note-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    background: var(--navy);
    color: #fff;
    border: 0;
    border-radius: 14px;
    padding: 14px 18px;
    text-decoration: none;
    margin-top: 8px;
    box-shadow: 0 6px 18px rgba(13,45,94,.18);
    transition: transform .15s, box-shadow .15s;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
  }
  .note-btn:active {
    transform: scale(.98);
    box-shadow: 0 3px 10px rgba(13,45,94,.18);
  }

  /* Note bottom sheet */
  .sheet-back { position: fixed; inset: 0; background: rgba(13,45,94,.5); z-index: 100; display: none; align-items: flex-end; }
  .sheet-back.on { display: flex; }
  .note-sheet {
    background: var(--card);
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    border-radius: 18px 18px 0 0;
    padding: 18px 16px calc(var(--safe-bottom) + 18px);
    box-shadow: 0 -8px 32px rgba(13,45,94,.3);
    max-height: 92vh;
    overflow-y: auto;
    animation: sheetUp .25s ease-out;
  }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .note-sheet h3 { margin: 0 0 14px; color: var(--navy); font-size: 17px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
  .note-sheet .close-x { background: var(--bg); border: 0; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; color: var(--muted); }
  .note-sheet textarea {
    width: 100%;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 9px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    min-height: 140px;
    resize: vertical;
    line-height: 1.4;
  }
  .note-sheet textarea:focus { outline: none; border-color: var(--orange); }
  .note-sheet .opts {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    font-size: 13px;
    color: var(--text);
  }
  .note-sheet .opts label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .note-sheet .opts input { accent-color: var(--orange); width: 18px; height: 18px; }
  .note-sheet .actions { display: flex; gap: 8px; margin-top: 14px; }
  .sheet-btn {
    flex: 1;
    padding: 12px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid transparent;
    font-family: inherit;
  }
  .sheet-btn.primary { background: var(--orange); color: #fff; border-color: var(--orange); }
  .sheet-btn.primary:disabled { opacity: .5; }
  .sheet-btn.ghost { background: var(--bg); color: var(--navy); border-color: var(--line); }

  /* Contact edit sheet (different ID from note sheet, same patterns) */
  .contact-sheet {
    background: var(--card);
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    border-radius: 18px 18px 0 0;
    padding: 18px 16px calc(var(--safe-bottom) + 18px);
    box-shadow: 0 -8px 32px rgba(13,45,94,.3);
    max-height: 92vh;
    overflow-y: auto;
    animation: sheetUp .25s ease-out;
  }
  .contact-sheet h3 {
    margin: 0 0 4px;
    color: var(--navy);
    font-size: 17px;
    font-weight: 800;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .contact-subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .contact-sheet .close-x {
    background: var(--bg);
    border: 0;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    font-size: 18px;
    cursor: pointer;
    color: var(--muted);
    font-family: inherit;
  }
  .contact-sheet label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .4px;
    margin: 10px 0 4px;
  }
  .contact-sheet input {
    width: 100%;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 9px;
    padding: 11px 13px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
  }
  .contact-sheet input:focus { outline: none; border-color: var(--orange); }
  .sheet-section-label {
    font-size: 11px;
    font-weight: 800;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin: 16px 0 4px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--line);
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .sheet-actions { display: flex; gap: 8px; margin-top: 18px; }

  /* Toast */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 16px rgba(13,45,94,.3); z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.on { opacity: 1; }
  .section-btn {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 16px;
    text-decoration: none;
    color: var(--text);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    overflow: hidden;
  }
  .section-btn:active {
    transform: scale(.97);
    border-color: var(--orange);
    box-shadow: 0 4px 14px rgba(232,93,4,.1);
  }
  .section-btn .ico-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .section-btn .ico {
    font-size: 28px;
    line-height: 1;
  }
  .section-btn .badge {
    background: var(--orange);
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    padding: 3px 9px;
    border-radius: 999px;
    line-height: 1;
  }
  .section-btn .badge.alert { background: var(--red); }
  .section-btn .name {
    font-size: 15px;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: -.1px;
  }
  .section-btn .desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.3;
  }

  /* Loading / errors */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
  }
  .error-state {
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: 14px;
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    margin-top: 20px;
  }
  .error-state h3 { color: var(--navy); margin: 0 0 6px; }
  .error-state p { margin: 0 0 12px; font-size: 13px; }
  .error-state a {
    display: inline-block;
    margin-top: 10px;
    background: var(--orange);
    color: #fff;
    padding: 10px 20px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="project.html" class="back-btn" id="backBtn" title="Back">←</a>
  <div class="title">
    <h1 id="topJob">Loading…</h1>
    <div class="sub" id="topMarket"></div>
  </div>
</div>

<main id="main">
  <div class="loading">Loading project…</div>
</main>

<div class="toast" id="toast"></div>

<!-- Add Note bottom sheet -->
<div class="sheet-back" id="noteSheetBack">
  <div class="note-sheet">
    <h3>Add Note <button class="close-x" id="closeNoteSheet">×</button></h3>
    <textarea id="noteSheetText" placeholder="What's happening on this job? Material status, customer conversation, blocker, observation…"></textarea>
    <div class="opts">
      <label><input type="checkbox" id="notePushAlbi" checked> Push to Albi</label>
      <label><input type="checkbox" id="noteCustomerVisible"> Customer-visible</label>
    </div>
    <div class="actions">
      <button class="sheet-btn ghost" id="cancelNoteSheet">Cancel</button>
      <button class="sheet-btn primary" id="noteSheetSave" disabled>Post Note</button>
    </div>
  </div>
</div>

<!-- Edit Contact bottom sheet -->
<div class="sheet-back" id="contactSheetBack">
  <div class="contact-sheet">
    <h3>Edit Contact Info <button class="close-x" id="closeContactSheet">×</button></h3>
    <div id="contactSheetSubtitle" class="contact-subtitle"></div>

    <div class="sheet-section-label">Customer</div>
    <label>Name</label>
    <input type="text" id="cs_customer_name" autocomplete="off">
    <div class="row2">
      <div>
        <label>Phone</label>
        <input type="tel" id="cs_customer_phone" autocomplete="off">
      </div>
      <div>
        <label>Email</label>
        <input type="email" id="cs_customer_email" autocomplete="off">
      </div>
    </div>
    <label>Secondary Email</label>
    <input type="email" id="cs_customer_email_secondary" autocomplete="off" placeholder="Spouse, partner, etc.">

    <div class="sheet-section-label">Property</div>
    <label>Property Address</label>
    <input type="text" id="cs_property_address" autocomplete="off">

    <div class="sheet-section-label">Insurance</div>
    <div class="row2">
      <div>
        <label>Carrier</label>
        <input type="text" id="cs_insurance_carrier" autocomplete="off" placeholder="e.g. State Farm">
      </div>
      <div>
        <label>Claim #</label>
        <input type="text" id="cs_insurance_claim_number" autocomplete="off">
      </div>
    </div>
    <label>Policy #</label>
    <input type="text" id="cs_insurance_policy_number" autocomplete="off">
    <div class="sheet-section-label" style="opacity:.7;">Adjuster</div>
    <label>Name</label>
    <input type="text" id="cs_insurance_adjuster_name" autocomplete="off">
    <div class="row2">
      <div>
        <label>Phone</label>
        <input type="tel" id="cs_insurance_adjuster_phone" autocomplete="off">
      </div>
      <div>
        <label>Email</label>
        <input type="email" id="cs_insurance_adjuster_email" autocomplete="off">
      </div>
    </div>

    <div class="sheet-actions">
      <button class="sheet-btn ghost" id="cancelContactSheet">Cancel</button>
      <button class="sheet-btn primary" id="saveContactSheet">Save Changes</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const sb = createClient(SB_URL, SB_ANON);

// Module-scoped state for cross-function access
const state = { project: null };

const params = new URLSearchParams(window.location.search);
const projectId = params.get('p');

const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function usdCompact(n) {
  const v = Number(n) || 0;
  const abs = Math.abs(v);
  if (abs >= 1000) return (v < 0 ? '-' : '') + '$' + (Math.round(abs/100)/10).toFixed(1) + 'k';
  return (v < 0 ? '-' : '') + '$' + Math.round(abs);
}
const fmtPhone = p => {
  if (!p) return '';
  const d = p.replace(/\D/g, '');
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  if (d.length === 11 && d[0] === '1') return `(${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
  return p;
};

async function init() {
  if (!projectId) {
    showError('No project specified', 'Open this page from the project list.');
    return;
  }

  const { data: project, error } = await sb.from('rebuild_projects')
    .select('*')
    .eq('id', projectId)
    .maybeSingle();

  if (error || !project) {
    showError('Project not found', 'It may have been deleted or you may not have access.');
    return;
  }
  state.project = project;

  // Pull counts in parallel for badges
  const [phases, wos, sels, docs, msgs, rels, budget] = await Promise.all([
    sb.from('rebuild_phases').select('id, status', { count: 'exact', head: false }).eq('project_id', projectId),
    sb.from('rebuild_work_orders').select('id, status').eq('project_id', projectId),
    sb.from('rebuild_selections').select('id, status').eq('project_id', projectId),
    sb.from('rebuild_documents').select('id', { count: 'exact', head: true }).eq('project_id', projectId),
    sb.from('rebuild_messages').select('id', { count: 'exact', head: true }).eq('project_id', projectId),
    sb.from('rebuild_project_relationships').select('id', { count: 'exact', head: true }).eq('project_id', projectId).is('deleted_at', null),
    sb.from('wo_budget_summaries').select('rcv, total_cost, gross_profit, margin_pct, margin_health').eq('project_id', projectId).maybeSingle(),
  ]);

  // Compute badge values
  const phasesInProgress = (phases.data || []).filter(p => p.status === 'in_progress').length;
  const wosAwaitingSig = (wos.data || []).filter(w => w.status === 'sent').length;
  const wosTotal = (wos.data || []).filter(w => !['superseded','cancelled'].includes(w.status)).length;
  const selsAwaiting = (sels.data || []).filter(s => s.status === 'awaiting_customer' || s.status === 'awaiting_customer_install').length;
  const docsTotal = docs.count || 0;
  const msgsTotal = msgs.count || 0;
  const relTotal = rels.count || 0;

  render(project, {
    phaseInProgress: phasesInProgress,
    phaseTotal: (phases.data || []).length,
    wosAwaitingSig,
    wosTotal,
    selsAwaiting,
    docsTotal,
    msgsTotal,
    relTotal,
    budget: budget?.data || null,
  });
}

function showError(title, msg) {
  document.getElementById('main').innerHTML = `
    <div class="error-state">
      <h3>${esc(title)}</h3>
      <p>${esc(msg)}</p>
      <a href="project.html">← Back to projects</a>
    </div>

}

// Smart back: use browser history if available, else fall back to project list
document.getElementById('backBtn').addEventListener('click', (e) => {
  e.preventDefault();
  if (window.history.length > 1 && document.referrer && new URL(document.referrer).origin === location.origin) {
    history.back();
  } else {
    location.href = 'project.html';
  }
});

// ════════════════ ADD NOTE ════════════════
const ALBI_NOTE_HOOK = 'https://hooks.zapier.com/hooks/catch/12653197/uvugxag/';

function toast(msg) {
  const t = document.getElementById('toast');
  if (!t) { console.log(msg); return; }
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2200);
}

function openNoteSheet() {
  document.getElementById('noteSheetBack').classList.add('on');
  const ta = document.getElementById('noteSheetText');
  ta.value = '';
  document.getElementById('noteCustomerVisible').checked = false;
  document.getElementById('notePushAlbi').checked = true;
  document.getElementById('noteSheetSave').disabled = true;
  setTimeout(() => ta.focus(), 100);
}
function closeNoteSheet() {
  document.getElementById('noteSheetBack').classList.remove('on');
}

async function saveNote() {
  const body = document.getElementById('noteSheetText').value.trim();
  if (!body) return;
  const customerVisible = document.getElementById('noteCustomerVisible').checked;
  const pushAlbi = document.getElementById('notePushAlbi').checked;
  const p = state.project;
  if (!p) return;

  const saveBtn = document.getElementById('noteSheetSave');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Posting…';

  let user = null;
  try { user = JSON.parse(localStorage.getItem('jg_platform_user') || 'null'); } catch {}
  const email = (user?.email || 'mobile-pwa@jg-restoration.com').toLowerCase();
  const name = user?.name || email.split('@')[0];

  // Insert journal entry
  const { error } = await sb.from('rebuild_journal_entries').insert({
    project_id: p.id,
    body,
    author_email: email,
    author_name: name,
    author_role: 'field',
    customer_visible: customerVisible,
  });
  if (error) {
    console.error(error);
    toast('Post failed: ' + error.message);
    saveBtn.disabled = false;
    saveBtn.textContent = 'Post Note';
    return;
  }

  // Push to Albi if requested
  if (pushAlbi && p.albi_project_id) {
    try {
      await fetch(ALBI_NOTE_HOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          project_id: p.id,
          albi_project_id: p.albi_project_id,
          albi_job_number: p.albi_job_number,
          note_text: body,
          author_name: name,
          author_email: email,
          source: 'mobile-pwa',
        }),
        mode: 'no-cors',
      });
    } catch (e) {
      console.warn('Albi note push failed:', e);
    }
  }

  toast('Note posted');
  saveBtn.textContent = 'Post Note';
  closeNoteSheet();
}

// Wire after DOMContentLoaded (note: addNoteBtn is rendered async, use delegation)
document.addEventListener('click', (e) => {
  if (e.target.closest('#addNoteBtn')) openNoteSheet();
});
// Note sheet itself IS in the static HTML, so these direct wires are safe
const closeBtn = document.getElementById('closeNoteSheet');
const cancelBtn = document.getElementById('cancelNoteSheet');
const sheetBack = document.getElementById('noteSheetBack');
const noteText = document.getElementById('noteSheetText');
const saveBtnEl = document.getElementById('noteSheetSave');
if (closeBtn) closeBtn.addEventListener('click', closeNoteSheet);
if (cancelBtn) cancelBtn.addEventListener('click', closeNoteSheet);
if (sheetBack) sheetBack.addEventListener('click', (e) => { if (e.target.id === 'noteSheetBack') closeNoteSheet(); });
if (noteText) noteText.addEventListener('input', (e) => {
  if (saveBtnEl) saveBtnEl.disabled = !e.target.value.trim();
});
if (saveBtnEl) saveBtnEl.addEventListener('click', saveNote);

// Auto-open if deep-linked
const autoAction = new URLSearchParams(location.search).get('action');
if (autoAction === 'note') {
  // Need to wait for init() to set state.project
  const waitForProject = setInterval(() => {
    if (state && state.project) {
      clearInterval(waitForProject);
      setTimeout(() => openNoteSheet(), 100);
    }
  }, 150);
}

// ═══════════════ CONTACT EDIT SHEET ═══════════════
const contactFields = [
  ['customer_name','cs_customer_name'],
  ['customer_phone','cs_customer_phone'],
  ['customer_email','cs_customer_email'],
  ['customer_email_secondary','cs_customer_email_secondary'],
  ['property_address','cs_property_address'],
  ['insurance_carrier','cs_insurance_carrier'],
  ['insurance_claim_number','cs_insurance_claim_number'],
  ['insurance_policy_number','cs_insurance_policy_number'],
  ['insurance_adjuster_name','cs_insurance_adjuster_name'],
  ['insurance_adjuster_phone','cs_insurance_adjuster_phone'],
  ['insurance_adjuster_email','cs_insurance_adjuster_email'],
];

function openContactSheet() {
  const p = state.project;
  if (!p) return;
  document.getElementById('contactSheetSubtitle').textContent =
    `${p.albi_job_number || ''}${p.property_address ? ' · ' + p.property_address : ''}`;
  contactFields.forEach(([col, id]) => {
    const el = document.getElementById(id);
    if (el) el.value = p[col] || '';
  });
  document.getElementById('contactSheetBack').classList.add('on');
  setTimeout(() => document.getElementById('cs_customer_name').focus(), 100);
}

function closeContactSheet() {
  document.getElementById('contactSheetBack').classList.remove('on');
}

async function saveContactSheet() {
  if (!state.project) return;
  const saveBtn = document.getElementById('saveContactSheet');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';

  const updates = {};
  const changes = {};
  contactFields.forEach(([col, id]) => {
    const val = document.getElementById(id).value.trim() || null;
    const oldVal = state.project[col] || null;
    updates[col] = val;
    if (val !== oldVal) changes[col] = { from: oldVal, to: val };
  });

  if (Object.keys(changes).length === 0) {
    toast('No changes');
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save Changes';
    closeContactSheet();
    return;
  }

  const { error } = await sb.from('rebuild_projects').update(updates).eq('id', state.project.id);
  if (error) {
    console.error(error);
    toast('Save failed: ' + error.message);
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save Changes';
    return;
  }
  Object.assign(state.project, updates);

  // Audit log (best-effort)
  let user = null;
  try { user = JSON.parse(localStorage.getItem('jg_platform_user') || 'null'); } catch {}
  const email = (user?.email || 'mobile-pwa@jg-restoration.com').toLowerCase();
  const name = user?.name || email.split('@')[0];
  try {
    await sb.from('rebuild_project_contact_history').insert({
      project_id: state.project.id,
      edited_by_email: email,
      edited_by_name: name,
      changes,
    });
  } catch (e) { console.warn('Audit log failed:', e); }

  toast('Contact info saved');
  saveBtn.disabled = false;
  saveBtn.textContent = 'Save Changes';
  closeContactSheet();

  // Re-render the page so updated values appear
  if (typeof init === 'function') init();
}

// Delegated click for the Edit button (rendered async by init's render)
document.addEventListener('click', (e) => {
  if (e.target.closest('#editContactBtn')) openContactSheet();
});
document.getElementById('closeContactSheet').addEventListener('click', closeContactSheet);
document.getElementById('cancelContactSheet').addEventListener('click', closeContactSheet);
document.getElementById('contactSheetBack').addEventListener('click', (e) => {
  if (e.target.id === 'contactSheetBack') closeContactSheet();
});
document.getElementById('saveContactSheet').addEventListener('click', saveContactSheet);

init();

// One-time cache buster: force the service worker to refresh
// This block can be removed in v3 once everyone has loaded v2
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => reg.update());
  });
  if ('caches' in window) {
    caches.keys().then(names => {
      names.filter(n => n.startsWith('jg-project-v1')).forEach(n => caches.delete(n));
    });
  }
}
