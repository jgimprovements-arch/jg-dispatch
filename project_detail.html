<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script src="jg-version-check.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d2d5e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Project · JG Restoration · v2</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623; --green: #2d9c5f; --red: #d64545;
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --muted: #7884a0; --line: #e3e7f0;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    overscroll-behavior-y: contain;
  }

  /* Topbar with back nav */
  .topbar {
    background: linear-gradient(135deg, #0d2d5e 0%, #1a4080 100%);
    color: #fff;
    padding: calc(var(--safe-top) + 14px) 16px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 2px 12px rgba(13,45,94,.25);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.16);
    color: #fff;
    border-radius: 10px;
    padding: 7px 12px 7px 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    flex-shrink: 0;
    font-family: inherit;
    line-height: 1;
    transition: background .15s;
  }
  .topbar .back-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .topbar .back-btn:active { background: rgba(255,255,255,.18); }
  .topbar .title {
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }
  .topbar h1 {
    margin: 0;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: .2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .topbar .sub {
    font-size: 10px;
    opacity: .8;
    letter-spacing: .8px;
    text-transform: uppercase;
  }
  .topbar .full-app-btn {
    background: var(--orange);
    color: #fff;
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 700;
    text-decoration: none;
    border: 0;
    flex-shrink: 0;
  }

  main { padding: 14px 14px calc(var(--safe-bottom) + 84px); max-width: 720px; margin: 0 auto; }

  /* Hero card with project basics */
  .hero {
    background: linear-gradient(135deg, var(--navy) 0%, #1a4080 100%);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 14px;
    color: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(13,45,94,.18);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -50px; right: -50px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(232,93,4,.22) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--orange);
    background: rgba(232,93,4,.18);
    border: 1px solid rgba(232,93,4,.4);
    padding: 2px 10px;
    border-radius: 999px;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  .hero h2 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -.2px;
    position: relative;
    z-index: 1;
  }
  .hero .customer { font-size: 14px; font-weight: 700; position: relative; z-index: 1; }
  .hero .status-chip {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.2);
    padding: 3px 10px;
    border-radius: 999px;
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }
  .hero .margin-chip {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    padding: 4px 11px;
    border-radius: 999px;
    margin-top: 8px;
    margin-left: 6px;
    position: relative;
    z-index: 1;
    border: 1px solid rgba(255,255,255,.25);
  }
  .hero .margin-chip.margin-green { background: rgba(45,156,95,.85); color: #fff; }
  .hero .margin-chip.margin-yellow { background: rgba(245,166,35,.85); color: #fff; }
  .hero .margin-chip.margin-red { background: rgba(214,69,69,.85); color: #fff; }

  /* Contact action grid */
  .contact-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 14px;
  }
  .contact-btn {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 8px 12px;
    text-align: center;
    text-decoration: none;
    color: var(--navy);
    transition: border-color .15s, background .15s, transform .15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .contact-btn:active {
    background: var(--bg);
    border-color: var(--orange);
    transform: scale(.97);
  }
  .contact-btn.disabled {
    opacity: .35;
    pointer-events: none;
  }
  .contact-btn .ico {
    font-size: 24px;
    line-height: 1;
  }
  .contact-btn .lbl {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .4px;
    color: var(--muted);
  }
  .contact-btn .val {
    font-size: 11px;
    color: var(--navy);
    font-weight: 600;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }
  .contact-btn.call .ico { color: var(--green); }
  .contact-btn.email .ico { color: var(--orange); }
  .contact-btn.map .ico { color: #4a90e2; }

  /* PM info card */
  .pm-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .pm-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--orange);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 15px;
    flex-shrink: 0;
  }
  .pm-info { flex: 1; min-width: 0; }
  .pm-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .pm-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
  }
  .pm-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .pm-action {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--navy);
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 700;
    text-decoration: none;
  }
  .pm-action:active { background: var(--orange); color: #fff; border-color: var(--orange); }

  /* Section navigation grid */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin: 18px 0 8px;
    padding-left: 4px;
  }
  .section-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-right: 4px;
  }
  .edit-pill {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--navy);
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    text-transform: none;
    letter-spacing: 0;
    transition: background .15s, border-color .15s, color .15s;
  }
  .edit-pill:active {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
  }
  .section-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  /* Primary Capture Photo button */
  .capture-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: linear-gradient(135deg, var(--orange) 0%, #f5a623 100%);
    color: #fff;
    border-radius: 14px;
    padding: 16px 18px;
    text-decoration: none;
    margin-bottom: 4px;
    box-shadow: 0 6px 18px rgba(232,93,4,.25);
    transition: transform .15s, box-shadow .15s;
  }
  .capture-btn:active {
    transform: scale(.98);
    box-shadow: 0 3px 10px rgba(232,93,4,.25);
  }
  .capture-ico {
    width: 38px;
    height: 38px;
    flex-shrink: 0;
  }
  .capture-text { flex: 1; min-width: 0; }
  .capture-title { font-size: 16px; font-weight: 800; letter-spacing: -.1px; line-height: 1.1; }
  .capture-sub { font-size: 12px; opacity: .9; margin-top: 2px; }
  .capture-arrow { width: 18px; height: 18px; opacity: .7; flex-shrink: 0; }

  /* Add Note button (similar layout to capture-btn, navy theme) */
  .note-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    background: var(--navy);
    color: #fff;
    border: 0;
    border-radius: 14px;
    padding: 14px 18px;
    text-decoration: none;
    margin-top: 8px;
    box-shadow: 0 6px 18px rgba(13,45,94,.18);
    transition: transform .15s, box-shadow .15s;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
  }
  .note-btn:active {
    transform: scale(.98);
    box-shadow: 0 3px 10px rgba(13,45,94,.18);
  }

  /* Clock In quick action (green theme) */
  .clock-quick-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    background: var(--green);
    color: #fff;
    border: 0;
    border-radius: 14px;
    padding: 14px 18px;
    text-decoration: none;
    margin-top: 8px;
    box-shadow: 0 6px 18px rgba(45,156,95,.22);
    transition: transform .15s, box-shadow .15s, background .2s;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
  }
  .clock-quick-btn:active { transform: scale(.98); box-shadow: 0 3px 10px rgba(45,156,95,.22); }
  .clock-quick-btn.on-job { background: #1e7d3f; }
  .clock-quick-btn.other-job { background: #b06a00; box-shadow: 0 6px 18px rgba(176,106,0,.22); }
  .clock-quick-btn.other-job:active { box-shadow: 0 3px 10px rgba(176,106,0,.22); }
  .clock-quick-btn .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; box-shadow: 0 0 0 0 rgba(255,255,255,.6); animation: clockPulse 1.8s ease-out infinite; }
  @keyframes clockPulse { 0% { box-shadow: 0 0 0 0 rgba(255,255,255,.55); } 70% { box-shadow: 0 0 0 10px rgba(255,255,255,0); } 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); } }

  /* Bottom navigation — mirrors the projects-list nav so the user keeps a
     consistent anchor across all mobile project views. Projects is marked
     active because project_detail is a sub-view of that flow. */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--line);
    padding: 8px 4px calc(var(--safe-bottom) + 4px);
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    z-index: 50;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 0;
    text-decoration: none;
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    border: 0;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    transition: color .15s;
    position: relative;
  }
  .nav-item.on { color: var(--orange); }
  .nav-item.on::before {
    content: '';
    position: absolute;
    top: 0;
    left: 28%; right: 28%;
    height: 3px;
    background: var(--orange);
    border-radius: 0 0 4px 4px;
  }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-item:active { color: var(--orange); }

  /* Note bottom sheet */
  .sheet-back { position: fixed; inset: 0; background: rgba(13,45,94,.5); z-index: 100; display: none; align-items: flex-end; }
  .sheet-back.on { display: flex; }
  .note-sheet {
    background: var(--card);
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    border-radius: 18px 18px 0 0;
    padding: 18px 16px calc(var(--safe-bottom) + 18px);
    box-shadow: 0 -8px 32px rgba(13,45,94,.3);
    max-height: 92vh;
    overflow-y: auto;
    animation: sheetUp .25s ease-out;
  }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .note-sheet h3 { margin: 0 0 14px; color: var(--navy); font-size: 17px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
  .note-sheet .close-x { background: var(--bg); border: 0; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; color: var(--muted); }
  .note-sheet textarea {
    width: 100%;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 9px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    min-height: 140px;
    resize: vertical;
    line-height: 1.4;
  }
  .note-sheet textarea:focus { outline: none; border-color: var(--orange); }
  .note-sheet .opts {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    font-size: 13px;
    color: var(--text);
  }
  .note-sheet .opts label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .note-sheet .opts input { accent-color: var(--orange); width: 18px; height: 18px; }
  .note-sheet .actions { display: flex; gap: 8px; margin-top: 14px; }
  .sheet-btn {
    flex: 1;
    padding: 12px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid transparent;
    font-family: inherit;
  }
  .sheet-btn.primary { background: var(--orange); color: #fff; border-color: var(--orange); }
  .sheet-btn.primary:disabled { opacity: .5; }
  .sheet-btn.ghost { background: var(--bg); color: var(--navy); border-color: var(--line); }

  /* Contact edit sheet (different ID from note sheet, same patterns) */
  .contact-sheet {
    background: var(--card);
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    border-radius: 18px 18px 0 0;
    padding: 18px 16px calc(var(--safe-bottom) + 18px);
    box-shadow: 0 -8px 32px rgba(13,45,94,.3);
    max-height: 92vh;
    overflow-y: auto;
    animation: sheetUp .25s ease-out;
  }
  .contact-sheet h3 {
    margin: 0 0 4px;
    color: var(--navy);
    font-size: 17px;
    font-weight: 800;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .contact-subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 600;
  }
  .contact-sheet .close-x {
    background: var(--bg);
    border: 0;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    font-size: 18px;
    cursor: pointer;
    color: var(--muted);
    font-family: inherit;
  }
  .contact-sheet label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .4px;
    margin: 10px 0 4px;
  }
  .contact-sheet input {
    width: 100%;
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 9px;
    padding: 11px 13px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
  }
  .contact-sheet input:focus { outline: none; border-color: var(--orange); }
  .sheet-section-label {
    font-size: 11px;
    font-weight: 800;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin: 16px 0 4px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--line);
  }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .sheet-actions { display: flex; gap: 8px; margin-top: 18px; }

  /* Toast */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 16px rgba(13,45,94,.3); z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.on { opacity: 1; }
  .section-btn {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 16px;
    text-decoration: none;
    color: var(--text);
    transition: transform .15s, box-shadow .15s, border-color .15s;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    overflow: hidden;
  }
  .section-btn:active {
    transform: scale(.97);
    border-color: var(--orange);
    box-shadow: 0 4px 14px rgba(232,93,4,.1);
  }
  .section-btn .ico-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .section-btn .ico {
    font-size: 28px;
    line-height: 1;
  }
  .section-btn .badge {
    background: var(--orange);
    color: #fff;
    font-size: 10px;
    font-weight: 800;
    padding: 3px 9px;
    border-radius: 999px;
    line-height: 1;
  }
  .section-btn .badge.alert { background: var(--red); }
  .section-btn .name {
    font-size: 15px;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: -.1px;
  }
  .section-btn .desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.3;
  }

  /* Loading / errors */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
  }
  .error-state {
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: 14px;
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    margin-top: 20px;
  }
  .error-state h3 { color: var(--navy); margin: 0 0 6px; }
  .error-state p { margin: 0 0 12px; font-size: 13px; }
  .error-state a {
    display: inline-block;
    margin-top: 10px;
    background: var(--orange);
    color: #fff;
    padding: 10px 20px;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="project.html" class="back-btn" id="backBtn" title="Back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Back</a>
  <div class="title">
    <h1 id="topJob">Loading…</h1>
    <div class="sub" id="topMarket"></div>
  </div>
</div>

<main id="main">
  <div class="loading">Loading project…</div>
</main>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <a href="home.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3l9 7v11h-6v-6h-6v6H3V10l9-7z"/></svg>
    Home
  </a>
  <a href="project.html" class="nav-item on">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zM10 4h4v2h-4V4z"/></svg>
    Projects
  </a>
  <a href="mobile_todos.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.4-1.4L10 14.2l7.6-7.6L19 8l-9 9z"/></svg>
    To-Dos
  </a>
  <a href="timeclock.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm4.2 14.2L11 13V7h1.5v5.2l4.5 2.7-.8 1.3z"/></svg>
    Clock

  const v = Number(n) || 0;
  const abs = Math.abs(v);
  if (abs >= 1000) return (v < 0 ? '-' : '') + '$' + (Math.round(abs/100)/10).toFixed(1) + 'k';
  return (v < 0 ? '-' : '') + '$' + Math.round(abs);
}

const ALBI_NOTE_HOOK = 'https://hooks.zapier.com/hooks/catch/12653197/uvugxag/';

function toast(msg) {
  const t = document.getElementById('toast');
  if (!t) { console.log(msg); return; }
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2200);
}

function openNoteSheet() {
  document.getElementById('noteSheetBack').classList.add('on');
  const ta = document.getElementById('noteSheetText');
  ta.value = '';
  document.getElementById('noteCustomerVisible').checked = false;
  document.getElementById('notePushAlbi').checked = true;
  document.getElementById('noteSheetSave').disabled = true;
  setTimeout(() => ta.focus(), 100);
}
function closeNoteSheet() {
  document.getElementById('noteSheetBack').classList.remove('on');
}

async function saveNote() {
  const body = document.getElementById('noteSheetText').value.trim();
  if (!body) return;
  const customerVisible = document.getElementById('noteCustomerVisible').checked;
  const pushAlbi = document.getElementById('notePushAlbi').checked;
  const p = state.project;
  if (!p) return;

  const saveBtn = document.getElementById('noteSheetSave');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Posting…';

  let user = null;
  try { user = JSON.parse(localStorage.getItem('jg_platform_user') || 'null'); } catch {}
  const email = (user?.email || 'mobile-pwa@jg-restoration.com').toLowerCase();
  const name = user?.name || email.split('@')[0];

  // Insert journal entry
  const { error } = await sb.from('rebuild_journal_entries').insert({
    project_id: p.id,
    body,
    author_email: email,
    author_name: name,
    author_role: 'field',
    customer_visible: customerVisible,
  });
  if (error) {
    console.error(error);
    toast('Post failed: ' + error.message);
    saveBtn.disabled = false;
    saveBtn.textContent = 'Post Note';
    return;
  }

  // Push to Albi if requested
  if (pushAlbi && p.albi_project_id) {
    try {
      await fetch(ALBI_NOTE_HOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          project_id: p.id,
          albi_project_id: p.albi_project_id,
          albi_job_number: p.albi_job_number,
          note_text: body,
          author_name: name,
          author_email: email,
          source: 'mobile-pwa',
        }),
        mode: 'no-cors',
      });
    } catch (e) {
      console.warn('Albi note push failed:', e);
    }
  }

  toast('Note posted');
  saveBtn.textContent = 'Post Note';
  closeNoteSheet();
}

// ═══════════════ CLOCK IN / OUT (quick action) ═══════════════
// Mirrors the timeclock.html clockIn() / clockOut() payload exactly so the
// time entry shows up everywhere the existing app expects it — the timeclock
// PWA, the admin payroll page, and any project-level time rollups. job_id is
// the Albi uniqueNumber string (matching what loadJobs() builds in
// timeclock.html), NOT the rebuild_projects UUID.
const _clockState = {
  entry: null,     // active open time_entries row, if any
  employee: null,  // current user's employees row
  lookupEmail: null, // remembered for error reporting if lookup fails
};

function _getUserEmail() {
  try {
    const u = JSON.parse(localStorage.getItem('jg_platform_user') || 'null');
    return u?.email || null; // Don't lowercase — timeclock matches raw and works.
  } catch { return null; }
}

async function _loadEmployee() {
  if (_clockState.employee) return _clockState.employee;
  const rawEmail = _getUserEmail();
  _clockState.lookupEmail = rawEmail;
  if (!rawEmail) return null;

  // Step 1 — exact email match. This is the same path timeclock.html uses
  // (and it works for everyone there). If this hits we're done.
  try {
    const { data: emp } = await sb.from('employees')
      .select('id, name, market, role')
      .eq('email', rawEmail)
      .maybeSingle();
    if (emp) { _clockState.employee = emp; return emp; }
  } catch (e) { console.warn('employee email.eq lookup failed:', e); }

  // Step 2 — case-insensitive email retry. Catches admin-typed entries that
  // ended up with different casing than the login email.
  try {
    const { data: emp } = await sb.from('employees')
      .select('id, name, market, role')
      .ilike('email', rawEmail)
      .maybeSingle();
    if (emp) { _clockState.employee = emp; return emp; }
  } catch (e) { console.warn('employee email.ilike lookup failed:', e); }

  // Step 3 — personal_email fallback, isolated so a missing column won't
  // break the prior steps. Some employees use a personal Gmail for the
  // platform but a corporate email on the employees row.
  try {
    const { data: emp } = await sb.from('employees')
      .select('id, name, market, role')
      .ilike('personal_email', rawEmail)
      .maybeSingle();
    if (emp) { _clockState.employee = emp; return emp; }
  } catch (e) { /* column may not exist — non-fatal */ }

  return null;
}

async function refreshClockButton() {
  const btn = document.getElementById('clockQuickBtn');
  const textEl = document.getElementById('clockQuickText');
  const p = state.project;
  if (!btn || !textEl || !p) return;

  await _loadEmployee();
  btn.style.display = '';

  // Pull any currently-open time entry for this user. Intentionally do NOT
  // select project_id — older schemas don't have that column, and PostgREST
  // 400s the whole query when a selected column doesn't exist. Match
  // by job_id (Albi uniqueNumber) which IS guaranteed to exist.
  if (_clockState.employee) {
    const { data: open } = await sb.from('time_entries')
      .select('id, job_id, job_name, clock_in')
      .eq('employee_id', _clockState.employee.id)
      .is('clock_out', null)
      .order('clock_in', { ascending: false })
      .limit(1);
    _clockState.entry = (open && open[0]) || null;
  } else {
    _clockState.entry = null;
  }

  if (!_clockState.entry) {
    _setClockButtonIdle(p);
    return;
  }

  // Decide if the open entry is for THIS project. job_id is the Albi
  // uniqueNumber stored as a string — compare both as strings to dodge
  // number/string equality traps.
  const thisAlbiId = String(p.albi_project_id || '').trim();
  const entryJobId = String(_clockState.entry.job_id || '').trim();
  const entryJobName = String(_clockState.entry.job_name || '').trim();
  const thisJobName = String(p.albi_job_number || '').trim();

  // Match by job_id first (most reliable), fall back to job_name match for
  // projects where albi_project_id might be missing but the human-readable
  // job number still matches what we'd have written on insert.
  const isThisProject =
       (thisAlbiId && entryJobId === thisAlbiId)
    || (thisJobName && entryJobName === thisJobName);

  if (isThisProject) {
    _setClockButtonOnJob(_clockState.entry.clock_in);
  } else {
    _setClockButtonOtherJob(_clockState.entry.job_name);
  }
}

async function handleClockTap() {
  const p = state.project;
  if (!p) { toast('Project not loaded yet'); return; }

  // Lazy-load the employee on tap. Init may not have finished yet, or the
  // first lookup may have raced the page render — either way we retry here
  // before declaring failure, with a clearer error if the row really is
  // missing.
  if (!_clockState.employee) await _loadEmployee();
  if (!_clockState.employee) {
    const tried = _clockState.lookupEmail || 'unknown';
    toast(`No employees row for ${tried} — ask Josh to add you`);
    return;
  }
  const btn = document.getElementById('clockQuickBtn');
  if (!btn) return;

  const thisAlbiId = String(p.albi_project_id || '');
  const entry = _clockState.entry;

  if (entry) {
    const entryJobId = String(entry.job_id || '');
    const entryProjectId = entry.project_id || null;
    const isThisProject = (entryJobId && entryJobId === thisAlbiId)
      || (entryProjectId && entryProjectId === p.id);

    if (isThisProject) {
      // Clock out
      if (!confirm('Clock out of ' + (p.albi_job_number || 'this job') + '?')) return;
      btn.style.opacity = '.6';
      btn.style.pointerEvents = 'none';
      const { error } = await sb.from('time_entries')
        .update({ clock_out: new Date().toISOString(), status: 'completed' })
        .eq('id', entry.id);
      btn.style.opacity = '';
      btn.style.pointerEvents = '';
      if (error) { toast('Clock-out failed: ' + error.message); return; }
      _clockState.entry = null;
      _setClockButtonIdle(p);  // paint immediately, don't wait for re-query
      toast('Clocked out');
      refreshClockButton();
      return;
    }

    // Already clocked in elsewhere — confirm switch (clock out + clock in)
    const otherJob = entry.job_name || 'another job';
    if (!confirm(`Switch from ${otherJob} to ${p.albi_job_number || 'this job'}?\n\nThis will clock you out of ${otherJob} and clock you in here.`)) return;
    btn.style.opacity = '.6';
    btn.style.pointerEvents = 'none';
    const now = new Date().toISOString();
    const { error: outErr } = await sb.from('time_entries')
      .update({ clock_out: now, status: 'completed' })
      .eq('id', entry.id);
    if (outErr) { btn.style.opacity = ''; btn.style.pointerEvents = ''; toast('Switch failed: ' + outErr.message); return; }
    _clockState.entry = null;
    // Fall through to clock-in below
  }

  // Clock in
  const oldOpacity = btn.style.opacity;
  btn.style.opacity = '.6';
  btn.style.pointerEvents = 'none';

  // Best-effort geolocation — non-blocking, matches the timeclock behavior
  let lat = null, lng = null;
  try {
    const pos = await new Promise((resolve, reject) => {
      if (!navigator.geolocation) return reject(new Error('no geo'));
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000, maximumAge: 60000 });
    });
    lat = pos.coords.latitude; lng = pos.coords.longitude;
  } catch (e) { /* non-fatal, clock in without coords */ }

  const payload = {
    employee_id: _clockState.employee.id,
    employee_name: _clockState.employee.name,
    employee_email: (JSON.parse(localStorage.getItem('jg_platform_user') || '{}').email || '').toLowerCase() || null,
    job_id: thisAlbiId || null,
    job_name: p.albi_job_number || p.customer_name || null,
    project_id: p.id, // FK to rebuild_projects so the existing project-level join works
    market: _clockState.employee.market || (p.market === 'stevens_point' ? 'stevens_point' : 'appleton'),
    clock_in: new Date().toISOString(),
    clock_in_lat: lat,
    clock_in_lng: lng,
    status: 'active',
  };

  const { data, error } = await sb.from('time_entries').insert(payload).select();
  btn.style.opacity = oldOpacity;
  btn.style.pointerEvents = '';
  if (error) {
    // If project_id column doesn't exist on time_entries (older schema),
    // retry without it. Keeps mobile clock-in working regardless of when
    // that column was added.
    if (/project_id/.test(error.message || '')) {
      delete payload.project_id;
      const { data: data2, error: err2 } = await sb.from('time_entries').insert(payload).select();
      if (err2) { toast('Clock-in failed: ' + err2.message); return; }
      _clockState.entry = data2?.[0] || null;
    } else {
      toast('Clock-in failed: ' + error.message);
      return;
    }
  } else {
    _clockState.entry = data?.[0] || null;
  }
  // Paint on-job state IMMEDIATELY using the freshly-inserted row, before
  // calling refreshClockButton. This guarantees the button updates even if
  // the re-query later fails or matches don't line up (e.g., when
  // p.albi_project_id is null on this project).
  if (_clockState.entry?.clock_in) {
    _setClockButtonOnJob(_clockState.entry.clock_in);
  }
  toast(`Clocked in · ${p.albi_job_number || 'this job'}`);
  refreshClockButton();
}

// Kick off button state once the project is loaded. init() sets state.project
// on the next tick, so poll until it's there then refresh once.
(() => {
  const waitForProject = setInterval(() => {
    if (state && state.project) {
      clearInterval(waitForProject);
      refreshClockButton();
    }
  }, 200);
})();

// ═══════════════ CONTACT EDIT SHEET ═══════════════
const contactFields = [
  ['customer_name','cs_customer_name'],
  ['customer_phone','cs_customer_phone'],
  ['customer_email','cs_customer_email'],
  ['customer_email_secondary','cs_customer_email_secondary'],
  ['property_address','cs_property_address'],
  ['insurance_carrier','cs_insurance_carrier'],
  ['insurance_claim_number','cs_insurance_claim_number'],
  ['insurance_policy_number','cs_insurance_policy_number'],
  ['insurance_adjuster_name','cs_insurance_adjuster_name'],
  ['insurance_adjuster_phone','cs_insurance_adjuster_phone'],
  ['insurance_adjuster_email','cs_insurance_adjuster_email'],
];

function openContactSheet() {
  const p = state.project;
  if (!p) return;
  document.getElementById('contactSheetSubtitle').textContent =
    `${p.albi_job_number || ''}${p.property_address ? ' · ' + p.property_address : ''}`;
  contactFields.forEach(([col, id]) => {
    const el = document.getElementById(id);
    if (el) el.value = p[col] || '';
  });
  document.getElementById('contactSheetBack').classList.add('on');
  setTimeout(() => document.getElementById('cs_customer_name').focus(), 100);
}

function closeContactSheet() {
  document.getElementById('contactSheetBack').classList.remove('on');
}

async function saveContactSheet() {
  if (!state.project) return;
  const saveBtn = document.getElementById('saveContactSheet');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving…';

  const updates = {};
  const changes = {};
  contactFields.forEach(([col, id]) => {
    const val = document.getElementById(id).value.trim() || null;
    const oldVal = state.project[col] || null;
    updates[col] = val;
    if (val !== oldVal) changes[col] = { from: oldVal, to: val };
  });

  if (Object.keys(changes).length === 0) {
    toast('No changes');
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save Changes';
    closeContactSheet();
    return;
  }

  const { error } = await sb.from('rebuild_projects').update(updates).eq('id', state.project.id);
  if (error) {
    console.error(error);
    toast('Save failed: ' + error.message);
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save Changes';
    return;
  }
  Object.assign(state.project, updates);

  // Audit log (best-effort)
  let user = null;
  try { user = JSON.parse(localStorage.getItem('jg_platform_user') || 'null'); } catch {}
  const email = (user?.email || 'mobile-pwa@jg-restoration.com').toLowerCase();
  const name = user?.name || email.split('@')[0];
  try {
    await sb.from('rebuild_project_contact_history').insert({
      project_id: state.project.id,
      edited_by_email: email,
      edited_by_name: name,
      changes,
    });
  } catch (e) { console.warn('Audit log failed:', e); }

  toast('Contact info saved');
  saveBtn.disabled = false;
  saveBtn.textContent = 'Save Changes';
  closeContactSheet();

  // Re-render the page so updated values appear
  if (typeof init === 'function') init();
}

// Delegated click for the Edit button (rendered async by init's render)
document.addEventListener('click', (e) => {
  if (e.target.closest('#editContactBtn')) openContactSheet();
});
document.getElementById('closeContactSheet').addEventListener('click', closeContactSheet);
document.getElementById('cancelContactSheet').addEventListener('click', closeContactSheet);
document.getElementById('contactSheetBack').addEventListener('click', (e) => {
  if (e.target.id === 'contactSheetBack') closeContactSheet();
});
document.getElementById('saveContactSheet').addEventListener('click', saveContactSheet);

init();

// One-time cache buster: force the service worker to refresh
// This block can be removed in v3 once everyone has loaded v2
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => reg.update());
  });
  if ('caches' in window) {
    caches.keys().then(names => {
      names.filter(n => n.startsWith('jg-project-v1')).forEach(n => caches.delete(n));
    });
  }
}
