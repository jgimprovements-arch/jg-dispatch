<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Signature · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<style>
  :root {
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623; --green: #2d9c5f; --red: #d64545;
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --muted: #7884a0; --line: #e3e7f0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--navy); color: #fff; padding: 18px 28px; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 8px rgba(13,45,94,.12); }
  header img { width: 48px; height: 48px; object-fit: contain; background: #fff; padding: 4px; border-radius: 6px; }
  header .brand-name { font-weight: 800; font-size: 19px; }
  header .brand-tag { font-size: 11px; opacity: .85; letter-spacing: .8px; text-transform: uppercase; }
  main { max-width: 760px; margin: 0 auto; padding: 24px; }
  .hero { background: linear-gradient(135deg, #0d2d5e 0%, #1a4080 50%, #0d2d5e 100%); border-radius: 14px; padding: 24px 28px; margin-bottom: 18px; color: #fff; position: relative; overflow: hidden; box-shadow: 0 6px 20px rgba(13,45,94,.18); }
  .hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 260px; height: 260px; background: radial-gradient(circle, rgba(232,93,4,.22) 0%, transparent 70%); pointer-events: none; }
  .hero-tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--orange); background: rgba(232,93,4,.18); border: 1px solid rgba(232,93,4,.4); padding: 3px 11px; border-radius: 999px; margin-bottom: 10px; position: relative; z-index: 1; }
  .hero h1 { margin: 0 0 4px; color: #fff; font-size: 24px; font-weight: 800; position: relative; z-index: 1; }
  .hero-sub { color: rgba(255,255,255,.8); font-size: 13px; position: relative; z-index: 1; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 22px 26px; margin-bottom: 16px; }
  .card h2 { margin: 0 0 14px; color: var(--navy); font-size: 16px; font-weight: 700; }
  .doc-preview-wrap { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #f8f9fc; min-height: 400px; display: flex; align-items: center; justify-content: center; }
  .doc-preview-wrap iframe { width: 100%; height: 500px; border: 0; }
  .doc-preview-wrap .no-preview { padding: 40px; text-align: center; color: var(--muted); }
  .sig-form { display: flex; flex-direction: column; gap: 12px; }
  .sig-form label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 4px; }
  .sig-form input { width: 100%; border: 1px solid var(--line); border-radius: 7px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--navy); background: #fff; }
  .sig-form input:focus { outline: none; border-color: var(--orange); }
  .sig-canvas-wrap { border: 1.5px solid var(--line); border-radius: 8px; background: #fff; position: relative; }
  .sig-canvas-wrap canvas { display: block; width: 100%; height: 140px; cursor: crosshair; border-radius: 8px; touch-action: none; }
  .sig-canvas-label { position: absolute; top: 8px; left: 12px; font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; pointer-events: none; }
  .sig-canvas-clear { position: absolute; top: 6px; right: 8px; background: none; border: 1px solid var(--line); border-radius: 4px; font-size: 11px; color: var(--muted); padding: 2px 8px; cursor: pointer; }
  .sig-canvas-clear:hover { color: var(--red); border-color: var(--red); }
  .accept-row { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: linear-gradient(135deg, #fff8f0 0%, var(--card) 100%); border: 1px solid rgba(232,93,4,.3); border-radius: 8px; }
  .accept-row input[type="checkbox"] { margin-top: 3px; transform: scale(1.3); cursor: pointer; flex-shrink: 0; }
  .accept-row label { font-size: 13px; color: var(--navy); line-height: 1.5; cursor: pointer; font-weight: 500; }
  .btn { padding: 14px 22px; border-radius: 999px; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid transparent; transition: background .15s, transform .15s; font-family: inherit; }
  .btn.primary { background: var(--orange); color: #fff; width: 100%; margin-top: 6px; }
  .btn.primary:hover:not(:disabled) { background: #d05303; transform: translateY(-1px); }
  .btn.primary:disabled { opacity: .45; cursor: not-allowed; }
  .success-state { text-align: center; padding: 40px 20px; }
  .success-state .check { font-size: 64px; color: var(--green); margin-bottom: 12px; }
  .success-state h2 { color: var(--navy); margin: 0 0 8px; font-size: 22px; }
  .receipt { background: var(--bg); border-radius: 8px; padding: 14px 18px; margin: 16px auto; max-width: 420px; font-size: 13px; color: var(--muted); text-align: left; }
  .receipt b { color: var(--navy); }
  .error-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .error-state h2 { color: var(--navy); margin: 0 0 8px; }
  .footer-note { text-align: center; color: var(--muted); font-size: 11px; padding: 24px 0 40px; line-height: 1.6; }
  .footer-note a { color: var(--navy); text-decoration: none; font-weight: 600; }
  @media (max-width: 600px) { main { padding: 14px; } .hero { padding: 20px; } .hero h1 { font-size: 20px; } }
</style>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const ALBI_DOC_HOOK = 'https://hooks.zapier.com/hooks/catch/12653197/uves4j9/';
const sb = createClient(SB_URL, SB_ANON);
const params = new URLSearchParams(window.location.search);
const token = params.get('t');
const main = document.getElementById('main');

const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDateTime = d => d ? new Date(d).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—';
const cleanFilename = name => name ? name.replace(/^\d{8,}[_-]+/, '') : '';

if (!token) {
  main.innerHTML = `<div class="error-state"><h2>Invalid link</h2><p>This signature link is missing or malformed. Please contact JG Restoration.</p></div>`;
} else {
  await render();
}

async function render() {
  const { data: doc, error } = await sb.from('rebuild_documents')
    .select('*, project:rebuild_projects(id, albi_job_number, customer_name, property_address, albi_pm_name, albi_pm_email, albi_project_id)')
    .eq('signature_token', token)
    .maybeSingle();

  if (error || !doc) {
    main.innerHTML = `<div class="error-state"><h2>Not found</h2><p>This link may have expired or already been used. Contact JG Restoration.</p></div>`;
    return;
  }

  if (doc.signature_status === 'signed') {
    main.innerHTML = renderSigned(doc);
    return;
  }

  main.innerHTML = renderForm(doc);
  wireForm(doc);
}

function renderForm(doc) {
  const p = doc.project || {};
  const fname = cleanFilename(doc.filename);
  const isPdf = /\.pdf$/i.test(doc.filename);

  return `
    <div class="hero">
      <div class="hero-tag">Signature Required</div>
      <h1>${esc(fname)}</h1>
      <div class="hero-sub">${esc(p.albi_job_number || '')}${p.customer_name ? ' · ' + esc(p.customer_name) : ''}${p.property_address ? ' · ' + esc(p.property_address) : ''}</div>
    </div>

    <div class="card">
      <h2>Document</h2>
      <div class="doc-preview-wrap">
        ${isPdf
          ? `<iframe src="${doc.file_url}" title="Document preview"></iframe>`
          : `<div class="no-preview"><div style="font-size:48px;margin-bottom:12px;">📄</div><div>${esc(fname)}</div><a href="${doc.file_url}" target="_blank" style="color:var(--orange);font-weight:700;margin-top:8px;display:inline-block;">Open document ↗</a></div>`}
      </div>
    </div>

    <div class="card">
      <h2>Sign Document</h2>
      <div class="sig-form">
        <div>
          <label>Your Full Name</label>
          <input type="text" id="sig_name" placeholder="Full Name" value="${esc(doc.signature_sent_to_name || '')}">
        </div>
        <div>
          <label>Your Signature</label>
          <div class="sig-canvas-wrap">
            <canvas id="sigCanvas"></canvas>
            <div class="sig-canvas-label">Sign here</div>
            <button class="sig-canvas-clear" id="sigClear" type="button">Clear</button>
          </div>
        </div>
        <div class="accept-row">
          <input type="checkbox" id="sig_accept">
          <label for="sig_accept">I have reviewed the document above and by signing I acknowledge this constitutes my legal electronic signature and agreement to the contents of this document.</label>
        </div>
        <button class="btn primary" id="sig_submit" disabled>✓ Sign Document</button>
      </div>
    </div>
  `;
}

function renderSigned(doc) {
  const p = doc.project || {};
  const fname = cleanFilename(doc.filename);
  return `
    <div class="hero">
      <div class="hero-tag">Signed</div>
      <h1>${esc(fname)}</h1>
      <div class="hero-sub">${esc(p.albi_job_number || '')}${p.customer_name ? ' · ' + esc(p.customer_name) : ''}</div>
    </div>
    <div class="card success-state">
      <div class="check">✓</div>
      <h2>Document Signed</h2>
      <p style="color:var(--muted);">Thank you. JG Restoration has been notified.</p>
      <div class="receipt">
        <div><b>Document:</b> ${esc(fname)}</div>
        <div><b>Signed by:</b> ${esc(doc.signed_by_name || '—')}</div>
        <div><b>Signed at:</b> ${fmtDateTime(doc.signed_at)}</div>
        ${doc.signed_pdf_url ? `<div style="margin-top:8px;"><a href="${doc.signed_pdf_url}" target="_blank" style="color:var(--orange);font-weight:700;">📄 View Signed Copy</a></div>` : ''}
      </div>
      <p style="color:var(--muted);font-size:12px;">A signed copy has been saved to your project file. Questions? Contact${p.albi_pm_name ? ' ' + esc(p.albi_pm_name) + ' at' : ''} <a href="tel:9204284200">(920) 428-4200</a>.</p>
    </div>
  `;
}

function wireForm(doc) {
  const canvas = document.getElementById('sigCanvas');
  const ctx = canvas.getContext('2d');
  let drawing = false;
  let hasSig = false;

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    ctx.strokeStyle = '#0d2d5e';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }
  resizeCanvas();

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }

  canvas.addEventListener('mousedown', e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
  canvas.addEventListener('mousemove', e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSig = true; refresh(); });
  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('mouseleave', () => drawing = false);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSig = true; refresh(); }, { passive: false });
  canvas.addEventListener('touchend', () => drawing = false);
  document.getElementById('sigClear').addEventListener('click', () => { ctx.clearRect(0, 0, canvas.width, canvas.height); hasSig = false; refresh(); });

  const nameInput = document.getElementById('sig_name');
  const cb = document.getElementById('sig_accept');
  const btn = document.getElementById('sig_submit');
  function refresh() { btn.disabled = !(cb.checked && nameInput.value.trim().length > 1 && hasSig); }
  cb.addEventListener('change', refresh);
  nameInput.addEventListener('input', refresh);

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = 'Submitting…';
    try {
      const name = nameInput.value.trim();
      let ip = null;
      try { const r = await fetch('https://api.ipify.org?format=json'); ip = (await r.json()).ip; } catch {}
      const now = new Date().toISOString();
      const sigDataUrl = canvas.toDataURL('image/png');

      const { error } = await sb.from('rebuild_documents').update({
        signature_status: 'signed',
        signed_at: now,
        signed_by_name: name,
        signed_ip: ip,
      }).eq('id', doc.id);

      if (error) { btn.disabled = false; btn.textContent = orig; alert('Could not record signature: ' + error.message); return; }

      // Notify PM
      const p = doc.project || {};
      if (p.albi_pm_email) {
        try {
          await sb.from('rebuild_notifications').insert({
            project_id: doc.project_id,
            recipient_email: p.albi_pm_email.toLowerCase(),
            event_type: 'wo_signed',
            title: name + ' signed ' + cleanFilename(doc.filename),
            body: name + ' signed "' + cleanFilename(doc.filename) + '" for ' + (p.albi_job_number || 'project') + ' at ' + new Date(now).toLocaleString() + '.',
          });
        } catch (e) { console.warn('notif failed', e); }
      }

      // Generate signed PDF
      btn.textContent = 'Generating signed PDF…';
      try {
        const signedDoc = { ...doc, signed_at: now, signed_by_name: name, signed_ip: ip };
        const pdfBlob = await generateSignedPdf(signedDoc, sigDataUrl);
        if (pdfBlob) {
          const signedUrl = await uploadSignedPdf(signedDoc, pdfBlob);
          if (signedUrl) {
            await sb.from('rebuild_documents').update({ signed_pdf_url: signedUrl }).eq('id', doc.id);
          }
        }
      } catch (e) { console.error('PDF failed:', e); }

      await render();
    } catch (e) {
      btn.disabled = false; btn.textContent = orig;
      alert('Unexpected error: ' + e.message);
    }
  });
}

async function generateSignedPdf(doc, sigDataUrl) {
  if (!window.jspdf) return null;
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'pt', format: 'letter' });
  const pageW = pdf.internal.pageSize.getWidth();
  const pageH = pdf.internal.pageSize.getHeight();
  const margin = 48;
  let y = margin;
  const p = doc.project || {};
  const fname = cleanFilename(doc.filename);

  // Header
  pdf.setFillColor(13, 45, 94);
  pdf.rect(0, 0, pageW, 70, 'F');
  pdf.setTextColor(255, 255, 255);
  pdf.setFont('helvetica', 'bold'); pdf.setFontSize(18);
  pdf.text('JG Restoration', margin, 36);
  pdf.setFont('helvetica', 'normal'); pdf.setFontSize(9);
  pdf.setTextColor(245, 166, 35);
  pdf.text('FIRE · WATER · MOLD · RECONSTRUCTION', margin, 52);
  pdf.setTextColor(255, 255, 255); pdf.setFontSize(10);
  pdf.text('SIGNED DOCUMENT', pageW - margin, 36, { align: 'right' });
  pdf.setFontSize(8);
  pdf.text(new Date().toLocaleDateString(), pageW - margin, 52, { align: 'right' });
  y = 92;

  // Document info
  pdf.setFont('helvetica', 'bold'); pdf.setFontSize(14); pdf.setTextColor(13, 45, 94);
  pdf.text(fname.slice(0, 70), margin, y); y += 20;
  pdf.setFont('helvetica', 'normal'); pdf.setFontSize(10); pdf.setTextColor(80, 80, 80);
  if (p.albi_job_number) { pdf.text('Project: ' + p.albi_job_number, margin, y); y += 14; }
  if (p.customer_name) { pdf.text('Customer: ' + p.customer_name, margin, y); y += 14; }
  if (p.property_address) { pdf.text('Property: ' + p.property_address, margin, y); y += 14; }
  y += 10;

  // Link to original
  pdf.setFont('helvetica', 'italic'); pdf.setFontSize(9); pdf.setTextColor(120, 132, 160);
  pdf.text('Original document: ' + doc.file_url.slice(0, 80), margin, y); y += 20;

  // Signature block
  pdf.setFillColor(240, 250, 244);
  pdf.setDrawColor(45, 156, 95);
  pdf.roundedRect(margin, y, pageW - margin * 2, 120, 6, 6, 'FD');
  pdf.setFont('helvetica', 'bold'); pdf.setFontSize(10); pdf.setTextColor(45, 156, 95);
  pdf.text('ELECTRONICALLY SIGNED', margin + 14, y + 18);

  // Embed signature image
  try {
    pdf.addImage(sigDataUrl, 'PNG', margin + 14, y + 24, 160, 50);
  } catch (e) {
    pdf.setFont('helvetica', 'italic'); pdf.setFontSize(10); pdf.setTextColor(13, 45, 94);
    pdf.text('[Electronic Signature]', margin + 14, y + 55);
  }

  pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9); pdf.setTextColor(13, 45, 94);
  pdf.text('Signed by:', margin + 14, y + 82);
  pdf.text('Date/Time:', margin + 14, y + 96);
  pdf.text('IP Address:', margin + 14, y + 110);
  pdf.setFont('helvetica', 'normal'); pdf.setTextColor(40, 40, 40);
  pdf.text(doc.signed_by_name || '—', margin + 90, y + 82);
  pdf.text(new Date(doc.signed_at).toLocaleString(), margin + 90, y + 96);
  pdf.text(doc.signed_ip || 'not captured', margin + 90, y + 110);
  y += 130;

  // Footer
  const pageCount = pdf.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    pdf.setPage(i);
    pdf.setFontSize(7); pdf.setTextColor(120, 132, 160);
    pdf.text('JG Restoration · Appleton (920) 428-4200 · Stevens Point (715) 600-3883 · info@jg-restoration.com', pageW / 2, pageH - 24, { align: 'center' });
    pdf.text('Page ' + i + ' of ' + pageCount, pageW - margin, pageH - 24, { align: 'right' });
  }

  return pdf.output('blob');
}

async function uploadSignedPdf(doc, pdfBlob) {
  const p = doc.project || {};
  const safeJob = (p.albi_job_number || doc.project_id).replace(/[^a-zA-Z0-9._-]/g, '_');
  const baseName = cleanFilename(doc.filename).replace(/\.pdf$/i, '');
  const filename = baseName + '_SIGNED.pdf';
  const path = 'projects/' + doc.project_id + '/' + Date.now() + '-' + filename;

  const { error: upErr } = await sb.storage.from('rebuild-documents').upload(path, pdfBlob, {
    contentType: 'application/pdf', upsert: false,
  });
  if (upErr) { console.error('Upload failed:', upErr); return null; }

  const { data: urlData } = sb.storage.from('rebuild-documents').getPublicUrl(path);
  const fileUrl = urlData.publicUrl;

  // Save as a new document entry
  const { data: docRow } = await sb.from('rebuild_documents').insert({
    project_id: doc.project_id,
    category: 'Customer Documents',
    filename,
    file_url: fileUrl,
    file_size_bytes: pdfBlob.size,
    mime_type: 'application/pdf',
    uploaded_by_email: 'sign-system@jg-restoration.com',
    push_status: 'pending',
    signature_status: 'signed',
    signed_at: doc.signed_at,
    signed_by_name: doc.signed_by_name,
  }).select();

  // Push to Albi
  const docId = docRow?.[0]?.id;
  if (docId && p.albi_project_id) {
    try {
      await fetch(ALBI_DOC_HOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          document_id: docId,
          project_id: doc.project_id,
          albi_project_id: p.albi_project_id,
          albi_job_number: p.albi_job_number,
          category: 'Customer Documents',
          filename,
          file_url: fileUrl,
          mime_type: 'application/pdf',
          notes: 'Signed by ' + doc.signed_by_name + ' on ' + new Date(doc.signed_at).toLocaleDateString(),
        }),
        mode: 'no-cors',
      });
      await sb.from('rebuild_documents').update({ push_status: 'sent', pushed_to_albi_at: new Date().toISOString() }).eq('id', docId);
    } catch (e) {
      await sb.from('rebuild_documents').update({ push_status: 'failed' }).eq('id', docId);
    }
  }

  return fileUrl;
}
