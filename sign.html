<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Signature · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<style>
  :root {
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623; --green: #2d9c5f; --red: #d64545;
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --muted: #7884a0; --line: #e3e7f0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--navy); color: #fff; padding: 16px 28px; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 8px rgba(13,45,94,.12); }
  header img { width: 44px; height: 44px; object-fit: contain; background: #fff; padding: 3px; border-radius: 6px; }
  header .brand-name { font-weight: 800; font-size: 18px; }
  header .brand-tag { font-size: 11px; opacity: .75; letter-spacing: .8px; text-transform: uppercase; }

  /* Hero */
  .hero { background: linear-gradient(135deg, #0d2d5e 0%, #1a4080 50%, #0d2d5e 100%); padding: 20px 32px; color: #fff; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 260px; height: 260px; background: radial-gradient(circle, rgba(232,93,4,.22) 0%, transparent 70%); pointer-events: none; }
  .hero-tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--orange); background: rgba(232,93,4,.18); border: 1px solid rgba(232,93,4,.4); padding: 3px 11px; border-radius: 999px; margin-bottom: 8px; position: relative; z-index: 1; }
  .hero h1 { margin: 0 0 4px; color: #fff; font-size: 22px; font-weight: 800; position: relative; z-index: 1; }
  .hero-sub { color: rgba(255,255,255,.75); font-size: 12px; position: relative; z-index: 1; }

  /* Desktop split layout */
  .split { display: flex; height: calc(100vh - 112px); }
  .split-left { flex: 1; overflow: hidden; display: flex; flex-direction: column; border-right: 1px solid var(--line); background: #f0f2f8; }
  .split-left iframe { flex: 1; border: 0; width: 100%; }
  .split-left .no-preview { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 12px; }
  .split-right { width: 400px; min-width: 340px; max-width: 440px; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 14px; background: var(--card); }

  /* Cards */
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 18px 20px; }
  .card h2 { color: var(--navy); font-size: 15px; font-weight: 700; margin-bottom: 14px; }

  /* Reviewed gate */
  .reviewed-gate { padding: 14px 16px; background: #fff8f0; border: 1px solid rgba(232,93,4,.35); border-radius: 8px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
  .reviewed-gate input[type="checkbox"] { margin-top: 2px; transform: scale(1.3); cursor: pointer; flex-shrink: 0; accent-color: var(--orange); }
  .reviewed-gate label { font-size: 13px; color: var(--navy); line-height: 1.5; cursor: pointer; font-weight: 500; }

  /* Sig panel — locked until reviewed */
  .sig-panel { transition: opacity .2s; }
  .sig-panel.locked { opacity: .4; pointer-events: none; user-select: none; }

  /* Form */
  .sig-form { display: flex; flex-direction: column; gap: 12px; }
  .sig-form label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 4px; }
  .sig-form input { width: 100%; border: 1px solid var(--line); border-radius: 7px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--navy); background: #fff; }
  .sig-form input:focus { outline: none; border-color: var(--orange); }

  /* Canvas */
  .sig-canvas-wrap { border: 1.5px solid var(--line); border-radius: 8px; background: #fff; position: relative; }
  .sig-canvas-wrap canvas { display: block; width: 100%; height: 130px; cursor: crosshair; border-radius: 8px; touch-action: none; }
  .sig-canvas-label { position: absolute; top: 8px; left: 12px; font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; pointer-events: none; }
  .sig-canvas-clear { position: absolute; top: 6px; right: 8px; background: none; border: 1px solid var(--line); border-radius: 4px; font-size: 11px; color: var(--muted); padding: 2px 8px; cursor: pointer; }
  .sig-canvas-clear:hover { color: var(--red); border-color: var(--red); }

  /* Buttons */
  .btn { padding: 13px 22px; border-radius: 999px; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid transparent; transition: background .15s, transform .1s; font-family: inherit; }
  .btn.primary { background: var(--orange); color: #fff; width: 100%; margin-top: 4px; }
  .btn.primary:hover:not(:disabled) { background: #d05303; transform: translateY(-1px); }
  .btn.primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* States */
  .success-state { text-align: center; padding: 48px 20px; }
  .success-state .check { font-size: 64px; margin-bottom: 12px; }
  .success-state h2 { color: var(--navy); margin: 0 0 8px; font-size: 22px; }
  .receipt { background: var(--bg); border-radius: 8px; padding: 14px 18px; margin: 16px auto; max-width: 420px; font-size: 13px; color: var(--muted); text-align: left; }
  .receipt b { color: var(--navy); }
  .error-state { text-align: center; padding: 60px 20px; color: var(--muted); max-width: 500px; margin: 0 auto; }
  .error-state h2 { color: var(--navy); margin: 0 0 8px; }

  /* Mobile */
  @media (max-width: 700px) {
    .split { flex-direction: column; height: auto; }
    .split-left { height: 60vh; border-right: none; border-bottom: 1px solid var(--line); }
    .split-right { width: 100%; max-width: 100%; }
    .hero h1 { font-size: 18px; }
  }

  /* Full-page states */
  .full-page { max-width: 600px; margin: 48px auto; padding: 0 20px; }
</style>
</head>

function friendlyDocTitle(filename) {
  const clean = cleanFilename(filename || '').replace(/\.pdf$/i, '');
  if (/^work_auth/i.test(clean)) return 'Authorization to Perform Services & Direction of Payment';
  if (/^ins_recovery/i.test(clean)) return 'Insurance Recovery Agreement';
  if (/^cos(_|$)/i.test(clean)) return 'Certificate of Satisfaction';
  return clean.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

if (!token) {
  main.innerHTML = `<div class="full-page error-state"><h2>Invalid link</h2><p>This signature link is missing or malformed. Please contact JG Restoration.</p></div>`;
} else {
  await render();
}

async function render() {
  const { data: doc, error } = await sb.from('rebuild_documents')
    .select('*, project:rebuild_projects(id, albi_job_number, customer_name, property_address, albi_pm_name, albi_pm_email, albi_project_id)')
    .eq('signature_token', token)
    .maybeSingle();

  if (error || !doc) {
    main.innerHTML = `<div class="full-page error-state"><h2>Not found</h2><p>This link may have expired or already been used. Contact JG Restoration.</p></div>`;
    return;
  }

  if (doc.signature_status === 'signed') {
    main.innerHTML = renderSigned(doc);
    return;
  }

  main.innerHTML = renderForm(doc);
  wireForm(doc);
}

function renderForm(doc) {

  const title = friendlyDocTitle(doc.filename);
  const isPdf = /\.pdf$/i.test(doc.filename);

  return `

    </div>

    <div class="split">
      <div class="split-left">
        ${isPdf
          ? `<iframe src="${doc.file_url}" title="Document preview"></iframe>`
          : `<div class="no-preview"><div style="font-size:48px;">📄</div><div style="font-weight:600;color:var(--navy);">${esc(cleanFilename(doc.filename))}</div><a href="${doc.file_url}" target="_blank" style="color:var(--orange);font-weight:700;">Open document ↗</a></div>`}
      </div>

      <div class="split-right">

function renderSigned(doc) {

function wireForm(doc) {
  const canvas = document.getElementById('sigCanvas');
  const ctx = canvas.getContext('2d');
  const sigPanel = document.getElementById('sigPanel');
  const chkReviewed = document.getElementById('chkReviewed');
  const submitBtn = document.getElementById('sig_submit');
  let drawing = false, hasSig = false;

  ctx.strokeStyle = '#0d2d5e'; ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    ctx.strokeStyle = '#0d2d5e'; ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }

  function refresh() {
    const nameOk = document.getElementById('sigName').value.trim().length > 1;
    submitBtn.disabled = !(chkReviewed.checked && hasSig && nameOk);
  }

  chkReviewed.addEventListener('change', () => {
    sigPanel.classList.toggle('locked', !chkReviewed.checked);
    refresh();
  });

  canvas.addEventListener('mousedown', e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
  canvas.addEventListener('mousemove', e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSig = true; refresh(); });
  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('mouseleave', () => drawing = false);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSig = true; refresh(); }, { passive: false });
  canvas.addEventListener('touchend', () => drawing = false);

  document.getElementById('sigName').addEventListener('input', refresh);

  document.getElementById('sigClear').addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasSig = false; refresh();
  });

  submitBtn.addEventListener('click', async () => {
    const name = document.getElementById('sigName').value.trim();
    if (!name || !hasSig || !chkReviewed.checked) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Generating signed document…';

    try {
      const sigDataUrl = canvas.toDataURL('image/png');
      const now = new Date().toISOString();
      let ipAddr = 'not captured';
      try { const r = await fetch('https://api.ipify.org?format=json'); const j = await r.json(); ipAddr = j.ip || ipAddr; } catch {}

      // Update DB immediately
      await sb.from('rebuild_documents').update({
        signature_status: 'signed',
        signed_at: now,
        signed_by_name: name,
        signed_ip: ipAddr,
        signature_token: null,
      }).eq('signature_token', token);

      doc.signed_at = now; doc.signed_by_name = name; doc.signed_ip = ipAddr;

      // Generate PDF with both signatures
      submitBtn.textContent = 'Uploading…';
      const pdfBlob = await generateSignedPdf(doc, sigDataUrl);
      let signedUrl = null;
      if (pdfBlob) {
        signedUrl = await uploadSignedPdf(doc, pdfBlob);
        if (signedUrl) {
          await sb.from('rebuild_documents').update({ signed_pdf_url: signedUrl }).eq('id', doc.id);
          doc.signed_pdf_url = signedUrl;
          // Email customer a copy
          await emailSignedCopy(doc, signedUrl, name);
        }
      }

      main.innerHTML = renderSigned(doc);
    } catch (err) {
      console.error(err);
      submitBtn.disabled = false;
      submitBtn.textContent = '✓ Sign Document';
      alert('Submission failed: ' + err.message);
    }
  });
}

async function emailSignedCopy(doc, signedUrl, signerName) {
  const p = doc.project || {};
  const recipientEmail = doc.signature_sent_to_email;
  if (!recipientEmail) return;
  const title = friendlyDocTitle(doc.filename);
  const firstName = signerName.split(' ')[0];
  try {
    await fetch(MESSAGE_HOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        project_id: p.id,
        channel: 'email',
        direction: 'outbound',
        recipient_type: 'customer',
        recipient_name: signerName,
        recipient_email: recipientEmail,
        to_email: recipientEmail,
        from_email: 'info@jg-restoration.com',
        from_name: p.albi_pm_name || 'JG Restoration',
        subject: 'Signed Copy: ' + title + ' · JG Restoration',
        body: `<p>Hi ${firstName},</p><p>Thank you for signing <strong>${title}</strong>. A fully executed copy is attached below for your records.</p><p><a href="${signedUrl}" style="color:#e85d04;font-weight:700;">📄 Download Signed Document ↗</a></p><p>If you have any questions, please don't hesitate to reach out.</p>`,
      }),
      mode: 'no-cors',
    });
  } catch (e) { console.warn('Customer email failed:', e); }
}

async function generateSignedPdf(doc, customerSigDataUrl) {
  if (!window.jspdf) { console.error('jsPDF not loaded'); return null; }
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'pt', format: 'letter' });
  const pageW = pdf.internal.pageSize.getWidth();
  const pageH = pdf.internal.pageSize.getHeight();
  const margin = 48;
  let y = margin;
  const p = doc.project || {};
  const title = friendlyDocTitle(doc.filename);
  const hw = (pageW - margin * 2) / 2 - 8;

  // Header
  pdf.setFillColor(13, 45, 94);
  pdf.rect(0, 0, pageW, 70, 'F');
  try { pdf.addImage(JG_LOGO_IMG, 'JPEG', margin - 10, 3, 88, 64); } catch(e) {}
  pdf.setTextColor(255, 255, 255);
  pdf.setFont('helvetica', 'bold'); pdf.setFontSize(16);
  pdf.text('JG Restoration', margin + 84, 34);
  pdf.setFont('helvetica', 'normal'); pdf.setFontSize(8);
  pdf.setTextColor(245, 166, 35);
  pdf.text('FIRE · WATER · MOLD · RECONSTRUCTION', margin + 84, 50);
  pdf.setTextColor(255, 255, 255); pdf.setFontSize(9);
  pdf.text('1720 N Silverspring Dr, Appleton WI 54913  ·  920-428-4200', pageW - margin, 34, { align: 'right' });
  pdf.text('info@jg-restoration.com', pageW - margin, 50, { align: 'right' });
  y = 90;

  // Title
  pdf.setFont('helvetica', 'bold'); pdf.setFontSize(14); pdf.setTextColor(13, 45, 94);
  pdf.text(title, pageW / 2, y, { align: 'center' }); y += 22;

  // Info fields
  const drawField = (label, value, x, fy, w) => {
    pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8); pdf.setTextColor(120, 132, 160);
    pdf.text(label, x, fy);
    pdf.setFont('helvetica', value ? 'bold' : 'normal'); pdf.setFontSize(10);
    pdf.setTextColor(value ? 13 : 180, value ? 45 : 180, value ? 94 : 180);
    pdf.text(value || '________________________________', x, fy + 13);
    pdf.setDrawColor(220, 224, 234); pdf.line(x, fy + 16, x + w, fy + 16);
  };
  drawField('CUSTOMER NAME', p.customer_name || '', margin, y, hw);
  drawField('DATE', new Date(doc.signed_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }), margin + hw + 16, y, hw); y += 36;
  drawField('PROPERTY ADDRESS', p.property_address || '', margin, y, pageW - margin * 2); y += 36;

  // Execution block
  y += 10;
  pdf.setFillColor(240, 250, 244); pdf.setDrawColor(45, 156, 95);
  pdf.roundedRect(margin, y, pageW - margin * 2, 140, 6, 6, 'FD');
  pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9); pdf.setTextColor(45, 156, 95);
  pdf.text('FULLY EXECUTED — BOTH PARTIES HAVE SIGNED', margin + 14, y + 16);

  // JG signature column
  const colW = (pageW - margin * 2 - 20) / 2;
  pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8); pdf.setTextColor(120, 132, 160);
  pdf.text('JG RESTORATION (PRE-SIGNED)', margin + 14, y + 32);
  try { pdf.addImage(JG_SIGNATURE_IMG, 'PNG', margin + 14, y + 38, 120, 20); } catch(e) {}
  pdf.setDrawColor(13, 45, 94); pdf.line(margin + 14, y + 68, margin + 14 + colW - 10, y + 68);
  pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9); pdf.setTextColor(13, 45, 94);
  pdf.text(JG_SIGNER_NAME, margin + 14, y + 80);
  pdf.setFont('helvetica', 'normal'); pdf.setFontSize(8); pdf.setTextColor(80, 80, 80);
  pdf.text('Authorized Representative', margin + 14, y + 90);

  // Customer signature column
  const cx = margin + 14 + colW + 10;
  pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8); pdf.setTextColor(120, 132, 160);
  pdf.text('CUSTOMER SIGNATURE', cx, y + 32);
  try { pdf.addImage(customerSigDataUrl, 'PNG', cx, y + 36, 140, 28); } catch(e) {}
  pdf.setDrawColor(13, 45, 94); pdf.line(cx, y + 68, cx + colW - 10, y + 68);
  pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9); pdf.setTextColor(13, 45, 94);
  pdf.text(doc.signed_by_name || '', cx, y + 80);
  pdf.setFont('helvetica', 'normal'); pdf.setFontSize(8); pdf.setTextColor(80, 80, 80);
  pdf.text('Date: ' + new Date(doc.signed_at).toLocaleDateString(), cx, y + 92);
  pdf.text('IP: ' + (doc.signed_ip || 'not captured'), cx, y + 102);
  y += 150;

  // Legal notice
  pdf.setFont('helvetica', 'italic'); pdf.setFontSize(8); pdf.setTextColor(120, 132, 160);
  const notice = 'This document was electronically signed in accordance with the Electronic Signatures in Global and National Commerce (ESIGN) Act. The electronic signature above constitutes a legal signature and is binding upon the parties.';
  pdf.splitTextToSize(notice, pageW - margin * 2).forEach(line => { pdf.text(line, margin, y); y += 10; });

  // Footer
  pdf.setFontSize(7); pdf.setTextColor(120, 132, 160);
  pdf.text('JG Restoration · JJ Greil Enterprises LLC · 1720 N Silverspring Dr, Appleton WI 54913 · 920-428-4200', pageW / 2, pageH - 24, { align: 'center' });

  return pdf.output('blob');
}

async function uploadSignedPdf(doc, pdfBlob) {
  const p = doc.project || {};
  const baseName = cleanFilename(doc.filename).replace(/\.pdf$/i, '');
  const filename = baseName + '_SIGNED.pdf';
  const path = 'projects/' + doc.project_id + '/' + Date.now() + '-' + filename;

  const { error: upErr } = await sb.storage.from('rebuild-documents').upload(path, pdfBlob, {
    contentType: 'application/pdf', upsert: false,
  });
  if (upErr) { console.error('Upload failed:', upErr); return null; }

  const { data: urlData } = sb.storage.from('rebuild-documents').getPublicUrl(path);
  const fileUrl = urlData.publicUrl;

  // Save as new signed document entry
  const { data: docRow } = await sb.from('rebuild_documents').insert({
    project_id: doc.project_id,
    category: 'Customer Documents',
    filename,
    file_url: fileUrl,
    file_size_bytes: pdfBlob.size,
    mime_type: 'application/pdf',
    uploaded_by_email: 'sign-system@jg-restoration.com',
    push_status: 'pending',
    signature_status: 'signed',
    signed_at: doc.signed_at,
    signed_by_name: doc.signed_by_name,
    signed_pdf_url: fileUrl,
  }).select();

  // Push to Albi
  const docId = docRow?.[0]?.id;
  if (docId && p.albi_project_id) {
    try {
      await fetch(ALBI_DOC_HOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          document_id: docId,
          project_id: doc.project_id,
          albi_project_id: p.albi_project_id,
          albi_job_number: p.albi_job_number,
          category: 'Customer Documents',
          filename,
          file_url: fileUrl,
          mime_type: 'application/pdf',
          notes: 'Electronically signed by ' + doc.signed_by_name + ' on ' + new Date(doc.signed_at).toLocaleDateString(),
        }),
        mode: 'no-cors',
      });
      await sb.from('rebuild_documents').update({ push_status: 'sent', pushed_to_albi_at: new Date().toISOString() }).eq('id', docId);
    } catch (e) {
      await sb.from('rebuild_documents').update({ push_status: 'failed' }).eq('id', docId);
    }
  }

  return fileUrl;
}
