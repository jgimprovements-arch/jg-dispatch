<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<style>
  :root {
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623; --green: #2d9c5f; --red: #d64545;
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --muted: #7884a0; --line: #e3e7f0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--navy); color: #fff; padding: 18px 28px; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 8px rgba(13,45,94,.12); }
  header img { width: 48px; height: 48px; object-fit: contain; background: #fff; padding: 4px; border-radius: 6px; }
  header .brand-name { font-weight: 800; font-size: 19px; letter-spacing: .3px; }
  header .brand-tag { font-size: 11px; opacity: .85; letter-spacing: .8px; text-transform: uppercase; }
  main { max-width: 760px; margin: 0 auto; padding: 24px; }
  .hero {
    background: linear-gradient(135deg, #0d2d5e 0%, #1a4080 50%, #0d2d5e 100%);
    border-radius: 14px; padding: 24px 28px; margin-bottom: 18px; color: #fff;
    position: relative; overflow: hidden; box-shadow: 0 6px 20px rgba(13,45,94,.18);
  }
  .hero::before {
    content: ''; position: absolute; top: -60px; right: -60px;
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(232,93,4,.22) 0%, transparent 70%);

  .hero h1 { margin: 0 0 4px; color: #fff; font-size: 26px; font-weight: 800; letter-spacing: -.3px; position: relative; z-index: 1; }
  .hero-sub { color: rgba(255,255,255,.8); font-size: 13px; position: relative; z-index: 1; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 22px 26px; margin-bottom: 16px; }
  .card h2 { margin: 0 0 14px; color: var(--navy); font-size: 16px; font-weight: 700; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 4px; }
  .info-cell { padding: 10px 14px; background: var(--bg); border-radius: 8px; border: 1px solid var(--line); }
  .info-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; font-weight: 700; margin-bottom: 3px; }
  .info-value { font-size: 14px; color: var(--navy); font-weight: 600; }
  .section-block { background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; font-size: 13px; line-height: 1.6; }
  .section-block h4 { margin: 0 0 6px; color: var(--navy); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
  .sig-form { display: flex; flex-direction: column; gap: 12px; }
  .sig-form label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 4px; }
  .sig-form input { width: 100%; border: 1px solid var(--line); border-radius: 7px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--navy); background: #fff; }
  .sig-form input:focus { outline: none; border-color: var(--orange); }
  .sig-canvas-wrap { border: 1.5px solid var(--line); border-radius: 8px; background: #fff; position: relative; }
  .sig-canvas-wrap canvas { display: block; width: 100%; height: 140px; cursor: crosshair; border-radius: 8px; touch-action: none; }
  .sig-canvas-label { position: absolute; top: 8px; left: 12px; font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; pointer-events: none; }
  .sig-canvas-clear { position: absolute; top: 6px; right: 8px; background: none; border: 1px solid var(--line); border-radius: 4px; font-size: 11px; color: var(--muted); padding: 2px 8px; cursor: pointer; }
  .sig-canvas-clear:hover { color: var(--red); border-color: var(--red); }
  .accept-row { display: flex; align-items: flex-start; gap: 12px; margin: 6px 0; padding: 14px 16px; background: linear-gradient(135deg, #fff8f0 0%, var(--card) 100%); border: 1px solid rgba(232,93,4,.3); border-radius: 8px; }
  .accept-row input[type="checkbox"] { margin-top: 3px; transform: scale(1.3); cursor: pointer; flex-shrink: 0; }
  .accept-row label { font-size: 13px; color: var(--navy); line-height: 1.5; cursor: pointer; font-weight: 500; }
  .btn { padding: 14px 22px; border-radius: 999px; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid transparent; transition: background .15s, transform .15s; font-family: inherit; }
  .btn.primary { background: var(--orange); color: #fff; border-color: var(--orange); width: 100%; margin-top: 6px; }
  .btn.primary:hover:not(:disabled) { background: #d05303; transform: translateY(-1px); }
  .btn.primary:disabled { opacity: .45; cursor: not-allowed; }
  .success-state { text-align: center; padding: 40px 20px; }
  .success-state .check { font-size: 64px; color: var(--green); margin-bottom: 12px; }
  .success-state h2 { color: var(--navy); margin: 0 0 8px; font-size: 22px; }
  .receipt { background: var(--bg); border-radius: 8px; padding: 14px 18px; margin: 16px auto; max-width: 420px; font-size: 13px; color: var(--muted); text-align: left; }
  .receipt b { color: var(--navy); }
  .error-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .error-state h2 { color: var(--navy); margin: 0 0 8px; }
  .footer-note { text-align: center; color: var(--muted); font-size: 11px; padding: 24px 0 40px; line-height: 1.6; }
  .footer-note a { color: var(--navy); text-decoration: none; font-weight: 600; }
  @media (max-width: 600px) {
    main { padding: 14px; }
    .hero { padding: 20px; }
    .hero h1 { font-size: 22px; }
    .info-grid { grid-template-columns: 1fr; }
  }
</style>

function wireForm(proj) {
  // ── Signature canvas ──
  const canvas = document.getElementById('sigCanvas');
  const ctx = canvas.getContext('2d');
  let drawing = false;
  let hasSig = false;

  function resizeCanvas() {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * window.devicePixelRatio;
    canvas.height = rect.height * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    ctx.strokeStyle = '#0d2d5e';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }
  resizeCanvas();

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }

  canvas.addEventListener('mousedown', e => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
  canvas.addEventListener('mousemove', e => { if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSig = true; refreshSubmit(); });
  canvas.addEventListener('mouseup', () => drawing = false);
  canvas.addEventListener('mouseleave', () => drawing = false);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); hasSig = true; refreshSubmit(); }, { passive: false });
  canvas.addEventListener('touchend', () => drawing = false);

  document.getElementById('sigClear').addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hasSig = false;
    refreshSubmit();
  });

  const nameInput = document.getElementById('cos_name');
  const cb = document.getElementById('cos_accept');
  const btn = document.getElementById('cos_submit');

  function refreshSubmit() {
    btn.disabled = !(cb.checked && nameInput.value.trim().length > 1 && hasSig);
  }
  cb.addEventListener('change', refreshSubmit);
  nameInput.addEventListener('input', refreshSubmit);

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = 'Submitting…';

    try {
      const name = nameInput.value.trim();

      // Capture IP
      let ip = null;
      try { const r = await fetch('https://api.ipify.org?format=json'); ip = (await r.json()).ip; } catch {}

      const now = new Date().toISOString();

      // Save signature as PNG data URL
      const sigDataUrl = canvas.toDataURL('image/png');

      const { error } = await sb.from('rebuild_projects').update({
        cos_signed_at: now,
        cos_signed_by: name,
        cos_signed_ip: ip,
      }).eq('id', proj.id);

      if (error) {
        btn.disabled = false; btn.textContent = orig;
        alert('Could not record signature: ' + error.message);
        return;
      }

      // Notify PM
      if (proj.albi_pm_email) {
        try {
          await sb.from('rebuild_notifications').insert({
            project_id: proj.id,
            recipient_email: proj.albi_pm_email.toLowerCase(),
            event_type: 'cos_signed',
            title: `${proj.customer_name || 'Customer'} signed Certificate of Satisfaction`,
            body: `${name} signed the COS for ${proj.albi_job_number || 'project'} at ${new Date(now).toLocaleString()}.`,
          });
        } catch (e) { console.warn('notif insert failed', e); }
      }

      // Generate and upload signed PDF
      btn.textContent = 'Generating signed PDF…';
      try {
        const pdfBlob = await generateCosPdf({ ...proj, cos_signed_at: now, cos_signed_by: name, cos_signed_ip: ip }, sigDataUrl);
        if (pdfBlob) await uploadCosPdf(proj, pdfBlob, name);
      } catch (e) { console.error('PDF generation failed:', e); }

      await render();
    } catch (e) {
      btn.disabled = false; btn.textContent = orig;
      alert('Unexpected error: ' + e.message);
    }
  });
}

// ── PDF Generation ──
async function generateCosPdf(proj, sigDataUrl) {
  if (!window.jspdf) { console.warn('jsPDF not loaded'); return null; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 48;
  let y = margin;

  // Header band
  doc.setFillColor(13, 45, 94);
  doc.rect(0, 0, pageW, 70, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.text('JG Restoration', margin, 36);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(245, 166, 35);
  doc.text('FIRE · WATER · MOLD · RECONSTRUCTION', margin, 52);
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(11);
  doc.text('CERTIFICATE OF SATISFACTION', pageW - margin, 36, { align: 'right' });
  doc.setFontSize(8);
  doc.text(new Date().toLocaleDateString(), pageW - margin, 52, { align: 'right' });
  y = 92;

  // Project info grid
  const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  const fields = [
    ['Customer', proj.customer_name || '—'],
    ['Insurance Company', proj.insurance_company || '—'],
    ['Date', today],
    ['Date of Loss', proj.date_of_loss ? new Date(proj.date_of_loss + 'T00:00:00').toLocaleDateString() : '—'],
    ['Claim #', proj.claim_number || '—'],
    ['Property Address', proj.property_address || '—'],
  ];

  // Draw info grid
  doc.setDrawColor(226, 230, 238);
  const colW = (pageW - margin * 2) / 2;
  fields.forEach((([label, val], i) => {
    const col = i % 2;
    const row = Math.floor(i / 2);
    const x = margin + col * colW;
    const cellY = y + row * 44;
    doc.setFillColor(244, 246, 251);
    doc.roundedRect(x + (col ? 6 : 0), cellY, colW - (col ? 6 : 6), 38, 4, 4, 'FD');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(120, 132, 160);
    doc.text(label.toUpperCase(), x + (col ? 14 : 8), cellY + 13);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor(13, 45, 94);
    doc.text(String(val).slice(0, 50), x + (col ? 14 : 8), cellY + 28);
  }));
  y += Math.ceil(fields.length / 2) * 44 + 16;

  // Sections
  const sections = [
    ['SATISFACTION STATEMENT', 'I, the undersigned Customer, hereby certify that JG Restoration (JJ Greil Enterprises LLC), its installer, and any subcontractors have furnished all F&I Goods and provided all Installation Services as specified in the Contract and that all work required by the Contract (and any approved change order) as well as any item identified in the post completion checklist has been completed to my satisfaction.'],
    ['AUTHORIZATION TO PAY', 'I, the undersigned Customer, hereby authorize direct payment for these services from the insurance company to be made directly to JG Restoration. This Certificate of Satisfaction constitutes my acceptance of the completed scope of work agreed to in the original construction contract and acknowledges my agreement with full payment of my insurance proceeds to JG Restoration.'],
    ['WAIVER OF LIEN', 'Upon receipt by the undersigned of a check from JG Restoration or its affiliate on behalf of the customer, and when the check has been properly endorsed and has been paid by the bank upon which it is drawn, this document shall become effective to waive, relinquish, and forever release all liens and all rights and claims of liens that I, the undersigned, now have or may from now on have for any and all labor and/or materials furnished. I agree to cause the prompt release of any liens that may be filed against the premises by any subcontractor, laborer, mechanic or material supplier claiming the right to file such a lien through work related to this contract.'],
    ['LIMITED WARRANTY', 'Upon receipt of payment in full for Installation Services, and effective as of the date of this signed Certificate of Satisfaction, Customer is provided a Limited One (1) Year Workmanship Warranty on all work performed by Contractor and full Material Manufacturer Warranty on all materials furnished and installed relating to the Installation Services.'],
  ];

  sections.forEach(([heading, text]) => {
    if (y > pageH - margin - 60) { doc.addPage(); y = margin; }
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(13, 45, 94);
    doc.text(heading, margin, y); y += 13;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(40, 40, 40);
    const lines = doc.splitTextToSize(text, pageW - margin * 2);
    lines.forEach(line => {
      if (y > pageH - margin - 30) { doc.addPage(); y = margin; }
      doc.text(line, margin, y); y += 12;
    });
    y += 10;
  });

  // Signature block
  if (y > pageH - margin - 160) { doc.addPage(); y = margin; }
  y += 10;
  const signedDate = new Date(proj.cos_signed_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  const day = new Date(proj.cos_signed_at).getDate();
  const month = new Date(proj.cos_signed_at).toLocaleDateString('en-US', { month: 'long' });
  const year = new Date(proj.cos_signed_at).getFullYear();

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(10);
  doc.setTextColor(13, 45, 94);
  doc.text(`WITNESS OUR HAND(S) BELOW ON THIS ${day} DAY OF ${month.toUpperCase()}, ${year}.`, margin, y);
  y += 20;

  // Two-column signature area
  const halfW = (pageW - margin * 2 - 20) / 2;

  // Contractor side (left)
  doc.setFillColor(244, 246, 251);
  doc.roundedRect(margin, y, halfW, 120, 6, 6, 'FD');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(120, 132, 160);
  doc.text("CONTRACTOR'S AUTHORIZED REPRESENTATIVE", margin + 10, y + 16);
  doc.setDrawColor(13, 45, 94);
  doc.line(margin + 10, y + 70, margin + halfW - 10, y + 70);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(40, 40, 40);
  doc.text('Signature', margin + 10, y + 82);
  doc.line(margin + 10, y + 105, margin + halfW - 10, y + 105);
  doc.text('Print Name', margin + 10, y + 117);

  // Customer side (right)
  const rightX = margin + halfW + 20;
  doc.setFillColor(240, 250, 244);
  doc.setDrawColor(45, 156, 95);
  doc.roundedRect(rightX, y, halfW, 120, 6, 6, 'FD');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(45, 156, 95);
  doc.text('**CUSTOMER — ELECTRONICALLY SIGNED', rightX + 10, y + 16);

  // Embed signature image
  try {
    doc.addImage(sigDataUrl, 'PNG', rightX + 10, y + 22, halfW - 20, 44);
  } catch (e) {
    doc.setFont('helvetica', 'italic'); doc.setFontSize(9); doc.setTextColor(13, 45, 94);
    doc.text('[Electronic Signature]', rightX + 10, y + 50);
  }

  doc.setDrawColor(45, 156, 95);
  doc.line(rightX + 10, y + 70, rightX + halfW - 10, y + 70);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(13, 45, 94);
  doc.text(proj.cos_signed_by || '—', rightX + 10, y + 82);
  doc.line(rightX + 10, y + 90, rightX + halfW - 10, y + 90);
  doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(40, 40, 40);
  doc.text('Print Name', rightX + 10, y + 102);
  y += 130;

  // E-signature verification block
  doc.setFillColor(235, 248, 240);
  doc.setDrawColor(45, 156, 95);
  doc.roundedRect(margin, y, pageW - margin * 2, 56, 6, 6, 'FD');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(45, 156, 95);
  doc.text('ELECTRONIC SIGNATURE VERIFICATION', margin + 12, y + 14);
  doc.setFont('helvetica', 'normal'); doc.setTextColor(40, 40, 40);
  doc.text(`Signed by: ${proj.cos_signed_by || '—'}`, margin + 12, y + 27);
  doc.text(`Date/Time: ${new Date(proj.cos_signed_at).toLocaleString()}`, margin + 12, y + 38);
  doc.text(`IP Address: ${proj.cos_signed_ip || 'not captured'}`, margin + 12, y + 49);
  doc.text(`Project: ${proj.albi_job_number || proj.id}`, margin + 280, y + 27);
  doc.text(`Claim #: ${proj.claim_number || '—'}`, margin + 280, y + 38);

  // Footer
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(7); doc.setTextColor(120, 132, 160);
    doc.text('JG Restoration · JJ Greil Enterprises LLC · Appleton (920) 428-4200 · Stevens Point (715) 600-3883 · info@jg-restoration.com', pageW / 2, pageH - 24, { align: 'center' });
    doc.text(`Page ${i} of ${pageCount}`, pageW - margin, pageH - 24, { align: 'right' });
    doc.text('**By signing this Certificate of Satisfaction, you are not waiving any warranty rights you may have under the Contract.', pageW / 2, pageH - 14, { align: 'center' });
  }

  return doc.output('blob');
}

async function uploadCosPdf(proj, pdfBlob, signerName) {
  const safeJob = (proj.albi_job_number || proj.id).replace(/[^a-zA-Z0-9._-]/g, '_');
  const filename = `COS_${safeJob}_signed.pdf`;
  const path = `projects/${proj.id}/${Date.now()}-${filename}`;

  const { error: upErr } = await sb.storage.from('rebuild-documents').upload(path, pdfBlob, {
    contentType: 'application/pdf',
    upsert: false,
  });
  if (upErr) { console.error('Storage upload failed:', upErr); return; }

  const { data: urlData } = sb.storage.from('rebuild-documents').getPublicUrl(path);
  const fileUrl = urlData.publicUrl;

  const { data: docRow, error: insErr } = await sb.from('rebuild_documents').insert({
    project_id: proj.id,
    category: 'Signed Documents',
    filename,
    file_url: fileUrl,
    file_size_bytes: pdfBlob.size,
    mime_type: 'application/pdf',
    uploaded_by_email: 'cos-system@jg-restoration.com',
    push_status: 'pending',
    customer_visible: false,
  }).select();

  if (insErr) { console.error('Doc insert failed:', insErr); return; }

  const docId = docRow?.[0]?.id;
  if (docId && proj.albi_project_id) {
    try {
      await fetch(ALBI_DOC_HOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          document_id: docId,
          project_id: proj.id,
          albi_project_id: proj.albi_project_id,
          albi_job_number: proj.albi_job_number,
          category: 'Signed Documents',
          filename,
          file_url: fileUrl,
          mime_type: 'application/pdf',
          notes: `Certificate of Satisfaction signed by ${signerName} on ${new Date().toLocaleDateString()}`,
        }),
        mode: 'no-cors',
      });
      await sb.from('rebuild_documents').update({
        push_status: 'sent',
        pushed_to_albi_at: new Date().toISOString(),
      }).eq('id', docId);
    } catch (e) {
      console.error('Albi push failed:', e);
      await sb.from('rebuild_documents').update({ push_status: 'failed' }).eq('id', docId);
    }
  }
}
