<style>

:root{
  --navy:#0d2d5e;--orange:#e85d04;--gold:#f5a623;
  --bg:#f0ede8;--s1:#faf9f7;--s2:#f0ede8;--s3:#e8e4df;
  --brd:rgba(13,45,94,.12);--brdH:rgba(13,45,94,.3);
  --acc:#e85d04;--accD:rgba(232,93,4,.08);
  --txt:#0d1f3c;--dim:#6b7a96;--mut:#a0abbf;
  --red:#c02020;--redD:rgba(192,32,32,.08);
  --grn:#2e7d32;--grnD:rgba(46,125,50,.08);
  --wrn:#e65100;--wrnD:rgba(230,81,0,.08);
  --blu:#1565c0;--bluD:rgba(21,101,192,.08);
  --purp:#6a1b9a;--purpD:rgba(106,27,154,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;padding:16px 20px;}
.mono{font-family:'DM Mono',monospace}
.container{max-width:1020px;margin:0 auto;padding-left:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
input[type=text],input[type=password]{padding:10px 12px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:13px;font-family:'DM Mono',monospace;outline:none}
input:focus{border-color:var(--acc)!important;box-shadow:0 0 0 2px var(--accD)}
textarea{width:100%;min-height:60px;padding:10px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:12px;font-family:'DM Sans',sans-serif;resize:vertical;line-height:1.5;outline:none;box-sizing:border-box}
textarea:focus{border-color:var(--acc);box-shadow:0 0 0 2px var(--accD)}
input[type=file]{display:none}
.act-btn{border:1px solid var(--brd);background:transparent;color:var(--dim);padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;margin-right:8px}
.act-btn:hover{border-color:var(--brdH);color:var(--txt)}
.act-btn.sc{background:var(--grnD);border-color:var(--grn);color:var(--grn)}
.act-btn.sj{background:var(--wrnD);border-color:var(--wrn);color:var(--wrn)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:'DM Mono',monospace}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--mut);border-radius:3px}

#jg-login{position:fixed;inset:0;background:rgba(13,29,60,.96);align-items:center;justify-content:center;z-index:9999;display:none;}
#jg-login-box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4);}
#jg-login-err{font-size:12px;color:#c0392b;margin-top:12px;min-height:16px;}

/* ── COLLAPSIBLE SIDEBAR ── */
#jg-sidebar{
  position:fixed;left:0;top:0;bottom:0;
  width:48px; /* collapsed = icon only */
  background:#0d2d5e;
  display:flex;flex-direction:column;
  z-index:90;
  box-shadow:2px 0 12px rgba(0,0,0,.15);
  transition:width .22s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
  white-space:nowrap;
}
#jg-sidebar:hover,
#jg-sidebar.expanded{
  width:200px;
  z-index:200;
  box-shadow:4px 0 24px rgba(0,0,0,.3);
}
#jg-sidebar .sb-logo{
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;
  min-height:52px;flex-shrink:0;
}
#jg-sidebar .sb-logo img{
  height:28px;width:28px;
  object-fit:contain;flex-shrink:0;
  border-radius:4px;
}
#jg-sidebar .sb-sec{
  font-size:9px;font-weight:700;color:rgba(255,255,255,.3);
  text-transform:uppercase;letter-spacing:.1em;
  padding:12px 14px 4px;
  font-family:monospace;
  opacity:0;
  transition:opacity .15s .1s;
}
#jg-sidebar:hover .sb-sec,
#jg-sidebar.expanded .sb-sec{opacity:1;}
#jg-sidebar a.sb-lnk{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;
  font-size:12px;font-weight:500;
  color:rgba(255,255,255,.65);
  text-decoration:none;
  border-left:3px solid transparent;
  transition:all .15s;
  flex-shrink:0;
}
#jg-sidebar a.sb-lnk:hover{
  background:rgba(255,255,255,.08);color:#fff;
  border-left-color:rgba(255,255,255,.3);
}
#jg-sidebar a.sb-lnk.active{
  background:rgba(255,255,255,.12);color:#fff;
  border-left-color:#e85d04;font-weight:600;
}
#jg-sidebar .sb-icon{
  font-size:16px;width:20px;text-align:center;flex-shrink:0;
}
#jg-sidebar .sb-label{
  opacity:0;transition:opacity .15s .05s;
  overflow:hidden;
}
#jg-sidebar:hover .sb-label,
#jg-sidebar.expanded .sb-label{opacity:1;}
#jg-sidebar .sb-btm{
  margin-top:auto;padding:10px 14px;
  border-top:1px solid rgba(255,255,255,.1);
  flex-shrink:0;
}
#jg-sidebar .sb-user{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:rgba(255,255,255,.55);
  cursor:pointer;padding:4px 0;
}
#jg-sidebar .sb-user:hover{color:#fff;}
#jg-sidebar .sb-user-label{
  opacity:0;transition:opacity .15s .05s;overflow:hidden;
}
#jg-sidebar:hover .sb-user-label,
#jg-sidebar.expanded .sb-user-label{opacity:1;}

/* ── QA DISPATCH STYLING ── */
.qa-hdr{background:var(--navy);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:95;}
.qa-hdr-l{display:flex;align-items:center;gap:10px;}
.qa-logo-mk{width:26px;height:26px;background:var(--orange);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.qa-hdr-title{font-size:13px;font-weight:600;color:#fff;letter-spacing:-.3px;}
.qa-hdr-title span{color:var(--gold);}
.qa-pill{font-size:10px;padding:2px 8px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);border-radius:20px;border:1px solid rgba(255,255,255,.18);}
.qa-hdr-r{display:flex;align-items:center;gap:6px;}
.qa-body{padding:14px 16px;max-width:920px;margin:0 auto;}
.qa-card{background:var(--s1);border:1px solid var(--brd);border-radius:10px;box-shadow:0 1px 3px rgba(13,45,94,.08),0 4px 16px rgba(13,45,94,.06);overflow:hidden;margin-bottom:14px;}
.qa-card-hd{background:var(--navy);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;}
.qa-card-hd-title{font-size:11px;font-weight:600;color:#fff;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;}
.qa-card-body{padding:16px;}
.qa-upload-zone{border:2px dashed var(--brd);border-radius:8px;padding:26px 16px;text-align:center;cursor:pointer;transition:all .15s;background:transparent;}
.qa-upload-zone:hover{border-color:var(--orange);background:rgba(232,93,4,.04);}
.qa-upload-zone.loaded{border-style:solid;border-color:var(--grn);background:rgba(46,125,50,.04);text-align:left;padding:12px 16px;}
.qa-btn{padding:8px 18px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;}
.qa-btn-primary{background:var(--orange);color:#fff;}
.qa-btn-primary:hover{background:#c94a00;}
.qa-btn-primary:disabled{opacity:.45;cursor:default;}
.qa-btn-ghost{background:transparent;border:1px solid var(--brd);color:var(--dim);}
.qa-btn-ghost:hover{border-color:var(--navy);color:var(--navy);}
.qa-btn-green{background:var(--grn);color:#fff;}
.qa-btn-navy{background:var(--navy);color:#fff;}
.qa-step-bar{display:flex;gap:6px;margin-bottom:16px;}
.qa-step{flex:1;padding:8px 10px;border-radius:6px;border:1px solid var(--brd);text-align:center;background:var(--s2);}
.qa-step.active{background:var(--s1);border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.12);}
.qa-step.done{background:rgba(46,125,50,.06);border-color:var(--grn);}
.qa-step-lbl{font-size:11px;font-weight:600;color:var(--dim);font-family:'DM Mono',monospace;}
.qa-step.active .qa-step-lbl{color:var(--orange);}
.qa-step.done .qa-step-lbl{color:var(--grn);}
.qa-gap-row{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:14px;margin-bottom:8px;border-left:4px solid var(--brd);}
.qa-gap-row.HIGH{border-left-color:var(--red);}
.qa-gap-row.MEDIUM{border-left-color:var(--wrn);}
.qa-gap-row.LOW{border-left-color:var(--blu);}
.qa-gap-row.MANDATORY{border-left-color:var(--purp);}
.sev-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.04em;}
.sev-HIGH{background:var(--redD);color:var(--red);}
.sev-MEDIUM{background:var(--wrnD);color:var(--wrn);}
.sev-LOW{background:var(--bluD);color:var(--blu);}
.sev-MANDATORY{background:var(--purpD);color:var(--purp);}
.qa-filter-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.qa-filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--brd);background:var(--s1);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Mono',monospace;color:var(--dim);transition:all .15s;}
.qa-filter-btn.on{background:var(--navy);border-color:var(--navy);color:#fff;}
.qa-stat-row{display:flex;gap:0;border:1px solid var(--brd);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.qa-stat-box{flex:1;padding:10px 14px;border-right:1px solid var(--brd);background:var(--s1);}
.qa-stat-box:last-child{border-right:none;}
.qa-stat-val{font-size:22px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace;}
.qa-stat-val.red{color:var(--red);}
.qa-stat-val.grn{color:var(--grn);}
.qa-stat-lbl{font-size:9px;font-weight:500;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
.qa-progress-bar{background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.qa-spin{width:16px;height:16px;border:2px solid var(--brd);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg)}}
.qa-evidence-box{background:rgba(21,101,192,.04);border:1px solid rgba(21,101,192,.14);border-radius:6px;padding:9px 12px;margin-top:8px;}
.qa-defense-box{background:rgba(46,125,50,.04);border:1px solid rgba(46,125,50,.14);border-radius:6px;padding:9px 12px;margin-top:8px;}
.qa-dispute-box{background:rgba(176,106,0,.04);border:1px solid rgba(176,106,0,.14);border-radius:6px;padding:9px 12px;margin-top:8px;}
.qa-textarea{width:100%;padding:10px 12px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:12px;font-family:'DM Sans',sans-serif;resize:vertical;line-height:1.6;outline:none;box-sizing:border-box;}
.qa-textarea:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.1);}
.qa-input{width:100%;padding:9px 12px;border-radius:6px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box;}
.qa-input:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.1);}
.qa-label{display:block;font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;font-family:'DM Mono',monospace;}
.no-op-badge{font-size:9px;padding:2px 8px;background:rgba(106,27,154,.1);border:1px solid rgba(106,27,154,.25);color:var(--purp);border-radius:20px;font-weight:700;font-family:'DM Mono',monospace;}
.qa-defend-btn{padding:5px 12px;border-radius:5px;border:1px solid var(--grn);background:rgba(46,125,50,.06);color:var(--grn);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.qa-defend-btn.on{background:var(--grn);color:#fff;}
.qa-concede-btn{padding:5px 12px;border-radius:5px;border:1px solid var(--wrn);background:rgba(176,106,0,.06);color:var(--wrn);font-size:11px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.qa-concede-btn.on{background:var(--wrn);color:#fff;}
input[type=file]{display:none}


</style>

<script>
const _JG_KEY='jg_platform_user',_JG_EXP='jg_platform_exp';
function jgGoogleCb(r){try{const p=JSON.parse(atob(r.credential.split('.')[1]));if(!p.email.endsWith('@jg-restoration.com')){document.getElementById('jg-login-err').textContent='Access restricted to @jg-restoration.com accounts.';return;}const u={name:p.name||p.given_name,email:p.email,picture:p.picture||''};localStorage.setItem(_JG_KEY,JSON.stringify(u));localStorage.setItem(_JG_EXP,String(Date.now()+43200000));jgHideLogin();jgShowUser(u);}catch(e){document.getElementById('jg-login-err').textContent='Sign in failed.';}}
function jgCheckAuth(){const r=localStorage.getItem(_JG_KEY),e=localStorage.getItem(_JG_EXP);if(r&&e&&Date.now()<parseInt(e)){jgHideLogin();jgShowUser(JSON.parse(r));return true;}jgShowLogin();return false;}
function jgShowLogin(){const e=document.getElementById('jg-login');if(e)e.style.display='flex';}
function jgHideLogin(){const e=document.getElementById('jg-login');if(e)e.style.display='none';}
function jgShowUser(u){const n=document.getElementById('sb-nm'),a=document.getElementById('sb-av');if(n)n.textContent=u.name?u.name.split(' ')[0]:u.email.split('@')[0];if(a)a.innerHTML=u.picture?'<img src="'+u.picture+'" style="width:22px;height:22px;border-radius:50%;">':'👤';}
function jgSignOut(){if(confirm('Sign out?')){localStorage.removeItem(_JG_KEY);localStorage.removeItem(_JG_EXP);window.location.href='hub.html';}}
window.addEventListener('storage',e=>{if(e.key===_JG_KEY){if(e.newValue){jgHideLogin();jgShowUser(JSON.parse(e.newValue));}else jgShowLogin();}});
Object.defineProperty(window,'currentUser',{get:()=>{try{return JSON.parse(localStorage.getItem(_JG_KEY)||'null')?.name||null;}catch(e){return null;}},configurable:true});
function jgSignOut(){if(confirm('Sign out?')){localStorage.removeItem(_JG_KEY);localStorage.removeItem(_JG_EXP);window.location.href='hub.html';}}
function jgShowUser(u){var n=document.getElementById('sb-nm'),a=document.getElementById('sb-av');if(n)n.textContent=u.name?u.name.split(' ')[0]:u.email.split('@')[0];if(a&&u.picture)a.innerHTML='<img src="'+u.picture+'" style="width:22px;height:22px;border-radius:50%;">';}
async function loadApiKey(){
  var c=localStorage.getItem('jg_key');
  if(c&&c.startsWith('sk-')){S.apiKey=c;return true;}
  try{
    var u=JSON.parse(localStorage.getItem('jg_platform_user')||'null');
    if(!u||!u.email)return false;
    var r=await fetch('https://nuykvchgecpiuikoerze.supabase.co/rest/v1/user_settings?email=eq.'+encodeURIComponent(u.email)+'&select=anthropic_key',
      {headers:{'apikey':'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s','Authorization':'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s'}});
    if(r.ok){var rows=await r.json();if(rows.length&&rows[0].anthropic_key){S.apiKey=rows[0].anthropic_key;localStorage.setItem('jg_key',rows[0].anthropic_key);return true;}}
  }catch(e){}

function extractJSON(text){
  // Remove markdown code fences
  let t=text.replace(/```json/g,'').replace(/```/g,'').trim();
  // Try direct parse first
  try{return JSON.parse(t)}catch(e){}
  // Find first { and last } to extract JSON object
  const start=t.indexOf('{');const end=t.lastIndexOf('}');
  if(start!==-1&&end>start){try{return JSON.parse(t.substring(start,end+1))}catch(e){}}
  // Find first [ and last ] for array
  const aStart=t.indexOf('[');const aEnd=t.lastIndexOf(']');
  if(aStart!==-1&&aEnd>aStart){try{return JSON.parse(t.substring(aStart,aEnd+1))}catch(e){}}
  throw new Error('Could not parse AI response as JSON. Response started with: '+t.substring(0,100))
}

function generateRebuildCSV() {
  if(!S.rebuildResult||S.rebuildResult.error)return;
  var rb=S.rebuildResult;
  var rebName=S.proj.endsWith('-REB')?S.proj:S.proj.replace(/-WTR$/,'-REB').replace(/-FRE$/,'-REB').replace(/-MLD$/,'-REB').replace(/-CON$/,'-REB').replace(/-CT3$/,'-REB');
  var today=new Date().toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'numeric'});

  // Match template format: Date,Item,Group,Category,Description,Unit,Unit Price,Quantity,Tax
  var rows=[];
  rows.push(['Date','Item','Group','Category','Description','Unit','Unit Price','Quantity','Tax']);

  (rb.line_items||[]).forEach(function(li){
    function esc(v){var s=String(v||'');return(s.includes(',')||s.includes('"'))?'"'+s.replace(/"/g,'""')+'"':s;}
    rows.push([
      today,
      esc((li.cat||'')+(li.sel?' '+li.sel:'')),  // Item = xactimate code e.g. "DRY HNG"
      esc(li.room||''),                            // Group = room/area
      esc(li.activity||'Labor'),                   // Category = Labor/Material
      esc(li.description||''),
      esc(li.unit||'SF'),
      li.unit_cost||0,
      li.qty||0,
      li.sales_tax||0
    ]);
  });

  // Additional items
  (rb.additional_items||[]).forEach(function(ai){
    if(!ai.description)return;
    function esc(v){var s=String(v||'');return(s.includes(',')||s.includes('"'))?'"'+s.replace(/"/g,'""')+'"':s;}
    rows.push([
      today,
      esc(ai.description),
      'Additional',
      'Material',
      esc(ai.notes||ai.description),
      'EA',
      ai.estimated_cost||0,
      ai.quantity||1,
      0
    ]);
  });

  var csv=rows.map(function(r){return r.join(',');}).join('\r\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download=rebName+'_Rebuild_Estimate.csv';
  a.click();
  URL.revokeObjectURL(url);
}

    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">';
    h+='<div class="qa-upload-zone '+(S.enc?'loaded':'')+'" onclick="document.getElementById(\'encF\').click()"><input type="file" id="encF" accept=".pdf" onchange="if(this.files[0]){S.enc=this.files[0];draw()}">'+encZ+'</div>';
    h+='<div class="qa-upload-zone '+(S.est?'loaded':'')+'" onclick="document.getElementById(\'estF\').click()"><input type="file" id="estF" accept=".pdf" onchange="if(this.files[0]){S.est=this.files[0];draw()}">'+estZ+'</div>';
    h+='</div>';
    if(S.busy&&S.prog)h+='<div class="qa-progress-bar"><div class="qa-spin"></div><span style="font-size:12px;color:var(--orange);font-family:\'DM Mono\',monospace;">'+S.prog+'</span></div>';
    if(S.err)h+='<div style="padding:12px;border-radius:6px;background:var(--redD);color:var(--red);font-size:12px;margin-bottom:12px;">'+S.err+'</div>';
    h+='<button class="qa-btn qa-btn-primary" style="padding:11px 32px;font-size:13px;width:100%;" onclick="runRecon()"'+((!S.enc||!S.est||!S.proj||S.busy)?' disabled':'')+'>'+( S.busy?'Generating... (30-60 sec)':'🏗️ Generate Reconstruction Estimate →')+'</button>';
    h+='</div></div>';
  }
  if(S.rebuildResult&&!S.rebuildResult.error){
    var rb=S.rebuildResult;
    var rebName=S.proj.endsWith('-REB')?S.proj:S.proj.replace(/-WTR$/,'-REB').replace(/-FRE$/,'-REB').replace(/-MLD$/,'-REB').replace(/-CON$/,'-REB').replace(/-CT3$/,'-REB');
    h+='<div class="qa-stat-row" style="margin-bottom:14px;">';
    h+='<div class="qa-stat-box"><div class="qa-stat-val" style="color:var(--purp);">'+(rb.rebuild_summary&&rb.rebuild_summary.total_estimated||'—')+'</div><div class="qa-stat-lbl">Total Estimated</div></div>';
    h+='<div class="qa-stat-box"><div class="qa-stat-val">'+(rb.rebuild_summary&&rb.rebuild_summary.total_rooms||0)+'</div><div class="qa-stat-lbl">Rooms</div></div>';
    h+='<div class="qa-stat-box"><div class="qa-stat-val">'+((rb.line_items||[]).length)+'</div><div class="qa-stat-lbl">Line Items</div></div>';
    h+='<div class="qa-stat-box"><div class="qa-stat-val">10+10</div><div class="qa-stat-lbl">O&amp;P</div></div>';
    h+='</div>';
    h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">';
    h+='<button class="qa-btn qa-btn-navy" onclick="generateRebuildPDF()">📄 Download PDF</button>';
    h+='<button class="qa-btn qa-btn-primary" onclick="generateRebuildPDF();setTimeout(function(){window.open(\'https://drive.google.com/drive/folders/1h6Vb0m-bIeoFIqIFyiteKMkvGwoeIUkz\',\'_blank\')},500)">PDF + Drive</button>';
    h+='<button class="qa-btn qa-btn-green" onclick="generateRebuildExcel()">📊 Download Excel</button>';
    h+='<button class="qa-btn qa-btn-ghost" onclick="generateRebuildExcel();setTimeout(function(){window.open(\'https://drive.google.com/drive/folders/1h6Vb0m-bIeoFIqIFyiteKMkvGwoeIUkz\',\'_blank\')},500)">Excel + Drive</button>';
    h+='<button class="qa-btn qa-btn-ghost" onclick="generateRebuildCSV()">📋 Download CSV</button>';
    h+='<button class="qa-btn qa-btn-ghost" style="margin-left:auto;" onclick="S.rebuildResult=null;S.enc=null;S.est=null;S.proj=\'\';S.err=null;draw()">← New Estimate</button>';
    h+='</div>';
    h+='<div style="background:rgba(232,93,4,.06);border:1.5px solid rgba(232,93,4,.3);border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;">';
    h+='<span style="font-size:18px;flex-shrink:0;">📌</span><div>';
    h+='<div style="font-size:12px;font-weight:700;color:var(--orange);margin-bottom:4px;">Next Steps in Albi</div>';
    h+='<ol style="font-size:11px;color:var(--dim);line-height:1.8;padding-left:16px;margin:0;">';
    h+='<li>Open <strong>'+S.proj+'</strong> in Albi → click Clone</li>';
    h+='<li>Change project type to <strong>Reconstruction</strong></li>';
    h+='<li>Rename to <strong>'+rebName+'</strong></li>';
    h+='<li>Assign: Anthony Alvarez (Estimator), Josh, Hannah, Lisa (Billing)</li>';
    h+='<li style="color:var(--orange);font-weight:600;">Upload Rebuild PDF + Excel to new project Documents tab</li>';
    h+='</ol></div></div>';
    if(rb.rebuild_summary&&rb.rebuild_summary.narrative){
      h+='<div class="qa-card" style="margin-bottom:12px;"><div class="qa-card-hd"><span class="qa-card-hd-title">Scope Narrative</span></div>';
      h+='<div class="qa-card-body" style="font-size:12px;color:var(--txt);line-height:1.7;">'+rb.rebuild_summary.narrative+'</div></div>';
    }
    if((rb.room_scopes||[]).length>0){
      h+='<div class="qa-card" style="margin-bottom:12px;"><div class="qa-card-hd"><span class="qa-card-hd-title">Room-by-Room Scope</span></div><div class="qa-card-body" style="padding:10px;">';
      (rb.room_scopes||[]).forEach(function(rs){
        h+='<div style="background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:12px;margin-bottom:6px;border-left:3px solid var(--purp);">';
        h+='<div style="display:flex;justify-content:space-between;margin-bottom:4px;">';
        h+='<span style="font-weight:700;color:var(--navy);">'+rs.room+'</span>';
        h+='<span style="font-weight:700;color:var(--purp);">'+(rs.room_total||'')+'</span></div>';
        h+='<div style="font-size:11px;color:var(--dim);">'+(rs.narrative||'')+'</div></div>';
      });
      h+='</div></div>';
    }
    if((rb.line_items||[]).length>0){
      h+='<div class="qa-card" style="margin-bottom:12px;"><div class="qa-card-hd"><span class="qa-card-hd-title">Xactimate Line Items ('+(rb.line_items||[]).length+')</span></div>';
      h+='<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:11px;">';
      h+='<thead><tr style="background:var(--navy);color:#fff;">';
      ['#','Room','Code','Description','Qty','Unit','$/Unit','RCV'].forEach(function(c){h+='<th style="padding:7px 8px;text-align:left;font-size:9px;text-transform:uppercase;">'+c+'</th>';});
      h+='</tr></thead><tbody>';
      (rb.line_items||[]).forEach(function(li,i){
        h+='<tr style="background:'+(i%2===0?'var(--s1)':'var(--s2)')+';border-bottom:1px solid var(--brd);">';
        h+='<td style="padding:5px 8px;color:var(--dim);">'+(li.line_num||i+1)+'</td>';
        h+='<td style="padding:5px 8px;font-size:10px;color:var(--dim);">'+(li.room||'')+'</td>';
        h+='<td style="padding:5px 8px;font-family:\'DM Mono\',monospace;color:var(--blu);font-size:10px;">'+(li.cat||'')+' '+(li.sel||'')+'</td>';
        h+='<td style="padding:5px 8px;">'+(li.description||'')+'</td>';
        h+='<td style="padding:5px 8px;">'+(li.qty||0)+'</td>';
        h+='<td style="padding:5px 8px;color:var(--dim);font-size:10px;">'+(li.unit||'')+'</td>';
        h+='<td style="padding:5px 8px;font-family:\'DM Mono\',monospace;">$'+(li.unit_cost||0)+'</td>';
        h+='<td style="padding:5px 8px;font-family:\'DM Mono\',monospace;font-weight:600;color:var(--purp);">$'+(li.rcv||0)+'</td>';
        h+='</tr>';
      });
      h+='</tbody></table></div></div>';
    }
    if((rb.mandatory_reminders||[]).length>0){
      h+='<div class="qa-card" style="margin-bottom:12px;"><div class="qa-card-hd" style="background:#b06a00;"><span class="qa-card-hd-title">⚠ Mandatory Reminders</span></div><div class="qa-card-body" style="padding:10px;">';
      (rb.mandatory_reminders||[]).forEach(function(mr){
        var inc=mr.included;
        h+='<div style="background:var(--s1);border:1px solid var(--brd);border-radius:6px;padding:10px;margin-bottom:6px;border-left:3px solid '+(inc?'var(--grn)':'var(--red)')+';">';
        h+='<div style="display:flex;justify-content:space-between;">';
        h+='<span style="font-weight:600;">'+(inc?'✓ ':'⚠ ')+(mr.item||'')+'</span>';
        h+='<span style="font-family:\'DM Mono\',monospace;font-size:12px;font-weight:700;color:var(--orange);">'+(mr.estimated_cost||'')+'</span>';
        h+='</div>'+(mr.notes?'<div style="font-size:11px;color:var(--dim);margin-top:4px;">'+mr.notes+'</div>':'');
        h+='</div>';
      });
      h+='</div></div>';
    }
  } else if(S.rebuildResult&&S.rebuildResult.error){
    h+='<div style="padding:14px;border-radius:8px;background:var(--redD);color:var(--red);font-size:12px;">Generation failed: '+S.rebuildResult.error+' <button class="qa-btn qa-btn-ghost" style="margin-left:8px;" onclick="S.rebuildResult=null;S.err=null;draw()">Try Again</button></div>';
  }
  h+='</div>';
  a.innerHTML=h;
}

async function runRecon(){
  if(!S.enc||!S.est||!S.proj||S.busy)return;
  await loadApiKey();
  if(!S.apiKey){S.err='API key not found.';draw();return;}
  S.busy=true;S.err=null;S.prog='Reading documents...';draw();
  try{
    var encB64=await b64(S.enc);
    var estB64=await b64(S.est);
    S.prog='Generating reconstruction estimate... (30-60 seconds)';draw();
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,system:REBUILD_PROMPT,messages:[{role:'user',content:[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:encB64}},
        {type:'text',text:'ABOVE: Encircle mitigation report'},
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:estB64}},
        {type:'text',text:'ABOVE: Xactimate mitigation estimate. Generate full RECONSTRUCTION estimate. Return ONLY valid JSON.'}
      ]}]})
    });
    if(!r.ok){var er=await r.json().catch(function(){return null;});throw new Error(er&&er.error&&er.error.message||'API error '+r.status);}
    var d=await r.json();
    var t=d.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
    S.rebuildResult=extractJSON(t);
  }catch(e){S.err=e.message;S.rebuildResult=null;}
  S.busy=false;S.prog='';draw();
}

document.addEventListener('DOMContentLoaded',function(){
  jgCheckAuth();
  loadApiKey().then(function(){draw();});
});

</script>
