<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JG Restoration — Adjuster Intelligence</title>
<link rel="icon" type="image/png" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
--navy:#0d2d5e;--navy2:#1a4a8c;--orange:#e85d04;--gold:#f5a623;
--bg:#eef1f5;--card:#ffffff;--s1:#faf9f7;--s2:#f0ede8;
--brd:rgba(13,45,94,.10);--brdH:rgba(13,45,94,.25);
--txt:#0d1f3c;--dim:#6b7a96;--mut:#a0abbf;
--red:#c02020;--redD:rgba(192,32,32,.07);
--grn:#2e7d32;--grnD:rgba(46,125,50,.07);
--wrn:#e65100;--wrnD:rgba(230,81,0,.07);
--blu:#1565c0;--bluD:rgba(21,101,192,.07);
--purp:#6a1b9a;--purpD:rgba(106,27,154,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;padding:20px;}
.mono{font-family:'DM Mono',monospace}
.wrap{max-width:1180px;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:18px;height:18px;border:2px solid var(--brd);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;}
input[type=text]{padding:9px 12px;border-radius:8px;background:#fff;border:1.5px solid var(--brd);color:var(--txt);font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
input[type=text]:focus{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,93,4,.1)}

.hero{background:linear-gradient(135deg,#0d2d5e 0%,#1a4a8c 100%);border-radius:16px;padding:26px 30px;color:#fff;margin-bottom:18px;box-shadow:0 8px 28px rgba(13,45,94,.22);}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:14px;}
.hero-tag{display:inline-block;background:rgba(232,93,4,.9);color:#fff;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:20px;font-family:'DM Mono',monospace;margin-bottom:10px;}
.hero-title{font-size:26px;font-weight:700;letter-spacing:-.5px;}
.hero-sub{font-size:13px;color:rgba(255,255,255,.7);margin-top:6px;}
.hero-actions{display:flex;gap:8px;}
.hero-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;padding:9px 16px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.hero-btn:hover{background:rgba(255,255,255,.2);}
.hero-btn:disabled{opacity:.5;cursor:default;}
.hero-btn.gold{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.hero-btn.gold:hover{background:#e0941a;}
.hero-metric-lbl{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.6);font-family:'DM Mono',monospace;margin-bottom:6px;}
.hero-metric-val{font-size:28px;font-weight:700;letter-spacing:-.5px;}

.stat-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:18px;}
.stat-card{background:var(--card);border-radius:14px;padding:18px 20px;box-shadow:0 2px 10px rgba(13,45,94,.06);border:1px solid var(--brd);}
.stat-lbl{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;font-family:'DM Mono',monospace;margin-bottom:8px;}
.stat-val{font-size:26px;font-weight:700;color:var(--navy);letter-spacing:-.5px;}
.stat-val.grn{color:var(--grn);}.stat-val.wrn{color:var(--wrn);}.stat-val.org{color:var(--orange);}.stat-val.red{color:var(--red);}
.stat-cap{font-size:11px;color:var(--mut);margin-top:4px;}

.tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.tab{padding:9px 18px;border-radius:24px;border:1px solid var(--brd);background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--dim);font-family:'DM Sans',sans-serif;transition:all .15s;display:flex;align-items:center;gap:7px;}
.tab.on{background:var(--navy);border-color:var(--navy);color:#fff;}
.tab .cnt{background:var(--orange);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;}
.tab.on .cnt{background:rgba(255,255,255,.25);}

.card{background:var(--card);border-radius:14px;box-shadow:0 2px 10px rgba(13,45,94,.06);border:1px solid var(--brd);margin-bottom:16px;overflow:hidden;}
.card-hd{padding:16px 20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;}
.card-hd-title{font-size:14px;font-weight:700;color:var(--navy);}
.card-bd{padding:20px;}

table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;padding:10px 16px;font-family:'DM Mono',monospace;border-bottom:1px solid var(--brd);}
tbody td{padding:13px 16px;border-bottom:1px solid var(--brd);}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--s1);}
.proj{font-family:'DM Mono',monospace;font-weight:600;font-size:12px;}
.amt{font-family:'DM Mono',monospace;text-align:right;}

.badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-family:'DM Mono',monospace;}
.b-full{background:var(--grnD);color:var(--grn);}
.b-partial{background:var(--bluD);color:var(--blu);}
.b-pending{background:var(--wrnD);color:var(--wrn);}
.b-denied{background:var(--redD);color:var(--red);}
.b-none{background:var(--s2);color:var(--mut);}

.carrier-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--brd);gap:14px;}
.carrier-row:last-child{border-bottom:none;}
.carrier-name{font-size:14px;font-weight:700;color:var(--navy);}
.carrier-meta{font-size:11px;color:var(--dim);margin-top:3px;}
.carrier-stat{text-align:right;flex-shrink:0;}
.carrier-pct{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;}
.bar{height:6px;border-radius:4px;background:var(--s2);overflow:hidden;margin-top:8px;width:180px;max-width:40vw;}
.bar-fill{height:100%;border-radius:4px;}

#jg-login{display:none;position:fixed;inset:0;background:rgba(13,29,60,.96);align-items:center;justify-content:center;z-index:9999;}

@media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr);}.hero-metrics-grid{grid-template-columns:repeat(2,1fr)!important;}}
</style>
</head>
<body>

<div id="jg-login">
  <div style="background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4);">
    <img src="https://jgimprovements-arch.github.io/jg-dispatch/logo.png" style="height:72px;width:auto;margin-bottom:14px;">
    <div style="font-size:19px;font-weight:700;color:#0d2d5e;margin-bottom:4px;">JG Restoration</div>
    <div style="font-size:13px;color:#6b82a0;margin-bottom:24px;">Sign in with your @jg-restoration.com account</div>
    <div id="g_id_onload" data-client_id="209231675110-6id8vr3ehcocg4df7tvpc89jsmrvhogk.apps.googleusercontent.com" data-ux_mode="popup" data-callback="jgGoogleCb" data-auto_prompt="false"></div>
    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left" data-width="288"></div>
    <div id="jg-login-err" style="font-size:12px;color:#c0392b;margin-top:12px;min-height:16px;"></div>
  </div>
</div>

<div id="app"><div style="padding:60px;text-align:center;color:#6b7a96;">Loading...</div></div>

<script>
const _JG_KEY='jg_platform_user',_JG_EXP='jg_platform_exp';
function jgGoogleCb(r){try{const p=JSON.parse(atob(r.credential.split('.')[1]));if(!p.email.endsWith('@jg-restoration.com')){document.getElementById('jg-login-err').textContent='Access restricted to @jg-restoration.com accounts.';return;}const u={name:p.name||p.given_name,email:p.email,picture:p.picture||''};localStorage.setItem(_JG_KEY,JSON.stringify(u));localStorage.setItem(_JG_EXP,String(Date.now()+43200000));jgHideLogin();jgShowUser(u);}catch(e){document.getElementById('jg-login-err').textContent='Sign in failed.';}}
function jgCheckAuth(){const r=localStorage.getItem(_JG_KEY),e=localStorage.getItem(_JG_EXP);if(r&&e&&Date.now()<parseInt(e)){jgHideLogin();jgShowUser(JSON.parse(r));return true;}jgShowLogin();return false;}
function jgShowLogin(){const e=document.getElementById('jg-login');if(e)e.style.display='flex';}
function jgHideLogin(){const e=document.getElementById('jg-login');if(e)e.style.display='none';}
function jgShowUser(u){const n=document.getElementById('sb-nm'),a=document.getElementById('sb-av');if(n)n.textContent=u.name?u.name.split(' ')[0]:u.email.split('@')[0];if(a)a.innerHTML=u.picture?'<img src="'+u.picture+'" style="width:22px;height:22px;border-radius:50%;">':'👤';}
function jgSignOut(){if(confirm('Sign out?')){localStorage.removeItem(_JG_KEY);localStorage.removeItem(_JG_EXP);window.location.href='hub.html';}}
window.addEventListener('storage',e=>{if(e.key===_JG_KEY){if(e.newValue){jgHideLogin();jgShowUser(JSON.parse(e.newValue));}else jgShowLogin();}});
Object.defineProperty(window,'currentUser',{get:()=>{try{return JSON.parse(localStorage.getItem(_JG_KEY)||'null')?.name||null;}catch(e){return null;}},configurable:true});

const SB_URL='https://nuykvchgecpiuikoerze.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';

var state = {
  rebuttals: [], filtered: [], loading: false,
  analyzing: false, analysisResult: null,
  tab: 'overview',
  filterCarrier: '', filterAdjuster: '',
  apiKey: localStorage.getItem('jg_key')||''
};

async function sbFetch(path){
  var r = await fetch(SB_URL+path,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  return r.ok ? r.json() : [];
}
async function loadRebuttals(){
  state.loading=true; render();
  try{
    var rows = await sbFetch('/rest/v1/adjuster_rebuttals?order=created_at.desc&limit=200&select=*');
    state.rebuttals = rows; applyFilter();
  }catch(e){ console.error(e); }
  state.loading=false; render();
}
function applyFilter(){
  var fc=state.filterCarrier.toLowerCase(), fa=state.filterAdjuster.toLowerCase();
  state.filtered = state.rebuttals.filter(r=>{
    if(fc && !(r.carrier||'').toLowerCase().includes(fc)) return false;
    if(fa && !(r.adjuster_name||'').toLowerCase().includes(fa)) return false;
    return true;
  });
}
function setFilter(k,v){ state[k]=v; applyFilter(); render(); }
function clearFilters(){ state.filterCarrier=''; state.filterAdjuster=''; applyFilter(); render(); }
function setTab(t){ state.tab=t; render(); }

function num(v){ return Number(String(v==null?'':v).replace(/[^0-9.\-]/g,''))||0; }

function computeMetrics(){
  var rows = state.filtered;
  var totalInvoiced=0, totalCollected=0, openBalance=0;
  var paidFull=0, paidPartial=0, pending=0, denied=0, noData=0;
  var daysList=[];
  var carriers={};

  rows.forEach(function(r){
    // outcome_notes carries "invoiced $X; paid $Y; open balance $Z"
    var notes = r.outcome_notes||'';
    var inv = 0, paid = 0, openb = 0;
    var mInv = notes.match(/invoiced \$([0-9,.]+)/i);
    var mPaid = notes.match(/paid \$([0-9,.]+)/i);
    var mOpen = notes.match(/open balance \$([0-9,.]+)/i);
    if(mInv) inv = num(mInv[1]);
    if(mPaid) paid = num(mPaid[1]);
    if(mOpen) openb = num(mOpen[1]);
    // fallback to payment_received_amount if notes absent
    if(!paid && r.payment_received_amount) paid = num(r.payment_received_amount);

    totalInvoiced += inv;
    totalCollected += paid;
    openBalance += openb;

    var oc = r.final_outcome||'';
    if(oc==='paid_full') paidFull++;
    else if(oc==='paid_partial') paidPartial++;
    else if(oc==='pending') pending++;
    else if(oc==='denied') denied++;
    else noData++;

    if(r.days_to_payment!=null && !isNaN(r.days_to_payment)) daysList.push(Number(r.days_to_payment));

    var c = r.carrier||'Unknown';
    if(!carriers[c]) carriers[c]={count:0,invoiced:0,collected:0,full:0,partial:0,pending:0,denied:0,days:[]};
    carriers[c].count++;
    carriers[c].invoiced+=inv;
    carriers[c].collected+=paid;
    if(oc==='paid_full') carriers[c].full++;
    else if(oc==='paid_partial') carriers[c].partial++;
    else if(oc==='pending') carriers[c].pending++;
    else if(oc==='denied') carriers[c].denied++;
    if(r.days_to_payment!=null && !isNaN(r.days_to_payment)) carriers[c].days.push(Number(r.days_to_payment));
  });

  var recovery = totalInvoiced>0 ? Math.round(totalCollected/totalInvoiced*100) : 0;
  var avgDays = daysList.length ? Math.round(daysList.reduce((a,b)=>a+b,0)/daysList.length) : null;

  var carrierList = Object.entries(carriers).map(function(e){
    var c=e[1];
    return {
      name:e[0], count:c.count, invoiced:c.invoiced, collected:c.collected,
      recovery: c.invoiced>0 ? Math.round(c.collected/c.invoiced*100) : 0,
      full:c.full, partial:c.partial, pending:c.pending, denied:c.denied,
      avgDays: c.days.length ? Math.round(c.days.reduce((a,b)=>a+b,0)/c.days.length) : null
    };
  }).sort((a,b)=>b.invoiced-a.invoiced);

  return { totalInvoiced,totalCollected,openBalance,recovery,avgDays,
    paidFull,paidPartial,pending,denied,noData, count:rows.length, carrierList };
}

function fmt(n){ return '$'+Math.round(n).toLocaleString(); }

async function runAIAnalysis(){
  if(!state.apiKey||state.analyzing||!state.filtered.length) return;
  state.analyzing=true; state.analysisResult=null; render();
  try{
    var m = computeMetrics();
    var summary = JSON.stringify({
      total_invoiced: m.totalInvoiced, total_collected: m.totalCollected,
      recovery_rate: m.recovery+'%', avg_days_to_pay: m.avgDays,
      outcomes: {paid_full:m.paidFull,paid_partial:m.paidPartial,pending:m.pending,denied:m.denied},
      carriers: m.carrierList.map(c=>({carrier:c.name,rebuttals:c.count,invoiced:c.invoiced,collected:c.collected,recovery:c.recovery+'%',avg_days:c.avgDays}))
    },null,2);
    var r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:2000,
        system:'You are a claims analyst for JG Restoration, a Wisconsin restoration company. Analyze rebuttal payment outcomes and carrier behavior. Focus on which carriers pay defended rebuttals, recovery rates, speed of payment, and tactical recommendations. Be concise. Use markdown sections.',
        messages:[{role:'user',content:'Analyze this rebuttal payment intelligence and give tactical recommendations:\n\n'+summary}]
      })
    });
    if(r.ok){ var d=await r.json(); state.analysisResult=d.content.filter(b=>b.type==='text').map(b=>b.text).join(''); }
    else state.analysisResult='Analysis failed ('+r.status+').';
  }catch(e){ state.analysisResult='Analysis failed: '+e.message; }
  state.analyzing=false; render();
}
function mdToHtml(t){
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/^## (.*)/gm,'<div style="font-size:15px;font-weight:700;color:#0d2d5e;margin:16px 0 7px;">$1</div>');
  t=t.replace(/^### (.*)/gm,'<div style="font-size:13px;font-weight:700;margin:11px 0 4px;">$1</div>');
  t=t.replace(/^- (.*)/gm,'<div style="padding:3px 0 3px 14px;font-size:13px;border-left:2px solid #e85d04;margin:3px 0;">$1</div>');
  t=t.replace(/\n\n/g,'<br>').replace(/\n/g,'');
  return t;
}

function outcomeBadge(oc){
  if(oc==='paid_full') return '<span class="badge b-full">Paid Full</span>';
  if(oc==='paid_partial') return '<span class="badge b-partial">Paid Partial</span>';
  if(oc==='pending') return '<span class="badge b-pending">Pending</span>';
  if(oc==='denied') return '<span class="badge b-denied">Denied</span>';
  return '<span class="badge b-none">No Data</span>';
}

function render(){
  var a=document.getElementById('app'); if(!a) return;
  var m = state.rebuttals.length ? computeMetrics() : null;
  var h='';

  // HERO
  h+='<div class="wrap"><div class="hero"><div class="hero-top"><div>';
  h+='<span class="hero-tag">Adjuster Intelligence</span>';
  h+='<div class="hero-title">Rebuttal Performance &amp; Carrier Patterns</div>';
  h+='<div class="hero-sub">'+(state.rebuttals.length)+' rebuttals tracked · payment data synced from QuickBooks</div>';
  h+='</div><div class="hero-actions">';
  h+='<button class="hero-btn" onclick="loadRebuttals()">↻ Refresh</button>';
  h+='<button class="hero-btn gold" onclick="runAIAnalysis()" '+(state.analyzing||!state.apiKey||!state.filtered.length?'disabled':'')+'>'+(state.analyzing?'Analyzing…':'🧠 Run AI Analysis')+'</button>';
  h+='</div></div>';

  if(m){
    h+='<div class="hero-metrics-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:18px;">';
    h+='<div><div class="hero-metric-lbl">Total Invoiced</div><div class="hero-metric-val">'+fmt(m.totalInvoiced)+'</div></div>';
    h+='<div><div class="hero-metric-lbl">Total Collected</div><div class="hero-metric-val" style="color:#7ee08a;">'+fmt(m.totalCollected)+'</div></div>';
    h+='<div><div class="hero-metric-lbl">Recovery Rate</div><div class="hero-metric-val" style="color:var(--gold);">'+m.recovery+'%</div></div>';
    h+='<div><div class="hero-metric-lbl">Avg Days to Pay</div><div class="hero-metric-val">'+(m.avgDays!=null?m.avgDays:'—')+'</div></div>';
    h+='</div>';
  }
  h+='</div>'; // hero

  if(state.loading){
    h+='<div class="card"><div class="card-bd" style="text-align:center;padding:50px;"><span class="spin"></span> <span style="color:var(--dim);margin-left:10px;">Loading rebuttal history…</span></div></div>';
    h+='</div>'; a.innerHTML=h; return;
  }
  if(!state.rebuttals.length){
    h+='<div class="card"><div class="card-bd" style="text-align:center;padding:60px 20px;color:var(--dim);">';
    h+='<div style="font-size:46px;margin-bottom:14px;">📋</div>';
    h+='<div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px;">No rebuttal history yet</div>';
    h+='<div style="font-size:13px;">Complete adjuster rebuttals and sign off to start building intelligence.</div>';
    h+='</div></div></div>'; a.innerHTML=h; return;
  }

  // SECONDARY STAT CARDS
  h+='<div class="stat-grid">';
  h+='<div class="stat-card"><div class="stat-lbl">Rebuttals</div><div class="stat-val">'+m.count+'</div><div class="stat-cap">'+m.carrierList.length+' carriers</div></div>';
  h+='<div class="stat-card"><div class="stat-lbl">Paid Full</div><div class="stat-val grn">'+m.paidFull+'</div><div class="stat-cap">collected in full</div></div>';
  h+='<div class="stat-card"><div class="stat-lbl">Paid Partial</div><div class="stat-val org">'+m.paidPartial+'</div><div class="stat-cap">partial recovery</div></div>';
  h+='<div class="stat-card"><div class="stat-lbl">Pending</div><div class="stat-val wrn">'+m.pending+'</div><div class="stat-cap">awaiting payment</div></div>';
  h+='<div class="stat-card"><div class="stat-lbl">Open Balance</div><div class="stat-val red">'+fmt(m.openBalance)+'</div><div class="stat-cap">outstanding</div></div>';
  h+='</div>';

  // TABS
  h+='<div class="tabs">';
  h+='<div class="tab '+(state.tab==='overview'?'on':'')+'" onclick="setTab(\'overview\')">Overview</div>';
  h+='<div class="tab '+(state.tab==='rebuttals'?'on':'')+'" onclick="setTab(\'rebuttals\')">Rebuttals <span class="cnt">'+m.count+'</span></div>';
  h+='<div class="tab '+(state.tab==='carriers'?'on':'')+'" onclick="setTab(\'carriers\')">Carriers <span class="cnt">'+m.carrierList.length+'</span></div>';
  if(state.analysisResult) h+='<div class="tab '+(state.tab==='ai'?'on':'')+'" onclick="setTab(\'ai\')">AI Analysis</div>';
  h+='</div>';

  // FILTERS
  h+='<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">';
  h+='<input type="text" placeholder="Filter by carrier…" value="'+state.filterCarrier+'" oninput="setFilter(\'filterCarrier\',this.value)" style="max-width:220px;">';
  h+='<input type="text" placeholder="Filter by adjuster…" value="'+state.filterAdjuster+'" oninput="setFilter(\'filterAdjuster\',this.value)" style="max-width:220px;">';
  if(state.filterCarrier||state.filterAdjuster) h+='<button class="hero-btn" style="background:var(--s2);color:var(--dim);border-color:var(--brd);" onclick="clearFilters()">Clear</button>';
  h+='<span style="font-size:12px;color:var(--dim);align-self:center;">'+state.filtered.length+' of '+state.rebuttals.length+'</span>';
  h+='</div>';

  if(state.tab==='overview' || state.tab==='carriers'){
    h+='<div class="card"><div class="card-hd"><span class="card-hd-title">🏢 Carrier Performance</span><span style="font-size:11px;color:var(--dim);">recovery by carrier</span></div><div>';
    m.carrierList.forEach(function(c){
      var col = c.recovery>=80?'var(--grn)':c.recovery>=50?'var(--blu)':c.recovery>0?'var(--wrn)':'var(--mut)';
      h+='<div class="carrier-row"><div style="flex:1;min-width:0;">';
      h+='<div class="carrier-name">'+c.name+'</div>';
      h+='<div class="carrier-meta">'+c.count+' rebuttal'+(c.count!==1?'s':'')+' · '+fmt(c.invoiced)+' invoiced · '+c.full+' full, '+c.partial+' partial, '+c.pending+' pending'+(c.avgDays!=null?' · avg '+c.avgDays+' days':'')+'</div>';
      h+='<div class="bar"><div class="bar-fill" style="width:'+Math.min(100,c.recovery)+'%;background:'+col+';"></div></div>';
      h+='</div><div class="carrier-stat"><div class="carrier-pct" style="color:'+col+';">'+c.recovery+'%</div><div style="font-size:11px;color:var(--dim);">'+fmt(c.collected)+' collected</div></div>';
      h+='</div>';
    });
    h+='</div></div>';
  }

  if(state.tab==='overview' || state.tab==='rebuttals'){
    h+='<div class="card"><div class="card-hd"><span class="card-hd-title">📋 Rebuttal Outcomes</span><span style="font-size:11px;color:var(--dim);">'+state.filtered.length+' records</span></div><div style="overflow-x:auto;">';
    h+='<table><thead><tr><th>Project</th><th>Carrier</th><th>Adjuster</th><th style="text-align:right;">JG Est</th><th style="text-align:right;">Invoiced</th><th style="text-align:right;">Collected</th><th style="text-align:center;">Days</th><th>Outcome</th></tr></thead><tbody>';
    state.filtered.forEach(function(r){
      var notes=r.outcome_notes||'';
      var mInv=notes.match(/invoiced \$([0-9,.]+)/i), mPaid=notes.match(/paid \$([0-9,.]+)/i);
      var inv=mInv?num(mInv[1]):0, paid=mPaid?num(mPaid[1]):num(r.payment_received_amount);
      var pcol = r.final_outcome==='paid_full'?'var(--grn)':r.final_outcome==='paid_partial'?'var(--blu)':'var(--mut)';
      h+='<tr>';
      h+='<td class="proj">'+(r.project_name||'—')+'</td>';
      h+='<td style="font-size:12px;">'+(r.carrier||'—')+'</td>';
      h+='<td style="font-size:12px;">'+(r.adjuster_name||'—')+'</td>';
      h+='<td class="amt">'+(r.jg_total||'—')+'</td>';
      h+='<td class="amt">'+(inv?fmt(inv):'—')+'</td>';
      h+='<td class="amt" style="color:'+pcol+';font-weight:600;">'+(paid?fmt(paid):'$0')+'</td>';
      h+='<td style="text-align:center;font-family:\'DM Mono\',monospace;'+(r.days_to_payment==null?'color:var(--mut);':'')+'">'+(r.days_to_payment!=null?r.days_to_payment:'—')+'</td>';
      h+='<td>'+outcomeBadge(r.final_outcome)+'</td>';
      h+='</tr>';
    });
    h+='</tbody></table></div></div>';
  }

  if(state.tab==='ai' && state.analysisResult){
    h+='<div class="card"><div class="card-hd" style="background:linear-gradient(135deg,#1565c0,#0d47a1);border-bottom:none;"><span class="card-hd-title" style="color:#fff;">🧠 AI Pattern Analysis</span><button class="hero-btn" style="font-size:11px;padding:5px 12px;" onclick="runAIAnalysis()">Re-run</button></div>';
    h+='<div class="card-bd" style="font-size:13px;line-height:1.7;">'+mdToHtml(state.analysisResult)+'</div></div>';
  }

  h+='</div>'; // wrap
  a.innerHTML=h;
}

document.addEventListener('DOMContentLoaded',function(){
  jgCheckAuth();
  var u=JSON.parse(localStorage.getItem('jg_platform_user')||'null');
  if(u) jgShowUser(u);
  var key=localStorage.getItem('jg_key'); if(key) state.apiKey=key;
  loadRebuttals();
});
</script>

<script src="sidebar.js?v=20260419-1"></script>
