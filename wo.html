<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Order · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<style>
  :root {
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623; --green: #2d9c5f; --red: #d64545;
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --muted: #7884a0; --line: #e3e7f0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--navy); color: #fff; padding: 18px 28px; display: flex; align-items: center; gap: 14px; }
  header img { width: 48px; height: 48px; object-fit: contain; background: #fff; padding: 4px; border-radius: 6px; }
  header .brand-name { font-weight: 800; font-size: 19px; letter-spacing: .3px; }
  header .brand-tag { font-size: 11px; opacity: .85; letter-spacing: .8px; text-transform: uppercase; }

  main { max-width: 760px; margin: 0 auto; padding: 24px; }

  .hero {
    background: linear-gradient(135deg, #0d2d5e 0%, #1a4080 50%, #0d2d5e 100%);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 18px;
    color: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(13,45,94,.18);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(232,93,4,.22) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--orange);
    background: rgba(232,93,4,.18);
    border: 1px solid rgba(232,93,4,.4);
    padding: 3px 11px;
    border-radius: 999px;
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
  }
  .hero h1 { margin: 0 0 4px; color: #fff; font-size: 26px; font-weight: 800; letter-spacing: -.3px; position: relative; z-index: 1; }
  .hero-sub { color: rgba(255,255,255,.8); font-size: 13px; position: relative; z-index: 1; }
  .hero-version { float: right; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); padding: 4px 11px; border-radius: 999px; font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; position: relative; z-index: 1; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 22px 26px; margin-bottom: 16px; }
  .card h2 { margin: 0 0 12px; color: var(--navy); font-size: 16px; font-weight: 700; }
  .card h3 { margin: 14px 0 6px; color: var(--navy); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin: 4px 0 0;
  }
  .info-cell { padding: 10px 14px; background: var(--bg); border-radius: 8px; border: 1px solid var(--line); }
  .info-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; font-weight: 700; margin-bottom: 3px; }
  .info-value { font-size: 14px; color: var(--navy); font-weight: 600; }
  .info-cell.amount { background: linear-gradient(135deg, #fff8f0 0%, var(--card) 100%); border-color: rgba(232,93,4,.3); }
  .info-cell.amount .info-value { color: var(--orange); font-size: 20px; font-weight: 800; }

  .scope-text {
    white-space: pre-wrap;
    line-height: 1.6;
    font-size: 14px;
    color: var(--text);
    padding: 14px 16px;
    background: var(--bg);
    border-radius: 8px;
    border: 1px solid var(--line);
  }

  .tc-wrap {
    max-height: 320px;
    overflow-y: auto;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
  }
  .tc-wrap h4 { margin: 10px 0 4px; color: var(--navy); font-size: 13px; font-weight: 700; }
  .tc-wrap p { margin: 0 0 10px; }
  .tc-wrap p:first-child { margin-top: 0; }

  .sig-form { display: flex; flex-direction: column; gap: 12px; }
  .sig-form label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
  .sig-form input, .sig-form textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--navy);
    background: #fff;
  }
  .sig-form input:focus, .sig-form textarea:focus { outline: none; border-color: var(--orange); }
  .sig-form .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .accept-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin: 18px 0 6px;
    padding: 14px 16px;
    background: linear-gradient(135deg, #fff8f0 0%, var(--card) 100%);
    border: 1px solid rgba(232,93,4,.3);
    border-radius: 8px;
  }
  .accept-row input[type="checkbox"] { margin-top: 3px; transform: scale(1.3); cursor: pointer; }
  .accept-row label { font-size: 13px; color: var(--navy); line-height: 1.5; cursor: pointer; font-weight: 500; }

  .actions { display: flex; gap: 10px; margin-top: 10px; }
  .btn {
    padding: 14px 22px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background .15s, transform .15s, border-color .15s;
    font-family: inherit;
  }
  .btn.primary { background: var(--orange); color: #fff; border-color: var(--orange); flex: 1; }
  .btn.primary:hover:not(:disabled) { background: #d05303; transform: translateY(-1px); }
  .btn.primary:disabled { opacity: .45; cursor: not-allowed; }
  .btn.ghost { background: transparent; color: var(--navy); border-color: var(--line); }
  .btn.ghost:hover { border-color: var(--orange); color: var(--orange); }

  .footer-note { text-align: center; color: var(--muted); font-size: 11px; padding: 24px 0 40px; line-height: 1.6; }
  .footer-note a { color: var(--navy); text-decoration: none; font-weight: 600; }

  .success-state { text-align: center; padding: 40px 20px; }
  .success-state .check { font-size: 64px; color: var(--green); margin-bottom: 12px; }
  .success-state h2 { color: var(--navy); margin: 0 0 8px; font-size: 22px; }
  .success-state .receipt { background: var(--bg); border-radius: 8px; padding: 14px 18px; margin: 16px auto; max-width: 420px; font-size: 13px; color: var(--muted); text-align: left; }
  .success-state .receipt b { color: var(--navy); }

  .error-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .error-state h2 { color: var(--navy); margin: 0 0 8px; }

  @media (max-width: 600px) {
    main { padding: 14px; }
    .hero { padding: 20px; }
    .hero h1 { font-size: 22px; }
    .info-grid { grid-template-columns: 1fr; }
    .sig-form .row { grid-template-columns: 1fr; }
  }
</style>
</head>

if (!token) main.innerHTML = `<div class="error-state"><h2>Invalid link</h2><p>This work order link is missing or malformed. Please contact JG Restoration.</p></div>`;
else await render();

async function render() {
  const { data: wo, error } = await sb.from('rebuild_work_orders')
    .select('*, project:rebuild_projects(albi_job_number, customer_name, property_address, market, albi_pm_name, albi_pm_phone, albi_pm_email), sub:rebuild_subs(company_name, primary_contact, email, phone)')
    .eq('accept_token', token).maybeSingle();
  if (error || !wo) { main.innerHTML = `<div class="error-state"><h2>Work order not found</h2><p>This link may have expired or been replaced by a newer version.</p></div>`; return; }

  if (wo.status === 'cancelled' || wo.status === 'superseded') {
    main.innerHTML = `<div class="card error-state"><h2>This Work Order is no longer active</h2><p>Status: <b>${wo.status}</b>. If you have questions please contact JG Restoration.</p></div>`;
    return;
  }

  if (wo.status === 'signed') {
    main.innerHTML = renderSigned(wo);
    return;
  }

  main.innerHTML = renderForAcceptance(wo);
  wireAcceptance(wo);
}

function wireAcceptance(wo) {
  const cb = document.getElementById('sig_accept');
  const btn = document.getElementById('sig_submit');
  const nameInput = document.getElementById('sig_name');
  const refresh = () => {
    btn.disabled = !(cb.checked && nameInput.value.trim().length > 1);
  };
  cb.addEventListener('change', refresh);
  nameInput.addEventListener('input', refresh);

  btn.addEventListener('click', async () => {
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = 'Submitting…';
    try {
      const name = nameInput.value.trim();
      const title = document.getElementById('sig_title').value.trim() || null;
      const notes = document.getElementById('sig_notes').value.trim() || null;

      // Capture IP via remote service (best-effort). If it fails we still record the signature.
      let ip = null;
      try {
        const r = await fetch('https://api.ipify.org?format=json');
        const j = await r.json();
        ip = j.ip;
      } catch {}

      const { error } = await sb.from('rebuild_work_orders').update({
        status: 'signed',
        signed_at: new Date().toISOString(),
        signed_by_name: name,
        signed_by_title: title,
        signed_ip: ip,
        signed_user_agent: navigator.userAgent.slice(0, 500),
        signed_notes: notes,
      }).eq('id', wo.id);

      if (error) {
        btn.disabled = false; btn.textContent = orig;
        alert('Could not record signature: ' + error.message);
        return;
      }

      // History row
      await sb.from('rebuild_work_order_history').insert({
        work_order_id: wo.id,
        action: 'signed',
        actor: name,
        details: `Signed by ${name}${title ? ' (' + title + ')' : ''} from ${ip || 'unknown IP'}`,
      });

      // Notify PM via in-app notification (which fires email via existing handler)
      const p = wo.project || {};
      const pmEmail = p.albi_pm_email;
      if (pmEmail) {
        try {
          await sb.from('rebuild_notifications').insert({
            project_id: wo.project_id,
            recipient_email: pmEmail.toLowerCase(),
            event_type: 'wo_signed',
            title: `${wo.sub?.company_name || 'Subcontractor'} signed Work Order`,
            body: `${name}${title ? ' (' + title + ')' : ''} signed the WO for ${p.albi_job_number || 'project'}. Agreed: ${fmtMoney(wo.total_amount)}.${notes ? '\n\nSub notes: ' + notes : ''}`,
          });
        } catch (e) { console.warn('notif insert failed', e); }
      }

      // Generate signed PDF, upload to Documents, push to Albi
      btn.textContent = 'Generating signed PDF…';
      try {
        const signedWo = Object.assign({}, wo, {
          signed_at: new Date().toISOString(),
          signed_by_name: name,
          signed_by_title: title,
          signed_ip: ip,
          signed_notes: notes,
        });
        const pdfBlob = await generateSignedPdf(signedWo);
        if (pdfBlob) {
          await uploadAndPushPdf(signedWo, pdfBlob);
        }
      } catch (e) {
        console.error('PDF generation/upload failed:', e);
        // Non-fatal — sub still sees signed confirmation
      }

      // Reload to signed view
      await render();
    } catch (e) {
      btn.disabled = false; btn.textContent = orig;
      alert('Unexpected error: ' + e.message);
    }
  });
}

// ─────────── PDF GENERATION ───────────
async function generateSignedPdf(wo) {
  if (!window.jspdf) { console.warn('jsPDF not loaded'); return null; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'letter' });
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 48;
  let y = margin;

  const p = wo.project || {};
  const s = wo.sub || {};

  // Header band
  doc.setFillColor(13, 45, 94);
  doc.rect(0, 0, pageW, 70, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.text('JG Restoration', margin, 36);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(245, 166, 35);
  doc.text('FIRE · WATER · MOLD · RECONSTRUCTION', margin, 52);
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(10);
  doc.text('SIGNED WORK ORDER', pageW - margin, 36, { align: 'right' });
  doc.setFontSize(8);
  doc.text(`WO-${wo.id.slice(0, 8)} · v${wo.version}`, pageW - margin, 52, { align: 'right' });
  y = 92;

  // Project info
  doc.setTextColor(13, 45, 94);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text('PROJECT', margin, y); y += 14;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.setTextColor(40, 40, 40);
  const projLines = [
    ['Job:', p.albi_job_number || '—'],
    ['Customer:', p.customer_name || '—'],
    ['Address:', p.property_address || '—'],
    ['Market:', p.market === 'stevens_point' ? 'Stevens Point' : 'Appleton'],
  ];
  projLines.forEach(([label, val]) => {
    doc.setFont('helvetica', 'bold'); doc.text(label, margin, y);
    doc.setFont('helvetica', 'normal'); doc.text(String(val).slice(0, 80), margin + 80, y);
    y += 14;
  });
  y += 8;

  // Sub info
  doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(13, 45, 94);
  doc.text('CONTRACTOR', margin, y); y += 14;
  doc.setFontSize(10); doc.setTextColor(40, 40, 40);
  const subLines = [
    ['Company:', s.company_name || '—'],
    ['Contact:', s.primary_contact || '—'],
    ['Email:', s.email || '—'],
    ['Phone:', s.phone || '—'],
  ];
  subLines.forEach(([label, val]) => {
    doc.setFont('helvetica', 'bold'); doc.text(label, margin, y);
    doc.setFont('helvetica', 'normal'); doc.text(String(val).slice(0, 80), margin + 80, y);
    y += 14;
  });
  y += 8;

  // Money + dates highlight
  doc.setFillColor(255, 248, 240);
  doc.setDrawColor(232, 93, 4);
  doc.roundedRect(margin, y, pageW - margin * 2, 50, 6, 6, 'FD');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(120, 132, 160);
  doc.text('AGREED AMOUNT', margin + 16, y + 18);
  doc.text('START DATE', margin + 220, y + 18);
  doc.text('COMPLETION TARGET', margin + 340, y + 18);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(16); doc.setTextColor(232, 93, 4);
  doc.text(fmtMoney(wo.total_amount), margin + 16, y + 38);
  doc.setFontSize(13); doc.setTextColor(13, 45, 94);
  doc.text(fmtDate(wo.start_date), margin + 220, y + 38);
  doc.text(fmtDate(wo.end_date), margin + 340, y + 38);
  y += 66;

  // Scope
  doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(13, 45, 94);
  doc.text('SCOPE OF WORK', margin, y); y += 14;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(40, 40, 40);
  const scopeText = wo.scope_text || '(no scope provided)';
  const scopeLines = doc.splitTextToSize(scopeText, pageW - margin * 2);
  scopeLines.forEach(line => {
    if (y > pageH - margin - 80) { doc.addPage(); y = margin; }
    doc.text(line, margin, y);
    y += 12;
  });
  y += 10;

  // Payment terms
  if (y > pageH - margin - 80) { doc.addPage(); y = margin; }
  doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.setTextColor(13, 45, 94);
  doc.text('PAYMENT TERMS', margin, y); y += 14;
  doc.setFont('helvetica', 'normal'); doc.setFontSize(9); doc.setTextColor(40, 40, 40);
  const ptLines = doc.splitTextToSize(wo.payment_terms || '', pageW - margin * 2);
  ptLines.forEach(line => {
    if (y > pageH - margin - 80) { doc.addPage(); y = margin; }
    doc.text(line, margin, y); y += 12;
  });
  y += 16;

  // Signature block
  if (y > pageH - margin - 120) { doc.addPage(); y = margin; }
  doc.setFillColor(244, 250, 246);
  doc.setDrawColor(45, 156, 95);
  doc.roundedRect(margin, y, pageW - margin * 2, 100, 6, 6, 'FD');
  doc.setFont('helvetica', 'bold'); doc.setFontSize(10); doc.setTextColor(45, 156, 95);
  doc.text('ELECTRONICALLY SIGNED', margin + 14, y + 18);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(13, 45, 94);
  doc.text('Signed by:', margin + 14, y + 36);
  doc.text('Title:', margin + 14, y + 50);
  doc.text('Date:', margin + 14, y + 64);
  doc.text('IP Address:', margin + 14, y + 78);
  doc.setFont('helvetica', 'normal'); doc.setTextColor(40, 40, 40);
  doc.text(wo.signed_by_name || '—', margin + 90, y + 36);
  doc.text(wo.signed_by_title || '—', margin + 90, y + 50);
  doc.text(new Date(wo.signed_at).toLocaleString(), margin + 90, y + 64);
  doc.text(wo.signed_ip || 'not captured', margin + 90, y + 78);
  y += 110;
  if (wo.signed_notes) {
    if (y > pageH - margin - 40) { doc.addPage(); y = margin; }
    doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(13, 45, 94);
    doc.text('Sub Notes:', margin, y); y += 12;
    doc.setFont('helvetica', 'normal'); doc.setTextColor(40, 40, 40);
    const noteLines = doc.splitTextToSize(wo.signed_notes, pageW - margin * 2);
    noteLines.forEach(line => { doc.text(line, margin, y); y += 12; });
  }

  // T&C page
  doc.addPage();
  y = margin;
  doc.setFillColor(13, 45, 94);
  doc.rect(0, 0, pageW, 36, 'F');
  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold'); doc.setFontSize(12);
  doc.text('Work Order Terms & Conditions', margin, 22);
  doc.setFontSize(8); doc.setTextColor(245, 166, 35);
  doc.text(`WO-${wo.id.slice(0,8)}`, pageW - margin, 22, { align: 'right' });
  y = 52;
  doc.setTextColor(40, 40, 40);
  const tcSections = [
    ['1. Scope of Work', 'This Work Order ("WO") defines the tasks, deliverables, and services to be performed by the Contractor/Vendor. All work must adhere to the specifications, timelines, and quality standards provided by JG Restoration.'],
    ['2. Acceptance of Terms', 'By commencing work under this WO, the Contractor agrees to the terms and conditions stated herein. Any additional terms provided by the Contractor are not binding unless explicitly agreed upon in writing by JG Restoration.'],
    ['3. Performance Standards', 'All work shall be performed professionally and in compliance with industry standards. Any materials or equipment used must meet the quality requirements specified in the WO. Any deviations from the agreed scope must be approved in writing.'],
    ['4. Pricing and Payment', 'The agreed-upon compensation is outlined in the WO and is not subject to change without prior written consent. Payment will be made within 30 days upon receipt of an accurate invoice and confirmation that work has been completed to the satisfaction of JG Restoration. Payment may be withheld for incomplete or non-conforming work until issues are resolved.'],
    ['5. Timeline and Deadlines', 'Time is of the essence. The Contractor must complete all work by the deadlines specified in the WO unless an extension is agreed upon in writing. Delays may result in penalties or termination of the WO.'],
    ['6. Inspection and Approval', 'All completed work is subject to inspection by JG Restoration. If the work does not meet the specifications or quality standards, the Contractor will be required to correct deficiencies at their own expense. Final acceptance will occur only after all issues are resolved.'],
    ['7. Change Orders', 'Any changes to the scope of work, schedule, or budget must be documented in a written change order and approved by both parties before implementation.'],
    ['8. Warranties', 'The Contractor warrants that all work performed and materials provided will be free of defects and conform to the specifications of the WO. The warranty period is 1 year, during which the Contractor agrees to repair or replace defective work or materials at no additional cost.'],
    ['9. Indemnification', "The Contractor shall indemnify and hold harmless JG Restoration, its employees, and agents from any claims, damages, or liabilities arising from the Contractor's performance of this WO, including any injury to persons or damage to property."],
    ['10. Safety and Compliance', 'The Contractor must comply with all applicable safety laws, regulations, and standards. The Contractor is responsible for ensuring that all workers are properly trained and equipped to perform their tasks safely.'],
    ['11. Insurance Requirements', 'The Contractor shall maintain adequate insurance coverage, including general liability, workers compensation, and any other insurance required by law or specified in the WO. Proof of insurance must be provided upon request.'],
    ['12. Confidentiality', 'Any information shared by JG Restoration for the purpose of this WO shall remain confidential and not be disclosed to third parties without written consent.'],
    ['13. Termination', 'JG Restoration reserves the right to terminate this WO for convenience or cause upon written notice. Upon termination, the Contractor will be compensated for work satisfactorily completed up to the termination date.'],
    ['14. Force Majeure', 'Neither party shall be held liable for delays or non-performance caused by circumstances beyond their reasonable control, including natural disasters, acts of government, or labor disputes.'],
    ['15. Ownership of Work', 'All completed work, including any intellectual property created as part of the WO, becomes the sole property of JG Restoration upon acceptance and payment.'],
    ['16. Governing Law', 'This WO shall be governed by and construed in accordance with the laws of the State of Wisconsin.'],
    ['17. Dispute Resolution', 'In the event of a dispute, both parties agree to attempt resolution through good-faith negotiations. If unresolved, disputes may be submitted to arbitration or court proceedings, as appropriate.'],
    ['18. Entire Agreement', 'This WO, together with any referenced documents, constitutes the entire agreement between the parties and supersedes any prior understandings.'],
    ['19. Amendments', 'Any modifications to this WO must be agreed upon in writing by both parties.'],
  ];
  tcSections.forEach(([heading, text]) => {
    if (y > pageH - margin - 40) { doc.addPage(); y = margin; }
    doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.setTextColor(13, 45, 94);
    doc.text(heading, margin, y); y += 12;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(8); doc.setTextColor(60, 60, 60);
    const lines = doc.splitTextToSize(text, pageW - margin * 2);
    lines.forEach(line => {
      if (y > pageH - margin - 30) { doc.addPage(); y = margin; }
      doc.text(line, margin, y); y += 11;
    });
    y += 6;
  });

  // Footer on every page
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(7); doc.setTextColor(120, 132, 160);
    doc.text('JG Restoration · Appleton (920) 428-4200 · Stevens Point (715) 600-3883 · info@jg-restoration.com', pageW / 2, pageH - 24, { align: 'center' });
    doc.text(`Page ${i} of ${pageCount}`, pageW - margin, pageH - 24, { align: 'right' });
  }

  return doc.output('blob');
}

async function uploadAndPushPdf(wo, pdfBlob) {
  const p = wo.project || {};
  const s = wo.sub || {};
  const safeSubName = (s.company_name || 'sub').replace(/[^a-zA-Z0-9._-]/g, '_').slice(0, 40);
  const filename = `WO_${safeSubName}_${p.albi_job_number || wo.id.slice(0,8)}_signed.pdf`;
  const path = `projects/${wo.project_id}/${Date.now()}-${filename}`;
  const { error: upErr } = await sb.storage.from('rebuild-documents').upload(path, pdfBlob, {
    contentType: 'application/pdf',
    upsert: false,
  });
  if (upErr) { console.error('Storage upload failed:', upErr); return; }
  const { data: urlData } = sb.storage.from('rebuild-documents').getPublicUrl(path);
  const fileUrl = urlData.publicUrl;
  const { data: docRow, error: insErr } = await sb.from('rebuild_documents').insert({
    project_id: wo.project_id,
    category: 'Subcontractor Documents',
    filename,
    file_url: fileUrl,
    file_size_bytes: pdfBlob.size,
    mime_type: 'application/pdf',
    uploaded_by_email: 'wo-system@jg-restoration.com',
    push_status: 'pending',
  }).select();
  if (insErr) { console.error('Doc insert failed:', insErr); return; }
  const docId = docRow?.[0]?.id;
  if (docId && p.albi_project_id) {
    try {
      await fetch(ALBI_DOC_HOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          document_id: docId,
          project_id: wo.project_id,
          albi_project_id: p.albi_project_id,
          albi_job_number: p.albi_job_number,
          category: 'Subcontractor Documents',
          filename,
          file_url: fileUrl,
          mime_type: 'application/pdf',
          notes: `Signed Work Order — ${s.company_name || ''}, signed by ${wo.signed_by_name} on ${new Date(wo.signed_at).toLocaleDateString()}`,
        }),
        mode: 'no-cors',
      });
      await sb.from('rebuild_documents').update({
        push_status: 'sent',
        pushed_to_albi_at: new Date().toISOString(),
      }).eq('id', docId);
    } catch (e) {
      console.error('Albi push failed:', e);
      await sb.from('rebuild_documents').update({ push_status: 'failed' }).eq('id', docId);
    }
  }
}
