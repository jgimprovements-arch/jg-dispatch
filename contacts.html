<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contacts — JG Restoration</title>
<link rel="icon" type="image/png" href="logo.png">
<style>
  :root{
    --navy:#0d2d5e;--orange:#e85d04;--gold:#f5a623;--blue:#1565c0;
    --surface:#fff;--bg:#f5f5f7;--border:#e1e4ea;--text:#0d1f3c;--muted:#6b7a96;
    --danger:#c02020;--success:#2e7d32;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);}
  #jg-hdr{background:var(--navy);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px;}
  #jg-hdr-title{font-size:18px;font-weight:700;}
  #jg-hdr-sub{font-size:12px;color:rgba(255,255,255,.6);font-family:'DM Mono',monospace;}
  .page{max-width:1800px;margin:0 auto;padding:20px 24px;}

  /* Search */
  .search-bar{background:#fff;border:1px solid var(--border);border-radius:10px;padding:4px;display:flex;align-items:center;gap:8px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .search-bar input{flex:1;border:none;outline:none;padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;background:transparent;color:var(--text);}
  .search-icon{padding:8px 12px;color:var(--muted);font-size:16px;}
  .search-clear{background:none;border:none;padding:8px 14px;color:var(--muted);font-size:16px;cursor:pointer;border-radius:6px;}
  .search-clear:hover{background:rgba(0,0,0,.05);color:var(--text);}

  /* Group */
  .group{margin-bottom:24px;}
  .group-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;padding:0 4px;}
  .group-title{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;}
  .group-count{font-size:11px;color:var(--muted);background:rgba(13,45,94,.06);padding:2px 8px;border-radius:10px;font-family:'DM Mono',monospace;}

  /* Contact card grid */
  .contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;}

  .contact{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px;transition:border-color .15s,box-shadow .15s;}
  .contact:hover{border-color:rgba(232,93,4,.35);box-shadow:0 2px 8px rgba(13,45,94,.06);}
  .contact-avatar{width:42px;height:42px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;font-family:'DM Mono',monospace;flex-shrink:0;}
  .contact-avatar.pm{background:var(--blue);}
  .contact-avatar.admin{background:var(--orange);}
  .contact-avatar.office{background:#7c3aed;}
  .contact-avatar.tech{background:var(--success);}
  .contact-body{flex:1;min-width:0;}
  .contact-name{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:2px;line-height:1.2;}
  .contact-meta{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
  .contact-meta .dot{color:var(--border);margin:0 4px;}
  .contact-actions{display:flex;flex-direction:column;gap:4px;}
  .contact-action{display:flex;align-items:center;gap:8px;color:var(--text);text-decoration:none;font-size:13px;padding:4px 0;transition:color .15s;}
  .contact-action:hover{color:var(--orange);}
  .contact-action .ico{font-size:14px;width:18px;text-align:center;}
  .contact-action.disabled{color:var(--muted);cursor:default;pointer-events:none;font-style:italic;}

  .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
  .loading{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
  .loading::after{content:'';display:inline-block;margin-left:8px;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Login screen */
  #jg-login{position:fixed;inset:0;background:var(--navy);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px;}
  #jg-login-box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4);}

  @media(max-width:700px){
    .page{padding:14px;}
    .contact-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<!-- login gate (unified auth) -->
<div id="jg-login"><div id="jg-login-box"><div style="font-weight:700;color:#0d2d5e;margin-bottom:16px;">Sign in to continue</div></div></div>

<div id="jg-hdr">
  <div style="font-size:22px;">📇</div>
  <div>
    <div id="jg-hdr-title">Contacts</div>
    <div id="jg-hdr-sub">Live employee directory</div>
  </div>
</div>

<div class="page">
  <div class="search-bar">
    <div class="search-icon">🔍</div>
    <input type="text" id="search" placeholder="Search by name, role, phone, or email..." oninput="onSearch()" autocomplete="off">
    <button class="search-clear" id="clear" onclick="clearSearch()" style="display:none;">✕</button>
  </div>

  <div id="content" class="loading">Loading employees</div>
</div>

<script src="sidebar.js?v=20260419-1"></script>
<script src="auth.js?v=20260419-1"></script>
<script>
const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const SB_HEADERS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

// Role priority for sorting groups
const ROLE_ORDER = ['Admin','Project Manager','Office','Estimator','Sales','Technician'];

let EMPLOYEES = [];
let SEARCH = '';

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function initials(name) {
  var p = (name||'').trim().split(/\s+/);
  return ((p[0]||'')[0]||'').toUpperCase() + ((p[1]||'')[0]||'').toUpperCase() || '?';
}

function roleClass(role) {
  if (!role) return 'tech';
  var r = role.toLowerCase();
  if (r === 'admin') return 'admin';
  if (r === 'project manager') return 'pm';
  if (r === 'office') return 'office';
  return 'tech';
}

function formatPhone(p) {
  if (!p) return '';
  var digits = String(p).replace(/\D/g,'');
  if (digits.length === 10) return '(' + digits.slice(0,3) + ') ' + digits.slice(3,6) + '-' + digits.slice(6);
  if (digits.length === 11 && digits[0] === '1') return '(' + digits.slice(1,4) + ') ' + digits.slice(4,7) + '-' + digits.slice(7);
  return p;
}

async function loadEmployees() {
  try {
    var r = await fetch(SB_URL + '/rest/v1/employees?active=eq.true&select=id,name,email,phone,role,market&order=role.asc,name.asc', { headers: SB_HEADERS });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    EMPLOYEES = await r.json();
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty" style="color:var(--danger);">Could not load contacts: ' + esc(e.message) + '</div>';
  }
}

function render() {
  var container = document.getElementById('content');
  container.className = '';

  // Filter by search
  var q = SEARCH.toLowerCase().trim();
  var filtered = q
    ? EMPLOYEES.filter(function(e){
        return (e.name||'').toLowerCase().indexOf(q) !== -1
          || (e.role||'').toLowerCase().indexOf(q) !== -1
          || (e.market||'').toLowerCase().indexOf(q) !== -1
          || (e.email||'').toLowerCase().indexOf(q) !== -1
          || (e.phone||'').toLowerCase().indexOf(q) !== -1;
      })
    : EMPLOYEES;

  if (!filtered.length) {
    container.innerHTML = '<div class="empty">' + (q ? 'No matching contacts' : 'No employees found') + '</div>';
    return;
  }

  // Group by role
  var groups = {};
  filtered.forEach(function(e){
    var role = e.role || '(No Role)';
    if (!groups[role]) groups[role] = [];
    groups[role].push(e);
  });

  // Sort role groups by ROLE_ORDER
  var sortedRoles = Object.keys(groups).sort(function(a,b){
    var ai = ROLE_ORDER.indexOf(a); if (ai === -1) ai = 99;
    var bi = ROLE_ORDER.indexOf(b); if (bi === -1) bi = 99;
    return ai - bi;
  });

  var html = '';
  sortedRoles.forEach(function(role){
    var items = groups[role];
    html += '<div class="group">';
    html += '<div class="group-head">';
    html += '<span class="group-title">' + esc(role) + '</span>';
    html += '<span class="group-count">' + items.length + '</span>';
    html += '</div>';
    html += '<div class="contact-grid">';
    items.forEach(function(e){
      html += renderContact(e);
    });
    html += '</div>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function renderContact(e) {
  var name = e.name || '(No name)';
  var phone = e.phone || '';
  var phoneDigits = phone ? String(phone).replace(/\D/g,'') : '';
  var email = e.email || '';
  var market = e.market || '';

  var h = '<div class="contact">';
  h += '<div class="contact-avatar ' + roleClass(e.role) + '">' + esc(initials(name)) + '</div>';
  h += '<div class="contact-body">';
  h += '<div class="contact-name">' + esc(name) + '</div>';
  h += '<div class="contact-meta">' + esc(e.role||'—') + (market ? ' <span class="dot">·</span> ' + esc(market) : '') + '</div>';
  h += '<div class="contact-actions">';
  if (phoneDigits) {
    h += '<a class="contact-action" href="tel:+1' + esc(phoneDigits) + '">';
    h += '<span class="ico">📞</span>' + esc(formatPhone(phone));
    h += '</a>';
    h += '<a class="contact-action" href="sms:+1' + esc(phoneDigits) + '">';
    h += '<span class="ico">💬</span>Text';
    h += '</a>';
  } else {
    h += '<div class="contact-action disabled"><span class="ico">📞</span>No phone on file</div>';
  }
  if (email) {
    h += '<a class="contact-action" href="mailto:' + esc(email) + '">';
    h += '<span class="ico">✉️</span>' + esc(email);
    h += '</a>';
  } else {
    h += '<div class="contact-action disabled"><span class="ico">✉️</span>No email on file</div>';
  }
  h += '</div></div></div>';
  return h;
}

function onSearch() {
  var v = document.getElementById('search').value;
  SEARCH = v;
  document.getElementById('clear').style.display = v ? 'flex' : 'none';
  render();
}
function clearSearch() {
  document.getElementById('search').value = '';
  SEARCH = '';
  document.getElementById('clear').style.display = 'none';
  render();
}

// Live updates via Supabase Realtime
async function initRealtime() {
  try {
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
    script.onload = function() {
      var client = (window.JGSupabase && window.JGSupabase.client) || supabase.createClient(SB_URL, SB_KEY);
      window.JGSupabase = window.JGSupabase || {};
      window.JGSupabase.client = client;
      client.channel('rt_contacts')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'employees' }, function(){
          loadEmployees();
        })
        .subscribe();
    };
    document.head.appendChild(script);
  } catch(e) { console.warn('realtime init failed:', e); }
}

// Auth flow — use unified auth.js pattern
function afterAuth() {
  loadEmployees();
  initRealtime();
}
if (typeof window.jgCheckAuth === 'function') {
  window.jgCheckAuth() ? afterAuth() : null;
  // Override jgShowUser so we trigger load after login
  var _origShow = window.jgShowUser;
  window.jgShowUser = function(u) { if (_origShow) _origShow(u); afterAuth(); };
} else {
  // auth.js not loaded — just try anyway
  afterAuth();
}
</script>
</body>
</html>
