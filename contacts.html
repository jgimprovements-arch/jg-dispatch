<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d2d5e">
<title>Contacts — JG Restoration</title>
<link rel="icon" type="image/png" href="logo.png">
<style>
  :root{
    --navy:#0d2d5e;--orange:#e85d04;--gold:#f5a623;--blue:#1565c0;
    --surface:#fff;--bg:#f5f5f7;--border:#e1e4ea;--text:#0d1f3c;--muted:#6b7a96;
    --danger:#c02020;--success:#2e7d32;--purple:#7c3aed;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

  /* ── DESKTOP LAYOUT (default) ── */
  #jg-hdr{background:var(--navy);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px;}
  #jg-hdr-title{font-size:18px;font-weight:700;}
  #jg-hdr-sub{font-size:12px;color:rgba(255,255,255,.6);font-family:'DM Mono',monospace;}
  .page{max-width:1800px;margin:0 auto;padding:16px 20px;}
  .search-bar{background:#fff;border:1px solid var(--border);border-radius:8px;padding:2px;display:flex;align-items:center;gap:6px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .search-bar input{flex:1;border:none;outline:none;padding:8px 10px;font-size:13px;font-family:inherit;background:transparent;color:var(--text);}
  .search-icon{padding:6px 10px;color:var(--muted);font-size:14px;}
  .search-clear{background:none;border:none;padding:6px 12px;color:var(--muted);font-size:14px;cursor:pointer;border-radius:5px;}
  .search-clear:hover{background:rgba(0,0,0,.05);color:var(--text);}

  .group{margin-bottom:16px;}
  .group-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:0 2px;}
  .group-title{font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;}
  .group-count{font-size:10px;color:var(--muted);background:rgba(13,45,94,.06);padding:1px 6px;border-radius:8px;font-family:'DM Mono',monospace;}

  .contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;}
  .contact{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px;display:flex;align-items:center;gap:10px;transition:border-color .12s,box-shadow .12s;}
  .contact:hover{border-color:rgba(232,93,4,.4);box-shadow:0 2px 6px rgba(13,45,94,.08);}

  .contact-avatar{width:34px;height:34px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;font-family:'DM Mono',monospace;flex-shrink:0;}
  .contact-avatar.pm{background:var(--blue);}
  .contact-avatar.admin{background:var(--orange);}
  .contact-avatar.office{background:var(--purple);}
  .contact-avatar.tech{background:var(--success);}

  .contact-body{flex:1;min-width:0;}
  .contact-name{font-size:13px;font-weight:700;color:var(--navy);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
  .contact-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .contact-sub .sep{opacity:.4;margin:0 4px;}

  .contact-actions{display:flex;gap:4px;flex-shrink:0;}
  .contact-action{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;background:rgba(13,45,94,.05);color:var(--navy);cursor:pointer;border:none;padding:0;font-size:14px;transition:all .12s;position:relative;}
  .contact-action:hover{background:var(--orange);color:#fff;transform:scale(1.05);}
  .contact-action:active{transform:scale(0.95);}
  .contact-action.disabled{background:rgba(0,0,0,.03);color:#c0c5ce;cursor:not-allowed;pointer-events:none;}
  .contact-action::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;font-size:10px;padding:3px 8px;border-radius:4px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:10;}
  .contact-action:hover::after{opacity:1;}

  .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
  .loading{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
  .loading::after{content:'';display:inline-block;margin-left:8px;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}

  #copy-toast{position:fixed;bottom:calc(20px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.18);opacity:0;transition:all .22s;pointer-events:none;z-index:9999;}
  #copy-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  #jg-login{position:fixed;inset:0;background:var(--navy);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px;}
  #jg-login-box{background:#fff;border-radius:16px;padding:40px 36px;width:100%;max-width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4);}

  /* ── MOBILE: NATIVE-APP LAYOUT (< 700px) ── */
  @media(max-width:700px){
    body{background:#fff;overscroll-behavior:none;}

    /* App-like sticky header with back button */
    #jg-hdr{
      padding:calc(14px + var(--safe-top)) 12px 12px;
      position:sticky;top:0;z-index:20;
      display:flex;align-items:center;gap:10px;
    }
    #jg-hdr-back{background:rgba(255,255,255,.12);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;}
    #jg-hdr-back:active{background:rgba(255,255,255,.25);}
    #jg-hdr-title-wrap{flex:1;min-width:0;}
    #jg-hdr-title{font-size:17px;}
    #jg-hdr-sub{font-size:11px;}
    #jg-hdr-emoji{display:none;}

    /* Full-bleed search that sticks below header when scrolling */
    .page{padding:0;max-width:none;margin:0;}
    .search-bar{
      position:sticky;top:calc(56px + var(--safe-top));z-index:15;
      margin:0;border-radius:0;border-left:none;border-right:none;
      border-top:none;box-shadow:0 1px 4px rgba(0,0,0,.04);padding:6px 10px;
    }
    .search-bar input{padding:10px 10px;font-size:15px;}
    .search-icon{font-size:16px;padding:8px 6px 8px 10px;}

    /* Sticky section headers (like iOS Contacts) */
    .group{margin:0;}
    .group-head{
      position:sticky;top:calc(56px + 52px + var(--safe-top));z-index:10;
      background:rgba(245,245,247,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      padding:6px 16px;margin:0;
      border-top:1px solid var(--border);border-bottom:1px solid var(--border);
      gap:6px;
    }
    .group-title{font-size:11px;}
    .group-count{font-size:10px;}

    /* Full-width rows, no card chrome, thin separators */
    .contact-grid{display:block;gap:0;}
    .contact{
      background:#fff;border:none;border-radius:0;
      padding:12px 16px;
      border-bottom:1px solid var(--border);
      gap:12px;cursor:pointer;
    }
    .contact:active{background:#f5f5f7;}
    .contact:hover{box-shadow:none;border-color:transparent;border-bottom-color:var(--border);}

    .contact-avatar{width:42px;height:42px;font-size:13px;}
    .contact-name{font-size:16px;margin-bottom:3px;font-weight:600;color:var(--text);}
    .contact-sub{font-size:11px;}

    /* Action buttons: bigger, tap-friendly */
    .contact-actions{gap:6px;}
    .contact-action{width:38px;height:38px;font-size:16px;border-radius:50%;background:rgba(13,45,94,.06);}
    .contact-action:hover{background:rgba(13,45,94,.06);color:var(--navy);transform:none;}
    .contact-action:active{background:var(--orange);color:#fff;transform:scale(0.92);}
    /* Hide tooltips on mobile — they're hover-based and don't work on touch */
    .contact-action::after{display:none;}

    /* Empty/loading states larger on mobile */
    .empty,.loading{padding:60px 24px;font-size:15px;}

    /* Pad bottom of scroll area so last row clears safe-area */
    #content{padding-bottom:calc(var(--safe-bottom) + 20px);}

    /* Scroll-to-top visual cue on very long lists — small floating button */
    #scroll-top{position:fixed;bottom:calc(16px + var(--safe-bottom));right:16px;width:44px;height:44px;border-radius:50%;background:var(--navy);color:#fff;border:none;box-shadow:0 4px 12px rgba(13,45,94,.3);font-size:18px;cursor:pointer;z-index:20;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;transform:translateY(10px);}
    #scroll-top.show{opacity:1;pointer-events:auto;transform:translateY(0);}
    #scroll-top:active{transform:scale(0.92);}

    #copy-toast{bottom:calc(70px + var(--safe-bottom));font-size:14px;padding:11px 20px;}
  }

  /* On desktop, don't show back button or scroll-to-top */
  @media(min-width:701px){
    #jg-hdr-back,#scroll-top{display:none !important;}
  }
</style>
</head>
<body>

<div id="jg-login"><div id="jg-login-box"><div style="font-weight:700;color:#0d2d5e;margin-bottom:16px;">Sign in to continue</div></div></div>

<div id="jg-hdr">
  <button id="jg-hdr-back" onclick="goBack()" aria-label="Back">←</button>
  <span id="jg-hdr-emoji" style="font-size:22px;">📇</span>
  <div id="jg-hdr-title-wrap">
    <div id="jg-hdr-title">Contacts</div>
    <div id="jg-hdr-sub">Live directory</div>
  </div>
</div>

<div class="page">
  <div class="search-bar">
    <div class="search-icon">🔍</div>
    <input type="text" id="search" placeholder="Search contacts..." oninput="onSearch()" autocomplete="off" autocapitalize="off" autocorrect="off">
    <button class="search-clear" id="clear" onclick="clearSearch()" style="display:none;">✕</button>
  </div>

  <div id="content" class="loading">Loading</div>
</div>

<button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Scroll to top">↑</button>
<div id="copy-toast"></div>

<script src="sidebar.js?v=20260419-1"></script>
<script src="auth.js?v=20260419-1"></script>
<script>
const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const SB_HEADERS = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };
const ROLE_ORDER = ['Admin','Project Manager','Office','Estimator','Sales','Technician'];

let EMPLOYEES = [];
let SEARCH = '';
const IS_MOBILE = window.matchMedia('(max-width:700px)').matches;

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function attrEsc(s) { return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function initials(name) {
  var p = (name||'').trim().split(/\s+/);
  return (((p[0]||'')[0]||'') + ((p[1]||'')[0]||'')).toUpperCase() || '?';
}
function roleClass(role) {
  if (!role) return 'tech';
  var r = role.toLowerCase();
  if (r === 'admin') return 'admin';
  if (r === 'project manager') return 'pm';
  if (r === 'office') return 'office';
  return 'tech';
}
function formatPhone(p) {
  if (!p) return '';
  var d = String(p).replace(/\D/g,'');
  if (d.length === 10) return '(' + d.slice(0,3) + ') ' + d.slice(3,6) + '-' + d.slice(6);
  if (d.length === 11 && d[0] === '1') return '(' + d.slice(1,4) + ') ' + d.slice(4,7) + '-' + d.slice(7);
  return p;
}

function showToast(msg) {
  var t = document.getElementById('copy-toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 1800);
}

async function copyToClipboard(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
      return true;
    }
  } catch(e) {}
  try {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    var ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  } catch(e) { return false; }
}

// Universal contact action — works on desktop AND mobile
async function handleContact(ev, kind, value, label) {
  if (ev) { ev.stopPropagation(); ev.preventDefault(); }
  if (!value) return;
  // Haptic feedback on supported devices
  if (navigator.vibrate) { try { navigator.vibrate(10); } catch(e){} }

  await copyToClipboard(value);
  var url = null;
  if (kind === 'call')  url = 'tel:+1' + value.replace(/\D/g,'');
  if (kind === 'sms')   url = 'sms:+1' + value.replace(/\D/g,'');
  if (kind === 'email') url = 'mailto:' + value;
  if (url) {
    // On mobile, direct navigation is more reliable than synthetic click
    if (IS_MOBILE) {
      window.location.href = url;
    } else {
      var a = document.createElement('a');
      a.href = url; a.style.display='none';
      document.body.appendChild(a); a.click();
      setTimeout(function(){ document.body.removeChild(a); }, 100);
    }
  }
  showToast('📋 Copied ' + label);
}

// Tapping the whole contact row on mobile → pull up action menu (native-app feel)
function rowTap(ev, phone, email, personalEmail, name) {
  if (!IS_MOBILE) return; // desktop uses hover + click
  // If they clicked inside an action button, bail
  if (ev.target.closest('.contact-action')) return;
  // Build a simple native menu
  var opts = [];
  if (phone) {
    opts.push({ label: '📞  Call ' + formatPhone(phone), action: function(){ handleContact(null,'call',phone,'phone'); } });
    opts.push({ label: '💬  Text ' + formatPhone(phone), action: function(){ handleContact(null,'sms',phone,'phone'); } });
    opts.push({ label: '📋  Copy number', action: async function(){ await copyToClipboard(phone); showToast('📋 Copied ' + formatPhone(phone)); } });
  }
  if (email) {
    opts.push({ label: '✉️  Email ' + email, action: function(){ handleContact(null,'email',email,'email'); } });
    opts.push({ label: '📋  Copy ' + email, action: async function(){ await copyToClipboard(email); showToast('📋 Copied ' + email); } });
  }
  if (personalEmail && personalEmail !== email) {
    opts.push({ label: '✉️  Email ' + personalEmail + ' (personal)', action: function(){ handleContact(null,'email',personalEmail,'email'); } });
    opts.push({ label: '📋  Copy ' + personalEmail, action: async function(){ await copyToClipboard(personalEmail); showToast('📋 Copied ' + personalEmail); } });
  }
  if (!opts.length) return;
  showActionSheet(name, opts);
}

function showActionSheet(title, options) {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0;animation:as-fade .15s ease;';
  var sheet = document.createElement('div');
  sheet.style.cssText = 'background:#fff;width:100%;border-radius:16px 16px 0 0;padding:10px 0 calc(var(--safe-bottom) + 8px);box-shadow:0 -8px 32px rgba(0,0,0,.2);animation:as-slide .22s cubic-bezier(.2,.8,.2,1);';
  var html = '<div style="width:36px;height:4px;background:#d0d5dd;border-radius:2px;margin:0 auto 12px;"></div>';
  html += '<div style="padding:0 20px 8px;font-size:12px;color:#6b7a96;text-transform:uppercase;letter-spacing:.05em;font-weight:700;border-bottom:1px solid #f0f2f6;margin-bottom:4px;">' + esc(title) + '</div>';
  options.forEach(function(opt, i){
    html += '<button class="as-opt" data-idx="' + i + '" style="display:block;width:100%;padding:14px 20px;font-size:15px;font-weight:500;background:none;border:none;text-align:left;color:#0d1f3c;font-family:inherit;cursor:pointer;">' + esc(opt.label) + '</button>';
  });
  html += '<button class="as-cancel" style="display:block;width:calc(100% - 24px);margin:8px 12px 0;padding:14px;font-size:15px;font-weight:700;background:rgba(13,45,94,.05);border:none;border-radius:10px;color:#0d1f3c;font-family:inherit;cursor:pointer;">Cancel</button>';
  sheet.innerHTML = html;
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  var close = function(){ overlay.style.animation = 'as-fade .15s ease reverse'; setTimeout(function(){ overlay.remove(); }, 140); };
  overlay.addEventListener('click', function(e){ if (e.target === overlay) close(); });
  sheet.querySelector('.as-cancel').addEventListener('click', close);
  sheet.querySelectorAll('.as-opt').forEach(function(btn){
    btn.addEventListener('click', function(){
      if (navigator.vibrate) { try { navigator.vibrate(10); } catch(e){} }
      var idx = parseInt(btn.dataset.idx,10);
      close();
      setTimeout(function(){ options[idx].action(); }, 80);
    });
    btn.addEventListener('touchstart', function(){ btn.style.background='#f5f5f7'; }, {passive:true});
    btn.addEventListener('touchend', function(){ btn.style.background=''; }, {passive:true});
  });
}

// Inject sheet animations
(function(){
  var st = document.createElement('style');
  st.textContent = '@keyframes as-fade{from{opacity:0}to{opacity:1}}@keyframes as-slide{from{transform:translateY(100%)}to{transform:translateY(0)}}';
  document.head.appendChild(st);
})();

async function loadEmployees() {
  try {
    var r = await fetch(SB_URL + '/rest/v1/employees?active=eq.true&select=id,name,email,personal_email,phone,role,market&order=role.asc,name.asc', { headers: SB_HEADERS });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    EMPLOYEES = await r.json();
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty" style="color:var(--danger);">Could not load contacts: ' + esc(e.message) + '</div>';
  }
}

function render() {
  var container = document.getElementById('content');
  container.className = '';

  var q = SEARCH.toLowerCase().trim();
  var filtered = q
    ? EMPLOYEES.filter(function(e){
        return (e.name||'').toLowerCase().indexOf(q) !== -1
          || (e.role||'').toLowerCase().indexOf(q) !== -1
          || (e.market||'').toLowerCase().indexOf(q) !== -1
          || (e.email||'').toLowerCase().indexOf(q) !== -1
          || (e.personal_email||'').toLowerCase().indexOf(q) !== -1
          || (e.phone||'').toLowerCase().indexOf(q) !== -1;
      })
    : EMPLOYEES;

  if (!filtered.length) {
    container.innerHTML = '<div class="empty">' + (q ? 'No matching contacts' : 'No employees found') + '</div>';
    return;
  }

  var groups = {};
  filtered.forEach(function(e){
    var role = e.role || '(No Role)';
    if (!groups[role]) groups[role] = [];
    groups[role].push(e);
  });
  var sortedRoles = Object.keys(groups).sort(function(a,b){
    var ai = ROLE_ORDER.indexOf(a); if (ai === -1) ai = 99;
    var bi = ROLE_ORDER.indexOf(b); if (bi === -1) bi = 99;
    return ai - bi;
  });

  var html = '';
  sortedRoles.forEach(function(role){
    var items = groups[role];
    html += '<div class="group">';
    html += '<div class="group-head">';
    html += '<span class="group-title">' + esc(role) + '</span>';
    html += '<span class="group-count">' + items.length + '</span>';
    html += '</div>';
    html += '<div class="contact-grid">';
    items.forEach(function(e){ html += renderContact(e); });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function renderContact(e) {
  var name = e.name || '(No name)';
  var phone = e.phone || '';
  var phoneFmt = phone ? formatPhone(phone) : '';
  var email = e.email || '';
  var personalEmail = e.personal_email || '';
  var market = e.market || '';
  // Direct email button sends to personal if present, otherwise work
  var directEmail = personalEmail || email;

  var h = '<div class="contact" onclick="rowTap(event,\'' + attrEsc(phone) + '\',\'' + attrEsc(email) + '\',\'' + attrEsc(personalEmail) + '\',\'' + attrEsc(name) + '\')">';
  h += '<div class="contact-avatar ' + roleClass(e.role) + '">' + esc(initials(name)) + '</div>';
  h += '<div class="contact-body">';
  h += '<div class="contact-name" title="' + attrEsc(name) + '">' + esc(name) + '</div>';
  h += '<div class="contact-sub">' + esc(e.role||'—') + (market ? '<span class="sep">·</span>' + esc(market) : '') + '</div>';
  h += '</div>';
  h += '<div class="contact-actions">';
  if (phone) {
    h += '<button class="contact-action" data-tip="Call ' + attrEsc(phoneFmt) + '" onclick="handleContact(event,\'call\',\'' + attrEsc(phone) + '\',\'phone\')">📞</button>';
    h += '<button class="contact-action" data-tip="Text ' + attrEsc(phoneFmt) + '" onclick="handleContact(event,\'sms\',\'' + attrEsc(phone) + '\',\'phone\')">💬</button>';
  } else {
    h += '<button class="contact-action disabled" data-tip="No phone">📞</button>';
    h += '<button class="contact-action disabled" data-tip="No phone">💬</button>';
  }
  if (directEmail) {
    h += '<button class="contact-action" data-tip="Email ' + attrEsc(directEmail) + '" onclick="handleContact(event,\'email\',\'' + attrEsc(directEmail) + '\',\'email\')">✉️</button>';
  } else {
    h += '<button class="contact-action disabled" data-tip="No email">✉️</button>';
  }
  h += '</div></div>';
  return h;
}

function onSearch() {
  var v = document.getElementById('search').value;
  SEARCH = v;
  document.getElementById('clear').style.display = v ? 'flex' : 'none';
  render();
}
function clearSearch() {
  document.getElementById('search').value = '';
  SEARCH = '';
  document.getElementById('clear').style.display = 'none';
  render();
}
function goBack() {
  if (document.referrer && document.referrer.indexOf(window.location.host) !== -1) {
    window.history.back();
  } else {
    window.location.href = 'hub.html';
  }
}

// Scroll-to-top button on mobile (appears after scrolling a bit)
window.addEventListener('scroll', function(){
  var btn = document.getElementById('scroll-top');
  if (!btn) return;
  if (window.scrollY > 400) btn.classList.add('show');
  else btn.classList.remove('show');
}, {passive:true});

async function initRealtime() {
  try {
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
    script.onload = function() {
      var client = (window.JGSupabase && window.JGSupabase.client) || supabase.createClient(SB_URL, SB_KEY);
      window.JGSupabase = window.JGSupabase || {};
      window.JGSupabase.client = client;
      client.channel('rt_contacts')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'employees' }, function(){ loadEmployees(); })
        .subscribe();
    };
    document.head.appendChild(script);
  } catch(e) { console.warn('realtime init failed:', e); }
}

function afterAuth() { loadEmployees(); initRealtime(); }
if (typeof window.jgCheckAuth === 'function') {
  window.jgCheckAuth() ? afterAuth() : null;
  var _origShow = window.jgShowUser;
  window.jgShowUser = function(u) { if (_origShow) _origShow(u); afterAuth(); };
} else {
  afterAuth();
}
</script>
