<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Project Schedule · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --navy: #0d2d5e;
    --orange: #e85d04;
    --gold: #f5a623;
    --green: #2d9c5f;
    --red: #d64545;
    --bg: #f4f6fb;
    --card: #ffffff;
    --text: #1a2540;
    --muted: #7884a0;
    --line: #e3e7f0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    background: var(--navy);
    color: #fff;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(13,45,94,.12);
  }
  header img { width: 44px; height: 44px; object-fit: contain; background: #fff; padding: 4px; border-radius: 6px; }
  header .brand { display: flex; flex-direction: column; }
  header .brand-name { font-weight: 800; font-size: 18px; letter-spacing: .3px; }
  header .brand-tag { font-size: 11px; opacity: .85; letter-spacing: .5px; text-transform: uppercase; }
  header .contact {
    margin-left: auto;
    text-align: right;
    font-size: 13px;
  }
  header .contact a { color: #fff; text-decoration: none; font-weight: 600; }
  header .contact a:hover { color: var(--gold); }

  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 24px;
  }
  .hero {
    background: var(--card);
    border-radius: 10px;
    padding: 22px 26px;
    margin-bottom: 18px;
    border: 1px solid var(--line);
  }
  .hero h1 {
    margin: 0 0 4px;
    color: var(--navy);
    font-size: 22px;
  }
  .hero .sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 12px;
  }
  .hero .pm {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    font-size: 13px;
  }
  .hero .pm b { color: var(--navy); }
  .pm a {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 11px;
    background: var(--orange);
    color: #fff;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 12px;
  }
  .pm a:hover { background: var(--navy); }

  .progress-card {
    background: var(--card);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 18px;
    border: 1px solid var(--line);
  }
  .progress-card h3 {
    margin: 0 0 12px;
    color: var(--navy);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .progress-bar {
    background: var(--bg);
    border-radius: 999px;
    height: 14px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar > div {
    background: linear-gradient(90deg, var(--green), #4cb377);
    height: 100%;
    transition: width .4s;
  }
  .progress-bar .pct {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--navy);
  }

  .phases {
    background: var(--card);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 18px;
    border: 1px solid var(--line);
  }

  /* External links list */
  .cust-ext-list { display: flex; flex-direction: column; gap: 8px; }
  .cust-ext {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    text-decoration: none;
    color: var(--text);
    transition: border-color .15s, transform .15s;
  }
  .cust-ext:hover { border-color: var(--orange); transform: translateY(-1px); }
  .cust-ext-icon { font-size: 28px; }
  .cust-ext-info { flex: 1; }
  .cust-ext-label { font-weight: 700; color: var(--navy); font-size: 14px; }
  .cust-ext-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Customer composer */
  .cust-composer {
    background: var(--card);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 18px;
    border: 1px solid var(--line);
  }
  .cust-composer h3 {
    margin: 0 0 6px;
    color: var(--navy);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .cust-composer-hint {
    margin: 0 0 14px;
    color: var(--muted);
    font-size: 13px;
  }
  .cust-composer textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
    resize: vertical;
    min-height: 70px;
    color: var(--text);
  }
  .cust-composer textarea:focus { outline: none; border-color: var(--orange); }
  .cust-composer-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 12px;
  }
  .cust-attach-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--navy);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .cust-attach-btn:hover { border-color: var(--orange); background: #fff; }
  .cust-post-btn {
    padding: 10px 26px;
    background: var(--orange);
    color: #fff;
    border: 0;
    border-radius: 999px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: background .15s, transform .15s;
  }
  .cust-post-btn:hover { background: #d05303; transform: translateY(-1px); }
  .cust-post-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .cust-att-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .cust-att-preview:empty { display: none; }
  .cust-att-thumb {
    width: 90px; height: 90px;
    border-radius: 6px;
    overflow: hidden;
    background: var(--bg);
    border: 1px solid var(--line);
    position: relative;
  }
  .cust-att-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .cust-att-thumb-doc {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .cust-att-name {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,.65); color: #fff;
    font-size: 9px; padding: 2px 4px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* Customer photo gallery + doc list */
  .cust-section {
    background: var(--card);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 18px;
    border: 1px solid var(--line);
  }
  .cust-section h3 {
    margin: 0 0 14px;
    color: var(--navy);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .cust-photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .cust-photo-wrap {
    position: relative;
    aspect-ratio: 1 / 1;
  }
  .cust-photo {
    border-radius: 8px;
    overflow: hidden;
    width: 100%;
    height: 100%;
    border: 1px solid var(--line);
    transition: transform .15s, border-color .15s, box-shadow .15s;
    display: block;
  }
  .cust-photo:hover {
    transform: scale(1.02);
    border-color: var(--orange);
    box-shadow: 0 4px 12px rgba(13,45,94,.12);
  }
  .cust-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cust-photo-dl {
    position: absolute;
    bottom: 6px; right: 6px;
    width: 30px; height: 30px;
    border-radius: 6px;
    background: rgba(13,45,94,.9);
    color: #fff;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    opacity: 0;
    transition: opacity .15s, background .15s;
    backdrop-filter: blur(4px);
  }
  .cust-photo-wrap:hover .cust-photo-dl { opacity: 1; }
  .cust-photo-dl:hover { background: var(--orange); }

  .cust-doc-list { display: flex; flex-direction: column; gap: 8px; }
  .cust-doc {
    display: flex; align-items: center;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    transition: border-color .15s, transform .15s;
    overflow: hidden;
  }
  .cust-doc:hover {
    border-color: var(--orange);
    transform: translateY(-1px);
  }
  .cust-doc-main {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    text-decoration: none;
    color: var(--text);
    min-width: 0;
  }
  .cust-doc-icon { font-size: 24px; flex-shrink: 0; }
  .cust-doc-info { flex: 1; min-width: 0; }
  .cust-doc-name {
    font-weight: 600;
    color: var(--navy);
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cust-doc-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .cust-doc-dl {
    flex-shrink: 0;
    padding: 0 14px;
    height: 100%;
    align-self: stretch;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    color: var(--navy);
    text-decoration: none;
    font-size: 18px;
    font-weight: 700;
    border-left: 1px solid var(--line);
    transition: background .15s, color .15s;
  }
  .cust-doc-dl:hover { background: var(--orange); color: #fff; }

  /* Invoices section */
  .cust-invoices-section {
    background: linear-gradient(135deg, #fff 0%, #fef7f0 100%);
    border-color: rgba(232,93,4,.3);
  }
  .cust-invoices-section h3 { color: var(--orange); }
  .cust-invoices-hint {
    margin: -8px 0 14px;
    color: var(--muted);
    font-size: 13px;
  }
  .cust-invoice-list { display: flex; flex-direction: column; gap: 10px; }
  .cust-invoice {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    transition: border-color .15s;
  }
  .cust-invoice:hover { border-color: var(--orange); }
  .cust-invoice-icon { font-size: 28px; flex-shrink: 0; }
  .cust-invoice-info { flex: 1; min-width: 0; }
  .cust-invoice-name {
    font-weight: 700;
    color: var(--navy);
    font-size: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .cust-invoice-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .cust-invoice-btn {
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    transition: transform .15s, background .15s;
    white-space: nowrap;
  }
  .cust-invoice-view {
    background: var(--orange);
    color: #fff;
    border: 1px solid var(--orange);
  }
  .cust-invoice-view:hover { background: #d05303; transform: translateY(-1px); }
  .cust-invoice-dl {
    background: transparent;
    color: var(--navy);
    border: 1px solid var(--line);
  }
  .cust-invoice-dl:hover { border-color: var(--orange); color: var(--orange); }
  @media (max-width: 600px) {
    .cust-invoice { flex-wrap: wrap; }
    .cust-invoice-info { flex-basis: 100%; order: -1; }
  }

  /* Selections section */
  .cust-sel-list { display: flex; flex-direction: column; gap: 12px; }
  .cust-sel-card {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
    background: var(--bg);
    transition: border-color .15s, box-shadow .15s;
  }
  .cust-sel-card.pending {
    border-color: var(--orange);
    background: #fff8f0;
    box-shadow: 0 2px 8px rgba(232,93,4,.08);
  }
  .cust-sel-card.approved {
    border-color: #c8e6d4;
    background: #f4faf6;
  }
  .cust-sel-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }
  .cust-sel-cat {
    font-weight: 700;
    color: var(--navy);
    font-size: 15px;
  }
  .cust-sel-desc {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  .cust-sel-status {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: .3px;
    white-space: nowrap;
  }
  .cust-sel-status.pending { background: var(--orange); color: #fff; }
  .cust-sel-status.approved { background: #2d9c5f; color: #fff; }
  .cust-sel-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    font-size: 12px;
    color: var(--muted);
    margin: 6px 0 10px;
  }
  .cust-sel-meta b { color: var(--navy); font-weight: 600; }
  .cust-sel-install {
    font-size: 13px;
    color: #1f7a4a;
    font-weight: 600;
    margin-top: 6px;
  }
  .cust-sel-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .cust-sel-btn {
    padding: 9px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    display: inline-block;
    transition: background .15s, transform .15s;
  }
  .cust-sel-btn.primary {
    background: var(--orange);
    color: #fff;
    border: 1px solid var(--orange);
  }
  .cust-sel-btn.primary:hover { background: #d05303; transform: translateY(-1px); }
  .cust-sel-empty { font-size: 13px; color: var(--muted); }

  /* Journal section */
  .journal-section {
    background: var(--card);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 18px;
    border: 1px solid var(--line);
  }
  .journal-section h3 {
    margin: 0 0 14px;
    color: var(--navy);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .journal-feed { display: flex; flex-direction: column; gap: 14px; }
  .cj-entry {
    background: var(--bg);
    border-radius: 8px;
    padding: 14px 16px;
    border: 1px solid var(--line);
    transition: border-color .15s;
  }
  .cj-entry.collapsed {
    cursor: pointer;
    padding: 12px 14px;
  }
  .cj-entry.collapsed:hover { border-color: var(--orange); background: #fff; }
  .cj-entry.collapsed .cj-header { margin-bottom: 0; }
  .cj-entry.collapsed .cj-body,
  .cj-entry.collapsed .cj-photos,
  .cj-entry.collapsed .cj-tags { display: none; }
  .cj-collapsed-row {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  .cj-collapsed-info { flex: 1; min-width: 0; }
  .cj-collapsed-preview {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cj-collapsed-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .cj-att-badge {
    background: var(--orange);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .cj-chevron {
    color: var(--muted);
    font-size: 14px;
    transition: transform .15s;
  }
  .cj-entry:not(.collapsed) .cj-chevron { transform: rotate(90deg); color: var(--orange); }
  .cj-header {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 10px;
  }
  .cj-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--orange); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
    flex-shrink: 0;
  }
  .cj-author { font-weight: 700; color: var(--navy); font-size: 14px; }
  .cj-date { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .cj-body {
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .cj-mention { color: var(--orange); font-weight: 600; }
  .cj-photos {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
    margin-top: 12px;
  }
  .cj-photo {
    border-radius: 6px;
    overflow: hidden;
    aspect-ratio: 1 / 1;
    border: 1px solid var(--line);
    transition: transform .15s, border-color .15s;
    display: block;
  }
  .cj-photo:hover { transform: scale(1.02); border-color: var(--orange); }
  .cj-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cj-photo-pdf {
    background: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .cj-photo-pdf img { object-fit: contain; }
  .cj-pdf-fallback {
    font-size: 36px;
  }
  .cj-photo-doc {
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 8px;
    text-decoration: none;
    color: var(--navy);
    text-align: center;
  }
  .cj-doc-icon { font-size: 28px; }
  .cj-doc-name {
    font-size: 11px;
    margin-top: 6px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-word;
  }
  .cj-tags { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .cj-tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    background: rgba(30,90,200,.1);
    color: var(--navy);
  }

  /* Customer photos + docs */
  .cust-section {
    background: var(--card);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 18px;
    border: 1px solid var(--line);
  }
  .cust-section h3 {
    margin: 0 0 14px;
    color: var(--navy);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .cust-photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .cust-photo {
    border-radius: 8px;
    overflow: hidden;
    aspect-ratio: 1 / 1;
    border: 1px solid var(--line);
    transition: transform .15s, border-color .15s;
    display: block;
  }
  .cust-photo:hover { transform: scale(1.02); border-color: var(--orange); }
  .cust-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cust-doc-cat { margin-bottom: 14px; }
  .cust-doc-cat:last-child { margin-bottom: 0; }
  .cust-doc-cat-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .4px;
    margin-bottom: 8px;
  }
  .cust-doc-list { display: flex; flex-direction: column; gap: 6px; }
  .cust-doc-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    text-decoration: none;
    color: var(--navy);
    font-size: 13px;
    transition: border-color .15s, transform .15s;
  }
  .cust-doc-row:hover { border-color: var(--orange); transform: translateX(2px); }
  .cust-doc-icon { font-size: 18px; flex-shrink: 0; }
  .cust-doc-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
  .cust-doc-arrow { color: var(--muted); }
  .phases h3 {
    margin: 0 0 14px;
    color: var(--navy);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .phase-row {
    display: grid;
    grid-template-columns: 28px 1fr auto auto;
    gap: 14px;
    align-items: center;
    padding: 12px 0;
    border-top: 1px solid var(--line);
  }
  .phase-row:first-of-type { border-top: 0; padding-top: 0; }
  .phase-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
  }

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const sb = createClient(SB_URL, SB_ANON);

const params = new URLSearchParams(window.location.search);
const token = params.get('t');
const main = document.getElementById('main');

const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
const fmtShortDate = d => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—';
const titleCase = s => String(s||'').replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
const escHtml = s => String(s == null ? '' : s)
  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
const fmtPhone = v => {
  if (!v) return '';
  const d = String(v).replace(/\D/g,'');
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  if (d.length === 11 && d[0] === '1') return `(${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
  return v;
};

if (!token) {
  main.innerHTML = `<div class="error-state">
    <h2>Project link is invalid</h2>
    <p>This page requires a valid project link. Please use the link your project manager sent you.</p>
    <p>If you need a new link, call <a href="tel:9204284200">(920) 428-4200</a>.</p>
  </div>`;
} else {
  await render();
  // Realtime subscription on changes
  sb.channel('customer_view_' + token)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rebuild_phases' }, () => render())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rebuild_projects' }, () => render())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rebuild_journal_entries' }, () => render())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rebuild_documents' }, () => render())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rebuild_selections' }, () => render())
    .subscribe();
}

async function render() {
  const { data: project, error: pErr } = await sb.from('rebuild_projects')
    .select('*').eq('customer_token', token).maybeSingle();

  if (pErr || !project) {
    main.innerHTML = `<div class="error-state">
      <h2>Project not found</h2>
      <p>This link may have expired or been deactivated.</p>
      <p>Call <a href="tel:9204284200">(920) 428-4200</a> if you need help.</p>
    </div>`;
    return;
  }

  const { data: phases } = await sb.from('rebuild_phases')
    .select('*').eq('project_id', project.id).order('sequence');
  const phasesArr = phases || [];

  // Customer-visible journal entries (newest first)
  const { data: journal } = await sb.from('rebuild_journal_entries')
    .select('*, attachments:rebuild_journal_attachments(file_url, filename, mime_type)')
    .eq('project_id', project.id)
    .eq('customer_visible', true)
    .is('deleted_at', null)
    .order('created_at', { ascending: false })
    .limit(100);
  const journalArr = journal || [];

  // Customer-visible documents and photos
  const { data: docs } = await sb.from('rebuild_documents')
    .select('*')
    .eq('project_id', project.id)
    .eq('customer_visible', true)
    .order('uploaded_at', { ascending: false })
    .limit(200);
  const docsArr = docs || [];
  const visiblePhotos = docsArr.filter(d =>
    d.category === 'Photos' && (
      /^image\//.test(d.mime_type || '') ||
      /\.(jpe?g|png|gif|webp|heic)$/i.test(d.filename || '')
    )
  );
  const visibleDocs = docsArr.filter(d => !visiblePhotos.includes(d));

  // Material selections (pending approval, approved, install scheduled)
  const { data: selections } = await sb.from('rebuild_selections')
    .select('*, vendor_sub:rebuild_subs(company_name)')
    .eq('project_id', project.id)
    .in('status', ['awaiting_customer', 'awaiting_customer_install', 'approved', 'install_scheduled'])
    .order('created_at', { ascending: false });
  const selectionsArr = selections || [];

  const completedCount = phasesArr.filter(p => p.status === 'complete').length;
  const totalCount = phasesArr.length;
  const pct = totalCount ? Math.round((completedCount / totalCount) * 100) : 0;

  const inProgress = phasesArr.find(p => p.status === 'in_progress');
  const nextScheduled = phasesArr.find(p => p.status === 'scheduled');

  // Build selections section (pending approvals + approved history)
  const fmtMoney = n => n ? '$' + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '—';
  const fmtSelDate = d => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
  const approvalBase = location.href.replace(/customer\.html.*$/i, '').replace(/\/$/, '');
  const buildApprovalLink = (sel) => {
    const page = sel.status === 'awaiting_customer_install' ? 'install_approval.html' : 'approval.html';
    return `${approvalBase}/${page}?t=${sel.customer_token}`;
  };
  const selectionsHtml = selectionsArr.length ? `
    <div class="cust-section">
      <h3>Material Selections</h3>
      <div class="cust-sel-list">
        ${selectionsArr.map(s => {
          const isPending = s.status === 'awaiting_customer' || s.status === 'awaiting_customer_install';
          const isApproved = s.status === 'approved' || s.status === 'install_scheduled';
          const cls = isPending ? 'pending' : (isApproved ? 'approved' : '');
          const statusLbl = s.status === 'awaiting_customer' ? 'Approval Needed'
            : s.status === 'awaiting_customer_install' ? 'Install Date Approval'
            : s.status === 'install_scheduled' ? 'Install Scheduled'
            : 'Approved';
          const statusCls = isPending ? 'pending' : 'approved';
          const vendor = s.vendor_sub?.company_name || s.vendor_name || '';
          const installLine = s.approved_install_date && isApproved
            ? `<div class="cust-sel-install">📅 Install scheduled: ${fmtSelDate(s.approved_install_date)}</div>` : '';
          const action = isPending
            ? `<a href="${buildApprovalLink(s)}" class="cust-sel-btn primary">→ Review &amp; Approve</a>`
            : '';
          return `
            <div class="cust-sel-card ${cls}">
              <div class="cust-sel-head">
                <div>
                  <div class="cust-sel-cat">${escHtml(s.category || 'Selection')}</div>
                  ${s.description ? `<div class="cust-sel-desc">${escHtml(s.description)}</div>` : ''}
                </div>
                <div class="cust-sel-status ${statusCls}">${statusLbl}</div>
              </div>
              <div class="cust-sel-meta">
                ${vendor ? `<span><b>Vendor:</b> ${escHtml(vendor)}</span>` : ''}
                ${s.sku ? `<span><b>SKU:</b> ${escHtml(s.sku)}</span>` : ''}
                ${s.quantity ? `<span><b>Qty:</b> ${escHtml(String(s.quantity))}${s.unit ? ' ' + escHtml(s.unit) : ''}</span>` : ''}
                ${s.total_cost ? `<span><b>Total:</b> ${fmtMoney(s.total_cost)}</span>` : ''}
              </div>
              ${installLine}
              ${action ? `<div class="cust-sel-actions">${action}</div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  ` : '';

  // Build external links section (DocuSketch / Hover, only if customer-visible)
  const extLinks = [];
  if (project.docusketch_url && project.docusketch_visible_customer) {
    extLinks.push({ icon: '📐', label: 'DocuSketch', url: project.docusketch_url });

  if (project.hover_url && project.hover_visible_customer) {
    extLinks.push({ icon: '🏠', label: 'Hover', url: project.hover_url });

  const extLinksHtml = extLinks.length ? `
    <div class="cust-section">
      <h3>3D Scans &amp; Measurements</h3>
      <div class="cust-ext-list">
        ${extLinks.map(l => `
          <a href="${l.url}" target="_blank" class="cust-ext">

            <div class="cust-ext-info">
              <div class="cust-ext-label">${l.label}</div>
              <div class="cust-ext-meta">View interactive view ↗</div>
            </div>
          </a>
        `).join('')}
      </div>
    </div>

  const photosHtml = visiblePhotos.length ? `

      <h3>Project Photos</h3>
      <div class="cust-photo-grid">
        ${visiblePhotos.map(p => {
          const cleanName = (p.filename || '').replace(/^\d{8,}[_-]+/, '');
          return `
            <div class="cust-photo-wrap">
              <a href="${p.file_url}" target="_blank" class="cust-photo">

  const invoicesHtml = visibleInvoices.length ? `

      </div>

  // Build documents section
  const docsHtml = visibleOtherDocs.length ? `

      <h3>Documents</h3>

        ${visibleOtherDocs.map(d => {
          const isPdf = /\.pdf$/i.test(d.filename || '');
          const sizeKb = d.file_size_bytes ? (d.file_size_bytes / 1024).toFixed(0) + ' KB' : '';
          const cleanName = (d.filename || '').replace(/^\d{8,}[_-]+/, '');
          return `

          const phaseTag = e.phase_name ? `<span class="cj-tag">📋 ${escHtml(e.phase_name)}</span>` : '';
          const body = (e.body || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/@([A-Za-z][A-Za-z0-9_.\-\s]{1,40})/g, m => `<span class="cj-mention">${m}</span>`)
            .replace(/\n/g, '<br>');
          const allAtts = (e.attachments || []);
          const attCount = allAtts.length;
          // Plain-text preview for collapsed view (no HTML, single line)
          const previewText = (e.body || '').replace(/\s+/g, ' ').trim();
          const previewDisplay = previewText
            ? escHtml(previewText.length > 80 ? previewText.slice(0, 80) + '…' : previewText)
            : (attCount ? `<span style="color:var(--muted);font-style:italic;">${attCount} attachment${attCount > 1 ? 's' : ''}</span>` : '<span style="color:var(--muted);font-style:italic;">(no message)</span>');
          const attHtml = allAtts.length ? `
            <div class="cj-photos">
              ${allAtts.map(a => {
                const isImage = /^image\//.test(a.mime_type || '') || /\.(jpe?g|png|gif|webp|heic)$/i.test(a.filename || '');
                const isPdf = /\.pdf$/i.test(a.filename || '') || /pdf/i.test(a.mime_type || '');
                if (isImage) {
                  return `<a href="${a.file_url}" target="_blank" class="cj-photo"><img src="${a.file_url}" loading="lazy" alt=""></a>`;
                }
                if (isPdf) {
                  return `<a href="${a.file_url}" target="_blank" class="cj-photo cj-photo-pdf" data-pdf-thumb="${a.file_url}" title="${escHtml(a.filename)}">
                    <span class="cj-pdf-fallback">📕</span>
                  </a>`;
                }
                return `<a href="${a.file_url}" target="_blank" class="cj-photo cj-photo-doc" title="${escHtml(a.filename)}">
                  <span class="cj-doc-icon">📄</span>
                  <span class="cj-doc-name">${escHtml(a.filename || 'file')}</span>
                </a>`;
              }).join('')}
            </div>` : '';
          return `
            <div class="cj-entry collapsed" data-entry-id="${e.id}">
              <div class="cj-collapsed-row">
                <div class="cj-avatar">${escHtml(initials)}</div>
                <div class="cj-collapsed-info">
                  <div class="cj-author">${escHtml(author)}</div>
                  <div class="cj-collapsed-preview">${previewDisplay}</div>
                </div>
                <div class="cj-collapsed-meta">
                  ${attCount ? `<span class="cj-att-badge">📎 ${attCount}</span>` : ''}
                  <span class="cj-date">${dateStr}</span>
                  <span class="cj-chevron">›</span>
                </div>
              </div>
              <div class="cj-body">${body}</div>
              ${attHtml}
              ${phaseTag ? `<div class="cj-tags">${phaseTag}</div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  ` : '';

  document.getElementById('lastUpdated').textContent = new Date().toLocaleString('en-US', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
  });

  // Build monthly calendar
  const scheduled = phasesArr.filter(p => p.scheduled_start);
  let calHtml = '';
  if (scheduled.length) {
    // Determine which month to show — use stored state, else default to current month or earliest phase month
    if (!window._custCalDate) {
      const today = new Date();
      const earliest = scheduled.reduce((min, p) => {
        const d = new Date(p.scheduled_start);
        return !min || d < min ? d : min;
      }, null);
      // Default: today's month if any phase happens this month, else earliest phase month
      const inProgressNow = scheduled.find(p => {
        const s = new Date(p.scheduled_start);
        const e = p.scheduled_end ? new Date(p.scheduled_end) : s;
        return today >= s && today <= e;
      });
      window._custCalDate = inProgressNow
        ? new Date(today.getFullYear(), today.getMonth(), 1)
        : new Date(earliest.getFullYear(), earliest.getMonth(), 1);
    }
    const viewDate = window._custCalDate;
    const year = viewDate.getFullYear();
    const month = viewDate.getMonth();
    const monthName = viewDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

    // Generate 6-week grid: starts on Sunday before the 1st
    const firstOfMonth = new Date(year, month, 1);
    const startDay = new Date(firstOfMonth);
    startDay.setDate(1 - firstOfMonth.getDay());
    const today = new Date(); today.setHours(0,0,0,0);

    const weeks = [];
    for (let w = 0; w < 6; w++) {
      const week = [];
      for (let d = 0; d < 7; d++) {
        const cellDate = new Date(startDay);
        cellDate.setDate(startDay.getDate() + (w * 7) + d);
        cellDate.setHours(0,0,0,0);

        // Find phases active on this day
        const dayPhases = scheduled.filter(p => {
          const s = new Date(p.scheduled_start); s.setHours(0,0,0,0);
          const e = p.scheduled_end ? new Date(p.scheduled_end) : s;
          e.setHours(0,0,0,0);
          return cellDate >= s && cellDate <= e;
        });

        week.push({
          date: cellDate,
          isCurrentMonth: cellDate.getMonth() === month,
          isToday: cellDate.getTime() === today.getTime(),
          isPast: cellDate < today,
          phases: dayPhases,
        });
      }
      weeks.push(week);
      // Stop early if we've passed the month and last cell isn't current month
      if (week[6].date.getMonth() !== month && w >= 3) break;
    }

    const dayHeaders = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="cal-dow">${d}</div>`).join('');

    const cellsHtml = weeks.flat().map(cell => {
      const phaseChips = cell.phases.slice(0, 3).map(p => {
        const start = new Date(p.scheduled_start); start.setHours(0,0,0,0);
        const isFirst = cell.date.getTime() === start.getTime();
        return `<div class="cal-chip cal-chip-${p.status}" title="${p.phase_name} (${p.status.replace('_',' ')})">${isFirst ? p.phase_name : '·'}</div>`;
      }).join('');
      const overflow = cell.phases.length > 3 ? `<div class="cal-chip-more">+${cell.phases.length - 3}</div>` : '';
      const cls = [
        'cal-cell',
        cell.isCurrentMonth ? '' : 'cal-cell-other',
        cell.isToday ? 'cal-cell-today' : '',
        cell.isPast ? 'cal-cell-past' : '',
      ].filter(Boolean).join(' ');
      return `<div class="${cls}">
        <div class="cal-cell-num">${cell.date.getDate()}</div>
        <div class="cal-cell-chips">${phaseChips}${overflow}</div>
      </div>`;
    }).join('');

    calHtml = `
      <div class="cal-month">
        <div class="cal-month-head">
          <button class="cal-nav" data-cal-nav="prev" aria-label="Previous month">‹</button>
          <h3>${monthName}</h3>
          <button class="cal-nav" data-cal-nav="next" aria-label="Next month">›</button>
          <button class="cal-nav cal-today-btn" data-cal-nav="today">Today</button>
        </div>
        <div class="cal-grid">
          <div class="cal-grid-header">${dayHeaders}</div>
          <div class="cal-grid-body">${cellsHtml}</div>
        </div>
      </div>
    `;
  }

  const phasesList = phasesArr.map(p => `
    <div class="phase-row ${p.status}">
      <div class="phase-num">${p.status === 'complete' ? '✓' : String(p.sequence).padStart(2,'0')}</div>
      <div>
        <div class="phase-name">${p.phase_name}</div>
        ${p.scheduled_start ? `<div style="font-size:11px;color:var(--muted);margin-top:2px;">${fmtShortDate(p.scheduled_start)} → ${fmtShortDate(p.scheduled_end)}</div>` : ''}
      </div>
      <div></div>
      <div class="status-pill ${p.status}">${titleCase(p.status)}</div>
    </div>
  `).join('');

  main.innerHTML = `
    <div class="hero">
      <h1>${project.customer_name ? project.customer_name + "'s" : ''} Project</h1>
      <div class="sub">${project.albi_job_number || ''}${project.property_address ? ' · ' + project.property_address : ''}</div>
      ${project.albi_pm_name ? `
        <div class="pm">
          <div><b>Your Project Manager:</b> ${project.albi_pm_name}</div>
          ${project.albi_pm_phone ? `<a href="tel:${project.albi_pm_phone}">📞 ${fmtPhone(project.albi_pm_phone)}</a>` : ''}
          ${project.albi_pm_email ? `<a href="mailto:${project.albi_pm_email}">✉ Email</a>` : ''}
        </div>` : ''}
    </div>

    <div class="progress-card">
      <h3>Project Progress</h3>
      <div class="progress-bar">
        <div style="width:${pct}%"></div>
        <div class="pct">${completedCount} of ${totalCount} phases complete · ${pct}%</div>
      </div>
      ${inProgress ? `<div style="margin-top:10px;font-size:13px;"><b style="color:var(--orange);">In progress now:</b> ${inProgress.phase_name}${inProgress.scheduled_end ? ' (expected complete ' + fmtShortDate(inProgress.scheduled_end) + ')' : ''}</div>` : ''}
      ${!inProgress && nextScheduled ? `<div style="margin-top:10px;font-size:13px;"><b style="color:var(--gold);">Up next:</b> ${nextScheduled.phase_name}${nextScheduled.scheduled_start ? ' starting ' + fmtShortDate(nextScheduled.scheduled_start) : ''}</div>` : ''}
    </div>

    ${calHtml}

    ${selectionsHtml}
    ${extLinksHtml}
    ${photosHtml}
    ${invoicesHtml}
    ${docsHtml}
    ${journalHtml}

    <!-- Customer composer -->
    <div class="cust-composer">
      <h3>Send Update or Photos</h3>
      <p class="cust-composer-hint">Share questions, photos, or documents with your project manager. They'll be notified right away.</p>
      <textarea id="custJrBody" placeholder="What would you like to share?" rows="3"></textarea>
      <div id="custJrPreview" class="cust-att-preview"></div>
      <div class="cust-composer-actions">
        <label class="cust-attach-btn">
          📎 Attach photos or documents
          <input type="file" id="custJrAttach" multiple accept="image/*,application/pdf,.doc,.docx" style="display:none;">
        </label>
        <button id="custJrPostBtn" class="cust-post-btn">Send</button>
      </div>
    </div>
  `;

  // Wire customer composer
  wireCustomerComposer(project);

  // Wire journal expand/collapse + lazy PDF thumb render
  document.querySelectorAll('.cj-entry.collapsed, .cj-entry:not(.collapsed)').forEach(entry => {
    entry.addEventListener('click', (e) => {
      // Don't collapse if user clicked an attachment link
      if (e.target.closest('a')) return;
      const wasCollapsed = entry.classList.contains('collapsed');
      entry.classList.toggle('collapsed');
      // Lazy-render PDF thumbs the first time this entry expands
      if (wasCollapsed && !entry.dataset.thumbsRendered) {
        entry.dataset.thumbsRendered = '1';
        renderPdfThumbsIn(entry);
      }
    });
  });

  // Wire calendar nav
  document.querySelectorAll('[data-cal-nav]').forEach(btn => {
    btn.addEventListener('click', () => {
      const dir = btn.dataset.calNav;
      const cur = window._custCalDate || new Date();
      if (dir === 'prev') {
        window._custCalDate = new Date(cur.getFullYear(), cur.getMonth() - 1, 1);
      } else if (dir === 'next') {
        window._custCalDate = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
      } else if (dir === 'today') {
        const t = new Date();
        window._custCalDate = new Date(t.getFullYear(), t.getMonth(), 1);
      }
      render();
    });
  });
}

const CUST_BUCKET = 'rebuild-journal-attachments';
const CUST_MESSAGE_HOOK = 'https://hooks.zapier.com/hooks/catch/12653197/uvule41/';
let custFiles = [];

// Set PDF.js worker once
if (window.pdfjsLib) {
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

async function renderPdfThumbsIn(scope) {
  if (!window.pdfjsLib) return;
  const root = scope || document;
  const els = root.querySelectorAll('[data-pdf-thumb]');
  for (const el of els) {
    if (el.dataset.thumbDone) continue;
    const url = el.dataset.pdfThumb;
    if (!url) continue;
    try {
      const loadingTask = window.pdfjsLib.getDocument({
        url,
        disableRange: true,
        disableStream: true,
      });
      const pdf = await loadingTask.promise;
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 1 });
      const targetWidth = 240;
      const scale = targetWidth / viewport.width;
      const scaled = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = scaled.width;
      canvas.height = scaled.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: scaled }).promise;
      const img = document.createElement('img');
      img.src = canvas.toDataURL('image/jpeg', 0.85);
      img.alt = '';
      el.innerHTML = '';
      el.appendChild(img);
      el.dataset.thumbDone = '1';
    } catch (e) {
      console.warn('PDF thumb failed', url, e);
    }
  }
}

function wireCustomerComposer(project) {
  const attInput = document.getElementById('custJrAttach');
  const preview = document.getElementById('custJrPreview');
  const postBtn = document.getElementById('custJrPostBtn');

  if (attInput) {
    attInput.addEventListener('change', () => {
      custFiles = [...attInput.files];
      preview.innerHTML = custFiles.map(f => {
        const isImg = /^image\//.test(f.type);
        if (isImg) {
          const url = URL.createObjectURL(f);
          return `<div class="cust-att-thumb"><img src="${url}" alt=""><div class="cust-att-name">${escHtml(f.name)}</div></div>`;
        }
        return `<div class="cust-att-thumb cust-att-thumb-doc"><span style="font-size:24px;">📄</span><div class="cust-att-name">${escHtml(f.name)}</div></div>`;
      }).join('');
    });
  }

  if (postBtn) {
    postBtn.addEventListener('click', async () => {
      const body = document.getElementById('custJrBody').value.trim();
      if (!body && !custFiles.length) {
        alert('Please type a message or attach a file before sending.');
        return;
      }
      postBtn.disabled = true;
      postBtn.textContent = 'Sending…';

      try {
        // Insert journal entry
        const customerName = project.customer_name || 'Customer';
        const { data: inserted, error: insErr } = await sb.from('rebuild_journal_entries').insert({
          project_id: project.id,
          body: body || '(file attached)',
          author_email: project.customer_email || 'customer@portal',
          author_name: customerName,
          author_role: 'customer',
          customer_visible: true,
        }).select();
        if (insErr) throw insErr;
        const entry = inserted[0];

        // Upload files
        for (const f of custFiles) {
          const safeName = f.name.replace(/[^a-zA-Z0-9._-]/g, '_');
          const path = `entries/${entry.id}/${Date.now()}-${safeName}`;
          const { error: upErr } = await sb.storage.from(CUST_BUCKET).upload(path, f, {
            contentType: f.type || 'application/octet-stream',
            upsert: false,
          });
          if (upErr) { console.error('att upload failed', upErr); continue; }
          const { data: urlData } = sb.storage.from(CUST_BUCKET).getPublicUrl(path);
          await sb.from('rebuild_journal_attachments').insert({
            entry_id: entry.id,
            file_url: urlData.publicUrl,
            filename: f.name,
            mime_type: f.type || null,
            file_size_bytes: f.size,
          });
          // Also save to project Documents (auto-categorize photos vs files)
          const isImage = /^image\//i.test(f.type || '') || /\.(jpe?g|png|gif|webp|heic)$/i.test(f.name);
          await sb.from('rebuild_documents').insert({
            project_id: project.id,
            category: isImage ? 'Photos' : 'Customer Documents',
            filename: f.name,
            file_url: urlData.publicUrl,
            file_size_bytes: f.size,
            mime_type: f.type || null,
            uploaded_by_email: project.customer_email || 'customer@portal',
            push_status: 'pending',
            customer_visible: true,
          });
        }

        // Notify PM
        if (project.albi_pm_email) {
          await sb.from('rebuild_notifications').insert({
            project_id: project.id,
            recipient_email: project.albi_pm_email.toLowerCase(),
            event_type: 'customer_journal',
            selection_id: entry.id,
            title: `${customerName} sent an update`,
            body: (body || '(file attached)').slice(0, 200),
          });

          // Fire email immediately via Zapier hook (don't rely on PM having tab open)
          try {
            const fileUrls = [];
            if (custFiles.length) {
              // Re-grab attachment URLs we just inserted
              const { data: atts } = await sb.from('rebuild_journal_attachments')
                .select('file_url').eq('entry_id', entry.id);
              if (atts) atts.forEach(a => fileUrls.push(a.file_url));
            }
            await fetch(CUST_MESSAGE_HOOK, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                channel: 'email',
                to_email: project.albi_pm_email,
                from_email: 'josh@jg-restoration.com',
                from_name: 'JG Platform',
                recipient_name: project.albi_pm_name || 'Project Manager',
                recipient_type: 'pm_alert',
                subject: `🧑 ${customerName} sent an update — ${project.albi_job_number || 'Project'}`,
                body: `${customerName} just posted in the customer portal:\n\n${body || '(file attached)'}\n\nProject: ${project.albi_job_number || ''}\n${project.property_address || ''}\n\nLog into the JG Platform to view and reply.`,
                attachment_count: fileUrls.length,
                attachment_urls: fileUrls.join(','),
                attachment_url_1: fileUrls[0] || '',
                attachment_url_2: fileUrls[1] || '',
                attachment_url_3: fileUrls[2] || '',
                attachment_url_4: fileUrls[3] || '',
              }),
              mode: 'no-cors',
            });
          } catch (e) { console.warn('email hook failed', e); }
        }

        // Reset
        document.getElementById('custJrBody').value = '';
        if (attInput) attInput.value = '';
        custFiles = [];
        preview.innerHTML = '';
        postBtn.disabled = false;
        postBtn.textContent = 'Send';
        alert('Sent! Your project manager will be notified.');

        // Re-render to show new entry
        render();
      } catch (e) {
        console.error('cust post failed', e);
        alert('Sorry, something went wrong. Please try again or call (920) 428-4200.');
        postBtn.disabled = false;
        postBtn.textContent = 'Send';
      }
    });
  }
}
</script>
