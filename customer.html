<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Project Schedule · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<style>
  :root {
    --navy: #0d2d5e;
    --orange: #e85d04;
    --gold: #f5a623;
    --green: #2d9c5f;
    --red: #d64545;
    --bg: #f4f6fb;
    --card: #ffffff;
    --text: #1a2540;
    --muted: #7884a0;
    --line: #e3e7f0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    background: var(--navy);
    color: #fff;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 2px 8px rgba(13,45,94,.12);
  }
  header img { width: 44px; height: 44px; object-fit: contain; background: #fff; padding: 4px; border-radius: 6px; }
  header .brand { display: flex; flex-direction: column; }
  header .brand-name { font-weight: 800; font-size: 18px; letter-spacing: .3px; }
  header .brand-tag { font-size: 11px; opacity: .85; letter-spacing: .5px; text-transform: uppercase; }
  header .contact {
    margin-left: auto;
    text-align: right;
    font-size: 13px;
  }
  header .contact a { color: #fff; text-decoration: none; font-weight: 600; }
  header .contact a:hover { color: var(--gold); }

  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 24px;
  }
  .hero {
    background: var(--card);
    border-radius: 10px;
    padding: 22px 26px;
    margin-bottom: 18px;
    border: 1px solid var(--line);
  }
  .hero h1 {
    margin: 0 0 4px;
    color: var(--navy);
    font-size: 22px;
  }
  .hero .sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 12px;
  }
  .hero .pm {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    font-size: 13px;
  }
  .hero .pm b { color: var(--navy); }
  .pm a {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 11px;
    background: var(--orange);
    color: #fff;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 12px;
  }
  .pm a:hover { background: var(--navy); }

  .progress-card {
    background: var(--card);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 18px;
    border: 1px solid var(--line);
  }
  .progress-card h3 {
    margin: 0 0 12px;
    color: var(--navy);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .progress-bar {
    background: var(--bg);
    border-radius: 999px;
    height: 14px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar > div {
    background: linear-gradient(90deg, var(--green), #4cb377);
    height: 100%;
    transition: width .4s;
  }
  .progress-bar .pct {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,.3);
    mix-blend-mode: difference;
  }

  .phases {
    background: var(--card);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 18px;
    border: 1px solid var(--line);
  }
  .phases h3 {
    margin: 0 0 14px;
    color: var(--navy);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .phase-row {
    display: grid;
    grid-template-columns: 28px 1fr auto auto;
    gap: 14px;
    align-items: center;
    padding: 12px 0;
    border-top: 1px solid var(--line);
  }
  .phase-row:first-of-type { border-top: 0; padding-top: 0; }
  .phase-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
  }
  .phase-row.complete .phase-num { background: var(--green); color: #fff; }
  .phase-row.in_progress .phase-num { background: var(--orange); color: #fff; }
  .phase-row.scheduled .phase-num { background: var(--gold); color: #fff; }
  .phase-row.blocked .phase-num { background: var(--red); color: #fff; }
  .phase-name { font-weight: 600; color: var(--navy); }
  .phase-dates {
    font-size: 12px;
    color: var(--muted);
    text-align: right;
  }
  .status-pill {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: .4px;
    white-space: nowrap;
  }
  .status-pill.pending { background: #eef0f7; color: var(--muted); }
  .status-pill.scheduled { background: #fdf3e0; color: var(--gold); }
  .status-pill.in_progress { background: #fff0e1; color: var(--orange); }
  .status-pill.complete { background: #e6f7ec; color: var(--green); }
  .status-pill.blocked { background: #fdecec; color: var(--red); }
  .status-pill.skipped { background: #eef0f7; color: var(--muted); }

  .timeline {
    background: var(--card);
    border-radius: 10px;
    padding: 18px 22px;
    margin-bottom: 18px;
    border: 1px solid var(--line);
    overflow-x: auto;
  }
  .timeline h3 {
    margin: 0 0 14px;
    color: var(--navy);
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }
  .cal-row {
    display: flex;
    align-items: center;
    height: 24px;
    margin-bottom: 4px;
    position: relative;
  }
  .cal-label {
    width: 160px;
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text);
    font-weight: 500;
    padding-right: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cal-track {
    flex: 1;
    position: relative;
    height: 100%;
    border-left: 1px solid var(--line);
  }
  .cal-bar {
    position: absolute;
    top: 3px;
    height: 18px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    padding: 0 6px;
    font-size: 10px;
    color: #fff;
    font-weight: 600;
    overflow: hidden;
  }
  .cal-bar-pending { background: #b6bccc; }
  .cal-bar-scheduled { background: var(--gold); }
  .cal-bar-in_progress { background: var(--orange); }
  .cal-bar-complete { background: var(--green); }
  .cal-bar-blocked { background: var(--red); }
  .cal-bar-skipped { background: #c5cad6; opacity: .6; }
  .cal-today-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--orange);
    z-index: 5;
    pointer-events: none;
  }

  .footer-note {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    padding: 24px 0 40px;
  }
  .footer-note a { color: var(--navy); text-decoration: none; font-weight: 600; }

  .empty-state, .error-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .error-state h2 { color: var(--navy); }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    main { padding: 14px; }
    .cal-label { width: 100px; font-size: 10px; }
    .hero h1 { font-size: 18px; }
  }
</style>
</head>
<body>

<header>
  <img src="https://jgimprovements-arch.github.io/jg-dispatch/logo.png" alt="JG Restoration">
  <div class="brand">
    <div class="brand-name">JG Restoration</div>
    <div class="brand-tag">Your Project Schedule</div>
  </div>
  <div class="contact">
    <div><a href="tel:9204284200">(920) 428-4200</a></div>
    <div style="font-size:11px;opacity:.75;">jg-restoration.com</div>
  </div>
</header>

<main id="main">
  <div class="empty-state">Loading your schedule…</div>
</main>

<div class="footer-note">
  Last updated: <span id="lastUpdated">—</span> · This page auto-refreshes when changes are made.
  <br>Questions? Call <a href="tel:9204284200">(920) 428-4200</a>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const sb = createClient(SB_URL, SB_ANON);

const params = new URLSearchParams(window.location.search);
const token = params.get('t');
const main = document.getElementById('main');

const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
const fmtShortDate = d => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—';
const titleCase = s => String(s||'').replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
const fmtPhone = v => {
  if (!v) return '';
  const d = String(v).replace(/\D/g,'');
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  if (d.length === 11 && d[0] === '1') return `(${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
  return v;
};

if (!token) {
  main.innerHTML = `<div class="error-state">
    <h2>Project link is invalid</h2>
    <p>This page requires a valid project link. Please use the link your project manager sent you.</p>
    <p>If you need a new link, call <a href="tel:9204284200">(920) 428-4200</a>.</p>
  </div>`;
} else {
  await render();
  // Realtime subscription on changes
  sb.channel('customer_view_' + token)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rebuild_phases' }, () => render())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rebuild_projects' }, () => render())
    .subscribe();
}

async function render() {
  const { data: project, error: pErr } = await sb.from('rebuild_projects')
    .select('*').eq('customer_token', token).maybeSingle();

  if (pErr || !project) {
    main.innerHTML = `<div class="error-state">
      <h2>Project not found</h2>
      <p>This link may have expired or been deactivated.</p>
      <p>Call <a href="tel:9204284200">(920) 428-4200</a> if you need help.</p>
    </div>`;
    return;
  }

  const { data: phases } = await sb.from('rebuild_phases')
    .select('*').eq('project_id', project.id).order('sequence');
  const phasesArr = phases || [];
  const completedCount = phasesArr.filter(p => p.status === 'complete').length;
  const totalCount = phasesArr.length;
  const pct = totalCount ? Math.round((completedCount / totalCount) * 100) : 0;

  const inProgress = phasesArr.find(p => p.status === 'in_progress');
  const nextScheduled = phasesArr.find(p => p.status === 'scheduled');

  document.getElementById('lastUpdated').textContent = new Date().toLocaleString('en-US', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
  });

  // Calendar bounds
  const scheduled = phasesArr.filter(p => p.scheduled_start);
  let calHtml = '';
  if (scheduled.length) {
    const dates = scheduled.flatMap(p => {
      const s = new Date(p.scheduled_start);
      const e = p.scheduled_end ? new Date(p.scheduled_end) : new Date(s.getTime() + 86400000);
      return [s, e];
    });
    let minDate = new Date(Math.min(...dates));
    let maxDate = new Date(Math.max(...dates));
    minDate = new Date(minDate.getTime() - 2 * 86400000);
    maxDate = new Date(maxDate.getTime() + 2 * 86400000);
    const totalMs = maxDate - minDate;

    const today = new Date(); today.setHours(0,0,0,0);
    const todayPct = ((today - minDate) / totalMs) * 100;
    const todayInRange = todayPct >= 0 && todayPct <= 100;

    const bars = phasesArr.map(p => {
      if (!p.scheduled_start) return '';
      const start = new Date(p.scheduled_start);
      const end = p.scheduled_end ? new Date(p.scheduled_end) : new Date(start.getTime() + 86400000);
      const left = ((start - minDate) / totalMs) * 100;
      const width = Math.max(((end - start) / totalMs) * 100, 1);
      return `
        <div class="cal-row">
          <div class="cal-label">${p.phase_name}</div>
          <div class="cal-track">
            <div class="cal-bar cal-bar-${p.status}" style="left:${left}%;width:${width}%;" title="${p.phase_name}: ${fmtShortDate(start)} → ${fmtShortDate(end)}"></div>
          </div>
        </div>`;
    }).join('');

    calHtml = `
      <div class="timeline">
        <h3>Timeline</h3>
        ${todayInRange ? `<div style="position:relative;height:0;"><div class="cal-today-line" style="left:calc(160px + (100% - 160px) * ${todayPct/100});height:${(scheduled.length+1) * 28}px;"></div></div>` : ''}
        ${bars}
      </div>
    `;
  }

  const phasesList = phasesArr.map(p => `
    <div class="phase-row ${p.status}">
      <div class="phase-num">${p.status === 'complete' ? '✓' : String(p.sequence).padStart(2,'0')}</div>
      <div>
        <div class="phase-name">${p.phase_name}</div>
        ${p.scheduled_start ? `<div style="font-size:11px;color:var(--muted);margin-top:2px;">${fmtShortDate(p.scheduled_start)} → ${fmtShortDate(p.scheduled_end)}</div>` : ''}
      </div>
      <div></div>
      <div class="status-pill ${p.status}">${titleCase(p.status)}</div>
    </div>
  `).join('');

  main.innerHTML = `
    <div class="hero">
      <h1>${project.customer_name ? project.customer_name + "'s" : ''} Project</h1>
      <div class="sub">${project.albi_job_number || ''}${project.property_address ? ' · ' + project.property_address : ''}</div>
      ${project.albi_pm_name ? `
        <div class="pm">
          <div><b>Your Project Manager:</b> ${project.albi_pm_name}</div>
          ${project.albi_pm_phone ? `<a href="tel:${project.albi_pm_phone}">📞 ${fmtPhone(project.albi_pm_phone)}</a>` : ''}
          ${project.albi_pm_email ? `<a href="mailto:${project.albi_pm_email}">✉ Email</a>` : ''}
        </div>` : ''}
    </div>

    <div class="progress-card">
      <h3>Project Progress</h3>
      <div class="progress-bar">
        <div style="width:${pct}%"></div>
        <div class="pct">${completedCount} of ${totalCount} phases complete · ${pct}%</div>
      </div>
      ${inProgress ? `<div style="margin-top:10px;font-size:13px;"><b style="color:var(--orange);">In progress now:</b> ${inProgress.phase_name}${inProgress.scheduled_end ? ' (expected complete ' + fmtShortDate(inProgress.scheduled_end) + ')' : ''}</div>` : ''}
      ${!inProgress && nextScheduled ? `<div style="margin-top:10px;font-size:13px;"><b style="color:var(--gold);">Up next:</b> ${nextScheduled.phase_name}${nextScheduled.scheduled_start ? ' starting ' + fmtShortDate(nextScheduled.scheduled_start) : ''}</div>` : ''}
    </div>

    ${calHtml}

    <div class="phases">
      <h3>All Phases</h3>
      ${phasesArr.length ? phasesList : '<div style="color:var(--muted);font-size:13px;">Schedule is being prepared. Check back soon.</div>'}
    </div>
  `;
}
</script>

</body>
</html>
