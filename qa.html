function fireHook(url,params){
  return new Promise(async resolve=>{
    const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(String(v).substring(0,1800))).join('&');
    const fullUrl=url+'?'+qs;
    console.log('Webhook firing:',url.split('/').pop(),Object.keys(params).length,'params, URL length:',fullUrl.length);
    // Try fetch first (more reliable)
    try{
      await fetch(fullUrl,{mode:'no-cors',method:'GET'});
      console.log('Webhook fetch OK:',url.split('/').pop());
      resolve(true);return
    }catch(e){console.log('Fetch failed, trying Image:',e.message)}
    // Fallback to Image src
    const img=new Image();
    img.onload=()=>{console.log('Webhook img OK');resolve(true)};
    img.onerror=()=>{console.log('Webhook img error (still fires)');resolve(true)};
    img.src=fullUrl;
    setTimeout(()=>resolve(true),3000)
  })
}
// Fire multiple notes if content is long
async function fireNotes(projName,fullText){
  const chunks=[];
  const maxLen=1600;
  let remaining=fullText;
  let part=1;
  while(remaining.length>0){
    const chunk=remaining.substring(0,maxLen);
    const label=chunks.length>0?'(Part '+(part)+') ':'';
    chunks.push(label+chunk);
    remaining=remaining.substring(maxLen);
    part++;
  }
  for(const chunk of chunks){
    await fireHook(HOOKS.note,{project_name:projName,note:chunk});
    await new Promise(r=>setTimeout(r,500)); // small delay between notes
  }
}

const EXTRACT_PROMPT=`You are a forensic data extractor for restoration estimates. Read the Encircle mitigation report and Xactimate estimate. Extract ALL data verbatim — no judgment, no flagging, no recommendations. Just structured data.

const AUDIT_PROMPT=`You are a senior IICRC-certified mitigation auditor for JG Restoration in Wisconsin. You receive STRUCTURED DATA from a prior extraction step. Apply judgment to find billing gaps and overbilling. Be aggressive — your job is to maximize defensible revenue.

NEVER include O&P on water mitigation, mold, contents, or fire mitigation. O&P only on reconstruction.

Verified WIGR8X codes (price list MAR26): WTR DRY+ $30.04/EA, WTR DRY $25.61/EA, WTR DHM> $75.43/EA, WTR DHM>> $117.30/EA, WTR NAFAN $72.09/DA, HMR NAFAN $72.09/DA, WTR GRMB $0.38/SF, WTR PPE+ $48.23/EA, WTR EQ $60.50/HR, WTR LAB $60.50/HR, WTR LABA $90.84/HR, WTR DRYWS $1.52/SF, WTR DRYWLS $6.17/LF, WTR INSS $1.15/SF, WTR TRIM $1.03/LF, WTR TRID $0.96/LF, WTR BARR $0.99/SF, WTR BARRZ+ $16.61/EA, WTR MASKFL $0.59/SF, WTR FHEPA $220.90/EA, WTR FCWS $5.85/SF, WTR FCCS $0.95/SF, WTR FCVS $2.29/SF, WTR PADS $0.89/SF, WTR SFS $2.97/SF, WTR PLAS $4.12/SF, WTR SNKD $34.19/EA, WTR TLTD $54.51/EA, WTR DORSLD $7.19/EA, WTR CABLOW $10.02/LF, DMO DUMP> $630.01/EA.

You will be GIVEN structured extraction data. Use it as your source of truth — do not re-extract from PDFs. The composite-line-item rule, PPE rule, dumpster rule, conversion panel rule, and HEPA rule will be applied AFTER your output by a code-based filter, so do not over-suppress. Flag what looks underbilled or overbilled by the Encircle evidence; the filter will catch the well-known false-positive patterns.

JUDGMENT RULES (apply these — the code filter handles edge cases):

LABOR MINIMUMS ARE NEVER BILLABLE — do NOT flag missing minimum-hour charges, trip charges, 1-hour minimums, half-hour minimums, or any minimum labor gap. JG bills actual hours from the activity log, never a floor. Skip these entirely.

UNDERBILLING — flag aggressively:
- Equipment days: if Encircle shows equipment onsite N days but estimate bills < N days
- Equipment count: if Encircle photos show more units than billed
- Monitoring: 1.5 hrs/day × calendar days equipment onsite (WTR EQ)
- Anti-microbial (WTR GRMB): required on ALL surfaces in Cat 2+ rooms
- Drying holes: 2 per LF of affected wall (covered by WTR DRYWLS flood cuts)
- After-hours: if any Encircle timestamp shows work outside 8am-4pm M-F, that visit's labor must be WTR LABA $90.84 not WTR LAB $60.50. Flag the rate diff.
- Emergency service call: if date_of_loss_after_hours=true OR after_hours_evidence present, flag missing emergency call fee (HIGH severity)
- Containment: if WTR BARR billed, must also have WTR BARRZ+ zippers (1 per access point) and poles
- HEPA filters: 1 per WTR NAFAN (air scrubber) per loss — ONLY if NAFAN line items exist
- Content manipulation: 0.5-1.5 hrs WTR LAB per room with content_manipulation_photos. Note: customer may have moved own contents — add verification reminder.
- Weighted extraction: heavy saturation/pad removal in Encircle = additional WTR LAB

OVERBILLING — flag with severity:OVERBILLED:
- Equipment count billed > Encircle count
- Equipment days billed > Encircle placement-to-removal range
- Rooms billed > rooms with damage in Encircle
- SF billed > Encircle SF for that room
- WTR LABA after-hours rate billed but Encircle timestamps all within business hours
- Duplicate line items for same room/service
- Anti-microbial on rooms not affected by Cat 2+

For EACH gap, MUST include:
1. encircle_page (integer) — the page number from the extracted data that supports this gap. Pull this from the structured input. Required — never blank.
2. standard_reference (e.g. "IICRC S500 Section 11.2")
3. standard_text — 1-2 sentence requirement language for adjuster justification

Return ONLY valid JSON:
{

  "gaps":[{"id":"GAP-001","category":"MISSING_ITEM|UNDERBILLED|MISSING_ROOM|MISSING_STANDARD|SUPPLEMENT","severity":"HIGH|MEDIUM|LOW","xact_code":"","description":"","recommended_qty":0,"unit":"","unit_cost":0,"estimated_value":"","encircle_evidence":"","encircle_page":0,"xactimate_current":"","standard_reference":"","standard_text":""}],

// ══ RULES ENGINE — runs after AUDIT step ══
function applyBillingRules(extracted, audit) {
  const gaps = (audit.gaps || []).slice();
  const filtered = [];
  const suppressed = [];
  const lineCodes = new Set((extracted.estimate?.line_items || []).map(li => (li.code||'').toUpperCase().trim()));

  for (const g of gaps) {
    const desc = (g.description || '').toLowerCase();
    let drop = null;

    // Composite line item rule — drop "missing labor" gaps when composite code is billed
    if (desc.includes('labor') || desc.includes('removal') || desc.includes('disconnection') ||
        desc.includes('decontamination') || desc.includes('application') || desc.includes('spraying')) {
      for (const [code, keywords] of Object.entries(COMPOSITE_LABOR_KEYWORDS)) {
        if (lineCodes.has(code) && keywords.some(k => desc.includes(k.toLowerCase()))) {
          drop = `Suppressed: ${code} on estimate already includes this labor`;
          break;
        }
      }
    }

    // PPE rule — only flag if zero PPE billed AND Cat 2+
    if (!drop && (g.xact_code||'').toUpperCase().includes('PPE')) {
      const cat = String(extracted.job_info?.water_category || '').trim();
      const hasPPE = Array.from(lineCodes).some(c => c.includes('PPE'));
      if (hasPPE) drop = 'Suppressed: PPE already billed (per JG rule)';
      else if (cat === '1' || cat === 'I' || cat.toLowerCase() === 'category 1') drop = 'Suppressed: Cat 1 does not require PPE';
    }

    // HEPA rule — only flag if NAFAN scrubbers are billed but no FHEPA
    if (!drop && (g.xact_code||'').toUpperCase().includes('FHEPA')) {
      const hasNAFAN = Array.from(lineCodes).some(c => c.includes('NAFAN'));
      if (!hasNAFAN) drop = 'Suppressed: no air scrubbers billed, HEPA not needed';
    }

    // Dumpster rule — only flag if zero debris disposal AND significant demo
    if (!drop && /dumpster|debris/.test(desc)) {
      const hasDebris = Array.from(lineCodes).some(c => /DUMP|HAUL|DEBRIS/.test(c));
      if (hasDebris) drop = 'Suppressed: debris disposal already billed';
      else {
        // Significant demo = drywall/floor tearout in 2+ rooms or large SF
        const demoRooms = (extracted.estimate?.line_items || []).filter(li => {
          const c = (li.code||'').toUpperCase();
          return c.includes('DRYW') || c.includes('FCC') || c.includes('FCV') || c.includes('FCW') || c.includes('SF');
        }).map(li => li.room).filter(Boolean);
        const uniqueDemoRooms = new Set(demoRooms);
        if (uniqueDemoRooms.size < 2) drop = 'Suppressed: minimal demo, dumpster not justified';
      }
    }

    // Conversion panel rule — only flag if Encircle photos explicitly mention it
    if (!drop && /conversion panel|spider box|power distribution/.test(desc)) {
      const photos = extracted.encircle?.conversion_panel_photos || [];
      if (photos.length === 0) drop = 'Suppressed: no Encircle evidence of conversion panel';
    }

    // Content manipulation — keep but ALWAYS add the verification reminder
    if (!drop && /content.*(manipulation|move|block|raise|relocate)/.test(desc)) {
      const note = ' (Verify with PM — customer may have performed this task. If customer moved contents, no charge applies.)';
      if (!desc.includes('verify with pm')) {
        g.description = (g.description || '') + note;
      }
    }

    // Drop foam blocks/risers as separate material — not a JG billing item
    if (!drop && /foam block|foam riser|riser block/.test(desc)) {
      drop = 'Suppressed: foam blocks not a JG billing item';
    }

    // Labor minimum rule — JG does not bill minimum/min-charge labor lines.
    // If AI flags a minimum-hours, min-charge, trip-charge, or 1-hour-minimum gap, suppress.
    if (!drop) {
      const code = (g.xact_code || '').toUpperCase();
      const isLaborCode = code.includes('LAB') || /\bWTR LAB\b|\bWTR LABA\b|\bLAB MIN\b/.test(code);
      const minIndicators = /\bmin(imum)?\b|\bmin charge\b|\btrip charge\b|\b1[ -]?hour minimum\b|\bhalf[ -]?hour minimum\b|\b\.5[ -]?hour\b|\b0\.5 hour\b/i;
      if ((isLaborCode || /\blabor\b/i.test(desc)) && minIndicators.test(desc)) {
        drop = 'Suppressed: labor minimums not allowed per JG billing policy';
      }
    }

    if (drop) {
      suppressed.push({...g, suppressed_reason: drop});
    } else {
      filtered.push(g);
    }
  }

  // Re-ID gaps after filtering
  filtered.forEach((g, i) => g.id = 'GAP-' + String(i+1).padStart(3,'0'));

  return { ...audit, gaps: filtered, _suppressed: suppressed, _rules_applied: true };
}

// ══ WI SALES TAX AUDIT ══
// WI law: real-property repair labor not taxable. Materials taxable.
// This audits whether tax was applied to materials lines and flags missing tax revenue.
function auditSalesTax(extracted, auditResult) {
  const lines = extracted.estimate?.line_items || [];
  const taxableUnpaid = [];
  let taxableUntaxedTotal = 0;

  for (const li of lines) {
    const code = (li.code || '').toUpperCase().trim();
    const isTaxable = WI_TAX_CODES_MATERIAL.has(code);
    if (isTaxable && !li.is_tax_applied) {
      taxableUnpaid.push({line_num: li.line_num, code, description: li.description, total: li.total});
      taxableUntaxedTotal += Number(li.total) || 0;
    }
  }

  if (taxableUnpaid.length > 0) {
    const taxRate = 0.05; // WI state base; many counties add 0.5% — JG should set per location
    const missedTax = +(taxableUntaxedTotal * taxRate).toFixed(2);
    const gap = {
      id: 'GAP-TAX-001',
      category: 'UNDERBILLED',
      severity: 'MEDIUM',
      xact_code: 'TAX-WI',
      description: `Sales tax missing on ${taxableUnpaid.length} taxable material line(s) — WI taxes materials on real property repairs`,
      recommended_qty: taxableUnpaid.length,
      unit: 'EA',
      unit_cost: 0,
      estimated_value: '$' + missedTax.toFixed(2),
      encircle_evidence: 'Estimate review — see lines: ' + taxableUnpaid.map(l => `#${l.line_num} ${l.code}`).join(', '),
      encircle_page: 0,
      xactimate_current: 'Tax flag not set on these lines',
      standard_reference: 'Wis. Stat. § 77.52(2)(a)20 + DOR Pub. 207',
      standard_text: 'Wisconsin sales tax applies to materials sold and consumed in real property construction/repair. Labor on real property is generally exempt. Materials lines (PPE, filters, containment material) require tax.'
    };
    auditResult.gaps = auditResult.gaps || [];
    auditResult.gaps.push(gap);
    auditResult._tax_audit = {missed_tax: missedTax, lines: taxableUnpaid};
  }

  return auditResult;
}

function extractJSON(text){
  // Remove markdown code fences
  let t=text.replace(/```json/g,'').replace(/```/g,'').trim();
  // Try direct parse first
  try{return JSON.parse(t)}catch(e){}
  // Find first { and last } to extract JSON object
  const start=t.indexOf('{');const end=t.lastIndexOf('}');
  if(start!==-1&&end>start){try{return JSON.parse(t.substring(start,end+1))}catch(e){}}
  // Find first [ and last ] for array
  const aStart=t.indexOf('[');const aEnd=t.lastIndexOf(']');
  if(aStart!==-1&&aEnd>aStart){try{return JSON.parse(t.substring(aStart,aEnd+1))}catch(e){}}
  throw new Error('Could not parse AI response as JSON. Response started with: '+t.substring(0,100))
}

  S.busy=true;S.err=null;S.result=null;S.resp={};S.done=false;S.albiSteps=[];S.albiDone=false;S.recheckResult=null;S.correctedEst=null;S.extracted=null;draw();
  try{
    S.prog='Reading PDFs...';draw();
    const[e,x]=await Promise.all([b64(S.enc),b64(S.est)]);
    S.encB64=e;

    // PDF page count handling (Anthropic API limit: 100 pages per doc)
    S.prog='Checking PDF page counts...';draw();
    let encContent,encType='document';
    try{
      const pdfLib=await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs');
      pdfLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';
      const encBytes=Uint8Array.from(atob(e),c=>c.charCodeAt(0));
      const encDoc=await pdfLib.getDocument({data:encBytes}).promise;
      const encPages=encDoc.numPages;
      S.encPdfDoc=encDoc; // cache for thumbnail rendering
      S.encPageCount=encPages;
      console.log('Encircle pages:',encPages);
      if(encPages>100){
        S.prog=`Encircle report is ${encPages} pages (limit 100). Extracting text...`;draw();
        let allText='';
        for(let i=1;i<=encPages;i++){
          const pg=await encDoc.getPage(i);
          const tc=await pg.getTextContent();
          allText+=tc.items.map(it=>it.str).join(' ')+'\n--- PAGE '+i+' ---\n';
        }
        encContent={type:'text',text:'ENCIRCLE MITIGATION REPORT (extracted from '+encPages+'-page PDF, page boundaries marked):\n\n'+allText};
        encType='text';
        S.encText=allText;
      }
    }catch(pdfErr){console.log('PDF page check skipped:',pdfErr.message)}

    // ── STAGE 1: Pure data extraction (no judgment) ──
    S.prog='Stage 1/2: Extracting structured data (30-60 sec)...';draw();
    const extractContent=encType==='text'?[
      encContent,
      {type:'document',source:{type:'base64',media_type:'application/pdf',data:x}},
      {type:'text',text:'ABOVE: Xactimate estimate (PDF) and Encircle report (text). Extract ALL data verbatim. Every fact gets an Encircle page number. Return ONLY valid JSON per the EXTRACT_PROMPT schema.'}
    ]:[
      {type:'document',source:{type:'base64',media_type:'application/pdf',data:e}},
      {type:'text',text:'ABOVE: Encircle mitigation report. Note Encircle PDF page numbers as you extract.'},
      {type:'document',source:{type:'base64',media_type:'application/pdf',data:x}},
      {type:'text',text:'ABOVE: Xactimate estimate. Extract ALL data verbatim. Every Encircle fact gets a page number. Return ONLY valid JSON per the EXTRACT_PROMPT schema.'}
    ];
    const r1=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:12000,system:EXTRACT_PROMPT,
        messages:[{role:'user',content:extractContent}]})});
    if(!r1.ok){const er=await r1.json().catch(()=>null);throw new Error('Stage 1: '+(er?.error?.message||'API error '+r1.status))}
    const d1=await r1.json();const t1=d1.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const extracted=extractJSON(t1);
    S.extracted=extracted;
    console.log('Stage 1 extracted:',extracted);

    // ── STAGE 2: Judgment on structured data (no PDFs needed — much faster) ──
    S.prog='Stage 2/2: Auditing for gaps (20-40 sec)...';draw();
    const auditContent=[
      {type:'text',text:'STRUCTURED DATA from prior extraction:\n\n'+JSON.stringify(extracted,null,2)+'\n\nApply the AUDIT_PROMPT rules. Every gap must include encircle_page from the extracted data. Return ONLY valid JSON.'}
    ];
    const r2=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,system:AUDIT_PROMPT,
        messages:[{role:'user',content:auditContent}]})});
    if(!r2.ok){const er=await r2.json().catch(()=>null);throw new Error('Stage 2: '+(er?.error?.message||'API error '+r2.status))}
    const d2=await r2.json();const t2=d2.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    let audit=extractJSON(t2);

    // ── STAGE 3: Code-based rules engine (false positive filter + tax audit) ──
    S.prog='Applying JG billing rules...';draw();
    audit=applyBillingRules(extracted,audit);
    audit=auditSalesTax(extracted,audit);

    // Merge job_info and estimate_submitted from extracted into audit for compat with rest of UI
    audit.job_info=extracted.job_info||{};
    audit.estimate_submitted={
      subtotal:extracted.estimate?.subtotal||0,
      sales_tax:extracted.estimate?.sales_tax||0,
      total_billed:extracted.estimate?.total_billed||0,
      line_item_count:(extracted.estimate?.line_items||[]).length,
      rooms_billed:[...new Set((extracted.estimate?.line_items||[]).map(li=>li.room).filter(Boolean))]
    };
    audit.encircle_documented={
      rooms_documented:(extracted.encircle?.rooms||[]).map(r=>r.name),
      total_equipment_units:(extracted.encircle?.equipment||[]).reduce((s,e)=>s+(e.count||0),0),
      equipment_days:extracted.encircle?.drying_days||0,
      still_wet_areas:[],
      special_notes:[]
    };
    audit.gaps=(audit.gaps||[]).map((g,i)=>({...g,id:g.id||'GAP-'+String(i+1).padStart(3,'0')}));

    S.result=audit;S.phase='review';S.prog='';
    console.log('Final audit (post-rules):',audit);
    if(audit._suppressed?.length){console.log('Suppressed by rules engine:',audit._suppressed)}
  }catch(e){S.err=e.message;S.prog='';console.error(e)}
  S.busy=false;draw()
}

// ══ PASS 2: Verify Corrections ══
async function runPass2(){
  if(!S.correctedEst||!S.encB64||S.recheckBusy)return;
  S.recheckBusy=true;S.err=null;S.recheckResult=null;draw();
  try{
    S.prog='Reading corrected estimate...';draw();
    const cx=await b64(S.correctedEst);
    S.prog='AI verifying corrections (30-60 sec)...';draw();
    const recheckEncContent=S.encText?
      [{type:'text',text:'ENCIRCLE MITIGATION REPORT (extracted text):\n\n'+S.encText},{type:'text',text:'ABOVE: Encircle mitigation report (same as initial review)'},{type:'document',source:{type:'base64',media_type:'application/pdf',data:cx}},{type:'text',text:'ABOVE: CORRECTED Xactimate estimate. Verify corrections. Score it. Return ONLY valid JSON.'}]:
      [{type:'document',source:{type:'base64',media_type:'application/pdf',data:S.encB64}},{type:'text',text:'ABOVE: Encircle mitigation report (same as initial review)'},{type:'document',source:{type:'base64',media_type:'application/pdf',data:cx}},{type:'text',text:'ABOVE: CORRECTED Xactimate estimate. Verify corrections. Score it. Return ONLY valid JSON.'}];
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,system:RECHECK_PROMPT,
        messages:[{role:'user',content:recheckEncContent}]})});
    if(!r.ok){const er=await r.json().catch(()=>null);throw new Error(er?.error?.message||'API error '+r.status)}
    S.prog='Parsing...';draw();
    const d=await r.json();const t=d.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const rc=extractJSON(t);
    S.recheckResult=rc;
    S.phase=((rc.score?.grade==='A'||rc.score?.grade==='B')?'signoff':'recheck_result');
    S.prog='';
  }catch(e){S.err=e.message;S.prog=''}
  S.recheckBusy=false;draw()
}

function moveToRecheck(){
  const gs=gapStats();

  if(gs.cor===0){
    S.phase='signoff';draw();return
  }
  S.phase='recheck_upload';draw()
}

  S.rebuildBusy=true;S.rebuildResult=null;

  try{

    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',

      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,system:REBUILD_PROMPT,
        messages:[{role:'user',content:rebEncContent}]})});
    if(!r.ok){const er=await r.json().catch(()=>null);throw new Error(er?.error?.message||'API error '+r.status)}

}

// ══ DRAG-AND-DROP HELPERS ══
// Applies native drag-drop wiring to a zone. Called from inline ondragover/etc attrs
// or after render via setupDropZones().
function _onDragOver(e) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.add('dragover');
}
function _onDragLeave(e) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.remove('dragover');
}
function _handleDrop(e, target) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.remove('dragover');
  const f = e.dataTransfer?.files?.[0];
  if (!f) return;
  if (!/\.pdf$/i.test(f.name)) {
    S.err = 'Only PDF files accepted (got: ' + f.name + ')';
    draw();
    return;
  }
  // Routing by target: 'enc' | 'est' | 'cor' | 'adj'
  if (target === 'enc') { S.enc = f; }
  else if (target === 'est') { S.est = f; }
  else if (target === 'cor') { S.correctedEst = f; S.recheckResult = null; S.phase = 'recheck_upload'; }
  else if (target === 'adj') { S.adjEst = f; }
  draw();
}

// ══ ENCIRCLE PAGE THUMBNAIL CACHE ══
// Renders a specific page of the cached Encircle PDF as a data URL, on demand.
const _encThumbCache = {};
async function getEncircleThumbnail(pageNum, scale=0.5) {
  if (!pageNum || !S.encPdfDoc) return null;
  if (_encThumbCache[pageNum]) return _encThumbCache[pageNum];
  try {
    const page = await S.encPdfDoc.getPage(pageNum);
    const viewport = page.getViewport({scale});
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({canvasContext: ctx, viewport}).promise;
    const url = canvas.toDataURL('image/jpeg', 0.7);
    _encThumbCache[pageNum] = url;
    return url;
  } catch(e) {
    console.warn('Thumbnail render failed for page',pageNum,e.message);
    return null;
  }
}

// Async injector: when a gap card is rendered, kick off thumbnail loads
// for any visible encircle_page values and inject when ready.
function loadThumbnailsForGaps() {
  const gaps = (S.result?.gaps || []);
  for (const g of gaps) {
    const pn = g.encircle_page;
    if (!pn || pn <= 0) continue;
    const slot = document.getElementById('thumb_' + g.id);
    if (!slot || slot.dataset.loaded === '1') continue;
    slot.dataset.loaded = '1';
    getEncircleThumbnail(pn).then(url => {
      if (url && document.getElementById('thumb_' + g.id)) {
        document.getElementById('thumb_' + g.id).innerHTML =
          '<a href="'+url+'" target="_blank" title="Click to open Encircle p.'+pn+' full size"><img src="'+url+'" style="max-width:160px;max-height:200px;border:1px solid var(--brd);border-radius:4px;cursor:zoom-in" alt="Encircle p.'+pn+'"></a>'+
          '<div style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--dim);text-align:center;margin-top:4px">📄 Encircle p.'+pn+'</div>';
      }
    });
  }

// Composite logo onto colored background (fixes transparent PNG rendering as black in jsPDF)
function getLogoForPDF(bgR,bgG,bgB,w,h){
  return new Promise(resolve=>{
    const timeout=setTimeout(()=>resolve(null),3000);
    const canvas=document.createElement('canvas');
    canvas.width=w*3;canvas.height=h*3;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='rgb('+bgR+','+bgG+','+bgB+')';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      clearTimeout(timeout);
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      try{resolve(canvas.toDataURL('image/jpeg',0.92))}catch(e){resolve(null)}
    };
    img.onerror=()=>{clearTimeout(timeout);resolve(null)};
    img.src=LOGO_B64;
  })
}

// ══ PDF REPORT GENERATION ══
async function generatePDF(){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'pt',format:'letter'});
  const W=doc.internal.pageSize.getWidth();
  const H=doc.internal.pageSize.getHeight();
  const M=40; // margin
  const gs=gapStats();
  const gaps=S.result?.gaps||[];
  const ji=S.result?.job_info||{};
  const es=S.result?.estimate_submitted||{};
  const eq=S.result?.equipment_comparison||{};
  const rc=S.recheckResult;
  let y=M;

  function checkPage(need){if(y+need>H-M){doc.addPage();y=M;drawFooter();return true}return false}
  function drawFooter(){doc.setFontSize(7);doc.setTextColor(150);doc.text('JG Restoration — AI Estimate QA Report — '+S.proj+' — '+new Date().toLocaleDateString(),M,H-20);doc.text('Page '+doc.getNumberOfPages(),W-M-30,H-20)}

  // ═══ PAGE 1: HEADER & SUMMARY ═══
  // Blue header bar with logo
  doc.setFillColor(14,60,105);
  doc.rect(0,0,W,80,'F');
  try{const logoJpg=await getLogoForPDF(14,60,105,110,65);if(logoJpg)doc.addImage(logoJpg,'JPEG',M-5,8,110,65)}catch(e){}
  doc.setFontSize(16);doc.setTextColor(255);doc.setFont(undefined,'bold');
  doc.text('ESTIMATE QA AUDIT REPORT',M+120,40);
  doc.setFontSize(10);doc.setFont(undefined,'normal');
  doc.text('(920) 428-4200 | jg-restoration.com',M+120,56);
  doc.text('Price List: WIGR8X_MAR26',M+120,70);
  doc.setFontSize(10);doc.setFont(undefined,'normal');
  doc.text(S.proj,W-M-doc.getTextWidth(S.proj),35);
  doc.text(new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}),W-M-120,50);
  doc.text('Reviewer: '+S.reviewer,W-M-120,65);

  y=100;
  doc.setTextColor(0);

  // Job info
  doc.setFontSize(12);doc.setFont(undefined,'bold');doc.setTextColor(14,60,105);
  doc.text('JOB INFORMATION',M,y);y+=18;
  doc.setFontSize(9);doc.setFont(undefined,'normal');doc.setTextColor(60);
  const jobLines=[
    ['Address: '+(ji.address||'—'),'Carrier: '+(ji.carrier||'—')],
    ['Date of Loss: '+(ji.date_of_loss||'—'),'Estimator: '+(ji.estimator||'—')],
    ['Water Category: '+(ji.water_category||'—'),'Source: '+(ji.source_of_loss||'—')],
    ['Claim ID: '+(ji.claim_id||'—'),'Price List: WIGR8X_MAR26']
  ];
  jobLines.forEach(row=>{doc.text(row[0],M,y);doc.text(row[1],W/2,y);y+=14});
  y+=10;

  // Score box
  doc.setFillColor(240,240,240);doc.roundedRect(M,y,W-M*2,60,4,4,'F');
  doc.setFontSize(28);doc.setFont(undefined,'bold');
  const grade=S.result?.score?.grade||'?';
  const gradeColors={A:[67,160,71],B:[102,187,106],C:[251,140,0],D:[239,108,0],F:[229,57,53]};
  const gc2=gradeColors[grade]||[100,100,100];
  doc.setTextColor(gc2[0],gc2[1],gc2[2]);
  doc.text(grade,M+20,y+40);
  doc.setFontSize(9);doc.setTextColor(60);doc.setFont(undefined,'normal');
  doc.text('Capture Rate: ~'+(S.result?.score?.capture_rate||'?')+'%',M+80,y+20);
  doc.text('Missed Revenue: '+(S.result?.score?.estimated_missed_revenue||'—'),M+80,y+34);
  doc.text('Original Billed: $'+(es.total_billed||0).toLocaleString(),M+80,y+48);
  doc.text('Gaps Found: '+gs.t+' ('+gs.cor+' corrections, '+gs.jus+' justified)',M+300,y+20);
  if(rc){doc.text('Corrected Grade: '+(rc.score?.grade||'—')+' | Corrected: $'+(rc.estimate_submitted?.total_billed||0).toLocaleString(),M+300,y+34)}
  doc.text('No O&P on water mitigation, mold, contents, or fire mitigation.',M+300,y+48);
  y+=75;

  // Equipment comparison
  doc.setFontSize(12);doc.setFont(undefined,'bold');doc.setTextColor(14,60,105);
  doc.text('EQUIPMENT COMPARISON',M,y);y+=16;
  doc.setFontSize(8);doc.setFont(undefined,'normal');doc.setTextColor(60);
  const eqLines=[
    'Air Movers: Encircle='+eq.air_movers_encircle+' vs Billed='+eq.air_movers_billed+' | Days: Enc='+eq.air_mover_days_encircle+' vs Billed='+eq.air_mover_days_billed,
    'Dehumidifiers: Encircle='+eq.dehu_encircle+' vs Billed='+eq.dehu_billed+' | Days: Enc='+eq.dehu_days_encircle+' vs Billed='+eq.dehu_days_billed,
    'Scrubbers: Encircle='+eq.scrubber_encircle+' vs Billed='+eq.scrubber_billed+' | Days: Enc='+eq.scrubber_days_encircle+' vs Billed='+eq.scrubber_days_billed,
    'Equipment Discrepancy: '+(eq.discrepancy_value||'$0')
  ];
  eqLines.forEach(l=>{doc.text(l,M,y);y+=12});
  y+=15;

  // ═══ GAP DETAIL PAGES ═══
  doc.setFontSize(12);doc.setFont(undefined,'bold');doc.setTextColor(14,60,105);
  doc.text('GAP ANALYSIS WITH OSHA/IICRC STANDARD REFERENCES',M,y);y+=20;

  gaps.forEach((g,i)=>{
    const rr=S.resp[g.id]||{};
    const needHeight=90+(g.standard_text?30:0)+(rr.a==='J'&&rr.j?15:0);
    checkPage(needHeight);

    // Severity color bar
    const sevColors={HIGH:[229,57,53],MEDIUM:[251,140,0],LOW:[30,136,229]};
    const sc2=sevColors[g.severity]||[100,100,100];
    doc.setFillColor(sc2[0],sc2[1],sc2[2]);
    doc.rect(M,y,4,needHeight-10,'F');

    // Gap header
    doc.setFontSize(10);doc.setFont(undefined,'bold');doc.setTextColor(0);
    doc.text(g.id+' | '+g.severity+' | '+g.xact_code+' — '+g.description,M+12,y+12);

    // Value
    doc.setTextColor(232,147,12);doc.setFont(undefined,'bold');
    doc.text(g.estimated_value+' ('+g.recommended_qty+' '+g.unit+' @ $'+g.unit_cost+')',W-M-200,y+12);

    doc.setFontSize(8);doc.setFont(undefined,'normal');doc.setTextColor(60);
    y+=26;
    doc.text('Encircle: '+(g.encircle_evidence||'—'),M+12,y);y+=12;
    doc.text('Estimate: '+(g.xactimate_current||'—'),M+12,y);y+=14;

    // Standard reference
    if(g.standard_reference){
      doc.setFont(undefined,'bold');doc.setTextColor(30,100,180);
      doc.text(g.standard_reference,M+12,y);y+=12;
      if(g.standard_text){
        doc.setFont(undefined,'italic');doc.setTextColor(60,100,150);
        const stLines=doc.splitTextToSize(g.standard_text,W-M*2-24);
        stLines.forEach(l=>{checkPage(12);doc.text(l,M+12,y);y+=10});
        y+=4;
      }
    }

    // PM Response
    doc.setFont(undefined,'bold');
    if(rr.a==='C'){doc.setTextColor(67,160,71);doc.text('RESPONSE: WILL CORRECT',M+12,y)}
    else if(rr.a==='J'){doc.setTextColor(251,140,0);doc.text('RESPONSE: JUSTIFIED — '+(rr.j||'No justification'),M+12,y)}
    y+=18;
    doc.setDrawColor(220);doc.line(M+12,y-8,W-M,y-8);
  });

const ADJUSTER_PROMPT=`You are a senior estimator and claims specialist for JG Restoration in Wisconsin. Your job is to analyze an adjuster's estimate or email and build a firm, professional line-by-line rebuttal defending JG Restoration's original billing.

TONE: Firm and professional. JG Restoration stands behind its billing. Every line item is supported by IICRC/OSHA standards and Encircle field documentation. Do not be apologetic or collaborative — state the standard, cite the evidence, and maintain the position.

APPROACH:
1. Compare JG Restoration's Xactimate estimate against the adjuster's Xactimate estimate or email objections
2. Identify EVERY difference: items removed, quantities reduced, rates changed, codes substituted
3. For each disputed item, provide:
   - What JG billed vs what the adjuster approved/proposed
   - The dollar difference at stake
   - The specific OSHA or IICRC standard that supports JG's billing
   - The Encircle documentation evidence (photos, moisture readings, timestamps, equipment logs)
   - A firm 1-2 sentence defense statement

USE THESE STANDARDS:
- IICRC S500 (Water Damage) — Sections 10.1-12.5 covering extraction, drying, monitoring, demolition, antimicrobial, content manipulation
- IICRC S520 (Mold Remediation) — Sections 12-15 covering containment, HEPA filtration, antimicrobial
- OSHA 29 CFR 1910.132 — PPE requirements
- OSHA 29 CFR 1926.405 — Temporary electrical installations

COMPOSITE LINE ITEMS: WTR GRMB, WTR CABLOW, WTR CABUP, WTR CABVNC, WTR SNKD, WTR TLTD, WTR DORSLD, all WTR tearout codes — these INCLUDE labor in the unit cost. Do not cite missing labor for these.

O&P RULE: O&P applies ONLY to reconstruction. NEVER defend O&P on water mitigation, mold, contents, or fire mitigation.

Return ONLY valid JSON:
{

  "summary":{"jg_total":"","adjuster_total":"","total_disputed":"","items_disputed":0,"items_removed":0,"items_reduced":0,"items_changed":0},

  ],

// ══ ADJUSTER REBUTTAL ANALYSIS ══
async function runAdjusterAnalysis(){
  S.proj=document.getElementById('projIn')?.value||S.proj;
  if(!S.proj.trim()){S.proj='UNTITLED-'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'-'+Math.floor(Math.random()*900+100)}
  if(!S.enc||!S.est||!S.apiKey||S.busy)return;
  if(!S.adjEst&&!S.adjEmail.trim()){S.err='Upload adjuster estimate or paste their email.';draw();return}
  S.busy=true;S.err=null;S.adjResult=null;S.adjResp={};S.adjDone=false;S.adjNotes={};S.adjLetterEdited=null;draw();
  try{
    S.prog='Reading documents...';draw();
    const[e,x]=await Promise.all([b64(S.enc),b64(S.est)]);
    S.encB64=e;
    
    // Handle large Encircle PDFs
    let encContent;
    try{
      const pdfLib=await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs');
      pdfLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';
      const encBytes=Uint8Array.from(atob(e),c=>c.charCodeAt(0));
      const encDoc=await pdfLib.getDocument({data:encBytes}).promise;
      if(encDoc.numPages>100){
        S.prog='Extracting text from '+encDoc.numPages+'-page Encircle report...';draw();
        let allText='';
        for(let i=1;i<=encDoc.numPages;i++){const pg=await encDoc.getPage(i);const tc=await pg.getTextContent();allText+=tc.items.map(it=>it.str).join(' ')+'\\n'}
        encContent={type:'text',text:'ENCIRCLE REPORT (extracted text):\\n'+allText};
        S.encText=allText;
      }
    }catch(pe){}
    
    const msgContent=[];
    if(encContent){msgContent.push(encContent)}else{msgContent.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:e}})}
    msgContent.push({type:'text',text:'ABOVE: JG Restoration Encircle field documentation'});
    msgContent.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:x}});
    msgContent.push({type:'text',text:'ABOVE: JG Restoration original Xactimate estimate'});
    
    if(S.adjEst){
      const adjB64=await b64(S.adjEst);
      msgContent.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:adjB64}});
      msgContent.push({type:'text',text:'ABOVE: Adjuster revised Xactimate estimate. Compare against JG estimate and defend every item the adjuster removed, reduced, or changed.'});
    }
    if(S.adjEmail.trim()){
      msgContent.push({type:'text',text:'ADJUSTER EMAIL/COMMUNICATION:\\n'+S.adjEmail+'\\n\\nDefend every objection raised in this communication with OSHA/IICRC standards and Encircle evidence.'});
    }
    
    S.prog='AI analyzing disputes (30-60 sec)...';draw();
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,system:ADJUSTER_PROMPT,
        messages:[{role:'user',content:msgContent}]})});
    if(!r.ok){const er=await r.json().catch(()=>null);throw new Error(er?.error?.message||'API error '+r.status)}
    S.prog='Parsing...';draw();
    const d=await r.json();const t=d.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    S.adjResult=extractJSON(t);
    S.adjResult.disputed_items=(S.adjResult.disputed_items||[]).map((d,i)=>({...d,id:d.id||'DISP-'+String(i+1).padStart(3,'0')}));
    S.phase='adj_review';S.prog='';
  }catch(e){S.err=e.message;S.prog=''}
  S.busy=false;draw()
}

    const conceded=(ar.disputed_items||[]).filter(d=>S.adjResp[d.id]==='concede');
    const notesForAI=defended.map(d=>{
      const pmNote=S.adjNotes&&S.adjNotes[d.id]?S.adjNotes[d.id]:'';
      return d.id+' — '+d.description+' ('+d.difference+')\nJG Line #'+(d.jg_line_num||'?')+': '+d.jg_code+' '+d.jg_qty+' '+d.jg_unit+' @ $'+d.jg_unit_cost+' = '+d.jg_amount+'\nStandard: '+(d.standard_reference||'')+'\nEncircle: '+(d.encircle_evidence||'')+'\nInitial defense: '+(d.defense_statement||'')+(pmNote?'\nPM NOTES: '+pmNote:'')
    }).join('\n\n');
    const concededList=conceded.length>0?'\n\nCONCEDED ITEMS (do NOT defend these):\n'+conceded.map(d=>d.id+' — '+d.description+' '+d.difference).join('\n'):'';
    
    const regenPrompt='You are writing a FINAL response letter from JG Restoration to an insurance adjuster. Tone: FIRM and professional. JG Restoration stands behind its billing.\n\nAdjuster: '+(ar.adjuster_info?.name||'Unknown')+' — '+(ar.adjuster_info?.company||'')+'\nJG Total: '+(ar.summary?.jg_total||'')+'\nAdjuster Total: '+(ar.summary?.adjuster_total||'')+'\nTotal Disputed: '+(ar.summary?.total_disputed||'')+'\n\nDEFENDED ITEMS WITH PM NOTES:\n'+notesForAI+concededList+'\n\nWrite a complete professional response letter that:\n1. Opens stating JG Restoration maintains its position and all charges are supported by IICRC/OSHA standards and Encircle field documentation\n2. For each DEFENDED item, reference the JG estimate line number, Xactimate code, applicable standard, Encircle evidence, AND incorporate the PM notes as additional supporting evidence or context\n3. If any items are conceded, briefly acknowledge the concession\n4. Close requesting payment of the defended amount\n5. Sign as JG Restoration, (920) 428-4200\n\nReturn ONLY the letter text, no JSON, no markdown formatting.';
    
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,
        messages:[{role:'user',content:regenPrompt}]})});
    if(!r.ok)throw new Error('API error '+r.status);
    const d=await r.json();
    const newLetter=d.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    S.adjLetterEdited=newLetter;
    S.prog='';
  }catch(e){S.err='Regeneration failed: '+e.message;S.prog=''}
  S.busy=false;draw()
}

// ══ ADJUSTER SIGN-OFF ══
async function adjusterSignOff(){
  S.adjDone=true;draw();
  const ar=S.adjResult;
  const defended=(ar.disputed_items||[]).filter(d=>S.adjResp[d.id]!=='concede');
  const conceded=(ar.disputed_items||[]).filter(d=>S.adjResp[d.id]==='concede');
  
  // Post to Albi — include the PM's edited letter
  try{
    const editedLetter=S.adjLetterEdited||ar.response_letter||'';
    const noteText='ADJUSTER REBUTTAL SENT\nAdjuster: '+(ar.adjuster_info?.name||'Unknown')+' — '+(ar.adjuster_info?.company||'')+'\nJG Total: '+(ar.summary?.jg_total||'')+'\nAdjuster Total: '+(ar.summary?.adjuster_total||'')+'\nTotal Disputed: '+(ar.summary?.total_disputed||'')+'\nItems Defended: '+defended.length+'\nItems Conceded: '+conceded.length+'\n\nRESPONSE LETTER:\n'+editedLetter+'\n\nDEFENDED ITEMS:\n'+defended.map(d=>d.id+(d.jg_line_num?' (JG Line #'+d.jg_line_num+')':'')+' '+d.jg_code+' '+d.description+' '+d.difference+' — '+d.standard_reference+' | Encircle: '+(d.encircle_evidence||'See documentation')).join('\n')+(conceded.length>0?'\n\nCONCEDED ITEMS:\n'+conceded.map(d=>d.id+' '+d.description+' '+d.difference).join('\n'):'');
    await fireNotes(S.proj,noteText);
  }catch(e){console.error('Albi note failed:',e)}
  draw()
}

    if(S.busy&&S.prog)h+=`<div class="qa-progress-bar"><div class="qa-spin"></div><span style="font-size:12px;color:var(--orange);font-family:'DM Mono',monospace;font-weight:500">${S.prog}</span></div>`;

  }

  // ══ ADJUSTER REVIEW PHASE ══
  if(S.mode==='adjuster'&&(S.phase==='adj_review'||S.adjDone)){
    const ar=S.adjResult||{};
    const items=ar.disputed_items||[];
    const defended=items.filter(d=>S.adjResp[d.id]!=='concede');
    const conceded=items.filter(d=>S.adjResp[d.id]==='concede');
    
    // Initialize editable letter from AI response
    if(!S.adjLetterEdited&&ar.response_letter){S.adjLetterEdited=ar.response_letter}
    
    // Summary
    h+=`<div style="background:var(--redD);border:2px solid rgba(229,57,53,0.4);border-radius:12px;padding:20px;margin-bottom:20px"><div style="display:flex;justify-content:space-between;align-items:center"><div><div class="mono" style="font-size:18px;font-weight:700;color:var(--red)">ADJUSTER DISPUTE ANALYSIS</div><div style="font-size:12px;color:var(--dim);margin-top:4px">${ar.adjuster_info?.name||'Adjuster'} — ${ar.adjuster_info?.company||''} ${ar.adjuster_info?.claim_number?'| Claim: '+ar.adjuster_info.claim_number:''}</div></div><div style="text-align:right"><div class="mono" style="font-size:22px;font-weight:700;color:var(--red)">${ar.summary?.total_disputed||'$0'}</div><div style="font-size:11px;color:var(--dim)">total at stake</div></div></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px"><div style="background:var(--s1);border-radius:6px;padding:10px;text-align:center"><div class="mono" style="font-size:16px;font-weight:700">${ar.summary?.jg_total||'—'}</div><div style="font-size:9px;color:var(--dim);text-transform:uppercase">JG Estimate</div></div><div style="background:var(--s1);border-radius:6px;padding:10px;text-align:center"><div class="mono" style="font-size:16px;font-weight:700">${ar.summary?.adjuster_total||'—'}</div><div style="font-size:9px;color:var(--dim);text-transform:uppercase">Adjuster</div></div><div style="background:var(--s1);border-radius:6px;padding:10px;text-align:center"><div class="mono" style="font-size:16px;font-weight:700;color:var(--grn)">${defended.length}</div><div style="font-size:9px;color:var(--dim);text-transform:uppercase">Defending</div></div><div style="background:var(--s1);border-radius:6px;padding:10px;text-align:center"><div class="mono" style="font-size:16px;font-weight:700;color:var(--wrn)">${conceded.length}</div><div style="font-size:9px;color:var(--dim);text-transform:uppercase">Conceded</div></div></div></div>`;
    
    // Disputed items with full line item details
    h+=`<div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px;font-family:\'DM Mono\',monospace">Disputed Line Items — Review & Decide</div>`;
    items.forEach(d=>{
      const isConceded=S.adjResp[d.id]==='concede';
      h+=`<div class="qa-gap-row ${g.severity||''}"><div style="padding:14px 16px">`;
      // Header with ID, category, difference
      h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div style="flex:1"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="mono" style="font-size:11px;color:var(--dim);font-weight:600">${d.id}</span><span class="badge" style="color:var(--red);background:var(--red)15;border:1px solid var(--red)30">${d.category||'disputed'}</span></div><p style="font-size:14px;font-weight:600">${d.description||''}</p></div><div style="text-align:right;margin-left:12px"><div class="mono" style="font-size:16px;font-weight:700;color:var(--red)">${d.difference||''}</div></div></div>`;
      // JG Line Item detail
      h+=`<div style="background:rgba(67,160,71,0.06);border:1px solid rgba(67,160,71,0.15);border-radius:6px;padding:8px 10px;margin-bottom:6px"><div class="mono" style="font-size:10px;color:var(--grn);font-weight:700;margin-bottom:4px">JG ESTIMATE ${d.jg_line_num?'— LINE #'+d.jg_line_num:''}</div><div style="font-size:12px"><span class="mono" style="color:var(--blu);font-weight:600">${d.jg_code||''}</span> ${d.jg_description||d.description||''} | <span class="mono">${d.jg_qty||''} ${d.jg_unit||''} @ $${d.jg_unit_cost||''} = <strong style="color:var(--grn)">${d.jg_amount||''}</strong></span></div></div>`;
      // Adjuster Line Item detail
      // Adjuster Line Item detail
      const adjDetail=d.category==='removed'?'<span style="color:var(--red);font-style:italic">Item removed entirely by adjuster</span>':'<span class="mono" style="color:var(--blu);font-weight:600">'+(d.adj_code||d.jg_code||'')+'</span> '+(d.adj_description||d.description||'')+' | <span class="mono">'+(d.adj_qty||'')+' '+(d.adj_unit||'')+' @ $'+(d.adj_unit_cost||'')+' = <strong style="color:var(--red)">'+(d.adj_amount||'$0')+'</strong></span>';
      h+=`<div style="background:rgba(229,57,53,0.06);border:1px solid rgba(229,57,53,0.15);border-radius:6px;padding:8px 10px;margin-bottom:8px"><div class="mono" style="font-size:10px;color:var(--red);font-weight:700;margin-bottom:4px">ADJUSTER ${d.adj_line_num?'— LINE #'+d.adj_line_num:(d.category==='removed'?'— REMOVED':'')}</div><div style="font-size:12px">${adjDetail}</div></div>`;
      // Standard reference
      if(d.standard_reference)h+=`<div style="background:rgba(30,136,229,0.06);border:1px solid rgba(30,136,229,0.15);border-radius:6px;padding:8px 10px;margin-bottom:8px"><div class="mono" style="color:#64B5F6;font-weight:700;font-size:11px;margin-bottom:4px">STANDARD: ${d.standard_reference}</div>${d.standard_text?`<div style="color:#90CAF9;font-size:11px;line-height:1.5">${d.standard_text}</div>`:''}</div>`;
      // Encircle evidence
      if(d.encircle_evidence)h+=`<div style="background:rgba(106,27,154,0.06);border:1px solid rgba(106,27,154,0.15);border-radius:6px;padding:8px 10px;margin-bottom:8px"><div class="mono" style="color:var(--purp);font-weight:700;font-size:11px;margin-bottom:4px">ENCIRCLE EVIDENCE</div><div style="font-size:11px;color:var(--txt);line-height:1.5">${d.encircle_evidence}</div></div>`;
      // Defense statement
      h+=`<div style="font-size:12px;color:var(--txt);margin-bottom:8px;padding:8px;background:var(--s2);border-radius:6px"><strong style="color:var(--acc)">Defense:</strong> ${d.defense_statement||''}</div>`;
      // Defend/Concede buttons + PM notes
      h+=`<div style="display:flex;gap:8px;margin-bottom:10px"><button class="qa-defend-btn ${!isConceded?'on':''}" onclick="delete S.adjResp['${d.id}'];draw()">✓ Defend</button><button class="qa-concede-btn ${isConceded?'on':''}" onclick="S.adjResp['${d.id}']='concede';draw()">Concede</button></div>`;
      h+=`<div><label style="display:block;font-size:10px;color:var(--acc);margin-bottom:4px;font-family:'DM Mono',monospace;text-transform:uppercase;font-weight:700">Your notes for this item (will be used to strengthen the response)</label><textarea id="adjNote_${d.id}" oninput="if(!S.adjNotes)S.adjNotes={};S.adjNotes['${d.id}']=this.value" placeholder="e.g. We have truck-mount time log showing 3 hours... Photos from 6 PM prove after-hours... Carpet was completely saturated per moisture readings..." style="min-height:50px;border-color:var(--acc);font-size:12px">${(S.adjNotes&&S.adjNotes[d.id])||''}</textarea></div>`;
      h+=`</div></div>`;
    });
    
    // Regenerate button — always active, PM notes are optional
    const hasNotes=S.adjNotes&&Object.values(S.adjNotes).some(n=>n&&n.trim());
    h+=`<div style="margin-top:16px;text-align:center"><button style="background:linear-gradient(135deg,var(--acc),#C97A08);border:none;color:#000;padding:12px 28px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:'DM Mono',monospace" onclick="regenerateAdjusterResponse()" ${S.busy?'disabled':''}>${S.busy?'Regenerating...':'Regenerate Response with My Notes'}</button><div style="font-size:11px;color:var(--dim);margin-top:6px">${hasNotes?'Your notes will be incorporated into the response letter below':'Add notes above to strengthen the response, or regenerate to update defended/conceded items'}</div></div>`;
    if(S.busy&&S.prog)h+=`<div style="margin-top:12px;padding:12px;border-radius:6px;background:var(--s1);border:1px solid rgba(232,147,12,0.2);display:flex;align-items:center;gap:10px"><div style="width:16px;height:16px;border:2px solid var(--acc);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite"></div><span style="font-size:12px;color:var(--acc);font-family:'DM Mono',monospace">${S.prog}</span></div>`;

    // Editable email draft
    h+=`<div style="margin-top:24px;background:var(--s1);border:2px solid var(--brd);border-radius:12px;padding:20px"><div class="mono" style="font-size:14px;font-weight:700;margin-bottom:4px;color:var(--acc)">EMAIL DRAFT — Edit Before Sending</div><div style="font-size:11px;color:var(--dim);margin-bottom:12px">Review and edit the response letter below. Your changes will be included in the PDF and Albi note.</div><textarea id="adjLetterEdit" oninput="S.adjLetterEdited=this.value" style="width:100%;min-height:300px;border-color:var(--acc);font-size:12px;line-height:1.6;padding:14px;background:var(--s2);color:var(--txt);font-family:'DM Sans',sans-serif">${S.adjLetterEdited||ar.response_letter||''}</textarea></div>`;
    
    // Action buttons
    if(!S.adjDone){
      h+=`<div style="margin-top:20px;text-align:center"><button style="background:linear-gradient(135deg,#E53935,#C62828);border:none;color:#fff;padding:12px 28px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:'DM Mono',monospace" onclick="adjusterSignOff()">Finalize & Post to Albi</button></div>`;
    } else {
      h+=`<div style="background:var(--grnD);border:2px solid var(--grn);border-radius:12px;padding:20px;margin:20px 0;text-align:center"><div style="font-size:32px;margin-bottom:8px">✓</div><div class="mono" style="font-size:16px;font-weight:700;color:var(--grn)">Rebuttal Complete — Posted to Albi</div><div style="font-size:12px;color:var(--dim);margin-top:4px">Defending ${defended.length} items${conceded.length>0?' | Conceded '+conceded.length+' items':''}</div></div>`;
      h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px"><button class="qa-btn qa-btn-navy" onclick="generateAdjusterPDF()">📄 Download PDF</button><button class="qa-btn qa-btn-primary" onclick="generateAdjusterPDF();setTimeout(()=>window.open('https://drive.google.com/drive/folders/1ccxK-5ILFKCU2sw1YAf0-APhTLtKYjGT','_blank'),500)">PDF + Drive</button><button class="qa-btn qa-btn-ghost" onclick="navigator.clipboard.writeText(S.adjLetterEdited||S.adjResult?.response_letter||'')">Copy Draft</button><button class="qa-btn qa-btn-ghost" onclick="S.mode='landing';draw()">← Menu</button></div>`;
    }
    a.innerHTML=h;return;
  }

  // ══ PHASE: UPLOAD (QA REVIEW) ══
  if(S.mode==='qa'&&S.phase==='upload'){
    h+=`<div style="margin-bottom:14px"><label style="display:block;font-size:11px;color:var(--dim);margin-bottom:4px;font-family:'DM Mono',monospace;text-transform:uppercase">Albi Project Name <span style="color:var(--dim);font-weight:400;text-transform:none">— optional, recommended for Albi push</span></label><input type="text" id="projIn" value="${S.proj}" placeholder="e.g. Wang-2798-WTR" style="width:100%;max-width:400px"></div>`;
    h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px"><div class="qa-upload-zone ${S.enc?'loaded':''}" onclick="document.getElementById('encF').click()" ondragover="_onDragOver(event)" ondragleave="_onDragLeave(event)" ondrop="_handleDrop(event,'enc')"><input type="file" id="encF" accept=".pdf" onchange="if(this.files[0]){S.enc=this.files[0];draw()}">${S.enc?'<div style="display:flex;align-items:center;gap:10px"><span style="font-size:22">📋</span><div><p style="font-size:12px;font-weight:600;color:var(--grn)">Encircle loaded</p><p style="font-size:11px;color:var(--dim);margin-top:2px">'+S.enc.name+'</p></div></div>':'<div style="font-size:28px;opacity:.4;margin-bottom:8px">📋</div><p style="font-size:13px;font-weight:600">Encircle report</p><p style="font-size:11px;color:var(--dim);margin-top:4px">Drag PDF or click to browse</p>'}</div>`;
    h+=`<div class="qa-upload-zone ${S.est?'loaded':''}" onclick="document.getElementById('estF').click()" ondragover="_onDragOver(event)" ondragleave="_onDragLeave(event)" ondrop="_handleDrop(event,'est')"><input type="file" id="estF" accept=".pdf" onchange="if(this.files[0]){S.est=this.files[0];draw()}">${S.est?'<div style="display:flex;align-items:center;gap:10px"><span style="font-size:22">📊</span><div><p style="font-size:12px;font-weight:600;color:var(--grn)">Estimate loaded</p><p style="font-size:11px;color:var(--dim);margin-top:2px">'+S.est.name+'</p></div></div>':'<div style="font-size:28px;opacity:.4;margin-bottom:8px">📊</div><p style="font-size:13px;font-weight:600">Original Xactimate estimate</p><p style="font-size:11px;color:var(--dim);margin-top:4px">Drag PDF or click to browse</p>'}</div></div>`;
    h+=`<button style="width:100%;padding:14px;border-radius:8px;border:none;font-family:'DM Mono',monospace;font-size:14px;font-weight:700;cursor:pointer;background:${S.enc&&S.est&&!S.busy?'linear-gradient(135deg,var(--acc),#C97A08)':'var(--mut)'};color:${S.enc&&S.est&&!S.busy?'#000':'var(--dim)'}" onclick="runPass1()" ${S.busy?'disabled':''}>${S.busy?'Analyzing...':'Run QA Review — Pass 1 ⟶'}</button>`;
    if(S.busy&&S.prog)h+=`<div style="margin-top:12px;padding:12px;border-radius:6px;background:var(--s1);border:1px solid rgba(232,147,12,0.2);display:flex;align-items:center;gap:10px"><div style="width:16px;height:16px;border:2px solid var(--acc);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0"></div><span style="font-size:12px;color:var(--acc);font-family:'DM Mono',monospace">${S.prog}</span></div>`;
    if(S.err)h+=`<div style="margin-top:12px;padding:10px;border-radius:6px;background:var(--redD);border:1px solid rgba(229,57,53,0.2);color:var(--red);font-size:12px">${S.err}</div>`;
    h+=``;
  }

  // ══ PHASE: REVIEW (Pass 1 results) ══
  else if(S.phase==='review'){
    const r=S.result;
    h+=`<div style="background:var(--s1);border-radius:10px;padding:16px 20px;border:1px solid var(--brd);margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center"><div><span class="mono" style="font-size:14px;font-weight:700">${gs.res} / ${gs.t}</span><span style="font-size:12px;color:var(--dim);margin-left:8px">gaps addressed</span></div><div style="display:flex;gap:12px;font-size:12px;font-family:'DM Mono',monospace"><span style="color:var(--grn)">${gs.cor} corrections</span><span style="color:var(--wrn)">${gs.jus} justified</span><span style="color:var(--dim)">${gs.t-gs.res} remaining</span></div></div><div style="height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:10px"><div style="height:100%;border-radius:3px;transition:width .3s;width:${gs.t?gs.res/gs.t*100:0}%;background:${gs.ok?'var(--grn)':'linear-gradient(90deg,var(--acc),#C97A08)'}"></div></div></div>`;

    h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px"><div style="background:var(--s1);border-radius:8px;padding:12px 14px;border:1px solid var(--brd)"><div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;font-family:'DM Mono',monospace;margin-bottom:4px">Grade</div><div style="font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:${gc(r.score?.grade)}">${r.score?.grade||'—'}</div></div><div style="background:var(--s1);border-radius:8px;padding:12px 14px;border:1px solid var(--brd)"><div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;font-family:'DM Mono',monospace;margin-bottom:4px">Billed</div><div style="font-size:18px;font-weight:700;font-family:'DM Mono',monospace">$${(r.estimate_submitted?.total_billed||0).toLocaleString()}</div></div><div style="background:var(--s1);border-radius:8px;padding:12px 14px;border:1px solid var(--brd)"><div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;font-family:'DM Mono',monospace;margin-bottom:4px">Gaps</div><div style="font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--red)">${gs.t}</div></div><div style="background:var(--s1);border-radius:8px;padding:12px 14px;border:1px solid var(--brd)"><div style="font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;font-family:'DM Mono',monospace;margin-bottom:4px">Missed $</div><div style="font-size:18px;font-weight:700;font-family:'DM Mono',monospace;color:var(--acc)">${r.score?.estimated_missed_revenue||'—'}</div></div></div>`;

    // ══ OVERBILLED ITEMS (if any) ══
    if(overbilled.length>0){
      h+=`<div style="margin-bottom:20px;background:rgba(229,57,53,0.04);border:2px solid rgba(229,57,53,0.3);border-radius:12px;padding:16px"><div class="mono" style="font-size:14px;font-weight:700;color:var(--red);margin-bottom:12px">⚠ OVERBILLED ITEMS — Reduce to match documentation (${overbilled.length})</div>`;
      overbilled.forEach(ob=>{
        h+=`<div style="background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:12px 16px;margin-bottom:8px;border-left:4px solid var(--red)"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div style="flex:1"><span class="mono" style="font-size:11px;color:var(--red);font-weight:700">${ob.id||''}</span><span class="badge" style="color:var(--red);background:var(--red)15;border:1px solid var(--red)30;margin-left:8px">OVERBILLED</span><p style="font-size:13px;font-weight:600;margin-top:6px">${ob.description||''}</p></div><div style="text-align:right;margin-left:12px"><div class="mono" style="font-size:14px;font-weight:700;color:var(--red)">-${ob.difference||''}</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:12px;color:var(--dim)"><div><strong style="color:var(--red)">Billed: </strong>${ob.billed_amount||''}</div><div><strong style="color:var(--grn)">Supported: </strong>${ob.supported_amount||''}</div></div><div style="font-size:12px;color:var(--dim);margin-top:6px"><strong>Evidence: </strong>${ob.encircle_evidence||''}</div><div style="font-size:12px;color:var(--blu);margin-top:4px"><strong>Correction: </strong>${ob.recommended_correction||''}</div></div>`;
      });
      h+=`</div>`;
    }

    // ══ UNDERBILLED GAPS ══

      h+=`</div>`;
    } else if(S.reb&&S.rebuildResult?.error){
      h+=`<div style="margin:20px 0;padding:14px;border-radius:8px;background:var(--redD);border:1px solid rgba(229,57,53,0.2);color:var(--red);font-size:12px">Rebuild estimate generation failed: ${S.rebuildResult.error}</div>`;
    } else if(S.reb&&S.rebuildBusy){
      h+=`<div style="margin:20px 0;padding:14px;border-radius:8px;background:var(--s1);border:1px solid rgba(106,27,154,0.3);display:flex;align-items:center;gap:10px"><div style="width:16px;height:16px;border:2px solid var(--purp);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite"></div><span class="mono" style="font-size:12px;color:var(--purp)">Generating reconstruction estimate...</span></div>`;
    }

    h+=`<div style="display:flex;gap:10px;justify-content:center;margin-top:24px"><button style="background:var(--s2);border:1px solid var(--brdH);color:var(--txt);padding:10px 20px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Mono',monospace" onclick="dlReport()">Export JSON</button><button style="background:linear-gradient(135deg,#E53935,#C62828);border:none;color:#fff;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Mono',monospace" onclick="generatePDF()">Download PDF Report</button><button style="background:linear-gradient(135deg,#1E88E5,#1565C0);border:none;color:#fff;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Mono',monospace" onclick="generatePDF();setTimeout(()=>window.open('https://drive.google.com/drive/folders/19h0JycexT-KUMfIxebIecI81TIPQ5eL2','_blank'),500)">QA PDF + Save to Drive</button><button style="background:transparent;border:1px solid var(--brd);color:var(--dim);padding:10px 20px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Mono',monospace" onclick="reset()">← Review Another</button></div>`;
  }

  a.innerHTML=h;
  if(S.phase==='review' && S.result?.gaps?.length){setTimeout(loadThumbnailsForGaps,30)}
}

<script>

const _JG_KEY='jg_platform_user',_JG_EXP='jg_platform_exp';
function jgGoogleCb(r){try{const p=JSON.parse(atob(r.credential.split('.')[1]));if(!p.email.endsWith('@jg-restoration.com')){document.getElementById('jg-login-err').textContent='Access restricted to @jg-restoration.com accounts.';return;}const u={name:p.name||p.given_name,email:p.email,picture:p.picture||''};localStorage.setItem(_JG_KEY,JSON.stringify(u));localStorage.setItem(_JG_EXP,String(Date.now()+43200000));jgHideLogin();jgShowUser(u);}catch(e){document.getElementById('jg-login-err').textContent='Sign in failed.';}}
function jgCheckAuth(){const r=localStorage.getItem(_JG_KEY),e=localStorage.getItem(_JG_EXP);if(r&&e&&Date.now()<parseInt(e)){jgHideLogin();jgShowUser(JSON.parse(r));return true;}jgShowLogin();return false;}
function jgShowLogin(){const e=document.getElementById('jg-login');if(e)e.style.display='flex';}
function jgHideLogin(){const e=document.getElementById('jg-login');if(e)e.style.display='none';}
function jgShowUser(u){const n=document.getElementById('sb-nm'),a=document.getElementById('sb-av');if(n)n.textContent=u.name?u.name.split(' ')[0]:u.email.split('@')[0];if(a)a.innerHTML=u.picture?'<img src="'+u.picture+'" style="width:22px;height:22px;border-radius:50%;">':'👤';}
function jgSignOut(){if(confirm('Sign out?')){localStorage.removeItem(_JG_KEY);localStorage.removeItem(_JG_EXP);window.location.href='hub.html';}}
window.addEventListener('storage',e=>{if(e.key===_JG_KEY){if(e.newValue){jgHideLogin();jgShowUser(JSON.parse(e.newValue));}else jgShowLogin();}});
Object.defineProperty(window,'currentUser',{get:()=>{try{return JSON.parse(localStorage.getItem(_JG_KEY)||'null')?.name||null;}catch(e){return null;}},configurable:true});

document.addEventListener('DOMContentLoaded',()=>{
  S.mode='qa';
  S.phase='upload';
  draw();
  jgCheckAuth();
});
</script>
