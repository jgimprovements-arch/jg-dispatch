const HOOKS={
  note:'https://hooks.zapier.com/hooks/catch/12653197/unrmhoe/',

function fireHook(url,params){
  return new Promise(async resolve=>{
    const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(String(v).substring(0,1800))).join('&');
    const fullUrl=url+'?'+qs;
    console.log('Webhook firing:',url.split('/').pop(),Object.keys(params).length,'params, URL length:',fullUrl.length);
    // Try fetch first (more reliable)
    try{
      await fetch(fullUrl,{mode:'no-cors',method:'GET'});
      console.log('Webhook fetch OK:',url.split('/').pop());
      resolve(true);return
    }catch(e){console.log('Fetch failed, trying Image:',e.message)}
    // Fallback to Image src
    const img=new Image();
    img.onload=()=>{console.log('Webhook img OK');resolve(true)};
    img.onerror=()=>{console.log('Webhook img error (still fires)');resolve(true)};
    img.src=fullUrl;
    setTimeout(()=>resolve(true),3000)
  })
}
// Fire multiple notes if content is long
async function fireNotes(projName,fullText){
  const chunks=[];
  const maxLen=1600;
  let remaining=fullText;
  let part=1;
  while(remaining.length>0){
    const chunk=remaining.substring(0,maxLen);
    const label=chunks.length>0?'(Part '+(part)+') ':'';
    chunks.push(label+chunk);
    remaining=remaining.substring(maxLen);
    part++;
  }
  for(const chunk of chunks){
    await fireHook(HOOKS.note,{project_name:projName,note:chunk});
    await new Promise(r=>setTimeout(r,500)); // small delay between notes
  }
}

const PROMPT=`You are a senior IICRC-certified mitigation estimator and Xactimate auditor for JG Restoration in Wisconsin. Compare Encircle field documentation against Xactimate estimate to find every billing gap. NEVER include O&P on water mitigation, mold, contents, or fire mitigation. O&P only on reconstruction. Use these verified WIGR8X codes: WTR DRY+ $30.04/EA, WTR DRY $25.61/EA, WTR DHM> $75.43/EA, WTR DHM>> $117.30/EA, WTR NAFAN $72.09/DA, HMR NAFAN $72.09/DA, WTR GRMB $0.38/SF, WTR PPE+ $48.23/EA, WTR EQ $60.50/HR, WTR LAB $60.50/HR, WTR LABA $90.84/HR, WTR DRYWS $1.52/SF, WTR DRYWLS $6.17/LF, WTR INSS $1.15/SF, WTR TRIM $1.03/LF, WTR TRID $0.96/LF, WTR BARR $0.99/SF, WTR MASKFL $0.59/SF, WTR FHEPA $220.90/EA, WTR FCWS $5.85/SF, WTR FCCS $0.95/SF, WTR FCVS $2.29/SF, WTR PADS $0.89/SF, WTR SFS $2.97/SF, WTR PLAS $4.12/SF, WTR SNKD $34.19/EA, WTR TLTD $54.51/EA, WTR DORSLD $7.19/EA, WTR CABLOW $10.02/LF, DMO DUMP> $630.01/EA. Equipment days MUST match Encircle placement-to-removal dates. DUMPSTER RULE: Only flag a missing dumpster if the job has significant demolition (full room tearout, multiple rooms of drywall/flooring removal) AND the estimate has NO debris disposal line item at all. Do NOT suggest upgrading from pickup loads to a dumpster. Do NOT flag dumpster for small jobs with minimal debris like ceiling tiles or a single room. Severity: LOW. Anti-microbial on ALL surfaces Cat 2+.

COMPOSITE LINE ITEMS — DO NOT FLAG MISSING LABOR FOR THESE: Many Xactimate line items ALREADY INCLUDE LABOR AND MATERIALS in the unit cost. Do NOT create separate gap items for "missing labor" when these codes are present on the estimate. The following JG Restoration line items are composite (labor + materials included):
- WTR GRMB $0.38/SF — Anti-microbial application (includes spraying labor + chemical)
- WTR CABLOW $10.02/LF — Tear out lower cabinets (includes labor to remove)
- WTR CABUP $10.02/LF — Tear out upper cabinets (includes labor to remove)
- WTR CABVNC $12.13/LF — Tear out vanity and countertop (includes labor to remove)
- WTR SNKD $34.19/EA — Sink detach (includes labor)
- WTR SNKDD $34.79/EA — Sink double basin detach (includes labor)
- WTR TLTD $54.51/EA — Toilet detach (includes labor)
- WTR DORSLD $7.19/EA — Door slab detach (includes labor)
- WTR RFD $30.16/EA — Refrigerator detach (includes labor)
- WTR RGGD $41.45/EA — Range detach (includes labor)
- WTR CTFL $5.76/LF — Countertop tearout (includes labor)
- WTR CTFLD $7.12/LF — Countertop detach (includes labor)
- WTR CTPFD $6.82/LF — Countertop post-formed detach (includes labor)
- WTR TRIM $1.03/LF — Trim tearout (includes labor)
- WTR TRID $0.96/LF — Trim detach (includes labor)
- WTR DRYWS $1.52/SF — Drywall tearout Cat 3 (includes labor)
- WTR DRYWLS $6.17/LF — Drywall flood cut Cat 3 (includes labor)
- WTR PLAS $4.12/SF — Plaster tearout (includes labor)
- WTR INSS $1.15/SF — Insulation tearout (includes labor)
- WTR FCCS $0.95/SF — Carpet tearout Cat 3 (includes labor)
- WTR PADS $0.89/SF — Carpet pad tearout Cat 3 (includes labor)
- WTR FCVS $2.29/SF — Vinyl tearout Cat 3 (includes labor)
- WTR FCWS $5.85/SF — Wood floor tearout Cat 3 (includes labor)
- WTR PNLS $0.96/SF — Paneling tearout (includes labor)
- WTR SFS $2.97/SF — Subfloor tearout Cat 3 (includes labor)
- PLM SWRRS $593.72/EA — Shower detach & reset (includes labor)
- APP HD $15.48/EA — Range hood remove (includes labor)
- WTR BARR $0.99/SF — Containment barrier (includes labor to install)
These descriptions on the estimate may vary (e.g. "Tear out cabinetry" or "Detach vanity" or "Remove cabinets" or "Anti-microbial" or "Decontamination" or "Spray treatment") but they ALL include labor in the per-unit cost. If the estimate has one of these codes, do NOT flag a separate labor gap for the same work. CRITICAL: This is the #1 source of false positives. Before creating ANY gap for "missing labor" or "missing application labor" or "missing removal labor" or "missing decontamination labor", CHECK if a composite line item already covers that work. Common false positive examples to AVOID:
- "Missing decontamination application labor" when WTR GRMB is already billed → FALSE POSITIVE, GRMB includes labor
- "Missing cabinet removal labor" when WTR CABLOW or WTR CABUP is already billed → FALSE POSITIVE, includes labor
- "Missing vanity removal labor" when WTR CABVNC is already billed → FALSE POSITIVE, includes labor
- "Missing sink disconnection labor" when WTR SNKD/SNKDD is already billed → FALSE POSITIVE, includes labor
- "Missing toilet removal labor" when WTR TLTD is already billed → FALSE POSITIVE, includes labor
- "Missing flooring removal labor" when WTR FCCS/FCVS/FCWS is already billed → FALSE POSITIVE, includes labor
If you are about to flag a gap that contains the word "labor" in the description, STOP and verify it is not already covered by a composite line item. PPE RULE: Only flag PPE (WTR PPE+ $48.23/EA) if the estimate has ZERO PPE line items AND the water is Category 2 or higher. Do NOT calculate theoretical PPE quantities per person per day — only flag if PPE is completely absent. Cat 1 clean water does NOT require PPE. Severity: LOW. If some PPE is already billed, do not suggest adding more. MONITORING RULE: Bill 1.5 hours of monitoring (WTR EQ $60.50/HR) PER DAY that ANY equipment is onsite — NOT per individual unit. If equipment is onsite for 5 days, monitoring = 5 days x 1.5 hrs = 7.5 hrs. Count calendar days from first placement to final pickup. OVERBILLING DETECTION RULE — CRITICAL: The goal is to MAXIMIZE billing while ensuring every line item is PROVABLE with Encircle documentation. Flag overbilling just as aggressively as underbilling. For each line item in the Xactimate estimate, verify it has supporting evidence in the Encircle report. Common overbilling scenarios to catch:

1. EQUIPMENT QUANTITY OVERBILLING: If the estimate bills for 8 air movers but Encircle only documents 5 placed, flag as OVERBILLED. Equipment counts must match Encircle equipment logs and photos.
2. EQUIPMENT DAYS OVERBILLING: If the estimate bills 7 days of dehu rental but Encircle shows equipment was picked up on day 4, flag as OVERBILLED. Cross-reference equipment placement dates, moisture logs, and pickup dates.
3. ROOM COUNT OVERBILLING: If the estimate bills extraction for 6 rooms but Encircle only documents water damage in 4 rooms, flag the extra 2 rooms as OVERBILLED.
4. SQUARE FOOTAGE OVERBILLING: If the estimate bills 500 SF of drywall removal but the Encircle room measurements show the affected area is only 300 SF, flag the difference.
5. LABOR HOURS OVERBILLING: If monitoring hours exceed 1.5 hours per day equipment is onsite, flag the excess. If extraction hours seem excessive for the documented area, flag it.
6. DUPLICATE LINE ITEMS: If the same service is billed twice for the same room (e.g., extraction billed under both WTR LAB and a separate extraction code), flag as duplicate.
7. UNAFFECTED ROOMS BILLED: If rooms that show no damage in Encircle are billed for services, flag as unsupported.
8. ANTI-MICROBIAL OVERBILLING: If anti-microbial is billed for areas that weren't affected by Category 2 or 3 water per Encircle documentation, flag it.
9. AFTER-HOURS RATE OVERBILLING: If WTR LABA (after-hours rate) is billed but Encircle timestamps show the work was done during business hours (8AM-4PM Mon-Fri), flag the rate differential.

For each overbilling finding, include:
- severity: "OVERBILLED" 
- The estimated overbilled amount (difference between billed and documented)
- What the Encircle documentation actually supports
- Recommended correction

The QA audit must be BALANCED — an adjuster reviewing this report should see that JG Restoration catches its own overbilling, which builds credibility for the underbilling items. A clean audit that catches both directions is more defensible than one that only asks for more money.

POWER DISTRIBUTION / CONVERSION PANEL RULE: A conversion panel converts a 240V range or dryer outlet into multiple 120V circuits for equipment. ONLY flag this as missing if Encircle photos or scope notes explicitly show or mention a conversion panel, spider box, or power distribution panel being used. Do NOT assume a conversion panel was used just because equipment is present — most jobs run on standard outlets. Do NOT flag based on equipment count alone. Severity: LOW. Reference: OSHA 29 CFR 1926.405.

CONTAINMENT BARRIER RULE: If the estimate includes containment barriers (WTR BARR $0.99/SF), the following items MUST also be billed:
- Peel & seal zippers (WTR BARRZ+ $16.61/EA) — minimum 1 zipper per containment barrier opening. Each doorway or access point through the barrier needs a zipper. If Encircle shows multiple containment zones or access points, count each one.
- Containment poles/spring poles — used to support the poly barrier from floor to ceiling. Bill per pole used. Typical: 2-4 poles per barrier depending on span.
- Poly sheeting material if not included in the barrier line item.
If the estimate shows WTR BARR but NO zippers (WTR BARRZ+) and NO poles, flag as MISSING_ITEM with MEDIUM severity. Containment cannot be properly installed without zippers for access and poles for support. Also check that the barrier SF quantity matches the area being contained — undersized barriers are a common issue. Reference: IICRC S520 Section 12.2.

EMERGENCY SERVICE CALL RULE: If the QA audit determines that ANY work was performed after hours (outside 8:00 AM - 4:00 PM Monday-Friday), remind the PM at sign-off that an EMERGENCY SERVICE CALL fee should be billed in addition to the after-hours labor rate. The emergency service call is a flat fee charged per dispatch for responding outside business hours — it is SEPARATE from the hourly after-hours labor rate (WTR LABA). This covers the cost of mobilizing a crew, dispatching a vehicle, and disrupting on-call technician schedules. If the date of loss occurred after hours, on a weekend, or on a holiday, the initial response qualifies for the emergency service call fee. Check Encircle photo timestamps and date of loss — if either indicates after-hours work and the estimate does not include an emergency service call line item, flag it as a HIGH severity gap. This is one of the most frequently forgotten charges on emergency responses.

AFTER-HOURS LABOR RULE: JG Restoration business hours are 8:00 AM to 4:00 PM Monday through Friday (Central Time). ANY work performed outside these hours is after-hours labor and MUST be billed at the after-hours rate WTR LABA $90.84/HR instead of regular WTR LAB $60.50/HR. Check Encircle photo timestamps, activity logs, equipment placement times, and moisture reading times carefully. If photos or logs show technicians on-site before 8:00 AM, after 4:00 PM, or on weekends/holidays — ALL labor for those visits must be billed at the after-hours rate. Common after-hours scenarios: emergency response (first day of loss is almost always after hours), weekend equipment checks, early morning/evening moisture readings, holiday responses. If the date of loss occurred after 4 PM or on a weekend, the initial response and first-day labor should be after-hours. Also check if equipment was placed or picked up outside business hours. Flag any regular-rate labor (WTR LAB) that should be after-hours (WTR LABA) as UNDERBILLED with the dollar difference. Reference: IICRC S500 Section 10.1, standard industry practice.

AIR SCRUBBER FILTER RULE: HEPA filters (WTR FHEPA $220.90/EA) apply ONLY to AIR SCRUBBERS (WTR NAFAN or HMR NAFAN), NOT to air movers (WTR DRY, WTR DRY+). Air movers do NOT use HEPA filters — do NOT flag HEPA filters for air movers. Only flag missing HEPA if the estimate includes NAFAN line items (air scrubbers) but does NOT include FHEPA line items. Standard: 1 HEPA filter + 1 pre-filter per air scrubber per loss. If zero scrubbers are billed, zero HEPA filters are needed. CRITICAL: Count NAFAN line items specifically — do NOT count DRY or DRY+ as scrubbers. Reference: IICRC S520 Section 13.2.

WEIGHTED EXTRACTION RULE: Portable extractors and truck-mounted extraction are separate billable items from basic water extraction. If Encircle documents standing water, saturated carpet/pad, or water-logged materials, check that the estimate includes BOTH initial extraction AND weighted extraction. Weighted extraction applies when materials (carpet, pad, contents) are saturated and heavy — requiring extraction of water from the material itself, not just standing water. Bill WTR LAB $60.50/HR for extraction labor. Truck-mount extraction is billed at a premium rate. If Encircle shows heavy saturation, pad removal, or carpet being pulled for extraction underneath — that is weighted extraction. Standard: minimum 0.5 hours per affected room for portable extraction, additional time for truck-mount. Multiple passes of extraction are common and each pass is billable. If the estimate only shows one extraction line but Encircle documents multi-day water presence or heavy saturation, flag as underbilled. Reference: IICRC S500 Section 10.3.

CONTENT MANIPULATION RULE: If the Encircle report shows contents were moved, blocked, raised, or relocated in ANY room, bill WTR LAB $60.50/HR for content manipulation. Standard is 0.5-1.5 hours per affected room. IMPORTANT: The homeowner/customer may have moved their own contents before the crew arrived — this is common. When flagging content manipulation, ALWAYS add this note: "Verify with PM — customer may have performed this task. If customer moved contents, no charge applies." Severity: MEDIUM. Do NOT flag foam blocks/risers as a separate material charge — this is NOT a standard JG Restoration billing item. Reference: IICRC S500 Section 10.4. DRYING HOLES RULE: Bill 2 drying holes per linear foot of affected wall cavities. Measure total linear feet of walls with documented moisture intrusion (blue X markings, elevated moisture readings, or visible water damage in Encircle). Use WTR DRYWLS $6.17/LF for flood cuts which includes access holes. If walls show moisture but no extraction/drying access holes are billed, flag as a gap.

FOR EACH GAP you MUST include TWO fields:
1. "standard_reference" - the specific standard citation (e.g. "IICRC S500 Section 12.3")
2. "standard_text" - the ACTUAL REQUIREMENT LANGUAGE from that standard that supports billing. Write 1-2 sentences quoting or closely paraphrasing what the standard requires. This text will be shown to adjusters as justification.

Use these standards and their requirement language:
- PPE: OSHA 29 CFR 1910.132 — "Employers shall provide PPE to each employee where there is exposure to hazardous conditions." IICRC S500 Section 12.3 — "Appropriate PPE shall be used by all workers in contact with Category 2 or higher contaminated water. PPE includes gloves, eye protection, and respiratory protection as warranted by conditions."
- Anti-microbial treatment: IICRC S500 Section 12.5.3 — "All structural materials and contents affected by Category 2 or 3 water shall be cleaned and treated with an appropriate antimicrobial agent after removal of gross contamination." IICRC S520 Section 15 — "Antimicrobial application is required on all surfaces where mold growth has been remediated." IMPORTANT: The Xactimate anti-microbial line item WTR GRMB $0.38/SF ALREADY INCLUDES BOTH LABOR AND MATERIALS in the unit cost. Do NOT flag missing decontamination labor or spraying labor separately — it is built into the GRMB line item. If the estimate includes WTR GRMB for the affected areas, the anti-microbial application is fully billed. Only flag anti-microbial as missing if WTR GRMB is completely absent from rooms that had Category 2 or 3 water exposure.
- Equipment monitoring: IICRC S500 Section 11.2 — "The restorer shall monitor the drying process at least daily to ensure drying goals are being met. Documentation of moisture readings, temperature, humidity, and equipment operation is required. JG Restoration standard: 1.5 hours monitoring per day equipment is onsite, covering moisture readings, equipment checks, photo documentation, and client communication." Section 11.3 — "All monitoring data shall be documented and maintained as part of the project record."
- Air movers/dehumidifiers: IICRC S500 Section 11.4 — "Sufficient air movers and dehumidifiers shall be deployed based on psychrometric calculations to achieve drying goals. Equipment quantity shall match the affected area and materials." Section 11.5 — "Equipment shall be positioned to maximize airflow across wet materials and maintain appropriate grain depression."
- Containment: IICRC S500 Section 12.2 — "Containment barriers shall be established to isolate the work area and prevent cross-contamination to unaffected areas." OSHA 29 CFR 1926.1101 — "Regulated areas must be established where airborne concentrations may exceed permissible exposure limits."
- Water extraction / weighted extraction: IICRC S500 Section 10.3 — "Standing water and excess moisture shall be promptly extracted to minimize damage and reduce drying time. Extraction is the single most important step in the water damage restoration process. Weighted extraction — removing water absorbed into carpet, pad, and other porous materials — is a separate procedure from standing water removal and shall be performed until no additional water can be recovered. Multiple extraction passes are standard practice when materials are heavily saturated. Truck-mounted extraction equipment provides superior suction for deep extraction of water-logged materials and is billed at a premium rate over portable extractors."
- Demolition/flood cuts/drying holes: IICRC S500 Section 12.1.2 — "Category 2 water-affected porous materials that cannot be effectively cleaned shall be removed. Drywall, insulation, and other absorbent materials in contact with contaminated water require removal to the point of unaffected material. Wall cavities require access openings (drying holes or flood cuts) at a minimum of 2 per linear foot to allow airflow for structural drying per IICRC S500 Section 11.5. Without adequate access, wall cavities cannot achieve drying goals within acceptable timeframes, increasing risk of secondary damage and microbial growth."
- Insulation removal: IICRC S500 Section 12.1.3 — "Wet insulation in wall and ceiling cavities is considered non-salvageable and shall be removed to facilitate structural drying and prevent microbial growth."
- Floor protection: IICRC S500 Section 10.5 — "Unaffected areas adjacent to the work zone shall be protected from damage during restoration activities using appropriate covering materials."
- Moisture testing: IICRC S500 Section 11.1 — "A thorough moisture assessment shall be performed to determine the extent of water intrusion. Moisture mapping using appropriate instruments is required to document affected and unaffected areas."
- HEPA filtration / air scrubber filters: IICRC S520 Section 13.2 — "HEPA-filtered air scrubbing devices shall be used to maintain air quality during remediation. Filters shall be inspected and replaced according to manufacturer specifications. HEPA filters and pre-filters are consumable items that must be replaced on each deployment. A minimum of one HEPA filter per air scrubber per loss is required. Pre-filters protect the HEPA filter and may require more frequent replacement on jobs with heavy particulate. Both HEPA filters and pre-filters are billable materials on every loss where air scrubbers are deployed." OSHA 29 CFR 1910.1000 — "Airborne contaminant levels shall not exceed permissible exposure limits. Proper filtration maintenance is essential to ensure worker and occupant safety."
- Content manipulation/move-out/move-back: IICRC S500 Section 10.4 — "Contents in the affected area shall be moved, blocked, or relocated as necessary to facilitate drying of structural materials and to protect contents from further damage. This includes raising furniture on blocks or risers, wrapping contents in protective plastic, relocating items to unaffected areas, and moving contents back after drying is complete. Content manipulation is billable labor for EACH room where contents were disturbed. Standard: 0.5-1.5 hours per room depending on volume and complexity. Move-back is a separate billable event."
- Dumpster/debris: OSHA 29 CFR 1926.252 — "Waste materials shall be stored and disposed of in a manner that does not create hazards to workers or occupants."
- After-hours/emergency labor: IICRC S500 Section 10.1 — "Water damage restoration should begin within 24-48 hours of the loss to minimize secondary damage. Emergency response outside normal business hours is standard industry practice for Category 2 and 3 losses. JG Restoration business hours: Monday-Friday 8:00 AM - 4:00 PM Central Time. All labor outside these hours — including evenings, early mornings, weekends, and holidays — shall be billed at the after-hours rate (WTR LABA $90.84/HR vs WTR LAB $60.50/HR). The after-hours premium compensates for overtime wages, on-call availability, and disruption to technician schedules. Photo timestamps and activity logs in Encircle serve as documentation of when work was performed."

function extractJSON(text){
  // Remove markdown code fences
  let t=text.replace(/```json/g,'').replace(/```/g,'').trim();
  // Try direct parse first
  try{return JSON.parse(t)}catch(e){}
  // Find first { and last } to extract JSON object
  const start=t.indexOf('{');const end=t.lastIndexOf('}');
  if(start!==-1&&end>start){try{return JSON.parse(t.substring(start,end+1))}catch(e){}}
  // Find first [ and last ] for array
  const aStart=t.indexOf('[');const aEnd=t.lastIndexOf(']');
  if(aStart!==-1&&aEnd>aStart){try{return JSON.parse(t.substring(aStart,aEnd+1))}catch(e){}}
  throw new Error('Could not parse AI response as JSON. Response started with: '+t.substring(0,100))
}

// ══ PASS 2: Verify Corrections ══
async function runPass2(){
  if(!S.correctedEst||!S.encB64||S.recheckBusy)return;
  S.recheckBusy=true;S.err=null;S.recheckResult=null;draw();
  try{
    S.prog='Reading corrected estimate...';draw();
    const cx=await b64(S.correctedEst);
    S.prog='AI verifying corrections (30-60 sec)...';draw();
    const recheckEncContent=S.encText?
      [{type:'text',text:'ENCIRCLE MITIGATION REPORT (extracted text):\n\n'+S.encText},{type:'text',text:'ABOVE: Encircle mitigation report (same as initial review)'},{type:'document',source:{type:'base64',media_type:'application/pdf',data:cx}},{type:'text',text:'ABOVE: CORRECTED Xactimate estimate. Verify corrections. Score it. Return ONLY valid JSON.'}]:
      [{type:'document',source:{type:'base64',media_type:'application/pdf',data:S.encB64}},{type:'text',text:'ABOVE: Encircle mitigation report (same as initial review)'},{type:'document',source:{type:'base64',media_type:'application/pdf',data:cx}},{type:'text',text:'ABOVE: CORRECTED Xactimate estimate. Verify corrections. Score it. Return ONLY valid JSON.'}];
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,system:RECHECK_PROMPT,
        messages:[{role:'user',content:recheckEncContent}]})});
    if(!r.ok){const er=await r.json().catch(()=>null);throw new Error(er?.error?.message||'API error '+r.status)}
    S.prog='Parsing...';draw();
    const d=await r.json();const t=d.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const rc=extractJSON(t);
    S.recheckResult=rc;
    S.phase=((rc.score?.grade==='A'||rc.score?.grade==='B')?'signoff':'recheck_result');
    S.prog='';
  }catch(e){S.err=e.message;S.prog=''}
  S.recheckBusy=false;draw()
}

      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,system:REBUILD_PROMPT,
        messages:[{role:'user',content:rebEncContent}]})});
    if(!r.ok){const er=await r.json().catch(()=>null);throw new Error(er?.error?.message||'API error '+r.status)}

// Composite logo onto colored background (fixes transparent PNG rendering as black in jsPDF)
function getLogoForPDF(bgR,bgG,bgB,w,h){
  return new Promise(resolve=>{
    const timeout=setTimeout(()=>resolve(null),3000);
    const canvas=document.createElement('canvas');
    canvas.width=w*3;canvas.height=h*3;
    const ctx=canvas.getContext('2d');
    ctx.fillStyle='rgb('+bgR+','+bgG+','+bgB+')';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      clearTimeout(timeout);
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      try{resolve(canvas.toDataURL('image/jpeg',0.92))}catch(e){resolve(null)}
    };
    img.onerror=()=>{clearTimeout(timeout);resolve(null)};
    img.src=https://jgimprovements-arch.github.io/jg-dispatch/logo.png;
  })
}

// ══ ADJUSTER REBUTTAL PROMPT ══
const ADJUSTER_PROMPT=`You are a senior estimator and claims specialist for JG Restoration in Wisconsin. Your job is to analyze an adjuster's estimate or email and build a firm, professional line-by-line rebuttal defending JG Restoration's original billing.

TONE: Firm and professional. JG Restoration stands behind its billing. Every line item is supported by IICRC/OSHA standards and Encircle field documentation. Do not be apologetic or collaborative — state the standard, cite the evidence, and maintain the position.

APPROACH:
1. Compare JG Restoration's Xactimate estimate against the adjuster's Xactimate estimate or email objections
2. Identify EVERY difference: items removed, quantities reduced, rates changed, codes substituted
3. For each disputed item, provide:
   - What JG billed vs what the adjuster approved/proposed
   - The dollar difference at stake
   - The specific OSHA or IICRC standard that supports JG's billing
   - The Encircle documentation evidence (photos, moisture readings, timestamps, equipment logs)
   - A firm 1-2 sentence defense statement

USE THESE STANDARDS:
- IICRC S500 (Water Damage) — Sections 10.1-12.5 covering extraction, drying, monitoring, demolition, antimicrobial, content manipulation
- IICRC S520 (Mold Remediation) — Sections 12-15 covering containment, HEPA filtration, antimicrobial
- OSHA 29 CFR 1910.132 — PPE requirements
- OSHA 29 CFR 1926.405 — Temporary electrical installations
- OSHA 29 CFR 1910.1000 — Airborne contaminant limits

COMPOSITE LINE ITEMS: WTR GRMB, WTR CABLOW, WTR CABUP, WTR CABVNC, WTR SNKD, WTR TLTD, WTR DORSLD, all WTR tearout codes — these INCLUDE labor in the unit cost. Do not cite missing labor for these.

O&P RULE: O&P applies ONLY to reconstruction. NEVER defend O&P on water mitigation, mold, contents, or fire mitigation.

Return ONLY valid JSON:
{
  "adjuster_info":{"name":"","company":"","claim_number":"","email":""},
  "summary":{"jg_total":"","adjuster_total":"","total_disputed":"","items_disputed":0,"items_removed":0,"items_reduced":0,"items_changed":0},
  "disputed_items":[
    {"id":"DISP-001","description":"","jg_line_num":"","jg_code":"","jg_description":"","jg_qty":"","jg_unit":"","jg_unit_cost":"","jg_amount":"","adj_line_num":"","adj_code":"","adj_description":"","adj_qty":"","adj_unit":"","adj_unit_cost":"","adj_amount":"","difference":"","category":"removed|reduced|rate_changed|code_changed","standard_reference":"","standard_text":"","encircle_evidence":"","defense_statement":""}
  ],
  "response_letter":"A complete professional response letter from JG Restoration to the adjuster defending all disputed items. Include: opening paragraph stating JG maintains its position and that all charges are supported by IICRC/OSHA standards and documented in our Encircle field report with timestamped photos and moisture readings. For each disputed item reference the JG estimate line number, the Xactimate code, the applicable standard, and the Encircle evidence. Closing paragraph requesting payment of the full original amount. Sign as JG Restoration, (920) 428-4200."
}`;

// ══ ADJUSTER REBUTTAL ANALYSIS ══
async function runAdjusterAnalysis(){
  S.proj=document.getElementById('projIn')?.value||S.proj;
  if(!S.proj.trim()){S.err='Albi project name is required.';draw();return}
  if(!S.enc||!S.est||!S.apiKey||S.busy)return;
  if(!S.adjEst&&!S.adjEmail.trim()){S.err='Upload adjuster estimate or paste their email.';draw();return}
  S.busy=true;S.err=null;S.adjResult=null;S.adjResp={};S.adjDone=false;S.adjNotes={};S.adjLetterEdited=null;draw();
  try{
    S.prog='Reading documents...';draw();
    const[e,x]=await Promise.all([b64(S.enc),b64(S.est)]);
    S.encB64=e;
    
    // Handle large Encircle PDFs
    let encContent;
    try{
      const pdfLib=await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs');
      pdfLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';
      const encBytes=Uint8Array.from(atob(e),c=>c.charCodeAt(0));
      const encDoc=await pdfLib.getDocument({data:encBytes}).promise;
      if(encDoc.numPages>100){
        S.prog='Extracting text from '+encDoc.numPages+'-page Encircle report...';draw();
        let allText='';
        for(let i=1;i<=encDoc.numPages;i++){const pg=await encDoc.getPage(i);const tc=await pg.getTextContent();allText+=tc.items.map(it=>it.str).join(' ')+'\\n'}
        encContent={type:'text',text:'ENCIRCLE REPORT (extracted text):\\n'+allText};
        S.encText=allText;
      }
    }catch(pe){}
    
    const msgContent=[];
    if(encContent){msgContent.push(encContent)}else{msgContent.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:e}})}
    msgContent.push({type:'text',text:'ABOVE: JG Restoration Encircle field documentation'});
    msgContent.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:x}});
    msgContent.push({type:'text',text:'ABOVE: JG Restoration original Xactimate estimate'});
    
    if(S.adjEst){
      const adjB64=await b64(S.adjEst);
      msgContent.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:adjB64}});
      msgContent.push({type:'text',text:'ABOVE: Adjuster revised Xactimate estimate. Compare against JG estimate and defend every item the adjuster removed, reduced, or changed.'});
    }
    if(S.adjEmail.trim()){
      msgContent.push({type:'text',text:'ADJUSTER EMAIL/COMMUNICATION:\\n'+S.adjEmail+'\\n\\nDefend every objection raised in this communication with OSHA/IICRC standards and Encircle evidence.'});
    }
    
    S.prog='AI analyzing disputes (30-60 sec)...';draw();
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:8000,system:ADJUSTER_PROMPT,
        messages:[{role:'user',content:msgContent}]})});
    if(!r.ok){const er=await r.json().catch(()=>null);throw new Error(er?.error?.message||'API error '+r.status)}
    S.prog='Parsing...';draw();
    const d=await r.json();const t=d.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    S.adjResult=extractJSON(t);
    S.adjResult.disputed_items=(S.adjResult.disputed_items||[]).map((d,i)=>({...d,id:d.id||'DISP-'+String(i+1).padStart(3,'0')}));
    S.phase='adj_review';S.prog='';
  }catch(e){S.err=e.message;S.prog=''}
  S.busy=false;draw()
}

    const notesForAI=defended.map(d=>{

      return d.id+' — '+d.description+' ('+d.difference+')\nJG Line #'+(d.jg_line_num||'?')+': '+d.jg_code+' '+d.jg_qty+' '+d.jg_unit+' @ $'+d.jg_unit_cost+' = '+d.jg_amount+'\nStandard: '+(d.standard_reference||'')+'\nEncircle: '+(d.encircle_evidence||'')+'\nInitial defense: '+(d.defense_statement||'')+(pmNote?'\nPM NOTES: '+pmNote:'')

  // ══ PHASE: UPLOAD (QA REVIEW) ══
  if(S.mode==='qa'&&S.phase==='upload'){

    if(S.busy&&S.prog)h+=`<div style="margin-top:12px;padding:12px;border-radius:6px;background:var(--s1);border:1px solid rgba(232,147,12,0.2);display:flex;align-items:center;gap:10px"><div style="width:16px;height:16px;border:2px solid var(--acc);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0"></div><span style="font-size:12px;color:var(--acc);font-family:'JetBrains Mono',monospace">${S.prog}</span></div>`;

  else if(S.phase==='review'){

    // ══ OVERBILLED ITEMS (if any) ══
    if(overbilled.length>0){
      h+=`<div style="margin-bottom:20px;background:rgba(229,57,53,0.04);border:2px solid rgba(229,57,53,0.3);border-radius:12px;padding:16px"><div class="mono" style="font-size:14px;font-weight:700;color:var(--red);margin-bottom:12px">⚠ OVERBILLED ITEMS — Reduce to match documentation (${overbilled.length})</div>`;

        h+=`<div style="background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:12px 16px;margin-bottom:8px;border-left:4px solid var(--red)"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div style="flex:1"><span class="mono" style="font-size:11px;color:var(--red);font-weight:700">${ob.id||''}</span><span class="badge" style="color:var(--red);background:var(--red)15;border:1px solid var(--red)30;margin-left:8px">OVERBILLED</span><p style="font-size:13px;font-weight:600;margin-top:6px">${ob.description||''}</p></div><div style="text-align:right;margin-left:12px"><div class="mono" style="font-size:14px;font-weight:700;color:var(--red)">-${ob.difference||''}</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:12px;color:var(--dim)"><div><strong style="color:var(--red)">Billed: </strong>${ob.billed_amount||''}</div><div><strong style="color:var(--grn)">Supported: </strong>${ob.supported_amount||''}</div></div><div style="font-size:12px;color:var(--dim);margin-top:6px"><strong>Evidence: </strong>${ob.encircle_evidence||''}</div><div style="font-size:12px;color:var(--blu);margin-top:4px"><strong>Correction: </strong>${ob.recommended_correction||''}</div></div>`;
      });

    }

    // ══ UNDERBILLED GAPS ══
    h+=`<div style="display:flex;gap:6px;margin-bottom:14px">`;['ALL','HIGH','MEDIUM','LOW'].forEach(sv=>{const ct=sv==='ALL'?gaps.length:gaps.filter(g=>g.severity===sv).length;h+=`<button style="background:${S.sev===sv?'var(--s2)':'transparent'};border:1px solid ${S.sev===sv?'var(--brdH)':'var(--brd)'};border-radius:4px;padding:4px 12px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:600;cursor:pointer;color:${sv==='ALL'?(S.sev===sv?'var(--txt)':'var(--dim)'):sc(sv)}" onclick="S.sev='${sv}';draw()">${sv} (${ct})</button>`});h+=`</div>`;

    filt.forEach(g=>{const rr=S.resp[g.id]||{};const dn=rr.a&&(rr.a==='C'||(rr.a==='J'&&rr.j?.trim()));
    h+=`<div style="background:var(--s1);border:1px solid ${dn?'rgba(67,160,71,0.4)':'var(--brd)'};border-radius:10px;overflow:hidden;margin-bottom:10px;border-left:4px solid ${dn?'var(--grn)':sc(g.severity)}"><div style="padding:14px 16px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div style="flex:1"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap"><span class="mono" style="font-size:11px;color:var(--dim);font-weight:600">${g.id}</span><span class="badge" style="color:${sc(g.severity)};background:${sc(g.severity)}15;border:1px solid ${sc(g.severity)}30">${g.severity}</span><span class="badge" style="color:var(--dim);background:#70819415;border:1px solid #70819430">${cl(g.category)}</span><span class="mono" style="font-size:13px;color:var(--blu);font-weight:700">${g.xact_code}</span>${dn?`<span class="badge" style="color:${rr.a==='C'?'var(--grn)':'var(--wrn)'};background:${rr.a==='C'?'var(--grn)':'var(--wrn)'}15;border:1px solid ${rr.a==='C'?'var(--grn)':'var(--wrn)'}30">${rr.a==='C'?'Will correct':'Justified'}</span>`:''}</div><p style="font-size:14px;font-weight:600">${g.description}</p></div><div style="text-align:right;margin-left:12px;flex-shrink:0"><div style="font-size:16px;font-weight:700;color:var(--acc);font-family:'JetBrains Mono',monospace">${g.estimated_value}</div><div style="font-size:11px;color:var(--dim)">${g.recommended_qty||''} ${g.unit||''}</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:12px;color:var(--dim);margin-bottom:4px"><div><strong style="color:var(--grn)">Encircle: </strong>${g.encircle_evidence||''}</div><div><strong style="color:var(--wrn)">Estimate: </strong>${g.xactimate_current||''}</div></div>${g.standard_reference?`<div style="font-size:11px;background:rgba(30,136,229,0.06);border:1px solid rgba(30,136,229,0.15);border-radius:6px;padding:8px 10px;margin-bottom:4px"><div style="font-family:'JetBrains Mono',monospace;color:#64B5F6;font-weight:700;margin-bottom:4px">⚖ ${g.standard_reference}</div>${g.standard_text?`<div style="color:#90CAF9;line-height:1.5">${g.standard_text}</div>`:''}</div>`:''}<div style="background:var(--s2);border-radius:8px;padding:12px 14px;margin-top:12px;border:1px solid ${dn?'rgba(67,160,71,0.3)':'rgba(251,140,0,0.4)'}"><div style="font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;color:${dn?'var(--grn)':'var(--wrn)'}">${dn?'✓ Addressed':'⚠ Response required'}</div><div><button class="act-btn ${rr.a==='C'?'sc':''}" onclick="setResp('${g.id}','C')">✓ Will correct</button><button class="act-btn ${rr.a==='J'?'sj':''}" onclick="setResp('${g.id}','J')">Justify variance</button></div>${rr.a==='J'?`<textarea id="just_${g.id}" oninput="setJust('${g.id}',this.value)" placeholder="Required: Explain why..." style="margin-top:10px;border-color:${rr.j?.trim()?'rgba(67,160,71,0.4)':'var(--wrn)'}">${rr.j||''}</textarea>`:''}</div></div></div>`});

    // Rebuild
    h+=`<div style="margin-top:20px;background:var(--s1);border-radius:10px;padding:16px 20px;border:1px solid ${S.reb?'rgba(106,27,154,0.4)':'var(--brd)'}"><label style="display:flex;align-items:center;gap:10px;cursor:pointer"><input type="checkbox" ${S.reb?'checked':''} onchange="S.reb=this.checked;draw()" style="width:18px;height:18px;accent-color:var(--purp)"><span class="mono" style="font-size:14px;font-weight:700">Reconstruction / rebuild needed</span></label>`;

    h+=`</div>`;

    // Next step button
    h+=`<div style="margin-top:20px;background:var(--s1);border-radius:10px;padding:20px;border:1px solid ${gs.ok?'var(--acc)':'var(--brd)'}"><div class="mono" style="font-size:14px;font-weight:700;margin-bottom:8px">${!gs.ok?'Address all gaps before proceeding':gs.cor>0?'Corrections marked — upload corrected estimate to verify':'All variances justified — proceed to sign-off'}</div><p style="font-size:12px;color:var(--dim);margin-bottom:12px">${gs.cor>0?'You marked '+gs.cor+' item(s) for correction. After fixing in Xactimate, upload the corrected PDF to verify changes.':'No corrections needed. All '+gs.jus+' variance(s) have been justified. You can proceed directly to sign-off.'}</p><button style="width:100%;padding:14px;border-radius:8px;border:none;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;cursor:${gs.ok?'pointer':'not-allowed'};background:${gs.ok?(gs.cor>0?'linear-gradient(135deg,var(--acc),#C97A08)':'linear-gradient(135deg,var(--grn),#2E7D32)'):'var(--mut)'};color:${gs.ok?'#000':'var(--dim)'}" onclick="moveToRecheck()">${gs.cor>0?'Upload Corrected Estimate — Pass 2 ⟶':'Proceed to Sign-Off ⟶'}</button></div>`;
  }

  // ══ PHASE: RECHECK UPLOAD ══
  else if(S.phase==='recheck_upload'||S.phase==='recheck_result'){
    h+=`<div style="background:var(--s1);border:1px solid var(--acc);border-radius:10px;padding:20px;margin-bottom:16px"><div class="mono" style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--acc)">Pass 2 — Upload Corrected Estimate</div><p style="font-size:13px;color:var(--dim);margin-bottom:16px">Upload the corrected Xactimate estimate. The AI will verify that the corrections from Pass 1 were actually made before allowing sign-off.</p>`;
    h+=`<div style="border:2px dashed ${S.correctedEst?'var(--grn)':'var(--brd)'};border-radius:10px;padding:${S.correctedEst?'16px':'32px 16px'};text-align:${S.correctedEst?'left':'center'};cursor:pointer;background:${S.correctedEst?'var(--s2)':'transparent'};margin-bottom:16px" onclick="document.getElementById('corF').click()"><input type="file" id="corF" accept=".pdf" onchange="if(this.files[0]){S.correctedEst=this.files[0];S.recheckResult=null;S.phase='recheck_upload';draw()}">${S.correctedEst?'<div style="display:flex;align-items:center;gap:10px"><span style="font-size:22">📊</span><div><p style="font-size:12px;font-weight:600;color:var(--grn)">Corrected estimate loaded</p><p style="font-size:11px;color:var(--dim);margin-top:2px">'+S.correctedEst.name+'</p></div></div>':'<div style="font-size:28px;opacity:.4;margin-bottom:8px">📊</div><p style="font-size:13px;font-weight:600">Corrected Xactimate Estimate</p><p style="font-size:11px;color:var(--dim);margin-top:4px">Upload the fixed estimate PDF</p>'}</div>`;

    // Recheck results (if failed)
    if(S.recheckResult&&S.phase==='recheck_result'){
      const rc=S.recheckResult;
      h+=`<div style="background:var(--redD);border:2px solid var(--red);border-radius:12px;padding:20px;margin-bottom:16px;text-align:center"><div style="font-size:36px;font-weight:800;color:${gc(rc.score?.grade)};font-family:'JetBrains Mono',monospace">${rc.score?.grade||'?'}</div><div style="font-size:16px;font-weight:700;color:var(--red);font-family:'JetBrains Mono',monospace;margin:8px 0">NOT APPROVED — More corrections needed</div><div style="font-size:13px;color:var(--dim)">${rc.score?.summary||'Capture rate too low. Address remaining gaps and re-upload.'}</div></div>`;

        h+=`<div class="mono" style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--red)">Remaining Gaps</div>`;
        (rc.remaining_gaps||[]).forEach(g=>{h+=`<div style="background:var(--s1);border:1px solid var(--brd);border-radius:8px;padding:12px 16px;margin-bottom:6px;border-left:3px solid var(--wrn)"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:8px"><span class="mono" style="font-size:12px;color:var(--blu);font-weight:600">${g.xact_code||''}</span><span style="font-size:13px">${g.description||''}</span></div><span class="mono" style="font-size:13px;font-weight:700;color:var(--acc)">${g.estimated_value||''}</span></div></div>`});
      }
      h+=`<p style="font-size:13px;color:var(--dim);margin-top:12px;text-align:center">Fix the remaining items in Xactimate and upload the corrected estimate again above.</p>`;
    }
  }

  // ══ PHASE: SIGNOFF ══
  else if(S.phase==='signoff'){
    const rc=S.recheckResult;

        (rb.line_items||[]).forEach(li=>{
          h+=`<div style="display:grid;grid-template-columns:30px 90px 70px 1fr 55px 35px 60px 70px 55px;gap:0;padding:6px 12px;font-size:10px;border-bottom:1px solid var(--brd)20"><span class="mono" style="color:var(--dim)">${li.line_num||i+1}</span><span style="color:var(--dim);font-size:9px">${li.room||''}</span><span class="mono" style="color:var(--blu);font-weight:600;font-size:9px">${li.cat||''} ${li.sel||''}</span><span style="font-size:10px">${li.description||''}</span><span class="mono">${li.qty||0}</span><span style="color:var(--dim);font-size:9px">${li.unit||''}</span><span class="mono">$${li.unit_cost||0}</span><span class="mono" style="text-align:right;color:var(--purp);font-weight:600">$${li.rcv||0}</span><span class="mono" style="text-align:right;color:var(--dim);font-size:9px">$${li.sales_tax||0}</span></div>`;

        h+=`<div class="mono" style="font-size:12px;font-weight:700;color:var(--purp);margin:16px 0 10px;text-transform:uppercase">Additional Items</div>`;
        (rb.additional_items||[]).forEach(ai=>{
          h+=`<div style="background:var(--s1);border:1px solid var(--brd);border-radius:6px;padding:10px 14px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center"><div><span style="font-size:12px">${ai.description||''}</span><span style="font-size:11px;color:var(--dim);margin-left:8px">${ai.notes||''}</span></div><span class="mono" style="font-size:12px;font-weight:700;color:var(--purp)">${ai.estimated_cost||''}</span></div>`;
        });
      }

      // Download rebuild scope PDF button
      h+=`<div style="margin-top:16px;background:rgba(232,147,12,0.06);border:2px solid rgba(232,147,12,0.3);border-radius:10px;padding:16px"><div class="mono" style="font-size:12px;font-weight:700;color:var(--acc);margin-bottom:10px;text-transform:uppercase">⚠ MANDATORY RECONSTRUCTION REMINDERS</div>`;
      (rb.mandatory_reminders||[]).forEach(mr=>{const inc=mr.included;h+=`<div style="background:var(--s1);border:1px solid var(--brd);border-radius:6px;padding:10px 14px;margin-bottom:4px;border-left:3px solid ${inc?'var(--grn)':'var(--red)'}"><div style="display:flex;justify-content:space-between;align-items:center"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:14px">${inc?'✓':'⚠'}</span><span style="font-size:12px;font-weight:600">${mr.item||''}</span></div><div style="display:flex;align-items:center;gap:10px"><span class="mono" style="font-size:12px;font-weight:700;color:var(--acc)">${mr.estimated_cost||''}</span><span class="badge" style="color:${inc?'var(--grn)':'var(--red)'};background:${inc?'var(--grn)':'var(--red)'}15;border:1px solid ${inc?'var(--grn)':'var(--red)'}30">${inc?'Included':'MISSING'}</span></div></div>${mr.notes?`<div style="font-size:11px;color:var(--dim);margin-top:4px;padding-left:22px">${mr.notes}</div>`:''}</div>`});
      h+=`</div>`;

      h+=`<div style="margin-top:16px;text-align:center;display:flex;flex-wrap:wrap;gap:10px;justify-content:center"><button style="background:linear-gradient(135deg,#6A1B9A,#4A148C);border:none;color:#fff;padding:12px 28px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace" onclick="generateRebuildPDF()">Download Rebuild PDF</button><button style="background:linear-gradient(135deg,#7B1FA2,#4A148C);border:none;color:#fff;padding:12px 28px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace" onclick="generateRebuildPDF();setTimeout(()=>window.open('https://drive.google.com/drive/folders/1h6Vb0m-bIeoFIqIFyiteKMkvGwoeIUkz','_blank'),500)">Rebuild PDF + Drive</button><button style="background:linear-gradient(135deg,#2E7D32,#1B5E20);border:none;color:#fff;padding:12px 28px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace" onclick="generateRebuildExcel()">Download Excel Estimate</button><button style="background:linear-gradient(135deg,#1B5E20,#0D3B13);border:none;color:#fff;padding:12px 28px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace" onclick="generateRebuildExcel();setTimeout(()=>window.open('https://drive.google.com/drive/folders/1h6Vb0m-bIeoFIqIFyiteKMkvGwoeIUkz','_blank'),500)">Excel + Save to Drive</button></div>`;

      h+=`</div>`;

<script>
// ── JG PLATFORM AUTH ─────────────────────────────
const JG_AUTH_KEY = 'jg_platform_user';
const JG_AUTH_EXP = 'jg_platform_exp';
const SESSION_HOURS = 12;

let jgUser = null;

function jgCheckAuth() {
  const saved = localStorage.getItem(JG_AUTH_KEY);
  const exp = localStorage.getItem(JG_AUTH_EXP);
  if (saved && exp && Date.now() < parseInt(exp)) {
    jgUser = JSON.parse(saved);
    jgHideLogin();
    jgShowBadge();
    return true;
  }
  // Expired or not logged in
  localStorage.removeItem(JG_AUTH_KEY);
  localStorage.removeItem(JG_AUTH_EXP);
  jgUser = null;
  jgShowLogin();
  return false;
}

function jgShowLogin() {
  const overlay = document.getElementById('login-overlay');
  if (overlay) overlay.style.display = 'flex';
}

function jgHideLogin() {
  const overlay = document.getElementById('login-overlay');
  if (overlay) overlay.style.display = 'none';
}

function onGoogleSignIn(response) {
  try {
    // Decode JWT payload
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const email = payload.email;

    // Restrict to JG Restoration domain
    if (!email.endsWith('@jg-restoration.com')) {
      document.getElementById('login-err').textContent = 'Access restricted to @jg-restoration.com accounts only.';
      localStorage.removeItem(JG_AUTH_KEY);
      return;
    }

    const name = payload.name || payload.given_name || email.split('@')[0];
    const picture = payload.picture || '';

    jgUser = { email, name, picture };
    
    // Store in localStorage — persists across tabs, expires in 12 hours
    localStorage.setItem(JG_AUTH_KEY, JSON.stringify(jgUser));
    localStorage.setItem(JG_AUTH_EXP, String(Date.now() + SESSION_HOURS * 3600 * 1000));
    
    jgHideLogin();
    jgShowBadge();
    
    // Log to Supabase if available
    if (typeof sbFetch === 'function') {
      sbFetch('/rest/v1/activity_log', {
        method: 'POST',
        body: JSON.stringify({
          user_name: name,
          user_email: email,
          action: 'login',
          app: document.title,
          logged_at: new Date().toISOString()
        })
      }).catch(() => {});
    }
  } catch(e) {
    document.getElementById('login-err').textContent = 'Sign in failed. Please try again.';
  }
}

function jgShowBadge() {
  if (!jgUser) return;
  // Remove existing badge
  const existing = document.getElementById('user-badge');
  if (existing) existing.remove();
  
  // Find header to attach to
  const target = document.querySelector('.hdr-r, .topnav, .hdr');
  if (!target) return;
  
  const b = document.createElement('span');
  b.id = 'user-badge';
  b.title = 'Click to sign out';
  b.innerHTML = (jgUser.picture ? `<img src="${jgUser.picture}" style="width:16px;height:16px;border-radius:50%;vertical-align:middle;margin-right:4px;">` : '👤 ') + jgUser.name.split(' ')[0];
  b.onclick = () => {
    if (confirm('Sign out of JG Platform?')) {
      localStorage.removeItem(JG_AUTH_KEY);
      localStorage.removeItem(JG_AUTH_EXP);
      location.reload();
    }
  };
  target.appendChild(b);
}

// Override currentUser for dispatch board compatibility
Object.defineProperty(window, 'currentUser', {
  get: () => jgUser?.name || null,
  configurable: true
});

// Run on load
document.addEventListener('DOMContentLoaded', () => jgCheckAuth());

// Listen for auth changes from other tabs
window.addEventListener('storage', (e) => {
  if (e.key === JG_AUTH_KEY) {
    if (e.newValue) {
      jgUser = JSON.parse(e.newValue);
      jgHideLogin();
      jgShowBadge();
    } else {
      jgUser = null;
      jgShowLogin();
    }
  }
});
</script>
