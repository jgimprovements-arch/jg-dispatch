<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d2d5e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Documents · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623; --green: #2d9c5f; --red: #d64545;
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --muted: #7884a0; --line: #e3e7f0;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }

  .topbar { background: linear-gradient(135deg, #0d2d5e 0%, #1a4080 100%); color: #fff; padding: calc(var(--safe-top) + 14px) 16px 14px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 12px rgba(13,45,94,.25); position: sticky; top: 0; z-index: 10; }
  .back-btn { background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); color: #fff; border-radius: 999px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 18px; text-decoration: none; flex-shrink: 0; }
  .back-btn:active { background: rgba(255,255,255,.22); }
  .title { flex: 1; min-width: 0; }
  .title h1 { margin: 0; font-size: 15px; font-weight: 800; }
  .title .sub { font-size: 10px; opacity: .8; letter-spacing: .8px; text-transform: uppercase; }
  .upload-btn { background: var(--orange); color: #fff; border-radius: 999px; padding: 7px 14px; font-size: 12px; font-weight: 700; border: 0; cursor: pointer; flex-shrink: 0; font-family: inherit; }
  .upload-btn:active { background: #d05303; }

  main { padding: 14px 14px calc(var(--safe-bottom) + 28px); max-width: 720px; margin: 0 auto; }

  /* Category filter */
  .cat-row { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
  .cat-row::-webkit-scrollbar { display: none; }
  .cat-chip { background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 7px 14px; font-size: 12px; font-weight: 700; color: var(--navy); white-space: nowrap; cursor: pointer; flex-shrink: 0; }
  .cat-chip.on { background: var(--navy); color: #fff; border-color: var(--navy); }

  .doc-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: inherit;
    transition: border-color .15s, transform .15s;
  }
  .doc-card:active { border-color: var(--orange); transform: scale(.98); }
  .doc-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .doc-icon.pdf { background: rgba(214,69,69,.10); color: var(--red); }
  .doc-icon.img { background: rgba(74,144,226,.10); color: #4a90e2; }
  .doc-icon.doc { background: rgba(45,156,95,.10); color: var(--green); }
  .doc-info { flex: 1; min-width: 0; }
  .doc-name {
    font-weight: 700;
    color: var(--navy);
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .doc-meta { font-size: 11px; color: var(--muted); }
  .doc-cat-pill {
    display: inline-block;
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 1px 7px;
    border-radius: 999px;
    font-size: 9px;
    font-weight: 700;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: .3px;
    margin-right: 4px;
  }

  .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty .ico { font-size: 42px; opacity: .4; margin-bottom: 8px; }
  .empty h3 { color: var(--navy); margin: 0 0 4px; }
  .empty p { margin: 0; font-size: 13px; }

  /* Upload modal */
  .modal-back { position: fixed; inset: 0; background: rgba(13,45,94,.5); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
  .modal-back.on { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 18px 18px 0 0;
    width: 100%;
    max-width: 600px;
    padding: 18px 16px calc(var(--safe-bottom) + 18px);
    box-shadow: 0 -8px 32px rgba(13,45,94,.3);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 { margin: 0 0 12px; color: var(--navy); font-size: 16px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
  .modal .close-x { background: var(--bg); border: 0; border-radius: 999px; width: 30px; height: 30px; font-size: 18px; cursor: pointer; color: var(--muted); }
  .modal label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin: 10px 0 4px; }
  .modal select { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--navy); background: #fff; }
  .file-zones { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .file-zone {
    background: var(--bg);
    border: 2px dashed var(--line);
    border-radius: 10px;
    padding: 22px 12px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s;
  }
  .file-zone:active { border-color: var(--orange); }
  .file-zone .ico { font-size: 30px; margin-bottom: 4px; }
  .file-zone .lbl { font-size: 12px; font-weight: 700; color: var(--navy); }
  .file-zone .hint { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .preview-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .preview-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--bg); border-radius: 8px; font-size: 12px; }
  .preview-item .ico { font-size: 20px; }
  .preview-item .name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--navy); font-weight: 600; }
  .preview-item .rm { color: var(--red); background: transparent; border: 0; cursor: pointer; font-size: 16px; padding: 2px 8px; }
  .modal .actions { display: flex; gap: 8px; margin-top: 14px; }
  .modal .btn { flex: 1; padding: 12px; border-radius: 999px; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid transparent; font-family: inherit; }
  .modal .btn.primary { background: var(--orange); color: #fff; border-color: var(--orange); }
  .modal .btn.primary:disabled { opacity: .5; }
  .modal .btn.ghost { background: var(--bg); color: var(--navy); border-color: var(--line); }

  .toast { position: fixed; bottom: calc(var(--safe-bottom) + 20px); left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 16px rgba(13,45,94,.3); z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.on { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <a href="#" class="back-btn" id="backBtn">←</a>
  <div class="title">
    <h1 id="topJob">Documents</h1>
    <div class="sub" id="topSub">Loading…</div>
  </div>
  <button class="upload-btn" id="uploadBtn">+ Upload</button>
</div>

<main id="main">
  <div class="empty"><p>Loading…</p></div>
</main>

<div class="modal-back" id="uploadModal">
  <div class="modal">
    <h3>Upload File <button class="close-x" id="closeUpload">×</button></h3>
    <label>Category</label>
    <select id="upload_category"></select>

    <label>Choose source</label>
    <div class="file-zones">
      <label class="file-zone" for="camera_input">
        <div class="ico">📷</div>
        <div class="lbl">Camera</div>
        <div class="hint">Take photo</div>
        <input type="file" id="camera_input" accept="image/*" capture="environment" style="display:none;" multiple>
      </label>
      <label class="file-zone" for="library_input">
        <div class="ico">🖼</div>
        <div class="lbl">Library</div>
        <div class="hint">Photos or PDFs</div>
        <input type="file" id="library_input" accept="image/*,application/pdf" style="display:none;" multiple>
      </label>
    </div>

    <div class="preview-list" id="preview_list"></div>

    <div class="actions">
      <button class="btn ghost" id="cancelUpload">Cancel</button>
      <button class="btn primary" id="submitUpload" disabled>Upload</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const ALBI_DOC_HOOK = 'https://hooks.zapier.com/hooks/catch/12653197/uves4j9/';
const sb = createClient(SB_URL, SB_ANON);

const CATEGORIES = [
  'Photos','Inspection Reports','Estimates','Invoices','Insurance Documents',
  'Customer Documents','Subcontractor Documents','Receipts','Permits','Other',
];

const params = new URLSearchParams(window.location.search);
const projectId = params.get('p');
document.getElementById('backBtn').href = `project_detail.html?p=${projectId}`;

const state = { project: null, docs: [], filter: 'All', pendingFiles: [] };

const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';
const fmtBytes = b => b ? (b > 1024*1024 ? (b/1024/1024).toFixed(1) + ' MB' : Math.round(b/1024) + ' KB') : '';

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2200);
}

async function init() {
  if (!projectId) return showEmpty('Missing project', 'Open from project list');
  const [{ data: project }, { data: docs }] = await Promise.all([
    sb.from('rebuild_projects').select('*').eq('id', projectId).maybeSingle(),
    sb.from('rebuild_documents').select('*').eq('project_id', projectId).order('uploaded_at', { ascending: false }),
  ]);
  if (!project) return showEmpty('Project not found', 'It may have been deleted.');
  state.project = project;
  state.docs = docs || [];

  document.getElementById('topJob').textContent = `Documents · ${project.albi_job_number || ''}`;
  document.getElementById('topSub').textContent = project.customer_name || '';

  render();
  wireUpload();

  sb.channel('docs_' + projectId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rebuild_documents', filter: `project_id=eq.${projectId}` },
        async () => {
          const { data } = await sb.from('rebuild_documents').select('*').eq('project_id', projectId).order('uploaded_at', { ascending: false });
          state.docs = data || [];
          render();
        })
    .subscribe();
}

function render() {
  // Build category counts
  const catCounts = { All: state.docs.length };
  state.docs.forEach(d => {
    catCounts[d.category] = (catCounts[d.category] || 0) + 1;
  });
  const cats = ['All', ...CATEGORIES.filter(c => catCounts[c])];

  const filtered = state.filter === 'All' ? state.docs : state.docs.filter(d => d.category === state.filter);

  document.getElementById('main').innerHTML = `
    <div class="cat-row">
      ${cats.map(c => `<div class="cat-chip ${state.filter === c ? 'on' : ''}" data-cat="${esc(c)}">${esc(c)} (${catCounts[c] || 0})</div>`).join('')}
    </div>

    ${filtered.length === 0 ? `
      <div class="empty">
        <div class="ico">📂</div>
        <h3>No documents${state.filter === 'All' ? '' : ' in ' + state.filter}</h3>
        <p>Tap "+ Upload" to add files.</p>
      </div>
    ` : filtered.map(docCard).join('')}
  `;

  document.querySelectorAll('.cat-chip').forEach(chip => {
    chip.addEventListener('click', () => { state.filter = chip.dataset.cat; render(); });
  });
}

function docCard(d) {
  const isPdf = /pdf/i.test(d.mime_type || '') || /\.pdf$/i.test(d.filename || '');
  const isImg = /image/i.test(d.mime_type || '') || /\.(jpe?g|png|gif|webp)$/i.test(d.filename || '');
  const iconClass = isPdf ? 'pdf' : (isImg ? 'img' : 'doc');
  const icon = isPdf ? '📄' : (isImg ? '🖼' : '📋');
  return `
    <a href="${esc(d.file_url || '#')}" target="_blank" class="doc-card">
      <div class="doc-icon ${iconClass}">${icon}</div>
      <div class="doc-info">
        <div class="doc-name">${esc(d.filename || 'Untitled')}</div>
        <div class="doc-meta"><span class="doc-cat-pill">${esc(d.category || '')}</span>${fmtDate(d.uploaded_at)}${d.file_size_bytes ? ' · ' + fmtBytes(d.file_size_bytes) : ''}</div>
      </div>
    </a>
  `;
}

function wireUpload() {
  const modal = document.getElementById('uploadModal');
  const openBtn = document.getElementById('uploadBtn');
  const closeBtn = document.getElementById('closeUpload');
  const cancelBtn = document.getElementById('cancelUpload');
  const catSelect = document.getElementById('upload_category');
  const camInput = document.getElementById('camera_input');
  const libInput = document.getElementById('library_input');
  const previewList = document.getElementById('preview_list');
  const submitBtn = document.getElementById('submitUpload');

  catSelect.innerHTML = CATEGORIES.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  catSelect.value = 'Photos';

  const refresh = () => {
    submitBtn.disabled = state.pendingFiles.length === 0;
    previewList.innerHTML = state.pendingFiles.map((f, i) => {
      const isPdf = /pdf/i.test(f.type) || /\.pdf$/i.test(f.name);
      return `
        <div class="preview-item">
          <div class="ico">${isPdf ? '📄' : '🖼'}</div>
          <div class="name">${esc(f.name)}</div>
          <div style="font-size:10px;color:var(--muted);">${fmtBytes(f.size)}</div>
          <button class="rm" data-rm="${i}">×</button>
        </div>
      `;
    }).join('');
    previewList.querySelectorAll('[data-rm]').forEach(b => {
      b.addEventListener('click', () => {
        state.pendingFiles.splice(Number(b.dataset.rm), 1);
        refresh();
      });
    });
  };

  const addFiles = (files) => {
    Array.from(files).forEach(f => {
      if (f.size > 20 * 1024 * 1024) { toast(`${f.name} too large (max 20MB)`); return; }
      state.pendingFiles.push(f);
    });
    refresh();
  };

  camInput.addEventListener('change', (e) => { addFiles(e.target.files); camInput.value = ''; });
  libInput.addEventListener('change', (e) => { addFiles(e.target.files); libInput.value = ''; });

  openBtn.addEventListener('click', () => {
    state.pendingFiles = [];
    refresh();
    modal.classList.add('on');
  });
  closeBtn.addEventListener('click', () => modal.classList.remove('on'));
  cancelBtn.addEventListener('click', () => modal.classList.remove('on'));
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('on'); });

  submitBtn.addEventListener('click', async () => {
    if (!state.pendingFiles.length) return;
    submitBtn.disabled = true;
    const orig = submitBtn.textContent;
    const category = catSelect.value;
    const p = state.project;
    let okCount = 0;
    for (const [i, file] of state.pendingFiles.entries()) {
      submitBtn.textContent = `Uploading ${i + 1}/${state.pendingFiles.length}…`;
      try {
        const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
        const path = `projects/${projectId}/${Date.now()}-${safeName}`;
        const { error: upErr } = await sb.storage.from('rebuild-documents').upload(path, file, {
          contentType: file.type || 'application/octet-stream',
          upsert: false,
        });
        if (upErr) { console.error(upErr); continue; }
        const { data: urlData } = sb.storage.from('rebuild-documents').getPublicUrl(path);
        const { data: docRow } = await sb.from('rebuild_documents').insert({
          project_id: projectId,
          category,
          filename: safeName,
          file_url: urlData.publicUrl,
          file_size_bytes: file.size,
          mime_type: file.type || 'application/octet-stream',
          uploaded_by_email: 'mobile-pwa@jg-restoration.com',
          push_status: 'pending',
        }).select();
        // Push to Albi
        if (docRow?.[0] && p.albi_project_id) {
          try {
            await fetch(ALBI_DOC_HOOK, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                document_id: docRow[0].id,
                project_id: projectId,
                albi_project_id: p.albi_project_id,
                albi_job_number: p.albi_job_number,
                category, filename: safeName,
                file_url: urlData.publicUrl,
                mime_type: file.type,
                notes: `Uploaded from mobile PWA`,
              }),
              mode: 'no-cors',
            });
            await sb.from('rebuild_documents').update({ push_status: 'sent', pushed_to_albi_at: new Date().toISOString() }).eq('id', docRow[0].id);
          } catch (e) { console.warn('Albi push failed:', e); }
        }
        okCount++;
      } catch (e) { console.error(e); }
    }
    submitBtn.textContent = orig;
    submitBtn.disabled = false;
    toast(`Uploaded ${okCount}/${state.pendingFiles.length}`);
    state.pendingFiles = [];
    modal.classList.remove('on');
  });
}

function showEmpty(t, m) {
  document.getElementById('main').innerHTML = `<div class="empty"><h3>${esc(t)}</h3><p>${esc(m)}</p></div>`;
}

init();
</script>
</body>
</html>
