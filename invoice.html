<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Invoice · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<style>
  :root {
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623; --green: #2d9c5f; --red: #d64545;
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --muted: #7884a0; --line: #e3e7f0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--navy); color: #fff; padding: 18px 28px; display: flex; align-items: center; gap: 14px; }
  header img { width: 48px; height: 48px; object-fit: contain; background: #fff; padding: 4px; border-radius: 6px; }
  header .brand-name { font-weight: 800; font-size: 19px; }
  header .brand-tag { font-size: 11px; opacity: .85; letter-spacing: .8px; text-transform: uppercase; }

  main { max-width: 700px; margin: 0 auto; padding: 24px; }

  .hero {
    background: linear-gradient(135deg, #0d2d5e 0%, #1a4080 50%, #0d2d5e 100%);
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 18px;
    color: #fff;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(13,45,94,.18);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(232,93,4,.22) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-tag {
    display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--orange);
    background: rgba(232,93,4,.18); border: 1px solid rgba(232,93,4,.4);
    padding: 3px 11px; border-radius: 999px; margin-bottom: 10px; position: relative; z-index: 1;
  }
  .hero h1 { margin: 0 0 4px; color: #fff; font-size: 26px; font-weight: 800; letter-spacing: -.3px; position: relative; z-index: 1; }
  .hero-sub { color: rgba(255,255,255,.8); font-size: 13px; position: relative; z-index: 1; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 22px 26px; margin-bottom: 16px; }
  .card h2 { margin: 0 0 12px; color: var(--navy); font-size: 16px; font-weight: 700; }

  .po-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .po-cell { padding: 12px 14px; background: var(--bg); border-radius: 8px; border: 1px solid var(--line); }
  .po-cell.amount { background: linear-gradient(135deg, #fff8f0 0%, var(--card) 100%); border-color: rgba(232,93,4,.3); grid-column: 1 / -1; }
  .po-cell.amount .info-value { color: var(--orange); font-size: 22px; font-weight: 800; }
  .info-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; font-weight: 700; margin-bottom: 3px; }
  .info-value { font-size: 14px; color: var(--navy); font-weight: 600; }

  .upload-zone {
    border: 2px dashed var(--line);
    border-radius: 10px;
    padding: 30px 20px;
    text-align: center;
    background: var(--bg);
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .upload-zone:hover, .upload-zone.dragging {
    border-color: var(--orange);
    background: #fff8f0;
  }
  .upload-zone .icon { font-size: 38px; opacity: .5; margin-bottom: 8px; }
  .upload-zone .label { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .upload-zone .hint { font-size: 12px; color: var(--muted); }

  .file-preview {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-top: 12px;
  }
  .file-preview .file-icon { font-size: 28px; flex-shrink: 0; }
  .file-preview .file-info { flex: 1; min-width: 0; }
  .file-preview .file-name { font-weight: 700; color: var(--navy); font-size: 13px; word-break: break-word; }
  .file-preview .file-size { font-size: 11px; color: var(--muted); }
  .file-preview button { background: transparent; border: 0; color: var(--red); font-size: 18px; cursor: pointer; padding: 4px 10px; }

  .form-row { margin-top: 14px; }
  .form-row label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
  .form-row input, .form-row textarea {
    width: 100%; border: 1px solid var(--line); border-radius: 7px;
    padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--navy); background: #fff;
  }
  .form-row input:focus, .form-row textarea:focus { outline: none; border-color: var(--orange); }

  .actions { display: flex; gap: 10px; margin-top: 16px; }
  .btn { padding: 13px 20px; border-radius: 999px; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid transparent; transition: background .15s, transform .15s; font-family: inherit; }
  .btn.primary { background: var(--orange); color: #fff; border-color: var(--orange); flex: 1; }
  .btn.primary:hover:not(:disabled) { background: #d05303; transform: translateY(-1px); }
  .btn.primary:disabled { opacity: .45; cursor: not-allowed; }

  .footer-note { text-align: center; color: var(--muted); font-size: 11px; padding: 24px 0 40px; line-height: 1.6; }
  .footer-note a { color: var(--navy); text-decoration: none; font-weight: 600; }

  .success-state { text-align: center; padding: 40px 20px; }
  .success-state .check { font-size: 64px; color: var(--green); margin-bottom: 12px; }
  .success-state h2 { color: var(--navy); margin: 0 0 8px; font-size: 22px; }

  .error-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .error-state h2 { color: var(--navy); margin: 0 0 8px; }

  @media (max-width: 600px) {
    main { padding: 14px; }
    .hero { padding: 20px; }
    .hero h1 { font-size: 22px; }
    .po-summary { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <img src="https://jgimprovements-arch.github.io/jg-dispatch/logo.png" alt="JG Restoration">
  <div>
    <div class="brand-name">JG Restoration</div>
    <div class="brand-tag">Subcontractor Invoice Upload</div>
  </div>
</header>

<main id="main">
  <div class="error-state">Loading…</div>
</main>

<div class="footer-note">
  Questions? Call <a href="tel:9204284200">Appleton: (920) 428-4200</a> or <a href="tel:7156003883">Stevens Point: (715) 600-3883</a><br>
  Or email <a href="mailto:info@jg-restoration.com">info@jg-restoration.com</a>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const ALBI_NOTE_HOOK = 'https://hooks.zapier.com/hooks/catch/12653197/uvugxag/';
const ALBI_DOC_HOOK = 'https://hooks.zapier.com/hooks/catch/12653197/uves4j9/';
const sb = createClient(SB_URL, SB_ANON);

const params = new URLSearchParams(window.location.search);
const token = params.get('t');
const main = document.getElementById('main');

const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const fmtMoney = n => n == null ? '—' : '$' + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtBytes = b => b ? (b > 1024*1024 ? (b/1024/1024).toFixed(1) + ' MB' : Math.round(b/1024) + ' KB') : '';

if (!token) main.innerHTML = `<div class="error-state"><h2>Invalid link</h2><p>This upload link is missing or malformed.</p></div>`;
else await render();

async function render() {
  const { data: wo, error } = await sb.from('rebuild_work_orders')
    .select('*, project:rebuild_projects(albi_job_number, customer_name, property_address, albi_project_id, albi_pm_email, albi_pm_name, albi_pm_phone), sub:rebuild_subs(company_name, primary_contact, email, phone)')
    .eq('po_invoice_token', token).maybeSingle();

  if (error || !wo) {
    main.innerHTML = `<div class="error-state"><h2>Link not found</h2><p>This invoice upload link is invalid or has expired.</p></div>`;
    return;
  }

  if (wo.status !== 'converted_to_po' && wo.status !== 'invoice_received') {
    main.innerHTML = `<div class="error-state"><h2>Not Ready for Invoice</h2><p>This Work Order has not yet been converted to a Purchase Order. Please wait for JG Restoration to issue the PO before uploading.</p></div>`;
    return;
  }

  if (wo.invoice_doc_id && wo.status === 'invoice_received') {
    main.innerHTML = renderAlreadyReceived(wo);
    return;
  }

  main.innerHTML = renderUploader(wo);
  wireUploader(wo);
}

function renderUploader(wo) {
  const p = wo.project || {};
  const s = wo.sub || {};
  return `
    <div class="hero">
      <div class="hero-tag">Upload Invoice</div>
      <h1>PO ${esc(wo.po_number || '')}</h1>
      <div class="hero-sub">${esc(p.albi_job_number || '')} · ${esc(p.customer_name || '')}</div>
    </div>

    <div class="card">
      <h2>Purchase Order Summary</h2>
      <div class="po-summary">
        <div class="po-cell">
          <div class="info-label">Issued To</div>
          <div class="info-value">${esc(s.company_name || '')}</div>
        </div>
        <div class="po-cell">
          <div class="info-label">PO Number</div>
          <div class="info-value">${esc(wo.po_number || '')}</div>
        </div>
        <div class="po-cell">
          <div class="info-label">Project</div>
          <div class="info-value">${esc(p.albi_job_number || '')}</div>
        </div>
        <div class="po-cell">
          <div class="info-label">Address</div>
          <div class="info-value" style="font-size:12px;">${esc(p.property_address || '')}</div>
        </div>
        <div class="po-cell amount">
          <div class="info-label">Authorized Amount</div>
          <div class="info-value">${fmtMoney(wo.total_amount)}</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Upload Your Invoice</h2>
      <p style="font-size:13px;color:var(--muted);margin:0 0 14px;">PDF, JPG, or PNG. Once uploaded, our accounts payable team will be notified and processing typically begins within 1 business day.</p>

      <div class="upload-zone" id="dropZone">
        <div class="icon">📎</div>
        <div class="label">Click to choose file or drag here</div>
        <div class="hint">PDF · JPG · PNG · up to 20 MB</div>
        <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,application/pdf,image/*" style="display:none;">
      </div>

      <div id="filePreviewWrap"></div>

      <div class="form-row">
        <label>Your Invoice Number (optional)</label>
        <input type="text" id="inv_number" placeholder="e.g. INV-2026-0042">
      </div>
      <div class="form-row">
        <label>Invoice Amount</label>
        <input type="number" step="0.01" id="inv_amount" placeholder="${wo.total_amount || '0.00'}" value="${wo.total_amount || ''}">
      </div>
      <div class="form-row">
        <label>Your Name</label>
        <input type="text" id="inv_uploader" placeholder="Who's uploading this?" value="${esc(s.primary_contact || '')}">
      </div>
      <div class="form-row">
        <label>Notes (optional)</label>
        <textarea id="inv_notes" rows="2" placeholder="Anything we should know?"></textarea>
      </div>

      <div class="actions">
        <button class="btn primary" id="submitBtn" disabled>Submit Invoice</button>
      </div>
    </div>
  `;
}

function renderAlreadyReceived(wo) {
  const s = wo.sub || {};
  return `
    <div class="card success-state">
      <div class="check">✓</div>
      <h2>Invoice Received</h2>
      <p style="color:var(--muted);">We have your invoice for PO <b>${esc(wo.po_number || '')}</b> on file. Our AP team has been notified.</p>
      <div style="margin-top:14px;font-size:12px;color:var(--muted);">
        Submitted ${new Date(wo.invoice_received_at).toLocaleString()}<br>
        ${wo.invoice_filename ? '<b>File:</b> ' + esc(wo.invoice_filename) : ''}<br>
        ${wo.invoice_amount ? '<b>Amount:</b> ' + fmtMoney(wo.invoice_amount) : ''}
      </div>
      <p style="margin-top:14px;font-size:12px;color:var(--muted);">If you need to send a corrected invoice, please contact your PM directly.</p>
    </div>
  `;
}

function wireUploader(wo) {
  const dz = document.getElementById('dropZone');
  const fi = document.getElementById('fileInput');
  const preview = document.getElementById('filePreviewWrap');
  const submitBtn = document.getElementById('submitBtn');
  let selectedFile = null;

  const refreshSubmit = () => {
    const uploader = document.getElementById('inv_uploader').value.trim();
    submitBtn.disabled = !(selectedFile && uploader);
  };

  dz.addEventListener('click', () => fi.click());
  fi.addEventListener('change', (e) => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });
  dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('dragging'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragging'));
  dz.addEventListener('drop', (e) => {
    e.preventDefault();
    dz.classList.remove('dragging');
    if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });

  function handleFile(file) {
    if (file.size > 20 * 1024 * 1024) { alert('File too large (max 20 MB)'); return; }
    selectedFile = file;
    const isPdf = /pdf/i.test(file.type) || /\.pdf$/i.test(file.name);
    preview.innerHTML = `
      <div class="file-preview">
        <div class="file-icon">${isPdf ? '📄' : '🖼'}</div>
        <div class="file-info">
          <div class="file-name">${esc(file.name)}</div>
          <div class="file-size">${fmtBytes(file.size)}</div>
        </div>
        <button id="removeFileBtn" title="Remove">×</button>
      </div>
    `;
    document.getElementById('removeFileBtn').onclick = () => {
      selectedFile = null;
      preview.innerHTML = '';
      fi.value = '';
      refreshSubmit();
    };
    refreshSubmit();
  }

  document.getElementById('inv_uploader').addEventListener('input', refreshSubmit);

  submitBtn.addEventListener('click', async () => {
    submitBtn.disabled = true;
    const orig = submitBtn.textContent;
    submitBtn.textContent = 'Uploading…';
    try {
      const uploader = document.getElementById('inv_uploader').value.trim();
      const invNumber = document.getElementById('inv_number').value.trim();
      const invAmount = document.getElementById('inv_amount').value ? Number(document.getElementById('inv_amount').value) : null;
      const notes = document.getElementById('inv_notes').value.trim();

      const safeName = selectedFile.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      const filename = `Invoice_${wo.po_number || wo.id.slice(0,8)}_${safeName}`;
      const path = `projects/${wo.project_id}/${Date.now()}-${filename}`;

      // Upload to Storage
      const { error: upErr } = await sb.storage.from('rebuild-documents').upload(path, selectedFile, {
        contentType: selectedFile.type || 'application/octet-stream',
        upsert: false,
      });
      if (upErr) { alert('Upload failed: ' + upErr.message); submitBtn.disabled = false; submitBtn.textContent = orig; return; }

      const { data: urlData } = sb.storage.from('rebuild-documents').getPublicUrl(path);
      const fileUrl = urlData.publicUrl;

      // Insert into rebuild_documents
      const { data: docRow, error: insErr } = await sb.from('rebuild_documents').insert({
        project_id: wo.project_id,
        category: 'Subcontractor Documents',
        filename,
        file_url: fileUrl,
        file_size_bytes: selectedFile.size,
        mime_type: selectedFile.type || 'application/octet-stream',
        uploaded_by_email: 'invoice-upload@jg-restoration.com',
        push_status: 'pending',
      }).select();
      if (insErr) { console.error(insErr); alert('Could not save document: ' + insErr.message); submitBtn.disabled = false; submitBtn.textContent = orig; return; }
      const docId = docRow?.[0]?.id;

      // Update WO with invoice info
      await sb.from('rebuild_work_orders').update({
        status: 'invoice_received',
        invoice_received_at: new Date().toISOString(),
        invoice_doc_id: docId,
        invoice_filename: filename,
        invoice_amount: invAmount,
        invoice_uploaded_by_name: uploader,
      }).eq('id', wo.id);

      // History
      await sb.from('rebuild_work_order_history').insert({
        work_order_id: wo.id,
        action: 'invoice_received',
        actor: uploader,
        details: `Invoice uploaded by ${uploader}${invNumber ? ' · #' + invNumber : ''}${invAmount ? ' · ' + fmtMoney(invAmount) : ''}${notes ? '\nNotes: ' + notes : ''}`,
      });

      // Notify PM
      const p = wo.project || {};
      if (p.albi_pm_email) {
        try {
          await sb.from('rebuild_notifications').insert({
            project_id: wo.project_id,
            recipient_email: p.albi_pm_email.toLowerCase(),
            event_type: 'invoice_received',
            title: `Invoice received from ${wo.sub?.company_name || 'sub'}`,
            body: `${uploader} uploaded an invoice for PO ${wo.po_number || ''}${invAmount ? ' · ' + fmtMoney(invAmount) : ''}. Lisa Greil's "Write Note" task has been created in Albi.`,
          });
        } catch (e) { console.warn('notif failed', e); }
      }

      // Push invoice to Albi as document (uses existing single-file Albi push)
      if (p.albi_project_id) {
        try {
          await fetch(ALBI_DOC_HOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              document_id: docId,
              project_id: wo.project_id,
              albi_project_id: p.albi_project_id,
              albi_job_number: p.albi_job_number,
              category: 'Subcontractor Documents',
              filename,
              file_url: fileUrl,
              mime_type: selectedFile.type,
              notes: `Sub invoice for PO ${wo.po_number} from ${wo.sub?.company_name || ''}${invAmount ? ' · ' + fmtMoney(invAmount) : ''}`,
            }),
            mode: 'no-cors',
          });
          await sb.from('rebuild_documents').update({ push_status: 'sent', pushed_to_albi_at: new Date().toISOString() }).eq('id', docId);
        } catch (e) { console.error('Albi doc push failed:', e); }
      }

      // Create "Write Note" task in Albi for Lisa Greil via Albi note hook
      // (uses existing note webhook — note appears in Albi tagged for Lisa)
      if (p.albi_project_id) {
        try {
          await fetch(ALBI_NOTE_HOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              project_id: wo.project_id,
              albi_project_id: p.albi_project_id,
              albi_job_number: p.albi_job_number,
              event_type: 'sub_invoice_received',
              task_type: 'Write Note',
              task_assignee: 'Lisa Greil',
              note_text: `📥 SUB INVOICE RECEIVED — ACTION REQUIRED\n\nPO: ${wo.po_number}\nSub: ${wo.sub?.company_name || ''}\nInvoice #: ${invNumber || 'not provided'}\nAmount: ${invAmount ? fmtMoney(invAmount) : 'not provided'}\nAuthorized PO Amount: ${fmtMoney(wo.total_amount)}\nUploaded by: ${uploader}\n${notes ? '\nSub Notes: ' + notes : ''}\n\nInvoice file: ${fileUrl}\n\nNext step: verify invoice matches PO scope, then enter into payment workflow.`,
            }),
            mode: 'no-cors',
          });
          await sb.from('rebuild_work_orders').update({ albi_payment_task_created_at: new Date().toISOString() }).eq('id', wo.id);
        } catch (e) { console.error('Albi note hook failed:', e); }
      }

      // Reload to "Received" view
      await render();
    } catch (e) {
      console.error(e);
      alert('Unexpected error: ' + e.message);
      submitBtn.disabled = false;
      submitBtn.textContent = orig;
    }
  });
}
</script>
</body>
</html>
