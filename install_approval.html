<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Install Date Approval · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<style>
  :root {
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623; --green: #2d9c5f; --red: #d64545;
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --muted: #7884a0; --line: #e3e7f0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
  header { background: var(--navy); color: #fff; padding: 18px 28px; display: flex; align-items: center; gap: 14px; }
  header img { width: 44px; height: 44px; object-fit: contain; background: #fff; padding: 4px; border-radius: 6px; }
  header .brand-name { font-weight: 800; font-size: 18px; }
  header .brand-tag { font-size: 11px; opacity: .85; letter-spacing: .5px; text-transform: uppercase; }
  main { max-width: 640px; margin: 0 auto; padding: 24px; }
  .card { background: var(--card); border-radius: 10px; padding: 22px 26px; margin-bottom: 18px; border: 1px solid var(--line); }
  .card h2 { color: var(--navy); margin: 0 0 4px; }
  .card .sub { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
  .info-table { width: 100%; border-collapse: collapse; margin: 12px 0; }
  .info-table td { padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .info-table td:first-child { color: var(--muted); width: 40%; }
  .install-date { font-size: 24px; font-weight: 800; color: var(--navy); padding: 14px 0 6px; border-top: 2px solid var(--navy); margin-top: 8px; text-align: center; }
  .approve-btn { display: block; width: 100%; padding: 14px; background: var(--green); color: #fff; border: 0; border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
  .changes-btn { display: block; width: 100%; padding: 12px; background: #fff; border: 1px solid var(--line); border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 8px; color: var(--navy); }
  .changes-btn:hover { background: var(--gold); color: #fff; border-color: var(--gold); }
  textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 6px; font-family: inherit; font-size: 14px; min-height: 100px; resize: vertical; }
  .footer-note { text-align: center; color: var(--muted); font-size: 11px; padding: 24px 0 40px; }
  .footer-note a { color: var(--navy); text-decoration: none; font-weight: 600; }
  .success-state { text-align: center; padding: 40px 20px; }
  .success-state .check { font-size: 56px; color: var(--green); }
  .changes-state .check { color: var(--gold); }
  .error-state { text-align: center; padding: 60px 20px; color: var(--muted); }
</style>
</head>
<body>

<header>
  <img src="https://jgimprovements-arch.github.io/jg-dispatch/logo.png" alt="JG Restoration">
  <div>
    <div class="brand-name">JG Restoration</div>
    <div class="brand-tag">Install Date Approval</div>
  </div>
</header>

<main id="main">
  <div class="error-state">Loading…</div>
</main>

<div class="footer-note">
  Questions? Call <a href="tel:9204284200">Appleton: (920) 428-4200</a> or <a href="tel:7156003883">Stevens Point: (715) 600-3883</a>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const sb = createClient(SB_URL, SB_ANON);
const params = new URLSearchParams(window.location.search);
const token = params.get('t');
const main = document.getElementById('main');

const fmtDate = d => d ? new Date(d).toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'}) : '—';

if (!token) main.innerHTML = `<div class="error-state"><h2>Invalid link</h2></div>`;
else await render();

async function render() {
  const { data: sel, error } = await sb.from('rebuild_selections')
    .select('*, project:rebuild_projects(albi_job_number, customer_name), vendor_sub:rebuild_subs(company_name)')
    .eq('customer_token', token).maybeSingle();
  if (error || !sel) { main.innerHTML = `<div class="error-state"><h2>Selection not found</h2></div>`; return; }

  if (sel.status === 'install_scheduled') {
    main.innerHTML = `<div class="card success-state"><div class="check">✓</div><h2>Install Date Confirmed</h2><p>Thank you. Your install on ${fmtDate(sel.approved_install_date)} is locked in. Your installer has been notified.</p></div>`;
    return;
  }
  if (sel.status === 'rejected' || sel.status === 'changes_requested') {
    main.innerHTML = `<div class="card success-state changes-state"><div class="check">↻</div><h2>Date Change Requested</h2><p>Got it. Your project manager will reach out to find a different date.</p></div>`;
    return;
  }
  if (!sel.approved_install_date) {
    main.innerHTML = `<div class="error-state"><h2>Not ready yet</h2><p>This install date hasn't been set yet. Please check back later or contact JG Restoration.</p></div>`;
    return;
  }

  const vendor = sel.vendor_sub?.company_name || sel.vendor_name || '—';

  main.innerHTML = `
    <div class="card">
      <h2>${sel.category}</h2>
      <div class="sub">${sel.project?.customer_name || ''} · ${sel.project?.albi_job_number || ''}</div>
      <table class="info-table">
        <tr><td>Installer</td><td><b>${vendor}</b></td></tr>
        ${sel.sku ? `<tr><td>SKU / Product #</td><td>${sel.sku}</td></tr>` : ''}
        ${sel.quantity ? `<tr><td>Quantity</td><td>${sel.quantity}${sel.unit ? ' ' + sel.unit : ''}</td></tr>` : ''}
      </table>
      <div class="install-date">📅 ${fmtDate(sel.approved_install_date)}</div>
    </div>

    <div class="card">
      <h2 style="font-size:16px;">Does this date work for you?</h2>
      <button class="approve-btn" id="b_approve">✓ Yes, This Date Works</button>
      <button class="changes-btn" id="b_changes">↻ Request a Different Date</button>
    </div>
  `;

  document.getElementById('b_approve').onclick = () => decide('install_scheduled');
  document.getElementById('b_changes').onclick = () => decide('changes_requested');
}

async function decide(decision) {
  const { data: sel } = await sb.from('rebuild_selections').select('id, category, approved_install_date, install_phase_id').eq('customer_token', token).maybeSingle();
  if (!sel) return;

  let notes = null;
  if (decision === 'changes_requested') {
    notes = prompt('What date or timeframe would work better for you?');
    if (!notes) { alert('Please tell us your preferred timeframe.'); return; }
  }

  const updates = {
    status: decision,
    customer_install_approved_at: decision === 'install_scheduled' ? new Date().toISOString() : null,
    customer_notes: notes,
  };
  await sb.from('rebuild_selections').update(updates).eq('customer_token', token);

  // If approved, also lock in the phase
  if (decision === 'install_scheduled' && sel.install_phase_id) {
    await sb.from('rebuild_phases').update({ status: 'scheduled' }).eq('id', sel.install_phase_id);
  }

  await sb.from('rebuild_selections_history').insert({
    selection_id: sel.id,
    action: decision === 'install_scheduled' ? 'customer_install_approved' : 'customer_install_change_requested',
    actor: 'customer',
    details: decision === 'install_scheduled'
      ? `Customer confirmed install date: ${sel.approved_install_date}`
      : `Customer requested different date: ${notes}`,
  });

  if (decision === 'install_scheduled') {
    main.innerHTML = `<div class="card success-state"><div class="check">✓</div><h2>Confirmed!</h2><p>Your install date is locked in. JG Restoration has been notified and will coordinate with the installer.</p></div>`;
  } else {
    main.innerHTML = `<div class="card success-state changes-state"><div class="check">↻</div><h2>Got it</h2><p>Your project manager will reach out to find a date that works better.</p></div>`;
  }
}
</script>
</body>
</html>
