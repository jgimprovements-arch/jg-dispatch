name: Auto-update version.json

on:
  push:
    branches:
      - main

# Allow the workflow to commit back to the repo
permissions:
  contents: write

# Prevent multiple runs from racing each other
concurrency:
  group: auto-version
  cancel-in-progress: false

jobs:
  bump-version:
    runs-on: ubuntu-latest
    # Skip if THIS commit was made by the workflow itself (infinite-loop guard)
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.event.head_commit.author.email != 'action@github.com'"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version.json
        run: |
          cat > version.json <<EOF
          {
            "version": "${{ github.sha }}",
            "short_sha": "$(echo ${{ github.sha }} | cut -c1-7)",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit_message": $(echo '${{ github.event.head_commit.message }}' | jq -Rs .),
            "note": "Auto-generated by .github/workflows/auto-version.yml. Do not edit by hand."
          }
          EOF
          echo "Generated version.json:"
          cat version.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "action@github.com"
          git add version.json
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No version.json changes to commit."
            exit 0
          fi
          git commit -m "chore: auto-bump version.json [skip ci]"
          git push
