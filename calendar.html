<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Schedule Calendar · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png" type="image/png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="sidebar.js"></script>
<script src="https://jgimprovements-arch.github.io/jg-dispatch/jg-lightbox.js"></script>
<style>
  :root {
    --navy: #0d2d5e;
    --orange: #e85d04;
    --gold: #f5a623;
    --green: #2d9c5f;
    --red: #d64545;
    --bg: #f4f6fb;
    --card: #ffffff;
    --line: #e4e8ef;
    --text: #1a2540;
    --muted: #7884a0;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); }
  .app { display: flex; height: 100vh; overflow: hidden; }
  .filter-sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--card);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 12px;
  }
  .fs-section { margin-bottom: 16px; }
  .fs-section.collapsed .fs-list,
  .fs-section.collapsed .fs-search { display: none; }
  .fs-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .4px;
    cursor: pointer;
    user-select: none;
    padding: 2px 0;
  }
  .fs-head:hover { color: var(--navy); }
  .fs-head .fs-arrow {
    font-size: 10px;
    color: var(--muted);
    margin-right: 4px;
    transition: transform .15s;
    display: inline-block;
  }
  .fs-section.collapsed .fs-arrow { transform: rotate(-90deg); }
  .fs-head .fs-title { flex: 1; }
  .fs-toggle {
    background: none;
    border: 0;
    color: var(--orange);
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .3px;
  }
  .fs-toggle:hover { color: var(--navy); }
  .fs-search {
    width: 100%;
    padding: 5px 8px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 11px;
    margin-bottom: 6px;
    background: var(--bg);
  }
  .fs-search:focus { outline: none; border-color: var(--orange); }
  .fs-list {
    max-height: 180px;
    overflow-y: auto;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: var(--bg);
  }
  .fs-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
    border-bottom: 1px solid #eef0f7;
  }
  .fs-item:last-child { border-bottom: 0; }
  .fs-item:hover { background: #fff; }
  .fs-item input { margin: 0; }
  .fs-item .fs-color {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .fs-item-label {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fs-list-empty {
    padding: 10px;
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    text-align: center;
  }
  .main {
    flex: 1; overflow: hidden; display: flex; flex-direction: column;
  }
  .toolbar {
    background: var(--card); border-bottom: 1px solid var(--line);
    padding: 12px 18px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    flex-shrink: 0;
  }
  .toolbar h1 {
    margin: 0; font-size: 18px; color: var(--navy); font-weight: 800;
  }
  .toolbar .spacer { flex: 1; }
  .toolbar .btn {
    background: var(--card); border: 1px solid var(--line); color: var(--text);
    padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .toolbar .btn:hover { border-color: var(--navy); color: var(--navy); }
  .toolbar .btn.on { background: var(--navy); color: #fff; border-color: var(--navy); }
  .toolbar .btn.primary { background: var(--orange); color: #fff; border-color: var(--orange); }
  .toolbar .btn.primary:hover { background: #d05303; border-color: #d05303; }
  .toolbar .view-toggle, .toolbar .nav-group {
    display: flex; gap: 0;
  }
  .toolbar .view-toggle .btn, .toolbar .nav-group .btn {
    border-radius: 0; border-right: 0;
  }
  .toolbar .view-toggle .btn:first-child { border-top-left-radius: 6px; border-bottom-left-radius: 6px; }
  .toolbar .view-toggle .btn:last-child { border-top-right-radius: 6px; border-bottom-right-radius: 6px; border-right: 1px solid var(--line); }
  .toolbar .nav-group .btn:first-child { border-top-left-radius: 6px; border-bottom-left-radius: 6px; }
  .toolbar .nav-group .btn:last-child { border-top-right-radius: 6px; border-bottom-right-radius: 6px; border-right: 1px solid var(--line); }
  .toolbar input[type="text"] {
    padding: 7px 12px; border: 1px solid var(--line); border-radius: 6px;
    font-size: 12px; min-width: 220px; background: var(--card);
  }
  .toolbar input[type="text"]:focus { outline: none; border-color: var(--orange); }

  .filter-row {
    background: var(--card); border-bottom: 1px solid var(--line);
    padding: 8px 18px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    flex-shrink: 0;
  }
  .filter-pill {
    background: var(--bg); border: 1px solid var(--line); color: var(--muted);
    padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
    cursor: pointer; text-transform: uppercase; letter-spacing: .3px;
    user-select: none;
  }
  .filter-pill.on {
    background: var(--navy); color: #fff; border-color: var(--navy);
  }
  .filter-pill .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 5px; vertical-align: middle;
  }

  .cal-area {
    flex: 1; overflow: auto; padding: 16px 18px;
  }

  /* Month grid */
  .cal-month {
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    overflow: hidden;
  }
  .cal-month-head {
    display: grid; grid-template-columns: repeat(7, 1fr);
    background: var(--bg); border-bottom: 1px solid var(--line);
  }
  .cal-month-head > div {
    padding: 8px 10px; font-size: 11px; font-weight: 700;
    color: var(--muted); text-transform: uppercase; letter-spacing: .4px;
    border-right: 1px solid var(--line);
  }
  .cal-month-head > div:last-child { border-right: 0; }
  .cal-month-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: minmax(120px, 1fr);
  }
  .cal-day {
    border-right: 1px solid var(--line); border-bottom: 1px solid var(--line);
    padding: 6px; min-height: 120px; position: relative;
    overflow: hidden;
    background: var(--card);
  }
  .cal-day:nth-child(7n) { border-right: 0; }
  .cal-day.other-month { background: #fafbfd; }
  .cal-day.today { background: #fff8ed; }
  .cal-day-num {
    font-size: 12px; font-weight: 700; color: var(--text);
    margin-bottom: 4px; display: inline-block;
  }
  .cal-day.other-month .cal-day-num { color: var(--muted); font-weight: 500; }
  .cal-day.today .cal-day-num {
    background: var(--orange); color: #fff;
    width: 22px; height: 22px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px;
  }

  .cal-event {
    display: block; padding: 2px 6px; margin-bottom: 2px;
    background: var(--c, var(--navy)); color: #fff;
    border-radius: 3px; font-size: 11px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: pointer; transition: opacity .15s;
  }
  .cal-event:hover { opacity: .85; }
  .cal-event.dimmed { opacity: .25; }
  .cal-event.past { opacity: .75; }
  .cal-event.past.dimmed { opacity: .2; }
  .cal-event.past.highlighted { opacity: .95; }
  .cal-event.spans { border-radius: 0; margin-left: -7px; margin-right: -7px; padding-left: 8px; padding-right: 8px; }
  .cal-event.spans-start { border-top-left-radius: 3px; border-bottom-left-radius: 3px; margin-left: 0; padding-left: 6px; }
  .cal-event.spans-end { border-top-right-radius: 3px; border-bottom-right-radius: 3px; margin-right: 0; padding-right: 6px; }
  .cal-event-overflow {
    font-size: 10px; color: var(--muted); margin-top: 2px;
    cursor: pointer; padding: 2px 6px;
  }
  .cal-event-overflow:hover { color: var(--orange); }

  /* Week / Day view */
  .cal-week {
    background: var(--card); border: 1px solid var(--line); border-radius: 8px;
    padding: 12px;
  }
  .cal-week-day {
    border-bottom: 1px solid var(--line);
    padding: 12px 0;
  }
  .cal-week-day:last-child { border-bottom: 0; }
  .cal-week-day-head {
    font-size: 13px; font-weight: 700; color: var(--navy);
    margin-bottom: 8px;
    display: flex; align-items: baseline; gap: 8px;
  }
  .cal-week-day-head .day-of-week {
    font-size: 11px; text-transform: uppercase; letter-spacing: .4px;
    color: var(--muted); font-weight: 600;
  }
  .cal-week-day.today .cal-week-day-head { color: var(--orange); }
  .cal-week-event-list { display: flex; flex-direction: column; gap: 6px; }
  .cal-week-event {
    display: flex; gap: 10px; align-items: center;
    background: var(--bg); border: 1px solid var(--line); border-left: 4px solid var(--c, var(--navy));
    padding: 8px 12px; border-radius: 5px;
    cursor: pointer;
    transition: all .15s;
  }
  .cal-week-event:hover { transform: translateX(2px); border-color: var(--c, var(--navy)); }
  .cal-week-event.dimmed { opacity: .35; }
  .cal-week-event.past { opacity: .75; }
  .cal-week-event.past.highlighted { opacity: .95; }
  .cal-week-event-info {
    flex: 1; min-width: 0;
  }
  .cal-week-event-title {
    font-size: 13px; font-weight: 700; color: var(--navy);
  }
  .cal-week-event-meta {
    font-size: 11px; color: var(--muted); margin-top: 2px;
  }
  .cal-week-event-tag {
    font-size: 10px; color: #fff; background: var(--c, var(--navy));
    padding: 3px 8px; border-radius: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .3px; white-space: nowrap;
  }

  .empty-cal {
    text-align: center; color: var(--muted); padding: 60px 20px;
    font-size: 13px;
  }
  .empty-cal-icon { font-size: 42px; margin-bottom: 12px; }

  /* Highlighted project (when arriving from a specific project) */
  .cal-event.highlighted, .cal-week-event.highlighted {
    box-shadow: 0 0 0 2px var(--orange), 0 4px 12px rgba(232,93,4,.25);
    z-index: 5; position: relative;
  }
  .cal-event[draggable="true"] { cursor: grab; }
  .cal-event[draggable="true"]:active { cursor: grabbing; }
  .cal-day.drop-hover {
    background: rgba(232,93,4,.10) !important;
    box-shadow: inset 0 0 0 2px var(--orange);
  }
  .cal-day.drop-preview {
    background: rgba(45,156,95,.15) !important;
    box-shadow: inset 0 0 0 2px var(--green);
  }
  .cal-day.drop-conflict {
    background: rgba(214,69,69,.18) !important;
    box-shadow: inset 0 0 0 2px var(--red);
    position: relative;
  }
  .cal-day.drop-conflict::after {
    content: '⚠ Conflict';
    position: absolute;
    top: 4px; right: 6px;
    font-size: 10px;
    font-weight: 700;
    color: var(--red);
    background: #fff;
    padding: 2px 6px;
    border-radius: 8px;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
    pointer-events: none;
  }

  /* Reschedule confirm modals */
  .rs-modal-back {
    display: none;
    position: fixed; inset: 0;
    background: rgba(13,45,94,.5);
    z-index: 90000;
    align-items: center; justify-content: center;
  }
  .rs-modal-back.on { display: flex; }
  .rs-modal {
    background: var(--card);
    border-radius: 8px;
    padding: 22px 24px;
    width: 90%;
    max-width: 480px;
    box-shadow: 0 10px 40px rgba(13,45,94,.3);
  }
  .rs-modal h3 {
    margin: 0 0 14px;
    font-size: 16px; font-weight: 700; color: var(--navy);
  }
  .rs-modal-body { font-size: 13px; color: var(--text); line-height: 1.5; }
  .rs-modal-body p { margin: 0 0 10px; }
  .rs-modal-foot {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 18px;
  }
  .rs-modal-foot button {
    padding: 8px 14px;
    border-radius: 5px;
    font-size: 12px; font-weight: 700;
    cursor: pointer;
    border: 1px solid;
  }
  .rs-modal-foot .btn-cancel { background: var(--card); color: var(--muted); border-color: var(--line); }
  .rs-modal-foot .btn-cancel:hover { color: var(--navy); border-color: var(--navy); }
  .rs-modal-foot .btn-secondary { background: var(--card); color: var(--navy); border-color: var(--navy); }
  .rs-modal-foot .btn-secondary:hover { background: var(--navy); color: #fff; }
  .rs-modal-foot .btn-primary { background: var(--orange); color: #fff; border-color: var(--orange); }
  .rs-modal-foot .btn-primary:hover { background: #d05303; }
</style>
</head>
<body>

<div class="app">
  <!-- sidebar.js renders nav -->
  <aside class="filter-sidebar">
    <div class="fs-section" data-section="projects">
      <div class="fs-head">
        <span class="fs-arrow">▼</span>
        <span class="fs-title">Projects</span>
        <button class="fs-toggle" data-group="projects">All</button>
      </div>
      <input type="text" class="fs-search" data-search="projects" placeholder="Search jobs…">
      <div class="fs-list" id="fsProjects"></div>
    </div>
    <div class="fs-section" data-section="pms">
      <div class="fs-head">
        <span class="fs-arrow">▼</span>
        <span class="fs-title">PMs</span>
        <button class="fs-toggle" data-group="pms">All</button>
      </div>
      <div class="fs-list" id="fsPms"></div>
    </div>
    <div class="fs-section" data-section="phases">
      <div class="fs-head">
        <span class="fs-arrow">▼</span>
        <span class="fs-title">Phases</span>
        <button class="fs-toggle" data-group="phases">All</button>
      </div>
      <div class="fs-list" id="fsPhases"></div>
    </div>
    <div class="fs-section" data-section="carpenters">
      <div class="fs-head">
        <span class="fs-arrow">▼</span>
        <span class="fs-title">Carpenters</span>
        <button class="fs-toggle" data-group="carpenters">All</button>
      </div>
      <div class="fs-list" id="fsCarpenters"></div>
    </div>
    <div class="fs-section" data-section="subs">
      <div class="fs-head">
        <span class="fs-arrow">▼</span>
        <span class="fs-title">Subcontractors</span>
        <button class="fs-toggle" data-group="subs">All</button>
      </div>
      <input type="text" class="fs-search" data-search="subs" placeholder="Search subs…">
      <div class="fs-list" id="fsSubs"></div>
    </div>
  </aside>
  <div class="main">
    <div class="toolbar">
      <h1>📅 Schedule</h1>

      <div class="nav-group">
        <button class="btn" id="navPrev" title="Previous">◀</button>
        <button class="btn" id="navToday">Today</button>
        <button class="btn" id="navNext" title="Next">▶</button>
      </div>
      <div id="periodLabel" style="font-size:14px;font-weight:700;color:var(--navy);margin-left:6px;"></div>

      <div class="spacer"></div>

      <input type="text" id="searchInput" placeholder="Search project, customer, tech, phase…">

      <div class="view-toggle">
        <button class="btn on" data-view="month">Month</button>
        <button class="btn" data-view="week">Week</button>
        <button class="btn" data-view="day">Day</button>
      </div>
    </div>

    <div class="filter-row">
      <span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;">Show:</span>
      <button class="filter-pill on" data-filter="phases">Phase Schedules</button>
      <button class="filter-pill on" data-filter="installs">Material Installs</button>
      <button class="filter-pill on" data-filter="walkthroughs">Customer Walkthroughs</button>
      <span style="margin-left:auto;font-size:11px;color:var(--muted);" id="eventCount">0 events</span>
    </div>

    <div class="cal-area" id="calArea">
      <div class="empty-cal">
        <div class="empty-cal-icon">📅</div>
        <div>Loading schedule…</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
const SUPABASE_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const state = {
  view: 'month',          // month | week | day
  anchor: new Date(),     // current period reference
  search: '',
  filters: { phases: true, installs: true, walkthroughs: true },
  // Multi-select sidebar filters: null = all included; Set = only those selected
  multi: {
    projects: null,
    pms: null,
    phases: null,        // phase names (Drywall, Framing, etc.)
    carpenters: null,    // carpenter employee names
    subs: null,          // subcontractor company names
  },
  multiSearch: { projects: '', subs: '' },
  highlightProjectId: null, // from URL ?project=
  events: [],
  projects: [],
  projectColors: {},
};

// ─────── URL params ───────
const urlParams = new URLSearchParams(window.location.search);
state.highlightProjectId = urlParams.get('project');

// ─────── Color palette (per project) ───────
const PALETTE = [
  '#0d2d5e', '#e85d04', '#2d9c5f', '#9b59b6', '#16a085',
  '#d64545', '#f5a623', '#3498db', '#e67e22', '#34495e',
  '#1abc9c', '#c0392b', '#8e44ad', '#27ae60', '#2980b9',
  '#d35400', '#7f8c8d', '#e91e63', '#00897b', '#5d4037',
];

function colorForProject(projectId) {
  if (state.projectColors[projectId]) return state.projectColors[projectId];
  // Hash-based stable assignment from project ID
  let h = 0;
  for (let i = 0; i < projectId.length; i++) h = ((h << 5) - h + projectId.charCodeAt(i)) | 0;
  const c = PALETTE[Math.abs(h) % PALETTE.length];
  state.projectColors[projectId] = c;
  return c;
}

// ─────── Data load ───────
async function loadAll() {
  const [{ data: projects }, { data: phases }, { data: selections }, { data: allSubs }] = await Promise.all([
    sb.from('rebuild_projects').select('id, albi_job_number, customer_name, customer_email, albi_pm_name, market').order('albi_job_number'),
    sb.from('rebuild_phases').select(`
      id, project_id, sequence, phase_name, status, scheduled_start, scheduled_end,
      assignees:rebuild_phase_assignees(
        id, assignee_type,
        sub:rebuild_subs(company_name),
        employee:employees(name)
      )
    `).not('scheduled_start', 'is', null),
    sb.from('rebuild_selections').select('id, project_id, category, item_name, approved_install_date, vendor_sub_id').not('approved_install_date', 'is', null),
    sb.from('rebuild_subs').select('id, company_name'),
  ]);

  const subsById = Object.fromEntries((allSubs || []).map(s => [s.id, s]));

  state.projects = projects || [];
  const byId = Object.fromEntries(state.projects.map(p => [p.id, p]));

  const events = [];

  // Phases
  for (const ph of (phases || [])) {
    const proj = byId[ph.project_id];
    if (!proj) continue;
    const isWalkthrough = /walkthrough/i.test(ph.phase_name || '');
    const carpenterNames = (ph.assignees || [])
      .filter(a => a.assignee_type === 'employee' || a.employee?.name)
      .map(a => a.employee?.name)
      .filter(Boolean);
    const subNames = (ph.assignees || [])
      .filter(a => a.assignee_type === 'sub' || a.sub?.company_name)
      .map(a => a.sub?.company_name)
      .filter(Boolean);
    const assigneeNames = [...carpenterNames, ...subNames];
    events.push({
      id: 'ph_' + ph.id,
      kind: isWalkthrough ? 'walkthrough' : 'phase',
      projectId: ph.project_id,
      projectLabel: proj.albi_job_number || 'Project',
      customerName: proj.customer_name || '',
      pmName: proj.albi_pm_name || '',
      market: proj.market || '',
      title: ph.phase_name,
      start: new Date(ph.scheduled_start),
      end: ph.scheduled_end ? new Date(ph.scheduled_end) : new Date(ph.scheduled_start),
      assignees: assigneeNames,
      _carpenterNames: carpenterNames,
      _subNames: subNames,
      status: ph.status,
      color: colorForProject(ph.project_id),
      _phaseId: ph.id,
    });
  }

  // Material installs
  for (const sel of (selections || [])) {
    const proj = byId[sel.project_id];
    if (!proj) continue;
    const subName = sel.vendor_sub_id ? subsById[sel.vendor_sub_id]?.company_name : null;
    events.push({
      id: 'sel_' + sel.id,
      kind: 'install',
      projectId: sel.project_id,
      projectLabel: proj.albi_job_number || 'Project',
      customerName: proj.customer_name || '',
      pmName: proj.albi_pm_name || '',
      market: proj.market || '',
      title: `Install: ${sel.item_name || sel.category}`,
      start: new Date(sel.approved_install_date),
      end: new Date(sel.approved_install_date),
      assignees: subName ? [subName] : [],
      _carpenterNames: [],
      _subNames: subName ? [subName] : [],
      status: 'scheduled',
      color: colorForProject(sel.project_id),
      _selectionId: sel.id,
    });
  }

  state.events = events;
  buildSidebarOptions();
  renderSidebar();
  render();
}

// ─────── Sidebar option pools ───────
const sidebarOptions = {
  projects: [], pms: [], phases: [], carpenters: [], subs: [],
};

function buildSidebarOptions() {
  // Projects (id+label)
  const seenProj = new Set();
  sidebarOptions.projects = [];
  for (const p of state.projects) {
    if (seenProj.has(p.id)) continue;
    seenProj.add(p.id);
    sidebarOptions.projects.push({
      id: p.id,
      label: p.albi_job_number || 'Project',
      color: colorForProject(p.id),
      sub: p.customer_name || '',
    });
  }
  sidebarOptions.projects.sort((a,b) => a.label.localeCompare(b.label));

  // Distinct PMs from ALL projects (not just those with scheduled work)
  const pms = new Set();
  for (const p of state.projects) {
    if (p.albi_pm_name) pms.add(p.albi_pm_name);
  }
  // Distinct phases / carpenters / subs from events
  const phases = new Set();
  const carps = new Set();
  const subs = new Set();
  for (const e of state.events) {
    if (e.kind !== 'install' && e.title) phases.add(e.title);
    for (const n of (e._carpenterNames || [])) carps.add(n);
    for (const n of (e._subNames || [])) subs.add(n);
  }
  sidebarOptions.pms = [...pms].sort().map(name => ({ id: name, label: name }));
  sidebarOptions.phases = [...phases].sort().map(name => ({ id: name, label: name }));
  sidebarOptions.carpenters = [...carps].sort().map(name => ({ id: name, label: name }));
  sidebarOptions.subs = [...subs].sort().map(name => ({ id: name, label: name }));
}

function renderSidebar() {
  renderFilterList('fsProjects', sidebarOptions.projects, 'projects', state.multiSearch.projects);
  renderFilterList('fsPms', sidebarOptions.pms, 'pms', '');
  renderFilterList('fsPhases', sidebarOptions.phases, 'phases', '');
  renderFilterList('fsCarpenters', sidebarOptions.carpenters, 'carpenters', '');
  renderFilterList('fsSubs', sidebarOptions.subs, 'subs', state.multiSearch.subs);
}

function renderFilterList(elId, items, group, search) {
  const el = document.getElementById(elId);
  if (!el) return;
  const q = (search || '').toLowerCase().trim();
  const filtered = q ? items.filter(i => (i.label + ' ' + (i.sub||'')).toLowerCase().includes(q)) : items;
  if (!filtered.length) {
    el.innerHTML = '<div class="fs-list-empty">None</div>';
    return;
  }
  const sel = state.multi[group]; // null = all included
  el.innerHTML = filtered.map(i => {
    const isOn = sel ? sel.has(i.id) : true;
    const colorBit = i.color ? `<span class="fs-color" style="background:${i.color};"></span>` : '';
    return `
      <label class="fs-item">
        <input type="checkbox" data-group="${group}" data-id="${escAttr(i.id)}" ${isOn ? 'checked' : ''}>
        ${colorBit}
        <span class="fs-item-label" title="${escAttr(i.label)}${i.sub ? ' — ' + escAttr(i.sub) : ''}">${escHtml(i.label)}${i.sub ? ' <span style="color:var(--muted);font-size:10px;">· '+escHtml(i.sub)+'</span>' : ''}</span>
      </label>`;
  }).join('');

  el.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      const group = cb.dataset.group;
      const id = cb.dataset.id;
      // Initialize set with all items if currently null
      if (state.multi[group] === null) {
        state.multi[group] = new Set(sidebarOptions[group].map(o => o.id));
      }
      if (cb.checked) state.multi[group].add(id);
      else state.multi[group].delete(id);
      // If all items selected, clear filter (back to null)
      if (state.multi[group].size === sidebarOptions[group].length) state.multi[group] = null;
      render();
    });
  });
}

function escHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escAttr(s) { return escHtml(s); }

// ─────── Filtering ───────
function visibleEvents() {
  const m = state.multi;
  let evs = state.events.filter(e => {
    if (e.kind === 'phase' && !state.filters.phases) return false;
    if (e.kind === 'walkthrough' && !state.filters.walkthroughs) return false;
    if (e.kind === 'install' && !state.filters.installs) return false;

    // Multi-select sidebar filters (null means "include all")
    if (m.projects && !m.projects.has(e.projectId)) return false;
    if (m.pms && !m.pms.has(e.pmName || '—')) return false;
    if (m.phases && e.kind !== 'install' && !m.phases.has(e.title)) return false;

    // Carpenter / sub filter — match against assignees list (employees vs subs)
    if (m.carpenters || m.subs) {
      const carpHit = m.carpenters && e._carpenterNames?.some(n => m.carpenters.has(n));
      const subHit = m.subs && e._subNames?.some(n => m.subs.has(n));
      // If either filter is active, event must hit at least one
      const carpActive = !!m.carpenters;
      const subActive = !!m.subs;
      if (carpActive && subActive) {
        if (!carpHit && !subHit) return false;
      } else if (carpActive) {
        if (!carpHit) return false;
      } else if (subActive) {
        if (!subHit) return false;
      }
    }

    return true;
  });
  if (state.search.trim()) {
    const q = state.search.trim().toLowerCase();
    evs = evs.filter(e =>
      e.projectLabel.toLowerCase().includes(q)
      || e.customerName.toLowerCase().includes(q)
      || e.title.toLowerCase().includes(q)
      || e.assignees.some(a => a.toLowerCase().includes(q))
      || (e.pmName || '').toLowerCase().includes(q)
    );
  }
  return evs;
}

// ─────── Period range ───────
function startOfMonth(d) {
  return new Date(d.getFullYear(), d.getMonth(), 1);
}
function startOfWeek(d) {
  const dt = new Date(d);
  const day = dt.getDay(); // 0=Sun
  dt.setDate(dt.getDate() - day);
  dt.setHours(0, 0, 0, 0);
  return dt;
}
function fmtMonthYear(d) {
  return d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
}
function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

// ─────── Renderers ───────
function render() {
  const periodLabel = document.getElementById('periodLabel');
  const calArea = document.getElementById('calArea');
  const visEvs = visibleEvents();
  document.getElementById('eventCount').textContent =
    visEvs.length + ' event' + (visEvs.length === 1 ? '' : 's');

  if (state.view === 'month') {
    periodLabel.textContent = fmtMonthYear(state.anchor);
    calArea.innerHTML = renderMonth(visEvs);
  } else if (state.view === 'week') {
    const start = startOfWeek(state.anchor);
    const end = new Date(start); end.setDate(end.getDate() + 6);
    periodLabel.textContent = fmtRange(start, end);
    calArea.innerHTML = renderWeek(visEvs, start, end);
  } else if (state.view === 'day') {
    periodLabel.textContent = state.anchor.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    calArea.innerHTML = renderDay(visEvs, state.anchor);
  }

  wireEventClicks();
}

function fmtRange(s, e) {
  const sameMonth = s.getMonth() === e.getMonth();
  if (sameMonth) {
    return `${s.toLocaleString('en-US', { month: 'long' })} ${s.getDate()}–${e.getDate()}, ${s.getFullYear()}`;
  }
  return `${s.toLocaleString('en-US', { month: 'short', day: 'numeric' })} – ${e.toLocaleString('en-US', { month: 'short', day: 'numeric' })}, ${e.getFullYear()}`;
}

function renderMonth(events) {
  const first = startOfMonth(state.anchor);
  const gridStart = new Date(first);
  gridStart.setDate(gridStart.getDate() - first.getDay()); // back up to Sunday

  // Build 6 weeks (42 days) for consistent grid height
  const days = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  // Group events by day-key (YYYY-MM-DD)
  const eventsByDay = {};
  for (const e of events) {
    const cur = new Date(e.start);
    cur.setHours(0,0,0,0);
    const last = new Date(e.end);
    last.setHours(0,0,0,0);
    while (cur <= last) {
      const key = cur.toISOString().slice(0, 10);
      (eventsByDay[key] = eventsByDay[key] || []).push({
        ...e,
        isStart: sameDay(cur, e.start),
        isEnd: sameDay(cur, e.end),
      });
      cur.setDate(cur.getDate() + 1);
    }
  }

  const today = new Date(); today.setHours(0,0,0,0);
  const month = first.getMonth();

  const dayHeaders = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
    .map(d => `<div>${d}</div>`).join('');

  const cells = days.map(d => {
    const key = d.toISOString().slice(0, 10);
    const evs = eventsByDay[key] || [];
    const isToday = sameDay(d, today);
    const isOther = d.getMonth() !== month;
    const visible = evs.slice(0, 4);
    const overflow = evs.length - visible.length;

    const eventHtml = visible.map(e => {
      const isHighlighted = state.highlightProjectId && e.projectId === state.highlightProjectId;
      const isDimmed = state.highlightProjectId && e.projectId !== state.highlightProjectId;
      // Past events only — strictly before today's date. Today/future stay full color.
      const endDay = new Date(e.end); endDay.setHours(0,0,0,0);
      const isPast = endDay < today;
      const cls = [
        'cal-event',
        e.isStart && !e.isEnd ? 'spans spans-start' : '',
        !e.isStart && e.isEnd ? 'spans spans-end' : '',
        !e.isStart && !e.isEnd ? 'spans' : '',
        isHighlighted ? 'highlighted' : '',
        isDimmed ? 'dimmed' : '',
        isPast ? 'past' : '',
      ].filter(Boolean).join(' ');
      const label = e.kind === 'install' ? `📦 ${e.projectLabel}: ${e.title.replace(/^Install: /, '')}`
                  : e.kind === 'walkthrough' ? `🏠 ${e.projectLabel}: ${e.title}`
                  : `${e.projectLabel}: ${e.title}`;
      // ALL cells of a multi-day event are draggable — store the day this cell represents (key)
      // so we can compute the offset within the event when dragging
      const dragAttrs = `draggable="true" data-drag-event-id="${e.id}" data-drag-day-key="${key}"`;
      return `<a class="${cls}" style="--c:${e.color};" data-event-id="${e.id}" ${dragAttrs} title="${e.projectLabel} — ${e.customerName}\n${e.title}\n${e.assignees.join(', ')}\n\nDrag any day to reschedule">${label}</a>`;
    }).join('');

    const overflowHtml = overflow > 0
      ? `<div class="cal-event-overflow" data-day="${key}">+${overflow} more</div>`
      : '';

    return `
      <div class="cal-day ${isToday ? 'today' : ''} ${isOther ? 'other-month' : ''}" data-day-key="${key}">
        <div class="cal-day-num">${d.getDate()}</div>
        ${eventHtml}
        ${overflowHtml}
      </div>`;
  }).join('');

  return `
    <div class="cal-month">
      <div class="cal-month-head">${dayHeaders}</div>
      <div class="cal-month-grid">${cells}</div>
    </div>`;
}

function renderWeek(events, start, end) {
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    days.push(d);
  }
  return renderDayList(events, days);
}

function renderDay(events, d) {
  return renderDayList(events, [d]);
}

function renderDayList(events, days) {
  const today = new Date(); today.setHours(0,0,0,0);
  const eventsByDay = {};
  for (const e of events) {
    const cur = new Date(e.start); cur.setHours(0,0,0,0);
    const last = new Date(e.end); last.setHours(0,0,0,0);
    while (cur <= last) {
      const key = cur.toISOString().slice(0, 10);
      (eventsByDay[key] = eventsByDay[key] || []).push(e);
      cur.setDate(cur.getDate() + 1);
    }
  }

  const dayBlocks = days.map(d => {
    const key = d.toISOString().slice(0, 10);
    const evs = eventsByDay[key] || [];
    const isToday = sameDay(d, today);
    const dow = d.toLocaleString('en-US', { weekday: 'short' });
    const dateStr = d.toLocaleString('en-US', { month: 'long', day: 'numeric' });

    return `
      <div class="cal-week-day ${isToday ? 'today' : ''}">
        <div class="cal-week-day-head">
          <span class="day-of-week">${dow}</span>
          <span>${dateStr}</span>
          <span style="font-size:11px;color:var(--muted);font-weight:500;">${evs.length} event${evs.length===1?'':'s'}</span>
        </div>
        ${evs.length === 0 ? '<div style="font-size:12px;color:var(--muted);font-style:italic;">No scheduled work</div>' : ''}
        <div class="cal-week-event-list">
          ${evs.map(e => {
            const isHighlighted = state.highlightProjectId && e.projectId === state.highlightProjectId;
            const isDimmed = state.highlightProjectId && e.projectId !== state.highlightProjectId;
            const endDay = new Date(e.end); endDay.setHours(0,0,0,0);
            const isPast = endDay < today;
            const cls = ['cal-week-event', isHighlighted ? 'highlighted' : '', isDimmed ? 'dimmed' : '', isPast ? 'past' : ''].filter(Boolean).join(' ');
            const tagLabel = e.kind === 'install' ? '📦 Install' : e.kind === 'walkthrough' ? '🏠 Walkthrough' : 'Phase';
            return `
              <a class="${cls}" style="--c:${e.color};" data-event-id="${e.id}">
                <div class="cal-week-event-info">
                  <div class="cal-week-event-title">${e.projectLabel} — ${e.title}</div>
                  <div class="cal-week-event-meta">
                    ${e.customerName ? e.customerName + ' · ' : ''}${e.assignees.length ? e.assignees.join(', ') : '<span style="color:var(--red);">Unassigned</span>'}
                    ${e.pmName ? ' · PM ' + e.pmName : ''}
                  </div>
                </div>
                <span class="cal-week-event-tag">${tagLabel}</span>
              </a>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');

  return `<div class="cal-week">${dayBlocks}</div>`;
}

// ─────── Click handler ───────
function wireEventClicks() {
  document.querySelectorAll('[data-event-id]').forEach(el => {
    el.addEventListener('click', e => {
      // Suppress click after drag (HTML5 drag fires a click sometimes)
      if (el._justDragged) { el._justDragged = false; return; }
      e.preventDefault();
      const id = el.dataset.eventId;
      const ev = state.events.find(x => x.id === id);
      if (!ev) return;
      // Open the project in rebuild.html, on Phases tab
      const tab = ev.kind === 'install' ? 'selections' : 'phases';
      window.location.href = `rebuild.html#p=${ev.projectId}&t=${tab}`;
    });
  });
  // Overflow "+N more" — switch to day view for that day
  document.querySelectorAll('[data-day]').forEach(el => {
    el.addEventListener('click', () => {
      state.anchor = new Date(el.dataset.day);
      state.view = 'day';
      document.querySelectorAll('[data-view]').forEach(b =>
        b.classList.toggle('on', b.dataset.view === 'day')
      );
      render();
    });
  });

  // ─── Drag and drop reschedule ───
  let draggedId = null;
  let draggedDayOffset = 0;     // which day-of-event was grabbed (0 = start, 1 = day 2, etc.)
  let draggedDuration = 0;      // total length in days minus 1
  let draggedConflictNames = []; // assignee names for conflict checking

  document.querySelectorAll('[data-drag-event-id]').forEach(el => {
    el.addEventListener('dragstart', e => {
      draggedId = el.dataset.dragEventId;
      const ev = state.events.find(x => x.id === draggedId);
      if (!ev) return;
      const grabbedKey = el.dataset.dragDayKey;
      draggedDayOffset = dayDiff(grabbedKey, ymd(ev.start));
      draggedDuration = dayDiff(ymd(ev.end), ymd(ev.start));
      // For conflict detection — assignee names of this event
      draggedConflictNames = [...(ev._carpenterNames || []), ...(ev._subNames || [])];
      el.style.opacity = '0.5';
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', draggedId); } catch (_) {}
    });
    el.addEventListener('dragend', () => {
      el.style.opacity = '';
      el._justDragged = true;
      clearGhostPreview();
    });
  });

  document.querySelectorAll('[data-day-key]').forEach(cell => {
    cell.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      // Show ghost preview spanning all the days the event would occupy
      showGhostPreview(cell.dataset.dayKey);
    });
    cell.addEventListener('dragleave', e => {
      // Don't clear if we're moving to another day cell — only on actual exit
      const related = e.relatedTarget;
      if (!related || !related.closest || !related.closest('[data-day-key]')) {
        // we'll re-show on the next dragover so just clear current cell hover
      }
    });
    cell.addEventListener('drop', async e => {
      e.preventDefault();
      clearGhostPreview();
      const id = draggedId || e.dataTransfer.getData('text/plain');
      if (!id) return;
      const ev = state.events.find(x => x.id === id);
      if (!ev) return;
      // The day the user dropped represents day `draggedDayOffset` of the event.
      // So new start = drop day - offset.
      const dropKey = cell.dataset.dayKey;
      const newStartStr = addDays(dropKey, -draggedDayOffset);
      const oldStartStr = ymd(ev.start);
      if (newStartStr === oldStartStr) return;
      await openRescheduleFlow(ev, newStartStr);
      draggedId = null;
      draggedDayOffset = 0;
      draggedConflictNames = [];
    });
  });

  function showGhostPreview(dropDayKey) {
    clearGhostPreview();
    if (!draggedId) return;
    // Compute date range the event would occupy if dropped here
    const newStart = addDays(dropDayKey, -draggedDayOffset);
    const cells = [];
    for (let i = 0; i <= draggedDuration; i++) {
      cells.push(addDays(newStart, i));
    }

    // Look up other events overlapping these days that share an assignee
    for (const dKey of cells) {
      const cellEl = document.querySelector(`[data-day-key="${dKey}"]`);
      if (!cellEl) continue;
      // Conflict check: any OTHER event on this day that shares an assignee
      const conflicts = state.events.some(other => {
        if (other.id === draggedId) return false;
        const otherStart = ymd(other.start);
        const otherEnd = ymd(other.end);
        if (dKey < otherStart || dKey > otherEnd) return false;
        const otherNames = [...(other._carpenterNames || []), ...(other._subNames || [])];
        return draggedConflictNames.some(n => otherNames.includes(n));
      });
      cellEl.classList.add(conflicts ? 'drop-conflict' : 'drop-preview');
    }
  }
  function clearGhostPreview() {
    document.querySelectorAll('.drop-preview, .drop-conflict, .drop-hover').forEach(el => {
      el.classList.remove('drop-preview', 'drop-conflict', 'drop-hover');
    });
  }
}

function ymd(d) {
  // Local-time date string (no UTC drift)
  const dt = new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function dayDiff(aStr, bStr) {
  const a = new Date(aStr + 'T00:00:00');
  const b = new Date(bStr + 'T00:00:00');
  return Math.round((a - b) / 86400000);
}
function addDays(dStr, days) {
  const d = new Date(dStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return ymd(d);
}

// ─────── Reschedule flow ───────
async function openRescheduleFlow(ev, newStartStr) {
  const oldStart = ymd(ev.start);
  const oldEnd = ymd(ev.end);
  const duration = dayDiff(oldEnd, oldStart); // 0 for single-day
  const newEndStr = addDays(newStartStr, duration);
  const offsetDays = dayDiff(newStartStr, oldStart);

  // Step 1: cascade modal (only for phase events with subsequent phases)
  let cascade = false;
  if (ev.kind === 'phase' || ev.kind === 'walkthrough') {
    const hasSubsequent = state.events.some(x =>
      x._phaseId && x.projectId === ev.projectId && x._phaseId !== ev._phaseId
      && new Date(x.start) > new Date(ev.start)
    );
    if (hasSubsequent) {
      cascade = await new Promise(resolve => {
        showCascadeModal({
          eventTitle: ev.title,
          oldDate: oldStart,
          newDate: newStartStr,
          offsetDays,
          onChoice: choice => resolve(choice === 'cascade'),
        });
      });
      if (cascade === null) return; // cancelled
    }
  }

  // Step 2: notify modal
  const notifyChoice = await new Promise(resolve => {
    showNotifyModal({
      ev, newStartStr, newEndStr, cascade, offsetDays,
      onChoice: resolve,
    });
  });
  if (!notifyChoice) return; // cancelled

  // Step 3: persist + notify
  await applyReschedule({ ev, newStartStr, newEndStr, cascade, offsetDays, notify: notifyChoice });
}

function showCascadeModal({ eventTitle, oldDate, newDate, offsetDays, onChoice }) {
  let modal = document.getElementById('modalCascade');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'modalCascade';
    modal.className = 'rs-modal-back';
    modal.innerHTML = `
      <div class="rs-modal" style="max-width:480px;">
        <h3>Cascade Subsequent Phases?</h3>
        <div class="rs-modal-body" id="rmcBody"></div>
        <div class="rs-modal-foot">
          <button class="btn-cancel" data-c="cancel">Cancel</button>
          <button class="btn-secondary" data-c="single">Move Only This Phase</button>
          <button class="btn-primary" data-c="cascade">Cascade All Subsequent</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }
  const sign = offsetDays > 0 ? '+' : '';
  modal.querySelector('#rmcBody').innerHTML = `
    <p>Moving <b>${escHtml(eventTitle)}</b> from <b>${oldDate}</b> to <b>${newDate}</b> (${sign}${offsetDays} days).</p>
    <p>Should subsequent phases also shift by ${sign}${offsetDays} days?</p>
  `;
  modal.querySelectorAll('[data-c]').forEach(btn => {
    const newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);
    newBtn.addEventListener('click', () => {
      modal.classList.remove('on');
      const c = newBtn.dataset.c;
      onChoice(c === 'cancel' ? null : c);
    });
  });
  modal.classList.add('on');
}

function showNotifyModal({ ev, newStartStr, newEndStr, cascade, offsetDays, onChoice }) {
  let modal = document.getElementById('modalNotify');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'modalNotify';
    modal.className = 'rs-modal-back';
    modal.innerHTML = `
      <div class="rs-modal" style="max-width:480px;">
        <h3>Notify of Schedule Change?</h3>
        <div class="rs-modal-body" id="rmnBody"></div>
        <div class="rs-modal-foot">
          <button class="btn-cancel" data-c="cancel">Cancel</button>
          <button class="btn-secondary" data-c="silent">Save Without Notifying</button>
          <button class="btn-primary" data-c="notify">Save & Send Emails</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }
  const cascadeBit = cascade ? `<br><b>Plus ${offsetDays > 0 ? '+' : ''}${offsetDays} days on all subsequent phases.</b>` : '';
  const assigneesBit = ev.assignees.length
    ? `<b>${ev.assignees.join(', ')}</b>`
    : '<i>no assignees</i>';
  const customerBit = ev.customerName ? `<b>${ev.customerName}</b>` : '<i>no customer email</i>';
  modal.querySelector('#rmnBody').innerHTML = `
    <p><b>${escHtml(ev.projectLabel)}</b> — ${escHtml(ev.title)}<br>
    Now scheduled <b>${newStartStr}</b>${newEndStr !== newStartStr ? ` → <b>${newEndStr}</b>` : ''}${cascadeBit}</p>
    <div style="background:var(--bg);padding:10px 12px;border-radius:6px;font-size:12px;line-height:1.5;">
      Will email:<br>
      • Customer: ${customerBit}<br>
      • Assigned: ${assigneesBit}
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:10px;">Albi timeline note will be added regardless.</p>
  `;
  modal.querySelectorAll('[data-c]').forEach(btn => {
    const newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);
    newBtn.addEventListener('click', () => {
      modal.classList.remove('on');
      const c = newBtn.dataset.c;
      onChoice(c === 'cancel' ? null : c);
    });
  });
  modal.classList.add('on');
}

const MESSAGE_HOOK = 'https://hooks.zapier.com/hooks/catch/12653197/uvule41/';
const ALBI_NOTE_HOOK = 'https://hooks.zapier.com/hooks/catch/12653197/uvugxag/';

async function applyReschedule({ ev, newStartStr, newEndStr, cascade, offsetDays, notify }) {
  try {
    if (ev.kind === 'install') {
      const { error } = await sb.from('rebuild_selections').update({
        approved_install_date: newStartStr,
      }).eq('id', ev._selectionId);
      if (error) throw error;
    } else {
      const { error } = await sb.from('rebuild_phases').update({
        scheduled_start: newStartStr,
        scheduled_end: newEndStr,
      }).eq('id', ev._phaseId);
      if (error) throw error;

      if (cascade) {
        const subsequent = state.events.filter(x =>
          x._phaseId && x.projectId === ev.projectId && x._phaseId !== ev._phaseId
          && new Date(x.start) > new Date(ev.start)
        );
        for (const s of subsequent) {
          const newS = addDays(ymd(s.start), offsetDays);
          const newE = s.end ? addDays(ymd(s.end), offsetDays) : null;
          const { error: cErr } = await sb.from('rebuild_phases').update({
            scheduled_start: newS,
            ...(newE ? { scheduled_end: newE } : {}),
          }).eq('id', s._phaseId);
          if (cErr) throw cErr;
        }
      }
    }

    // Albi note — always
    fireAlbiNote({
      albi_job_number: ev.projectLabel,
      project_id: ev.projectId,
      event_type: 'phase_rescheduled',
      note: `Schedule updated: "${ev.title}" moved to ${newStartStr}${newEndStr !== newStartStr ? ' → ' + newEndStr : ''}${cascade ? ` (cascade ${offsetDays > 0 ? '+' : ''}${offsetDays} days on subsequent phases)` : ''}.`,
    });

    // Email customer + assigned (only if notify chose)
    if (notify === 'notify') {
      await sendRescheduleNotifications({ ev, newStartStr, newEndStr, cascade, offsetDays });
    }

    showToast(notify === 'notify' ? 'Rescheduled and notified' : 'Rescheduled');
    await loadAll();
  } catch (err) {
    console.error('Reschedule failed', err);
    showToast('Reschedule failed: ' + err.message);
  }
}

async function fireAlbiNote(payload) {
  try {
    await fetch(ALBI_NOTE_HOOK, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload), mode: 'no-cors',
    });
  } catch (e) { console.warn('Albi note fail', e); }
}

async function sendRescheduleNotifications({ ev, newStartStr, newEndStr, cascade, offsetDays }) {
  const proj = state.projects.find(p => p.id === ev.projectId);
  if (!proj) return;
  const dateLabel = newEndStr !== newStartStr ? `${newStartStr} → ${newEndStr}` : newStartStr;
  const cascadeBit = cascade ? `\n\nNote: Subsequent phases on this project also shifted by ${offsetDays > 0 ? '+' : ''}${offsetDays} days.` : '';

  // Customer email
  if (proj.customer_email) {
    const body = `Hi ${(proj.customer_name || '').split(' ')[0] || 'there'},

A quick update on your project:

The "${ev.title}" phase has been rescheduled to ${dateLabel}.

You can see the latest schedule on your customer portal anytime.${cascadeBit}

Thanks,
${proj.albi_pm_name || 'JG Restoration'}
JG Restoration · (920) 428-4200`;
    await fireMessage({
      project_id: ev.projectId,
      albi_project_id: null,
      job_number: proj.albi_job_number,
      channel: 'email',
      to_email: proj.customer_email,
      from_email: 'josh@jg-restoration.com',
      from_name: proj.albi_pm_name || 'JG Restoration',
      recipient_name: proj.customer_name,
      recipient_type: 'customer',
      subject: `Schedule Update — ${proj.albi_job_number}`,
      body,
    });
  }

  // Assigned subs/carpenters — fetch their emails
  if (ev._phaseId && ev.assignees.length) {
    const { data: aData } = await sb.from('rebuild_phase_assignees').select(`
      sub:rebuild_subs(company_name, primary_contact, email),
      employee:employees(name, email)
    `).eq('phase_id', ev._phaseId);
    for (const a of (aData || [])) {
      const email = a.sub?.email || a.employee?.email;
      const name = a.sub?.primary_contact || a.sub?.company_name || a.employee?.name;
      if (!email) continue;
      const body = `Hi ${(name || '').split(' ')[0] || 'there'},

Heads up — schedule change on ${proj.albi_job_number}:

"${ev.title}" is now scheduled ${dateLabel}.

Customer: ${proj.customer_name || ''}
Address: ${proj.property_address || ''}${cascadeBit}

Reply if this doesn't work and we'll get it sorted.

Thanks,
${proj.albi_pm_name || 'JG Restoration'}
JG Restoration · (920) 428-4200`;
      await fireMessage({
        project_id: ev.projectId,
        job_number: proj.albi_job_number,
        channel: 'email',
        to_email: email,
        from_email: 'josh@jg-restoration.com',
        from_name: proj.albi_pm_name || 'JG Restoration',
        recipient_name: name,
        recipient_type: a.sub ? 'sub' : 'employee',
        subject: `Schedule Change — ${proj.albi_job_number}`,
        body,
      });
    }
  }
}

async function fireMessage(payload) {
  // Persist message row first so it's tracked in the rebuild_messages timeline
  try {
    await sb.from('rebuild_messages').insert({
      project_id: payload.project_id,
      recipient_type: payload.recipient_type,
      recipient_name: payload.recipient_name,
      recipient_email: payload.to_email,
      channel: payload.channel,
      direction: 'outbound',
      subject: payload.subject,
      body: payload.body,
      sent_by_email: payload.from_email,
      sent_by_name: payload.from_name,
      status: 'queued',
    });
  } catch (e) { console.warn('msg insert', e); }
  try {
    await fetch(MESSAGE_HOOK, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ...payload, attachment_count: 0, attachment_urls: '' }),
      mode: 'no-cors',
    });
  } catch (e) { console.warn('msg hook', e); }
}

function showToast(msg) {
  let t = document.getElementById('jgToast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'jgToast';
    t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:99999;opacity:0;transition:opacity .2s;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._h);
  t._h = setTimeout(() => { t.style.opacity = '0'; }, 2400);
}

// ─────── Toolbar wiring ───────
document.getElementById('navPrev').addEventListener('click', () => {
  const a = state.anchor;
  if (state.view === 'month') a.setMonth(a.getMonth() - 1);
  else if (state.view === 'week') a.setDate(a.getDate() - 7);
  else a.setDate(a.getDate() - 1);
  state.anchor = new Date(a);
  render();
});
document.getElementById('navNext').addEventListener('click', () => {
  const a = state.anchor;
  if (state.view === 'month') a.setMonth(a.getMonth() + 1);
  else if (state.view === 'week') a.setDate(a.getDate() + 7);
  else a.setDate(a.getDate() + 1);
  state.anchor = new Date(a);
  render();
});
document.getElementById('navToday').addEventListener('click', () => {
  state.anchor = new Date();
  render();
});
document.querySelectorAll('[data-view]').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('[data-view]').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  state.view = b.dataset.view;
  render();
}));
document.querySelectorAll('[data-filter]').forEach(b => b.addEventListener('click', () => {
  const k = b.dataset.filter;
  state.filters[k] = !state.filters[k];
  b.classList.toggle('on', state.filters[k]);
  render();
}));
document.getElementById('searchInput').addEventListener('input', e => {
  state.search = e.target.value;
  render();
});

// Sidebar: All/None toggle per group
document.querySelectorAll('.fs-toggle').forEach(b => b.addEventListener('click', () => {
  const group = b.dataset.group;
  if (state.multi[group] === null) {
    // currently "all" → switch to "none"
    state.multi[group] = new Set();
    b.textContent = 'None';
  } else {
    state.multi[group] = null;
    b.textContent = 'All';
  }
  renderSidebar();
  render();
}));

// Sidebar searches
document.querySelectorAll('.fs-search').forEach(inp => inp.addEventListener('input', e => {
  state.multiSearch[inp.dataset.search] = e.target.value;
  renderSidebar();
}));

// Sidebar collapsible sections (state persists in localStorage)
const COLLAPSED_KEY = 'jg_calendar_collapsed_sections';
const collapsedSections = new Set(JSON.parse(localStorage.getItem(COLLAPSED_KEY) || '[]'));
document.querySelectorAll('.fs-section').forEach(sec => {
  const id = sec.dataset.section;
  if (collapsedSections.has(id)) sec.classList.add('collapsed');
  const head = sec.querySelector('.fs-head');
  head.addEventListener('click', e => {
    // Don't toggle if click was on the All/None button itself
    if (e.target.classList.contains('fs-toggle')) return;
    sec.classList.toggle('collapsed');
    if (sec.classList.contains('collapsed')) collapsedSections.add(id);
    else collapsedSections.delete(id);
    localStorage.setItem(COLLAPSED_KEY, JSON.stringify([...collapsedSections]));
  });
});

// ─────── Init ───────
loadAll();

// Periodic refresh (every 60s) so changes from rebuild.html propagate
setInterval(loadAll, 60 * 1000);
</script>
