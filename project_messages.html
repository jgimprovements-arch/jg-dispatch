<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d2d5e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Messages · JG Restoration</title>
<link rel="icon" href="https://jgimprovements-arch.github.io/jg-dispatch/logo.png">
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --navy: #0d2d5e; --orange: #e85d04; --gold: #f5a623; --green: #2d9c5f; --red: #d64545;
    --bg: #f4f6fb; --card: #ffffff; --text: #1a2540; --muted: #7884a0; --line: #e3e7f0;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }

  .topbar { background: linear-gradient(135deg, #0d2d5e 0%, #1a4080 100%); color: #fff; padding: calc(var(--safe-top) + 14px) 16px 14px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 12px rgba(13,45,94,.25); position: sticky; top: 0; z-index: 10; }
  .back-btn { background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); color: #fff; border-radius: 999px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 18px; text-decoration: none; flex-shrink: 0; }
  .back-btn:active { background: rgba(255,255,255,.22); }
  .title { flex: 1; min-width: 0; }
  .title h1 { margin: 0; font-size: 15px; font-weight: 800; }
  .title .sub { font-size: 10px; opacity: .8; letter-spacing: .8px; text-transform: uppercase; }
  .compose-btn { background: var(--orange); color: #fff; border-radius: 999px; padding: 7px 14px; font-size: 12px; font-weight: 700; border: 0; cursor: pointer; flex-shrink: 0; font-family: inherit; }
  .compose-btn:active { background: #d05303; }

  main { padding: 14px 14px calc(var(--safe-bottom) + 28px); max-width: 720px; margin: 0 auto; }

  .msg-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 13px 16px; margin-bottom: 10px; }
  .msg-card.in { border-left: 4px solid #4a90e2; padding-left: 13px; }
  .msg-card.out { border-left: 4px solid var(--orange); padding-left: 13px; }
  .msg-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .msg-dir { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: .4px; }
  .msg-dir.in { background: rgba(74,144,226,.15); color: #4a90e2; }
  .msg-dir.out { background: rgba(232,93,4,.15); color: var(--orange); }
  .msg-when { font-size: 11px; color: var(--muted); }
  .msg-from { font-size: 12px; color: var(--navy); font-weight: 700; margin-bottom: 2px; }
  .msg-subject { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .msg-body { font-size: 13px; color: var(--text); line-height: 1.4; white-space: pre-wrap; overflow: hidden; max-height: 80px; position: relative; }
  .msg-body.expanded { max-height: none; }
  .msg-body.collapsed::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 30px;
    background: linear-gradient(transparent, var(--card));
    pointer-events: none;
  }
  .msg-toggle { display: inline-block; margin-top: 6px; font-size: 11px; color: var(--orange); font-weight: 700; cursor: pointer; }
  .msg-channel { font-size: 10px; color: var(--muted); font-weight: 600; margin-top: 6px; text-transform: uppercase; letter-spacing: .4px; }

  .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty .ico { font-size: 42px; opacity: .4; margin-bottom: 8px; }
  .empty h3 { color: var(--navy); margin: 0 0 4px; }
  .empty p { margin: 0; font-size: 13px; }

  /* Compose modal */
  .modal-back { position: fixed; inset: 0; background: rgba(13,45,94,.5); z-index: 100; display: none; align-items: flex-end; justify-content: center; }
  .modal-back.on { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 18px 18px 0 0;
    width: 100%;
    max-width: 600px;
    padding: 18px 16px calc(var(--safe-bottom) + 18px);
    box-shadow: 0 -8px 32px rgba(13,45,94,.3);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 { margin: 0 0 12px; color: var(--navy); font-size: 16px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
  .modal .close-x { background: var(--bg); border: 0; border-radius: 999px; width: 30px; height: 30px; font-size: 18px; cursor: pointer; color: var(--muted); }
  .modal label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin: 10px 0 4px; }
  .modal select, .modal input, .modal textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--navy); background: #fff; }
  .modal textarea { min-height: 180px; resize: vertical; line-height: 1.5; }
  .modal .actions { display: flex; gap: 8px; margin-top: 14px; }
  .modal .btn { flex: 1; padding: 12px; border-radius: 999px; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid transparent; font-family: inherit; }
  .modal .btn.primary { background: var(--orange); color: #fff; border-color: var(--orange); }
  .modal .btn.primary:disabled { opacity: .5; }
  .modal .btn.ghost { background: var(--bg); color: var(--navy); border-color: var(--line); }

  .toast { position: fixed; bottom: calc(var(--safe-bottom) + 20px); left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; padding: 10px 20px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 16px rgba(13,45,94,.3); z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.on { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <a href="#" class="back-btn" id="backBtn">←</a>
  <div class="title">
    <h1 id="topJob">Messages</h1>
    <div class="sub" id="topSub">Loading…</div>
  </div>
  <button class="compose-btn" id="composeBtn">+ Compose</button>
</div>

<main id="main">
  <div class="empty"><p>Loading…</p></div>
</main>

<div class="modal-back" id="composeModal">
  <div class="modal">
    <h3>New Message <button class="close-x" id="closeCompose">×</button></h3>
    <label>To</label>
    <select id="msg_to"></select>
    <label>Channel</label>
    <select id="msg_channel">
      <option value="email">📧 Email</option>
      <option value="sms">📱 SMS</option>
    </select>
    <label>Subject (email only)</label>
    <input type="text" id="msg_subject" placeholder="Re: {job}">
    <label>Message</label>
    <textarea id="msg_body" placeholder="Type your message…"></textarea>
    <div class="actions">
      <button class="btn ghost" id="cancelCompose">Cancel</button>
      <button class="btn primary" id="sendBtn" disabled>Send</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const SB_URL = 'https://nuykvchgecpiuikoerze.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51eWt2Y2hnZWNwaXVpa29lcnplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjM3ODYsImV4cCI6MjA5MTgzOTc4Nn0.39hZ8DdjT_0iFJXPeAL2FXUSLw8FZBirDVzxZTO1W9s';
const MESSAGE_HOOK = 'https://hooks.zapier.com/hooks/catch/12653197/uvule41/';
const sb = createClient(SB_URL, SB_ANON);

const params = new URLSearchParams(window.location.search);
const projectId = params.get('p');
document.getElementById('backBtn').addEventListener('click', (e) => {
  e.preventDefault();
  if (window.history.length > 1 && document.referrer && new URL(document.referrer).origin === location.origin) {
    history.back();
  } else {
    location.href = `project_detail.html?p=${projectId}`;
  }
});

const state = { project: null, messages: [], subs: [] };

const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtDateTime = d => d ? new Date(d).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '';

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2000);
}

async function init() {
  if (!projectId) return showEmpty('Missing project', 'Open from project list');
  const [{ data: project }, { data: messages }, { data: subs }] = await Promise.all([
    sb.from('rebuild_projects').select('*').eq('id', projectId).maybeSingle(),
    sb.from('rebuild_messages').select('*').eq('project_id', projectId).order('created_at', { ascending: false }).limit(50),
    sb.from('rebuild_subs').select('id, company_name, primary_contact, email, phone').order('company_name'),
  ]);
  if (!project) return showEmpty('Project not found', 'It may have been deleted.');
  state.project = project;
  state.messages = messages || [];
  state.subs = subs || [];

  document.getElementById('topJob').textContent = `Messages · ${project.albi_job_number || ''}`;
  document.getElementById('topSub').textContent = project.customer_name || '';

  render();
  wireCompose();

  // Realtime
  sb.channel('msgs_' + projectId)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rebuild_messages', filter: `project_id=eq.${projectId}` },
        async () => {
          const { data } = await sb.from('rebuild_messages').select('*').eq('project_id', projectId).order('created_at', { ascending: false }).limit(50);
          state.messages = data || [];
          render();
        })
    .subscribe();
}

function render() {
  if (!state.messages.length) {
    document.getElementById('main').innerHTML = `
      <div class="empty">
        <div class="ico">💬</div>
        <h3>No messages yet</h3>
        <p>Tap "+ Compose" to send the first one.</p>
      </div>
    `;
    return;
  }
  document.getElementById('main').innerHTML = state.messages.map(msgCard).join('');

  // Wire expand buttons
  document.querySelectorAll('.msg-toggle').forEach(t => {
    t.addEventListener('click', () => {
      const body = t.previousElementSibling;
      body.classList.toggle('collapsed');
      body.classList.toggle('expanded');
      t.textContent = body.classList.contains('expanded') ? 'Show less' : 'Read more';
    });
  });
}

function msgCard(m) {
  const dir = m.direction === 'in' ? 'in' : 'out';
  const dirLabel = m.direction === 'in' ? '← Received' : '→ Sent';
  const channelIcon = m.channel === 'sms' ? '📱 SMS' : m.channel === 'email' ? '📧 Email' : '📝 Internal';
  const body = (m.body || '').trim();
  const isLong = body.length > 200;
  return `
    <div class="msg-card ${dir}">
      <div class="msg-top">
        <div class="msg-dir ${dir}">${dirLabel}</div>
        <div class="msg-when">${fmtDateTime(m.created_at)}</div>
      </div>
      ${m.from_name || m.to_name ? `<div class="msg-from">${esc(m.direction === 'in' ? (m.from_name || m.from_email || '?') : 'To: ' + (m.to_name || m.to_email || '?'))}</div>` : ''}
      ${m.subject ? `<div class="msg-subject">${esc(m.subject)}</div>` : ''}
      <div class="msg-body ${isLong ? 'collapsed' : ''}">${esc(body)}</div>
      ${isLong ? `<div class="msg-toggle">Read more</div>` : ''}
      <div class="msg-channel">${channelIcon}</div>
    </div>
  `;
}

function wireCompose() {
  const modal = document.getElementById('composeModal');
  const openBtn = document.getElementById('composeBtn');
  const closeBtn = document.getElementById('closeCompose');
  const cancelBtn = document.getElementById('cancelCompose');
  const sendBtn = document.getElementById('sendBtn');
  const toSelect = document.getElementById('msg_to');
  const channelSelect = document.getElementById('msg_channel');
  const bodyInput = document.getElementById('msg_body');
  const subjectInput = document.getElementById('msg_subject');

  // Populate To dropdown: customer + subs
  const p = state.project;
  let options = '';
  if (p.customer_email || p.customer_phone) {
    options += `<option value="customer">👤 Customer · ${esc(p.customer_name || '')}</option>`;
  }
  state.subs.forEach(s => {
    options += `<option value="sub:${s.id}">🔧 ${esc(s.company_name)}${s.primary_contact ? ' · ' + esc(s.primary_contact) : ''}</option>`;
  });
  toSelect.innerHTML = options;
  subjectInput.value = `Re: ${p.albi_job_number || 'project'}`;

  const refresh = () => {
    sendBtn.disabled = !(bodyInput.value.trim() && toSelect.value);
  };
  bodyInput.addEventListener('input', refresh);
  toSelect.addEventListener('change', refresh);

  openBtn.addEventListener('click', () => modal.classList.add('on'));
  closeBtn.addEventListener('click', () => modal.classList.remove('on'));
  cancelBtn.addEventListener('click', () => modal.classList.remove('on'));
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('on'); });

  sendBtn.addEventListener('click', async () => {
    sendBtn.disabled = true;
    sendBtn.textContent = 'Sending…';
    try {
      const channel = channelSelect.value;
      const subject = subjectInput.value.trim();
      const body = bodyInput.value.trim();
      const toRaw = toSelect.value;

      let to_email = null, to_phone = null, to_name = null, recipient_type = null, sub_id = null;
      if (toRaw === 'customer') {
        to_email = p.customer_email;
        to_phone = p.customer_phone;
        to_name = p.customer_name;
        recipient_type = 'customer';
      } else if (toRaw.startsWith('sub:')) {
        const subRow = state.subs.find(s => s.id === toRaw.slice(4));
        to_email = subRow?.email;
        to_phone = subRow?.phone;
        to_name = subRow?.primary_contact || subRow?.company_name;
        recipient_type = 'sub';
        sub_id = subRow?.id;
      }

      // Log message
      await sb.from('rebuild_messages').insert({
        project_id: projectId,
        direction: 'out',
        channel,
        from_email: p.albi_pm_email || null,
        from_name: p.albi_pm_name || 'JG Restoration',
        to_email, to_phone, to_name,
        subject: channel === 'email' ? subject : null,
        body,
        recipient_type,
        sub_id,
      });

      // Fire Zapier
      try {
        await fetch(MESSAGE_HOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            channel,
            to_email, to_phone,
            from_email: p.albi_pm_email || 'josh@jg-restoration.com',
            from_name: 'JG Restoration',
            recipient_name: to_name,
            recipient_type,
            subject: channel === 'email' ? subject : null,
            body,
            attachment_count: 0, attachment_urls: '',
          }),
          mode: 'no-cors',
        });
      } catch (e) { console.warn('Zap failed:', e); }

      toast('Message sent');
      modal.classList.remove('on');
      bodyInput.value = '';
    } catch (e) {
      console.error(e);
      toast('Send failed');
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send';
    }
  });
}

function showEmpty(t, m) {
  document.getElementById('main').innerHTML = `<div class="empty"><h3>${esc(t)}</h3><p>${esc(m)}</p></div>`;
}

// Auto-open compose modal if ?action=compose
const autoAction = new URLSearchParams(location.search).get('action');
if (autoAction === 'compose') {
  setTimeout(() => {
    const modal = document.getElementById('composeModal');
    if (modal) modal.classList.add('on');
  }, 200);
}

init();
</script>
</body>
</html>
